8RpgwhKne1xP0L6oRT4KFKWY4nTZucRo5o6QTC3xhtN\\\"\u003ehttps://item.taobao.com/item....\u003c/a\u003e。\u003c/p\u003e\\n\u003cp\u003e\u003cstrong\u003e1.2.2 哪里缓存\u003c/strong\u003e\u003c/p\u003e\\n\u003cp\u003e静态数据缓存到哪里呢？可以有三种方式：1、浏览器；2、CDN ；3、服务端。\u003c/p\u003e\\n\u003cp\u003e浏览器当然是第一选择，但用户的浏览器是不可控的，主要体现在如果用户不主动刷新，系统很难主动地把消息推送给用户（注意，当讨论静态数据时，潜台词是 “相对不变”，言外之意是 “可能会变”），如此可能会导致用户端在很长一段时间内看到的信息都是错误的。对于秒杀系统，保证缓存可以在秒级时间内失效是不可或缺的。\u003c/p\u003e\\n\u003cp\u003e服务端主要进行动态逻辑计算及加载，本身并不擅长处理大量连接，每个连接消耗内存较多，同时 Servlet 容器解析 HTTP 较慢，容易侵占逻辑计算资源；另外，静态数据下沉至此也会拉长请求路径。\u003c/p\u003e\\n\u003cp\u003e因此通常将静态数据缓存在 CDN，其本身更擅长处理大并发的静态文件请求，既可以做到主动失效，又离用户尽可能近，同时规避 Java 语言层面的弱点。需要注意的是，上 CDN 有以下几个问题需要解决：\u003c/p\u003e\\n\u003col\u003e\\n\u003cli\u003e失效问题。任何一个缓存都应该是有时效的，尤其对于一个秒杀场景。所以，系统需要保证全国各地的 CDN 在秒级时间内失效掉缓存信息，这实际对 CDN 的失效系统要求是很高的\u003c/li\u003e\\n\u003cli\u003e命中率问题。高命中是缓存系统最为核心的性能要求，不然缓存就失去了意义。如果将数据放到全国各地的 CDN ，势必会导致请求命中同一个缓存的可能性降低，那么命中率就成为一个问题\u003c/li\u003e\\n\u003c/ol\u003e\\n\u003cp\u003e因此，将数据放到全国所有的 CDN 节点是不太现实的，失效问题、命中率问题都会面临比较大的挑战。更为可行的做法是选择若干 CDN 节点进行静态化改造，节点的选取通常需要满足以下几个条件：\u003c/p\u003e\\n\u003col\u003e\\n\u003cli\u003e临近访问量集中的地区\u003c/li\u003e\\n\u003cli\u003e距离主站较远的地区\u003c/li\u003e\\n\u003cli\u003e节点与主站间网络质量良好的地区\u003c/li\u003e\\n\u003c/ol\u003e\\n\u003cp\u003e基于以上因素，选择 CDN 的二级缓存比较合适，因为二级缓存数量偏少，容量也更大，访问量相对集中，这样就可以较好解决缓存的失效问题以及命中率问题，是当前比较理想的一种 CDN 化方案。部署方式如下图所示：\u003c/p\u003e\\n\u003cp\u003e\u003cimg src=\\\"/images/blog/tech/system/image_1_2.png\\\" alt=\\\"image_1_2.png\\\"\u003e\u003c/p\u003e\\n\u003cp\u003e\u003cstrong\u003e1.3 数据整合\u003c/strong\u003e\u003c/p\u003e\\n\u003cp\u003e分离出动静态数据之后，前端如何组织数据页就是一个新的问题，主要在于动态数据的加载处理，通常有两种方案：ESI（Edge Side Includes）方案和 CSI（Client Side Include）方案。\u003c/p\u003e\\n\u003col\u003e\\n\u003cli\u003eESI 方案：Web 代理服务器上请求动态数据，并将动态数据插入到静态页面中，用户看到页面时已经是一个完整的页面。这种方式对服务端性能要求高，但用户体验较好\u003c/li\u003e\\n\u003cli\u003eCSI 方案：Web 代理服务器上只返回静态页面，前端单独发起一个异步 JS 请求动态数据。这种方式对服务端性能友好，但用户体验稍差\u003c/li\u003e\\n\u003c/ol\u003e\\n\u003cp\u003e\u003cstrong\u003e1.4 小结\u003c/strong\u003e\u003c/p\u003e\\n\u003cp\u003e动静分离对于性能的提升，抽象起来只有两点，一是数据要尽量少，以便减少没必要的请求，二是路径要尽量短，以便提高单次请求的效率。具体方法其实就是基于这个大方向进行的。\u003c/p\u003e\\n\u003ch4\u003e2 热点优化 \u003ca href=\\\"#item-0-7\\\" id=\\\"item-0-7\\\"\u003e\u003c/a\u003e\u003c/h4\u003e\\n\u003cp\u003e热点分为热点操作和热点数据，以下分开进行讨论。\u003c/p\u003e\\n\u003cp\u003e\u003cstrong\u003e2.1 热点操作\u003c/strong\u003e\u003c/p\u003e\\n\u003cp\u003e零点刷新、零点下单、零点添加购物车等都属于热点操作。热点操作是用户的行为，不好改变，但可以做一些限制保护，比如用户频繁刷新页面时进行提示阻断。\u003c/p\u003e\\n\u003cp\u003e\u003cstrong\u003e2.2 热点数据\u003c/strong\u003e\u003c/p\u003e\\n\u003cp\u003e热点数据的处理三步走，一是热点识别，二是热点隔离，三是热点优化。\u003c/p\u003e\\n\u003cp\u003e\u003cstrong\u003e2.2.1 热点识别\u003c/strong\u003e\u003c/p\u003e\\n\u003cp\u003e热点数据分为静态热点和动态热点，具体如下：\u003c/p\u003e\\n\u003col\u003e\\n\u003cli\u003e静态热点：能够提前预测的热点数据。大促前夕，可以根据大促的行业特点、活动商家等纬度信息分析出热点商品，或者通过卖家报名的方式提前筛选；另外，还可以通过技术手段提前预测，例如对买家每天访问的商品进行大数据计算，然后统计出 TOP N 的商品，即可视为热点商品\u003c/li\u003e\\n\u003cli\u003e动态热点：无法提前预测的热点数据。冷热数据往往是随实际业务场景发生交替变化的，尤其是如今直播卖货模式的兴起——带货商临时做一个广告，就有可能导致一件商品在短时间内被大量购买。由于此类商品日常访问较少，即使在缓存系统中一段时间后也会被逐出或过期掉，甚至在db中也是冷数据。瞬时流量的涌入，往往导致缓存被击穿，请求直接到达DB，引发DB压力过大\u003c/li\u003e\\n\u003c/ol\u003e\\n\u003cp\u003e因此秒杀系统需要实现热点数据的动态发现能力，一个常见的实现思路是：\u003c/p\u003e\\n\u003col\u003e\\n\u003cli\u003e异步采集交易链路各个环节的热点 Key 信息，如 Nginx采集访问URL或 Agent 采集热点日志（一些中间件本身已具备热点发现能力），提前识别潜在的热点数据\u003c/li\u003e\\n\u003cli\u003e聚合分析热点数据，达到一定规则的热点数据，通过订阅分发推送到链路系统，各系统根据自身需求决定如何处理热点数据，或限流或缓存，从而实现热点保护\u003c/li\u003e\\n\u003c/ol\u003e\\n\u003cp\u003e需要注意的是：\u003c/p\u003e\\n\u003col\u003e\\n\u003cli\u003e热点数据采集最好采用异步方式，一方面不会影响业务的核心交易链路，一方面可以保证采集方式的通用性\u003c/li\u003e\\n\u003cli\u003e热点发现最好做到秒级实时，这样动态发现才有意义，实际上也是对核心节点的数据采集和分析能力提出了较高的要求\u003c/li\u003e\\n\u003c/ol\u003e\\n\u003cp\u003e\u003cstrong\u003e2.2.2 热点隔离\u003c/strong\u003e\u003c/p\u003e\\n\u003cp\u003e热点数据识别出来之后，第一原则就是将热点数据隔离出来，不要让 1% 影响到另外的 99%，可以基于以下几个层次实现热点隔离：\u003c/p\u003e\\n\u003col\u003e\\n\u003cli\u003e业务隔离。秒杀作为一种营销活动，卖家需要单独报名，从技术上来说，系统可以提前对已知热点做缓存预热\u003c/li\u003e\\n\u003cli\u003e系统隔离。系统隔离是运行时隔离，通过分组部署和另外 99% 进行分离，另外秒杀也可以申请单独的域名，入口层就让请求落到不同的集群中\u003c/li\u003e\\n\u003cli\u003e数据隔离。秒杀数据作为热点数据，可以启用单独的缓存集群或者DB服务组，从而更好的实现横向或纵向能力扩展\u003c/li\u003e\\n\u003c/ol\u003e\\n\u003cp\u003e当然，实现隔离还有很多种办法。比如，可以按照用户来区分，为不同的用户分配不同的 Cookie，入口层路由到不同的服务接口中；再比如，域名保持一致，但后端调用不同的服务接口；又或者在数据层给数据打标进行区分等等，这些措施的目的都是把已经识别的热点请求和普通请求区分开来。\u003c/p\u003e\\n\u003cp\u003e\u003cstrong\u003e2.2.3 热点优化\u003c/strong\u003e\u003c/p\u003e\\n\u003cp\u003e热点数据隔离之后，也就方便对这 1% 的请求做针对性的优化，方式无外乎两种：\u003c/p\u003e\\n\u003col\u003e\\n\u003cli\u003e缓存：热点缓存是最为有效的办法。如果热点数据做了动静分离，那么可以长期缓存静态数据\u003c/li\u003e\\n\u003cli\u003e限流：流量限制更多是一种保护机制。需要注意的是，各服务要时刻关注请求是否触发限流并及时进行review\u003c/li\u003e\\n\u003c/ol\u003e\\n\u003cp\u003e\u003cstrong\u003e2.2.4 小结\u003c/strong\u003e\u003c/p\u003e\\n\u003cp\u003e数据的热点优化与动静分离是不一样的，热点优化是基于二八原则对数据进行了纵向拆分，以便进行针对性地处理。热点识别和隔离不仅对“秒杀”这个场景有意义，对其他的高性能分布式系统也非常有参考价值。\u003c/p\u003e\\n\u003ch4\u003e3 系统优化 \u003ca href=\\\"#item-0-8\\\" id=\\\"item-0-8\\\"\u003e\u003c/a\u003e\u003c/h4\u003e\\n\u003cp\u003e对于一个软件系统，提高性能可以有很多种手段，如提升硬件水平、调优JVM 性能，这里主要关注代码层面的性能优化——\u003c/p\u003e\\n\u003col\u003e\\n\u003cli\u003e减少序列化：减少 Java 中的序列化操作可以很好的提升系统性能。序列化大部分是在 RPC 阶段发生，因此应该尽量减少 RPC 调用，一种可行的方案是将多个关联性较强的应用进行 “合并部署”，从而减少不同应用之间的 RPC 调用（微服务设计规范）\u003c/li\u003e\\n\u003cli\u003e直接输出流数据：只要涉及字符串的I/O操作，无论是磁盘 I/O 还是网络 I/O，都比较耗费 CPU 资源，因为字符需要转换成字节，而这个转换又必须查表编码。所以对于常用数据，比如静态字符串，推荐提前编码成字节并缓存，具体到代码层面就是通过 OutputStream() 类函数从而减少数据的编码转换；另外，热点方法toString()不要直接调用ReflectionToString实现，推荐直接硬编码，并且只打印DO的基础要素和核心要素\u003c/li\u003e\\n\u003cli\u003e裁剪日志异常堆栈：无论是外部系统异常还是应用本身异常，都会有堆栈打出，超大流量下，频繁的输出完整堆栈，只会加剧系统当前负载。可以通过日志配置文件控制异常堆栈输出的深度\u003c/li\u003e\\n\u003cli\u003e去组件框架：极致优化要求下，可以去掉一些组件框架，比如去掉传统的 MVC 框架，直接使用 Servlet 处理请求。这样可以绕过一大堆复杂且用处不大的处理逻辑，节省毫秒级的时间，当然，需要合理评估你对框架的依赖程度\u003c/li\u003e\\n\u003c/ol\u003e\\n\u003ch4\u003e4 总结一下 \u003ca href=\\\"#item-0-9\\\" id=\\\"item-0-9\\\"\u003e\u003c/a\u003e\u003c/h4\u003e\\n\u003cp\u003e性能优化需要一个基准值，所以系统还需要做好应用基线，比如性能基线（何时性能突然下降）、成本基线（去年大促用了多少机器）、链路基线（核心流程发生了哪些变化），通过基线持续关注系统性能，促使系统在代码层面持续提升编码质量、业务层面及时下掉不合理调用、架构层面不断优化改进。\u003c/p\u003e\\n\u003ch3\u003e一致性 \u003ca href=\\\"#item-0-10\\\" id=\\\"item-0-10\\\"\u003e\u003c/a\u003e\u003c/h3\u003e\\n\u003cp\u003e秒杀系统中，库存是个关键数据，卖不出去是个问题，超卖更是个问题。秒杀场景下的一致性问题，主要就是库存扣减的准确性问题。\u003c/p\u003e\\n\u003ch4\u003e1 减库存的方式 \u003ca href=\\\"#item-0-11\\\" id=\\\"item-0-11\\\"\u003e\u003c/a\u003e\u003c/h4\u003e\\n\u003cp\u003e电商场景下的购买过程一般分为两步：下单和付款。“提交订单”即为下单，“支付订单”即为付款。基于此设定，减库存一般有以下几个方式：\u003c/p\u003e\\n\u003col\u003e\\n\u003cli\u003e下单减库存。买家下单后，扣减商品库存。下单减库存是最简单的减库存方式，也是控制最为精确的一种\u003c/li\u003e\\n\u003cli\u003e付款减库存。买家下单后，并不立即扣减库存，而是等到付款后才真正扣减库存。但因为付款时才减库存，如果并发比较高，可能出现买家下单后付不了款的情况，因为商品已经被其他人买走了\u003c/li\u003e\\n\u003cli\u003e预扣库存。这种方式相对复杂一些，买家下单后，库存为其保留一定的时间（如 15 分钟），超过这段时间，库存自动释放，释放后其他买家可以购买\u003c/li\u003e\\n\u003c/ol\u003e\\n\u003cp\u003e能够看到，减库存方式是基于购物过程的多阶段进行划分的，但无论是在下单阶段还是付款阶段，都会存在一些问题，下面进行具体分析。\u003c/p\u003e\\n\u003ch4\u003e2 减库存的问题 \u003ca href=\\\"#item-0-12\\\" id=\\\"item-0-12\\\"\u003e\u003c/a\u003e\u003c/h4\u003e\\n\u003cp\u003e\u003cstrong\u003e2.1 下单减库存\u003c/strong\u003e\u003c/p\u003e\\n\u003cp\u003e优势：用户体验最好。下单减库存是最简单的减库存方式，也是控制最精确的一种。下单时可以直接通过数据库事务机制控制商品库存，所以一定不会出现已下单却付不了款的情况。\u003c/p\u003e\\n\u003cp\u003e劣势：可能卖不出去。正常情况下，买家下单后付款概率很高，所以不会有太大问题。但有一种场景例外，就是当卖家参加某个促销活动时，竞争对手通过恶意下单的方式将该商品全部下单，导致库存清零，那么这就不能正常售卖了——要知道，恶意下单的人是不会真正付款的，这正是 “下单减库存” 的不足之处。\u003c/p\u003e\\n\u003cp\u003e\u003cstrong\u003e2.2 付款减库存\u003c/strong\u003e\u003c/p\u003e\\n\u003cp\u003e优势：一定实际售卖。“下单减库存” 可能导致恶意下单，从而影响卖家的商品销售， “付款减库存” 由于需要付出真金白银，可以有效避免。\u003c/p\u003e\\n\u003cp\u003e劣势：用户体验较差。用户下单后，不一定会实际付款，假设有 100 件商品，就可能出现 200 人下单成功的情况，因为下单时不会减库存，所以也就可能出现下单成功数远远超过真正库存数的情况，这尤其会发生在大促的热门商品上。如此一来就会导致很多买家下单成功后却付不了款，购物体验自然是比较差的。\u003c/p\u003e\\n\u003cp\u003e\u003cstrong\u003e2.3 预扣库存\u003c/strong\u003e\u003c/p\u003e\\n\u003cp\u003e优势：缓解了以上两种方式的问题。预扣库存实际就是“下单减库存”和 “付款减库存”两种方式的结合，将两次操作进行了前后关联，下单时预扣库存，付款时释放库存。\u003c/p\u003e\\n\u003cp\u003e劣势：并没有彻底解决以上问题。比如针对恶意下单的场景，虽然可以把有效付款时间设置为 10 分钟，但恶意买家完全可以在 10 分钟之后再次下单。\u003c/p\u003e\\n\u003cp\u003e\u003cstrong\u003e2.4 小结\u003c/strong\u003e\u003c/p\u003e\\n\u003cp\u003e减库存的问题主要体现在用户体验和商业诉求两方面，其本质原因在于购物过程存在两步甚至多步操作，在不同阶段减库存，容易存在被恶意利用的漏洞。\u003c/p\u003e\\n\u003ch4\u003e3 实际如何减库存 \u003ca href=\\\"#item-0-13\\\" id=\\\"item-0-13\\\"\u003e\u003c/a\u003e\u003c/h4\u003e\\n\u003cp\u003e业界最为常见的是预扣库存。无论是外卖点餐还是电商购物，下单后一般都有个 “有效付款时间”，超过该时间订单自动释放，这就是典型的预扣库存方案。但如上所述，预扣库存还需要解决恶意下单的问题，保证商品卖的出去；另一方面，如何避免超卖，也是一个痛点。\u003c/p\u003e\\n\u003col\u003e\\n\u003cli\u003e卖的出去：恶意下单的解决方案主要还是结合安全和反作弊措施来制止。比如，识别频繁下单不付款的买家并进行打标，这样可以在打标买家下单时不减库存；再比如为大促商品设置单人最大购买件数，一人最多只能买 N 件商品；又或者对重复下单不付款的行为进行次数限制阻断等\u003c/li\u003e\\n\u003cli\u003e避免超卖：库存超卖的情况实际分为两种。对于普通商品，秒杀只是一种大促手段，即使库存超卖，商家也可以通过补货来解决；而对于一些商品，秒杀作为一种营销手段，完全不允许库存为负，也就是在数据一致性上，需要保证大并发请求时数据库中的库存字段值不能为负，一般有多种方案：一是在通过事务来判断，即保证减后库存不能为负，否则就回滚；二是直接设置数据库字段类型为无符号整数，这样一旦库存为负就会在执行 SQL 时报错；三是使用 CASE WHEN 判断语句——\u003c/li\u003e\\n\u003c/ol\u003e\\n\u003cpre\u003e\u003ccode class=\\\"language-sql\\\"\u003eUPDATE item SET inventory = CASE WHEN inventory \u0026gt;= xxx THEN inventory-xxx ELSE inventory END\\n\u003c/code\u003e\u003c/pre\u003e\\n\u003cp\u003e业务手段保证商品卖的出去，技术手段保证商品不会超卖，库存问题从来就不是简单的技术难题，解决问题的视角是多种多样的。\u003c/p\u003e\\n\u003ch4\u003e4 一致性性能的优化 \u003ca href=\\\"#item-0-14\\\" id=\\\"item-0-14\\\"\u003e\u003c/a\u003e\u003c/h4\u003e\\n\u003cp\u003e库存是个关键数据，更是个热点数据。对系统来说，热点的实际影响就是 “高读” 和 “高写”，也是秒杀场景下最为核心的一个技术难题。\u003c/p\u003e\\n\u003cp\u003e\u003cstrong\u003e4.1 高并发读\u003c/strong\u003e\u003c/p\u003e\\n\u003cp\u003e秒杀场景解决高并发读问题，关键词是“分层校验”。即在读链路时，只进行不影响性能的检查操作，如用户是否具有秒杀资格、商品状态是否正常、用户答题是否正确、秒杀是否已经结束、是否非法请求等，而不做一致性校验等容易引发瓶颈的检查操作；直到写链路时，才对库存做一致性检查，在数据层保证最终准确性。\u003c/p\u003e\\n\u003cp\u003e因此，在分层校验设定下，系统可以采用分布式缓存甚至LocalCache来抵抗高并发读。即允许读场景下一定的脏数据，这样只会导致少量原本无库存的下单请求被误认为是有库存的，等到真正写数据时再保证最终一致性，由此做到高可用和一致性之间的平衡。\u003c/p\u003e\\n\u003cp\u003e实际上，分层校验的核心思想是：不同层次尽可能过滤掉无效请求，只在“漏斗” 最末端进行有效处理，从而缩短系统瓶颈的影响路径。\u003c/p\u003e\\n\u003cp\u003e\u003cstrong\u003e4.2 高并发写\u003c/strong\u003e\u003c/p\u003e\\n\u003cp\u003e高并发写的优化方式，一种是更换DB选型，一种是优化DB性能，以下分别进行讨论。\u003c/p\u003e\\n\u003cp\u003e4.2.1 更换DB选型\u003c/p\u003e\\n\u003cp\u003e秒杀商品和普通商品的减库存是有差异的，核心区别在数据量级小、交易时间短，因此能否把秒杀减库存直接放到缓存系统中实现呢，也就是直接在一个带有持久化功能的缓存中进行减库存操作，比如 Redis？\u003c/p\u003e\\n\u003cp\u003e如果减库存逻辑非常单一的话，比如没有复杂的 SKU 库存和总库存这种联动关系的话，个人认为是完全可以的。但如果有比较复杂的减库存逻辑，或者需要使用到事务，那就必须在数据库中完成减库存操作。\u003c/p\u003e\\n\u003cp\u003e4.2.2 优化DB性能\u003c/p\u003e\\n\u003cp\u003e库存数据落地到数据库实现其实是一行存储（MySQL），因此会有大量线程来竞争 InnoDB 行锁。但并发越高，等待线程就会越多，TPS 下降，RT 上升，吞吐量会受到严重影响——注意，这里假设数据库已基于上文【性能优化】完成数据隔离，以便于讨论聚焦 。\u003c/p\u003e\\n\u003cp\u003e解决并发锁的问题，有两种办法：\u003c/p\u003e\\n\u003col\u003e\\n\u003cli\u003e应用层排队。通过缓存加入集群分布式锁，从而控制集群对数据库同一行记录进行操作的并发度，同时也能控制单个商品占用数据库连接的数量，防止热点商品占用过多的数据库连接\u003c/li\u003e\\n\u003cli\u003e数据层排队。应用层排队是有损性能的，数据层排队是最为理想的。业界中，阿里的数据库团队开发了针对InnoDB 层上的补丁程序（patch），可以基于DB层对单行记录做并发排队，从而实现秒杀场景下的定制优化——注意，排队和锁竞争是有区别的，如果熟悉 MySQL 的话，就会知道 InnoDB 内部的死锁检测，以及 MySQL Server 和 InnoDB 的切换都是比较消耗性能的。另外阿里的数据库团队还做了很多其他方面的优化，如 COMMIT_ON_SUCCESS 和 ROLLBACK_ON_FAIL 的补丁程序，通过在 SQL 里加入提示（hint），实现事务不需要等待实时提交，而是在数据执行完最后一条 SQL 后，直接根据 TARGET_AFFECT_ROW 的结果进行提交或回滚，减少网络等待的时间（毫秒级）。目前阿里已将包含这些补丁程序的 MySQL 开源：\u003ca href=\\\"https://link.segmentfault.com/?enc=I%2FCSvHmwhqWWaIcvx%2BoGuw%3D%3D.9twostwyDIweyMcUrly3Zp6KPhQuFFX7eS%2FNY5bGVH3W2EN%2FLLcCmxl3cSe4rhiflb5yVJtZxmcjdRE5e2CqiLn7gsvN1ymwz5bAEmNgIr0%3D\\\"\u003eAliSQL\u003c/a\u003e\u003c/li\u003e\\n\u003c/ol\u003e\\n\u003cp\u003e\u003cstrong\u003e4.3 小结\u003c/strong\u003e\u003c/p\u003e\\n\u003cp\u003e高读和高写的两种处理方式大相径庭。读请求的优化空间要大一些，而写请求的瓶颈一般都在存储层，优化思路的本质还是基于 CAP 理论做平衡。\u003c/p\u003e\\n\u003ch4\u003e5 总结一下 \u003ca href=\\\"#item-0-15\\\" id=\\\"item-0-15\\\"\u003e\u003c/a\u003e\u003c/h4\u003e\\n\u003cp\u003e当然，减库存还有很多细节问题，例如预扣的库存超时后如何进行回补，再比如第三方支付如何保证减库存和付款时的状态一致性，这些也是很大的挑战。\u003c/p\u003e\\n\u003ch3\u003e高可用 \u003ca href=\\\"#item-0-16\\\" id=\\\"item-0-16\\\"\u003e\u003c/a\u003e\u003c/h3\u003e\\n\u003cp\u003e盯过秒杀流量监控的话，会发现它不是一条蜿蜒而起的曲线，而是一条挺拔的直线，这是因为秒杀请求高度集中于某一特定的时间点。这样一来就会造成一个特别高的零点峰值，而对资源的消耗也几乎是瞬时的。所以秒杀系统的可用性保护是不可或缺的。\u003c/p\u003e\\n\u003ch4\u003e1 流量削峰 \u003ca href=\\\"#item-0-17\\\" id=\\\"item-0-17\\\"\u003e\u003c/a\u003e\u003c/h4\u003e\\n\u003cp\u003e对于秒杀的目标场景，最终能够抢到商品的人数是固定的，无论 100 人和 10000 人参加结果都是一样的，即有效请求额度是有限的。并发度越高，无效请求也就越多。但秒杀作为一种商业营销手段，活动开始之前是希望有更多的人来刷页面，只是真正开始后，秒杀请求不是越多越好。因此系统可以设计一些规则，人为的延缓秒杀请求，甚至可以过滤掉一些无效请求。\u003c/p\u003e\\n\u003cp\u003e\u003cstrong\u003e1.1 答题\u003c/strong\u003e\u003c/p\u003e\\n\u003cp\u003e早期秒杀只是简单的点击秒杀按钮，后来才增加了答题。为什么要增加答题呢？主要是通过提升购买的复杂度，达到两个目的：\u003c/p\u003e\\n\u003col\u003e\\n\u003cli\u003e防止作弊。早期秒杀器比较猖獗，存在恶意买家或竞争对手使用秒杀器扫货的情况，商家没有达到营销的目的，所以增加答题来进行限制\u003c/li\u003e\\n\u003cli\u003e延缓请求。零点流量的起效时间是毫秒级的，答题可以人为拉长峰值下单的时长，由之前的 \u0026lt;1s 延长到 \u0026lt;10s。这个时间对于服务端非常重要，会大大减轻高峰期并发压力；另外，由于请求具有先后顺序，答题后置的请求到来时可能已经没有库存了，因此根本无法下单，此阶段落到数据层真正的写也就非常有限了\u003c/li\u003e\\n\u003c/ol\u003e\\n\u003cp\u003e需要注意的是，答题除了做正确性验证，还需要对提交时间做验证，比如\u0026lt;1s 人为操作的可能性就很小，可以进一步防止机器答题的情况。\u003c/p\u003e\\n\u003cp\u003e答题目前已经使用的非常普遍了，本质是通过在入口层削减流量，从而让系统更好地支撑瞬时峰值。\u003c/p\u003e\\n\u003cp\u003e\u003cstrong\u003e1.2 排队\u003c/strong\u003e\u003c/p\u003e\\n\u003cp\u003e最为常见的削峰方案是使用消息队列，通过把同步的直接调用转换成异步的间接推送缓冲瞬时流量。除了消息队列，类似的排队方案还有很多，例如：\u003c/p\u003e\\n\u003col\u003e\\n\u003cli\u003e线程池加锁等待\u003c/li\u003e\\n\u003cli\u003e本地内存蓄洪等待\u003c/li\u003e\\n\u003cli\u003e本地文件序列化写，再顺序读\u003c/li\u003e\\n\u003c/ol\u003e\\n\u003cp\u003e排队方式的弊端也是显而易见的，主要有两点：\u003c/p\u003e\\n\u003col\u003e\\n\u003cli\u003e请求积压。流量高峰如果长时间持续，达到了队列的水位上限，队列同样会被压垮，这样虽然保护了下游系统，但是和请求直接丢弃也没多大区别\u003c/li\u003e\\n\u003cli\u003e用户体验。异步推送的实时性和有序性自然是比不上同步调用的，由此可能出现请求先发后至的情况，影响部分敏感用户的购物体验\u003c/li\u003e\\n\u003c/ol\u003e\\n\u003cp\u003e排队本质是在业务层将一步操作转变成两步操作，从而起到缓冲的作用，但鉴于此种方式的弊端，最终还是要基于业务量级和秒杀场景做出妥协和平衡。\u003c/p\u003e\\n\u003cp\u003e\u003cstrong\u003e1.3 过滤\u003c/strong\u003e\u003c/p\u003e\\n\u003cp\u003e过滤的核心结构在于分层，通过在不同层次过滤掉无效请求，达到数据读写的精准触发。常见的过滤主要有以下几层：\u003c/p\u003e\\n\u003cp\u003e1、读限流：对读请求做限流保护，将超出系统承载能力的请求过滤掉 2、读缓存：对读请求做数据缓存，将重复的请求过滤掉 3、写限流：对写请求做限流保护，将超出系统承载能力的请求过滤掉 4、写校验：对写请求做一致性校验，只保留最终的有效数据\u003c/p\u003e\\n\u003cp\u003e过滤的核心目的是通过减少无效请求的数据IO保障有效请求的IO性能。\u003c/p\u003e\\n\u003cp\u003e\u003cstrong\u003e1.4 小结\u003c/strong\u003e\u003c/p\u003e\\n\u003cp\u003e系统可以通过入口层的答题、业务层的排队、数据层的过滤达到流量削峰的目的，本质是在寻求商业诉求与架构性能之间的平衡。另外，新的削峰手段也层出不穷，以业务切入居多，比如零点大促时同步发放优惠券或发起抽奖活动，将一部分流量分散到其他系统，这样也能起到削峰的作用。\u003c/p\u003e\\n\u003ch4\u003e2 Plan B \u003ca href=\\\"#item-0-18\\\" id=\\\"item-0-18\\\"\u003e\u003c/a\u003e\u003c/h4\u003e\\n\u003cp\u003e当一个系统面临持续的高峰流量时，其实是很难单靠自身调整来恢复状态的，日常运维没有人能够预估所有情况，意外总是无法避免。尤其在秒杀这一场景下，为了保证系统的高可用，必须设计一个 Plan B 方案来进行兜底。\u003c/p\u003e\\n\u003cp\u003e高可用建设，其实是一个系统工程，贯穿在系统建设的整个生命周期。\u003c/p\u003e\\n\u003cp\u003e\u003cimg src=\\\"/images/blog/tech/system/image_1_1.png\\\" alt=\\\"image_1_1.png\\\"\u003e\u003c/p\u003e\\n\u003cp\u003e具体来说，系统的高可用建设涉及架构阶段、编码阶段、测试阶段、发布阶段、运行阶段，以及故障发生时，逐一进行分析：\u003c/p\u003e\\n\u003col\u003e\\n\u003cli\u003e架构阶段：考虑系统的可扩展性和容错性，避免出现单点问题。例如多地单元化部署，即使某个IDC甚至地市出现故障，仍不会影响系统运转\u003c/li\u003e\\n\u003cli\u003e编码阶段：保证代码的健壮性，例如RPC调用时，设置合理的超时退出机制，防止被其他系统拖垮，同时也要对无法预料的返回错误进行默认的处理\u003c/li\u003e\\n\u003cli\u003e测试阶段：保证CI的覆盖度以及Sonar的容错率，对基础质量进行二次校验，并定期产出整体质量的趋势报告\u003c/li\u003e\\n\u003cli\u003e发布阶段：系统部署最容易暴露错误，因此要有前置的checklist模版、中置的上下游周知机制以及后置的回滚机制\u003c/li\u003e\\n\u003cli\u003e运行阶段：系统多数时间处于运行态，最重要的是运行时的实时监控，及时发现问题、准确报警并能提供详细数据，以便排查问题\u003c/li\u003e\\n\u003cli\u003e故障发生：首要目标是及时止损，防止影响面扩大，然后定位原因、解决问题，最后恢复服务\u003c/li\u003e\\n\u003c/ol\u003e\\n\u003cp\u003e对于日常运维而言，高可用更多是针对运行阶段而言的，此阶段需要额外进行加强建设，主要有以下几种手段：\u003c/p\u003e\\n\u003col\u003e\\n\u003cli\u003e预防：建立常态压测体系，定期对服务进行单点压测以及全链路压测，摸排水位\u003c/li\u003e\\n\u003cli\u003e管控：做好线上运行的降级、限流和熔断保护。需要注意的是，无论是限流、降级还是熔断，对业务都是有损的，所以在进行操作前，一定要和上下游业务确认好再进行。就拿限流来说，哪些业务可以限、什么情况下限、限流时间多长、什么情况下进行恢复，都要和业务方反复确认\u003c/li\u003e\\n\u003cli\u003e监控：建立性能基线，记录性能的变化趋势；建立报警体系，发现问题及时预警\u003c/li\u003e\\n\u003cli\u003e恢复：遇到故障能够及时止损，并提供快速的数据订正工具，不一定要好，但一定要有\u003c/li\u003e\\n\u003c/ol\u003e\\n\u003cp\u003e在系统建设的整个生命周期中，每个环节中都可能犯错，甚至有些环节犯的错，后面是无法弥补的或者成本极高的。所以高可用是一个系统工程，必须放到整个生命周期中进行全面考虑。同时，考虑到服务的增长性，高可用更需要长期规划并进行体系化建设。\u003c/p\u003e\\n\u003ch4\u003e3 总结一下 \u003ca href=\\\"#item-0-19\\\" id=\\\"item-0-19\\\"\u003e\u003c/a\u003e\u003c/h4\u003e\\n\u003cp\u003e高可用其实是在说 “稳定性”，稳定性是一个平时不重要，但出了问题就要命的事情，然而它的落地又是一个问题——平时业务发展良好，稳定性建设就会降级给业务让路。解决这个问题必须在组织上有所保障，比如让业务负责人背上稳定性绩效指标，同时在部门中建立稳定性建设小组，小组成员由每条线的核心力量兼任，绩效由稳定性负责人来打分，这样就可以把体系化的建设任务落实到具体的业务系统中了。\u003c/p\u003e\\n\u003ch3\u003e个人总结 \u003ca href=\\\"#item-0-20\\\" id=\\\"item-0-20\\\"\u003e\u003c/a\u003e\u003c/h3\u003e\\n\u003cp\u003e一个秒杀系统的设计，可以根据不同级别的流量，由简单到复杂打造出不同的架构，本质是各方面的取舍和权衡。当然，你可能注意到，本文并没有涉及具体的选型方案，因为这些对于架构来说并不重要，作为架构师，应该时刻提醒自己主线是什么。\u003c/p\u003e\\n\u003cp\u003e同时也在这里抽象、提炼一下，主要是个人对于秒杀设计的提纲式整理，方便各位同学进行参考——!\u003c/p\u003e\\n\u003cp\u003e\u003cimg src=\\\"/images/blog/tech/system/image_1_3.png\\\" alt=\\\"image_1_3.png\\\"\u003e\u003c/p\u003e\\n\"},{\"slug\":\"tech/middleware/RabbitMQ、RocketMQ、Kafka区别\",\"title\":\"RabbitMQ、RocketMQ、Kafka区别\",\"description\":\"MQ（Message Queue，消息队列） 在实际应用中常用的使用场景：异步处理，应用解耦，流量削锋和消息通讯四个场景。目前使用较多的消息队列有老牌的ActiveMQ、RabbitMQ，ZeroMQ，炙手可热的Kafka，MetaMQ，阿里巴巴的RocketMQ\",\"pubDate\":\"2024-03-11\",\"tags\":[\"消息队列\",\"技术专题\"],\"content\":\"\u003cp\u003e\u003ca href=\\\"https://baijiahao.baidu.com/s?id=1769207484615537227\\\"\u003e转载\u003c/a\u003e\u003c/p\u003e\\n\u003ch4\u003e引言\u003c/h4\u003e\\n\u003ch4\u003e1、队列应用场景：\u003c/h4\u003e\\n\u003cp\u003eMQ（Message Queue，消息队列）\\n\u003cstrong\u003e消息队列在实际应用中常用的使用场景（优点）\u003c/strong\u003e：\u003ccode\u003e异步处理\u003c/code\u003e，\u003ccode\u003e应用解耦\u003c/code\u003e，\u003ccode\u003e流量削锋\u003c/code\u003e和\u003ccode\u003e消息通讯\u003c/code\u003e四个场景。\u003c/p\u003e\\n\u003ch4\u003e2、目前使用较多的消息队列：\u003c/h4\u003e\\n\u003cp\u003e有老牌的ActiveMQ、RabbitMQ，ZeroMQ，炙手可热的Kafka，MetaMQ，阿里巴巴的RocketMQ。\u003c/p\u003e\\n\u003ch4\u003e3、如何选型（目前现状）：\u003c/h4\u003e\\n\u003cp\u003eActiveMQ，性能不是很好，因此在高并发的场景下，直接被pass掉了。它的Api很完善，在中小型互联网公司可以去使用。最早大家都用 ActiveMQ，但是现在确实大家用的不多了，社区也不是很活跃，不推荐用这个了；\u003c/p\u003e\\n\u003cp\u003e后来大家开始用 RabbitMQ，但是确实 erlang 语言阻止了大量的 Java 工程师去深入研究和掌控它，对公司而言，几乎处于不可控的状态，但是确实人家是开源的，比较稳定的支持，活跃度也高，可视化的管理界面比较友好；\u003c/p\u003e\\n\u003cp\u003e不过现在确实越来越多的公司，会去用 RocketMQ，确实很不错（阿里出品），它是纯Java开发，它高性能、满足可靠性、分布式事物、支持水平扩展、上亿级别的消息堆积、主从之间的切换等等。MQ的所有优点它基本都满足。但是它最大的缺点：商业版收费。但社区可能有突然黄掉的风险，对自己公司技术实力有绝对自信的，推荐用 RocketMQ，否则老老实实用 RabbitMQ 吧，毕竟RabbitMQ有活跃的开源社区，绝对不会黄。\u003c/p\u003e\\n\u003cp\u003e所以中小型公司，技术实力较为一般，技术挑战不是特别高，用 RabbitMQ 是不错的选择；大型公司，基础架构研发实力较强，用 RocketMQ 是很好的选择。\u003c/p\u003e\\n\u003cp\u003e如果是大数据领域的实时计算、日志采集等场景，用 Kafka 是业内标准的，绝对没问题，适合产生大量数据的互联网服务的数据收集业务等。社区活跃度很高，何况几乎是全世界这个领域的事实性规范。kafka，主要强调高性能，如果对业务需要可靠性消息的投递的时候。那么就不能够选择kafka了。\u003c/p\u003e\\n\u003ch4\u003e4、使用消息队列缺点：\u003c/h4\u003e\\n\u003cul\u003e\\n\u003cli\u003e系统可用性降低：系统引入的外部依赖越多，越容易挂掉，万一MQ挂了，整套系统崩溃了。\u003c/li\u003e\\n\u003cli\u003e系统复杂性提高：加MQ进来，怎么保证消息没有重复消费？怎么处理消息丢失的情况？怎么保证消息传递的顺序性？\u003c/li\u003e\\n\u003cli\u003e一致性问题：A系统处理完了直接返回成功了，后面的如果失败了，这数据就不一致了。\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003ch4\u003e一、RabbitMQ\u003c/h4\u003e\\n\u003ch4\u003e1、RabbitMQ概述\u003c/h4\u003e\\n\u003cp\u003e\u003ccode\u003eAMQP\u003c/code\u003e，即Advanced Message Queuing Protocol，一个提供统一消息服务的应用层\u003cstrong\u003e标准高级消息队列协议\u003c/strong\u003e，是应用层协议的一个开放标准，为面向消息的中间件设计。AMQP的主要特征是面向消息、队列、路由（包括点对点和发布/订阅）、可靠性、安全。\\nAMQP协议更多用在企业系统内，对数据一致性、稳定性和可靠性要求很高的场景，对性能和吞吐量的要求还在其次。\u003c/p\u003e\\n\u003cp\u003e\u003ccode\u003eRabbitMQ\u003c/code\u003e是实现了高级消息队列协议（AMQP）的开源消息代理软件（亦称面向消息的中间件）。RabbitMQ服务器是用Erlang语言编写的。\u003c/p\u003e\\n\u003cp\u003eRabbitMQ 是比较有代表性的，因为是\u003ccode\u003e基于主从（非分布式）做高可用性\u003c/code\u003e的。\u003c/p\u003e\\n\u003ch4\u003e2、RabbitMQ原理图\u003c/h4\u003e\\n\u003cp\u003eRabbitMQ通过\u003ccode\u003e信道\u003c/code\u003e的方式传输数据，将消息发布到交换机上，消息拥有一个路邮键，由消息创建时设定，通过队列路由键，可以把队列绑定到交换机上，消息到达交换机后，RabbitMQ将消息的路由键与队列的路由键进行匹配（不同的交换机有不同的路由规则），匹配到相应的队列，消息投递到队列的队列中供消费者消费。\u003c/p\u003e\\n\u003cblockquote\u003e\\n\u003cp\u003e多个消费者可以订阅同一个Queue，消息将以\u003ccode\u003e循环（round-robin）\u003c/code\u003e的方式发送给消费者，每条消息只会发给一个订阅的消费者，而不是每个消费者都收到所有的消息并处理。\u003c/p\u003e\\n\u003c/blockquote\u003e\\n\u003cblockquote\u003e\\n\u003cp\u003e每个Channel运行在独立的线程上，多个线程共享同一个socket。\u003c/p\u003e\\n\u003c/blockquote\u003e\\n\u003cp\u003e\u003cimg src=\\\"https://pic.rmb.bdstatic.com/bjh/beautify/dfde605794cc90a31ce1223c54218372.jpeg@c_1,w_901,h_315,x_0,y_0\\\" alt=\\\"\\\"\u003e\\n\u003cstrong\u003e相关概念：\u003c/strong\u003e\u003c/p\u003e\\n\u003cul\u003e\\n\u003cli\u003eConnectionFactory（连接管理器）：应用程序与Rabbit之间建立连接的管理器，程序代码中使用；\u003c/li\u003e\\n\u003cli\u003eBroker：简单来说就是消息队列服务器实体。\u003c/li\u003e\\n\u003cli\u003eChannel（信道）：消息推送使用的通道；\u003c/li\u003e\\n\u003cli\u003eExchange（交换器）：用于接受、分配消息；\u003c/li\u003e\\n\u003cli\u003eQueue（队列）：用于存储生产者的消息；\u003c/li\u003e\\n\u003cli\u003eRoutingKey（路由键）：用于把生成者的数据分配到交换器上；【最大255个字节】\u003c/li\u003e\\n\u003cli\u003eBindingKey（绑定键）：用于把交换器的消息绑定到队列上；【最大255个字节】\u003c/li\u003e\\n\u003cli\u003evhost（虚拟主机）每个Rabbit都能创建很多vhost，每个虚拟主机其实都是mini版的RabbitMQ，拥有自己的队列，交换器和绑定，拥有自己的权限机制。\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003ch4\u003e3、RabbitMQ常用的三种交换机\u003c/h4\u003e\\n\u003cp\u003e\u003cstrong\u003eRabbitMQ常用的三种Exchange\u003c/strong\u003e：fanout,direct,topic\u003c/p\u003e\\n\u003ch4\u003e（1）Direct Exchange ：\u003c/h4\u003e\\n\u003cp\u003e直连型交换机，根据消息携带的路由键将消息投递给对应队列。\\n　　大致流程，有一个队列绑定到一个直连交换机上，同时赋予一个路由键 routing key。　然后当一个消息携带着路由值为X，这个消息通过生产者发送给交换机时，交换机就会根据这个路由值X去寻找绑定值也是X的队列。\u003c/p\u003e\\n\u003ch4\u003e（2）Fanout Exchange：\u003c/h4\u003e\\n\u003cp\u003e扇型交换机，这个交换机没有路由键概念，就算你绑了路由键也是无视的。 这个交换机在接收到消息后，会直接转发到绑定到它上面的所有队列。\u003c/p\u003e\\n\u003ch4\u003e（3）Topic Exchange：\u003c/h4\u003e\\n\u003cp\u003e主题交换机，这个交换机其实跟直连交换机流程差不多，但是它的特点就是在它的路由键和绑定键之间是有规则的。\\n　　\\n\u003cstrong\u003e性能排序\u003c/strong\u003e：fanout \u0026gt; direct \u0026gt;\u0026gt; topic。\u003c/p\u003e\\n\u003ch4\u003e4、 RabbitMQ集群元数据\u003c/h4\u003e\\n\u003cp\u003eRabbitMQ集群会始终同步四种类型的内部元数据：\u003c/p\u003e\\n\u003cul\u003e\\n\u003cli\u003ea. 队列元数据：队列名称和它的属性\u003c/li\u003e\\n\u003cli\u003eb. 交换器元数据：交换器名称、类型和属性\u003c/li\u003e\\n\u003cli\u003ec. 绑定元数据：一张简单的表格展示了如何将消息路由到队列\u003c/li\u003e\\n\u003cli\u003ed. vhost元数据：为vhost内的队列、交换器和绑定提供命名空间和安全属性\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003ch4\u003e5、RabbitMQ镜像集群\u003c/h4\u003e\\n\u003cp\u003e\u003cstrong\u003eRabbitMQ 有三种模式\u003c/strong\u003e：单机模式、普通集群模式（无高可用性）、\u003ccode\u003e镜像集群模式\u003c/code\u003e（高可用性）。\u003c/p\u003e\\n\u003cp\u003e\u003ccode\u003e镜像队列\u003c/code\u003e将需要消费的队列变成镜像队列，存在于多个节点，实现RabbitMQ的高可用，保证 100% 数据不丢失。作用就是消息实体会主动在镜像节点之间实现同步，而不是像普通模式那样，在消费者消费数据时临时拉取，缺点就是集群内部的\u003ccode\u003e同步通讯\u003c/code\u003e会占去大量的网络带宽。\\n\u003cimg src=\\\"https://pic.rmb.bdstatic.com/bjh/beautify/53a92fdedade9355420e866bbdb51be1.jpeg@c_1,w_613,h_390,x_0,y_0\\\" alt=\\\"\\\"\u003e\u003c/p\u003e\\n\u003ch4\u003e二、RocketMQ\u003c/h4\u003e\\n\u003cp\u003e\u003ccode\u003eRocketMQ\u003c/code\u003e是阿里开源的消息中间件，目前也已经孵化为Apache顶级项目。用Java语言实现，在设计时参考了Kafka，并做出了自己的一些改进，消息可靠性上比Kafka更好。RocketMQ在阿里内部被广泛应用在订单，交易，充值，流计算，消息推送，日志流式处理，binglog分发等场景。\u003c/p\u003e\\n\u003cp\u003e\u003cstrong\u003eRocketMQ缺点：\u003c/strong\u003e\u003c/p\u003e\\n\u003cul\u003e\\n\u003cli\u003e单机支持1万以上持久化队列；\u003c/li\u003e\\n\u003cli\u003eRocketMQ的所有消息都是持久化的，先写入系统PAGECACHE，然后刷盘，可以保证内存与磁盘都有一份数据，而访问时，直接从内存读取。\u003c/li\u003e\\n\u003cli\u003e模型简单，接口易用（JMS的接口很多场合并不太实用）；\u003c/li\u003e\\n\u003cli\u003e性能非常好，可以允许大量堆积消息在Broker中；\u003c/li\u003e\\n\u003cli\u003e支持多种消费模式，包括集群消费、广播消费等；\u003c/li\u003e\\n\u003cli\u003e各个环节分布式扩展设计，支持主从和高可用；\u003c/li\u003e\\n\u003cli\u003e开发度较活跃，版本更新很快。\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003cp\u003e\u003cstrong\u003eRocketMQ缺点：\u003c/strong\u003e\u003c/p\u003e\\n\u003cul\u003e\\n\u003cli\u003e支持的 客户端语言不多，目前是Java及C++，其中C++还不成熟\u003c/li\u003e\\n\u003cli\u003e维护RocketMQ需要专业的团队\u003c/li\u003e\\n\u003cli\u003e商业版收费，有许多功能是不对外提供的。\u003c/li\u003e\\n\u003cli\u003e没有在MQ核心里实现JMS等接口\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003ch4\u003e三、kafka\u003c/h4\u003e\\n\u003ch4\u003e1、kafka概述\u003c/h4\u003e\\n\u003cp\u003e\u003ccode\u003ekafka\u003c/code\u003e是Linkedin于2010年12月份开源的\u003ccode\u003e消息发布订阅\u003c/code\u003e系统,它主要用于处理活跃的流式数据,大数据量的数据处理上。作为hadoop生态系统的一部分，被各种商业公司广泛应用。\u003c/p\u003e\\n\u003cp\u003e\u003cstrong\u003ekafka优点：\u003c/strong\u003e\u003c/p\u003e\\n\u003cul\u003e\\n\u003cli\u003e高吞吐量、低延迟：kafka每秒可以处理几十万条消息，它的延迟最低只有几毫秒\u003c/li\u003e\\n\u003cli\u003e可扩展性：kafka集群支持热扩展\u003c/li\u003e\\n\u003cli\u003e持久性、可靠性：消息被持久化到本地磁盘，并且支持数据备份防止数据丢失\u003c/li\u003e\\n\u003cli\u003e容错性：允许集群中节点失败（若副本数量为n,则允许n-1个节点失败）\u003c/li\u003e\\n\u003cli\u003e高并发：支持数千个客户端同时读写\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003cp\u003e\u003cstrong\u003ekafka缺点：\u003c/strong\u003e\u003c/p\u003e\\n\u003cul\u003e\\n\u003cli\u003e快速持久化：可以在O(1)的系统开销下进行消息持久化；\u003c/li\u003e\\n\u003cli\u003e高吞吐：在一台普通的服务器上既可以达到10W/s的吞吐速率；\u003c/li\u003e\\n\u003cli\u003e完全的分布式系统：Broker、Producer和Consumer都原生自动支持分布式，自动实现负载均衡；\u003c/li\u003e\\n\u003cli\u003e支持同步和异步复制两种高可用机制；\u003c/li\u003e\\n\u003cli\u003e支持数据批量发送和拉取；\u003c/li\u003e\\n\u003cli\u003e零拷贝技术(zero-copy)：减少IO操作步骤，提高系统吞吐量；\u003c/li\u003e\\n\u003cli\u003e数据迁移、扩容对用户透明；\u003c/li\u003e\\n\u003cli\u003e无需停机即可扩展机器；\u003c/li\u003e\\n\u003cli\u003e其他特性：丰富的消息拉取模型、高效订阅者水平扩展、实时的消息订阅、亿级的消息堆积能力、定期删除机制\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003ch4\u003e2、kafka原理图\u003c/h4\u003e\\n\u003cp\u003e\u003cimg src=\\\"https://pic.rmb.bdstatic.com/bjh/beautify/3d90e1705de49c669f22628af2f6004a.jpeg@c_1,w_1010,h_651,x_0,y_0\\\" alt=\\\"\\\"\u003e\\n\u003cimg src=\\\"https://pic.rmb.bdstatic.com/bjh/beautify/a5531d658050ce7abecb5ad4242d92ab.jpeg@c_1,w_1002,h_300,x_0,y_0\\\" alt=\\\"\\\"\u003e\u003c/p\u003e\\n\u003ch4\u003e四、总结\u003c/h4\u003e\\n\u003cp\u003e\u003cimg src=\\\"/images/blog/tech/middleware/img_20250723_04.png\\\" alt=\\\"img_20250723_04.png\\\" class=\\\"full-width\\\"\u003e\u003c/p\u003e\\n\"},{\"slug\":\"tech/business/电商分析必懂的指标体系\",\"title\":\"电商分析必懂的指标体系\",\"description\":\"今天，我就来讲讲电商到底该重点关注哪些指标，又该拿这些指标来进行怎么样的分析。 一般来说，在运营模块，需要重点关注的是新用户的引流和转化，以及老用户的活跃、留存、回购、流失。 简单来说，引流就是要吸引没买过我们的商品的人来买我们的商品。...\",\"pubDate\":\"2024-03-10\",\"tags\":[\"业务架构\",\"电商分析\"],\"content\":\"\u003cp\u003e\u003ca href=\\\"https://baijiahao.baidu.com/s?id=1767197729364093558\\\"\u003e转载\u003c/a\u003e\u003c/p\u003e\\n\u003cp\u003e今天，我就来讲讲电商到底该重点关注哪些指标，又该拿这些指标来进行怎么样的分析。\u003c/p\u003e\\n\u003cp\u003e一般来说，在运营模块，需要重点关注的是新用户的引流和转化，以及老用户的活跃、留存、回购、流失。\u003c/p\u003e\\n\u003cp\u003e\u003cimg src=\\\"/images/blog/tech/business/image_2_1.png\\\" alt=\\\"image_2_1.png\\\"\u003e\u003c/p\u003e\\n\u003ch2\u003e01 引流\u003c/h2\u003e\\n\u003cp\u003e简单来说，引流就是要吸引没买过我们的商品的人来买我们的商品。\u003c/p\u003e\\n\u003ch2\u003e1. 用户浏览量周分布\u003c/h2\u003e\\n\u003cp\u003e分析这个指标，主要是为了摸索出不同日期、不同时段的流量规律，并据此对企业服务及推广活动进行调整。\u003c/p\u003e\\n\u003cp\u003e对于互联网企业来说，流量数据往往都会呈工作周相关。对此，我们可以先宏观地统计出周一到周日中的总的平台流量柱状图数据对比情况。首先我们可以仔细观察工作日和非工作日的数据，发现周末的平台流量较工作日流量要高，这在互联网行业来说都是一个比较普遍的现象。\u003c/p\u003e\\n\u003cp\u003e\u003cimg src=\\\"/images/blog/tech/business/image_2_2.png\\\" alt=\\\"image_2_2.png\\\"\u003e\u003c/p\u003e\\n\u003cp\u003e掌握了用户流量的周分布规律之后，我们就大致有一个推广方向，周末休息时间用户群体较大，相较于工作日可以投入更多的和丰富有吸引力推广活动来进行新用户引流和老用户活跃。\u003c/p\u003e\\n\u003cp\u003e接着我们可以进行下一步思考，那工作日和周末我们的活动推广时间如何制定？\u003c/p\u003e\\n\u003cp\u003e有的同学们可能会觉得全天活动都可以，不需要关注具体的活动时间。但是对于互联网行业来说，每个时间段的推广费用都是较为昂贵的，我们完全可以分析出工作日和周末的用户流量趋势，进行有针对性的时间段投入推广，通过更小的成本获取到更多的用户流入。\u003c/p\u003e\\n\u003cp\u003e首先是工作日的时间段流量统计分布，我们通过FineBI工具分时间段作图得到如下所示的流量分布图。可以看出，工作日的流量主要集成在每日的9点（上班时间）、13点（午餐时间）、20点（晚间娱乐休息时间），那么在得到这样的一些用户流量规律之后，便可以在这些用户活跃高峰期时间段有针对性对白领群体多做一些相关商品推广活动，以实现最小时间成本和推广费用最大化用户引流效果。\u003c/p\u003e\\n\u003cp\u003e\u003cimg src=\\\"/images/blog/tech/business/image_2_3.png\\\" alt=\\\"image_2_3.png\\\"\u003e\u003c/p\u003e\\n\u003cp\u003e再来看周末的各时间段流量分布走势，和工作日所不同的是，周末的流量早高峰期延后到了10点，这可能和各位小伙伴们周日作息较晚有关（同学们周末都是几点起床呢），除此之外，晚上的流量高峰退潮期也有延后。针对与周末用户流量分布的特性，互联网企业在周末时可以将活动开始时间和活动结束时间都适当进行延后，这个时候不能再套用工作日制定好的活动时间计划了，因为符合用户群体作息规律的推广促销活动才能达到更好的效果。\u003c/p\u003e\\n\u003ch2\u003e2. 推广渠道流量分布\u003c/h2\u003e\\n\u003cp\u003e电商推广渠道主要有三种：线上渠道（谷歌、百度等），线下渠道（活动、会议等），新媒体营销（微信、小红书等）。\u003c/p\u003e\\n\u003cp\u003e通过对不同推广渠道的流量进行分析，我们可以清晰看出各个渠道对企业带来的价值占比差异，便于制定有针对性的营销策略。\\n\u003cimg src=\\\"/images/blog/tech/business/image_2_4.png\\\" alt=\\\"image_2_4.png\\\"\u003e\u003c/p\u003e\\n\u003cp\u003e如上图所示，由于推广渠道是分多层级的，我们通过FineBI工具的多层饼图进行数据的分析统计再合适不过了。分析下图的数据我们可以看出，首先是一级渠道的主要战斗力来自于新媒体营销，当今的微信、知乎等社交媒介社区时代受众广泛，用户群体非常庞大，是公司需要投入主要成本进行推广的。其次线上渠道的效果也不容忽视，对于互联网企业来说，做好百度、Google等SEO搜索引擎关键词推广也是很重要的一部分工作。相较于线上渠道和新媒体营销，线下渠道说所需要的经费和时间、人力成本较大，受众又相对较小，所以此类活动往往针对核心粉丝进行运营即可。\u003c/p\u003e\\n\u003cp\u003e\u003cimg src=\\\"/images/blog/tech/business/image_2_5.png\\\" alt=\\\"image_2_5.png\\\"\u003e\u003c/p\u003e\\n\u003ch2\u003e3. 访问深度用户群体分布\u003c/h2\u003e\\n\u003cp\u003e这里涉及到跳失率的概念，即顾客通过相应入口进入，只访问了一个页面就离开的访问次数占该页面总访问次数的比例。跳失率=跳出次数/访问次数。跳失率越低，用户的访问越有深度。\u003c/p\u003e\\n\u003cp\u003e\u003cimg src=\\\"/images/blog/tech/business/image_2_6.png\\\" alt=\\\"image_2_6.png\\\"\u003e\u003c/p\u003e\\n\u003cp\u003e如上图所示，我们通过BI工具将企业的VIP用户、老用户、新用户分别进行分时间段的用户群体访问深度分析统计。总体来说可以发现平台的VIP用户访问深度较老用户以及新用户稍微高些，但是不是太明显，说明平台运营的VIP这部分群体的活跃度还有待提升。\u003c/p\u003e\\n\u003cp\u003e同时，平台老用户访问深度和新用户更是相差无几，公司对于用户这方面的活跃运营明显需要加油了，建议将平台的部分忠诚度较高的老用户以VIP用户组建起来，共建平台生态圈，增加整体的用户活跃度。也可以向老用户以及VIP用户实施一些优惠政策，如定向商品折扣、根据用户画像进行喜好商品特惠推送等。\u003c/p\u003e\\n\u003ch2\u003e4. 核心指标对比走势\u003c/h2\u003e\\n\u003cp\u003e主要强调的是核心指标的动态变化。那什么是这里所提及的“核心指标”呢？\u003c/p\u003e\\n\u003cp\u003e不管是电商还是其他互联网行业，往往都需要关注如下指标：\u003c/p\u003e\\n\u003cul\u003e\\n\u003cli\u003e浏览量-PV;\u003c/li\u003e\\n\u003cli\u003e访问次数-Visits；\u003c/li\u003e\\n\u003cli\u003e访客数-UV；\u003c/li\u003e\\n\u003cli\u003e平均访问深度（总浏览量/访问次数），\u003c/li\u003e\\n\u003cli\u003e平均停留时间（总停留时间/总浏览量），\u003c/li\u003e\\n\u003cli\u003e跳失率（跳出次数/访问次数）。\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003cp\u003e其中，前面三个指标常常用来衡量流量数据的数量，后面三个指标则多用衡量流量指标的质量。通过对这些指标的动态分析，我们可以很好地评估某一时段推出的营销策略的效果。\u003c/p\u003e\\n\u003cp\u003e\u003cimg src=\\\"/images/blog/tech/business/image_2_7.png\\\" alt=\\\"image_2_7.png\\\"\u003e\u003c/p\u003e\\n\u003cp\u003e举个例子，我们仔细分析上图中的平台流量指标，可以发现10月份是2017全年的流量高峰期，应该跟企业在国庆黄金假期所做的促销引流活动有关。浏览量、跳失次数、访问次数分别为4941、1290、2182，对比计算可得到跳失率为59.12%，明显低于其他时间段的跳失率，说明10月份的活动效果还不错，其经验对以后的营销推广可以起到参考作用。\u003c/p\u003e\\n\u003ch2\u003e02 转化\u003c/h2\u003e\\n\u003cp\u003e在通过引流吸引到了新用户的目光之后，往往需要采取一系列的运营策略，实现用户的转化，也就是让用户搜索商品-浏览商品-下单商品-交易付款。在转化阶段，需要重点关注的指标有：下单转化率、事件转化率、服务转化率和退货率。\u003c/p\u003e\\n\u003ch2\u003e1. 下单转化率\u003c/h2\u003e\\n\u003cp\u003e对于平台经营方来说，我们希望一旦有用户流量进入平台网站，他们就能够顺利按照我们平台运营设定好的系列要求一步步进行下去，最终完成交易付款操作。那么对于互联网运营方来说，就需要做好用户在会员注册、商品收藏、购物车添加、交易付款等环节的转化操作。对于这样需要进行逐级转化的平台运营，我们首先可以通过漏斗图进行宏观的流程转化数据分析找出目前阶段最需要优化的运营环节，有效地进行针对性治理，最终提高整体平台用户下单转化率。\u003c/p\u003e\\n\u003cp\u003e\u003cimg src=\\\"/images/blog/tech/business/image_2_8.png\\\" alt=\\\"image_2_8.png\\\"\u003e\u003c/p\u003e\\n\u003cp\u003e以上面这个漏斗呈现的信息为例：\u003c/p\u003e\\n\u003cp\u003e首先看用户从浏览商品行为到添加购物车行为这一流程的转化情况，通过漏斗图可以快速看出其转化率为50.77%，反映出该平台的商品介绍、图片描述等对用户有较强的吸引力。\u003c/p\u003e\\n\u003cp\u003e接下来继续看添加购物车到下单的转化率，可以看出其转化率高达99.66%，非常不错。之后却看到单至付款的转化率仅50%，这是一个值得反思的转化节点，通过数据分析猜测该平台商铺支付渠道不完善，需要增加例如支付宝、微信等快捷支付渠道，降低平台因为没有提供用户习惯性的支付渠道而导致用户放弃购买行为的几率。\u003c/p\u003e\\n\u003ch2\u003e2、事件转化率\u003c/h2\u003e\\n\u003cp\u003e事件转化率通常指的是平台或商铺通过一系列的运营推广活动以及由于公共事件影响所带来的额外价值。这一指标对于平台运营评估和指导市场推广运营活动极为重要，例如网络营销总的SEO关键词投放、折扣促销活动、邮件营销等等效果跟踪。关于事件转化率方面的数据分析，通常我们可关注于营销渠道转化率、会员转化率、店铺流量转化率、下单转化率等指标进行活动的推广营销效果评估。\u003c/p\u003e\\n\u003cp\u003e利用BI工具，首先分析出各个营销推广渠道的转化率环形玫瑰分布图。可以看出目前平台的转化率最高的渠道主要是基础上线工作、SEO关键词推广、微信推广、品牌推广几个渠道。同时我们想联动查看每个渠道对应的转化率数据时，通过BI工具提供的数据自动联动过滤功能让用户无需任何设置即可进行所有相关联的数据联动。\u003c/p\u003e\\n\u003cp\u003e\u003cimg src=\\\"/images/blog/tech/business/image_2_9.png\\\" alt=\\\"image_2_9.png\\\"\u003e\u003c/p\u003e\\n\u003cp\u003e除了以上渠道营销策略之外，对于平台商铺而言，合适的关联性商品推荐也能够提高用户对关联商品的购买率，比如用户在购买完服装之后可以再给他推送鞋子一类商品。另外关于事件转化率方面，由于季节性以及公共事件也会影响商品的下单转化率，针对不同时期较流行的商品进行进货营销往往才能够达到最大的盈利目的。\u003c/p\u003e\\n\u003cp\u003e\u003cimg src=\\\"/images/blog/tech/business/image_2_10.png\\\" alt=\\\"image_2_10.png\\\"\u003e\u003c/p\u003e\\n\u003ch2\u003e3、服务转化率\u003c/h2\u003e\\n\u003cp\u003e服务转化率方面，通常用户在网上购买商品时，对于商品的一些细节品质以及发货渠道和速度等会需要做一些了解。那么良好的服务自然能够提高顾客的购买率，对于平台的客户人员，我们可以统计处其咨询到下单的节点转化率，并且以咨询到下单的转换率指标作为KPI指标之一来评价客服人员的工作绩效。\u003c/p\u003e\\n\u003cp\u003e如下图所示，通过BI工具进行客服咨询下单转化率条形图的数据分析统计可以发现，该平台的Blanche、Henry、Christian、汉克、贝蒂这五名客服的转化率比较优秀，并且都在10%以上，其他的客服员工的转化率则相对较低，故而这方面可以让转化率最为优秀的Blanche客服给其他客服做一次服务培训，整体上提升平台的服务水平，进而提升用户的下单转化率。\u003c/p\u003e\\n\u003cp\u003e\u003cimg src=\\\"/images/blog/tech/business/image_2_11.png\\\" alt=\\\"image_2_11.png\\\"\u003e\u003c/p\u003e\\n\u003ch2\u003e4、退货率\u003c/h2\u003e\\n\u003cp\u003e对于用户而言退货的原因通常可分为两大类，一类是由于买到的商品质量有问题而申请退货，另外一类可能是由于用户自身原因想申请退货。平台方往往更为需要关注第一类因为商品质量问题而申请退货的商品，通过历史商品的质量原因退货数据统计分析，对于确确实实是存在质量问题的商品需要及时反馈给供应商，质量过于严重的话可以考虑该类商品和供应商的协商库存退货。\u003c/p\u003e\\n\u003ch2\u003e03 留存\u003c/h2\u003e\\n\u003cp\u003e新用户转化成功，变成老用户之后，我们需要着重关注留存问题，简而言之就是关注怎么做才能留住客户的心。\u003c/p\u003e\\n\u003cp\u003e我们可以从宏观上来定义平台的留存用户：在互联网行业中，用户在某段时间内开始使用应用，经过一段时间后，仍然继续使用该应用的用户，被认作是留存用户。我们往往希望留存用户越多越好。\u003c/p\u003e\\n\u003cp\u003e一般来说，留存方面，需要关注如下指标：\u003c/p\u003e\\n\u003ch2\u003e1. 次日/7日/30日留存\u003c/h2\u003e\\n\u003cp\u003e即某天新增的用户中，在次日/7天后/30天后依然”活跃“（比如有浏览行为、收藏行为、购买行为等）的比例。\u003c/p\u003e\\n\u003cp\u003e不同时长的留存率分析可以折射出不同的问题。一般而言，分析次日留存率有利于抓住产品的品质变动和渠道优势；7日留存率可以体现出一个较为完整的周期后的用户去留情况；30日留存率可以反应产品或渠道迭代后的稳定性，协助判断演进方向的合理性。\u003c/p\u003e\\n\u003cp\u003e\u003cimg src=\\\"/images/blog/tech/business/image_2_12.png\\\" alt=\\\"image_2_12.png\\\"\u003e\u003c/p\u003e\\n\u003ch2\u003e2. 渠道留存\u003c/h2\u003e\\n\u003cp\u003e不同渠道的用户质量往往是不尽相同的。再考虑留存率的同时，对比留存渠道，可以进行更高质量的广告投放。\u003c/p\u003e\\n\u003cp\u003e\u003cimg src=\\\"/images/blog/tech/business/image_2_13.png\\\" alt=\\\"image_2_13.png\\\"\u003e\u003c/p\u003e\\n\"},{\"slug\":\"tech/business/权限系统方案设计\",\"title\":\"权限系统方案设计\",\"description\":\"日常工作中权限的问题时时刻刻伴随着我们，程序员新入职一家公司需要找人开通各种权限，比如网络连接的权限、编码下载提交的权限、监控平台登录的权限、运营平台查数据的权限等等。在很多时候我们会觉得这么多繁杂的申请给工作带来不便，并且如果突然想要查一些数据，发现没有申请过权限，需要再走审批流程，时间拉得会很长。那为什么还需要这么严格的权限管理呢？\",\"pubDate\":\"2024-03-08\",\"tags\":[\"业务架构\",\"技术专题\"],\"content\":\"\u003cp\u003e\u003ca href=\\\"https://blog.csdn.net/u010482601/article/details/104989532\\\"\u003e转载\u003c/a\u003e\u003c/p\u003e\\n\u003ch3\u003e1 为什么需要权限管理\u003c/h3\u003e\\n\u003cp\u003e日常工作中权限的问题时时刻刻伴随着我们，程序员新入职一家公司需要找人开通各种权限，比如网络连接的权限、编码下载提交的权限、监控平台登录的权限、运营平台查数据的权限等等。\u003c/p\u003e\\n\u003cp\u003e\u003cstrong\u003e在很多时候我们会觉得这么多繁杂的申请给工作带来不便，并且如果突然想要查一些数据，发现没有申请过权限，需要再走审批流程，时间拉得会很长。那为什么还需要这么严格的权限管理呢？\u003c/strong\u003e\u003c/p\u003e\\n\u003cp\u003e举个例子，一家支付公司有运营后台，运营后台可以查到所有的商户信息，法人代表信息，交易信息以及费率配置信息，如果我们把这些信息不加筛选都给到公司的每一个小伙伴，那么跑市场的都可以操作商家的费率信息，如果一个不小心把费率改了会造成巨大的损失。\u003c/p\u003e\\n\u003cp\u003e又比如商户的信息都是非常隐秘的，有些居心不良的小伙伴把这些信息拿出来卖给商家的竞争对手，会给商家造成严重的不良后果。虽然这么做都是个别人人为的过错，但是制度上如果本身这些信息不开放出来就能在很大程度上避免违法乱纪的事情发生了。\u003c/p\u003e\\n\u003cp\u003e总体来讲**权限管理是公司数据安全的重要保证，针对不同的岗位，不同的级别看到的数据是不一样的，操作数据的限制也是不一样的。**比如涉及到资金的信息只开放给财务的相关岗位，涉及到配置的信息只开放给运营的相关岗位，这样各司其职能避免很多不必要的安全问题。\u003c/p\u003e\\n\u003cblockquote\u003e\\n\u003cp\u003e如何让各个岗位的人在系统上各司其职，就是权限管理要解决的问题。\u003c/p\u003e\\n\u003c/blockquote\u003e\\n\u003ch3\u003e2 权限模型 \u003ca href=\\\"#2-quan-xian-mo-xing\\\" id=\\\"2-quan-xian-mo-xing\\\"\u003e\u003c/a\u003e\u003c/h3\u003e\\n\u003ch4\u003e\u003cstrong\u003e2.1 权限设计\u003c/strong\u003e \u003ca href=\\\"#21-quan-xian-she-ji\\\" id=\\\"21-quan-xian-she-ji\\\"\u003e\u003c/a\u003e\u003c/h4\u003e\\n\u003cp\u003e从业务分类上来讲权限可以分为数据查看权限，数据修改权限等，对应到系统设计中有页面权限、菜单权限、按钮权限等。菜单也分一级菜单、二级菜单甚至三级菜单，以csdn文章编辑页面左侧菜单栏为例是分了两级菜单。菜单对应的页面里又有很多按钮，我们在设计的时候最好把权限设计成树形结构，这样在申请权限的时候就可以一目了然的看到菜单的结构，需要哪些权限就非常的明了了。\u003c/p\u003e\\n\u003cp\u003e如下图所示：\u003c/p\u003e\\n\u003cp\u003e\u003cimg src=\\\"/images/blog/tech/business/image_1_0.png\\\" alt=\\\"image_1_0.png\\\"\u003e\u003c/p\u003e\\n\u003cp\u003e按照这个架构，按钮的父级是二级菜单，二级菜单的父级是一级菜单，这样用户申请权限的时候非常清晰的看到自己需要哪些权限。\u003c/p\u003e\\n\u003ch4\u003e\u003cstrong\u003e2.2 为什么需要角色\u003c/strong\u003e \u003ca href=\\\"#22-wei-shen-me-xu-yao-jiao-se\\\" id=\\\"22-wei-shen-me-xu-yao-jiao-se\\\"\u003e\u003c/a\u003e\u003c/h4\u003e\\n\u003cp\u003e权限结构梳理清晰之后，需要思考怎么把权限分配给用户，用户少的情况下，可以直接分配，一个用户可以有多个权限，统一一个权限可以被多个用户拥有，用户-权限的模型结构如下所示：\u003c/p\u003e\\n\u003cp\u003e\u003cimg src=\\\"/images/blog/tech/business/image_1_1.png\\\" alt=\\\"image_1_1.png\\\"\u003e\u003c/p\u003e\\n\u003cp\u003e这种模型能够满足权限的基本分配能力，但是随着用户数量的增长，这种模型的弊端就凸显出来了，每一个用户都需要去分配权限，非常的浪费管理员的时间和精力，并且用户和权限杂乱的对应关系会给后期带来巨大的维护成本。用户-权限对应关系图：\u003c/p\u003e\\n\u003cp\u003e\u003cimg src=\\\"/images/blog/tech/business/image_1_2.png\\\" alt=\\\"image_1_2.png\\\"\u003e\u003c/p\u003e\\n\u003cp\u003e这种对应关系在用户多的情况下基本无法维护了。其实很多用户负责同一个业务模块所需要的权限是一样的，这样的话我们是不是可以借助第三个媒介，把需要相同的权限都分配给这个媒介，然后用户和媒介关联起来，用户就拥有了媒介的权限了。这就是经典的RBAC模型，其中媒介就是我们通常所说的角色。\u003c/p\u003e\\n\u003ch4\u003e\u003cstrong\u003e2.3 权限模型的演进\u003c/strong\u003e \u003ca href=\\\"#23-quan-xian-mo-xing-de-yan-jin\\\" id=\\\"23-quan-xian-mo-xing-de-yan-jin\\\"\u003e\u003c/a\u003e\u003c/h4\u003e\\n\u003cp\u003e\u003cstrong\u003e2.3.1 RBAC模型\u003c/strong\u003e\u003c/p\u003e\\n\u003cp\u003e有了角色之后可以把权限分配给角色，需要相同权限的用户和角色对应起来就可以了，一个权限可以分配给多个角色，一个角色可以拥有多个权限，同样一个用户可以分配多个角色，一个角色也可以对应多个用户，对应模型如下所示：\u003c/p\u003e\\n\u003cp\u003e\u003cimg src=\\\"/images/blog/tech/business/image_1_3.png\\\" alt=\\\"image_1_3.png\\\"\u003e\u003c/p\u003e\\n\u003cp\u003e这就是经典的RBAC模型了（role-based-access-control），在这里面角色起到了桥梁左右，连接了用户和权限的关系，每个角色可以拥有多个权限，每个用户可以分配多个角色，这样用户就拥有了多个角色的多个权限。\u003c/p\u003e\\n\u003cp\u003e同时因为有角色作为媒介，大大降低了错综复杂的交互关系，比如一家有上万人的公司，角色可能只需要几百个就搞定了，因为很多用户需要的权限是一样的，分配一样的角色就可以了。这种模型的对应关系图如下所示：\u003c/p\u003e\\n\u003cp\u003e\u003cimg src=\\\"/images/blog/tech/business/image_1_4.png\\\" alt=\\\"image_1_4.png\\\"\u003e\u003c/p\u003e\\n\u003cp\u003e用户和角色，角色和权限都是多对多的关系，这种模型是最通用的权限管理模型，节省了很大的权限维护成本， 但是实际的业务千变万化，权限管理的模型也需要根据不同的业务模型适当的调整，比如一个公司内部的组织架构是分层级的，层级越高权限越大，因为层级高的人不仅要拥有自己下属拥有的权限，二期还要有一些额外的权限。\u003c/p\u003e\\n\u003cp\u003eRBAC模型可以给不同层级的人分配不同的角色，层级高的对应角色的权限就多，这样的处理方式可以解决问题，但是有没有更好的解决办法呢，答案肯定是有的，这就引出\u003cstrong\u003e角色继承的RBAC模型\u003c/strong\u003e。\u003c/p\u003e\\n\u003cp\u003e\u003cstrong\u003e2.3.2 角色继承的RBAC模型\u003c/strong\u003e\u003c/p\u003e\\n\u003cp\u003e角色继承的RBAC模型又称RBAC1模型。每个公司都有自己的组织架构，比如公司里管理财务的人员有财务总监、财务主管、出纳员等，财务主管需要拥有但不限于出纳员的权限，财务总监需要拥有但不限于财务主管的权限，像这种管理关系向下兼容的模式就需要用到角色继承的RBAC模型。\u003cstrong\u003e角色继承的RBAC模型的思路是上层角色继承下层角色的所有权限，并且可以额外拥有其他权限。\u003c/strong\u003e\u003c/p\u003e\\n\u003cp\u003e模型如下所示：\u003c/p\u003e\\n\u003cp\u003e\u003cimg src=\\\"/images/blog/tech/business/image_1_5.png\\\" alt=\\\"image_1_5.png\\\"\u003e\u003c/p\u003e\\n\u003cp\u003e从模型图中可以看出下级角色拥有的权限，上级角色都拥有，并且上级角色可以拥有其他的权限。角色的层级关系可以分为两种，一种是下级角色只能拥有一个上级角色，但是上级角色可以拥有多个下级角色，这种结构用图形表示是一个树形结构，如下图所示：\u003c/p\u003e\\n\u003cp\u003e\u003cimg src=\\\"/images/blog/tech/business/image_1_6.png\\\" alt=\\\"image_1_6.png\\\"\u003e\u003c/p\u003e\\n\u003cp\u003e还有一种关系是下级角色可以拥有多个上级角色，上级角色也可以拥有多个下级角色，这种结构用图形表示是一个有向无环图，如下图所示：\u003c/p\u003e\\n\u003cp\u003e\u003cimg src=\\\"/images/blog/tech/business/image_1_7.png\\\" alt=\\\"image_1_7.png\\\"\u003e\u003c/p\u003e\\n\u003cp\u003e树形图是我们比较常用的，因为一个用户一般情况下不会同时有多个直属上级，比如财务部只能有一个财务总监，但是可以有多个财务主管和收纳员。\u003c/p\u003e\\n\u003cp\u003e\u003cstrong\u003e2.3.3 带约束的RBAC模型\u003c/strong\u003e\u003c/p\u003e\\n\u003cp\u003e带约束的RBAC模型又成RBAC2模型。在实际工作中，为了安全的考虑会有很多约束条件，比如财务部里同一个人不能即是会计又是审核员，跟一个人同一时间不能即是运动员又是裁判员是一个道理的，又比如财务部的审核员不能超过2个，不能1个也没有。因为角色和权限是关联的，所以我们做好角色的约束就可以了。\u003c/p\u003e\\n\u003cblockquote\u003e\\n\u003cp\u003e常见的约束条件有：角色互斥、基数约束、先决条件约束等。\u003c/p\u003e\\n\u003c/blockquote\u003e\\n\u003cp\u003e\u003cstrong\u003e角色互斥：\u003c/strong\u003e 如果角色A和角色B是互斥关系的话，那么一个用户同一时间不能即拥有角色A，又拥有角色B，只能拥有其中的一个角色。\u003c/p\u003e\\n\u003cblockquote\u003e\\n\u003cp\u003e比如我们给一个用户赋予了会计的角色就不能同时再赋予审核员的角色，如果想拥有审核员的角色就必须先去掉会计的角色。假设提交角色和审核角色是互质的，我们可以用图形表示：\u003c/p\u003e\\n\u003c/blockquote\u003e\\n\u003cp\u003e\u003cimg src=\\\"/images/blog/tech/business/image_1_8.png\\\" alt=\\\"image_1_8.png\\\"\u003e\u003c/p\u003e\\n\u003cp\u003e\u003cstrong\u003e基数约束：\u003c/strong\u003e 同一个角色被分配的用户数量可以被限制，比如规定拥有超级管理员角色的用户有且只有1个；用户被分配的角色数量也需要被限制，角色被分配的权限数量也可以被限制。\u003c/p\u003e\\n\u003cp\u003e**先决条件约束：**用户想被赋予上级角色，首先需要拥有下级角色，比如技术负责人的角色和普通技术员工角色是上下级关系，那么用户想要用户技术负责人的角色就要先拥有普通技术员工的角色。\u003c/p\u003e\\n\u003ch4\u003e\u003cstrong\u003e2.4 用户划分\u003c/strong\u003e \u003ca href=\\\"#24-yong-hu-hua-fen\\\" id=\\\"24-yong-hu-hua-fen\\\"\u003e\u003c/a\u003e\u003c/h4\u003e\\n\u003cp\u003e\u003cstrong\u003e2.4.1 用户组\u003c/strong\u003e\u003c/p\u003e\\n\u003cp\u003e我们创建角色是为了解决用户数量大的情况下，用户分配权限繁琐以及用户-权限关系维护成本高的问题。抽象出一个角色，把需要一起操作的权限分配给这个角色，把角色赋予用户，用户就拥有了角色上的权限，这样避免了一个个的给用户分配权限，节省了大量的资源。\u003c/p\u003e\\n\u003cp\u003e同样的如果有一批用户需要相同的角色，我们也需要一个个的给用户分配角色，比如一个公司的客服部门有500多个人，有一天研发部研发了一套查询后台数据的产品，客服的小伙伴都需要使用，但是客服由于之前并没有统一的一个角色给到所有的客服小伙伴，这时候需要新加一个角色，把权限分配给该角色，然后再把角色一个个分配给客服人员，这时候会发现给500个用户一个个添加角色非常的麻烦。但是客服人员又有共同的属性，所以我们可以创建一个用户组，所有的客服人员都属于客服用户组，把角色分配给客服用户组，这个用户组下面的所有用户就拥有了需要的权限。\u003c/p\u003e\\n\u003cp\u003eRBAC模型添加用户组之后的模型图如下所示：\u003c/p\u003e\\n\u003cp\u003e\u003cimg src=\\\"/images/blog/tech/business/image_1_9.png\\\" alt=\\\"image_1_9.png\\\"\u003e\u003c/p\u003e\\n\u003cp\u003e很多朋友会问，用户组和角色有什么区别呢？简单的来说，\u003cstrong\u003e用户组是一群用户的组合，而角色是用户和权限之间的桥梁。\u003c/strong\u003e 用户组把相同属性的用户组合起来，比如同一个项目的开发、产品、测试可以是一个用户组，同一个部门的相同职位的员工可以是一个用户组， 一个用户组可以是一个职级，可以是一个部门，可以是一起做事情的来自不同岗位的人。\u003c/p\u003e\\n\u003cp\u003e用户可以分组，权限也可以分组，权限特别多的情况下，可以把一个模块的权限组合起来成为一个权限组，权限组也是解决权限和角色对应关系复杂的问题。\u003c/p\u003e\\n\u003cp\u003e比如我们定义权限的时候一级菜单、二级菜单、按钮都可以是权限，一个一级菜单下面有几十个二级菜单，每个二级菜单下面又有几十个按钮，这时候我们把权限一个个分配给角色也是非常麻烦的，可以采用分组的方法把权限分组，然后把分好的组赋予角色就可以了。\u003c/p\u003e\\n\u003cp\u003e给权限分组也是个技术活，需要理清楚权限之间的关系，比如支付的运营后台我们需要查各种信息，账务的数据、订单的数据、商户的数据等等，这些查询的数据并不在一个页面，每个页面也有很多按钮，我们可以把这几个页面以及按钮对应的权限组合成一个权限组赋予角色。加入权限组之后的RBAC模型如下所示：\u003c/p\u003e\\n\u003cp\u003e\u003cimg src=\\\"/images/blog/tech/business/image_1_10.png\\\" alt=\\\"image_1_10.png\\\"\u003e\u003c/p\u003e\\n\u003cp\u003e实际工作中我们很少给权限分组，给用户分组的场景会多一些，有的时候用户组也可以直接和权限关联，这个看实际的业务场景是否需要，权限模型没有统一的，业务越复杂业务模型会约多样化。\u003c/p\u003e\\n\u003cp\u003e\u003cstrong\u003e2.4.2 组织\u003c/strong\u003e\u003c/p\u003e\\n\u003cp\u003e每个公司都有自己的组织架构，很多时候权限的分配可以根据组织架构来划分。因为同一个组织内的小伙伴使用的大部分权限是一样的。如下所示一个公司的组织架构图：\u003c/p\u003e\\n\u003cp\u003e\u003cimg src=\\\"/images/blog/tech/business/image_1_11.png\\\" alt=\\\"image_1_11.png\\\"\u003e\u003c/p\u003e\\n\u003cp\u003e按照这个组织架构，每一个组织里的成员使用的基础权限很可能是一样的，比如人力资源都需要看到人才招聘的相关信息，市场推广都需要看到行业分析的相关信息，按照组织来分配角色会有很多优势：\u003c/p\u003e\\n\u003cp\u003e\u003cstrong\u003e实现权限分配的自动化：\u003c/strong\u003e 和组织关系打通之后，按照组织来分配角色，如果有新入职的用户，被划分在某个组织下面之后，会自动获取该组织下所有的权限，无需人工分配。又比如有用户调岗，只需要把组织关系调整就可以了，权限会跟着组织关系自动调整，也无需人工干预。这么做首先需要把权限和组织关系打通。\u003c/p\u003e\\n\u003cp\u003e\u003cstrong\u003e控制数据权限：\u003c/strong\u003e 把角色关联到组织，组织里的成员只能看到本组织下的数据，比如市场推广和大客定制，市场推广针对的是零散的客户，大可定制针对的是有一定体量的客户，相互的数据虽然在一个平台，但是只能看自己组织下的数据。\u003c/p\u003e\\n\u003cp\u003e加入组织之后的RBAC模型如下所示：\u003c/p\u003e\\n\u003cp\u003e\u003cimg src=\\\"/images/blog/tech/business/image_1_12.png\\\" alt=\\\"image_1_12.png\\\"\u003e\u003c/p\u003e\\n\u003cp\u003e用户可以在多个组织中，因为组织也有层级结构，一个组织里只可以有多个用户，所以用户和组织的关系是多对多的关系，组织和角色的关系是一对一的关系。这个在工作中可以根据实际情况来确定对应关系。\u003c/p\u003e\\n\u003cp\u003e\u003cstrong\u003e2.4.3 职位\u003c/strong\u003e\u003c/p\u003e\\n\u003cp\u003e一个组织下面会有很多职位，比如财务管理会有财务总监、财务主管、会计、出纳员等职位，每个职位需要的权限是不一样的，可以像组织那样根据职位来分配不同的角色，由于一个人的职位是固定的，所以用户跟职位的对应关系时一对一的关系，职位跟角色的对应关系可以是多对多的关系。加入职位的RBAC模型如下所示：\u003c/p\u003e\\n\u003cp\u003e\u003cimg src=\\\"/images/blog/tech/business/image_1_13.png\\\" alt=\\\"image_1_13.png\\\"\u003e\u003c/p\u003e\\n\u003ch4\u003e\u003cstrong\u003e2.5 理想的RBAC模型\u003c/strong\u003e \u003ca href=\\\"#25-li-xiang-de-rbac-mo-xing\\\" id=\\\"25-li-xiang-de-rbac-mo-xing\\\"\u003e\u003c/a\u003e\u003c/h4\u003e\\n\u003cp\u003eRBAC模型根据不同业务场景的需要会有很多种演变，实际工作中业务是非常复杂的，权限分配也是非常复杂的，想要做出通用且高效的模型很困难。我们把RBAC模型的演变汇总起来会是一个支撑大数据量以及复杂业务的理想的模型。把RBAC、RBAC1、RBAC2、用户组、组织、职位汇总起来的模型如下所示：\u003c/p\u003e\\n\u003cp\u003e\u003cimg src=\\\"/images/blog/tech/business/image_1_14.png\\\" alt=\\\"image_1_14.png\\\"\u003e\u003c/p\u003e\\n\u003cp\u003e按照这个模型基本上能够解决所有的权限问题，其中的对应关系可以根据实际的业务情况来确定，一般情况下，组织和职位是一对多的关系，特殊情况下可以有多对多的情况，需要根据实际情况来定。\u003c/p\u003e\\n\u003cp\u003e理想的RBAC模型并不是说我们一开始建权限模型就可以这么做，而是数据体量、业务复杂度达到一定程度之后可以使用这个模型来解决权限的问题，如果数据量特别少，比如刚成立的公司只有十几个人，那完全可以用用户-权限模型，都没有必要使用RBAC模型。\u003c/p\u003e\\n\u003ch3\u003e3 权限系统表设计 \u003ca href=\\\"#3-quan-xian-xi-tong-biao-she-ji\\\" id=\\\"3-quan-xian-xi-tong-biao-she-ji\\\"\u003e\u003c/a\u003e\u003c/h3\u003e\\n\u003ch4\u003e\u003cstrong\u003e3.1 标准RBAC模型表设计\u003c/strong\u003e \u003ca href=\\\"#31-biao-zhun-rbac-mo-xing-biao-she-ji\\\" id=\\\"31-biao-zhun-rbac-mo-xing-biao-she-ji\\\"\u003e\u003c/a\u003e\u003c/h4\u003e\\n\u003cp\u003e标准RBAC模型的表是比较简单了，要表示\u003ccode\u003e用户-角色-权限\u003c/code\u003e三者之前的关系，首先要创建用户表、角色表、权限表，用户和角色是多对多的关系，角色和权限是多对多的关系，需要再创建两章关系表，分别是用户-角色关系表和角色-权限关系表。这六张表的ER图如下所示：\u003c/p\u003e\\n\u003cp\u003e\u003cimg src=\\\"/images/blog/tech/business/image_1_15.png\\\" alt=\\\"image_1_15.png\\\"\u003e\u003c/p\u003e\\n\u003ch4\u003e\u003cstrong\u003e3.2 理想RBAC模型表设计\u003c/strong\u003e \u003ca href=\\\"#32-li-xiang-rbac-mo-xing-biao-she-ji\\\" id=\\\"32-li-xiang-rbac-mo-xing-biao-she-ji\\\"\u003e\u003c/a\u003e\u003c/h4\u003e\\n\u003cp\u003e理想的RBAC模型是标准RBAC模型经过多次扩展得到的，表结构也会比较复杂，因为要维护很多关系，如下图所示是理想的RBAC模型的ER图：\u003c/p\u003e\\n\u003cp\u003e\u003cimg src=\\\"/images/blog/tech/business/image_1_16.png\\\" alt=\\\"image_1_16.png\\\"\u003e\u003c/p\u003e\\n\u003cp\u003e这里面需要强调的是角色互斥表，互斥的关系可以放在角色上，也可以放在权限上，看实际工作的需求。\u003c/p\u003e\\n\u003ch3\u003e4 结语 \u003ca href=\\\"#4-jie-yu\\\" id=\\\"4-jie-yu\\\"\u003e\u003c/a\u003e\u003c/h3\u003e\\n\u003cp\u003e本文从易到难非常详细的介绍了权限模型的设计，在工作中需要根据实际情况来定义模型，千人以内的公司使用RBAC模型是完全够用的，没有必要吧权限模型设计的过于复杂。模型的选择要根据具体情况，比如公司体量、业务类型、人员数量等。总之最适合自己公司的模型就是最好的模型，权限模式和设计模式是一样的，都是为了更好的解决问题，不要为了使用模型而使用模型。\u003c/p\u003e\\n\"},{\"slug\":\"tech/business/到底啥叫懂业务？业务的三重视角\",\"title\":\"到底啥叫懂业务？业务的三重视角\",\"description\":\"数据分析的核心能力是为了能够让业务落地，而数据分析师常常容易出现“有分析，没结论”的问题。数据分析师要想得出能落地的分析结论，就需要明确地指向一些业务问题甚至优化方向。这篇文章详细解释了业务的概念和三角视角，推荐数据分析师们来阅读和学习。...\",\"pubDate\":\"2024-03-07\",\"tags\":[\"业务架构\",\"技术专题\"],\"content\":\"\u003ch1\u003e到底啥叫懂业务？业务的三重视角\u003c/h1\u003e\\n\u003cp\u003e**“有分析，没结论”**是数据分析师很容易出现的问题。\u003c/p\u003e\\n\u003cp\u003e数据分析汇报的时候，经常会出现这样的汇报内容：“活动整体的销售额是XX万，同比去年增长X%；用户数XX万，其中新增用户数XX万；转化率XX%……”吧啦吧啦说了一堆，但一般业务方并不买账。\u003c/p\u003e\\n\u003cp\u003e因为这些数据不用你汇报，你给个excel表是个人都会看，\u003cstrong\u003e看的还比你念得快\u003c/strong\u003e。\u003c/p\u003e\\n\u003cp\u003e\u003cstrong\u003e数据分析的核心能力是能够业务落地。\u003c/strong\u003e\u003c/p\u003e\\n\u003cp\u003e落地就是你的分析结论很明确地指向一些业务问题甚至指出优化方向，业务人员听了你的分析结论后很清楚自己要做什么。\u003c/p\u003e\\n\u003cp\u003e\u003cstrong\u003e要想得出能落地的分析结论，我们必须懂业务。\u003c/strong\u003e\u003c/p\u003e\\n\u003ch2\u003e一、到底什么叫业务\u003c/h2\u003e\\n\u003cp\u003e分析师要懂业务，但\u003cstrong\u003e什么是业务？\u003c/strong\u003e\u003c/p\u003e\\n\u003cp\u003e\u003cstrong\u003e关于业务的问题很多，以下哪些属于业务呢？\u003c/strong\u003e\u003c/p\u003e\\n\u003cul\u003e\\n\u003cli\u003e这个业务是做什么的？提供了什么产品和服务？\u003c/li\u003e\\n\u003cli\u003e这个业务怎么赚钱？收入和成本分别是什么？\u003c/li\u003e\\n\u003cli\u003e驱动这个业务的运转，需要做哪些事情？\u003c/li\u003e\\n\u003cli\u003e具体业务动作的执行操作步骤是什么？\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003cp\u003e上述这些问题有的很宏观，抽象到业务的盈利模式；有的很微观，具体到操作步骤。\u003cstrong\u003e虽然差别很大，但以上问题其实这些都是业务问题。\u003c/strong\u003e\u003c/p\u003e\\n\u003cp\u003e业务这个词在不同的人眼中含义是不一样的。\u003c/p\u003e\\n\u003cp\u003e\u003cstrong\u003e以打车APP为例：\u003c/strong\u003e\u003c/p\u003e\\n\u003cul\u003e\\n\u003cli\u003e在CEO眼中的业务，是撮合司机和用户的需求并从中抽取佣金的平台型业务。\u003c/li\u003e\\n\u003cli\u003e在用户端运营总监眼中的业务，是构建拉新用户策略、用户精细化运营方案。\u003c/li\u003e\\n\u003cli\u003e在用户运营专员眼中的业务，是渠道投放文案设计、优惠券金额设置、沉默用户召回短信发送。\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003cp\u003e可以看出，不同的人看业务的视角不同。但这不妨碍我们给业务下一个统一的定义。\u003c/p\u003e\\n\u003ch3\u003e1、业务到底是什么？\u003c/h3\u003e\\n\u003cp\u003e\u003cstrong\u003e业务是输入特定的资源，能够给出具有商家价值的确定性输出的经营单元。\u003c/strong\u003e\u003c/p\u003e\\n\u003cp\u003e\u003cimg src=\\\"https://p3-sign.toutiaoimg.com/tos-cn-i-tjoges91tu/TYNVslY6nnEoVm~noop.image?_iz=58558\u0026from=article.pc_detail\u0026x-expires=1688555642\u0026x-signature=%2BbKXk%2B5RsI996vzsFf2VF8cIpTc%3D\\\" alt=\\\"\\\"\u003e\u003c/p\u003e\\n\u003cp\u003e这个定义有几个核心的要素 ：\u003c/p\u003e\\n\u003cp\u003e可能还是不太好理解，我举几个例子：\u003c/p\u003e\\n\u003cp\u003e\u003cimg src=\\\"https://p3-sign.toutiaoimg.com/tos-cn-i-tjoges91tu/TYNVsn01wwDf6L~noop.image?_iz=58558\u0026from=article.pc_detail\u0026x-expires=1688555642\u0026x-signature=xGo3VhuDacVf8P7xAerV68OOW28%3D\\\" alt=\\\"\\\"\u003e\u003c/p\u003e\\n\u003cp\u003e比如\u003cstrong\u003e在CEO眼里\u003c/strong\u003e，\u003cstrong\u003e整个APP都是一个业务\u003c/strong\u003e。因为输入资金和人力，经过打车APP的经营，最终能够获得利润。\u003c/p\u003e\\n\u003cp\u003e在\u003cstrong\u003e用户端运营总监眼里，用户端的拉新、促活、召回都是业务\u003c/strong\u003e，因为拉新业务是输入资金和人力，输出新用户。促活是输入流量，输出更高活跃度的流量；召回是输入沉默用户，输出回流用户。\u003c/p\u003e\\n\u003cp\u003e在\u003cstrong\u003e用户运营转眼的眼里，编写召回短信是一个业务\u003c/strong\u003e，输入的是人力，输出的是短信的内容。\u003c/p\u003e\\n\u003cp\u003e这样似乎就清楚一点了，业务就是创造商业价值的一系列过程。\u003c/p\u003e\\n\u003cp\u003e接下去的问题是，不同的人观察的视角不同，那么这个\u003cstrong\u003e不同究竟差别在哪\u003c/strong\u003e？\u003c/p\u003e\\n\u003ch2\u003e二、业务的三重视角\u003c/h2\u003e\\n\u003cp\u003e\u003cstrong\u003e业务有三层视角，分别是高层的商业模式视角、中层的业务模型视角、基层的执行策略视角。\u003c/strong\u003e\u003c/p\u003e\\n\u003ch3\u003e1、高层视角：商业模式\u003c/h3\u003e\\n\u003cp\u003e\u003cstrong\u003e高层关心的问题是\u003c/strong\u003e：\u003c/p\u003e\\n\u003cul\u003e\\n\u003cli\u003e这个业务是做什么的，面向哪些群体提供什么样的产品和服务？\u003c/li\u003e\\n\u003cli\u003e为了提供这些产品和服务，需要哪些资源和合作伙伴？\u003c/li\u003e\\n\u003cli\u003e需要做哪些事，才能保证产品和服务的稳定供给。\u003c/li\u003e\\n\u003cli\u003e如何找到目标用户？\u003c/li\u003e\\n\u003cli\u003e如何赚钱？\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003cp\u003e\u003cstrong\u003e高层思考的这几件事，其实就是这个业务的商业模式\u003c/strong\u003e。商业模式的思考工具推荐商业模式画布。\u003c/p\u003e\\n\u003cp\u003e\u003cimg src=\\\"https://p3-sign.toutiaoimg.com/tos-cn-i-tjoges91tu/TYNVsnZ93IZI1x~noop.image?_iz=58558\u0026from=article.pc_detail\u0026x-expires=1688555642\u0026x-signature=OS5%2Bv4XVgnmHk5NxsSrpre%2FxJWw%3D\\\" alt=\\\"\\\"\u003e\u003c/p\u003e\\n\u003cp\u003e商业模式画布一共有9个维度，\u003cstrong\u003e其中最重要是中间的价值主张\u003c/strong\u003e，即你怎么样帮助别人，提供了什么样的价值。\u003c/p\u003e\\n\u003cp\u003e\u003cstrong\u003e画布左边是成本的部分\u003c/strong\u003e，为了带来这些价值需要的\u003cstrong\u003e资源、合作和工作内容\u003c/strong\u003e。\u003c/p\u003e\\n\u003cp\u003e\u003cstrong\u003e画布右边是收入的部分\u003c/strong\u003e，为了把这些价值带给客户，需要\u003cstrong\u003e什么样的用户\u003c/strong\u003e、\u003cstrong\u003e什么样的渠道\u003c/strong\u003e以及和用户保持一种\u003cstrong\u003e什么样的关系\u003c/strong\u003e。\u003c/p\u003e\\n\u003cp\u003e了解了商业模式画布，就能搞清楚高层视角下的业务究竟是什么样的。\u003c/p\u003e\\n\u003cp\u003e本篇内容作为“懂业务”的第一篇，主要用来说明各个模型的关系，\u003cstrong\u003e对商业模式画布的细节暂时不详细展开\u003c/strong\u003e，\u003cstrong\u003e欢迎关注，下一篇奉上详细说明。\u003c/strong\u003e\u003c/p\u003e\\n\u003cp\u003e想清楚商业模式之后，高层就基本上清楚需要重点运营哪些模块，然后会把一些工作安排给中层。比如保证产品和服务的供给、保证流量持续稳定增长、品牌营销等等。\u003c/p\u003e\\n\u003ch3\u003e2、中层视角：业务模型\u003c/h3\u003e\\n\u003cp\u003e\u003cstrong\u003e中层拿到高层安排的任务后，关心的问题是：\u003c/strong\u003e\u003c/p\u003e\\n\u003cul\u003e\\n\u003cli\u003e需要保障的问题有哪些环节？比如新流量的获取需要渠道投放、落地页承接、新用户注册等环节。\u003c/li\u003e\\n\u003cli\u003e上述环节应该如何保障？比如需要有专门的渠道专员负责定期投放。\u003c/li\u003e\\n\u003cli\u003e提高产品供给能力的核心因素是什么？比如提升新流量的核心因素是自传播能力。\u003c/li\u003e\\n\u003cli\u003e如何驱动和改善这个核心因素？比如提升自传播能力可以通过裂变奖励。\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003cp\u003e中层思考的这几件事，是为了\u003cstrong\u003e设计一个业务模型\u003c/strong\u003e。**业务模型是由工作流组成的。**比如营销转化漏斗模型就是一种业务模型：\u003c/p\u003e\\n\u003cp\u003e\u003cimg src=\\\"https://p3-sign.toutiaoimg.com/tos-cn-i-tjoges91tu/TYNVsoA4YH4121~noop.image?_iz=58558\u0026from=article.pc_detail\u0026x-expires=1688555642\u0026x-signature=xoI7DNVWuyjUe9aqkcP9SetjDaY%3D\\\" alt=\\\"\\\"\u003e\u003c/p\u003e\\n\u003cp\u003e再比如在线教育行业的教学流程也是一个业务流程，可以保证课程的正常开展：\u003c/p\u003e\\n\u003cp\u003e\u003cimg src=\\\"https://p3-sign.toutiaoimg.com/tos-cn-i-tjoges91tu/TYNVtZlDokN5qt~noop.image?_iz=58558\u0026from=article.pc_detail\u0026x-expires=1688555642\u0026x-signature=JiZ2VK2%2FWOC%2Bo5X63hTAdCxMVU0%3D\\\" alt=\\\"\\\"\u003e\u003c/p\u003e\\n\u003cp\u003e其他所有的能够给出确定性的有商业价值交付物的过程都可以成为业务模型，比如：\u003c/p\u003e\\n\u003cul\u003e\\n\u003cli\u003e采购管理，输入资金，输出货物；\u003c/li\u003e\\n\u003cli\u003e产品设计，输入人力，输出产品原型；\u003c/li\u003e\\n\u003cli\u003e品类运营，输入所有运营品类，输出运营效率更高的分层后的品类。\u003c/li\u003e\\n\u003cli\u003e……\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003cp\u003e中层思考清楚业务模型后，基本能搞清楚要找什么样的人才，组织一个什么样的团队，分别处理什么样的工作。\u003c/p\u003e\\n\u003cp\u003e然后\u003cstrong\u003e把具体的工作安排给基层员工\u003c/strong\u003e，比如具体的渠道投放、落地页设计、开展裂变活动等等执行动作。\u003c/p\u003e\\n\u003ch3\u003e3、基层视角：执行策略\u003c/h3\u003e\\n\u003cp\u003e基层拿到中层安排的具体任务，关心的问题是：\u003c/p\u003e\\n\u003cul\u003e\\n\u003cli\u003e渠道投放的操作流程是什么样的？\u003c/li\u003e\\n\u003cli\u003e什么样的渠道更好？什么样的文案转化率更高？什么时间投放更好？\u003c/li\u003e\\n\u003cli\u003e为了完成目标，本周需要完成多少工作量？\u003c/li\u003e\\n\u003cli\u003e操作SOP还有什么可以改进的地方？\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003cp\u003e基层的工作被中层下发的任务限定在某一个范围内，\u003cstrong\u003e一般就是纯执行岗位\u003c/strong\u003e。\u003cstrong\u003e稍微有点自由度的是交付的形式\u003c/strong\u003e，比如文案、图片、渠道的选择。\u003c/p\u003e\\n\u003cp\u003e基层有很多不同的业务模块，产品设计、用户运营、渠道运营、品类运营、店铺运营等等。\u003c/p\u003e\\n\u003cp\u003e\u003cstrong\u003e不同的工作五花八门，所以没有统一的模型。\u003c/strong\u003e\u003c/p\u003e\\n\u003cp\u003e比如就算是同样是营销岗，也有AIDMA、AISAS、fogg模型等不同的方法论模型；再比如产品设计的用户体验五要素、价值公式、MVP等。\u003c/p\u003e\\n\u003cp\u003e\u003cimg src=\\\"https://p3-sign.toutiaoimg.com/tos-cn-i-tjoges91tu/TYNVtaVCgdC8cn~noop.image?_iz=58558\u0026from=article.pc_detail\u0026x-expires=1688555642\u0026x-signature=uR3k0N%2BH1yJM48Bp2tvBceRAWnM%3D\\\" alt=\\\"\\\"\u003e\u003c/p\u003e\\n\u003cp\u003e\u003cstrong\u003e这部分牵扯到的模型比较杂，之后的文章再单独展开聊。\u003c/strong\u003e\u003c/p\u003e\\n\u003ch2\u003e三、小结\u003c/h2\u003e\\n\u003cp\u003e\u003cstrong\u003e业务这个概念一直含糊不清\u003c/strong\u003e，偏偏很多面试官又特别喜欢问你懂不懂业务，搞得很多人对这个问题一直很纠结。\u003c/p\u003e\\n\u003cp\u003e了解了这个业务的概念后（输入特定的资源给出具有商家价值的确定性输出的经营单元）这个概念之后，再问你懂不懂业务，就容易回答得多了。\u003c/p\u003e\\n\u003cp\u003e你可以回答，你懂的业务究竟是商业模式、业务模型还是具体的执行策略？\u003c/p\u003e\\n\"},{\"slug\":\"tech/business/业务三重视角——商业模式\",\"title\":\"业务三重视角——商业模式\",\"description\":\"对于企业和管理人员而言，商业模式与现实中组装机器的过程类似，组装好机器后，只需输入原材料，就可以在另一端的流水线上获得加工好的成品。那么我们该怎样理解一个业务的商业模式呢？本文详细解读了商业模式的概念，读了这篇文章，或许能给你带来启发。...\",\"pubDate\":\"2024-03-06\",\"tags\":[\"业务架构\",\"技术专题\"],\"content\":\"\u003cp\u003e在高层管理人员的眼中，所谓的“业务”是指商业模式。通过向这个商业模式投入资金并运作它，公司可以产生收入和利润。这与现实中组装机器的过程类似，组装好机器后，只需输入原材料，就可以在另一端的流水线上获得加工好的成品。\u003c/p\u003e\\n\u003cp\u003e因此，\u003cstrong\u003e高层管理人员的工作就是为公司打造这样一个商业模式机器。\u003c/strong\u003e\u003c/p\u003e\\n\u003cp\u003e今天，我们将对这个机器的运作逻辑进行拆解。\u003c/p\u003e\\n\u003cp\u003e一、商业模式画布\u003c/p\u003e\\n\u003cp\u003e让我们先来了解一下\u003cstrong\u003e商业模式的概念。\u003c/strong\u003e\u003c/p\u003e\\n\u003cp\u003e举个例子：虽然华为和小米都是手机厂商，但我们可以明显感受到它们之间存在一些差别。\u003c/p\u003e\\n\u003cul\u003e\\n\u003cli\u003e比如，华为手机更高端，技术含量更高，拍照技术更好，而小米手机则定位稍低，更具有性价比。\u003c/li\u003e\\n\u003cli\u003e此外，在盈利模式方面，华为手机在硬件上的利润更高，而小米手机则通过广告等方式获取利润。\u003c/li\u003e\\n\u003cli\u003e还有，在渠道方面，华为手机的线下门店和服务点更多，而小米手机则更侧重于网络销售渠道。\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003cp\u003e华为和小米的这些\u003cstrong\u003e不同之处实际上都源于两家公司的商业模式不同\u003c/strong\u003e。\u003c/p\u003e\\n\u003cp\u003e商业模式这个词听起来很虚，好在前人总结出了有一个很好用的工具：\u003cstrong\u003e商业模式画布。\u003c/strong\u003e\u003c/p\u003e\\n\u003cp\u003e\u003cstrong\u003e商业模式画布由9个构造块构成。分别是：价值主张、客户细分、渠道通路、客户关系、收入流、核心资源、关键业务、合作伙伴和成本结构。\u003c/strong\u003e\u003c/p\u003e\\n\u003cp\u003e\u003cimg src=\\\"https://p6.itc.cn/q_70/images03/20230403/4129f84961894ac68c8e487c846d74cd.png\\\" alt=\\\"\\\"\u003e\u003c/p\u003e\\n\u003cp\u003e要想看懂这个画布，可以\u003cstrong\u003e把画布拆成左右两个大的模块\u003c/strong\u003e：\u003c/p\u003e\\n\u003cp\u003e\u003cstrong\u003e左边是成本模块\u003c/strong\u003e，包括核心资源、关键业务、重要伙伴、成本结构。\u003c/p\u003e\\n\u003cp\u003e\u003cstrong\u003e右边是收入模块\u003c/strong\u003e，包括客户细分、渠道通路、客户关系、收入来源。\u003c/p\u003e\\n\u003cp\u003e中间的\u003cstrong\u003e价值主张同时在左边和右边的模块中\u003c/strong\u003e。\u003c/p\u003e\\n\u003cp\u003e首先看画布的\u003cstrong\u003e右边部分\u003c/strong\u003e，右边部分是\u003cstrong\u003e收入相关\u003c/strong\u003e的模块：\u003c/p\u003e\\n\u003cul\u003e\\n\u003cli\u003e\u003cstrong\u003e客户细分\u003c/strong\u003e：我能帮助谁？我的目标群体是哪些人？\u003c/li\u003e\\n\u003cli\u003e\u003cstrong\u003e价值主张\u003c/strong\u003e：我怎么样帮助他人？提供什么样的产品或服务给目标群体？\u003c/li\u003e\\n\u003cli\u003e\u003cstrong\u003e渠道通路\u003c/strong\u003e：怎样宣传自己的产品？怎么样向客户交付产品？\u003c/li\u003e\\n\u003cli\u003e\u003cstrong\u003e客户关系\u003c/strong\u003e：怎样和目标群体打交道？应该建立一种什么样的关系？\u003c/li\u003e\\n\u003cli\u003e\u003cstrong\u003e收入来源\u003c/strong\u003e：我怎么样从从价值主张中获得收入？收入的来源是什么？\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003cp\u003e再看画布的\u003cstrong\u003e左边部分\u003c/strong\u003e，左边部分是\u003cstrong\u003e成本相关\u003c/strong\u003e的模块：\u003c/p\u003e\\n\u003cul\u003e\\n\u003cli\u003e\u003cstrong\u003e价值主张\u003c/strong\u003e：根据收入模块确定要提供的产品\u003c/li\u003e\\n\u003cli\u003e\u003cstrong\u003e核心资源\u003c/strong\u003e：为了实现价值主张，我需要掌握哪些资源？\u003c/li\u003e\\n\u003cli\u003e\u003cstrong\u003e关键业务\u003c/strong\u003e：为了维持业务运转，我需要做哪些事？\u003c/li\u003e\\n\u003cli\u003e\u003cstrong\u003e重要伙伴\u003c/strong\u003e：谁可以帮我？\u003c/li\u003e\\n\u003cli\u003e\u003cstrong\u003e成本结构\u003c/strong\u003e：获取资源、维持业务、合作伙伴需要我付出什么成本？\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003cp\u003e如果搞清楚上面的9件事，那一个商业模式就基本搞清楚了。\u003c/p\u003e\\n\u003cp\u003e二、常见的商业模式\u003c/p\u003e\\n\u003cp\u003e如果每个公司都按照九个模块逐个梳理，那会比较耗时。\u003c/p\u003e\\n\u003cp\u003e虽然每家公司的商业模式都会有所不同，但是能够运作的商业模式并不会很多，而且一定会被其他公司复制，因此\u003cstrong\u003e不同公司的商业模式之间大体上还是有很多相似点的。\u003c/strong\u003e\u003c/p\u003e\\n\u003cp\u003e以互联网公司为例，市面上大体上有以下几种商业模式：\u003c/p\u003e\\n\u003col\u003e\\n\u003cli\u003e\u003cstrong\u003e流量广告\u003c/strong\u003e：例如抖音，对于C端用户是免费的，通过良好的产品体验吸引用户使用，形成用户流量。抖音将这些流量通过广告的形式卖给B端用户，用B端的收入抵消C端的成本。\u003c/li\u003e\\n\u003cli\u003e\u003cstrong\u003e平台抽佣\u003c/strong\u003e：例如美团外卖，作为一个外卖平台，有饭店、用户、外卖员等多种角色，通过撮合交易抽取佣金的模式赚取利润。\u003c/li\u003e\\n\u003cli\u003e\u003cstrong\u003e产供销模式\u003c/strong\u003e：这是很传统的一种模式，企业自己生成并销售，赚取产品的利润。例如在线教育，自己生成课程，在自己的平台上售卖，获得课程收入。自营电商也属于产供销模式。\u003c/li\u003e\\n\u003cli\u003e\u003cstrong\u003e免费增值模式\u003c/strong\u003e：现在大部分游戏都是这个模式。用户可以免费体验游戏内容，但要获得更好的游戏体验就需要购买增值服务。\u003c/li\u003e\\n\u003c/ol\u003e\\n\u003cp\u003e一家公司可能有几种商业模式的组合，例如美团既有平台抽佣的模式，同时也有自有的单车骑行产供销模式和流量广告模式。\u003c/p\u003e\\n\u003cp\u003e除此之外，还有人总结了9类商业模式，感兴趣的同学可以看看：\u003c/p\u003e\\n\u003cul\u003e\\n\u003cli\u003e代理模式 （Brokerage）\u003c/li\u003e\\n\u003cli\u003e广告模式 （Advertising）\u003c/li\u003e\\n\u003cli\u003e信息中介 （Infomediary）\u003c/li\u003e\\n\u003cli\u003e商户模式 （Merchant）\u003c/li\u003e\\n\u003cli\u003e厂家直销 （Direct Manufacturer）\u003c/li\u003e\\n\u003cli\u003e会员营销 （Affiliate）\u003c/li\u003e\\n\u003cli\u003e社区形式 （Community）\u003c/li\u003e\\n\u003cli\u003e订阅模式 （Subion）\u003c/li\u003e\\n\u003cli\u003e效用模式 （Untility）\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003cp\u003e三、为什么要懂商业模式\u003c/p\u003e\\n\u003cp\u003e商业模式不仅仅是高层需要关心的概念，\u003cstrong\u003e解读商业模式的能力对于我们大部分人都是必须的。\u003c/strong\u003e\u003c/p\u003e\\n\u003cp\u003e在日常工作中，解读商业模式可以应用于以下场景：\u003c/p\u003e\\n\u003cp\u003e1. 指标体系建设\u003c/p\u003e\\n\u003cp\u003e首先是指标体系的建设，这是数据分析师的基础工作。\u003c/p\u003e\\n\u003cp\u003e不了解商业模式画布之前，制定指标体系建设会出现遗漏和重复的情况。了解了画布之后，可以更好地理解公司的业务和盈利模式，从而更好地了解公司的运营和发展方向。\u003c/p\u003e\\n\u003cp\u003e比如商业模式是流量广告模式，那么核心指标就是：收入=广告流量*转化率*单次点击价格\u003c/p\u003e\\n\u003cp\u003e其中的指标又可以继续拆解：广告流量=流量*广告展示率\u003c/p\u003e\\n\u003cp\u003e如果是抽佣模式，那么业务的核心指标就是：收入=GMV*抽佣率\u003c/p\u003e\\n\u003cp\u003e其中GMV可以拆解成：GMV=流量*转化率*客单价\u003c/p\u003e\\n\u003cp\u003e了解了商业模式基本上数据指标体系就不容易跑偏了。\u003c/p\u003e\\n\u003cp\u003e2. 汇报能力提升\u003c/p\u003e\\n\u003cp\u003e向什么样的人汇报，就得知道他关心的是什么。\u003c/p\u003e\\n\u003cp\u003e我们平时汇报的时候很容易就变成单纯地报数据：GMV1000万，环比增长10%。这样的汇报高层get不到什么信息。\u003c/p\u003e\\n\u003cp\u003e如果学习了商业模式画布，\u003cstrong\u003e就能和高层一样站在商业模式的视角俯瞰整个业务。\u003c/strong\u003e\u003c/p\u003e\\n\u003cp\u003e汇报人员可以将复杂的业务流程和商业模式进行简化和梳理，将关键要素和价值链等内容更加清晰地展示出来，从而使得领导和同事更容易理解和接受。\u003c/p\u003e\\n\u003cp\u003e比如将各种繁杂的信息按照9个模块的视角切入，比如：\u003c/p\u003e\\n\u003cul\u003e\\n\u003cli\u003e\u003cstrong\u003e客户细分\u003c/strong\u003e：根据用户分层发现，新价格策略导致低购买力用户流失。\u003c/li\u003e\\n\u003cli\u003e\u003cstrong\u003e关键业务\u003c/strong\u003e：商品供给连续下滑，现有供给保障不能满足需求。\u003c/li\u003e\\n\u003cli\u003e\u003cstrong\u003e渠道通路\u003c/strong\u003e：新渠道试点进展良好，建议扩大运营规模。\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003cp\u003e高层的工作就是不断优化商业模式，所以这样的表述很容易让高层理解。\u003c/p\u003e\\n\u003cp\u003e3. 职业机会选择\u003c/p\u003e\\n\u003cp\u003e\u003cstrong\u003e商业模式是一家公司能否活得好的决定性因素\u003c/strong\u003e，即使产品、服务和营销再好，\u003cstrong\u003e如果商业模式过时了，也难以长期生存。\u003c/strong\u003e\u003c/p\u003e\\n\u003cp\u003e柯达相机、诺基亚手机等曾经的行业巨头，因为价值主张不再有吸引力而最终衰落。希尔斯百货则因为未能及时调整应对线上购物冲击而破产。\u003c/p\u003e\\n\u003cp\u003e诺基亚的CEO曾说，**“我们没有做错什么，但是我们输了。”**这话很能说明商业模式的作用，即在落伍的商业模式下，再好的产品和服务也不会改变公司的命运。\u003c/p\u003e\\n\u003cp\u003e**这对我们的职业选择有很大的参考意义。**我们可以选择行业和公司，找到更好的商业模式，让职业生涯更加稳健。\u003c/p\u003e\\n\u003cp\u003e例如，15年左右P2P行业非常火热，一些通过互联网进行金融放贷的创业公司给出的工资也很高，业绩也在快速增长。**但是，这些公司都缺乏核心资源，仅仅是通过买流量赚取利差，这种模式不可能持续。**因此，很多P2P公司消失了，只有一些手握大流量的公司和这类金融业务幸存。这样的结局早已可预见，我们应该从中吸取教训。\u003c/p\u003e\\n\u003cp\u003e近年来，AI非常火爆，未来会出现一堆AI创业公司。然而，我们可以预测，\u003cstrong\u003e以技术为价值主张的创业公司可能存在风险\u003c/strong\u003e，\u003cstrong\u003e而以垂直领域体验为价值主张的创业公司可能会有机会。\u003c/strong\u003e\u003c/p\u003e\\n\u003cp\u003e因为以技术为价值主张的团队必然需要人才资源，除了明星创业团队，其他初创团队很难汇集到最优秀的人才资源。即使某项技术领先业界，很快会被大公司利用人才优势追平，再用体量优势获得优势。\u003c/p\u003e\\n\u003cp\u003e相反，以垂直领域体验为价值主张的团队需要对垂直细分领域做AI优化，这类市场一般大公司看不上，或者没有人力攻坚那么多垂直领域，因此创业公司反而有机会。\u003c/p\u003e\\n\u003cp\u003e4. 个人价值发展\u003c/p\u003e\\n\u003cp\u003e商业模式并不仅适用于商业公司，\u003cstrong\u003e我们也可以将其应用到自己身上。\u003c/strong\u003e\u003c/p\u003e\\n\u003cp\u003e**当我们向企业出售我们的劳动力时，我们可以把自己看作一家公司。**通过应用商业模式画布，我们可以分析自己的优势、劣势、机会和威胁等因素，从而制定更有效的职业发展策略。\u003c/p\u003e\\n\u003cp\u003e在商业模式画布的“价值主张”板块中，我们可以\u003cstrong\u003e思考自己的专业技能和经验，并考虑如何将这些特点与市场需求结合起来，以获得更好的职业机会和发展空间。\u003c/strong\u003e\u003c/p\u003e\\n\u003cp\u003e例如，在七八年前我准备转行数据分析时，虽然当时还不知道商业模式画布，但我基本上是用了这个方法。我找出自己目前手头拥有的核心资源、可能的合作伙伴以及未来需求较大的目标岗位，最终确定了走数据分析的方向，这算是一次比较成功的尝试。\u003c/p\u003e\\n\u003cp\u003e此外，我们也可以应用商业模式画布来梳理现有工作。我们可以找出自己岗位服务的目标群体，需要提供什么样的交付物，以及为了提供这些交付物需要哪些资源和要做哪些事情等等。通过这种方法，我们可以更好地了解自己在组织中的角色和价值，从而更好地开展工作并提升职业成长。\u003c/p\u003e\\n\u003cp\u003e四、小结\u003c/p\u003e\\n\u003cp\u003e商业模式听起来是高层谈论的假大空，但其实和我们每个人都有关系。它可以提升我们的人生决策能力和专业性，是非常有用的知识。\u003c/p\u003e\\n\u003cp\u003e中层管理看业务，思考的是业务模型。\u003cstrong\u003e业务模型和商业模式画布其实是一脉相承的，中层的业务模型实际上就是商业模式画布中的关键业务。\u003c/strong\u003e\u003c/p\u003e\\n\u003cp\u003e是不是对商业管理的概念更加清晰了一些？\u003c/p\u003e\\n\"},{\"slug\":\"tech/business/业务三重视角——业务模型\",\"title\":\"业务三重视角——业务模型\",\"description\":\"日常我们需要做一些事情来保证商业模式的正常运转，而关键业务就是商业模式中的一个重要模块。今天这篇文章将讨论业务模型，帮助你更好了解到企业的战略和战术，从而有助于制定指标体系、寻找业务机会以及提高工作价值。...\",\"pubDate\":\"2024-03-05\",\"tags\":[\"业务架构\",\"技术专题\"],\"content\":\"\u003cp\u003e接业务知识的上一篇文章：商业模式。\u003c/p\u003e\\n\u003cp\u003e在上一篇文章中我们介绍了\u003cstrong\u003e商业模式画布的九个模块\u003c/strong\u003e。\u003c/p\u003e\\n\u003cp\u003e商业模式画布是商业运作的\u003cstrong\u003e战略\u003c/strong\u003e模型，它确定了整个商业的大方向。\u003c/p\u003e\\n\u003cp\u003e除了战略层面，\u003cstrong\u003e为了使商业模式能够顺利运转，还需要战术层面的配合\u003c/strong\u003e。关键业务就是商业模式中的一个重要模块，它包括我们日常需要做的一些事情来保证商业模式的正常运转。\u003c/p\u003e\\n\u003cp\u003e关键业务通常由中层管理人员负责，他们会对这些工作进行梳理，并建立起业务模型。\u003c/p\u003e\\n\u003cp\u003e今天，我们将讨论\u003cstrong\u003e业务模型。\u003c/strong\u003e\u003c/p\u003e\\n\u003ch2\u003e01 关键业务的类型\u003c/h2\u003e\\n\u003cp\u003e商业模式画布中的关键业务可以分为生产、销售、交付以及其他配套的基础工具和系统。下面分别介绍这些业务类型：\u003c/p\u003e\\n\u003cul\u003e\\n\u003cli\u003e\u003cstrong\u003e生产制造业务\u003c/strong\u003e：涉及到产品设计、原材料采购、生产制造、品质控制等方面，是制造企业的核心业务。例如，知识付费类的业务需要进行课程生产。\u003c/li\u003e\\n\u003cli\u003e\u003cstrong\u003e销售渠道业务\u003c/strong\u003e：涉及到产品销售、渠道管理、售后服务等方面。\u003c/li\u003e\\n\u003cli\u003e\u003cstrong\u003e产品交付业务\u003c/strong\u003e：涉及到订单管理、产品服务、服务履约等方面。\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003cp\u003e除此之外，围绕着这三大种业务类型还会有配套的基础工具和系统，例如运营（人力、财务等）、研发、平台建设等，用以提高效率和提升业务水平。比如：\u003c/p\u003e\\n\u003cul\u003e\\n\u003cli\u003e**平台技术业务：**涉及到平台建设、技术开发、数据管理等方面，是互联网企业的核心业务。\u003c/li\u003e\\n\u003cli\u003e**运营管理业务：**涉及到人力资源、财务管理、法务合规等方面，是企业运营管理的核心业务。\u003c/li\u003e\\n\u003cli\u003e**研究开发业务：**涉及到技术研发、创新设计等方面，是科技型企业的核心业务。\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003cp\u003e这些业务类型是商业模式画布中常见的关键业务类型，不同的企业根据自身特点和行业属性，可能会存在不同的关键业务类型。\u003c/p\u003e\\n\u003ch2\u003e02 业务模型\u003c/h2\u003e\\n\u003cp\u003e一般来说业务模型是一个SOP，SOP（Standard Operation Procedure）是标准作业程序的简称。\u003c/p\u003e\\n\u003cp\u003e\u003cstrong\u003eSOP有三个关键要素。\u003c/strong\u003e\u003c/p\u003e\\n\u003cp\u003e首先是\u003cstrong\u003e标准\u003c/strong\u003e，这就像一把衡量工作成果的尺子，告诉我们是达标还是不达标。每个人对事物的认知能力都是不同的，如果没有一个明确的标准，就会导致沟通不畅，影响工作效率。在一个公司中，员工是执行者，如果每个员工按照自己的标准来解决问题，客户的需求将无法得到满足，不利于公司管理。因此，制定SOP的第一个要素是明确的标准，这有助于规范员工行为，提高执行效率。\u003c/p\u003e\\n\u003cp\u003e其次是\u003cstrong\u003e流程\u003c/strong\u003e，这个过程从零到一，每一步都重要，顺序不可逆。如果流程出现偏差，即使销售人员的能力再强，也会影响到最终的结果。例如，建立信任是非常重要的一步，不应该在还不熟悉客户的情况下贸然报价。因此，制定SOP的第二个要素是流程，必须对每个步骤进行细化和量化，制定出标准，以便在推进业务进程时提高效率。\u003c/p\u003e\\n\u003cp\u003e第三个要素是\u003cstrong\u003e可操作性\u003c/strong\u003e，标准和流程必须在可操作的基础上进行。制定SOP的初衷是为了规范员工日常工作，提高工作效率，因此，SOP必须简单直观，任何员工都可以看懂且快速上手。SOP制定不应该过于复杂庞大，而应该以清晰为主，即使是新员工也可以凭借SOP对流程了解七八分，这才是成功的SOP。\u003c/p\u003e\\n\u003cp\u003eSOP就像是机器运行的规则，而一家公司的运转依赖于许多不同的SOP组合，以确保公司的正常运转。\u003c/p\u003e\\n\u003ch2\u003e03 常见的业务模型\u003c/h2\u003e\\n\u003ch3\u003e1、生产\u003c/h3\u003e\\n\u003cp\u003e一个企业的产品和服务需要生产，需要一个稳定的生产流程确保有稳定的产品或服务质量。\u003c/p\u003e\\n\u003cp\u003e以知识付费课程的生产为例，一般的\u003cstrong\u003e课程生产SOP大致如下：\u003c/strong\u003e\u003c/p\u003e\\n\u003col\u003e\\n\u003cli\u003e明确课程目标和范围。\u003c/li\u003e\\n\u003cli\u003e制定教学大纲和教学计划。\u003c/li\u003e\\n\u003cli\u003e编写教材和课件。\u003c/li\u003e\\n\u003cli\u003e录制课程视频。\u003c/li\u003e\\n\u003cli\u003e制作课程配套材料。\u003c/li\u003e\\n\u003cli\u003e进行内部审核和修改。\u003c/li\u003e\\n\u003cli\u003e进行试教和修改。\u003c/li\u003e\\n\u003cli\u003e上线发布和推广。\u003c/li\u003e\\n\u003cli\u003e进行售后服务和维护。\u003c/li\u003e\\n\u003cli\u003e进行课程评估和改进。\u003c/li\u003e\\n\u003c/ol\u003e\\n\u003cp\u003e课程的制作是一个相对具有创造性的工作，但实际上仍需要遵循严格的流程管理。据说，像好莱坞电影这样的具有创意性的企业，在制作电影时也会按照严格的流水线制作方式来确保电影质量。\u003c/p\u003e\\n\u003ch3\u003e2、销售\u003c/h3\u003e\\n\u003cp\u003e企业的盈利离不开销售，销售的类型很多，有分销、直销、线上销售、线下零售、代理商渠道等等。\u003c/p\u003e\\n\u003cp\u003e不同的销售类型对应的销售流程也不一样。\u003c/p\u003e\\n\u003cp\u003e我们还是知识付费产品为例，\u003cstrong\u003e分销渠道的SOP大致如下\u003c/strong\u003e：\u003c/p\u003e\\n\u003col\u003e\\n\u003cli\u003e明确分销渠道的目标和范围。\u003c/li\u003e\\n\u003cli\u003e寻找合适的分销渠道伙伴。\u003c/li\u003e\\n\u003cli\u003e确定分销合作方式和细则。\u003c/li\u003e\\n\u003cli\u003e提供产品及相关资料。\u003c/li\u003e\\n\u003cli\u003e培训分销渠道伙伴。\u003c/li\u003e\\n\u003cli\u003e跟进分销渠道伙伴的销售情况。\u003c/li\u003e\\n\u003cli\u003e分成结算和售后服务。\u003c/li\u003e\\n\u003cli\u003e评估分销渠道伙伴的表现。\u003c/li\u003e\\n\u003c/ol\u003e\\n\u003ch3\u003e3、交付\u003c/h3\u003e\\n\u003cp\u003e交付是指销售之后，如何把产品交给用户。比如电商下单后，需要通过快递公司快递包裹给用户。销售不是购买力促恒的结束，交付才是一个购买流程的完结。\u003c/p\u003e\\n\u003cp\u003e知识付费产品的\u003cstrong\u003e交付SOP\u003c/strong\u003e大致如下：\u003c/p\u003e\\n\u003col\u003e\\n\u003cli\u003e确认用户的支付信息。\u003c/li\u003e\\n\u003cli\u003e验证用户的身份信息。\u003c/li\u003e\\n\u003cli\u003e生成课程访问链接。\u003c/li\u003e\\n\u003cli\u003e提供课程资料及学习指导。\u003c/li\u003e\\n\u003cli\u003e确认课程交付。\u003c/li\u003e\\n\u003cli\u003e处理退款及退课请求。\u003c/li\u003e\\n\u003cli\u003e记录用户反馈和课程效果。\u003c/li\u003e\\n\u003c/ol\u003e\\n\u003ch3\u003e4、其他辅助业务\u003c/h3\u003e\\n\u003cp\u003e生产、销售、交付是最为基础并且关键的业务，没有这些业务的支持，企业将无法正常运转。这些流程的顺畅与否直接影响到企业的经济效益和发展。\u003c/p\u003e\\n\u003cp\u003e除了以上业务，还有其他一些业务是\u003cstrong\u003e以上业务的辅助，分别是基础业务和效率提升业务。\u003c/strong\u003e\u003c/p\u003e\\n\u003cp\u003e基础业务是支撑整个流程的基础，如人力资源、财务、行政等。没有这些基础业务，企业的其他业务根本无法开展。\u003c/p\u003e\\n\u003cp\u003e另外，为了提高流程的效率，企业需要采取一些措施，如平台建设、数据分析等。比如建设中台，它可以为企业提供更高效的信息共享平台，提升其他业务的工作效率，提高企业的整体竞争力。\u003c/p\u003e\\n\u003cp\u003e因此，企业必须注意对基础流程和基础业务的管理和提升，才能更好地发展。\u003c/p\u003e\\n\u003ch2\u003e04 小结\u003c/h2\u003e\\n\u003cp\u003e\u003cstrong\u003e商业模式画布是商业运营的战略，而关键业务则是商业运营的战术。\u003c/strong\u003e\u003c/p\u003e\\n\u003cp\u003e许多从事职场工作的人，往往被琐碎的日常工作所束缚，只关注于自己所做的事情，而缺乏对整个业务的全貌认知。虽然他们知道产品的意义、运营的作用以及技术的功能，但是缺乏将这些知识融合起来的能力。\u003c/p\u003e\\n\u003cp\u003e通过最近一些业务知识的学习，我们可以了解到企业的战略和战术，从而有助于我们\u003cstrong\u003e制定指标体系、寻找业务机会以及提高工作价值\u003c/strong\u003e。\u003c/p\u003e\\n\"},{\"slug\":\"tech/business/关于业务平台架构的思考\",\"title\":\"关于业务平台架构的思考\",\"description\":\"1. 职业上的事务，统称为「业务」——辞海 2. “业务”更白话一些来说，就是各行业中需要处理的事务，但通常偏向指销售的事务，因为任何公司单位最终仍然是以销售产品、销售服务、销售技术等等为主。“业务”最终的目的是“售出产品，换取利润”。——百度 3. anything that relates to...\",\"pubDate\":\"2024-03-04\",\"tags\":[\"业务架构\"],\"content\":\"\u003ch3\u003e从我们最熟悉的说起——业务是什么？\u003c/h3\u003e\\n\u003col\u003e\\n\u003cli\u003e职业上的事务，统称为「业务」——辞海\u003c/li\u003e\\n\u003cli\u003e“业务”更白话一些来说，就是各行业中需要处理的事务，但通常偏向指销售的事务，因为任何公司单位最终仍然是以销售产品、销售服务、销售技术等等为主。“业务”最终的目的是“售出产品，换取利润”。——百度\u003c/li\u003e\\n\u003cli\u003eanything that relates to organizing the exchange of goods and services by a business, a governmental institution, or an agency”. ——OpenGroup Togaf—business architecture\u003c/li\u003e\\n\u003c/ol\u003e\\n\u003cp\u003e\u003cstrong\u003e业务的定义\u003c/strong\u003e\u003c/p\u003e\\n\u003cp\u003e业务：企业接受客户订购，并将商品或服务交付给客户的一系列活动的总和，称之为一个业务。\u003c/p\u003e\\n\u003cp\u003e业务的基本特征是产品+组织。当产品交付给客户时，面向不同客户、市场、行业，如何解决业务的差异性？答案是业务身份。\u003c/p\u003e\\n\u003cp\u003e业务身份是现实业务在系统中给予的唯一编码标识，是基于“业务”差异性划分而形成的系统ID。业务身份的本质不是为了区分逻辑判断，而是区分需求来源以及规则的适用范围。因此，业务身份应该有全局的一致性。\u003c/p\u003e\\n\u003cp\u003e\u003cstrong\u003e业务平台架构的定位是什么\u003c/strong\u003e\u003c/p\u003e\\n\u003cp\u003e从业务内部看，要解决的主要问题是什么？\u003c/p\u003e\\n\u003cul\u003e\\n\u003cli\u003e创新：不断适应市场的业务策略\u003c/li\u003e\\n\u003cli\u003e低成本：实施成本低\u003c/li\u003e\\n\u003cli\u003e快速响应：能快速推进，快速试错\u003c/li\u003e\\n\u003cli\u003e外部资源：易于获得生态内足够的外部资源，如流量、供给、渠道\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003cp\u003e从全局看，怎样支持业务快速发展？\u003c/p\u003e\\n\u003cul\u003e\\n\u003cli\u003e基础强大：有强大的基础平台支撑，通用能力得到保证\u003c/li\u003e\\n\u003cli\u003e组装灵活：可以快速选择部分能力，构建适合自身需要的支撑体系\u003c/li\u003e\\n\u003cli\u003e易于变化：变化牵涉面小，可以快速定制\u003c/li\u003e\\n\u003cli\u003e自主投入：不受基础平台资源瓶颈限制\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003cp\u003e从内（技术）外（业务）两个角度看，需要的能力\u003c/p\u003e\\n\u003cul\u003e\\n\u003cli\u003e功能丰富：靠积累\u003c/li\u003e\\n\u003cli\u003e易于复用：粒度合适，易于集成（技术兼容）\u003c/li\u003e\\n\u003cli\u003e开放定制：平台开放（架构开放），运行解耦（部署灵活）、研发过程解耦\u003c/li\u003e\\n\u003cli\u003e信息共享：概念一致、场景链接\u003c/li\u003e\\n\u003cli\u003e沟通顺畅：共同的术语、对业务整体的一致认识\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003cp\u003e从业务角度看，能够被复用或信息共享的前提\u003c/p\u003e\\n\u003cul\u003e\\n\u003cli\u003e核心管理对象的一致性\u003c/li\u003e\\n\u003cli\u003e概念一致：对象+关系\u003c/li\u003e\\n\u003cli\u003e数据描述一致：主数据\u003c/li\u003e\\n\u003cli\u003e存在一定层次的流程一致性\u003c/li\u003e\\n\u003cli\u003e关键活动\u003c/li\u003e\\n\u003cli\u003e基本规则\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003cp\u003e从从技术的角度，软件怎样被复用？\u003c/p\u003e\\n\u003cul\u003e\\n\u003cli\u003e功能复用：一段功能被完整使用\u003c/li\u003e\\n\u003cli\u003e接口复用：输入输出定义复用，实现逻辑重写\u003c/li\u003e\\n\u003cli\u003e流程复用：一段控制结构被复用，控制逻辑加上节点\u003c/li\u003e\\n\u003cli\u003e规则复用：一段判断逻辑被复用\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003cp\u003e复用的前提是业务实质的相似性，如果管理的核心对象存在较大差异，绝大部份情况下，以上复用都没可能。\u003c/p\u003e\\n\u003cp\u003e业务平台的能力取决于\u003c/p\u003e\\n\u003cul\u003e\\n\u003cli\u003e是否存在基础的具有共性的关键业务环节\u003c/li\u003e\\n\u003cli\u003e是否存在需要全局共享的关键资源\u003c/li\u003e\\n\u003cli\u003e是否存在需要广泛连接的关键应用\u003c/li\u003e\\n\u003cli\u003e是否存在需要大范围执行的管控规则\u003c/li\u003e\\n\u003cli\u003e是否需要稳定性SLA\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003cp\u003e其价值体现在于\u003c/p\u003e\\n\u003cul\u003e\\n\u003cli\u003e通过沉淀可复用的软件基础设施，达到降低成本的目的；\u003c/li\u003e\\n\u003cli\u003e通过提供开放的基础架构能力，支持创新和差异化经营；\u003c/li\u003e\\n\u003cli\u003e通过管理基础数据和基本流程节点，提供全局管控的手段和稳定性保障\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003cp\u003e\u003cstrong\u003e业务架构模型分析\u003c/strong\u003e\u003c/p\u003e\\n\u003cul\u003e\\n\u003cli\u003eBusiness Process：TMF ，APQC\u003c/li\u003e\\n\u003cli\u003eBusiness Capability：Open Group ;Gartner\u003c/li\u003e\\n\u003cli\u003eValue Stream：Open Group\u003c/li\u003e\\n\u003cli\u003eBusiness Service ：FEA\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003cp\u003e描述业务的几个视角\u003c/p\u003e\\n\u003cul\u003e\\n\u003cli\u003eBusiness Capability (What)\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003cp\u003eA particular ability or capacity that a business may process or exchange to achieve a specific purpose（业务为实现特定目的或结果而可能拥有或交互的特定能力或产能）\u003c/p\u003e\\n\u003cul\u003e\\n\u003cli\u003eBusiness Process (How)\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003cp\u003eA set of structured activities or tasks with logical behaviors that produce a specific outcome, service or product（一组有逻辑行为的结构化活动或任务，产生特定的结果服务或产品）\u003c/p\u003e\\n\u003cul\u003e\\n\u003cli\u003eBusiness Value Stream(Why)\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003cp\u003eA sequence of activities an enterprise undertakes to deliver on a customer request（表示一组端到端增值活动集合，这些活动为客户、干系人或者最终用户获得一个总体结果）\u003c/p\u003e\\n\u003cp\u003e在推动企业IT服务能力的持续演进，业界已经有丰富的参考，分析前述参考模型可以看到：\u003c/p\u003e\\n\u003cul\u003e\\n\u003cli\u003e顶层的视图，不论哪种描述方式，都是先从企业的管理范围做大的划分——基于价值链的分析形成顶级视图，以是否直接服务客户为基准划分不同分类\u003c/li\u003e\\n\u003cli\u003e从内容逻辑看，大多讨论都涉及组织、能力、过程的关系。\u003c/li\u003e\\n\u003cli\u003e虽然在不同的时期，不同的视角，强调的重点不同，但都是希望建立更易于为业务理解的视图，并成为构建IT系统的桥梁。\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003cp\u003e通常，企业架构包括业务架构、技术架构、应用架构、数据/信息架构，而业务平台最薄弱的环节在于业务架构：\u003c/p\u003e\\n\u003cul\u003e\\n\u003cli\u003e已经形成框架，但缺乏对关键概念的确切定义\u003c/li\u003e\\n\u003cli\u003e已经形成平台，但缺乏长期演进的规划指引\u003c/li\u003e\\n\u003cli\u003e已经形成对业务的基础性支撑，但基础能力没有明确的定义\u003c/li\u003e\\n\u003cli\u003e平台团队，缺乏对业务的结构化思考框架指引，容易造成团队能力的瓶颈\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003cp\u003e因此，我们首先需要健全业务架构体系。业务架构体系的构建关键在于先要建立业务视角。那么，什么是业务视角？\u003c/p\u003e\\n\u003cul\u003e\\n\u003cli\u003e用业务发生的方式描述业务：围绕能力、流程与场景描述\u003c/li\u003e\\n\u003cli\u003e将业务现象背后的逻辑进行结构化呈现\u003c/li\u003e\\n\u003cli\u003e强调结果而非方法实现，屏蔽技术细节\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003cp\u003e那我们要如何才能建立业务视角呢？\u003c/p\u003e\\n\u003cul\u003e\\n\u003cli\u003e首先要明确业务目标，理解业务含义，知道结构划分的依据\u003c/li\u003e\\n\u003cli\u003e要建立端到端的全流程视角，业务需求能够对应到系统功能\u003c/li\u003e\\n\u003cli\u003e在业务沟通中，统一使用达成共识的业务语言而非技术术语\u003c/li\u003e\\n\u003cli\u003e系统被业务感知的部分要有明确的业务语义以及清晰的边界\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003cp\u003e业务平台架构是一个以流程为基础，以能力为表达的层次结构。第一层，明确语义和范围；第二层，构建完备、正交的业务模型；第三层，与交付形态相结合，提供服务SLA。无论从能力角度，还是从流程角度，都是对企业行为的一种描述方式。我们既可以通过满足的客户需求出发，构建能力的集合，也可以根据流程到企业能力的对应，建立起整体的能力框架或过程框架。\u003c/p\u003e\\n\u003cp\u003e\u003cstrong\u003e关于域（domain）的思考：过程域、功能域、能力域、信息域\u003c/strong\u003e\u003c/p\u003e\\n\u003cp\u003e域是一个广泛被使用的词，但是定义也很宽泛。（BD：特指某一专业性范围，涉及在该范围内的所有事项均可引用）领域建模这个词很熟悉，但具体领域是什么，在我们当前的实践中并没有可以判定的简单标准。域常常被理解为不同的场景：功能域、过程域、数据域。如果从OO的核心思想出发，则可以将域做一个统一认知：\u003c/p\u003e\\n\u003cul\u003e\\n\u003cli\u003e功能是对象行为的外部表现，但作为域的聚合的依据是对象\u003c/li\u003e\\n\u003cli\u003e对象的行为和数据是不可分开的，过程是对象行为的执行过程\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003cp\u003e基于以上的认知，域的概念可以统一为“信息域”，数据是信息的载体，信息是对数据的语义解释。因此，领域建模就是找出问题范围内的对象及其关系，根据对象间关系的紧密程度，来确定是否属于一个域。\u003c/p\u003e\\n\u003cp\u003e价值链把企业的能力划分为核心能力以及辅助能力的划分，实质是以客户为中心，区分客户与企业两个角色。根据TMF-eTom的划分方式，在核心流程进一步细分基础设施和战略、运营，和生产不直接相关的活动都定义为企业管理。\u003c/p\u003e\\n\u003cp\u003e\u003cstrong\u003e能力的语义分析——5W1H的逻辑\u003c/strong\u003e\u003c/p\u003e\\n\u003cul\u003e\\n\u003cli\u003eWhy 强调价值\u003c/li\u003e\\n\u003cli\u003eWhat 强调目标\u003c/li\u003e\\n\u003cli\u003eWhen 时间\u003c/li\u003e\\n\u003cli\u003eWhere 地点\u003c/li\u003e\\n\u003cli\u003eWho 参与人\u003c/li\u003e\\n\u003cli\u003eHow 方式方法\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003cp\u003e当我们在较高层次谈能力，往往是在谈Why和What；在较低或细节的层次谈能力，则往往强调的是3W1H——即做的程度和特性。\u003c/p\u003e\\n\u003cp\u003e能力的描述通常有两种形式：一是按照做什么和达到的目标来描述；二是按照特性来描述。而特性往往体现为两类：\u003c/p\u003e\\n\u003cp\u003e一是对一个或多个对象属性值的组合的描述，值的组合往往体现为场景。比如担保交易是一个能力描述，那么担保本身是交易的分类特性，就是交易具有的特点。\u003c/p\u003e\\n\u003cp\u003e二是对一个过程执行的非功能特点的描述。如时间、空间等。比如秒杀，描述的是交易的时间特性，又比如店铺红包，描述的是红包使用的范围（也可以理解为空间特性）。\u003c/p\u003e\\n\u003cp\u003e能力的特性描述实际是场景切分的方式。一旦进入场景，就是离散的结构，而按照流程的能力划分方式，则可以是逐步细化的方式，会形成树状的结构。如果我们把二者结合，并加以规范，就能形成既可以满足MECE，又能够把两种特点有效体现的描述方式。\u003c/p\u003e\\n\u003col\u003e\\n\u003cli\u003e按照端到端流程完成初始能力描述\u003c/li\u003e\\n\u003cli\u003e找到流程的各个环节，分解成不同的能力\u003c/li\u003e\\n\u003cli\u003e在流程各个环节里，找出关键参数，描述业务的适应能力\u003c/li\u003e\\n\u003cli\u003e找出关键的非功能性的特性\u003c/li\u003e\\n\u003cli\u003e把流程各个环节较为固定的组合找出来\u003c/li\u003e\\n\u003c/ol\u003e\\n\u003cp\u003e\u003cstrong\u003e能力分析 vs 流程分析\u003c/strong\u003e\u003c/p\u003e\\n\u003cp\u003e能力：要达到一个目的，得到一个结果，如果是服务于客户，从客户的角度看，就是“我” 帮客户完成了一件什么事情\u003c/p\u003e\\n\u003cp\u003e流程：我要干一件什么样的事情，其的步骤，体现的是做的过程。\u003c/p\u003e\\n\u003cp\u003e从划分的结果来看，能力划分和流程划分是一致的，但从思考的角度看，是不同的。从划分的确定性看，因为角色有限，能力从结果和目标的角度，避开路径的复杂性，有更强的确定性。\u003c/p\u003e\\n\u003cp\u003e\u003cstrong\u003e业务建模 vs 业务架构\u003c/strong\u003e\u003c/p\u003e\\n\u003cp\u003e在独立讲述流程建模或者能力建模的论述中，都强调用业务的语言，构建符合业务习惯的成果。业务建模只强调逻辑的完整性，但是在以IT实现为目标的前提下，业务建模和IT实现之间必须建立简单的对应关系。无论是能力建模或者过程建模，最终要与信息模型建立映射关系。在业务分散而平台支撑要统一的情况下，也可以看作是IT在寻找和业务的共同语言。\u003c/p\u003e\\n\u003cp\u003e\u003cstrong\u003e商业能力的划分\u003c/strong\u003e\u003c/p\u003e\\n\u003cp\u003e能力划分的核心是围绕客户，以是否与客户诉求直接相关作为基准划分。在顶层的视图，划分能力和流程的视角是一致的。因为无论流程视角还是能力视角，都要找出我们能为客户做什么。所以，我们仍然可以区分三类能力：1）客户销售与服务能力；2）支撑能力；3）企业管理能力。\u003c/p\u003e\\n\u003ch4\u003e能力划分的逻辑\u003c/h4\u003e\\n\u003cp\u003e能力划分是自顶向下的逻辑分解的过程。能力分析的出发点首先是角色分析，以满足角色的诉求为目的，因此，其顶层的划分都是以角色的诉求为划分基础，本质是场景（或流程）的划分。前端的能力是直接服务于客户需求的，所以其顶层可以按消费的逻辑进行划分。场景的细分本身可以构成能力细分的逻辑基础，但仍然需要找到场景细分的逻辑。后端支撑能力本质是服务于经营者，可以从经营者的诉求进行划分。但因为内部角色的分散，难以在顶层形成贯穿全局的流程主线，就会形成面向资源的分散流程。所以，其能力划分既可以按大的角色分类进行，也可以直接按资源分类进行。这里的资源，本质就是我们所说的域。这也代表了一类细分的思路，在场景细分的划分基础上，通过资源的分类完成下一级的细分。即便到了资源的分类层次，仍有可能进一步细分的必要，这又会回到场景划分的逻辑。所以，业务能力建模的过程也是在不断寻找不同层次的能力切分逻辑的过程。\u003c/p\u003e\\n\u003cp\u003e从全局看，核心是以客户为中心进行能力的划分，其实质是按照直接满足客户需求到为满足客户需求进行间接准备来划分。实际上，每一部分能力都服务于生态中的某个特定角色，所以在能力的描述上，直接满足的是当前角色的价值要求，间接地通过客户为中心视角进行原则性校验。\u003c/p\u003e\\n\u003cp\u003e\u003cimg src=\\\"/images/blog/tech/business/image_4_1.png\\\" alt=\\\"image_4_1.png\\\"\u003e\u003c/p\u003e\\n\u003cul\u003e\\n\u003cli\u003e企业的能力围绕“客户、企业自身、合作伙伴” 的生态形成闭环。\u003c/li\u003e\\n\u003cli\u003e前端围绕满足客户需求\u003c/li\u003e\\n\u003cli\u003e后端分为满足生产要素管理和满足企业自身管理\u003c/li\u003e\\n\u003cli\u003e企业管理暂不涉及\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003cp\u003e\u003cimg src=\\\"/images/blog/tech/business/image_4_2.png\\\" alt=\\\"image_4_2.png\\\"\u003e\u003c/p\u003e\\n\u003cp\u003e\u003cstrong\u003e后端支撑能力与企业管理能力\u003c/strong\u003e\u003c/p\u003e\\n\u003cul\u003e\\n\u003cli\u003e后端支撑能力\u003cul\u003e\\n\u003cli\u003e客户管理\u003c/li\u003e\\n\u003cli\u003e产品管理（PLM）\u003c/li\u003e\\n\u003cli\u003e合作伙伴管理*\u003c/li\u003e\\n\u003cli\u003e营销活动管理\u003c/li\u003e\\n\u003cli\u003e账单与收入管理\u003c/li\u003e\\n\u003cli\u003e资源管理\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003c/li\u003e\\n\u003cli\u003e企业管理能力\u003cul\u003e\\n\u003cli\u003e人力资源\u003c/li\u003e\\n\u003cli\u003e财务\u003c/li\u003e\\n\u003cli\u003e技术发展\u003c/li\u003e\\n\u003cli\u003e基础建设\u003c/li\u003e\\n\u003cli\u003e法务\u003c/li\u003e\\n\u003cli\u003e……\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003cp\u003e\u003cstrong\u003e从概念性的能力到软件实现的层次\u003c/strong\u003e\u003c/p\u003e\\n\u003cp\u003e\u003cimg src=\\\"/images/blog/tech/business/image_4_3.png\\\" alt=\\\"image_4_3.png\\\"\u003e\u003c/p\u003e\\n\u003cp\u003e\u003cstrong\u003e能力的表现形式\u003c/strong\u003e\u003c/p\u003e\\n\u003cul\u003e\\n\u003cli\u003e高层的能力，应该是逻辑的表达，对应于软件的整体或可独立交付的部分\u003c/li\u003e\\n\u003cli\u003e低层的能力，应该和软件的外在存在形式关联，如分布式环境中的服务接口、SDK中定义的接口\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003cp\u003e\u003cstrong\u003e能力的划分\u003c/strong\u003e\u003c/p\u003e\\n\u003cp\u003e能力是围绕以完成客户诉求为目标来划分的，完成一个能力可能需要多个领域对象的协作。能力的细分有横向和纵向的划分方式，未必代表软件实现的粒度细分，所以要建立能力和软件实现的映射关系。但在能力粒度上，一定需要和软件的交付物有一致并且明确的边界。\u003c/p\u003e\\n\u003cp\u003e\u003cstrong\u003e再看能力、流程、域的关系\u003c/strong\u003e\u003c/p\u003e\\n\u003cp\u003e能力是按照完成目标来划分的，流程是按照执行过程划分的，域是按照实体聚合切分的。业务流程是业务感知结果的流程，系统流程是执行步骤的划分。域内可以有流程，域的多项能力可能对应细分流程的多个步骤，不一定有必然的先后顺序，也可能是离散的能力组合。域和能力之间也需要在一定的粒度上建立映射关系，否则会造成在域和能力都有很多层次，并在多个层次间建立复杂的映射。\u003c/p\u003e\\n\u003cp\u003e\u003cstrong\u003e商业能力层和域内的关系\u003c/strong\u003e\u003c/p\u003e\\n\u003cp\u003e商业能力是客户可直接感知的能力，越是面向客户直接交互的层次，在技术上越难以限制其差异性，可能会与需求直接映射；越是趋近技术实现的层次，越是需要更高的抽象，以间接满足需求。\u003c/p\u003e\\n\u003cp\u003e商业能力提供流程性的封装，在顶层按照与客户的交互场景划分，并结合域的划分进行分解。商业能力层以提高交互场景的合理性和对外的灵活性为目标，关注的是面向客户体验的逻辑实现。各域内以实现领域内的接口复用为目的，提供合适粒度的接口，与商业能力层确认概念模型。\u003c/p\u003e\\n\u003cp\u003e商业能力团队应该首先是一个设计团队，其次才是一个实现团队。设计应该是和各域一起探讨的过程，商业能力要限制向下层过度延伸，也要迫使下层要更注重域内抽象。在设计过程中，逻辑分解应该尽量形成在各域的独立逻辑，然后组合成对外的交互逻辑。最外层交互所依赖的服务都在商业能力层实现封装，应该以业务设计结果为准，而不是技术设计，对外的扩展点，都在商业能力层定义和体现。\u003c/p\u003e\\n\u003cp\u003e\u003cstrong\u003e商业能力在软件结构上的分层\u003c/strong\u003e\u003c/p\u003e\\n\u003cp\u003e如果对外提供的就是商业能力，那么域和商业能力的边界到底在哪里？\u003c/p\u003e\\n\u003cul\u003e\\n\u003cli\u003e所有在SDK、RPC接口中对外提供调用或者是SPI提供实现的，都在商业能力层定义。\u003c/li\u003e\\n\u003cli\u003e也就是，需要提供给外部使用或扩展的，这里不包含界面层对后端的调用，界面是软件的一部分。\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003cp\u003e这里就要区分什么是内，什么是外？\u003c/p\u003e\\n\u003cul\u003e\\n\u003cli\u003e这个和我们定义的商业能力的服务对象有关系，如果按照组织来分，那就要考虑组织的边界和能力的分层，比如，业务平台面对业务方，业务平台就是内。\u003c/li\u003e\\n\u003cli\u003e如果考虑放大到所有提供中台能力的都和业务平台同等的地位，那么，整个中台就是内。但这样就要有整个中台的统一的对外组织和架构标准了。\u003c/li\u003e\\n\u003cli\u003e如果从企业内外来看，客户就是外，企业就是内。\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003ch4\u003e商业能力和域的分层及域间关系\u003c/h4\u003e\\n\u003cp\u003e问题在于域间是否允许调用呢？如果允许，这样的域内调用和外部通过商业能力的调用差别是什么？对于依赖另一个域的实体对象信息的查询调用，都允许。对于依赖另一个域的判断的调用，或者嵌入另一个域的处理环节的调用，都禁止，交给上层去集成。也就是说，上层进行逻辑和控制结构的组装，不限制下层的信息查询，但限制下层的逻辑蔓延。\u003c/p\u003e\\n\u003cp\u003e对于下层能够独立完成的判断逻辑，或者处理环节，鼓励下层去做。但对象必须有属主域，判断应该是本域的关键对象的行为判断，而不能是跨越边界。判断什么是查询，只有直接被认为是对象的直接属性的内容，被认为是查询，所以对于一个域要有基本的概念模型。\u003c/p\u003e\\n\u003ch4\u003e商业能力的表达\u003c/h4\u003e\\n\u003cp\u003e对组织边界外的外部系统服务，都是商业能力封装，对于和客户直接交互的提供给界面的都是商业能力。商业能力本身可以分成两类：一类是领域内服务，一类是跨域服务。跨域服务，可以作为独立的分类。从上下级关系看，上级的逻辑必然覆盖下层的逻辑，建立能力树，是给用户导航的方式。\u003c/p\u003e\\n\u003cp\u003e\u003cstrong\u003e基于企业架构，构建业务架构\u003c/strong\u003e
