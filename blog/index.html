ex items-center justify-center rounded-md p-2.5 text-gray-700"><span class="sr-only">打开主菜单</span><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" aria-hidden="true" data-slot="icon" class="h-6 w-6"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5"></path></svg></button></div><div class="hidden lg:flex lg:gap-x-12"><a class="text-base font-semibold leading-6 transition-colors text-gray-900 hover:text-blue-600" href="/">首页</a><a class="text-base font-semibold leading-6 transition-colors text-blue-600 border-b-2 border-blue-600 pb-1" href="/blog/">博客</a><a class="text-base font-semibold leading-6 transition-colors text-gray-900 hover:text-blue-600" href="/about/">关于</a></div><div class="hidden lg:flex lg:flex-1 lg:justify-end"><a class="text-base font-semibold leading-6 transition-colors text-gray-900 hover:text-blue-600" href="/contact/">联系 <span aria-hidden="true">→</span></a></div></nav></header><main class="flex-1"><div class="container mx-auto px-4 py-8"><div class="mb-8"><h1 class="text-3xl font-bold mb-4">博客文章</h1><div class="mb-6"><div id="tag-filters" class="flex flex-wrap gap-2"></div></div><div id="blog-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div><div id="pagination" class="mt-8 flex justify-center items-center gap-2"></div><div id="stats" class="mt-4 text-center text-gray-600"></div></div><script>
            // 文章数据
            window.blogData = [{"slug":"tech/middleware/分布式事务之两阶段提交和三阶提交","title":"分布式事务之两阶段提交和三阶提交","description":"随着大型网站的各种高并发访问、海量数据处理等场景越来越多，如何实现网站的高可用、易伸缩、可扩展、安全等目标就显得越来越重要。为了解决这样一系列问题，大型网站的架构也在不断发展。提高大型网站的高可用架构，不得不提的就是分布式。","pubDate":"2027-07-23","tags":["分布式事务","技术专题"],"content":"<blockquote>\n<p>随着大型网站的各种高并发访问、海量数据处理等场景越来越多，如何实现网站的高可用、易伸缩、可扩展、安全等目标就显得越来越重要。为了解决这样一系列问题，大型网站的架构也在不断发展。提高大型网站的高可用架构，不得不提的就是分布式。在分布式一致性一文中主要介绍了分布式系统中存在的一致性问题。本文将简单介绍如何有效的解决分布式的一致性问题,其中包括什么是分布式事务，二阶段提交和三阶段提交。</p>\n</blockquote>\n<h3>分布式一致性回顾</h3>\n<p>在分布式系统中，为了保证数据的高可用，通常，我们会将数据保留多个副本(replica)，这些副本会放置在不同的物理的机器上。为了对用户提供正确的增\\删\\改\\差等语义，我们需要保证这些放置在不同物理机器上的副本是一致的。为了解决这种分布式一致性问题，前人在性能和数据一致性的反反复复权衡过程中总结了许多典型的协议和算法。其中比较著名的有二阶提交协议（Two Phase Commitment Protocol）、三阶提交协议（Three Phase Commitment Protocol）和Paxos算法。</p>\n<h3>分布式事务</h3>\n<blockquote>\n<p>分布式事务是指会涉及到操作多个数据库的事务。其实就是将对同一库事务的概念扩大到了对多个库的事务。目的是为了保证分布式系统中的数据一致性。分布式事务处理的关键是必须有一种方法可以知道事务在任何地方所做的所有动作，提交或回滚事务的决定必须产生统一的结果（全部提交或全部回滚）</p>\n</blockquote>\n<p>在分布式系统中，各个节点之间在物理上相互独立，通过网络进行沟通和协调。由于存在事务机制，可以保证每个独立节点上的数据操作可以满足ACID。但是，相互独立的节点之间无法准确的知道其他节点中的事务执行情况。所以从理论上讲，两台机器理论上无法达到一致的状态。如果想让分布式部署的多台机器中的数据保持一致性，那么就要保证在所有节点的数据写操作，要不全部都执行，要么全部的都不执行。但是，一台机器在执行本地事务的时候无法知道其他机器中的本地事务的执行结果。所以他也就不知道本次事务到底应该commit还是 roolback。所以，常规的解决办法就是引入一个“协调者”的组件来统一调度所有分布式节点的执行。</p>\n<h3>XA规范</h3>\n<p>X/Open 组织（即现在的 Open Group ）定义了分布式事务处理模型。 X/Open DTP 模型（ 1994 ）包括应用程序（ AP ）、事务管理器（ TM ）、资源管理器（ RM ）、通信资源管理器（ CRM ）四部分。一般，常见的事务管理器（ TM ）是交易中间件，常见的资源管理器（ RM ）是数据库，常见的通信资源管理器（ CRM ）是消息中间件。    通常把一个数据库内部的事务处理，如对多个表的操作，作为本地事务看待。数据库的事务处理对象是本地事务，而分布式事务处理的对象是全局事务。   所谓全局事务，是指分布式事务处理环境中，多个数据库可能需要共同完成一个工作，这个工作即是一个全局事务，例如，一个事务中可能更新几个不同的数据库。对数据库的操作发生在系统的各处但必须全部被提交或回滚。此时一个数据库对自己内部所做操作的提交不仅依赖本身操作是否成功，还要依赖与全局事务相关的其它数据库的操作是否成功，如果任一数据库的任一操作失败，则参与此事务的所有数据库所做的所有操作都必须回滚。     一般情况下，某一数据库无法知道其它数据库在做什么，因此，在一个 DTP 环境中，交易中间件是必需的，由它通知和协调相关数据库的提交或回滚。而一个数据库只将其自己所做的操作（可恢复）影射到全局事务中。   </p>\n<blockquote>\n<p>XA 就是 X/Open DTP 定义的交易中间件与数据库之间的接口规范（即接口函数），交易中间件用它来通知数据库事务的开始、结束以及提交、回滚等。 XA 接口函数由数据库厂商提供。</p>\n</blockquote>\n<p>二阶提交协议和三阶提交协议就是根据这一思想衍生出来的。可以说二阶段提交其实就是实现XA分布式事务的关键(确切地说：两阶段提交主要保证了分布式事务的原子性：即所有结点要么全做要么全不做)</p>\n<h3>2PC</h3>\n<blockquote>\n<p>二阶段提交(Two-phaseCommit)是指，在计算机网络以及数据库领域内，为了使基于分布式系统架构下的所有节点在进行事务提交时保持一致性而设计的一种算法(Algorithm)。通常，二阶段提交也被称为是一种协议(Protocol))。在分布式系统中，每个节点虽然可以知晓自己的操作时成功或者失败，却无法知道其他节点的操作的成功或失败。当一个事务跨越多个节点时，为了保持事务的ACID特性，需要引入一个作为协调者的组件来统一掌控所有节点(称作参与者)的操作结果并最终指示这些节点是否要把操作结果进行真正的提交(比如将更新后的数据写入磁盘等等)。因此，二阶段提交的算法思路可以概括为：参与者将操作成败通知协调者，再由协调者根据所有参与者的反馈情报决定各参与者是否要提交操作还是中止操作。</p>\n</blockquote>\n<p>所谓的两个阶段是指：第一阶段：准备阶段(投票阶段)和第二阶段：提交阶段（执行阶段）。</p>\n<h4>准备阶段</h4>\n<p>事务协调者(事务管理器)给每个参与者(资源管理器)发送Prepare消息，每个参与者要么直接返回失败(如权限验证失败)，要么在本地执行事务，写本地的redo和undo日志，但不提交，到达一种“万事俱备，只欠东风”的状态。可以进一步将准备阶段分为以下三个步骤：</p>\n<blockquote>\n<p>1）协调者节点向所有参与者节点询问是否可以执行提交操作(vote)，并开始等待各参与者节点的响应。2）参与者节点执行询问发起为止的所有事务操作，并将Undo信息和Redo信息写入日志。（注意：若成功这里其实每个参与者已经执行了事务操作）3）各参与者节点响应协调者节点发起的询问。如果参与者节点的事务操作实际执行成功，则它返回一个”同意”消息；如果参与者节点的事务操作实际执行失败，则它返回一个”中止”消息。</p>\n</blockquote>\n<h4>提交阶段</h4>\n<p>如果协调者收到了参与者的失败消息或者超时，直接给每个参与者发送回滚(Rollback)消息；否则，发送提交(Commit)消息；参与者根据协调者的指令执行提交或者回滚操作，释放所有事务处理过程中使用的锁资源。(注意:必须在最后阶段释放锁资源)接下来分两种情况分别讨论提交阶段的过程。当协调者节点从所有参与者节点获得的相应消息都为”同意”时:</p>\n<p><img src=\"/images/blog/tech/middleware/img_20250723_01.png\" alt=\"\"></p>\n<blockquote>\n<p>1）协调者节点向所有参与者节点发出”正式提交(commit)”的请求。2）参与者节点正式完成操作，并释放在整个事务期间内占用的资源。3）参与者节点向协调者节点发送”完成”消息。4）协调者节点受到所有参与者节点反馈的”完成”消息后，完成事务。</p>\n</blockquote>\n<p>如果任一参与者节点在第一阶段返回的响应消息为”中止”，或者 协调者节点在第一阶段的询问超时之前无法获取所有参与者节点的响应消息时：</p>\n<p><img src=\"/images/blog/tech/middleware/img_20250723_02.png\" alt=\"\"></p>\n<blockquote>\n<p>1）协调者节点向所有参与者节点发出”回滚操作(rollback)”的请求。2）参与者节点利用之前写入的Undo信息执行回滚，并释放在整个事务期间内占用的资源。3）参与者节点向协调者节点发送”回滚完成”消息。4）协调者节点受到所有参与者节点反馈的”回滚完成”消息后，取消事务。</p>\n</blockquote>\n<p>　　不管最后结果如何，第二阶段都会结束当前事务。二阶段提交看起来确实能够提供原子性的操作，但是不幸的事，二阶段提交还是有几个缺点的：</p>\n<blockquote>\n<p>1、同步阻塞问题。执行过程中，所有参与节点都是事务阻塞型的。当参与者占有公共资源时，其他第三方节点访问公共资源不得不处于阻塞状态。2、单点故障。由于协调者的重要性，一旦协调者发生故障。参与者会一直阻塞下去。尤其在第二阶段，协调者发生故障，那么所有的参与者还都处于锁定事务资源的状态中，而无法继续完成事务操作。（如果是协调者挂掉，可以重新选举一个协调者，但是无法解决因为协调者宕机导致的参与者处于阻塞状态的问题）3、数据不一致。在二阶段提交的阶段二中，当协调者向参与者发送commit请求之后，发生了局部网络异常或者在发送commit请求过程中协调者发生了故障，这回导致只有一部分参与者接受到了commit请求。而在这部分参与者接到commit请求之后就会执行commit操作。但是其他部分未接到commit请求的机器则无法执行事务提交。于是整个分布式系统便出现了数据部一致性的现象。4、二阶段无法解决的问题：协调者在发出commit消息之后宕机，而唯一接收到这条消息的参与者同时也宕机了。那么即使协调者通过选举协议产生了新的协调者，这条事务的状态也是不确定的，没人知道事务是否被已经提交。</p>\n</blockquote>\n<p>由于二阶段提交存在着诸如同步阻塞、单点问题、脑裂等缺陷，所以，研究者们在二阶段提交的基础上做了改进，提出了三阶段提交。</p>\n<h3>3PC</h3>\n<blockquote>\n<p>三阶段提交（Three-phase commit），也叫三阶段提交协议（Three-phase commit protocol），是二阶段提交（2PC）的改进版本。</p>\n</blockquote>\n<p><img src=\"/images/blog/tech/middleware/img_20250723_03.png\" alt=\"图片\"></p>\n<p>与两阶段提交不同的是，三阶段提交有两个改动点。1、引入超时机制。同时在协调者和参与者中都引入超时机制。2、在第一阶段和第二阶段中插入一个准备阶段。保证了在最后提交阶段之前各参与节点的状态是一致的。也就是说，除了引入超时机制之外，3PC把2PC的准备阶段再次一分为二，这样三阶段提交就有CanCommit、PreCommit、DoCommit三个阶段。</p>\n<h4>CanCommit阶段</h4>\n<p>3PC的CanCommit阶段其实和2PC的准备阶段很像。协调者向参与者发送commit请求，参与者如果可以提交就返回Yes响应，否则返回No响应。</p>\n<blockquote>\n<p>1.事务询问 协调者向参与者发送CanCommit请求。询问是否可以执行事务提交操作。然后开始等待参与者的响应。2.响应反馈 参与者接到CanCommit请求之后，正常情况下，如果其自身认为可以顺利执行事务，则返回Yes响应，并进入预备状态。否则反馈No</p>\n</blockquote>\n<h4>PreCommit阶段</h4>\n<p>协调者根据参与者的反应情况来决定是否可以进行事务的PreCommit操作。根据响应情况，有以下两种可能。假如协调者从所有的参与者获得的反馈都是Yes响应，那么就会执行事务的预执行。</p>\n<blockquote>\n<p>1.发送预提交请求 协调者向参与者发送PreCommit请求，并进入Prepared阶段。2.事务预提交 参与者接收到PreCommit请求后，会执行事务操作，并将undo和redo信息记录到事务日志中。3.响应反馈 如果参与者成功的执行了事务操作，则返回ACK响应，同时开始等待最终指令。</p>\n</blockquote>\n<p>假如有任何一个参与者向协调者发送了No响应，或者等待超时之后，协调者都没有接到参与者的响应，那么就执行事务的中断。</p>\n<blockquote>\n<p>1.发送中断请求 协调者向所有参与者发送abort请求。2.中断事务 参与者收到来自协调者的abort请求之后（或超时之后，仍未收到协调者的请求），执行事务的中断。</p>\n</blockquote>\n<h4>doCommit阶段</h4>\n<p>该阶段进行真正的事务提交，也可以分为以下两种情况。执行提交</p>\n<blockquote>\n<p>1.发送提交请求 协调接收到参与者发送的ACK响应，那么他将从预提交状态进入到提交状态。并向所有参与者发送doCommit请求。2.事务提交 参与者接收到doCommit请求之后，执行正式的事务提交。并在完成事务提交之后释放所有事务资源。3.响应反馈 事务提交完之后，向协调者发送Ack响应。4.完成事务 协调者接收到所有参与者的ack响应之后，完成事务。</p>\n</blockquote>\n<p>中断事务 协调者没有接收到参与者发送的ACK响应（可能是接受者发送的不是ACK响应，也可能响应超时），那么就会执行中断事务。</p>\n<blockquote>\n<p>1.发送中断请求 协调者向所有参与者发送abort请求2.事务回滚 参与者接收到abort请求之后，利用其在阶段二记录的undo信息来执行事务的回滚操作，并在完成回滚之后释放所有的事务资源。3.反馈结果 参与者完成事务回滚之后，向协调者发送ACK消息4.中断事务 协调者接收到参与者反馈的ACK消息之后，执行事务的中断。</p>\n</blockquote>\n<p>在doCommit阶段，如果参与者无法及时接收到来自协调者的doCommit或者rebort请求时，会在等待超时之后，会继续进行事务的提交。（其实这个应该是基于概率来决定的，当进入第三阶段时，说明参与者在第二阶段已经收到了PreCommit请求，那么协调者产生PreCommit请求的前提条件是他在第二阶段开始之前，收到所有参与者的CanCommit响应都是Yes。（一旦参与者收到了PreCommit，意味他知道大家其实都同意修改了）所以，一句话概括就是，当进入第三阶段时，由于网络超时等原因，虽然参与者没有收到commit或者abort响应，但是他有理由相信：成功提交的几率很大。）</p>\n<h3>2PC与3PC的区别</h3>\n<p>相对于2PC，3PC主要解决的单点故障问题，并减少阻塞，因为一旦参与者无法及时收到来自协调者的信息之后，他会默认执行commit。而不会一直持有事务资源并处于阻塞状态。但是这种机制也会导致数据一致性问题，因为，由于网络原因，协调者发送的abort响应没有及时被参与者接收到，那么参与者在等待超时之后执行了commit操作。这样就和其他接到abort命令并执行回滚的参与者之间存在数据不一致的情况。</p>\n<hr>\n<p>了解了2PC和3PC之后，我们可以发现，无论是二阶段提交还是三阶段提交都无法彻底解决分布式的一致性问题。Google Chubby的作者Mike Burrows说过， there is only one consensus protocol, and that’s Paxos” – all other approaches are just broken versions of Paxos. 意即<strong>世上只有一种一致性算法，那就是Paxos</strong>，所有其他一致性算法都是Paxos算法的不完整版。后面的文章会介绍这个公认为难于理解但是行之有效的Paxos算法。</p>\n<h3>参考资料：</h3>\n<p><a href=\"http://www.mamicode.com/info-detail-890945.html\">分布式协议之两阶段提交协议（2PC）和改进三阶段提交协议（3PC）</a> <a href=\"http://blog.csdn.net/bluishglc/article/details/7612811\">关于分布式事务、两阶段提交、一阶段提交、Best Efforts 1PC模式和事务补偿机制的研究</a> <a href=\"http://www.tuicool.com/articles/mARV3u\">两阶段提交协议与三阶段提交协议</a></p>\n"},{"slug":"tech/middleware/分布式一致性的探究","title":"分布式一致性的探究","description":"随着大型网站的各种高并发访问、海量数据处理等场景越来越多，如何实现网站的高可用、易伸缩、可扩展、安全等目标就显得越来越重要。为了解决这样一系列问题，大型网站的架构也在不断发展。提高大型网站的高可用架构，不得不提的就是分布式。","pubDate":"2027-07-22","tags":["分布式事务","技术专题"],"content":"<blockquote>\n<p>随着大型网站的各种高并发访问、海量数据处理等场景越来越多，如何实现网站的高可用、易伸缩、可扩展、安全等目标就显得越来越重要。为了解决这样一系列问题，大型网站的架构也在不断发展。提高大型网站的高可用架构，不得不提的就是分布式。在初识分布式系统一文中简单介绍了分布式的基本概念，本文将在上篇文章的基础上继续学习分布式的一致性问题。主要介绍分布式一致性的基本概念、重要性、一致性模型等。</p>\n</blockquote>\n<h3>一致性的重要性</h3>\n<p>分布式领域CAP理论告诉我们，任何一个分布式系统都无法同时满足Consistency(一致性),Availability(可用性), Partition tolerance(分区容错性) 这三个基本需求。最多只能满足其中两项。 但是，一个分布式系统无论在CAP三者之间如何权衡，都无法彻底放弃一致性（Consistency），如果真的放弃一致性，那么就说明这个系统中的数据根本不可信，数据也就没有意义，那么这个系统也就没有任何价值可言。所以，无论如何，分布式系统的一致性问题都需要重点关注。(分布式系统的CAP理论、分布式系统的BASE理论)</p>\n<p>这里先简单提一下，由于一个分布式系统不可能放弃一致性，那么为什么有的架构师还说在某些场景中可以牺牲一致性呢？通常这里说的放弃一致性指的是放弃数据的强一致性（后文介绍什么是强一致性）。</p>\n<p>通常情况下，我们所说的分布式一致性问题通常指的是数据一致性问题。那么我们就先来了解一下什么是数据一致性。</p>\n<h3>数据一致性</h3>\n<p>数据一致性其实是数据库系统中的概念。我们可以简单的把一致性理解为正确性或者完整性，那么数据一致性通常指关联数据之间的逻辑关系是否正确和完整。我们知道，在数据库系统中通常用事务（访问并可能更新数据库中各种数据项的一个程序执行单元）来保证数据的一致性和完整性。而在分布式系统中，数据一致性往往指的是由于数据的复制，不同数据节点中的数据内容是否完整并且相同。</p>\n<p>比如在集中式系统中，有一些关键的配置信息，可以直接保存在服务器的内存中，但是在分布式系统中，如何保存这些配置信息，又如何保证所有机器上的配置信息都保持一致，又如何保证修改一个配置能够把这次修改同步到所有机器中呢？</p>\n<p>再比如，在集中式系统中，进行一个同步操作要写同一个数据的时候，可以直接使用事务+锁来管理保证数据的ACID。但是，在分布式系统中如何保证多台机器不会同时写同一条数据呢？</p>\n<p>除了上面提到的同一个数据的一致性，还有一种情况也可以叫做数据的一致性：比如我们在电商网站下单，需要经历扣减库存、扣减红包、扣减折扣券等一系列操作。如果库存库存扣减成功，但是红包和折扣券扣减失败的话，也可以说是数据没有保证一致性。</p>\n<p>如何保证数据的一致性，是分布式系统中必须面对的问题。</p>\n<h3>为什么会有数据一致性问题</h3>\n<p>在初识分布式系统中我们介绍过，虽然分布式系统有着诸多优点，但是由于采用多机器进行分布式部署的方式提供服务，必然存在着数据的复制（如数据库的异地容灾，多地部署）。分布式系统的数据复制需求主要来源于以下两个原因：</p>\n<p>可用性。将数据复制到分布式部署的多台机器中，可以消除单点故障。防止系统由于某台（些）机器宕机导致的不可用。</p>\n<p>性能。通过负载均衡技术，能够让分布在不同地方的数据副本全都对外提供服务。有效提高系统性能。</p>\n<p>分布式系统为了提升可用性和性能，会通过复制技术来进行数据同步。复制机制的目的是为了保证数据的一致性。但是数据复制面临的主要难题也是如何保证多个副本之间的数据一致性。在分布式系统引入复制机制后，不同的数据节点之间由于网络延时等原因很容易产生数据不一致的情况。</p>\n<p>如果上面提到的数据复制场景你不是很熟悉的话，下面这个例子你肯定遇到过。就是现在很多网站都是微服务化的，一个网站被垂直拆分成多个功能模块。各模块之间独立部署。模块间通过RPC或者HTTP交互。由于这种RPC或者HTTP的交互可能存在网络延迟导致超时的情况。甚至被调用方也有可能执行出错等情况，这时候就可能导致数据不一致。</p>\n<p>比如下单操作要依次扣减红包、扣减折扣券、扣减库存。在下单应用的执行过程中，调用红包系统扣减红包成功了，但是再调用折扣券系统扣减折扣券的时候网络超时了。这时候下单应用根本不知道折扣券系统到底有没有执行成功。这时候他就需要一些机制来决定是要回滚红包的扣减，还是继续执行库存的扣减。这种机制，其实就是数据一致性的解决方案了。</p>\n<p>由于应用分布式部署，就无法通过数据库事务保证多个写操作的原子性。一旦某个操作失败，其他操作如果不回滚的话就会发生数据不一致问题。</p>\n<p>因此，如何能既保证数据一致性，又保证系统的性能，是每一个分布式系统都需要重点考虑和权衡的。一致性模型可以在做这些权衡的时候给我们很多借鉴和思考。</p>\n<h3>一致性模型</h3>\n<h4>强一致性</h4>\n<p>当更新操作完成之后，任何多个后续进程或者线程的访问都会返回最新的更新过的值。这种是对用户最友好的，就是用户上一次写什么，下一次就保证能读到什么。</p>\n<p>但是这种实现对性能影响较大，因为这意味着，只要上次的操作没有处理完，就不能让用户读取数据。</p>\n<h4>弱一致性</h4>\n<p>系统并不保证进程或者线程的访问都会返回最新的更新过的值。系统在数据写入成功之后，不承诺立即可以读到最新写入的值，也不会具体的承诺多久之后可以读到。但会尽可能保证在某个时间级别（比如秒级别）之后，可以让数据达到一致性状态。</p>\n<h4>最终一致性</h4>\n<p>弱一致性的特定形式。系统保证在没有后续更新的前提下，系统最终返回上一次更新操作的值。在没有故障发生的前提下，不一致窗口的时间主要受通信延迟，系统负载和复制副本的个数影响。DNS是一个典型的最终一致性系统。</p>\n<p>最终一致性模型的变种</p>\n<ul>\n<li><p>因果一致性：如果A进程在更新之后向B进程通知更新的完成，那么B的访问操作将会返回更新的值。如果没有因果关系的C进程将会遵循最终一致性的规则。</p>\n</li>\n<li><p>读己所写一致性：因果一致性的特定形式。一个进程总可以读到自己更新的数据。</p>\n</li>\n<li><p>会话一致性：读己所写一致性的特定形式。进程在访问存储系统同一个会话内，系统保证该进程读己之所写。</p>\n</li>\n<li><p>单调读一致性：如果一个进程已经读取到一个特定值，那么该进程不会读取到该值以前的任何值。</p>\n</li>\n<li><p>单调写一致性：系统保证对同一个进程的写操作串行化。</p>\n</li>\n</ul>\n<p>上述最终一致性的不同方式可以进行组合，例如单调读一致性和读己之所写一致性就可以组合实现。并且从实践的角度来看，这两者的组合，读取自己更新的数据，和一旦读取到最新的版本不会再读取旧版本，对于此架构上的程序开发来说，会少很多额外的烦恼。</p>\n<p>为了解决分布式的一致性问题，在长期的研究探索过程中，涌现出了一大批经典的一致性协议和算法，其中比较著名的有二阶段提交协议，三阶段提交协议和Paxos算法。 下一篇文章将介绍这些和分布式一致性相关的协议和算法。</p>\n"},{"slug":"tech/middleware/初识分布式系统","title":"初识分布式系统","description":"随着大型网站的各种高并发访问、海量数据处理等场景越来越多，如何实现网站的高可用、易伸缩、可扩展、安全等目标就显得越来越重要。为了解决这样一系列问题，大型网站的架构也在不断发展。提高大型网站的高可用架构，不得不提的就是分布式。","pubDate":"2027-07-20","tags":["分布式事务","技术专题"],"content":"<blockquote>\n<p>随着大型网站的各种高并发访问、海量数据处理等场景越来越多，如何实现网站的高可用、易伸缩、可扩展、安全等目标就显得越来越重要。为了解决这样一系列问题，大型网站的架构也在不断发展。提高大型网站的高可用架构，不得不提的就是分布式。本文主要简单介绍了分布式系统的概念、分布式系统的特点、常用的分布式方案以及分布式和集群的区别等。</p>\n</blockquote>\n<h3>一、集中式系统</h3>\n<p>在学习分布式之前，先了解一下与之相对应的集中式系统是什么样的。</p>\n<p>集中式系统用一句话概括就是：一个主机带多个终端。终端没有数据处理能力，仅负责数据的录入和输出。而运算、存储等全部在主机上进行。现在的银行系统，大部分都是这种集中式的系统，此外，在大型企业、科研单位、军队、政府等也有分布。集中式系统，主要流行于上个世纪。</p>\n<p>集中式系统的最大的特点就是部署结构非常简单，底层一般采用从IBM、HP等厂商购买到的昂贵的大型主机。因此无需考虑如何对服务进行多节点的部署，也就不用考虑各节点之间的分布式协作问题。但是，由于采用单机部署。很可能带来系统大而复杂、难于维护、发生单点故障（单个点发生故障的时候会波及到整个系统或者网络，从而导致整个系统或者网络的瘫痪）、扩展性差等问题。</p>\n<h3>二、分布式系统</h3>\n<p>在《分布式系统概念与设计》一书中，对分布式系统做了如下定义：</p>\n<p>分布式系统是一个硬件或软件组件分布在不同的网络计算机上，彼此之间仅仅通过消息传递进行通信和协调的系统</p>\n<p>简单来说就是一群独立计算机集合共同对外提供服务，但是对于系统的用户来说，就像是一台计算机在提供服务一样。分布式意味着可以采用更多的普通计算机（相对于昂贵的大型机）组成分布式集群对外提供服务。计算机越多，CPU、内存、存储资源等也就越多，能够处理的并发访问量也就越大。</p>\n<p>从分布式系统的概念中我们知道，各个主机之间通信和协调主要通过网络进行，所以，分布式系统中的计算机在空间上几乎没有任何限制，这些计算机可能被放在不同的机柜上，也可能被部署在不同的机房中，还可能在不同的城市中，对于大型的网站甚至可能分布在不同的国家和地区。但是，无论空间上如何分布，一个标准的分布式系统应该具有以下几个主要特征：</p>\n<h4>分布性</h4>\n<p>分布式系统中的多台计算机之间在空间位置上可以随意分布，系统中的多台计算机之间没有主、从之分，即没有控制整个系统的主机，也没有受控的从机。</p>\n<h4>透明性</h4>\n<p>系统资源被所有计算机共享。每台计算机的用户不仅可以使用本机的资源，还可以使用本分布式系统中其他计算机的资源(包括CPU、文件、打印机等)。</p>\n<h4>同一性</h4>\n<p>系统中的若干台计算机可以互相协作来完成一个共同的任务，或者说一个程序可以分布在几台计算机上并行地运行。</p>\n<h4>通信性</h4>\n<p>系统中任意两台计算机都可以通过通信来交换信息。</p>\n<p>和集中式系统相比，分布式系统的性价比更高、处理能力更强、可靠性更高、也有很好的扩展性。但是，分布式在解决了网站的高并发问题的同时也带来了一些其他问题。首先，分布式的必要条件就是网络，这可能对性能甚至服务能力造成一定的影响。其次，一个集群中的服务器数量越多，服务器宕机的概率也就越大。另外，由于服务在集群中分布是部署，用户的请求只会落到其中一台机器上，所以，一旦处理不好就很容易产生数据一致性问题。</p>\n<h2>常用的分布式方案</h2>\n<h3>分布式应用和服务</h3>\n<p>将应用和服务进行分层和分割，然后将应用和服务模块进行分布式部署。这样做不仅可以提高并发访问能力、减少数据库连接和资源消耗，还能使不同应用复用共同的服务，使业务易于扩展。</p>\n<h3>分布式静态资源</h3>\n<p>对网站的静态资源如JS、CSS、图片等资源进行分布式部署可以减轻应用服务器的负载压力，提高访问速度。</p>\n<h3>分布式数据和存储</h3>\n<p>大型网站常常需要处理海量数据，单台计算机往往无法提供足够的内存空间，可以对这些数据进行分布式存储。</p>\n<h3>分布式计算</h3>\n<p>随着计算技术的发展，有些应用需要非常巨大的计算能力才能完成，如果采用集中式计算，需要耗费相当长的时间来完成。分布式计算将该应用分解成许多小的部分，分配给多台计算机进行处理。这样可以节约整体计算时间，大大提高计算效率。</p>\n<h3>分布式与集群</h3>\n<p>分布式（distributed）是指在多台不同的服务器中部署不同的服务模块，通过远程调用协同工作，对外提供服务。</p>\n<p>集群（cluster）是指在多台不同的服务器中部署相同应用或服务模块，构成一个集群，通过负载均衡设备对外提供服务。</p>\n"},{"slug":"tech/bigdata/大数据分析常用去重算法分析之Bitmap篇","title":"大数据分析常用去重算法分析之Bitmap篇","description":"去重分析在企业日常分析中的使用频率非常高，如何在大数据场景下快速地进行去重分析一直是一大难点。在近期的 Apache Kylin Meetup 北京站上，我们邀请到 Kyligence 大数据研发工程师陶加涛为大家揭开了大数据分析常用去重算法的神秘面纱。 Apache Kylin 作为目前唯一一个同...","pubDate":"2027-03-26","tags":["大数据","技术专题","去重算法","Bitmap"],"content":"<p>去重分析在企业日常分析中的使用频率非常高，如何在大数据场景下快速地进行去重分析一直是一大难点。在近期的 Apache Kylin Meetup 北京站上，我们邀请到 Kyligence 大数据研发工程师陶加涛为大家揭开了大数据分析常用去重算法的神秘面纱。</p>\n<p>Apache Kylin 作为目前唯一一个同时支持精确与非精确去重查询的 OLAP 引擎，非常好地覆盖了大数据上的去重需求。本次分享讲解了 Kylin 这两种去重方式背后用到的算法，希望能让大家从源头上理解为什么 Kylin 的去重查询有着如此优异的性能。此次分享的回顾将分为两期，本篇首先为大家介绍精确去重算法 Bitmap 。</p>\n<p>首先，请大家思考一个问题：在大数据处理领域中，什么环节是你最不希望见到的？以我的观点来看，shuffle 是我最不愿意见到的环节，因为一旦出现了非常多的 shuffle，就会占用大量的磁盘和网络 IO，从而导致任务进行得非常缓慢。而今天我们所讨论的去重分析，就是一个会产生非常多 shuffle 的场景，先来看以下场景：</p>\n<p><img src=\"/images/blog/tech/bigdata/image_1_1.png\" alt=\"image_1_1.png\"></p>\n<p>我们有一张商品访问表，表上有 item 和 user_id 两个列，我们希望求商品的 UV，这是去重非常典型的一个场景。我们的数据是存储在分布式平台上的，分别在数据节点 1 和 2 上。</p>\n<p>我们从物理执行层面上想一下这句 SQL 背后会发生什么故事：首先分布式计算框架启动任务, 从两个节点上去拿数据, 因为 SQL group by 了 item 列, 所以需要以 item 为 key 对两个表中的原始数据进行一次 shuffle。我们来看看需要 shuffle 哪些数据：因为 select/group by了 item，所以 item 需要 shuffle 。但是，user_id 我们只需要它的一个统计值，能不能不 shuffle 整个 user_id 的原始值呢？</p>\n<p>如果只是简单的求 count 的话, 每个数据节点分别求出对应 item 的 user_id 的 count, 然后只要 shuffle 这个 count 就行了，因为count 只是一个数字, 所以 shuffle 的量非常小。但是由于分析的指标是 count distinct，我们不能简单相加两个节点user_id 的 count distinct 值，我们只有得到一个 key 对应的所有 user_id 才能统计出正确的 count distinct值，而这些值原先可能分布在不同的节点上，所以我们只能通过 shuffle 把这些值收集到同一个节点上再做去重。而当 user_id 这一列的数据量非常大的时候，需要 shuffle 的数据量也会非常大。我们其实最后只需要一个 count 值，那么有办法可以不 shuffle 整个列的原始值吗？我下面要介绍的两种算法就提供了这样的一种思路，使用更少的信息位，同样能够求出该列不重复元素的个数（基数）。</p>\n<p><strong>精确算法: Bitmap</strong></p>\n<p><img src=\"/images/blog/tech/bigdata/image_1_2.png\" alt=\"image_1_2.png\"></p>\n<p>第一种要介绍的算法是一种精确的去重算法，主要利用了 Bitmap 的原理。Bitmap 也称之为 Bitset，它本质上是定义了一个很大的 bit 数组，每个元素对应到 bit 数组的其中一位。例如有一个集合［2，3，5，8］对应的 Bitmap 数组是［001101001］，集合中的 2 对应到数组 index 为 2 的位置，3 对应到 index 为 3 的位置，下同，得到的这样一个数组，我们就称之为 Bitmap。很直观的，数组中 1 的数量就是集合的基数。追本溯源，我们的目的是用更小的存储去表示更多的信息，而在计算机最小的信息单位是 bit，如果能够用一个 bit 来表示集合中的一个元素，比起原始元素，可以节省非常多的存储。</p>\n<p>这就是最基础的 Bitmap，我们可以把 Bitmap 想象成一个容器，我们知道一个 Integer 是32位的，如果一个 Bitmap 可以存放最多 Integer.MAX_VALUE 个值，那么这个 Bitmap 最少需要 32 的长度。一个 32 位长度的 Bitmap 占用的空间是512 M （2^32/8/1024/1024），这种 Bitmap 存在着非常明显的问题：这种 Bitmap 中不论只有 1 个元素或者有 40 亿个元素，它都需要占据 512 M 的空间。回到刚才求 UV 的场景，不是每一个商品都会有那么多的访问，一些爆款可能会有上亿的访问，但是一些比较冷门的商品可能只有几个用户浏览，如果都用这种 Bitmap，它们占用的空间都是一样大的，这显然是不可接受的。</p>\n<p><strong>升级版 Bitmap: Roaring Bitmap</strong></p>\n<p><img src=\"/images/blog/tech/bigdata/image_1_3.png\" alt=\"image_1_3.png\"></p>\n<p>对于上节说的问题，有一种设计的非常的精巧 Bitmap，叫做 Roaring Bitmap，能够很好地解决上面说的这个问题。我们还是以存放 Integer 值的 Bitmap 来举例，Roaring Bitmap 把一个 32 位的 Integer 划分为高 16 位和低 16 位，取高 16 位找到该条数据所对应的 key，每个 key 都有自己的一个 Container。我们把剩余的低 16 位放入该 Container 中。依据不同的场景，有 3 种不同的 Container，分别是 Array Container、Bitmap Container 和 Run Container，下文将一一介绍。</p>\n<p><img src=\"/images/blog/tech/bigdata/image_1_4.png\" alt=\"image_1_4.png\"></p>\n<p>首先第一种，是 Roaring Bitmap 初始化时默认的 Container，叫做 Array Container。Array Container 适合存放稀疏的数据，Array Container 内部的数据结构是一个 short array，这个 array 是有序的，方便查找。数组初始容量为 4，数组最大容量为 4096。超过最大容量 4096 时，会转换为 Bitmap Container。这边举例来说明数据放入一个 Array Container 的过程：有 0xFFFF0000 和 0xFFFF0001 两个数需要放到 Bitmap 中, 它们的前 16 位都是 FFFF，所以他们是同一个 key，它们的后 16 位存放在同一个 Container 中; 它们的后 16 位分别是 0 和 1, 在 Array Container 的数组中分别保存 0 和 1 就可以了，相较于原始的 Bitmap 需要占用 512M 内存来存储这两个数，这种存放实际只占用了 2+4=6 个字节（key 占 2 Bytes，两个 value 占 4 Bytes，不考虑数组的初始容量）。</p>\n<p><img src=\"/images/blog/tech/bigdata/image_1_5.png\" alt=\"image_1_5.png\"></p>\n<p>第二种 Container 是 Bitmap Container，其原理就是上文说的 Bitmap。它的数据结构是一个 long 的数组，数组容量固定为 1024，和上文的 Array Container 不同，Array Container 是一个动态扩容的数组。这边推导下 1024 这个值：由于每个 Container 还需处理剩余的后 16 位数据，使用 Bitmap 来存储需要 8192 Bytes（2^16/8）, 而一个 long 值占 8 个 Bytes，所以一共需要 1024（8192/8）个 long 值。所以一个 Bitmap container 固定占用内存 8 KB（1024 * 8 Byte）。当 Array Container 中元素到 4096 个时，也恰好占用 8 k（4096*2Bytes）的空间，正好等于 Bitmap 所占用的 8 KB。而当你存放的元素个数超过 4096 的时候，Array Container 的大小占用还是会线性的增长，但是 Bitmap Container 的内存空间并不会增长，始终还是占用 8 K，所以当 Array Container 超过最大容量（DEFAULT_MAX_SIZE）会转换为 Bitmap Container。</p>\n<p>我们自己在 Kylin 中实践使用 Roaring Bitmap 时，我们发现 Array Container 随着数据量的增加会不停地 resize 自己的数组，而 Java 数组的 resize 其实非常消耗性能，因为它会不停地申请新的内存，同时老的内存在复制完成前也不会释放，导致内存占用变高，所以我们建议把 DEFAULT_MAX_SIZE 调得低一点，调成 1024 或者 2048，减少 Array Container 后期 reszie 数组的次数和开销。</p>\n<p><img src=\"/images/blog/tech/bigdata/image_1_6.png\" alt=\"image_1_6.png\"></p>\n<p>最后一种 Container 叫做Run Container，这种 Container 适用于存放连续的数据。比如说 1 到 100，一共 100 个数，这种类型的数据称为连续的数据。这边的Run指的是Run Length Encoding（RLE），它对连续数据有比较好的压缩效果。原理是对于连续出现的数字, 只记录初始数字和后续数量。例如: 对于 [11, 12, 13, 14, 15, 21, 22]，会被记录为 11, 4, 21, 1。很显然，该 Container 的存储占用与数据的分布紧密相关。最好情况是如果数据是连续分布的，就算是存放 65536 个元素，也只会占用 2 个 short。而最坏的情况就是当数据全部不连续的时候，会占用 128 KB 内存。</p>\n<p><img src=\"/images/blog/tech/bigdata/image_1_7.png\" alt=\"image_1_7.png\"></p>\n<p>总结：用一张图来总结3种 Container 所占的存储空间，可以看到元素个数达到 4096 之前，选用 Array Container 的收益是最好的，当元素个数超过了 4096 时，Array Container 所占用的空间还是线性的增长，而 Bitmap Container 的存储占用则与数据量无关，这个时候 Bitmap Container 的收益就会更好。而 Run Container 占用的存储大小完全看数据的连续性, 因此只能画出一个上下限范围 [4 Bytes, 128 KB]。</p>\n<p><strong>在 Kylin 中的应用</strong></p>\n<p><img src=\"/images/blog/tech/bigdata/image_1_8.png\" alt=\"image_1_8.png\"></p>\n<p>我们再来看一下Bitmap 在 Kylin 中的应用，Kylin 中编辑 measure 的时候，可以选择 Count Distinct，且Return Type 选为 Precisely，点保存就可以了。但是事情没有那么简单，刚才上文在讲 Bitmap 时，一直都有一个前提，放入的值都是数值类型，但是如果不是数值类型的值，它们不能够直接放入 Bitmap，这时需要构建一个全区字典，做一个值到数值的映射，然后再放入 Bitmap 中。</p>\n<p><img src=\"/images/blog/tech/bigdata/image_1_9.png\" alt=\"image_1_9.png\"></p>\n<p>在 Kylin 中构建全局字典，当列的基数非常高的时候，全局字典会成为一个性能的瓶颈。针对这种情况，社区也一直在努力做优化，这边简单介绍几种优化的策略，更详细的优化策略可以见文末的参考链接。</p>\n<p><img src=\"/images/blog/tech/bigdata/image_1_10.png\" alt=\"image_1_10.png\"></p>\n<p>1）当一个列的值完全被另外一个列包含，而另一个列有全局字典，可以复用另一个列的全局字典。</p>\n<p><img src=\"/images/blog/tech/bigdata/image_1_11.png\" alt=\"image_1_11.png\"></p>\n<p>2）当精确去重指标不需要跨 Segment 聚合的时候，可以使用这个列的 Segment 字典代替（这个列需要字典编码）。在 Kylin 中，Segment 就相当于时间分片的概念。当不会发生跨 Segments 的分析时，这个列的 Segment 字典就可以代替这个全局字典。</p>\n<p><img src=\"/images/blog/tech/bigdata/image_1_12.png\" alt=\"image_1_12.png\"></p>\n<p>3）如果你的 cube 包含很多的精确去重指标，可以考虑将这些指标放到不同的列族上。不止是精确去重，像一些复杂 measure，我们都建议使用多个列族去存储，可以提升查询的性能。</p>\n"},{"slug":"tech/bigdata/大数据分析常用去重算法分析之HyperLogLog篇","title":"大数据分析常用去重算法分析之HyperLogLog篇","description":"上篇介绍了利用 Roaring Bitmap 来进行精确去重。虽然这种算法能大大地减少存储开销，但是随着数据量的增大，它依然面临着存储上的压力。在本篇推送中将要介绍的 HyperLogLog（下称 HLL）是一种非精确的去重算法，它的特点是具有非常优异的空间复杂度（几乎可以达到常数级别）。 ","pubDate":"2027-03-25","tags":["大数据","技术专题","去重算法","HyperLogLog"],"content":"<p>上篇介绍了利用 Roaring Bitmap 来进行精确去重。虽然这种算法能大大地减少存储开销，但是随着数据量的增大，它依然面临着存储上的压力。在本篇推送中将要介绍的 HyperLogLog（下称 HLL）是一种非精确的去重算法，它的特点是具有非常优异的空间复杂度（几乎可以达到常数级别）。</p>\n<p><img src=\"/images/blog/tech/bigdata/image_2_1.png\" alt=\"image_2_1.png\"></p>\n<p>HLL 算法需要完整遍历所有元素一次，而非多次或采样；该算法只能计算集合中有多少个不重复的元素，不能给出每个元素的出现次数或是判断一个元素是否之前出现过；多个使用 HLL 统计出的基数值可以融合。</p>\n<p><img src=\"/images/blog/tech/bigdata/image_2_2.png\" alt=\"image_2_2.png\"></p>\n<p><img src=\"/images/blog/tech/bigdata/image_2_3.png\" alt=\"image_2_3.png\"></p>\n<p>HLL 算法有着非常优异的空间复杂度，可以看到它的空间占用随着基数值的增长并没有变化。HLL 后面不同的数字代表着不同的精度，数字越大，精度越高，占用的空间也越大，可以认为 HLL 的空间占用只和精度成正相关。</p>\n<p><strong>HLL算法原理感性认知</strong></p>\n<p><img src=\"/images/blog/tech/bigdata/image_2_4.png\" alt=\"image_2_4.png\"></p>\n<p>HLL 算法的原理会涉及到比较多的数学知识，这边对这些数学原理和证明不会展开。举一个生活中的例子来帮助大家理解HLL算法的原理：比如你在进行一个实验，内容是不停地抛硬币，记录你连续抛到正面的次数（这是数学中的伯努利过程，感兴趣同学可以自行研究下）；如果你最多的连抛正面记录是3次，那可以想象你并没有做这个实验太多次，如果你最长的连抛正面记录是 20 次，那你可能进行了这个实验上千次。</p>\n<p>一种理论上存在的情况是，你非常幸运，第一次进行这个实验就连抛了 20 次正面，我们也会认为你进行了很多次这个实验才得到了这个记录，这就会导致错误的预估；改进的方式是请 10 位同学进行这项实验，这样就可以观察到更多的样本数据，降低出现上述情况的概率。这就是 HLL 算法的核心思想。</p>\n<p><strong>HLL算法具体实现</strong></p>\n<p><img src=\"/images/blog/tech/bigdata/image_2_5.png\" alt=\"image_2_5.png\"></p>\n<p>HLL 会通过一个 hash 函数来求出集合中所有元素的 hash 值（二进制表示的 hash 值，就可以理解为一串抛硬币正反面结果的序列），得到一个 hash 值的集合，然后找出该 hash 值集合中，第一个 1 出现的最晚的位置。例如有集合为 [010, 100, 001], 集合中元素的第一个 1 出现的位置分别为 2, 1, 3，可以得到里面最大的值为 3，故该集合中第一个1出现的最晚的位置为 3。因为每个位置上出现1的概率都是 1/2，所以我们可以做一个简单的推断，该集合中有 8 个不重复的元素。</p>\n<p>可以看到这种简单的推断计算出来集合的基数值是有较大的偏差的，那如何来减少偏差呢？正如我上面的例子里说的一样，HLL 通过多次的进行试验来减少误差。那它是如何进行多次的实验的呢？这里 HLL 使用了分桶的思想，上文中我们一直有提到一个精度的概念，比如说 HLL(10)，这个 10 代表的就是取该元素对应 Hash 值二进制的后 10 位，计算出记录对应的桶，桶中会记录一个数字，代表对应到该桶的 hash 值的第一个 1 出现的最晚的位置。如上图，该 hash 值的后 10 位的 hash 值是 0000001001，转成 10 进制是 9，对应第 9 号桶，而该 hash 值第一个 1 出现的位置是第 6 位，比原先 9 号桶中的数字大，故把 9 号桶中的数字更新为 6。可以看到桶的个数越多，HLL 算法的精度就越高，HLL(10) 有 1024(210) 个桶，HLL(16)有 65536(216) 个桶。同样的，桶的个数越多，所占用的空间也会越大。</p>\n<p><img src=\"/images/blog/tech/bigdata/image_2_6.png\" alt=\"image_2_6.png\"></p>\n<p>刚才的例子我们省略了一些细节，为了让大家不至于迷失在细节中而忽视了重点，真实的 HLL 算法的完整描述见上图，这边的重点是计算桶中平均数时使用调和平均数。调和平均数的优点是可以过滤掉不健康的统计值，使用算术平均值容易受到极值的影响（想想你和马云的平均工资），而调和平均数的结果会倾向于集合中比较小的元素。HLL 论文中还有更多的细节和参数，这边就不一一细举，感兴趣的同学可以自己阅读下论文。</p>\n<p><strong>HLL评估</strong></p>\n<p><img src=\"/images/blog/tech/bigdata/image_2_7.png\" alt=\"image_2_7.png\"></p>\n<p>HLL 的误差分布服从正态分布，它的空间复杂度: O(m log2log2N), Ｎ 为基数, m 为桶个数。这边给大家推导一下它的空间复杂度，我有 264 个的不重复元素(Long. MAX_VALUE)，表达为二进制一个数是 64 位，这是第一重 log2, 那么第一个1最晚可能出现在第 64 位。64 需要 6 个 bit (26=64) 就可以存储，这是第二重 log2。如果精度为 10，则会有 1024 个桶，所以最外面还要乘以桶的个数。由于需要完整的遍历元素一遍，所以它的时间复杂度是一个线性的时间复杂度。</p>\n<p><strong>在Kylin中的应用</strong></p>\n<p><img src=\"/images/blog/tech/bigdata/image_2_8.png\" alt=\"image_2_8.png\"></p>\n<p>在 Kylin 中使用 HLL 非常简单，在编辑度量的页面选择 COUNT DISTINCT，Return Type 选为非 Precisely 的其他选项，大家根据自己的需求选择不同的精度就可以愉快地使用了。</p>\n<p><strong>总结</strong></p>\n<p><img src=\"/images/blog/tech/bigdata/image_2_9.png\" alt=\"image_2_9.png\"></p>\n<p>我们回到最开始的去重场景，看看使用了 Bitmap 和 HLL 会给我们带来什么增益：无优化 case 下，每个 item 对应的 user_id 就可以看成存储原始值的一个集合；在使用 Bitmap 优化的case 下，每个 item 对应的 user_id 就可以看成一个 Bitmap 实例，同理 HLL就是一个 HLL 的实例，Bitmap/HLL 实例占用的空间都会比直接存储原始值的集合要小，这就达到了我们开始提的减少 shuffle 数据量的需求。</p>\n<p><strong>Q&amp;A</strong></p>\n<p>Q：您好，问一下关于精确去重的问题， 我选择了非精确去重，最后的误差率有时候会比界面上提示的值要高一些，这是为什么？</p>\n<p>A：首先 HLL 的误差分布服从正态分布，也就是说是在99%的情况下是这个误差，同时 HLL 对于基数比较低的情况，误差会偏高。如果你的基数比较低的话，我推荐使用精确去重。</p>\n<p>Q：我想要了解一下 Bitmap 在 Kylin 中，它最终落盘在 HBase 里面是什么样子的？</p>\n<p>A：在 HBase 中存储的当然都是 Bytes。这个问题其实就是 Bitmap 的序列化的形式，Roaring Bitmap提供了序列化和反序列化的实现，你也可以写自己的序列化/反序列化的实现。</p>\n<p>Q：Roaring Bitmap 里这些 container 要我们自己手动的指定吗。</p>\n<p>A：不需要，Roaring Bitmap 会自动选择使用哪个 Container。</p>\n"},{"slug":"tech/SUMMARY","title":"技术专题","description":"* [微服务系列].[系统架构].[业务架构].[技术实战]","pubDate":"2024-04-10","tags":["技术专题"],"content":"<h2>微服务系列</h2>\n<ul>\n<li><a href=\"../microservice/%E5%BE%AE%E6%9C%8D%E5%8A%A1%E5%8F%8A%E5%85%B6%E6%BC%94%E8%BF%9B%E5%8F%B2/\">微服务及其演进史</a></li>\n<li><a href=\"../microservice/%E5%BE%AE%E6%9C%8D%E5%8A%A1%E5%85%A8%E6%99%AF%E6%9E%B6%E6%9E%84/\">微服务全景架构</a></li>\n<li><a href=\"../microservice/%E5%BE%AE%E6%9C%8D%E5%8A%A1%E6%8B%86%E5%88%86%E7%AD%96%E7%95%A5/\">微服务拆分策略</a></li>\n<li><a href=\"../microservice/%E5%BE%AE%E6%9C%8D%E5%8A%A1%E6%8B%86%E5%88%86%E7%AD%96%E7%95%A5%EF%BC%88%E9%99%84%E5%8A%A0%E7%AF%87%EF%BC%89/\">微服务拆分策略（附加篇）</a></li>\n<li><a href=\"../microservice/%E6%9C%8D%E5%8A%A1%E6%B3%A8%E5%86%8C%E4%B8%8E%E5%8F%91%E7%8E%B0/\">服务注册与发现</a></li>\n<li><a href=\"../microservice/%E6%9C%8D%E5%8A%A1%E6%B3%A8%E5%86%8C%E4%B8%8E%E5%8F%91%E7%8E%B0%EF%BC%88%E5%AE%9E%E8%B7%B5%E7%AF%87%EF%BC%89/\">服务注册与发现（实践篇）</a></li>\n</ul>\n<h2>中间件</h2>\n<h3>消息队列</h3>\n<ul>\n<li><a href=\"../middleware/RabbitMQ%E3%80%81RocketMQ%E3%80%81Kafka%E5%8C%BA%E5%88%AB/\">RabbitMQ、RocketMQ、Kafka区别</a></li>\n<li><a href=\"../middleware/%E5%88%86%E5%B8%83%E5%BC%8F%E4%BA%8B%E5%8A%A1%E4%B9%8B%E4%B8%A4%E9%98%B6%E6%AE%B5%E6%8F%90%E4%BA%A4%E5%92%8C%E4%B8%89%E9%98%B6%E6%8F%90%E4%BA%A4/\">分布式事务之两阶段提交和三阶提交</a></li>\n</ul>\n<h3>架构设计</h3>\n<ul>\n<li><a href=\"../system/%E6%9E%B6%E6%9E%84%E8%AE%BE%E8%AE%A1%E6%A8%A1%E6%9D%BF/\">架构设计模板</a></li>\n<li><a href=\"../system/%E4%BB%8E0%E5%BC%80%E5%A7%8B%E5%81%9A%E4%B8%80%E4%B8%AA%E5%90%8E%E5%8F%B0%E6%9E%B6%E6%9E%84/\">从0开始做一个后台架构</a></li>\n<li><a href=\"../system/%E4%B8%80%E4%B8%AA%E7%A7%92%E6%9D%80%E7%B3%BB%E7%BB%9F%E7%9A%84%E8%AE%BE%E8%AE%A1%E6%80%9D%E8%80%83/\">一个秒杀系统的设计思考</a></li>\n<li><a href=\"../system/%E9%AB%98%E5%B9%B6%E5%8F%91%E7%B3%BB%E7%BB%9F%E8%AE%BE%E8%AE%A1%E7%9A%8415%E4%B8%AA%E9%94%A6%E5%9B%8A/\">高并发系统设计的15个锦囊</a></li>\n<li><a href=\"../system/%E9%A2%86%E7%95%A5SET%E5%8C%96%E6%9E%B6%E6%9E%84%E8%A1%8D%E5%8C%96%E4%B8%8E%E8%AE%BE%E8%AE%A1/\">领略SET化架构衍化与设计</a></li>\n</ul>\n<h3>大数据</h3>\n<ul>\n<li><a href=\"../bigdata/%E5%A4%A7%E6%95%B0%E6%8D%AE%E5%88%86%E6%9E%90%E5%B8%B8%E7%94%A8%E5%8E%BB%E9%87%8D%E7%AE%97%E6%B3%95%E5%88%86%E6%9E%90%E4%B9%8BBitmap%E7%AF%87/\">大数据分析常用去重算法分析之Bitmap篇</a></li>\n<li><a href=\"../bigdata/%E5%A4%A7%E6%95%B0%E6%8D%AE%E5%88%86%E6%9E%90%E5%B8%B8%E7%94%A8%E5%8E%BB%E9%87%8D%E7%AE%97%E6%B3%95%E5%88%86%E6%9E%90%E4%B9%8BHyperLogLog%E7%AF%87/\">大数据分析常用去重算法分析之HyperLogLog篇</a></li>\n</ul>\n<h2>业务架构</h2>\n<ul>\n<li><a href=\"../business/%E5%85%B3%E4%BA%8E%E4%B8%9A%E5%8A%A1%E5%B9%B3%E5%8F%B0%E6%9E%B6%E6%9E%84%E7%9A%84%E6%80%9D%E8%80%83/\">关于业务平台架构的思考</a></li>\n<li><a href=\"../business/%E8%A7%A3%E6%9E%90%E3%80%8C%E4%B8%89%E6%88%B7%E6%A8%A1%E5%9E%8B%E3%80%8D%E5%8F%8A%E5%BB%BA%E7%AB%8B%E8%B4%A6%E6%88%B7%E6%A8%A1%E5%9E%8B/\">解析「三户模型」及建立账户模型</a></li>\n<li><a href=\"../business/%E5%88%B0%E5%BA%95%E5%95%A5%E5%8F%AB%E6%87%82%E4%B8%9A%E5%8A%A1%EF%BC%9F%E4%B8%9A%E5%8A%A1%E7%9A%84%E4%B8%89%E9%87%8D%E8%A7%86%E8%A7%92/\">到底啥叫懂业务？业务的三重视角</a></li>\n<li><a href=\"../business/%E4%B8%9A%E5%8A%A1%E4%B8%89%E9%87%8D%E8%A7%86%E8%A7%92%E2%80%94%E2%80%94%E4%B8%9A%E5%8A%A1%E6%A8%A1%E5%9E%8B/\">业务三重视角——业务模型</a></li>\n<li><a href=\"../business/%E4%B8%9A%E5%8A%A1%E4%B8%89%E9%87%8D%E8%A7%86%E8%A7%92%E2%80%94%E2%80%94%E5%95%86%E4%B8%9A%E6%A8%A1%E5%BC%8F/\">业务三重视角——商业模式</a></li>\n<li><a href=\"../business/%E7%94%A8%E6%88%B7%E7%B3%BB%E7%BB%9F%E8%AE%BE%E8%AE%A1%E2%80%94%E2%80%94%E4%B8%89%E6%88%B7%E6%A8%A1%E5%9E%8B&%E4%B8%89%E5%B1%82%E8%BA%AB%E4%BB%BD%E6%A8%A1%E5%9E%8B/\">用户系统设计——三户模型&amp;三层身份模型</a></li>\n<li><a href=\"../business/%E6%9D%83%E9%99%90%E7%B3%BB%E7%BB%9F%E6%96%B9%E6%A1%88%E8%AE%BE%E8%AE%A1/\">权限系统方案设计</a></li>\n<li><a href=\"../business/%E7%94%B5%E5%95%86%E5%88%86%E6%9E%90%E5%BF%85%E6%87%82%E7%9A%84%E6%8C%87%E6%A0%87%E4%BD%93%E7%B3%BB/\">电商分析必懂的指标体系</a></li>\n</ul>\n<h2>技术实战</h2>\n<ul>\n<li><a href=\"../practice/%E9%9D%9E%E4%BE%B5%E5%85%A5%E5%BC%8FSQL%E7%9B%91%E6%8E%A7/\">非侵入式SQL监控</a></li>\n<li><a href=\"../practice/Java%E6%9E%84%E4%BB%B6%E5%8F%91%E5%B8%83%E5%88%B0%E4%B8%AD%E5%A4%AE%E4%BB%93%E5%BA%93/\">Java构件发布到中央仓库</a></li>\n<li><a href=\"../practice/Git%E5%B8%B8%E7%94%A8%E5%91%BD%E4%BB%A4/\">Git常用命令</a></li>\n<li><a href=\"../practice/Maven%E4%BD%BF%E7%94%A8%E6%8A%80%E5%B7%A7/\">Maven使用技巧</a></li>\n</ul>\n"},{"slug":"tech/practice/非侵入式SQL监控","title":"非侵入式SQL监控","description":"你有没有因为应用程序没有打印SQL而导致问题排查困难？有没有因为SQL没有显示参数而导致日志毫无意义？有没有因为SQL超长而导致查看痛苦？有没有因为缺少SQL性能监控而导致无法报警？...","pubDate":"2024-04-07","tags":["技术实战"],"content":"<p>你有没有遇到过因为没有打印SQL导致问题排查困难？如果你使用了成熟ORM框架，那么很容易支撑SQL的拦截和监控，例如Mybatis的Interceptor或JOOQ的Listener都支持SQL执行过程的跟踪监控，但是，如果你的ORM框架不支持SQL监控，那么很不幸，你就只能在代码中手动打印日志了。然而，为了防SQL注入，应用中的SQL语句都是参数化的，直接打印的话，SQL语句未绑定参数，ORM框架一般都提供了SQL参数绑定的功能，原生的JDBC这样就失去了一定的监控价值。</p>\n<p>另外，在TOB的业务中，有些场景SQL参数超长，如大IN查询，SQL语句会长达到几万甚至十几万，此时，我们又需要对SQL语句进行缩略打印。注意，这里的SQL缩略打印不是简单的对SQL语句进行截断，而是对SQL语句中的参数列表进行截断，例如下面的SQL</p>\n<pre><code class=\"language-sql\">select * from user \nwhere id in (1001,1001, 1002, 1003, 1004, 1005, 1006, 1007) \nand name in(sql\nselect name from whitelist \nwhere name in(&#39;a&#39;,&#39;b&#39;,&#39;c&#39;,&#39;d&#39;,&#39;e&#39;,&#39;f&#39;,&#39;g&#39;,&#39;h&#39;,&#39;i&#39;,&#39;j&#39;,&#39;k&#39;,&#39;l&#39;,&#39;m&#39;)\n)\n</code></pre>\n<p>缩略下印如下：</p>\n<pre><code class=\"language-sql\">select * from user \nwhere id in (1001,1001, 1002, 1003, 1004,...) \nand name in(\nselect name from whitelist \nwhere name in(&#39;a&#39;,&#39;b&#39;,&#39;c&#39;,&#39;d&#39;,&#39;e&#39;,...)\n)\n</code></pre>\n<p>既然SQL 监控很重要，那么对于应用层的SQL监控都有哪些手段呢？一个SQL请求的执行链路，一般从DAO层开始：DAO -&gt; ORM -&gt; DataSource  -&gt; Connection -&gt; Driver -&gt; DB，那么在这个链路上有哪些环节可以切入监控呢？ DAO层是数据访问层的入口，而我们的目标是应用层监控，因此，能够实现SQL监控的环节只有：ORM -&gt; DataSource  -&gt; Connection -&gt; Driver，而要实现通用的非侵入式监控，则应该独立于ORM，因此我们可以从<strong>DataSource  -&gt; Connection -&gt; Driver</strong>三个环节进行入手：</p>\n<h3><strong>一、SQL Profile监控</strong></h3>\n<h4><strong>1、驱动层监控</strong></h4>\n<p>如果Driver层支持日志监控，则最方便，例如MySQL，可以在jdbc url中添加logger：</p>\n<pre><code class=\"language-properties\">jdbc:mysql://localhost:3306/test?useUnicode=true&amp;characterEncoding=utf8&amp;useSSL=false&amp;serverTimezone=UTC&amp;logger=Slf4JLogger&amp;profileSQL=true\n</code></pre>\n<p>基于Driver监控的问题在于：一方面强依赖于DB，和ORM层面临一样的问题，不具有通用性上述的问题，且需要厂商的支持，例如Oracle Driver就不支持日志监控；另一方面SQL格式固定，无法进行定制化输出。</p>\n<h4><strong>2、连接层监控</strong></h4>\n<p>如果厂商驱动不支持SQL日志，可以Driver进行代理实现SQL监控功能，常用的开源组件如<a href=\"https://p6spy.readthedocs.io/en/latest/\">P6Spy</a>、<a href=\"https://github.com/arthurblake/log4jdbc\">log4jdbc</a> 等，其原理都是代理了厂商的驱动，因此只需要修改jdbc url：</p>\n<ul>\n<li>pyspy</li>\n</ul>\n<pre><code class=\"language-properties\">jdbc:p6spy:mysql://localhost:3306/test?useUnicode=true&amp;characterEncoding=utf8&amp;useSSL=false&amp;serverTimezone=UTC\n</code></pre>\n<ul>\n<li>log4jdbc</li>\n</ul>\n<pre><code class=\"language-properties\">jdbc:log4jdbc:mysql://localhost:3306/test?useUnicode=true&amp;characterEncoding=utf8&amp;useSSL=false&amp;serverTimezone=UTC\n</code></pre>\n<h4><strong>3、数据源层监控</strong></h4>\n<p>可以通过对DataSource进行代理实现SQL监控</p>\n<ul>\n<li>P6Spy：</li>\n</ul>\n<pre><code class=\"language-java\">@Bean\n@Primary\npublic DataSource spyDataSource(@Autowired DataSource dataSource) {\n  // wrap a datasource using P6SpyDataSource\n  return new P6DataSource(dataSource);\n}\n</code></pre>\n<ul>\n<li>log4jdbc</li>\n</ul>\n<pre><code class=\"language-java\">public DataSource spyDataSource(DataSource dataSource) {\n    // wrap the provided dataSource\n  return new DataSource() {\n    @Override\n    public Connection getConnection() throws SQLException {\n      // wrap the connection with log4jdbc\n      return new ConnectionSpy(dataSource.getConnection());\n    }\n      \n    @Override\n    public Connection getConnection(String username, String password) throws SQLException {\n       // wrap the connection with log4jdbc\n      return new ConnectionSpy(dataSource.getConnection(username, password));\n     }\n      //...\n  };\n}\n</code></pre>\n<p>上述三种方案都可以实现SQL监控，那么在实际应用场景中选择哪种方式更好呢？这和实际的生产方式有关。在我手，数据库是基于KDB的，Java应用是基于KsBoot，其中，数据库连接是在KDB平台配置的，底层的数据源是使用ShardingSphere+HikariDataSource进行魔改的。</p>\n<p>第一种方案，由于数据库连接是由DBA维护的，升级需求修改数据库连接，因此不建议。</p>\n<p>第二种方案，同理需要修改数据库连接，且比第一种更容易配错，因此也不建议。</p>\n<p>排除上述两种方式，剩下的只有第三种方案了，但是第三种方案有很大的挑战，原因在于需要兼容快手kuaishou-framework奇葩的JdbcTemplate使用方式。确切地说，在于使用了DataSourceConfig。</p>\n<pre><code class=\"language-java\">public interface DataSourceConfig extends HasBizDef {\n\n    /**\n     * 数据源名称，必须与KDB申请时填写的一致\n     */String bizName();\n\n    /**\n     * 获取当前可用区单库只读的JdbcTemplate\n     */\n    default NamedParameterJdbcTemplate read() {\n        return InternalDatasourceConfig.readForceAz(this, currentAz(), currentPaz(), &quot;read&quot;);\n    }   \n\n    /**\n     * 获取当前可用区单库读写的JdbcTemplate\n     */\n    default NamedParameterJdbcTemplate write() {\n        return InternalDatasourceConfig.writeForceAz(this, currentAz(), currentPaz(), &quot;write&quot;);\n    }\t\n  //....\n}\n</code></pre>\n<p>DefaultDataSourceConfig是一个接口类，默认封装了NamedParameterJdbcTemplate的创建，业务方通过继承该接口来定义数据源:</p>\n<pre><code class=\"language-kotlin\">enum class AdDataSources(\n    private val bizDef: BizDef,\n    private val forTest: AdDataSources? = null,\n    private val usingNewZk: Boolean = false\n) : DataSourceConfig{\n    adFansTopProfileDashboardTest,\n    adFansTopProfileDashboard,\n    adChargeTest,\n    adCharge,\n    adChargeReadOnly,\n    adDspReadOnlyTest,\n    adDspReadOnly;\n    public open fun bizName(): String {\n        return bizDef.bizName\n    }\n}\n</code></pre>\n<p>如果在业务中直接使用了DataSourceConfig创建的NamedParameterJdbcTemplate，那么我们就需要修改过程中创建的DataSource对象。那么，这里的DataSource究竟是怎么创建的呢？</p>\n<p>具体扒代码的过程就不赘述了，直接说结果吧，kuaishou-framework的数据源最终是通过DataSourceFactory进行创建的，具体代码如下：</p>\n<pre><code class=\"language-java\">public static ListenableDataSource&lt;Failover&lt;Instance&gt;&gt; create(Instance i) {\n   //...\n   try {\n       return supplyWithRetry(\n        DATA_SOURCE_BUILD_RETRY,\n        DATA_SOURCE_BUILD_RETRY_DELAY,\n        () -&gt; new ListenableDataSource&lt;&gt;(\n              bizName, \n              new HikariDataSource(config), ds -&gt; i.toString(), i),\n              DataSourceFactory::needRetry);\n                               \n  } catch (Throwable e) {/**/}\n}\n</code></pre>\n<p>由代码可以看到，这里的数据源实际上是通过new HikariDataSource(config)手动创建的，而DataSourceConfig又没有对外暴露创建的数据源，所以，我们该如何对DataSource代理呢?</p>\n<h3><strong>二、动态修改加载类</strong></h3>\n<p>成本最低的方式就是直接修改这段代码，将其中&#x7684;<em>&#x6E;ew HikariDataSource(config)</em>&#x4FEE;改&#x6210;<em>&#x6E;ew P6DataSource(new HikariDataSource(config))，</em>&#x90A3;么问题来了，这段代码属于基础组件包中的代码，基础架构组没有动力去修改，而我们又没有修改的权限，要想动这块代码，只能使用黑科技了。黑科技的手段有很多，那么问题又来了，哪种手段更合适呢？</p>\n<p>首先我们来分析一下，有哪些手段可以修改Java字节码？</p>\n<ul>\n<li>方案一、编译时修改，需要开发maven插件</li>\n</ul>\n<p>（不使用maven插件的同学咋办？）</p>\n<ul>\n<li>方案二、加载时修改，重写类加载器</li>\n</ul>\n<p>需要在代码中指定特定的类加载器，用有一定的侵入式</p>\n<ul>\n<li>方案三、运行时修改，使用JavaAgent</li>\n</ul>\n<p>需要修改应用启动参数，运维成本有点高</p>\n<p>首先要说明的是，这里不是对类方法进行增强，所以想使用cglib动态代理的想法是不可行的。前面三种方案都有一定的局限性：方案一比较麻烦，方案二侵入性强，方案三则需要使用JavaAgent技术，那有没有方案不使用Agent就可以动态修改已经加载的字节码呢？答案是没有，至少理论上没有。不过，好在天无绝人之路，JDK9之后，可以动态启动JavaAgent，这样就不用修改启动参数了。这里，我们选择使用byte-buddy进行字节码重写。</p>\n<p><em>下面是对动态启动Java Agent技术的解释</em></p>\n<blockquote>\n<p>Note that starting with Java 9, there is the Launcher-Agent-Class manifest attribute for jar files that can specify the class of a Java Agent to start before the class specified with the Main-Class is launched. That way, you can easily have your Agent collaborating with your application code in your JVM, without the need for any additional command line options. The Agent can be as simple as having an agentmain method in your main class storing the Instrumentation reference in a static variable.</p>\n</blockquote>\n<blockquote>\n<p>See <a href=\"https://docs.oracle.com/en/java/javase/15/docs/api/java.instrument/java/lang/instrument/package-summary.html#package.description\">the java.lang.instrument package documentation</a>…</p>\n</blockquote>\n<blockquote>\n<p>Getting hands on an Instrumentation instance when the JVM has not been started with Agents is trickier. It must support launching Agents after startup in general, e.g. via the Attach API. <a href=\"https://stackoverflow.com/a/19912148/2711488\">This answer</a> demonstrates at its end such a self-attach to get hands on the Instrumentation. When you have the necessary manifest attribute in your application jar file, you could even use that as agent jar and omit the creation of a temporary stub file.</p>\n</blockquote>\n<blockquote>\n<p>However, recent JVMs forbid self-attaching unless -Djdk.attach.allowAttachSelf=true has been specified at startup, but I suppose, taking additional steps at startup time, is precisely what you don’t want to do. One way to circumvent this, is to use another process. All this process has to to, is to attach to your original process and tell the JVM to start the Agent. Then, it may already terminate and everything else works the same way as before the introduction of this restriction.</p>\n</blockquote>\n<blockquote>\n<p>As mentioned in <a href=\"https://stackoverflow.com/questions/56787777/?noredirect=1&lq=1#comment100160373_56787777\">this comment</a>, Byte-Buddy has already implemented those necessary steps and the stripped-down Byte-Buddy-Agent contains that logic only, so you can use it to build your own logic atop it.</p>\n</blockquote>\n<ul>\n<li>字节码工具对比</li>\n</ul>\n<p><img src=\"https://static.yximgs.com/udata/pkg/EE-KSTACK/4223630ea14c6367968188fd52cafa26.png\" alt=\"图片\"></p>\n<ul>\n<li>使用bytebuddy修改字节码</li>\n</ul>\n<p>在实现代码之前，我们回过头来再看一下快手的数据源生成：</p>\n<pre><code class=\"language-java\">new ListenableDataSource&lt;&gt;(bizName, new HikariDataSource(config), ds -&gt; i.toString());\n</code></pre>\n<p>这里实际生成的数据源类型是ListenableDataSource，而ListenableDataSource刚好继承了DelegatingDataSource类，而DelegatingDataSource的构造方法如下：</p>\n<pre><code class=\"language-java\">public class DelegatingDataSource implements DataSource {\n   //...\n  public DelegatingDataSource(DataSource targetDataSource) {\n    this.setTargetDataSource(targetDataSource);\n   }\n\n  public void setTargetDataSource(@Nullable DataSource targetDataSource) {\n      this.targetDataSource = targetDataSource;\n  }\n  //...\n}\n</code></pre>\n<p>因此，我们可以通过改写DelegatingDataSource#setTargetDataSource方法，实现同样的效果，修改后的方法应该如下：</p>\n<pre><code class=\"language-java\">public void setTargetDataSource(@Nullable DataSource targetDataSource) {\n        this.targetDataSource = new P6DataSource(targetDataSource;\n}\n</code></pre>\n<p>那么具体如何修改字节码呢？这里是<a href=\"https://bytebuddy.net/#/tutorial\">官方文档</a>，原理我们不做赘述，直接介绍实现了。实现方式有三种：</p>\n<h4><strong>1、类文件替换</strong></h4>\n<p>假设你已经通过Java代码编译了新的类，现在要替换JVM中类的定义，代码如下：</p>\n<pre><code class=\"language-java\">new ByteBuddy()\n  .redefine(NewDelegatingDataSource.class)\n  .name(DelegatingDataSource.class.getName())\n  .make()\n  .load(Thread.currentThread().getContextClassLoader(), \n        ClassReloadingStrategy.fromInstalledAgent());\n</code></pre>\n<h4><strong>2、操作字节码：</strong></h4>\n<pre><code class=\"language-java\">new ByteBuddy()\n    .redefine(DelegatingDataSource.class)\n    //重写DelegatingDataSource#setTargetDataSource方法\n    .method(named(&quot;setTargetDataSource&quot;))\n    .intercept(MyImplementation.INSTANCE)\n    .make()\n    .load(Thread.currentThread().getContextClassLoader(),\n          ClassReloadingStrategy.fromInstalledAgent());\n\nenum MyImplementation implements Implementation {\n\nINSTANCE; // singleton\n\n  @Override\n  public InstrumentedType prepare(InstrumentedType instrumentedType) {\n  return instrumentedType;\n  }\n  \n  @Override\n  public ByteCodeAppender appender(Target implementationTarget) {\n  return MyAppender.INSTANCE;\n  }\n  \n}\n//字节码定义\nenum MyAppender implements ByteCodeAppender {\n\nINSTANCE; // singleton\n\n@Override\npublic Size apply(MethodVisitor methodVisitor,\n        Implementation.Context implementationContext,\n        MethodDescription instrumentedMethod) {\n  Label label0 = new Label();\n  methodVisitor.visitLabel(label0);\n  methodVisitor.visitLineNumber(70, label0);\n  methodVisitor.visitVarInsn(ALOAD, 0);\n  methodVisitor.visitTypeInsn(NEW, &quot;com/p6spy/engine/spy/P6DataSource&quot;);\n  methodVisitor.visitInsn(DUP);\n  methodVisitor.visitVarInsn(ALOAD, 1);\n  methodVisitor.visitMethodInsn(INVOKESPECIAL, &quot;com/p6spy/engine/spy/P6DataSource&quot;, &quot;&lt;init&gt;&quot;, &quot;(Ljavax/sql/DataSource;)V&quot;, false);\n  methodVisitor.visitFieldInsn(PUTFIELD, &quot;org/springframework/jdbc/datasource/DelegatingDataSource&quot;, &quot;targetDataSource&quot;, &quot;Ljavax/sql/DataSource;&quot;);\n  Label label1 = new Label();\n  methodVisitor.visitLabel(label1);\n  methodVisitor.visitLineNumber(71, label1);\n  methodVisitor.visitInsn(RETURN);\n  Label label2 = new Label();\n  methodVisitor.visitLabel(label2);\n  methodVisitor.visitLocalVariable(&quot;this&quot;, &quot;Lorg/springframework/jdbc/datasource/DelegatingDataSource;&quot;, null, label0, label2, 0);\n  methodVisitor.visitLocalVariable(&quot;targetDataSource&quot;, &quot;Ljavax/sql/DataSource;&quot;, null, label0, label2, 1);\n  methodVisitor.visitMaxs(4, 2);\n  return new Size(4, 2);\n  }\n}\n</code></pre>\n<p>上述代码的核心思想是字节操作字节码，操作字节码是非常复杂和繁重的事情，且无法debug，那么有没有比较方便的方式呢？</p>\n<p>我们可以手动改写Java代码，然后利用插件生成对应的字节码，然后在其基础上进行修改，研发成本会低很多。这里推荐IDEA的一个插件：Byte-Code-Analyzer，使用该插件可以查看类对应的ASM字节码:</p>\n<p><img src=\"https://static.yximgs.com/udata/pkg/EE-KSTACK/e31962a90f6598880e78d8254d6c74d9\" alt=\"图片\"></p>\n<h4><strong>3、利用byte-buddy的Advice</strong></h4>\n<pre><code class=\"language-java\"> public static void redefine() {\n   new ByteBuddy()\n     .redefine(DelegatingDataSource.class)\n     .visit(Advice.to(Decorator.class)\n            .on(ElementMatchers.named(&quot;setTargetDataSource&quot;)))\n     .make()\n     .load(Thread.currentThread().getContextClassLoader(),\n           ClassReloadingStrategy.fromInstalledAgent()).getLoaded();\n }\n\nstatic class Decorator {\n\n  //在方法开始插入代码\n  @Advice.OnMethodEnter\n    public static void enter(@Advice.Argument(value = 0, readOnly = false) DataSource dataSource) {\n    dataSource = new P6DataSource(dataSource);\n  }\n}\n</code></pre>\n<p>byte-buddy的Advisor和动态代理的原理不一样，他是直接修改方法体的字节码，上面的方法就是表示在方法开始插入一行，其效果如下：</p>\n<pre><code class=\"language-java\">public void setTargetDataSource(@Nullable DataSource targetDataSource) {\n  //插入的代码\n  targetDataSource = new P6DataSource(targetDataSource);\n  this.targetDataSource = targetDataSource;\n}\n</code></pre>\n<p>注：</p>\n<ol>\n<li>动态修改已加载的类，是有限制条件的，不能添加方法或者字段，因此通过byte-buddy的Methoddelegation方法修改字节码是不可行的。</li>\n<li>使用byte-buddy的Advice，可以对非Spring托管的类进行动态增强，因为是直接修改字节码，性能更好。</li>\n</ol>\n<h3><strong>三、自动生效</strong></h3>\n<p>前面我们讲了如何修改字节码，以提供SQL监控功能，那么如何让SQL监控自动生效呢？我们的目标是非侵入式解决方案：既不能修改业务代码，也不能更改系统配置。鉴于Java世界的事实标准，我们利用了SpringBoot-Starter功能，只需增加一个maven依赖，就自动提供了SQL监控能力。</p>\n<pre><code class=\"language-xml\">&lt;dependency&gt;\n  &lt;groupId&gt;com.kuaishou.ad&lt;/groupId&gt;\n  &lt;artifactId&gt;sqllog-spring-boot-starter&lt;/artifactId&gt;\n  &lt;version&gt;制品库查询最新版&lt;/version&gt;\n&lt;/dependency&gt;\n</code></pre>\n<p>至于SpringBoot-Starter的实现原理，网上资料很多，核心思想就是提供默认配置，开箱即用。需要注意的是，Spring6.0自动配置的方案有了调整，原来基于spring.factories的配置改成了org.springframework.boot.autoconfigure.AutoConfiguration.imports，原有的方式还支持，这对应普通应用没有影响，但是在实现Spring多容器隔离的方案上有一定的影响，后面有时间会展开讲一下。</p>\n<pre><code class=\"language-java\">private static String[] getConfigurations(File file) {\n  @EnableAutoConfiguration\n  class NoScan {\n    //用于扫描META-INF/spring/org.springframework.boot.autoconfigure.AutoConfiguration.imports,该类定义在方法中,是为了避免扫描当前类时被加载\n  }\n  FileClassLoader classLoader = new FileClassLoader(file);\n  AutoConfigurationImportSelector selector = new AutoConfigurationImportSelector();\n  selector.setBeanClassLoader(classLoader);\n  selector.setResourceLoader(new ClassLoaderResourcePatternResolver(classLoader));\n  selector.setEnvironment(new StandardEnvironment());\n  String[] configurations = selector.selectImports(new StandardAnnotationMetadata(NoScan.class));\n  return configurations;\n}\n</code></pre>\n<h3><strong>四、SQL打印效果</strong></h3>\n<p>sqllog-spring-boot-starter默认基于p6spy，并对SQL输出提供了扩展，打印SQL日志如下：</p>\n<p><img src=\"https://static.yximgs.com/udata/pkg/EE-KSTACK/28cd44d1451c960cfb982773aab6ec44\" alt=\"\"></p>\n<p>SQL的打印内容分为三部分：</p>\n<p>第一行，显示执行时间、耗时、SQL操作、数据库连接等信息</p>\n<p>第二行，显示参数化SQL</p>\n<p>第三行，显示绑定参数后的实际执行的SQL</p>\n<p>通过日志看到，当SQL语句超长时，系统会对参数化SQL进行个性化缩略，而对实际执行的SQL，则保持原样输出，这样可以检索关键信息。</p>\n"},{"slug":"tech/practice/Git常用命令","title":"Git常用命令","description":"git 不再追踪文件改动 git update-index --assume-unchanged filePath git 恢复追踪文件改动 git update-index --no-assume-unchanged filePath git 删除被管理的文件 git rm --cached fi...","pubDate":"2024-04-05","tags":["技术实战"],"content":"<h1>Git常用命令</h1>\n<h2>1、取消跟踪已版本控制的文件</h2>\n<p>git 不再追踪文件改动 git update-index --assume-unchanged filePath</p>\n<p>git 恢复追踪文件改动 git update-index --no-assume-unchanged filePath</p>\n<p>git 删除被管理的文件 git rm --cached filePath</p>\n<p>git 删除被管理的文件夹 git rm -r -f --cached filePath</p>\n"},{"slug":"tech/practice/Java构件发布到中央仓库","title":"Java构件发布到中央仓库","description":"Maven中央仓库并不支持直接发布jar包。我们需要将jar包发布到一些指定的第三方Maven仓库，然后该仓库再将jar包同步到Maven中央仓库。其中，最”简单”的方式是通过...","pubDate":"2024-04-04","tags":["技术实战"],"content":"<blockquote>\n<p><em>首先强调一下，Maven中央仓库并不支持直接发布jar包。我们需要将jar包发布到一些指定的第三方Maven仓库，然后该仓库再将jar包同步到Maven中央仓库。其中，最”简单”的方式是通过</em><a href=\"https://central.sonatype.org/pages/ossrh-guide.html\">Sonatype OSSRH</a><em>仓库来发布jar包。所以，接下来主要介绍如何将jar包发布到Sonatype OSSRH。</em></p>\n</blockquote>\n<p>首先，先说一下大体的步骤：</p>\n<ul>\n<li>注册Sonatype账号</li>\n<li>创建Issue，验证域名</li>\n<li>安装GPG，发布密钥</li>\n<li>配置Maven，发布构件</li>\n</ul>\n<p>这里面比较重要和容易出错的是第二步和第三步，下面一一详细介绍。</p>\n<h4>1、注册Sonatype账号 <a href=\"#bojci\" id=\"bojci\"></a></h4>\n<p>第一步很简单，登录官网，注册账号就好了<a href=\"https://issues.sonatype.org/secure/Signup!default.jspa\">Sign up for Jira - Sonatype JIRA</a></p>\n<p>注册完成，登陆后的界面如下：</p>\n<p><img src=\"/images/blog/tech/practice/image_60.png\" alt=\"image_60.png\"></p>\n<h4>2、创建Issue <a href=\"#omwqz\" id=\"omwqz\"></a></h4>\n<p>这里项目选择：Community Support - Open Source Project Repository Hosting (OSSRH)，问题 类型选择：New Project</p>\n<p><img src=\"/images/blog/tech/practice/image_67.png\" alt=\"image_67.png\"></p>\n<h4>2.1、补充项目信息</h4>\n<p><img src=\"/images/blog/tech/practice/image_62.png\" alt=\"image_62.png\"></p>\n<h4>2.2、验证域名 <a href=\"#snbg0\" id=\"snbg0\"></a></h4>\n<p>我们需要使用域名作为Group Id，如果你拥有域&#x540D;<em>&#x65;xample.com，则能够使用com.example开头作为Group Id，例如：com.example.myproject。其他一些栗子如下：</em></p>\n<ul>\n<li><em>example.com -&gt; com.example.domain</em></li>\n<li><a href=\"http://www.springframework.org/\">www.springframework.org</a> -&gt; org.springframework</li>\n<li>subdomain.example.com -&gt; example.com</li>\n<li>github.com/yourusername -&gt; io.github.yourusername</li>\n<li>my-domain.com -&gt; com.my-domain</li>\n</ul>\n<p>要想使用某个域名作为Group Id，你需要证明拥有该域名，至于如何证明，详见官方文档：<a href=\"https://central.sonatype.org/faq/how-to-set-txt-record\">https://central.sonatype.org/faq/how-to-set-txt-record/</a></p>\n<p>如果你没有自己的域名，则可以通过代码托管平台的账号关联子域名。假设你托管平台账户名为myusername，那么你可以通过以下托管平台验证Group Id ：</p>\n<p><img src=\"/images/blog/tech/practice/image_63.png\" alt=\"image_63.png\"></p>\n<p>由于我没有自己的域名，这里我选择使用github账号验证Group Id。点击“新建”按钮，完成提交，之后你的注册邮箱会收到一封邮件，显示创建项目信息：</p>\n<p><img src=\"/images/blog/tech/practice/image_65.png\" alt=\"image_65.png\"></p>\n<p>稍后还会收到一封审核邮件，提示你进行域名验证，时间延迟大概在十分钟以内。</p>\n<p><strong>2.3、人工审核及确认</strong></p>\n<p><img src=\"/images/blog/tech/practice/image_66.png\" alt=\"image_66.png\"></p>\n<p>我使用的是github账户，按邮件提示，需要在github平台上创建一个指定的临时工程。创建完成之后，可以在issue下面添加评论，触发验证。验证成功后，你会收到一份邮件：</p>\n<p><img src=\"/images/blog/tech/practice/image_68.png\" alt=\"image_68.png\"></p>\n<p>收到上述邮件，就表示完成了Group Id的验证，此时你就可以使用该Group Id或者子Group Id发布Maven构件了。如上，我填写的Group Id是 “io.github.nianien”，因此，我可以使用 “io.github.nianien”或者 “io.github.nianien.xxx” 作为项目的GroupId发布Maven构件。</p>\n<p>在通过Maven发布构件之前，我们需要进行Maven配置，这里还需要一些前置工作。</p>\n<h4>3、安装GPG，创建密钥 <a href=\"#dcxco\" id=\"dcxco\"></a></h4>\n<p>安装GPG的方式有多种，这里推荐图形化安装，因为通过命令行安装，由于找不到合适的密钥服务器，发布密钥时会失败。这里给出Mac版本的下载地址：<a href=\"https://releases.gpgtools.org/GPG_Suite-2022.1.dmg\">https://releases.gpgtools.org/GPG_Suite-2022.1.dmg</a></p>\n<ul>\n<li>创建密钥</li>\n</ul>\n<p><img src=\"/images/blog/tech/practice/image_69.png\" alt=\"image_69.png\"></p>\n<p>3.1、发布密钥</p>\n<p><img src=\"/images/blog/tech/practice/image_70.png\" alt=\"image_70.png\"></p>\n<p>发布成功后，收到一份邮件：</p>\n<p><img src=\"/images/blog/tech/practice/image_71.png\" alt=\"image_71.png\"></p>\n<p>按照邮件指示操作，完成密钥发布。密钥发布成功之后，下一步就是配置maven settings.xml和工程pom.xml文件。</p>\n<h4>4、配置Maven，发布构件 <a href=\"#amad1\" id=\"amad1\"></a></h4>\n<ul>\n<li>第一步，配置setting.xml文件，添加server节点：</li>\n</ul>\n<pre><code class=\"language-xml\">&lt;servers&gt;\n&lt;server&gt;\n    &lt;id&gt;ossrh&lt;/id&gt;\n    &lt;username&gt;sonatype账户名&lt;/username&gt;\n    &lt;password&gt;sonatype账户密码&lt;/password&gt;\n&lt;/server&gt;\n&lt;/servers&gt;\n&lt;profile&gt;\n  &lt;id&gt;ossrh&lt;/id&gt;\n  &lt;properties&gt;\n    &lt;gpg.executable&gt;gpg&lt;/gpg.executable&gt;\n    &lt;gpg.passphrase&gt;创建密钥时使用的密码&lt;/gpg.passphrase&gt;\n    &lt;gpg.homedir&gt;/Users/yourname/.gnupg&lt;/gpg.homedir&gt;\n   &lt;/properties&gt;\n&lt;/profile&gt;\n</code></pre>\n<ul>\n<li>第二步，配置pom.xml文件，添加必填项</li>\n</ul>\n<pre><code class=\"language-xml\">&lt;?xml version=&quot;1.0&quot; encoding=&quot;UTF-8&quot;?&gt;\n&lt;project xmlns=&quot;http://maven.apache.org/POM/4.0.0&quot; xmlns:xsi=&quot;http://www.w3.org/2001/XMLSchema-instance&quot;\n         xsi:schemaLocation=&quot;http://maven.apache.org/POM/4.0.0 http://maven.apache.org/xsd/maven-4.0.0.xsd&quot;&gt;\n    &lt;modelVersion&gt;4.0.0&lt;/modelVersion&gt;&lt;!--已经验证的Group Id--&gt;\n    &lt;groupId&gt;io.github.nianien&lt;/groupId&gt;\n    &lt;artifactId&gt;cudrania&lt;/artifactId&gt;\n    &lt;version&gt;1.0.1&lt;/version&gt;&lt;!--必填--&gt;\n    &lt;name&gt;io.github.nianien:cudrania&lt;/name&gt;&lt;!--必填--&gt;\n    &lt;description&gt;support tools for java development&lt;/description&gt;&lt;!--必填--&gt;\n    &lt;url&gt;https://github.com/nianien/cudrania&lt;/url&gt;\n    &lt;properties&gt;\n        &lt;project.build.sourceEncoding&gt;UTF-8&lt;/project.build.sourceEncoding&gt;\n        &lt;java.version&gt;17&lt;/java.version&gt;\n    &lt;/properties&gt;&lt;!--必填--&gt;\n    &lt;licenses&gt;\n        &lt;license&gt;\n            &lt;name&gt;The Apache Software License, Version 2.0&lt;/name&gt;\n            &lt;url&gt;https://www.apache.org/licenses/LICENSE-2.0.txt&lt;/url&gt;\n        &lt;/license&gt;\n    &lt;/licenses&gt;&lt;!--必填--&gt;\n    &lt;developers&gt;\n        &lt;developer&gt;\n            &lt;id&gt;nianien&lt;/id&gt;\n            &lt;name&gt;nianien&lt;/name&gt;\n            &lt;email&gt;nianien@126.com&lt;/email&gt;\n        &lt;/developer&gt;\n    &lt;/developers&gt;&lt;!--必填--&gt;\n    &lt;scm&gt;\n        &lt;connection&gt;https://github.com/nianien/cudrania.git&lt;/connection&gt;\n        &lt;developerConnection&gt;scm:git:ssh://git@github.com:nianien/cudrania.git\n        &lt;/developerConnection&gt;\n        &lt;url&gt;https://github.com/nianien/cudrania&lt;/url&gt;\n    &lt;/scm&gt;\n    &lt;build&gt;\n        &lt;pluginManagement&gt;\n            &lt;plugins&gt;\n                &lt;plugin&gt;\n                    &lt;groupId&gt;org.apache.maven.plugins&lt;/groupId&gt;\n                    &lt;artifactId&gt;maven-compiler-plugin&lt;/artifactId&gt;\n                    &lt;version&gt;3.11.0&lt;/version&gt;\n                    &lt;configuration&gt;\n                        &lt;source&gt;${java.version}&lt;/source&gt;\n                        &lt;target&gt;${java.version}&lt;/target&gt;\n                    &lt;/configuration&gt;\n                &lt;/plugin&gt;\n                &lt;plugin&gt;&lt;!--必填--&gt;\n                    &lt;groupId&gt;org.apache.maven.plugins&lt;/groupId&gt;\n                    &lt;artifactId&gt;maven-source-plugin&lt;/artifactId&gt;\n                    &lt;version&gt;3.3.0&lt;/version&gt;\n                    &lt;executions&gt;\n                        &lt;execution&gt;\n                            &lt;id&gt;attach-sources&lt;/id&gt;\n                            &lt;goals&gt;\n                                &lt;goal&gt;jar-no-fork&lt;/goal&gt;\n                            &lt;/goals&gt;\n                        &lt;/execution&gt;\n                    &lt;/executions&gt;\n                &lt;/plugin&gt;\n                &lt;plugin&gt;&lt;!--必填--&gt; \n                    &lt;groupId&gt;org.apache.maven.plugins&lt;/groupId&gt;\n                    &lt;artifactId&gt;maven-javadoc-plugin&lt;/artifactId&gt;\n                    &lt;version&gt;3.5.0&lt;/version&gt;\n                    &lt;executions&gt;\n                        &lt;execution&gt;\n                            &lt;id&gt;attach-javadocs&lt;/id&gt;\n                            &lt;goals&gt;\n                                &lt;goal&gt;jar&lt;/goal&gt;\n                            &lt;/goals&gt;\n                            &lt;configuration&gt;\n                                &lt;additionalparam&gt;\n                                    -Xdoclint:none\n                                &lt;/additionalparam&gt;\n                            &lt;/configuration&gt;\n                        &lt;/execution&gt;\n                    &lt;/executions&gt;\n                &lt;/plugin&gt;&lt;!--必填--&gt;\n                &lt;plugin&gt;\n                    &lt;groupId&gt;org.apache.maven.plugins&lt;/groupId&gt;\n                    &lt;artifactId&gt;maven-gpg-plugin&lt;/artifactId&gt;\n                    &lt;version&gt;3.1.0&lt;/version&gt;\n                    &lt;executions&gt;\n                        &lt;execution&gt;\n                            &lt;id&gt;sign-artifacts&lt;/id&gt;\n                            &lt;phase&gt;verify&lt;/phase&gt;\n                            &lt;goals&gt;\n                                &lt;goal&gt;sign&lt;/goal&gt;\n                            &lt;/goals&gt;\n                        &lt;/execution&gt;\n                    &lt;/executions&gt;\n                &lt;/plugin&gt;\n            &lt;/plugins&gt;\n        &lt;/pluginManagement&gt;\n        &lt;plugins&gt;\n            &lt;plugin&gt;\n                &lt;groupId&gt;org.apache.maven.plugins&lt;/groupId&gt;\n                &lt;artifactId&gt;maven-compiler-plugin&lt;/artifactId&gt;\n            &lt;/plugin&gt;\n            &lt;plugin&gt;\n                &lt;groupId&gt;org.apache.maven.plugins&lt;/groupId&gt;\n                &lt;artifactId&gt;maven-source-plugin&lt;/artifactId&gt;\n            &lt;/plugin&gt;\n            &lt;plugin&gt;\n                &lt;groupId&gt;org.apache.maven.plugins&lt;/groupId&gt;\n                &lt;artifactId&gt;maven-javadoc-plugin&lt;/artifactId&gt;\n            &lt;/plugin&gt;\n        &lt;/plugins&gt;\n    &lt;/build&gt;\n\n    &lt;profiles&gt;&lt;!--必填--&gt;\n        &lt;profile&gt;\n            &lt;id&gt;ossrh&lt;/id&gt;\n            &lt;build&gt;\n                &lt;plugins&gt;\n                    &lt;plugin&gt;&lt;!--必填--&gt;\n                        &lt;groupId&gt;org.sonatype.plugins&lt;/groupId&gt;\n                        &lt;artifactId&gt;nexus-staging-maven-plugin&lt;/artifactId&gt;\n                        &lt;version&gt;1.6.13&lt;/version&gt;\n                        &lt;extensions&gt;true&lt;/extensions&gt;\n                        &lt;configuration&gt;\n                            &lt;serverId&gt;ossrh&lt;/serverId&gt;\n                            &lt;nexusUrl&gt;https://s01.oss.sonatype.org/&lt;/nexusUrl&gt; \n                          &lt;autoReleaseAfterClose&gt;true&lt;/autoReleaseAfterClose&gt;\n                        &lt;/configuration&gt;\n                    &lt;/plugin&gt;\n                    &lt;plugin&gt;&lt;!--必填--&gt;\n                        &lt;groupId&gt;org.apache.maven.plugins&lt;/groupId&gt;\n                        &lt;artifactId&gt;maven-gpg-plugin&lt;/artifactId&gt;\n                    &lt;/plugin&gt;\n                &lt;/plugins&gt;\n            &lt;/build&gt;&lt;!--必填--&gt;\n            &lt;distributionManagement&gt;\n                &lt;snapshotRepository&gt;\n                    &lt;id&gt;ossrh&lt;/id&gt;\n                  &lt;url&gt;https://s01.oss.sonatype.org/content/repositories/snapshots\n                    &lt;/url&gt;\n                &lt;/snapshotRepository&gt;\n                &lt;repository&gt;\n                    &lt;id&gt;ossrh&lt;/id&gt;\n                    &lt;url&gt;https://s01.oss.sonatype.org/service/local/staging/deploy/maven2/\n                    &lt;/url&gt;\n                &lt;/repository&gt;\n            &lt;/distributionManagement&gt;\n        &lt;/profile&gt;\n    &lt;/profiles&gt;\n\n    &lt;dependencies&gt;&lt;!--maven依赖--&gt;&lt;/dependencies&gt;\n\n&lt;/project&gt;\n</code></pre>\n<p>上面已经是最精简的pom配置了，我已经把必选项标注好了。这里主要包含两部分内容，一部分是snoatype要求的必备信息，包括：证书、开发者信息、仓库地址和发布地址；另一部分是deploy需要的maven插件列表，大家可以根据实际情况酌情修改。</p>\n<p>需要说明的是，为了不用默认打包冲突，专门定义了用于发布中央仓库的profile：ossrh，这里只需要添加额外的两个插件：nexus-staging-maven-plugin和maven-gpg-plugin，前者用于jar上传，后者用于密钥签名。</p>\n<ul>\n<li>第三步，执行maven命令，发布构件</li>\n</ul>\n<p>配置好pom文件，可以执行maven命令：“mvn clean deploy -Possrh” 进行发布。如果版本号带SNAPSHOT后缀，会发布到snapshots仓库，否则发布到release仓库。</p>\n<p>这里nexus-staging-maven-plugin插件有一个配置项：autoReleaseAfterClose，如果设置为true的话，推送完成会自动release。第一次发布成功后，会收到一封邮件：</p>\n<p><img src=\"/images/blog/tech/practice/image_72.png\" alt=\"image_72.png\"></p>\n<ul>\n<li><em><strong>最后，让jar包更快的在中央仓库被搜索到</strong></em></li>\n</ul>\n<p>根据邮件提示，Jar包成功发布成功后，大约30分钟后会推到中央仓库，我们可以从仓库地址看到我们发布的Jar包：<a href=\"https://repo1.maven.org/maven2\">https://repo1.maven.org/maven2/</a></p>\n<p><img src=\"/images/blog/tech/practice/image_73.png\" alt=\"image_73.png\"></p>\n<p>此时，其他项目就可以通过maven依赖引用我们的构件了，但是这时候通过中央仓库仍然搜不到我们的Maven构件。按照邮件提示可能会需要四小时，实际情况是我等了5个小时依然搜不到。如果遇到这种情况，我们可以通过在对issue添加评论反馈，会有人工回复进行解决：</p>\n<p><img src=\"/images/blog/tech/practice/image_74.png\" alt=\"image_74.png\"></p>\n<p>另外，关于mvnrepository与Maven Central的关系，有人咨询，官方也做了解答：</p>\n<p><img src=\"/images/blog/tech/practice/image_75.png\" alt=\"image_75.png\"></p>\n<p>根据我的实际经验判断，mvnrepository应该是定时同步的，我发布成功后，第二天才能搜到：</p>\n<p><img src=\"/images/blog/tech/practice/image_76.png\" alt=\"image_76.png\"></p>\n<p>下面是官方指导文档，介绍非常详细，基本上不用在网上搜索其他教程了。</p>\n<h4>官方参考文档 <a href=\"#dzquo\" id=\"dzquo\"></a></h4>\n<p><a href=\"https://central.sonatype.org/publish/publish-guide\">https://central.sonatype.org/publish/publish-guide/</a></p>\n"},{"slug":"tech/practice/Maven使用技巧","title":"Maven使用技巧","description":"手把手教你如何在工作中巧妙使用Maven，提升开发效率。","pubDate":"2024-04-03","tags":["技术实战"],"content":"<h1>Maven使用技巧</h1>\n<h3>1、使用maven.config定制化配置</h3>\n<p>Located within the project&#39;s <strong>top level directory</strong>, the files</p>\n<ul>\n<li><code>maven.config</code></li>\n<li><code>jvm.config</code></li>\n<li><code>extensions.xml</code></li>\n</ul>\n<p>contain project specific configuration for running Maven.</p>\n<p>This directory is part of the project and may be checked in into your version control.</p>\n<blockquote>\n<p>ref：<a href=\"https://maven.apache.org/configure.html\">https://maven.apache.org/configure.html</a></p>\n</blockquote>\n<p>常见配置如：</p>\n<pre><code class=\"language-bash\">-Dmaven.test.skip=true\n--settings\n/Users/skyfalling/.m2/settings.xml\n</code></pre>\n<p>There must not be a whitespace after <code>--settings,</code>With the introduction of <code>maven 3.9</code>, there was a BREAKING CHANGE that affects the parsing of the <code>maven.config</code> file:</p>\n<p>Each line in <code>.mvn/maven.config</code> is now interpreted as a single argument. That is, if the file contains multiple arguments, these must now be placed on separate lines.</p>\n"},{"slug":"tech/microservice/服务注册与发现（实践篇）","title":"服务注册与发现（实践篇）","description":"前面我们对业内几种比较常见的注册中心做了介绍：Eureka、Zookeeper、Consul、Etcd。 并且在各个指标上做了对比：注册方式（watch/polling）、健康检查、雪崩保护、安全与权限，以及在Spring Cloud、Dubbo、Kubernets上的支持程度。方便我们在不同的场景...","pubDate":"2024-04-02","tags":["微服务架构","技术专题"],"content":"<h2>1 服务注册中心 <a href=\"#scroller-1\" id=\"scroller-1\"></a></h2>\n<p>前面我们对业内几种比较常见的注册中心做了介绍：Eureka、Zookeeper、Consul、Etcd。</p>\n<p>并且在各个指标上做了对比：注册方式（watch/polling）、健康检查、雪崩保护、安全与权限，以及在Spring Cloud、Dubbo、Kubernets上的支持程度。方便我们在不同的场景下做正确的技术选型。</p>\n<table>\n<thead>\n<tr>\n<th><strong>指标</strong></th>\n<th><strong>Eureka</strong></th>\n<th><strong>Zookeeper</strong></th>\n<th><strong>Consul</strong></th>\n<th><strong>Etcd</strong></th>\n</tr>\n</thead>\n<tbody><tr>\n<td>一致性协议</td>\n<td>AP</td>\n<td>CP（Paxos算法）</td>\n<td>CP（Raft算法）</td>\n<td>CP（Raft算法）</td>\n</tr>\n<tr>\n<td>健康检查</td>\n<td>TTL(Time To Live)</td>\n<td>TCP Keep Alive</td>\n<td>TTL\\HTTP\\TCP\\Script</td>\n<td>Lease TTL KeepAlive</td>\n</tr>\n<tr>\n<td>watch/long polling</td>\n<td>不支持</td>\n<td>watch</td>\n<td>long polling</td>\n<td>watch</td>\n</tr>\n<tr>\n<td>雪崩保护</td>\n<td>支持</td>\n<td>不支持</td>\n<td>不支持</td>\n<td>不支持</td>\n</tr>\n<tr>\n<td>安全与权限</td>\n<td>不支持</td>\n<td>ACL</td>\n<td>ACL</td>\n<td>RBAC</td>\n</tr>\n<tr>\n<td>是否支持多数据中心</td>\n<td>是</td>\n<td>否</td>\n<td>是</td>\n<td>否</td>\n</tr>\n<tr>\n<td>是否有管理界面</td>\n<td>是</td>\n<td>否（可用第三方ZkTools）</td>\n<td>是</td>\n<td>否</td>\n</tr>\n<tr>\n<td>Spring Cloud 集成</td>\n<td>支持</td>\n<td>支持</td>\n<td>支持</td>\n<td>支持</td>\n</tr>\n<tr>\n<td>Dubbo 集成</td>\n<td>不支持</td>\n<td>支持</td>\n<td>支持</td>\n<td>不支持</td>\n</tr>\n<tr>\n<td>K8S 集成</td>\n<td>不支持</td>\n<td>不支持</td>\n<td>支持</td>\n<td>支持</td>\n</tr>\n</tbody></table>\n<p>我们可以看出，四种技术类型对Spring Cloud的支持度都很高。Spring Cloud是微服务架构的一站式解决方案，我们平时构建微服务的过程中需要做的的如 配置管理、服务发现、负载均衡、断路器、智能路由、控制总线、全局锁、决策竞选、分布式会话和集群状态管理等操作。Spring Cloud 为我们提供了一套简易的编程模型，使我们能在 Spring Boot 的基础上轻松地实现微服务项目的构建。</p>\n<p>Spring Cloud包含了多个不同开源产品，来保证一站式的微服务解决方案，如：Spring Cloud Config、Spring Cloud Netflix、Spring Cloud Security、Spring Cloud Commons、Spring Cloud Zookeeper、Spring Cloud CLI等项目。</p>\n<h2>2 Spring Cloud 框架下实现 <a href=\"#scroller-2\" id=\"scroller-2\"></a></h2>\n<p>Spring Cloud为服务治理做了一层抽象，这样能够支持多种不同的服务治理框架，比如：Netflix Eureka、Consul。我们这边就以这两个为例子，看看服务治理是如何实现。</p>\n<blockquote>\n<p><em>在Spring Cloud服务治理抽象层的作用下，可以无缝地切换服务治理实现，且不影响任何其他的服务注册、发现、调用逻辑。</em></p>\n<p><em>所以，下面我们通过介绍这两种服务治理的实现来体会Spring Cloud这一层抽象所带来的好处。</em></p>\n</blockquote>\n<h3>2.1 Spring Cloud Eureka <a href=\"#scroller-3\" id=\"scroller-3\"></a></h3>\n<p>Spring Cloud Eureka是Spring Cloud Netflix项目下的服务治理模块。而Spring Cloud Netflix项目是Spring Cloud的子项目之一，主要内容是对Netflix公司一系列开源产品的包装，它为Spring Boot应用提供了自配置的Netflix OSS整合。</p>\n<p>通过一些简单的注解，开发者就可以快速的在应用中配置一下常用模块并构建庞大的分布式系统。它主要提供的模块包括：服务发现（Eureka），断路器（Hystrix），智能路由（Zuul），客户端负载均衡（Ribbon）等。</p>\n<p>下面，就来具体看看如何使用Spring Cloud Eureka实现服务治理。</p>\n<h4>2.1.1 创建注册中心 <a href=\"#scroller-4\" id=\"scroller-4\"></a></h4>\n<p>创建一个Spring Cloud项目，我们命名为micro-service-center，并在<code>pom.xml</code>中引入需要的依赖内容：</p>\n<pre><code class=\"language-xml\"> &lt;packaging&gt;pom&lt;/packaging&gt;\n</code></pre>\n<p>表明这个项目中可以没有Java代码，也不执行任何代码，只是为了聚合工程或者传递依赖，所以可以把src文件夹删了。这是一个父级项目，因为我们还要在下面建立Eureka的注册中心、客户端等多个子项目 。</p>\n<p>在micro-service-center下，新建一个命名为 eureka-service 的Module，依旧是Spring Cloud 项目，建完之后，pom.xml做如下改动：</p>\n<pre><code class=\"language-xml\"> 1 &lt;!--    在子工程中添加父工程名称--&gt;\n 2 &lt;parent&gt;\n 3     &lt;groupId&gt;com.microservice&lt;/groupId&gt;\n 4     &lt;artifactId&gt;center&lt;/artifactId&gt;\n 5     &lt;version&gt;1.0.0&lt;/version&gt;\n 6 &lt;/parent&gt;\n 7 \n 8 \n 9 &lt;dependencies&gt;\n&lt;!--   加入 eureka 服务 --&gt;\n        &lt;dependency&gt;\n            &lt;groupId&gt;org.springframework.cloud&lt;/groupId&gt;\n            &lt;artifactId&gt;spring-cloud-netflix-eureka-server&lt;/artifactId&gt;\n        &lt;/dependency&gt;\n&lt;/dependencies&gt;\n</code></pre>\n<p>改完之后，回到父项目micro-service-center，修改pom中的信息：</p>\n<pre><code class=\"language-xml\"> 1 &lt;groupId&gt;com.microservice&lt;/groupId&gt;\n 2 &lt;artifactId&gt;center&lt;/artifactId&gt;\n 3 &lt;packaging&gt;pom&lt;/packaging&gt;\n 4 &lt;version&gt;1.0.0&lt;/version&gt;\n 5 &lt;name&gt;center&lt;/name&gt;\n 6 &lt;description&gt;Demo project for Spring Boot&lt;/description&gt;\n 7 \n 8 &lt;!--    在父工程添加子工程名称--&gt;\n 9 &lt;modules&gt;\n   &lt;module&gt;eureka-service&lt;/module&gt;\n   &lt;module&gt;eureka-client&lt;/module&gt;\n&lt;/modules&gt;\n</code></pre>\n<p>对两个项目进行clean + install，应该是成功的。</p>\n<p>eureka-service我们是作为注册中心来用的，所以在它的主类Application中加入<code>@EnableEurekaServer</code>注解，就能开启注册中心功能。</p>\n<pre><code class=\"language-java\">@SpringBootApplication\n@EnableEurekaServer\npublic class ServiceApplication {\n    public static void main(String[] args) {\n        SpringApplication.run(ServiceApplication.class, args);\n        System.out.println(&quot;Start Eureka Service&quot;);\n    }\n}\n</code></pre>\n<p>但是默认情况下，该注册中心也会把自己当做客户端，那就变成自己注册自己了，这个是可以剔除的，我们看一下它的YAML中的详细配置，注释比较清楚：</p>\n<pre><code class=\"language-yaml\"> 1 server:\n 2   port: 1000\n 3 spring:\n 4   application:\n 5     name: eureka-server\n 6 eureka:\n 7   instance:\n 8     hostname: localhost\n 9   client:\n    register-with-eureka: false  # 不作为客户端进行注册\n    fetch-registry: false  # 不获取注册列表\n    service-url:  # 注册地址，客户端需要注册到该地址中\n      defaultZone: http://${eureka.instance.hostname}:${server.port}/eureka/\n</code></pre>\n<p>文中的注释还是比较清楚的。 这边可以看到，端口号是1000，所以当工程启动之后，访问 <a href=\"http://localhost:1000/\">http://localhost:1000/</a> 是可以看到Eureka注册中心页面的。其中还没有发现任何服务。</p>\n<p><img src=\"/images/blog/tech/microservice/image_7_1.png\" alt=\"image_7_1.png\"></p>\n<h4>2.1.2 创建客户端 <a href=\"#scroller-5\" id=\"scroller-5\"></a></h4>\n<p>目前服务中心还是空的，所以我们创建一个能够提供服务的客户端，并将其注册到注册中心去。</p>\n<p>同样的，我们创建一个Spring Cloud的子项目，命名为<code>eureka-client</code>，<code>pom.xml</code>中的配置如下：</p>\n<pre><code class=\"language-xml\"> 1 &lt;!--    在子工程中添加父工程名称--&gt;\n 2 &lt;parent&gt;\n 3     &lt;groupId&gt;com.microservice&lt;/groupId&gt;\n 4     &lt;artifactId&gt;center&lt;/artifactId&gt;\n 5     &lt;version&gt;1.0.0&lt;/version&gt;\n 6 &lt;/parent&gt;\n 7 \n 8 \n 9 &lt;dependencies&gt;\n\n&lt;!--    加入 eureka 服务 --&gt;\n&lt;dependency&gt;\n    &lt;groupId&gt;org.springframework.cloud&lt;/groupId&gt;\n    &lt;artifactId&gt;spring-cloud-netflix-eureka-server&lt;/artifactId&gt;\n&lt;/dependency&gt;\n\n&lt;dependency&gt;\n    &lt;groupId&gt;org.projectlombok&lt;/groupId&gt;\n    &lt;artifactId&gt;lombok&lt;/artifactId&gt;\n&lt;/dependency&gt;\n\n&lt;/dependencies&gt;\n</code></pre>\n<p>在应用主类Application文件中通过加上<code>@EnableDiscoveryClient</code>注解，该注解保证当前服务被Eureka当成provider发现。</p>\n<pre><code class=\"language-java\">@SpringBootApplication\n@EnableDiscoveryClient\npublic class ClientApplication {\n    public static void main(String[] args) {\n        SpringApplication.run(ClientApplication.class, args);\n        System.out.println(&quot;start client!&quot;);\n    }\n}jC\n</code></pre>\n<p>在YAML文件上加上如下配置：</p>\n<pre><code class=\"language-yaml\">server:\n  port: 1001\nspring:\n  application:\n    name: eureka-client\neureka:\n  client:\n    service-url:  # 这边就保证了注册到 eureka-service 这个注册中心去\n      defaultZone: http://localhost:1000/eureka/\n</code></pre>\n<p><code>spring.application.name</code>属性，指定了微服务的名称，在调用的时候可以通过该名称进行服务访问。<code>eureka.client.serviceUrl.defaultZone</code>属性对应服务注册中心的配置内容，指定服务注册中心的位置。</p>\n<p>大家看到，这边端口设置为1001，那是因为要在本机上测试 服务提供方 和 服务注册中心，所以<code>server的port</code>属性需设置不同的端口。</p>\n<p>最后，我们再写一个接口，通过DiscoveryClient对象，在客户端中获取注册中心的所有服务信息。</p>\n<pre><code class=\"language-java\"> 1 @Controller\n 2 @RequestMapping(&quot;/eurekacenter&quot;)\n 3 public class EuServiceController {\n 4 \n 5     @Autowired\n 6     DiscoveryClient discoveryClient;\n 7 \n 8     /**\n 9      * 获取注册服务信息\n     */\n    @RequestMapping(value = &quot;/service&quot;, method = {RequestMethod.GET})\n    @ResponseBody\n    public String getServiceInfo() {\n       return  &quot;service:&quot;+discoveryClient.getServices()+&quot; , memo:&quot;+discoveryClient.description();\n    }\n}\n</code></pre>\n<p>这时候跑一下试试看，继续访问之前的地址：<a href=\"http://localhost:1000/\">http://localhost:1000/</a> ，可以看到Eureka注册中心页面已经包含一个我们定义的服务了，就是上面新建的 1001 端口的服务。</p>\n<p><img src=\"/images/blog/tech/microservice/image_7_2.png\" alt=\"image_7_2.png\"></p>\n<p>同样，我们可以调用上面的那个获取注册服务信息的接口，从服务发现的角度看看有多少个服务被注册到注册中心去。 <a href=\"http://localhost:1001/eurekacenter/service\">http://localhost:1001/eurekacenter/service</a></p>\n<p><img src=\"/images/blog/tech/microservice/image_7_3.png\" alt=\"image_7_3.png\"></p>\n<p>如上图所示，方括号中的<code>eureka-client</code>通过Spring Cloud定义的 getServiceInfo 接口在eureka的实现中获取到的所有服务清单，他是一个String的List，如果注册了多个提供者，就会全部显示。</p>\n<h3>2.2 Spring Cloud Consul <a href=\"#scroller-6\" id=\"scroller-6\"></a></h3>\n<p>Consul 用于实现分布式系统的服务发现与配置。与其它分布式服务注册与发现的方案，Consul 的方案更具“一站式”特征，内置了服务注册与发现框 架、分布一致性协议实现、健康检查、Key/Value 存储、多数据中心方案，不再需要依赖其它工具（比如 ZooKeeper 之类的）。</p>\n<p>而Spring Cloud Consul ，是将其作为一个整体，在微服务架构中为我们的基础设施提供服务发现和服务配置的工具。</p>\n<h4>2.2.1 Consul 的优势 <a href=\"#scroller-7\" id=\"scroller-7\"></a></h4>\n<p>1、使用 Raft 算法来保证一致性, 比复杂的 Paxos 算法更直接。</p>\n<p>2、支持多数据中心，内外网的服务采用不同的端口进行监听。 多数据中心集群可以避免单数据中心的单点故障,而其部署则需要考虑网络延迟, 分片等情况等。 zookeeper 和 etcd 均不提供多数据中心功能的支持，上面表格中有体现。</p>\n<p>3、支持健康检查。</p>\n<p>4、支持 http 和 dns 协议接口。 zookeeper 的集成较为复杂, etcd 只支持 http 协议。</p>\n<p>5、官方提供 web 管理界面, etcd 无此功能。</p>\n<h4>2.2.2 Consul的特性 <a href=\"#scroller-8\" id=\"scroller-8\"></a></h4>\n<p>1、服务发现</p>\n<p>2、健康检查</p>\n<p>3、Key/Value存储</p>\n<p>4、多数据中心</p>\n<h4>2.2.3 安装Consul注册中心 <a href=\"#scroller-9\" id=\"scroller-9\"></a></h4>\n<p>1、官方下载64版本 ：<a href=\"https://www.consul.io/downloads.html\">https://www.consul.io/downloads.html</a></p>\n<p>2、解压后复制到目录 /usr/local/bin 下</p>\n<p>3、启动终端，先看下啥版本的</p>\n<pre><code class=\"language-sh\">liyifei@MacPro ~ % consul --version\nConsul v1.10.4\nRevision 7bbad6fe\nProtocol 2 spoken by default, understands 2 to 3 (agent will automatically use protocol &gt;2 when speaking to compatible agents)\n</code></pre>\n<p>4、执行安装命令，可以看到他的 Client Addr 的端口为8500。所以访问 8500端口站点，<a href=\"http://127.0.0.1:8500/ui/dc1/services\">http://127.0.0.1:8500/ui/dc1/services</a></p>\n<pre><code class=\"language-sh\">  liyifei@MacPro ~ % consul agent -dev\n  ==&gt; Starting Consul agent...\n             Version: &#39;1.10.4&#39;\n             Node ID: &#39;6db154b4-62ff-e67d-e745-1a7270fa1ce8&#39;\n           Node name: &#39;B000000147796DS&#39;\n          Datacenter: &#39;dc1&#39; (Segment: &#39;&lt;all&gt;&#39;)\n              Server: true (Bootstrap: false)\n         Client Addr: [127.0.0.1] (HTTP: 8500, HTTPS: -1, gRPC: 8502, DNS: 8600)\n        Cluster Addr: 127.0.0.1 (LAN: 8301, WAN: 8302)\n           Encrypt: Gossip: false, TLS-Outgoing: false, TLS-Incoming: false, Auto-Encrypt-TLS: false\n</code></pre>\n<p><img src=\"/images/blog/tech/microservice/image_7_4.png\" alt=\"image_7_4.png\"></p>\n<p>我们可以看到，现在没有客户端注册上来，只有一个自身的实例。</p>\n<h4>2.2.4 创建服务提供者 <a href=\"#scroller-10\" id=\"scroller-10\"></a></h4>\n<p>由于Spring Cloud Consul项目的实现，我们可以轻松的将基于Spring Boot的微服务应用注册到Consul上，并通过此实现微服务架构中的服务治理。</p>\n<p>我们在micro-service-center下新建一个cloud项目consul-client，该项目pom文件添加如下：</p>\n<pre><code class=\"language-xml\">&lt;xml&gt;\n  &lt;!--    在子工程中添加父工程名称--&gt;\n  &lt;parent&gt;\n    &lt;groupId&gt;com.microservice&lt;/groupId&gt;\n    &lt;artifactId&gt;center&lt;/artifactId&gt;\n    &lt;version&gt;1.0.0&lt;/version&gt;\n  &lt;/parent&gt;\n  \n  &lt;dependencies&gt;\n    &lt;!--        Consul服务发现--&gt;\n    &lt;dependency&gt;\n        &lt;groupId&gt;org.springframework.cloud&lt;/groupId&gt;\n        &lt;artifactId&gt;spring-cloud-starter-consul-discovery&lt;/artifactId&gt;\n    &lt;/dependency&gt;\n    &lt;!--        Consul健康检查--&gt;\n    &lt;dependency&gt;\n        &lt;groupId&gt;org.springframework.boot&lt;/groupId&gt;\n        &lt;artifactId&gt;spring-boot-starter-actuator&lt;/artifactId&gt;\n    &lt;/dependency&gt;\n  &lt;/dependencies&gt;\n&lt;/xml&gt;\n</code></pre>\n<p>然后修改一下<code>application.yml的配置信息</code>，将consul配置写入，注释应该很清楚了，如下：</p>\n<pre><code class=\"language-yaml\">spring:\n  application:\n    name: consul-producer # 当前服务的名称\n  cloud:\n    consul: # 以下为Consuk注册中心的地址，如果安装的不是这个host和port，这边可以调整\n      host: localhost\n      port: 8500\nserver:\n  port: 8501 # 当前服务的端口\n</code></pre>\n<p>同样的，我们要在应用主类Application文件中通过加上<code>@EnableDiscoveryClient</code>注解，该注解保证当前服务被Consul当成provider发现。</p>\n<p>大家看到这个做法跟Eureka一样，因为Spring Cloud对服务治理做的一层抽象，所以可以屏蔽Eureka和Consul服务治理的实现细节，</p>\n<p>程序上不需要做改变，只需要引入不同的服务治理依赖，并配置相关的配置属性 就能轻松的将微服务纳入Spring Cloud的各个服务治理框架中。</p>\n<pre><code class=\"language-java\">@SpringBootApplication\n@EnableDiscoveryClient\npublic class ConsulClientApplication {\n    public static void main(String[] args) {\n        SpringApplication.run(ClientApplication.class, args);\n    }\n}\n</code></pre>\n<p>修改完成之后，我们就可以把这个服务提供者启动了，然后再去注册中心查看服务的注册情况，就可以看到被注册进来的Provider（consul-producer）：</p>\n<p><img src=\"/images/blog/tech/microservice/image_7_5.png\" alt=\"image_7_5.png\"></p>\n<h2>3 总结 <a href=\"#scroller-11\" id=\"scroller-11\"></a></h2>\n<p>除了 Eureka、Consul，还有其他的的注册中心技术，如Zookeeper、Nocas等。但无论何种注册中心技术，本质上都是为了解决微服务中的如下问题：</p>\n<p><strong>解耦服务之间相互依赖的细节</strong></p>\n<p>我们知道服务之间的远程调用必须要知道对方的IP、端口信息。我们可以在调用方直接配置被调用方的IP、端口，这种调用方直接依赖IP、端口的方式存在明显的问题，如被调用的IP、端口变化后，调用方法也要同步修改。</p>\n<p>通过服务发现，将服务之间IP与端口的依赖转化为服务名的依赖，服务名可以根据具微服务业务来做标识，因此，屏蔽、解耦服务之间的依赖细节是服务发现与注册解决的第一个问题。</p>\n<p><strong>对微服务进行动态管理</strong></p>\n<p>在微服务架构中，服务众多，服务之间的相互依赖也错综复杂，无论是服务主动停止，意外挂掉，还是因为流量增加对服务实现进行扩容，这些服务数据或状态上的动态变化，都需要尽快的通知到被调用方，被调用方才采取相应的措施。因此，对于服务注册与发现要实时管理者服务的数据与状态，包括服务的注册上线、服务主动下线，异常服务的剔除。</p>\n"},{"slug":"tech/microservice/服务注册与发现","title":"服务注册与发现","description":"我们前面在全景架构中对服务注册与发现做了大致的说明，本章我们着重详细说明微服务下注册与发现的这个能力。微服务注册与发现类似于生活中的电话通讯录的概念，它记录了通讯录服务和电话的映射关系。","pubDate":"2024-04-01","tags":["微服务架构","技术专题"],"content":"<h2>1 微服务的注册与发现 <a href=\"#scroller-1\" id=\"scroller-1\"></a></h2>\n<p>我们前面在全景架构中对服务注册与发现做了大致的说明，本章我们着重详细说明微服务下注册与发现的这个能力。</p>\n<p>微服务注册与发现类似于生活中的&quot;电话通讯录&quot;的概念，它记录了通讯录服务和电话的映射关系。在分布式架构中，服务会注册进去，当服务需要调用其它服务时，就这里找到服务的地址，进行调用。</p>\n<p>步骤如下：</p>\n<p>1、你先要把&quot;好友某某&quot;记录在通讯录中。</p>\n<p>2、拨打电话的时候通过通讯录中找到&quot;好友某某&quot;，并拨通回电话。</p>\n<p>3、当好友某某电话号码更新的时候，需要通知到你，并修改通讯录服务中的号码。</p>\n<p>从这个过程中我们看到了一些特点：</p>\n<p>1、把 &quot;好友某某&quot; 的电话号码写入通讯录中，统一在通讯录中维护，后续号码变更也是更新到通讯录中，这个过程就是服务注册的过程。</p>\n<p>2、后续我们通过&quot;好友某某&quot;就可以定位到通讯录中的电话号码，并拨通电话，这个过程理解为服务发现的过程。</p>\n<p>而我们微服务架构中的服务注册与发现结构如下图所示：</p>\n<p><img src=\"/images/blog/tech/microservice/image_6_1.png\" alt=\"image_6_1.png\"></p>\n<p>图片中是一个典型的微服务架构，这个结构中主要涉及到三大角色：</p>\n<p>provider - 服务提供者</p>\n<p>consumer - 服务消费者</p>\n<p>register center - 注册中心</p>\n<p>它们之间的关系大致如下：</p>\n<p>1、每个微服务在启动时，将自己的网络地址等信息（微服务的ServiceName、IP、Port、MetaData等）注册到注册中心，注册中心存储这些数据。</p>\n<p>2、服务消费者从注册中心查询服务提供者的地址，并通过该地址调用服务提供者的接口。</p>\n<p>3、各个微服务与注册中心使用一定机制（例如心跳）通信。如果注册中心与某微服务长时间无法通信，就会注销该实例。</p>\n<p>优点如下：</p>\n<p>1、解耦：服务消费者跟服务提供者解耦，各自变化，不互相影响</p>\n<p>2、扩展：服务消费者和服务提供者增加和删除新的服务，对于双方没有任何影响</p>\n<p>3、中介者设计模式：用一个中介对象来封装一系列的对象交互，这是一种多对多关系的中介者模式。</p>\n<p>从功能上拆开主要有三块：服务注册、服务发现，和注册中心。我们一个一个来看。</p>\n<h3>1.1 服务注册 <a href=\"#scroller-2\" id=\"scroller-2\"></a></h3>\n<p>如图中，为Register注册中心注册一个服务信息，会将服务的信息：ServiceName、IP、Port以及服务实例MetaData元数据信息写入到注册中心。当服务发生变化的时候，也可以更新到注册中心。</p>\n<p><img src=\"/images/blog/tech/microservice/image_6_2.png\" alt=\"image_6_2.png\"></p>\n<p>服务提供者（服务实例） 的服务注册模型是一种简单、容易理解、流行的服务注册模型，其在多种技术生态中都有所体现：</p>\n<p>1、在K8S生态中，通过 K8S Service服务信息，和Pod的 endpoint（用来记录service对应的pod的访问地址）来进行注册。</p>\n<p>2、在Spring Cloud生态中，应用名 对应 服务Service，实例 IP + Port 对应 Instance实例。比较典型的就是A服务，后面对应有多个实例做负载均衡。</p>\n<p>3、在其他的注册组件中，比如 Eureka、Consul，服务模型也都是 服务→ 服务实例。</p>\n<p>可以认为服务实例是一个真正的实体的载体，服务是对这些相同能力或者相同功能服务实例的一个抽象。</p>\n<p><img src=\"/images/blog/tech/microservice/image_6_3.png\" alt=\"image_6_3.png\"></p>\n<h3>1.2 服务发现 <a href=\"#scroller-3\" id=\"scroller-3\"></a></h3>\n<p>服务发现实际就是我们查询已经注册好的服务提供者，比如 p-&gt;p.queryService(serviceName)，通过服务名称查询某个服务是否存在，如果存在，</p>\n<p>返回它的所有实例信息，即一组包含ip 、 port 、metadata元数据信息的endpoints信息。</p>\n<p>这一组endpoints信息一般会被缓存在本地，如果注册中心挂掉，可保证段时间内依旧可用，这是去中心化的做法。对于单个 Service 后面有多个 Instance的情况（如上图），做 load balance。</p>\n<p>服务发现的方式一般有两种：</p>\n<p>1、拉取的方式：服务消费方（Consumer）主动向注册中心发起服务查询的请求。</p>\n<p>2、推送的方式：服务订阅/通知变更（下发）：服务消费方（Consumer）主动向注册中心订阅某个服务，当注册中心中该服务信息发生变更时，注册中心主动通知消费者。</p>\n<h3>1.3 注册中心 <a href=\"#scroller-4\" id=\"scroller-4\"></a></h3>\n<p>注册中心提供的基本能力包括：提供服务注册、服务发现 以及 健康检查。</p>\n<p>服务注册跟服务发现上面已经详细介绍了， 健康检查指的是指注册中心能够感知到微服务实例的健康状况，便于上游微服务实例及时发现下游微服务实例的健康状况。采取必备的访问措施，如避免访问不健康的实例。</p>\n<p>主要的检查方式包括：</p>\n<p>1、服务Provider 进行 TTL 健康汇报（Time To Live，微服务Provider定期向注册中心汇报健康状态）。</p>\n<p>2、注册中心主动检查服务Provider接口。</p>\n<p>综合我们前面的内容，可以总结下注册中心有如下几种能力：</p>\n<p>1、高可用</p>\n<p>这个主要体现在两个方面。一个方面是，注册中心本身作为基础设施层，具备高可用；第二种是就是前面我们说到的去中心化，极端情况下的故障，短时间内是不影响微服务应用的调用的</p>\n<p>2、可视化操作</p>\n<p>常用的注册中心，类似 Eureka、Consul 都有比较丰富的管理界面，对配置、服务注册、服务发现进行可视化管理。</p>\n<p>3、高效运维</p>\n<p>注册中心的文档丰富，对运维的支持比较好，并且对于服务的注册是动态感知获取的，方便动态扩容。</p>\n<p>4、权限控制</p>\n<p>数据是具有敏感性，无论是服务信息注册或服务是调用，需要具备权限控制能力，避免侵入或越权请求</p>\n<p>5、服务注册推、拉能力</p>\n<p>这个前面说过了，微服务应用程序（服务的Consumer），能够快速感知到服务实例的变化情况，使用拉取或者注册中心下发的方式进行处理。</p>\n<p><img src=\"/images/blog/tech/microservice/image_6_4.png\" alt=\"image_6_4.png\"></p>\n<h2>2 现下的主流注册中心 <a href=\"#scroller-5\" id=\"scroller-5\"></a></h2>\n<h3>2.1 Eureka <a href=\"#scroller-6\" id=\"scroller-6\"></a></h3>\n<h4>2.1.1 介绍 <a href=\"#scroller-7\" id=\"scroller-7\"></a></h4>\n<p>Eureka是Netflix OSS套件中关于服务注册和发现的解决方案。因为Spring Cloud 在它的微服务解决方案中对Eureka进行了集成，并作为优先推荐方案进行宣传，所以早期有用 Spring Cloud 来建设微服务系统的同学会比较熟悉。</p>\n<p>目前大量公司的微服务系统中依旧使用Eureka作为注册中心，它的核心设计思想也被后续大量注册中心产品借鉴。但目前 <a href=\"https://github.com/Netflix/eureka/wiki\">Eureka 2.0已经停止维护</a>，所以新的微服务架构设计中，不再建议使用。</p>\n<p>Spring Cloud Netflix主要分为两个部分：</p>\n<p>1、Eureka Server： 作为注册中心Server端，向微服务应用程序提供服务注册、发现、健康检查等能力。</p>\n<p>2、Eureka Client： 微服务应用程序Client端，用以和Eureka Server进行通信。</p>\n<p><img src=\"/images/blog/tech/microservice/image_6_5.png\" alt=\"image_6_5.png\"></p>\n<p>Eureka有比较友好的管理界面，如上图所示：</p>\n<p>1、System Status：显示当前Eureka Server信息。</p>\n<p>2、Instances Current registered with Eureka：在Eureka Server当前注册的数据，在Spring Cloud生态中，被注册的服务可以呗发现并罗列在这个地方。</p>\n<p>3、General Info：基本信息，如cpu、内存、环境等。</p>\n<h4>2.1.2 整体架构 <a href=\"#scroller-8\" id=\"scroller-8\"></a></h4>\n<p><img src=\"/images/blog/tech/microservice/image_6_6.png\" alt=\"image_6_6.png\"></p>\n<p>Eureka Server可以运行多个实例来构建集群，解决单点问题，但不同于ZooKeeper的选举leader的过程，Eureka Server采用的是Peer to Peer对等通信。</p>\n<p>所以他有如下特点：</p>\n<p>1、去中心化的架构：无master/slave区分，每一个Peer都是对等的。在这种架构中，节点通过彼此互相注册来提高可用性，每个节点需要添加一个或多个有效的serviceUrl指向其他节点。每个节点都可被视为其他节点的副本。</p>\n<p>2、故障转移/故障恢复：如果某台Eureka Server宕机，Eureka Client的请求会自动切换到新的Eureka Server节点，当宕机的服务器重新恢复后，Eureka会再次将其纳入到服务器集群管理之中。</p>\n<p>3、节点复制：当节点开始接受客户端请求时，所有的操作都会进行replicateToPeer（节点间复制）操作，将请求复制到其他Eureka Server当前所知的所有节点中。</p>\n<p>同理，一个新的Eureka Server节点启动后，会首先尝试从邻近节点获取所有实例注册表信息，完成初始化。</p>\n<p>4、CAP模式：复制算法非强一致性算法，而是当有数据写入时，Eureka Server将数据同步给其他的节点，因此Eureka在CAP提系统（一致性、可用性、分区容错性）是典型的AP系统。</p>\n<h4>2.1.3 接入Spring Cloud <a href=\"#scroller-9\" id=\"scroller-9\"></a></h4>\n<p><img src=\"/ima
