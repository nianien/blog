验证</h2>\n<h3>原型类型</h3>\n<ol>\n<li><strong>低保真原型</strong> - 纸面原型、线框图</li>\n<li><strong>中保真原型</strong> - 交互原型、功能演示</li>\n<li><strong>高保真原型</strong> - 接近最终产品的原型</li>\n<li><strong>MVP</strong> - 最小可行产品</li>\n</ol>\n<h3>原型制作工具</h3>\n<ul>\n<li><strong>设计工具</strong> - Figma、Sketch、Adobe XD</li>\n<li><strong>原型工具</strong> - InVision、Marvel、Axure</li>\n<li><strong>开发工具</strong> - React、Vue、Flutter</li>\n<li><strong>无代码平台</strong> - Bubble、Webflow、Glide</li>\n</ul>\n<h3>快速验证方法</h3>\n<ol>\n<li><strong>用户测试</strong> - 邀请目标用户测试原型</li>\n<li><strong>A/B测试</strong> - 对比不同方案的效果</li>\n<li><strong>数据分析</strong> - 收集和分析用户行为数据</li>\n<li><strong>反馈收集</strong> - 系统收集用户反馈</li>\n</ol>\n<h2>产品迭代与优化</h2>\n<h3>迭代周期</h3>\n<ul>\n<li><strong>快速迭代</strong> - 短周期快速发布和更新</li>\n<li><strong>数据驱动</strong> - 基于数据指导迭代方向</li>\n<li><strong>用户导向</strong> - 以用户需求为中心</li>\n<li><strong>持续改进</strong> - 建立持续改进机制</li>\n</ul>\n<h3>关键指标</h3>\n<ol>\n<li><strong>用户获取</strong> - 新用户注册和激活</li>\n<li><strong>用户留存</strong> - 用户持续使用情况</li>\n<li><strong>用户活跃</strong> - 用户使用频率和深度</li>\n<li><strong>商业转化</strong> - 用户付费转化率</li>\n</ol>\n<h3>优化策略</h3>\n<ul>\n<li><strong>功能优化</strong> - 改进产品功能和性能</li>\n<li><strong>体验优化</strong> - 提升用户使用体验</li>\n<li><strong>流程优化</strong> - 简化用户操作流程</li>\n<li><strong>界面优化</strong> - 改进用户界面设计</li>\n</ul>\n<h2>设计思维在创业中的应用</h2>\n<h3>产品开发</h3>\n<ol>\n<li><strong>需求分析</strong> - 深入理解用户需求</li>\n<li><strong>功能设计</strong> - 设计产品功能架构</li>\n<li><strong>界面设计</strong> - 设计用户界面和交互</li>\n<li><strong>体验优化</strong> - 持续优化用户体验</li>\n</ol>\n<h3>营销策略</h3>\n<ul>\n<li><strong>用户洞察</strong> - 基于用户研究制定营销策略</li>\n<li><strong>内容设计</strong> - 设计吸引用户的内容</li>\n<li><strong>渠道选择</strong> - 选择合适的分销渠道</li>\n<li><strong>效果评估</strong> - 评估营销活动效果</li>\n</ul>\n<h3>团队协作</h3>\n<ol>\n<li><strong>跨职能合作</strong> - 设计、技术、市场团队协作</li>\n<li><strong>用户中心</strong> - 所有决策以用户为中心</li>\n<li><strong>快速响应</strong> - 快速响应市场变化</li>\n<li><strong>持续学习</strong> - 建立学习型组织</li>\n</ol>\n<h2>成功案例分析</h2>\n<h3>案例一：Airbnb</h3>\n<ul>\n<li><strong>用户研究</strong> - 深入了解房东和房客需求</li>\n<li><strong>原型设计</strong> - 从简单的网站开始</li>\n<li><strong>快速迭代</strong> - 基于用户反馈持续改进</li>\n<li><strong>体验优化</strong> - 不断优化预订和沟通流程</li>\n</ul>\n<h3>案例二：Uber</h3>\n<ul>\n<li><strong>问题定义</strong> - 解决城市出行难题</li>\n<li><strong>用户研究</strong> - 了解司机和乘客需求</li>\n<li><strong>原型验证</strong> - 通过MVP验证商业模式</li>\n<li><strong>持续优化</strong> - 基于数据持续改进服务</li>\n</ul>\n<h3>案例三：Slack</h3>\n<ul>\n<li><strong>用户洞察</strong> - 发现团队沟通痛点</li>\n<li><strong>设计思维</strong> - 运用设计思维开发产品</li>\n<li><strong>快速迭代</strong> - 快速响应用户需求</li>\n<li><strong>体验优先</strong> - 始终关注用户体验</li>\n</ul>\n<h2>设计思维工具和方法</h2>\n<h3>用户研究工具</h3>\n<ul>\n<li><strong>用户访谈</strong> - 深度了解用户需求</li>\n<li><strong>问卷调查</strong> - 收集大量用户数据</li>\n<li><strong>用户测试</strong> - 观察用户使用行为</li>\n<li><strong>数据分析</strong> - 分析用户行为数据</li>\n</ul>\n<h3>创意工具</h3>\n<ol>\n<li><strong>思维导图</strong> - 整理和扩展想法</li>\n<li><strong>故事板</strong> - 可视化用户场景</li>\n<li><strong>角色扮演</strong> - 体验用户视角</li>\n<li><strong>类比思维</strong> - 从其他领域获得启发</li>\n</ol>\n<h3>原型工具</h3>\n<ul>\n<li><strong>纸面原型</strong> - 快速绘制界面草图</li>\n<li><strong>数字原型</strong> - 制作交互原型</li>\n<li><strong>3D打印</strong> - 制作物理原型</li>\n<li><strong>虚拟现实</strong> - 创建沉浸式体验</li>\n</ul>\n<h2>设计思维的挑战与解决方案</h2>\n<h3>常见挑战</h3>\n<ol>\n<li><strong>时间压力</strong> - 快速迭代与深度思考的平衡</li>\n<li><strong>资源限制</strong> - 有限资源下的创新</li>\n<li><strong>团队协作</strong> - 跨职能团队的协调</li>\n<li><strong>市场变化</strong> - 快速变化的市场环境</li>\n</ol>\n<h3>解决方案</h3>\n<ul>\n<li><strong>敏捷方法</strong> - 采用敏捷开发方法</li>\n<li><strong>精益创业</strong> - 运用精益创业理念</li>\n<li><strong>设计冲刺</strong> - 使用设计冲刺方法</li>\n<li><strong>持续学习</strong> - 建立学习型组织</li>\n</ul>\n<h2>未来发展趋势</h2>\n<h3>技术融合</h3>\n<ol>\n<li><strong>AI辅助设计</strong> - 人工智能辅助设计决策</li>\n<li><strong>数据驱动</strong> - 大数据指导设计方向</li>\n<li><strong>虚拟现实</strong> - VR/AR在设计中的应用</li>\n<li><strong>自动化工具</strong> - 设计流程的自动化</li>\n</ol>\n<h3>方法演进</h3>\n<ul>\n<li><strong>混合方法</strong> - 结合多种设计方法</li>\n<li><strong>远程协作</strong> - 远程团队的设计协作</li>\n<li><strong>用户参与</strong> - 用户参与设计过程</li>\n<li><strong>持续创新</strong> - 建立持续创新机制</li>\n</ul>\n<h2>总结</h2>\n<p>设计思维为创业提供了一种系统性的创新方法，通过深入理解用户需求、快速原型设计和持续迭代，能够有效降低创业风险，提高成功率。</p>\n<p>成功的创业不仅需要好的想法，更需要科学的方法和持续的努力。设计思维为创业者提供了一套完整的工具和方法，帮助他们在复杂多变的市场环境中找到正确的方向。</p>\n<p>记住，设计思维不是一次性的过程，而是一种持续的方法论。只有将设计思维融入创业的每个环节，才能真正发挥其价值。</p>\n<hr>\n<p><em>设计思维不仅是工具，更是一种思维方式。在创业的道路上，让设计思维成为你的指南针。</em> </p>\n"},{"slug":"mental-health","title":"数字时代的心理健康：挑战与应对策略","description":"探讨现代生活对心理健康的影响，包括社交媒体、工作压力、信息过载等问题，以及如何建立健康的心理状态","pubDate":"2024-01-06","tags":["个人成长","生活方式"],"heroImage":"/images/mental-health.jpg","content":"<h1>数字时代的心理健康：挑战与应对策略</h1>\n<p>在信息爆炸和快节奏的现代社会中，心理健康问题日益突出。本文将深入探讨数字时代对心理健康的影响，以及如何建立和维护健康的心理状态。</p>\n<h2>现代生活的心理健康挑战</h2>\n<h3>社交媒体影响</h3>\n<ul>\n<li><strong>比较焦虑</strong> - 看到他人精心策划的生活产生自卑感</li>\n<li><strong>信息过载</strong> - 大量信息导致注意力分散和焦虑</li>\n<li><strong>睡眠问题</strong> - 蓝光影响和睡前刷手机影响睡眠质量</li>\n<li><strong>真实连接减少</strong> - 虚拟社交替代面对面交流</li>\n</ul>\n<h3>工作压力</h3>\n<ul>\n<li><strong>工作生活边界模糊</strong> - 远程工作导致工作时间延长</li>\n<li><strong>职业倦怠</strong> - 长期高压导致身心疲惫</li>\n<li><strong>职业发展焦虑</strong> - 技术更新快，担心被淘汰</li>\n<li><strong>人际关系压力</strong> - 职场竞争和人际冲突</li>\n</ul>\n<h3>信息焦虑</h3>\n<ul>\n<li><strong>FOMO</strong> - 害怕错过重要信息或机会</li>\n<li><strong>决策疲劳</strong> - 过多选择导致决策困难</li>\n<li><strong>认知负荷</strong> - 大脑处理信息能力超载</li>\n<li><strong>注意力分散</strong> - 难以深度思考和专注</li>\n</ul>\n<h2>心理健康的重要性</h2>\n<h3>对个人的影响</h3>\n<ol>\n<li><strong>生活质量</strong> - 心理健康直接影响生活满意度</li>\n<li><strong>工作效率</strong> - 心理状态影响工作表现和创造力</li>\n<li><strong>人际关系</strong> - 心理健康影响社交能力和关系质量</li>\n<li><strong>身体健康</strong> - 心理和身体健康相互影响</li>\n</ol>\n<h3>对社会的意义</h3>\n<ol>\n<li><strong>生产力损失</strong> - 心理健康问题影响社会生产力</li>\n<li><strong>医疗成本</strong> - 心理健康问题增加医疗负担</li>\n<li><strong>社会稳定</strong> - 心理健康影响社会和谐</li>\n<li><strong>代际影响</strong> - 父母心理健康影响子女成长</li>\n</ol>\n<h2>建立健康的心理状态</h2>\n<h3>自我认知</h3>\n<ol>\n<li><strong>情绪觉察</strong> - 学会识别和接纳自己的情绪</li>\n<li><strong>需求识别</strong> - 了解自己的真实需求和价值观</li>\n<li><strong>边界设定</strong> - 学会说&quot;不&quot;和保护自己的边界</li>\n<li><strong>自我接纳</strong> - 接受自己的不完美和局限性</li>\n</ol>\n<h3>生活习惯</h3>\n<ol>\n<li><strong>规律作息</strong> - 保证充足的睡眠和规律的作息</li>\n<li><strong>健康饮食</strong> - 营养均衡的饮食对心理健康重要</li>\n<li><strong>适度运动</strong> - 运动释放内啡肽，改善心情</li>\n<li><strong>户外活动</strong> - 接触自然，减少室内时间</li>\n</ol>\n<h3>数字健康</h3>\n<ol>\n<li><strong>屏幕时间管理</strong> - 设定合理的屏幕使用时间</li>\n<li><strong>信息筛选</strong> - 选择有价值的信息源</li>\n<li><strong>社交媒体断连</strong> - 定期远离社交媒体</li>\n<li><strong>数字排毒</strong> - 定期进行数字排毒</li>\n</ol>\n<h2>应对策略</h2>\n<h3>压力管理</h3>\n<ol>\n<li><strong>时间管理</strong> - 合理安排时间，避免过度忙碌</li>\n<li><strong>优先级排序</strong> - 区分重要和紧急的事情</li>\n<li><strong>放松技巧</strong> - 学习深呼吸、冥想等放松方法</li>\n<li><strong>寻求支持</strong> - 与朋友、家人或专业人士交流</li>\n</ol>\n<h3>情绪调节</h3>\n<ol>\n<li><strong>认知重构</strong> - 改变对事情的看法和解释</li>\n<li><strong>情绪表达</strong> - 健康地表达和释放情绪</li>\n<li><strong>积极思维</strong> - 培养乐观和积极的心态</li>\n<li><strong>感恩练习</strong> - 记录和感恩生活中的美好</li>\n</ol>\n<h3>社交支持</h3>\n<ol>\n<li><strong>深度连接</strong> - 建立和维护深度的人际关系</li>\n<li><strong>社区参与</strong> - 参与社区活动和志愿服务</li>\n<li><strong>专业帮助</strong> - 必要时寻求心理咨询师帮助</li>\n<li><strong>互助小组</strong> - 参加心理健康互助小组</li>\n</ol>\n<h2>工作环境中的心理健康</h2>\n<h3>个人层面</h3>\n<ol>\n<li><strong>工作边界</strong> - 明确工作和生活的界限</li>\n<li><strong>技能提升</strong> - 持续学习，增强职业竞争力</li>\n<li><strong>兴趣发展</strong> - 培养工作外的兴趣爱好</li>\n<li><strong>职业规划</strong> - 制定清晰的职业发展路径</li>\n</ol>\n<h3>组织层面</h3>\n<ol>\n<li><strong>心理健康政策</strong> - 建立员工心理健康支持体系</li>\n<li><strong>工作环境</strong> - 创造健康的工作环境和文化</li>\n<li><strong>培训教育</strong> - 提供心理健康教育和培训</li>\n<li><strong>支持资源</strong> - 提供心理咨询和支持服务</li>\n</ol>\n<h2>数字时代的心理健康工具</h2>\n<h3>应用程序</h3>\n<ol>\n<li><strong>冥想应用</strong> - Headspace、Calm等冥想应用</li>\n<li><strong>情绪追踪</strong> - 记录和分析情绪变化</li>\n<li><strong>睡眠监测</strong> - 监测和改善睡眠质量</li>\n<li><strong>心理健康评估</strong> - 定期进行心理健康评估</li>\n</ol>\n<h3>在线资源</h3>\n<ol>\n<li><strong>心理健康网站</strong> - 提供心理健康信息和资源</li>\n<li><strong>在线咨询</strong> - 远程心理咨询服务</li>\n<li><strong>支持社区</strong> - 在线心理健康支持社区</li>\n<li><strong>教育资源</strong> - 心理健康教育和培训课程</li>\n</ol>\n<h2>预防和早期干预</h2>\n<h3>预防策略</h3>\n<ol>\n<li><strong>健康教育</strong> - 提高心理健康意识和知识</li>\n<li><strong>早期识别</strong> - 学会识别心理健康问题的早期信号</li>\n<li><strong>积极干预</strong> - 在问题出现前进行积极干预</li>\n<li><strong>环境优化</strong> - 创造支持心理健康的环境</li>\n</ol>\n<h3>干预方法</h3>\n<ol>\n<li><strong>认知行为疗法</strong> - 改变不健康的思维模式</li>\n<li><strong>正念练习</strong> - 培养当下的觉察和接纳</li>\n<li><strong>艺术治疗</strong> - 通过艺术表达和处理情绪</li>\n<li><strong>运动疗法</strong> - 通过运动改善心理健康</li>\n</ol>\n<h2>长期维护</h2>\n<h3>持续学习</h3>\n<ol>\n<li><strong>心理健康知识</strong> - 持续学习心理健康相关知识</li>\n<li><strong>自我反思</strong> - 定期反思和总结自己的心理状态</li>\n<li><strong>技能练习</strong> - 持续练习心理健康技能</li>\n<li><strong>适应变化</strong> - 学会适应生活中的变化和挑战</li>\n</ol>\n<h3>支持网络</h3>\n<ol>\n<li><strong>家庭支持</strong> - 建立健康的家庭关系</li>\n<li><strong>朋友网络</strong> - 维护和深化友谊关系</li>\n<li><strong>专业网络</strong> - 与心理健康专业人士保持联系</li>\n<li><strong>社区资源</strong> - 利用社区心理健康资源</li>\n</ol>\n<h2>总结</h2>\n<p>在数字时代，维护心理健康比以往任何时候都更加重要。通过了解现代生活的挑战，建立健康的心理状态，采用有效的应对策略，我们可以在这个快节奏的世界中保持心理健康和幸福感。</p>\n<p>记住，心理健康不是奢侈品，而是必需品。投资于心理健康就是投资于更好的生活质量和未来。</p>\n<hr>\n<p><em>心理健康是人生最重要的财富之一，值得我们投入时间和精力去维护和提升。</em> </p>\n"},{"slug":"blockchain-business","title":"区块链在商业中的应用：机遇与挑战","description":"探讨区块链技术在商业领域的实际应用，包括供应链管理、数字身份、智能合约等，以及企业如何利用区块链技术创造价值","pubDate":"2024-01-05","tags":["区块链","商业与创业","技术"],"heroImage":"/images/blockchain.jpg","content":"<h1>区块链在商业中的应用：机遇与挑战</h1>\n<p>区块链技术已经从加密货币的底层技术发展成为具有广泛商业应用潜力的创新技术。本文将深入探讨区块链在商业领域的实际应用案例，以及企业如何利用这项技术创造价值。</p>\n<h2>区块链技术基础</h2>\n<h3>核心特性</h3>\n<ul>\n<li><strong>去中心化</strong> - 不依赖中央机构，数据分布在网络中</li>\n<li><strong>不可篡改</strong> - 一旦记录，数据几乎无法被修改</li>\n<li><strong>透明性</strong> - 所有参与者都可以查看交易记录</li>\n<li><strong>安全性</strong> - 使用密码学技术保护数据安全</li>\n</ul>\n<h3>技术架构</h3>\n<ol>\n<li><strong>共识机制</strong> - 确保网络参与者对数据状态达成一致</li>\n<li><strong>智能合约</strong> - 自动执行的程序化合约</li>\n<li><strong>分布式账本</strong> - 所有交易记录的共享数据库</li>\n</ol>\n<h2>供应链管理应用</h2>\n<h3>传统供应链问题</h3>\n<ul>\n<li><strong>信息不透明</strong> - 各环节信息孤岛</li>\n<li><strong>追溯困难</strong> - 产品来源难以验证</li>\n<li><strong>效率低下</strong> - 人工处理流程复杂</li>\n<li><strong>信任缺失</strong> - 各方缺乏互信机制</li>\n</ul>\n<h3>区块链解决方案</h3>\n<ol>\n<li><strong>全程追溯</strong> - 从原材料到最终产品的完整记录</li>\n<li><strong>实时监控</strong> - 供应链各环节实时状态更新</li>\n<li><strong>自动化执行</strong> - 智能合约自动触发相关流程</li>\n<li><strong>数据共享</strong> - 授权各方安全共享信息</li>\n</ol>\n<h3>实际案例</h3>\n<ul>\n<li><strong>沃尔玛</strong> - 使用区块链追踪食品供应链</li>\n<li><strong>马士基</strong> - 航运物流区块链平台</li>\n<li><strong>IBM Food Trust</strong> - 食品安全追溯系统</li>\n</ul>\n<h2>数字身份管理</h2>\n<h3>传统身份问题</h3>\n<ul>\n<li><strong>数据泄露</strong> - 集中存储容易成为攻击目标</li>\n<li><strong>重复验证</strong> - 每次都需要重新验证身份</li>\n<li><strong>隐私保护</strong> - 个人数据被过度收集</li>\n<li><strong>跨境问题</strong> - 不同国家身份系统不兼容</li>\n</ul>\n<h3>区块链解决方案</h3>\n<ol>\n<li><strong>自主身份</strong> - 用户完全控制自己的身份信息</li>\n<li><strong>零知识证明</strong> - 证明身份而不泄露具体信息</li>\n<li><strong>跨平台互认</strong> - 一次验证，多处使用</li>\n<li><strong>隐私保护</strong> - 最小化数据收集和共享</li>\n</ol>\n<h3>应用场景</h3>\n<ul>\n<li><strong>金融服务</strong> - KYC/AML合规</li>\n<li><strong>医疗健康</strong> - 患者身份和医疗记录</li>\n<li><strong>政府服务</strong> - 数字身份证和公共服务</li>\n<li><strong>教育认证</strong> - 学历和技能证书</li>\n</ul>\n<h2>智能合约应用</h2>\n<h3>什么是智能合约</h3>\n<p>智能合约是运行在区块链上的自动执行程序，当预设条件满足时自动执行相应操作。</p>\n<h3>商业应用场景</h3>\n<ol>\n<li><strong>保险理赔</strong> - 自动触发理赔流程</li>\n<li><strong>版权保护</strong> - 自动分配版税</li>\n<li><strong>租赁管理</strong> - 自动处理租金支付</li>\n<li><strong>投票系统</strong> - 确保投票透明和不可篡改</li>\n</ol>\n<h3>实际案例</h3>\n<ul>\n<li><strong>以太坊</strong> - 最广泛使用的智能合约平台</li>\n<li><strong>Chainlink</strong> - 连接链下数据的预言机网络</li>\n<li><strong>Polkadot</strong> - 多链互操作平台</li>\n</ul>\n<h2>金融服务创新</h2>\n<h3>传统金融痛点</h3>\n<ul>\n<li><strong>跨境支付</strong> - 费用高、速度慢</li>\n<li><strong>中小企业融资</strong> - 缺乏信用记录</li>\n<li><strong>资产证券化</strong> - 流程复杂、成本高</li>\n<li><strong>监管合规</strong> - 人工处理效率低</li>\n</ul>\n<h3>区块链解决方案</h3>\n<ol>\n<li><strong>DeFi</strong> - 去中心化金融服务</li>\n<li><strong>STO</strong> - 证券型代币发行</li>\n<li><strong>跨境支付</strong> - 快速、低成本的国际转账</li>\n<li><strong>供应链金融</strong> - 基于真实贸易的融资</li>\n</ol>\n<h3>创新产品</h3>\n<ul>\n<li><strong>稳定币</strong> - 价值稳定的数字货币</li>\n<li><strong>借贷平台</strong> - 去中心化借贷服务</li>\n<li><strong>DEX</strong> - 去中心化交易所</li>\n<li><strong>资产管理</strong> - 自动化投资组合管理</li>\n</ul>\n<h2>企业实施策略</h2>\n<h3>技术选择</h3>\n<ol>\n<li><strong>公有链</strong> - 完全去中心化，适合公开应用</li>\n<li><strong>私有链</strong> - 企业控制，适合内部应用</li>\n<li><strong>联盟链</strong> - 多方参与，适合行业协作</li>\n<li><strong>混合方案</strong> - 结合多种技术优势</li>\n</ol>\n<h3>实施步骤</h3>\n<ol>\n<li><strong>需求分析</strong> - 明确业务痛点和目标</li>\n<li><strong>技术选型</strong> - 选择合适的技术方案</li>\n<li><strong>原型开发</strong> - 快速验证概念</li>\n<li><strong>试点应用</strong> - 小范围测试和优化</li>\n<li><strong>全面推广</strong> - 逐步扩大应用范围</li>\n</ol>\n<h3>成功要素</h3>\n<ul>\n<li><strong>业务驱动</strong> - 以解决实际问题为导向</li>\n<li><strong>技术成熟</strong> - 选择经过验证的技术</li>\n<li><strong>生态合作</strong> - 与合作伙伴共同建设</li>\n<li><strong>持续创新</strong> - 不断优化和改进</li>\n</ul>\n<h2>挑战与风险</h2>\n<h3>技术挑战</h3>\n<ol>\n<li><strong>性能限制</strong> - 交易处理速度有限</li>\n<li><strong>扩展性问题</strong> - 网络容量和成本</li>\n<li><strong>互操作性</strong> - 不同区块链系统兼容</li>\n<li><strong>用户体验</strong> - 复杂的技术操作</li>\n</ol>\n<h3>监管风险</h3>\n<ol>\n<li><strong>法律不确定性</strong> - 监管政策不明确</li>\n<li><strong>合规要求</strong> - 需要满足各种监管规定</li>\n<li><strong>跨境问题</strong> - 不同国家监管差异</li>\n<li><strong>责任界定</strong> - 技术故障的责任归属</li>\n</ol>\n<h3>商业风险</h3>\n<ol>\n<li><strong>投资回报</strong> - 技术投入与收益平衡</li>\n<li><strong>竞争压力</strong> - 技术更新换代快</li>\n<li><strong>人才短缺</strong> - 专业人才稀缺</li>\n<li><strong>市场接受度</strong> - 用户接受程度不确定</li>\n</ol>\n<h2>未来发展趋势</h2>\n<h3>技术演进</h3>\n<ol>\n<li><strong>Layer 2解决方案</strong> - 提高性能和降低成本</li>\n<li><strong>跨链技术</strong> - 实现不同区块链互操作</li>\n<li><strong>零知识证明</strong> - 增强隐私保护能力</li>\n<li><strong>量子抗性</strong> - 应对量子计算威胁</li>\n</ol>\n<h3>应用扩展</h3>\n<ol>\n<li><strong>物联网集成</strong> - 设备自动交互和支付</li>\n<li><strong>AI结合</strong> - 智能合约与AI技术融合</li>\n<li><strong>元宇宙</strong> - 虚拟世界的经济基础设施</li>\n<li><strong>碳中和</strong> - 支持环保和可持续发展</li>\n</ol>\n<h3>监管发展</h3>\n<ol>\n<li><strong>监管沙盒</strong> - 创新与监管的平衡</li>\n<li><strong>国际协调</strong> - 全球监管标准统一</li>\n<li><strong>技术中立</strong> - 监管关注功能而非技术</li>\n<li><strong>消费者保护</strong> - 确保用户权益</li>\n</ol>\n<h2>总结</h2>\n<p>区块链技术在商业领域具有巨大的应用潜力，但成功实施需要综合考虑技术、业务、监管等多个方面。企业应该以解决实际问题为导向，选择合适的应用场景，制定清晰的实施策略，并在实践中不断优化和改进。</p>\n<p>随着技术的成熟和监管的完善，区块链将在更多商业场景中发挥重要作用，为企业创造新的价值和竞争优势。</p>\n<hr>\n<p><em>区块链不仅是技术革命，更是商业模式的创新。企业需要拥抱变化，积极探索区块链技术的商业应用。</em> </p>\n"},{"slug":"digital-nomad","title":"数字游民：自由工作的新生活方式","description":"探讨数字游民的生活方式、工作模式、挑战与机遇，以及如何开始你的数字游民之旅","pubDate":"2024-01-04","tags":["商业与创业","生活方式"],"heroImage":"/images/digital-nomad.jpg","content":"<h1>数字游民：自由工作的新生活方式</h1>\n<p>数字游民（Digital Nomad）是一种新兴的工作生活方式，通过互联网技术实现工作与旅行的完美结合。本文将深入探讨数字游民的生活方式、工作模式、面临的挑战与机遇。</p>\n<h2>什么是数字游民</h2>\n<h3>定义</h3>\n<p>数字游民是指那些利用互联网技术，可以在任何地方工作的人。他们通常没有固定的办公地点，可以自由选择工作环境。</p>\n<h3>特征</h3>\n<ul>\n<li><strong>远程工作能力</strong> - 工作不依赖特定地理位置</li>\n<li><strong>技术驱动</strong> - 依赖互联网和数字工具</li>\n<li><strong>生活方式导向</strong> - 追求工作与生活的平衡</li>\n<li><strong>全球视野</strong> - 愿意体验不同文化和环境</li>\n</ul>\n<h2>数字游民的工作模式</h2>\n<h3>常见职业</h3>\n<ol>\n<li><strong>软件开发</strong> - 程序员、设计师、产品经理</li>\n<li><strong>内容创作</strong> - 写作、摄影、视频制作</li>\n<li><strong>在线教育</strong> - 语言教学、技能培训</li>\n<li><strong>咨询服务</strong> - 营销、财务、法律咨询</li>\n<li><strong>电商运营</strong> - 网店管理、跨境电商</li>\n</ol>\n<h3>工作工具</h3>\n<ul>\n<li><strong>协作工具</strong> - Slack、Zoom、Notion</li>\n<li><strong>项目管理</strong> - Trello、Asana、Jira</li>\n<li><strong>云服务</strong> - Google Workspace、Microsoft 365</li>\n<li><strong>支付系统</strong> - PayPal、Stripe、Wise</li>\n</ul>\n<h2>数字游民的生活方式</h2>\n<h3>优势</h3>\n<ol>\n<li><strong>地理自由</strong> - 可以在任何地方工作</li>\n<li><strong>时间灵活</strong> - 自主安排工作时间</li>\n<li><strong>文化体验</strong> - 体验不同国家和文化</li>\n<li><strong>成本控制</strong> - 选择生活成本较低的地区</li>\n<li><strong>个人成长</strong> - 适应不同环境的能力</li>\n</ol>\n<h3>挑战</h3>\n<ol>\n<li><strong>孤独感</strong> - 缺乏稳定的社交圈</li>\n<li><strong>网络依赖</strong> - 对稳定的网络连接要求高</li>\n<li><strong>时区问题</strong> - 与客户或团队时差协调</li>\n<li><strong>法律问题</strong> - 签证、税务等法律问题</li>\n<li><strong>健康管理</strong> - 缺乏稳定的医疗资源</li>\n</ol>\n<h2>如何开始数字游民生活</h2>\n<h3>第一步：技能准备</h3>\n<ol>\n<li><strong>技术技能</strong> - 掌握远程工作所需的技术</li>\n<li><strong>语言能力</strong> - 提高英语或其他工作语言</li>\n<li><strong>财务规划</strong> - 建立应急基金和收入来源</li>\n<li><strong>心理准备</strong> - 适应不确定性和变化</li>\n</ol>\n<h3>第二步：工作准备</h3>\n<ol>\n<li><strong>建立在线形象</strong> - 完善LinkedIn、作品集</li>\n<li><strong>寻找远程工作</strong> - 通过平台或直接联系</li>\n<li><strong>建立客户网络</strong> - 发展稳定的客户关系</li>\n<li><strong>制定工作计划</strong> - 建立高效的工作流程</li>\n</ol>\n<h3>第三步：生活准备</h3>\n<ol>\n<li><strong>选择目的地</strong> - 考虑签证、成本、网络等因素</li>\n<li><strong>准备必要文件</strong> - 护照、签证、保险等</li>\n<li><strong>购买必要设备</strong> - 笔记本电脑、移动设备等</li>\n<li><strong>制定预算</strong> - 考虑住宿、交通、生活费用</li>\n</ol>\n<h2>热门数字游民目的地</h2>\n<h3>亚洲</h3>\n<ul>\n<li><strong>泰国清迈</strong> - 生活成本低，数字游民社区活跃</li>\n<li><strong>巴厘岛</strong> - 自然环境优美，网络设施完善</li>\n<li><strong>越南胡志明市</strong> - 快速发展，生活成本适中</li>\n</ul>\n<h3>欧洲</h3>\n<ul>\n<li><strong>葡萄牙里斯本</strong> - 数字游民签证，气候宜人</li>\n<li><strong>西班牙巴塞罗那</strong> - 文化丰富，生活品质高</li>\n<li><strong>德国柏林</strong> - 创业氛围浓厚，技术社区活跃</li>\n</ul>\n<h3>美洲</h3>\n<ul>\n<li><strong>墨西哥城</strong> - 生活成本低，文化丰富</li>\n<li><strong>哥伦比亚麦德林</strong> - 气候宜人，数字游民友好</li>\n<li><strong>加拿大温哥华</strong> - 自然环境优美，生活质量高</li>\n</ul>\n<h2>数字游民的财务管理</h2>\n<h3>收入来源多样化</h3>\n<ol>\n<li><strong>固定工作</strong> - 远程全职或兼职工作</li>\n<li><strong>自由职业</strong> - 项目制工作</li>\n<li><strong>被动收入</strong> - 投资、版权、订阅服务</li>\n<li><strong>创业项目</strong> - 自己的产品或服务</li>\n</ol>\n<h3>成本控制</h3>\n<ol>\n<li><strong>住宿选择</strong> - 选择性价比高的住宿</li>\n<li><strong>交通规划</strong> - 合理规划旅行路线</li>\n<li><strong>生活费用</strong> - 选择生活成本较低的地区</li>\n<li><strong>保险规划</strong> - 购买必要的保险</li>\n</ol>\n<h2>数字游民的社区</h2>\n<h3>线上社区</h3>\n<ul>\n<li><strong>Nomad List</strong> - 数字游民目的地和社区信息</li>\n<li><strong>Reddit r/digitalnomad</strong> - 经验分享和讨论</li>\n<li><strong>Facebook Groups</strong> - 各地数字游民群组</li>\n<li><strong>Discord</strong> - 实时交流和协作</li>\n</ul>\n<h3>线下社区</h3>\n<ul>\n<li><strong>联合办公空间</strong> - 提供工作环境和社交机会</li>\n<li><strong>数字游民聚会</strong> - 定期举办的线下活动</li>\n<li><strong>语言交换</strong> - 与当地人交流学习</li>\n<li><strong>技能分享</strong> - 组织技能分享活动</li>\n</ul>\n<h2>数字游民的未来</h2>\n<h3>发展趋势</h3>\n<ol>\n<li><strong>政策支持</strong> - 更多国家推出数字游民签证</li>\n<li><strong>技术发展</strong> - 5G、卫星互联网等技术普及</li>\n<li><strong>工作模式</strong> - 混合工作模式成为主流</li>\n<li><strong>社区建设</strong> - 数字游民社区更加完善</li>\n</ol>\n<h3>挑战与机遇</h3>\n<ul>\n<li><strong>竞争加剧</strong> - 更多人才加入远程工作</li>\n<li><strong>技术更新</strong> - 需要不断学习新技术</li>\n<li><strong>政策变化</strong> - 各国政策可能影响流动性</li>\n<li><strong>可持续发展</strong> - 考虑环境影响和可持续性</li>\n</ul>\n<h2>总结</h2>\n<p>数字游民生活方式代表了工作与生活的新模式，虽然面临诸多挑战，但也提供了前所未有的自由和机会。成功的关键在于充分的准备、持续的学习和灵活的适应能力。</p>\n<p>无论你是刚刚开始考虑数字游民生活，还是已经在这个道路上，记住：最重要的是找到适合自己的节奏和方式，在追求自由的同时，也要确保稳定和可持续的发展。</p>\n<hr>\n<p><em>数字游民不仅是一种工作方式，更是一种生活态度。在追求自由的同时，也要承担相应的责任和挑战。</em> </p>\n"},{"slug":"thoughts/learning-methods","title":"高效学习方法：从理论到实践","description":"探讨现代高效学习方法，包括费曼学习法、间隔重复等经典理论，以及如何在实际学习中应用这些方法","pubDate":"2024-01-03","tags":["个人成长"],"heroImage":"/images/learning.jpg","content":"<h1>高效学习方法：从理论到实践</h1>\n<p>在信息爆炸的时代，掌握高效的学习方法比掌握知识本身更加重要。本文将介绍几种经过验证的高效学习方法，并探讨如何在实际学习中应用这些方法。</p>\n<h2>费曼学习法</h2>\n<h3>核心原理</h3>\n<p>费曼学习法的核心是&quot;如果你不能向一个六岁的孩子解释清楚一个概念，那么你其实并不真正理解它&quot;。</p>\n<h3>实践步骤</h3>\n<ol>\n<li><strong>选择一个概念</strong> - 确定要学习的内容</li>\n<li><strong>向他人解释</strong> - 用简单的语言解释给他人听</li>\n<li><strong>发现知识缺口</strong> - 在解释过程中发现自己的不足</li>\n<li><strong>回顾和简化</strong> - 重新学习并简化解释</li>\n</ol>\n<h3>实际应用</h3>\n<ul>\n<li>在学习新技术时，尝试写博客文章解释概念</li>\n<li>参与技术讨论，向他人分享你的理解</li>\n<li>录制教学视频，检验自己的掌握程度</li>\n</ul>\n<h2>间隔重复法</h2>\n<h3>科学依据</h3>\n<p>间隔重复基于艾宾浩斯遗忘曲线，通过科学的时间间隔来复习，能够显著提高记忆效果。</p>\n<h3>推荐工具</h3>\n<ul>\n<li><strong>Anki</strong> - 经典的间隔重复软件</li>\n<li><strong>Notion</strong> - 可以创建自定义的复习系统</li>\n<li><strong>RemNote</strong> - 结合笔记和间隔重复</li>\n</ul>\n<h3>实践建议</h3>\n<ul>\n<li>制定合理的复习计划</li>\n<li>根据个人情况调整间隔时间</li>\n<li>结合多种复习方式</li>\n</ul>\n<h2>主动学习法</h2>\n<h3>被动 vs 主动</h3>\n<ul>\n<li><strong>被动学习</strong>：阅读、听讲、观看视频</li>\n<li><strong>主动学习</strong>：实践、讨论、教授他人</li>\n</ul>\n<h3>主动学习策略</h3>\n<ol>\n<li><strong>实践项目</strong> - 将理论知识应用到实际项目中</li>\n<li><strong>小组讨论</strong> - 与他人交流学习心得</li>\n<li><strong>自我测试</strong> - 定期检验学习效果</li>\n<li><strong>知识整理</strong> - 将学到的知识系统化</li>\n</ol>\n<h2>学习环境优化</h2>\n<h3>物理环境</h3>\n<ul>\n<li><strong>光线充足</strong> - 确保学习环境光线良好</li>\n<li><strong>噪音控制</strong> - 选择安静或适合的学习环境</li>\n<li><strong>温度适宜</strong> - 保持舒适的温度</li>\n</ul>\n<h3>数字环境</h3>\n<ul>\n<li><strong>工具选择</strong> - 选择适合自己的学习工具</li>\n<li><strong>信息管理</strong> - 建立有效的信息收集和整理系统</li>\n<li><strong>专注模式</strong> - 使用番茄工作法等专注技巧</li>\n</ul>\n<h2>学习计划制定</h2>\n<h3>目标设定</h3>\n<ul>\n<li><strong>SMART原则</strong> - 具体、可测量、可实现、相关、有时限</li>\n<li><strong>分阶段目标</strong> - 将大目标分解为小目标</li>\n<li><strong>定期回顾</strong> - 定期评估和调整学习目标</li>\n</ul>\n<h3>时间管理</h3>\n<ul>\n<li><strong>优先级排序</strong> - 根据重要性和紧急性安排学习内容</li>\n<li><strong>时间块</strong> - 为不同学习内容分配专门的时间块</li>\n<li><strong>休息安排</strong> - 合理安排学习和休息时间</li>\n</ul>\n<h2>常见误区</h2>\n<h3>1. 追求速度而忽视质量</h3>\n<p>学习不是比赛，理解比速度更重要。</p>\n<h3>2. 忽视复习的重要性</h3>\n<p>新知识需要多次复习才能巩固。</p>\n<h3>3. 孤立学习</h3>\n<p>与他人交流能够加深理解和记忆。</p>\n<h3>4. 忽视实践</h3>\n<p>理论知识需要通过实践来验证和巩固。</p>\n<h2>持续改进</h2>\n<h3>学习日志</h3>\n<p>记录每天的学习内容、心得和问题，定期回顾和总结。</p>\n<h3>反馈机制</h3>\n<p>寻求他人的反馈，不断改进学习方法。</p>\n<h3>适应性调整</h3>\n<p>根据学习效果和个人情况，不断调整学习策略。</p>\n<h2>总结</h2>\n<p>高效学习不是一蹴而就的，需要持续的努力和改进。通过掌握科学的学习方法，建立良好的学习习惯，我们能够显著提高学习效率，在知识爆炸的时代保持竞争力。</p>\n<p>记住，最好的学习方法就是最适合你的方法。在实践中不断尝试和调整，找到属于自己的高效学习之路。</p>\n<hr>\n<p><em>学习是一辈子的事情，掌握高效的学习方法，让学习变得更加轻松和有效。</em> </p>\n"},{"slug":"life/remote-work","title":"远程工作的新常态：效率与平衡","description":"探讨远程工作的优势、挑战以及如何建立高效的工作环境","pubDate":"2024-01-02","tags":["个人成长","生活方式"],"heroImage":"/images/remote-work.jpg","content":"<h1>远程工作的新常态：效率与平衡</h1>\n<p>随着技术的进步和全球疫情的影响，远程工作已经从一种选择变成了许多人的工作常态。这种工作模式带来了前所未有的灵活性和机遇，同时也带来了新的挑战。</p>\n<h2>远程工作的优势</h2>\n<h3>1. 时间灵活性</h3>\n<p>远程工作让员工可以根据自己的生物钟和最佳工作时间来安排工作，提高工作效率。</p>\n<h3>2. 地点自由</h3>\n<p>不再受限于办公室位置，员工可以选择最适合自己的工作环境。</p>\n<h3>3. 成本节约</h3>\n<p>减少了通勤时间和费用，同时也降低了公司的办公成本。</p>\n<h3>4. 工作生活平衡</h3>\n<p>远程工作让员工能够更好地平衡工作和个人生活。</p>\n<h2>面临的挑战</h2>\n<h3>1. 沟通障碍</h3>\n<p>缺乏面对面的交流可能导致沟通效率下降，团队协作受到影响。</p>\n<h3>2. 工作边界模糊</h3>\n<p>在家工作容易让工作时间和个人时间界限模糊，导致过度工作。</p>\n<h3>3. 技术依赖</h3>\n<p>远程工作高度依赖稳定的网络和合适的设备。</p>\n<h3>4. 孤独感</h3>\n<p>长期在家工作可能导致社交隔离和孤独感。</p>\n<h2>建立高效的远程工作环境</h2>\n<h3>1. 设立专门的工作空间</h3>\n<p>在家中创建一个专门的工作区域，避免在床上或沙发上工作。</p>\n<h3>2. 制定明确的时间表</h3>\n<p>设定固定的工作时间，并严格遵守，避免工作时间的无限延长。</p>\n<h3>3. 使用合适的工具</h3>\n<p>选择合适的沟通和协作工具，如Zoom、Slack、Notion等。</p>\n<h3>4. 保持社交联系</h3>\n<p>定期与同事进行视频会议，保持团队联系。</p>\n<h3>5. 自我管理</h3>\n<p>培养自律能力，设定明确的目标和优先级。</p>\n<h2>未来趋势</h2>\n<p>远程工作将继续发展，混合工作模式（部分时间在办公室，部分时间远程）将成为主流。企业需要重新思考工作文化和管理方式，以适应这种新的工作模式。</p>\n<hr>\n<p><em>远程工作不仅是技术进步的产物，更是工作方式的一次革命。通过合理的管理和适应，我们可以充分利用这种工作模式的优势。</em> </p>\n"},{"slug":"tech/vision/ai-future","title":"人工智能的未来：机遇与挑战","description":"探讨人工智能技术发展趋势，以及它如何改变我们的工作和生活方式","pubDate":"2024-01-01","tags":["AI与机器学习","技术","未来趋势"],"heroImage":"/images/ai-future.jpg","content":"<h1>人工智能的未来：机遇与挑战</h1>\n<p>人工智能（AI）正在以前所未有的速度发展，从机器学习到深度学习，从自然语言处理到计算机视觉，AI技术正在各个领域展现出巨大的潜力。</p>\n<h2>当前AI发展现状</h2>\n<h3>1. 大语言模型的突破</h3>\n<p>ChatGPT、GPT-4等大语言模型的出现，标志着AI在自然语言处理方面取得了重大突破。这些模型不仅能够理解和生成人类语言，还能进行创造性写作、代码生成等复杂任务。</p>\n<h3>2. 多模态AI的发展</h3>\n<p>现代AI系统已经能够处理文本、图像、音频等多种模态的信息，这为更智能的人机交互奠定了基础。</p>\n<h2>AI带来的机遇</h2>\n<h3>1. 提高工作效率</h3>\n<p>AI可以自动化重复性任务，让人类专注于更有创造性和价值的工作。</p>\n<h3>2. 个性化服务</h3>\n<p>AI能够根据用户的行为和偏好提供个性化的产品和服务。</p>\n<h3>3. 科学研究的加速</h3>\n<p>AI在药物发现、材料科学等领域的应用，正在加速科学研究的进程。</p>\n<h2>面临的挑战</h2>\n<h3>1. 就业影响</h3>\n<p>AI的普及可能会对某些行业造成冲击，需要重新思考教育和职业发展。</p>\n<h3>2. 伦理问题</h3>\n<p>AI决策的透明度和公平性，以及隐私保护等问题需要认真考虑。</p>\n<h3>3. 技术风险</h3>\n<p>AI系统的安全性和可控性，以及防止恶意使用等问题。</p>\n<h2>未来展望</h2>\n<p>AI技术的发展将继续加速，我们需要在享受AI带来便利的同时，也要积极应对其带来的挑战。通过合理的政策制定和技术发展，AI将成为推动人类社会发展的重要力量。</p>\n<hr>\n<p><em>本文探讨了AI技术的发展现状、机遇和挑战，为读者提供了对AI未来的深入思考。</em> </p>\n"}];
            
            // 获取URL参数
            function getUrlParams() {
              const params = new URLSearchParams(window.location.search);
              return {
                tag: params.get('tag'),
                page: parseInt(params.get('page') || '1', 10)
              };
            }
            
            // 生成分页链接
            function generatePageUrl(pageNum, tag) {
              const params = new URLSearchParams();
              if (tag) {
                params.set('tag', tag);
              }
              if (pageNum > 1) {
                params.set('page', pageNum.toString());
              }
              const queryString = params.toString();
              return '/blog' + (queryString ? '?' + queryString : '');
            }
            
            // 渲染标签筛选
            function renderTagFilters() {
              const container = document.getElementById('tag-filters');
              const { tag } = getUrlParams();
              
              // 获取所有标签
              const allTags = [...new Set(
                window.blogData.flatMap(post => post.tags || [])
              )].sort();
              
              let html = `
                <a href="/blog" class="px-3 py-1 rounded-full text-sm ${!tag ? 'bg-blue-500 text-white' : 'bg-gray-200 text-gray-700 hover:bg-gray-300'}">
                  全部
                </a>
              `;
              
              allTags.forEach(tagName => {
                const isActive = tag === encodeURIComponent(tagName);
                html += `
                  <a href="/blog?tag=${encodeURIComponent(tagName)}" 
                     class="px-3 py-1 rounded-full text-sm ${isActive ? 'bg-blue-500 text-white' : 'bg-gray-200 text-gray-700 hover:bg-gray-300'}">
                    ${tagName}
                  </a>
                `;
              });
              
              container.innerHTML = html;
            }
            
            // 渲染文章列表
            function renderBlogList() {
              const container = document.getElementById('blog-list');
              const { tag, page } = getUrlParams();
              const postsPerPage = 12;
              
              // 筛选文章
              let filteredPosts = window.blogData;
              if (tag) {
                filteredPosts = window.blogData.filter(post => 
                  post.tags && post.tags.includes(decodeURIComponent(tag))
                );
              }
              
              // 分页
              const totalPosts = filteredPosts.length;
              const totalPages = Math.ceil(totalPosts / postsPerPage);
              const startIndex = (page - 1) * postsPerPage;
              const endIndex = startIndex + postsPerPage;
              const currentPosts = filteredPosts.slice(startIndex, endIndex);
              
              // 生成HTML
              let html = '';
              currentPosts.forEach(post => {
                html += `
                  <div class="bg-white rounded-lg shadow-md overflow-hidden hover:shadow-lg transition-shadow">
                    <div class="p-6">
                      <h2 class="text-xl font-semibold mb-2">
                        <a href="/blog/${post.slug}" class="text-gray-900 hover:text-blue-600">
                          ${post.title}
                        </a>
                      </h2>
                      <p class="text-gray-600 mb-4 line-clamp-3">${post.excerpt}</p>
                      <div class="flex items-center justify-between">
                        <span class="text-sm text-gray-500">${new Date(post.date).toLocaleDateString()}</span>
                        <div class="flex gap-1">
                          ${(post.tags || []).map(tag => `
                            <span class="px-2 py-1 bg-gray-100 text-xs text-gray-600 rounded">${tag}</span>
                          `).join('')}
                        </div>
                      </div>
                    </div>
                  </div>
                `;
              });
              
              container.innerHTML = html;
            }
            
            // 渲染分页
            function renderPagination() {
              const container = document.getElementById('pagination');
              const { tag, page } = getUrlParams();
              const postsPerPage = 12;
              
              // 筛选文章
              let filteredPosts = window.blogData;
              if (tag) {
                filteredPosts = window.blogData.filter(post => 
                  post.tags && post.tags.includes(decodeURIComponent(tag))
                );
              }
              
              const totalPosts = filteredPosts.length;
              const totalPages = Math.ceil(totalPosts / postsPerPage);
              
              if (totalPages <= 1) {
                container.innerHTML = '';
                return;
              }
              
              let html = '';
              
              // 上一页
              if (page > 1) {
                html += `
                  <a href="${generatePageUrl(page - 1, tag)}" 
                     class="px-4 py-2 bg-gray-200 text-gray-700 rounded hover:bg-gray-300">
                    上一页
                  </a>
                `;
              }
              
              // 页码
              for (let i = 1; i <= totalPages; i++) {
                const isActive = i === page;
                html += `
                  <a href="${generatePageUrl(i, tag)}" 
                     class="px-4 py-2 rounded ${isActive ? 'bg-blue-500 text-white' : 'bg-gray-200 text-gray-700 hover:bg-gray-300'}">
                    ${i}
                  </a>
                `;
              }
              
              // 下一页
              if (page < totalPages) {
                html += `
                  <a href="${generatePageUrl(page + 1, tag)}" 
                     class="px-4 py-2 bg-gray-200 text-gray-700 rounded hover:bg-gray-300">
                    下一页
                  </a>
                `;
              }
              
              container.innerHTML = html;
            }
            
            // 渲染统计信息
            function renderStats() {
              const container = document.getElementById('stats');
              const { tag, page } = getUrlParams();
              const postsPerPage = 12;
              
              // 筛选文章
              let filteredPosts = window.blogData;
              if (tag) {
                filteredPosts = window.blogData.filter(post => 
                  post.tags && post.tags.includes(decodeURIComponent(tag))
                );
              }
              
              const totalPosts = filteredPosts.length;
              const totalPages = Math.ceil(totalPosts / postsPerPage);
              
              let stats = `共 ${totalPosts} 篇文章`;
              if (tag) {
                stats += `，标签"${decodeURIComponent(tag)}"`;
              }
              if (totalPages > 1) {
                stats += `，第 ${page} 页，共 ${totalPages} 页`;
              }
              
              container.textContent = stats;
            }
            
            // 初始化
            function init() {
              renderTagFilters();
              renderBlogList();
              renderPagination();
              renderStats();
            }

          </script></div><!--$--><!--/$--></main><footer class="bg-[var(--background)]"><div class="mx-auto max-w-7xl px-6 py-12 md:flex md:items-center md:justify-between lg:px-8"><div class="flex justify-center space-x-6 md:order-2"><a class="text-gray-600 hover:text-gray-800" href="/about/">关于</a><a class="text-gray-600 hover:text-gray-800" href="/blog/">博客</a><a class="text-gray-600 hover:text-gray-800" href="/contact/">联系</a></div><div class="mt-8 md:order-1 md:mt-0"><p class="text-center text-xs leading-5 text-gray-600">© 2024 Skyfalling Blog. All rights reserved.</p></div></div></footer></div><script src="/_next/static/chunks/webpack-decb145ea5426c4a.js" async=""></script><script>(self.__next_f=self.__next_f||[]).push([0])</script><script>self.__next_f.push([1,"1:\"$Sreact.fragment\"\n2:I[45651,[\"874\",\"static/chunks/874-f2e46e41114bd221.js\",\"177\",\"static/chunks/app/layout-7eab3ba0f4da6de9.js\"],\"default\"]\n3:I[87555,[],\"\"]\n4:I[31295,[],\"\"]\n5:I[6874,[\"874\",\"static/chunks/874-f2e46e41114bd221.js\",\"456\",\"static/chunks/456-f674d5499bb2cb66.js\",\"909\",\"static/chunks/app/blog/%5B...slug%5D/page-4299311c59487874.js\"],\"\"]\n7:I[59665,[],\"OutletBoundary\"]\na:I[74911,[],\"AsyncMetadataOutlet\"]\nc:I[59665,[],\"ViewportBoundary\"]\ne:I[59665,[],\"MetadataBoundary\"]\n10:I[26614,[],\"\"]\n:HL[\"/_next/static/media/e4af272ccee01ff0-s.p.woff2\",\"font\",{\"crossOrigin\":\"\",\"type\":\"font/woff2\"}]\n:HL[\"/_next/static/css/73866bd9e7c9fd77.css\",\"style\"]\n6:T7b42f,"])</script><script>self.__next_f.push([1,"\n            // 文章数据\n            window.blogData = [{\"slug\":\"tech/middleware/分布式事务之两阶段提交和三阶提交\",\"title\":\"分布式事务之两阶段提交和三阶提交\",\"description\":\"随着大型网站的各种高并发访问、海量数据处理等场景越来越多，如何实现网站的高可用、易伸缩、可扩展、安全等目标就显得越来越重要。为了解决这样一系列问题，大型网站的架构也在不断发展。提高大型网站的高可用架构，不得不提的就是分布式。\",\"pubDate\":\"2027-07-23\",\"tags\":[\"分布式事务\",\"技术专题\"],\"content\":\"\u003cblockquote\u003e\\n\u003cp\u003e随着大型网站的各种高并发访问、海量数据处理等场景越来越多，如何实现网站的高可用、易伸缩、可扩展、安全等目标就显得越来越重要。为了解决这样一系列问题，大型网站的架构也在不断发展。提高大型网站的高可用架构，不得不提的就是分布式。在分布式一致性一文中主要介绍了分布式系统中存在的一致性问题。本文将简单介绍如何有效的解决分布式的一致性问题,其中包括什么是分布式事务，二阶段提交和三阶段提交。\u003c/p\u003e\\n\u003c/blockquote\u003e\\n\u003ch3\u003e分布式一致性回顾\u003c/h3\u003e\\n\u003cp\u003e在分布式系统中，为了保证数据的高可用，通常，我们会将数据保留多个副本(replica)，这些副本会放置在不同的物理的机器上。为了对用户提供正确的增\\\\删\\\\改\\\\差等语义，我们需要保证这些放置在不同物理机器上的副本是一致的。为了解决这种分布式一致性问题，前人在性能和数据一致性的反反复复权衡过程中总结了许多典型的协议和算法。其中比较著名的有二阶提交协议（Two Phase Commitment Protocol）、三阶提交协议（Three Phase Commitment Protocol）和Paxos算法。\u003c/p\u003e\\n\u003ch3\u003e分布式事务\u003c/h3\u003e\\n\u003cblockquote\u003e\\n\u003cp\u003e分布式事务是指会涉及到操作多个数据库的事务。其实就是将对同一库事务的概念扩大到了对多个库的事务。目的是为了保证分布式系统中的数据一致性。分布式事务处理的关键是必须有一种方法可以知道事务在任何地方所做的所有动作，提交或回滚事务的决定必须产生统一的结果（全部提交或全部回滚）\u003c/p\u003e\\n\u003c/blockquote\u003e\\n\u003cp\u003e在分布式系统中，各个节点之间在物理上相互独立，通过网络进行沟通和协调。由于存在事务机制，可以保证每个独立节点上的数据操作可以满足ACID。但是，相互独立的节点之间无法准确的知道其他节点中的事务执行情况。所以从理论上讲，两台机器理论上无法达到一致的状态。如果想让分布式部署的多台机器中的数据保持一致性，那么就要保证在所有节点的数据写操作，要不全部都执行，要么全部的都不执行。但是，一台机器在执行本地事务的时候无法知道其他机器中的本地事务的执行结果。所以他也就不知道本次事务到底应该commit还是 roolback。所以，常规的解决办法就是引入一个“协调者”的组件来统一调度所有分布式节点的执行。\u003c/p\u003e\\n\u003ch3\u003eXA规范\u003c/h3\u003e\\n\u003cp\u003eX/Open 组织（即现在的 Open Group ）定义了分布式事务处理模型。 X/Open DTP 模型（ 1994 ）包括应用程序（ AP ）、事务管理器（ TM ）、资源管理器（ RM ）、通信资源管理器（ CRM ）四部分。一般，常见的事务管理器（ TM ）是交易中间件，常见的资源管理器（ RM ）是数据库，常见的通信资源管理器（ CRM ）是消息中间件。    通常把一个数据库内部的事务处理，如对多个表的操作，作为本地事务看待。数据库的事务处理对象是本地事务，而分布式事务处理的对象是全局事务。   所谓全局事务，是指分布式事务处理环境中，多个数据库可能需要共同完成一个工作，这个工作即是一个全局事务，例如，一个事务中可能更新几个不同的数据库。对数据库的操作发生在系统的各处但必须全部被提交或回滚。此时一个数据库对自己内部所做操作的提交不仅依赖本身操作是否成功，还要依赖与全局事务相关的其它数据库的操作是否成功，如果任一数据库的任一操作失败，则参与此事务的所有数据库所做的所有操作都必须回滚。     一般情况下，某一数据库无法知道其它数据库在做什么，因此，在一个 DTP 环境中，交易中间件是必需的，由它通知和协调相关数据库的提交或回滚。而一个数据库只将其自己所做的操作（可恢复）影射到全局事务中。   \u003c/p\u003e\\n\u003cblockquote\u003e\\n\u003cp\u003eXA 就是 X/Open DTP 定义的交易中间件与数据库之间的接口规范（即接口函数），交易中间件用它来通知数据库事务的开始、结束以及提交、回滚等。 XA 接口函数由数据库厂商提供。\u003c/p\u003e\\n\u003c/blockquote\u003e\\n\u003cp\u003e二阶提交协议和三阶提交协议就是根据这一思想衍生出来的。可以说二阶段提交其实就是实现XA分布式事务的关键(确切地说：两阶段提交主要保证了分布式事务的原子性：即所有结点要么全做要么全不做)\u003c/p\u003e\\n\u003ch3\u003e2PC\u003c/h3\u003e\\n\u003cblockquote\u003e\\n\u003cp\u003e二阶段提交(Two-phaseCommit)是指，在计算机网络以及数据库领域内，为了使基于分布式系统架构下的所有节点在进行事务提交时保持一致性而设计的一种算法(Algorithm)。通常，二阶段提交也被称为是一种协议(Protocol))。在分布式系统中，每个节点虽然可以知晓自己的操作时成功或者失败，却无法知道其他节点的操作的成功或失败。当一个事务跨越多个节点时，为了保持事务的ACID特性，需要引入一个作为协调者的组件来统一掌控所有节点(称作参与者)的操作结果并最终指示这些节点是否要把操作结果进行真正的提交(比如将更新后的数据写入磁盘等等)。因此，二阶段提交的算法思路可以概括为：参与者将操作成败通知协调者，再由协调者根据所有参与者的反馈情报决定各参与者是否要提交操作还是中止操作。\u003c/p\u003e\\n\u003c/blockquote\u003e\\n\u003cp\u003e所谓的两个阶段是指：第一阶段：准备阶段(投票阶段)和第二阶段：提交阶段（执行阶段）。\u003c/p\u003e\\n\u003ch4\u003e准备阶段\u003c/h4\u003e\\n\u003cp\u003e事务协调者(事务管理器)给每个参与者(资源管理器)发送Prepare消息，每个参与者要么直接返回失败(如权限验证失败)，要么在本地执行事务，写本地的redo和undo日志，但不提交，到达一种“万事俱备，只欠东风”的状态。可以进一步将准备阶段分为以下三个步骤：\u003c/p\u003e\\n\u003cblockquote\u003e\\n\u003cp\u003e1）协调者节点向所有参与者节点询问是否可以执行提交操作(vote)，并开始等待各参与者节点的响应。2）参与者节点执行询问发起为止的所有事务操作，并将Undo信息和Redo信息写入日志。（注意：若成功这里其实每个参与者已经执行了事务操作）3）各参与者节点响应协调者节点发起的询问。如果参与者节点的事务操作实际执行成功，则它返回一个”同意”消息；如果参与者节点的事务操作实际执行失败，则它返回一个”中止”消息。\u003c/p\u003e\\n\u003c/blockquote\u003e\\n\u003ch4\u003e提交阶段\u003c/h4\u003e\\n\u003cp\u003e如果协调者收到了参与者的失败消息或者超时，直接给每个参与者发送回滚(Rollback)消息；否则，发送提交(Commit)消息；参与者根据协调者的指令执行提交或者回滚操作，释放所有事务处理过程中使用的锁资源。(注意:必须在最后阶段释放锁资源)接下来分两种情况分别讨论提交阶段的过程。当协调者节点从所有参与者节点获得的相应消息都为”同意”时:\u003c/p\u003e\\n\u003cp\u003e\u003cimg src=\\\"/images/blog/tech/middleware/img_20250723_01.png\\\" alt=\\\"\\\"\u003e\u003c/p\u003e\\n\u003cblockquote\u003e\\n\u003cp\u003e1）协调者节点向所有参与者节点发出”正式提交(commit)”的请求。2）参与者节点正式完成操作，并释放在整个事务期间内占用的资源。3）参与者节点向协调者节点发送”完成”消息。4）协调者节点受到所有参与者节点反馈的”完成”消息后，完成事务。\u003c/p\u003e\\n\u003c/blockquote\u003e\\n\u003cp\u003e如果任一参与者节点在第一阶段返回的响应消息为”中止”，或者 协调者节点在第一阶段的询问超时之前无法获取所有参与者节点的响应消息时：\u003c/p\u003e\\n\u003cp\u003e\u003cimg src=\\\"/images/blog/tech/middleware/img_20250723_02.png\\\" alt=\\\"\\\"\u003e\u003c/p\u003e\\n\u003cblockquote\u003e\\n\u003cp\u003e1）协调者节点向所有参与者节点发出”回滚操作(rollback)”的请求。2）参与者节点利用之前写入的Undo信息执行回滚，并释放在整个事务期间内占用的资源。3）参与者节点向协调者节点发送”回滚完成”消息。4）协调者节点受到所有参与者节点反馈的”回滚完成”消息后，取消事务。\u003c/p\u003e\\n\u003c/blockquote\u003e\\n\u003cp\u003e　　不管最后结果如何，第二阶段都会结束当前事务。二阶段提交看起来确实能够提供原子性的操作，但是不幸的事，二阶段提交还是有几个缺点的：\u003c/p\u003e\\n\u003cblockquote\u003e\\n\u003cp\u003e1、同步阻塞问题。执行过程中，所有参与节点都是事务阻塞型的。当参与者占有公共资源时，其他第三方节点访问公共资源不得不处于阻塞状态。2、单点故障。由于协调者的重要性，一旦协调者发生故障。参与者会一直阻塞下去。尤其在第二阶段，协调者发生故障，那么所有的参与者还都处于锁定事务资源的状态中，而无法继续完成事务操作。（如果是协调者挂掉，可以重新选举一个协调者，但是无法解决因为协调者宕机导致的参与者处于阻塞状态的问题）3、数据不一致。在二阶段提交的阶段二中，当协调者向参与者发送commit请求之后，发生了局部网络异常或者在发送commit请求过程中协调者发生了故障，这回导致只有一部分参与者接受到了commit请求。而在这部分参与者接到commit请求之后就会执行commit操作。但是其他部分未接到commit请求的机器则无法执行事务提交。于是整个分布式系统便出现了数据部一致性的现象。4、二阶段无法解决的问题：协调者在发出commit消息之后宕机，而唯一接收到这条消息的参与者同时也宕机了。那么即使协调者通过选举协议产生了新的协调者，这条事务的状态也是不确定的，没人知道事务是否被已经提交。\u003c/p\u003e\\n\u003c/blockquote\u003e\\n\u003cp\u003e由于二阶段提交存在着诸如同步阻塞、单点问题、脑裂等缺陷，所以，研究者们在二阶段提交的基础上做了改进，提出了三阶段提交。\u003c/p\u003e\\n\u003ch3\u003e3PC\u003c/h3\u003e\\n\u003cblockquote\u003e\\n\u003cp\u003e三阶段提交（Three-phase commit），也叫三阶段提交协议（Three-phase commit protocol），是二阶段提交（2PC）的改进版本。\u003c/p\u003e\\n\u003c/blockquote\u003e\\n\u003cp\u003e\u003cimg src=\\\"/images/blog/tech/middleware/img_20250723_03.png\\\" alt=\\\"图片\\\"\u003e\u003c/p\u003e\\n\u003cp\u003e与两阶段提交不同的是，三阶段提交有两个改动点。1、引入超时机制。同时在协调者和参与者中都引入超时机制。2、在第一阶段和第二阶段中插入一个准备阶段。保证了在最后提交阶段之前各参与节点的状态是一致的。也就是说，除了引入超时机制之外，3PC把2PC的准备阶段再次一分为二，这样三阶段提交就有CanCommit、PreCommit、DoCommit三个阶段。\u003c/p\u003e\\n\u003ch4\u003eCanCommit阶段\u003c/h4\u003e\\n\u003cp\u003e3PC的CanCommit阶段其实和2PC的准备阶段很像。协调者向参与者发送commit请求，参与者如果可以提交就返回Yes响应，否则返回No响应。\u003c/p\u003e\\n\u003cblockquote\u003e\\n\u003cp\u003e1.事务询问 协调者向参与者发送CanCommit请求。询问是否可以执行事务提交操作。然后开始等待参与者的响应。2.响应反馈 参与者接到CanCommit请求之后，正常情况下，如果其自身认为可以顺利执行事务，则返回Yes响应，并进入预备状态。否则反馈No\u003c/p\u003e\\n\u003c/blockquote\u003e\\n\u003ch4\u003ePreCommit阶段\u003c/h4\u003e\\n\u003cp\u003e协调者根据参与者的反应情况来决定是否可以进行事务的PreCommit操作。根据响应情况，有以下两种可能。假如协调者从所有的参与者获得的反馈都是Yes响应，那么就会执行事务的预执行。\u003c/p\u003e\\n\u003cblockquote\u003e\\n\u003cp\u003e1.发送预提交请求 协调者向参与者发送PreCommit请求，并进入Prepared阶段。2.事务预提交 参与者接收到PreCommit请求后，会执行事务操作，并将undo和redo信息记录到事务日志中。3.响应反馈 如果参与者成功的执行了事务操作，则返回ACK响应，同时开始等待最终指令。\u003c/p\u003e\\n\u003c/blockquote\u003e\\n\u003cp\u003e假如有任何一个参与者向协调者发送了No响应，或者等待超时之后，协调者都没有接到参与者的响应，那么就执行事务的中断。\u003c/p\u003e\\n\u003cblockquote\u003e\\n\u003cp\u003e1.发送中断请求 协调者向所有参与者发送abort请求。2.中断事务 参与者收到来自协调者的abort请求之后（或超时之后，仍未收到协调者的请求），执行事务的中断。\u003c/p\u003e\\n\u003c/blockquote\u003e\\n\u003ch4\u003edoCommit阶段\u003c/h4\u003e\\n\u003cp\u003e该阶段进行真正的事务提交，也可以分为以下两种情况。执行提交\u003c/p\u003e\\n\u003cblockquote\u003e\\n\u003cp\u003e1.发送提交请求 协调接收到参与者发送的ACK响应，那么他将从预提交状态进入到提交状态。并向所有参与者发送doCommit请求。2.事务提交 参与者接收到doCommit请求之后，执行正式的事务提交。并在完成事务提交之后释放所有事务资源。3.响应反馈 事务提交完之后，向协调者发送Ack响应。4.完成事务 协调者接收到所有参与者的ack响应之后，完成事务。\u003c/p\u003e\\n\u003c/blockquote\u003e\\n\u003cp\u003e中断事务 协调者没有接收到参与者发送的ACK响应（可能是接受者发送的不是ACK响应，也可能响应超时），那么就会执行中断事务。\u003c/p\u003e\\n\u003cblockquote\u003e\\n\u003cp\u003e1.发送中断请求 协调者向所有参与者发送abort请求2.事务回滚 参与者接收到abort请求之后，利用其在阶段二记录的undo信息来执行事务的回滚操作，并在完成回滚之后释放所有的事务资源。3.反馈结果 参与者完成事务回滚之后，向协调者发送ACK消息4.中断事务 协调者接收到参与者反馈的ACK消息之后，执行事务的中断。\u003c/p\u003e\\n\u003c/blockquote\u003e\\n\u003cp\u003e在doCommit阶段，如果参与者无法及时接收到来自协调者的doCommit或者rebort请求时，会在等待超时之后，会继续进行事务的提交。（其实这个应该是基于概率来决定的，当进入第三阶段时，说明参与者在第二阶段已经收到了PreCommit请求，那么协调者产生PreCommit请求的前提条件是他在第二阶段开始之前，收到所有参与者的CanCommit响应都是Yes。（一旦参与者收到了PreCommit，意味他知道大家其实都同意修改了）所以，一句话概括就是，当进入第三阶段时，由于网络超时等原因，虽然参与者没有收到commit或者abort响应，但是他有理由相信：成功提交的几率很大。）\u003c/p\u003e\\n\u003ch3\u003e2PC与3PC的区别\u003c/h3\u003e\\n\u003cp\u003e相对于2PC，3PC主要解决的单点故障问题，并减少阻塞，因为一旦参与者无法及时收到来自协调者的信息之后，他会默认执行commit。而不会一直持有事务资源并处于阻塞状态。但是这种机制也会导致数据一致性问题，因为，由于网络原因，协调者发送的abort响应没有及时被参与者接收到，那么参与者在等待超时之后执行了commit操作。这样就和其他接到abort命令并执行回滚的参与者之间存在数据不一致的情况。\u003c/p\u003e\\n\u003chr\u003e\\n\u003cp\u003e了解了2PC和3PC之后，我们可以发现，无论是二阶段提交还是三阶段提交都无法彻底解决分布式的一致性问题。Google Chubby的作者Mike Burrows说过， there is only one consensus protocol, and that’s Paxos” – all other approaches are just broken versions of Paxos. 意即\u003cstrong\u003e世上只有一种一致性算法，那就是Paxos\u003c/strong\u003e，所有其他一致性算法都是Paxos算法的不完整版。后面的文章会介绍这个公认为难于理解但是行之有效的Paxos算法。\u003c/p\u003e\\n\u003ch3\u003e参考资料：\u003c/h3\u003e\\n\u003cp\u003e\u003ca href=\\\"http://www.mamicode.com/info-detail-890945.html\\\"\u003e分布式协议之两阶段提交协议（2PC）和改进三阶段提交协议（3PC）\u003c/a\u003e \u003ca href=\\\"http://blog.csdn.net/bluishglc/article/details/7612811\\\"\u003e关于分布式事务、两阶段提交、一阶段提交、Best Efforts 1PC模式和事务补偿机制的研究\u003c/a\u003e \u003ca href=\\\"http://www.tuicool.com/articles/mARV3u\\\"\u003e两阶段提交协议与三阶段提交协议\u003c/a\u003e\u003c/p\u003e\\n\"},{\"slug\":\"tech/middleware/分布式一致性的探究\",\"title\":\"分布式一致性的探究\",\"description\":\"随着大型网站的各种高并发访问、海量数据处理等场景越来越多，如何实现网站的高可用、易伸缩、可扩展、安全等目标就显得越来越重要。为了解决这样一系列问题，大型网站的架构也在不断发展。提高大型网站的高可用架构，不得不提的就是分布式。\",\"pubDate\":\"2027-07-22\",\"tags\":[\"分布式事务\",\"技术专题\"],\"content\":\"\u003cblockquote\u003e\\n\u003cp\u003e随着大型网站的各种高并发访问、海量数据处理等场景越来越多，如何实现网站的高可用、易伸缩、可扩展、安全等目标就显得越来越重要。为了解决这样一系列问题，大型网站的架构也在不断发展。提高大型网站的高可用架构，不得不提的就是分布式。在初识分布式系统一文中简单介绍了分布式的基本概念，本文将在上篇文章的基础上继续学习分布式的一致性问题。主要介绍分布式一致性的基本概念、重要性、一致性模型等。\u003c/p\u003e\\n\u003c/blockquote\u003e\\n\u003ch3\u003e一致性的重要性\u003c/h3\u003e\\n\u003cp\u003e分布式领域CAP理论告诉我们，任何一个分布式系统都无法同时满足Consistency(一致性),Availability(可用性), Partition tolerance(分区容错性) 这三个基本需求。最多只能满足其中两项。 但是，一个分布式系统无论在CAP三者之间如何权衡，都无法彻底放弃一致性（Consistency），如果真的放弃一致性，那么就说明这个系统中的数据根本不可信，数据也就没有意义，那么这个系统也就没有任何价值可言。所以，无论如何，分布式系统的一致性问题都需要重点关注。(分布式系统的CAP理论、分布式系统的BASE理论)\u003c/p\u003e\\n\u003cp\u003e这里先简单提一下，由于一个分布式系统不可能放弃一致性，那么为什么有的架构师还说在某些场景中可以牺牲一致性呢？通常这里说的放弃一致性指的是放弃数据的强一致性（后文介绍什么是强一致性）。\u003c/p\u003e\\n\u003cp\u003e通常情况下，我们所说的分布式一致性问题通常指的是数据一致性问题。那么我们就先来了解一下什么是数据一致性。\u003c/p\u003e\\n\u003ch3\u003e数据一致性\u003c/h3\u003e\\n\u003cp\u003e数据一致性其实是数据库系统中的概念。我们可以简单的把一致性理解为正确性或者完整性，那么数据一致性通常指关联数据之间的逻辑关系是否正确和完整。我们知道，在数据库系统中通常用事务（访问并可能更新数据库中各种数据项的一个程序执行单元）来保证数据的一致性和完整性。而在分布式系统中，数据一致性往往指的是由于数据的复制，不同数据节点中的数据内容是否完整并且相同。\u003c/p\u003e\\n\u003cp\u003e比如在集中式系统中，有一些关键的配置信息，可以直接保存在服务器的内存中，但是在分布式系统中，如何保存这些配置信息，又如何保证所有机器上的配置信息都保持一致，又如何保证修改一个配置能够把这次修改同步到所有机器中呢？\u003c/p\u003e\\n\u003cp\u003e再比如，在集中式系统中，进行一个同步操作要写同一个数据的时候，可以直接使用事务+锁来管理保证数据的ACID。但是，在分布式系统中如何保证多台机器不会同时写同一条数据呢？\u003c/p\u003e\\n\u003cp\u003e除了上面提到的同一个数据的一致性，还有一种情况也可以叫做数据的一致性：比如我们在电商网站下单，需要经历扣减库存、扣减红包、扣减折扣券等一系列操作。如果库存库存扣减成功，但是红包和折扣券扣减失败的话，也可以说是数据没有保证一致性。\u003c/p\u003e\\n\u003cp\u003e如何保证数据的一致性，是分布式系统中必须面对的问题。\u003c/p\u003e\\n\u003ch3\u003e为什么会有数据一致性问题\u003c/h3\u003e\\n\u003cp\u003e在初识分布式系统中我们介绍过，虽然分布式系统有着诸多优点，但是由于采用多机器进行分布式部署的方式提供服务，必然存在着数据的复制（如数据库的异地容灾，多地部署）。分布式系统的数据复制需求主要来源于以下两个原因：\u003c/p\u003e\\n\u003cp\u003e可用性。将数据复制到分布式部署的多台机器中，可以消除单点故障。防止系统由于某台（些）机器宕机导致的不可用。\u003c/p\u003e\\n\u003cp\u003e性能。通过负载均衡技术，能够让分布在不同地方的数据副本全都对外提供服务。有效提高系统性能。\u003c/p\u003e\\n\u003cp\u003e分布式系统为了提升可用性和性能，会通过复制技术来进行数据同步。复制机制的目的是为了保证数据的一致性。但是数据复制面临的主要难题也是如何保证多个副本之间的数据一致性。在分布式系统引入复制机制后，不同的数据节点之间由于网络延时等原因很容易产生数据不一致的情况。\u003c/p\u003e\\n\u003cp\u003e如果上面提到的数据复制场景你不是很熟悉的话，下面这个例子你肯定遇到过。就是现在很多网站都是微服务化的，一个网站被垂直拆分成多个功能模块。各模块之间独立部署。模块间通过RPC或者HTTP交互。由于这种RPC或者HTTP的交互可能存在网络延迟导致超时的情况。甚至被调用方也有可能执行出错等情况，这时候就可能导致数据不一致。\u003c/p\u003e\\n\u003cp\u003e比如下单操作要依次扣减红包、扣减折扣券、扣减库存。在下单应用的执行过程中，调用红包系统扣减红包成功了，但是再调用折扣券系统扣减折扣券的时候网络超时了。这时候下单应用根本不知道折扣券系统到底有没有执行成功。这时候他就需要一些机制来决定是要回滚红包的扣减，还是继续执行库存的扣减。这种机制，其实就是数据一致性的解决方案了。\u003c/p\u003e\\n\u003cp\u003e由于应用分布式部署，就无法通过数据库事务保证多个写操作的原子性。一旦某个操作失败，其他操作如果不回滚的话就会发生数据不一致问题。\u003c/p\u003e\\n\u003cp\u003e因此，如何能既保证数据一致性，又保证系统的性能，是每一个分布式系统都需要重点考虑和权衡的。一致性模型可以在做这些权衡的时候给我们很多借鉴和思考。\u003c/p\u003e\\n\u003ch3\u003e一致性模型\u003c/h3\u003e\\n\u003ch4\u003e强一致性\u003c/h4\u003e\\n\u003cp\u003e当更新操作完成之后，任何多个后续进程或者线程的访问都会返回最新的更新过的值。这种是对用户最友好的，就是用户上一次写什么，下一次就保证能读到什么。\u003c/p\u003e\\n\u003cp\u003e但是这种实现对性能影响较大，因为这意味着，只要上次的操作没有处理完，就不能让用户读取数据。\u003c/p\u003e\\n\u003ch4\u003e弱一致性\u003c/h4\u003e\\n\u003cp\u003e系统并不保证进程或者线程的访问都会返回最新的更新过的值。系统在数据写入成功之后，不承诺立即可以读到最新写入的值，也不会具体的承诺多久之后可以读到。但会尽可能保证在某个时间级别（比如秒级别）之后，可以让数据达到一致性状态。\u003c/p\u003e\\n\u003ch4\u003e最终一致性\u003c/h4\u003e\\n\u003cp\u003e弱一致性的特定形式。系统保证在没有后续更新的前提下，系统最终返回上一次更新操作的值。在没有故障发生的前提下，不一致窗口的时间主要受通信延迟，系统负载和复制副本的个数影响。DNS是一个典型的最终一致性系统。\u003c/p\u003e\\n\u003cp\u003e最终一致性模型的变种\u003c/p\u003e\\n\u003cul\u003e\\n\u003cli\u003e\u003cp\u003e因果一致性：如果A进程在更新之后向B进程通知更新的完成，那么B的访问操作将会返回更新的值。如果没有因果关系的C进程将会遵循最终一致性的规则。\u003c/p\u003e\\n\u003c/li\u003e\\n\u003cli\u003e\u003cp\u003e读己所写一致性：因果一致性的特定形式。一个进程总可以读到自己更新的数据。\u003c/p\u003e\\n\u003c/li\u003e\\n\u003cli\u003e\u003cp\u003e会话一致性：读己所写一致性的特定形式。进程在访问存储系统同一个会话内，系统保证该进程读己之所写。\u003c/p\u003e\\n\u003c/li\u003e\\n\u003cli\u003e\u003cp\u003e单调读一致性：如果一个进程已经读取到一个特定值，那么该进程不会读取到该值以前的任何值。\u003c/p\u003e\\n\u003c/li\u003e\\n\u003cli\u003e\u003cp\u003e单调写一致性：系统保证对同一个进程的写操作串行化。\u003c/p\u003e\\n\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003cp\u003e上述最终一致性的不同方式可以进行组合，例如单调读一致性和读己之所写一致性就可以组合实现。并且从实践的角度来看，这两者的组合，读取自己更新的数据，和一旦读取到最新的版本不会再读取旧版本，对于此架构上的程序开发来说，会少很多额外的烦恼。\u003c/p\u003e\\n\u003cp\u003e为了解决分布式的一致性问题，在长期的研究探索过程中，涌现出了一大批经典的一致性协议和算法，其中比较著名的有二阶段提交协议，三阶段提交协议和Paxos算法。 下一篇文章将介绍这些和分布式一致性相关的协议和算法。\u003c/p\u003e\\n\"},{\"slug\":\"tech/middleware/初识分布式系统\",\"title\":\"初识分布式系统\",\"description\":\"随着大型网站的各种高并发访问、海量数据处理等场景越来越多，如何实现网站的高可用、易伸缩、可扩展、安全等目标就显得越来越重要。为了解决这样一系列问题，大型网站的架构也在不断发展。提高大型网站的高可用架构，不得不提的就是分布式。\",\"pubDate\":\"2027-07-20\",\"tags\":[\"分布式事务\",\"技术专题\"],\"content\":\"\u003cblockquote\u003e\\n\u003cp\u003e随着大型网站的各种高并发访问、海量数据处理等场景越来越多，如何实现网站的高可用、易伸缩、可扩展、安全等目标就显得越来越重要。为了解决这样一系列问题，大型网站的架构也在不断发展。提高大型网站的高可用架构，不得不提的就是分布式。本文主要简单介绍了分布式系统的概念、分布式系统的特点、常用的分布式方案以及分布式和集群的区别等。\u003c/p\u003e\\n\u003c/blockquote\u003e\\n\u003ch3\u003e一、集中式系统\u003c/h3\u003e\\n\u003cp\u003e在学习分布式之前，先了解一下与之相对应的集中式系统是什么样的。\u003c/p\u003e\\n\u003cp\u003e集中式系统用一句话概括就是：一个主机带多个终端。终端没有数据处理能力，仅负责数据的录入和输出。而运算、存储等全部在主机上进行。现在的银行系统，大部分都是这种集中式的系统，此外，在大型企业、科研单位、军队、政府等也有分布。集中式系统，主要流行于上个世纪。\u003c/p\u003e\\n\u003cp\u003e集中式系统的最大的特点就是部署结构非常简单，底层一般采用从IBM、HP等厂商购买到的昂贵的大型主机。因此无需考虑如何对服务进行多节点的部署，也就不用考虑各节点之间的分布式协作问题。但是，由于采用单机部署。很可能带来系统大而复杂、难于维护、发生单点故障（单个点发生故障的时候会波及到整个系统或者网络，从而导致整个系统或者网络的瘫痪）、扩展性差等问题。\u003c/p\u003e\\n\u003ch3\u003e二、分布式系统\u003c/h3\u003e\\n\u003cp\u003e在《分布式系统概念与设计》一书中，对分布式系统做了如下定义：\u003c/p\u003e\\n\u003cp\u003e分布式系统是一个硬件或软件组件分布在不同的网络计算机上，彼此之间仅仅通过消息传递进行通信和协调的系统\u003c/p\u003e\\n\u003cp\u003e简单来说就是一群独立计算机集合共同对外提供服务，但是对于系统的用户来说，就像是一台计算机在提供服务一样。分布式意味着可以采用更多的普通计算机（相对于昂贵的大型机）组成分布式集群对外提供服务。计算机越多，CPU、内存、存储资源等也就越多，能够处理的并发访问量也就越大。\u003c/p\u003e\\n\u003cp\u003e从分布式系统的概念中我们知道，各个主机之间通信和协调主要通过网络进行，所以，分布式系统中的计算机在空间上几乎没有任何限制，这些计算机可能被放在不同的机柜上，也可能被部署在不同的机房中，还可能在不同的城市中，对于大型的网站甚至可能分布在不同的国家和地区。但是，无论空间上如何分布，一个标准的分布式系统应该具有以下几个主要特征：\u003c/p\u003e\\n\u003ch4\u003e分布性\u003c/h4\u003e\\n\u003cp\u003e分布式系统中的多台计算机之间在空间位置上可以随意分布，系统中的多台计算机之间没有主、从之分，即没有控制整个系统的主机，也没有受控的从机。\u003c/p\u003e\\n\u003ch4\u003e透明性\u003c/h4\u003e\\n\u003cp\u003e系统资源被所有计算机共享。每台计算机的用户不仅可以使用本机的资源，还可以使用本分布式系统中其他计算机的资源(包括CPU、文件、打印机等)。\u003c/p\u003e\\n\u003ch4\u003e同一性\u003c/h4\u003e\\n\u003cp\u003e系统中的若干台计算机可以互相协作来完成一个共同的任务，或者说一个程序可以分布在几台计算机上并行地运行。\u003c/p\u003e\\n\u003ch4\u003e通信性\u003c/h4\u003e\\n\u003cp\u003e系统中任意两台计算机都可以通过通信来交换信息。\u003c/p\u003e\\n\u003cp\u003e和集中式系统相比，分布式系统的性价比更高、处理能力更强、可靠性更高、也有很好的扩展性。但是，分布式在解决了网站的高并发问题的同时也带来了一些其他问题。首先，分布式的必要条件就是网络，这可能对性能甚至服务能力造成一定的影响。其次，一个集群中的服务器数量越多，服务器宕机的概率也就越大。另外，由于服务在集群中分布是部署，用户的请求只会落到其中一台机器上，所以，一旦处理不好就很容易产生数据一致性问题。\u003c/p\u003e\\n\u003ch2\u003e常用的分布式方案\u003c/h2\u003e\\n\u003ch3\u003e分布式应用和服务\u003c/h3\u003e\\n\u003cp\u003e将应用和服务进行分层和分割，然后将应用和服务模块进行分布式部署。这样做不仅可以提高并发访问能力、减少数据库连接和资源消耗，还能使不同应用复用共同的服务，使业务易于扩展。\u003c/p\u003e\\n\u003ch3\u003e分布式静态资源\u003c/h3\u003e\\n\u003cp\u003e对网站的静态资源如JS、CSS、图片等资源进行分布式部署可以减轻应用服务器的负载压力，提高访问速度。\u003c/p\u003e\\n\u003ch3\u003e分布式数据和存储\u003c/h3\u003e\\n\u003cp\u003e大型网站常常需要处理海量数据，单台计算机往往无法提供足够的内存空间，可以对这些数据进行分布式存储。\u003c/p\u003e\\n\u003ch3\u003e分布式计算\u003c/h3\u003e\\n\u003cp\u003e随着计算技术的发展，有些应用需要非常巨大的计算能力才能完成，如果采用集中式计算，需要耗费相当长的时间来完成。分布式计算将该应用分解成许多小的部分，分配给多台计算机进行处理。这样可以节约整体计算时间，大大提高计算效率。\u003c/p\u003e\\n\u003ch3\u003e分布式与集群\u003c/h3\u003e\\n\u003cp\u003e分布式（distributed）是指在多台不同的服务器中部署不同的服务模块，通过远程调用协同工作，对外提供服务。\u003c/p\u003e\\n\u003cp\u003e集群（cluster）是指在多台不同的服务器中部署相同应用或服务模块，构成一个集群，通过负载均衡设备对外提供服务。\u003c/p\u003e\\n\"},{\"slug\":\"tech/bigdata/大数据分析常用去重算法分析之Bitmap篇\",\"title\":\"大数据分析常用去重算法分析之Bitmap篇\",\"description\":\"去重分析在企业日常分析中的使用频率非常高，如何在大数据场景下快速地进行去重分析一直是一大难点。在近期的 Apache Kylin Meetup 北京站上，我们邀请到 Kyligence 大数据研发工程师陶加涛为大家揭开了大数据分析常用去重算法的神秘面纱。 Apache Kylin 作为目前唯一一个同...\",\"pubDate\":\"2027-03-26\",\"tags\":[\"大数据\",\"技术专题\",\"去重算法\",\"Bitmap\"],\"content\":\"\u003cp\u003e去重分析在企业日常分析中的使用频率非常高，如何在大数据场景下快速地进行去重分析一直是一大难点。在近期的 Apache Kylin Meetup 北京站上，我们邀请到 Kyligence 大数据研发工程师陶加涛为大家揭开了大数据分析常用去重算法的神秘面纱。\u003c/p\u003e\\n\u003cp\u003eApache Kylin 作为目前唯一一个同时支持精确与非精确去重查询的 OLAP 引擎，非常好地覆盖了大数据上的去重需求。本次分享讲解了 Kylin 这两种去重方式背后用到的算法，希望能让大家从源头上理解为什么 Kylin 的去重查询有着如此优异的性能。此次分享的回顾将分为两期，本篇首先为大家介绍精确去重算法 Bitmap 。\u003c/p\u003e\\n\u003cp\u003e首先，请大家思考一个问题：在大数据处理领域中，什么环节是你最不希望见到的？以我的观点来看，shuffle 是我最不愿意见到的环节，因为一旦出现了非常多的 shuffle，就会占用大量的磁盘和网络 IO，从而导致任务进行得非常缓慢。而今天我们所讨论的去重分析，就是一个会产生非常多 shuffle 的场景，先来看以下场景：\u003c/p\u003e\\n\u003cp\u003e\u003cimg src=\\\"/images/blog/tech/bigdata/image_1_1.png\\\" alt=\\\"image_1_1.png\\\"\u003e\u003c/p\u003e\\n\u003cp\u003e我们有一张商品访问表，表上有 item 和 user_id 两个列，我们希望求商品的 UV，这是去重非常典型的一个场景。我们的数据是存储在分布式平台上的，分别在数据节点 1 和 2 上。\u003c/p\u003e\\n\u003cp\u003e我们从物理执行层面上想一下这句 SQL 背后会发生什么故事：首先分布式计算框架启动任务, 从两个节点上去拿数据, 因为 SQL group by 了 item 列, 所以需要以 item 为 key 对两个表中的原始数据进行一次 shuffle。我们来看看需要 shuffle 哪些数据：因为 select/group by了 item，所以 item 需要 shuffle 。但是，user_id 我们只需要它的一个统计值，能不能不 shuffle 整个 user_id 的原始值呢？\u003c/p\u003e\\n\u003cp\u003e如果只是简单的求 count 的话, 每个数据节点分别求出对应 item 的 user_id 的 count, 然后只要 shuffle 这个 count 就行了，因为count 只是一个数字, 所以 shuffle 的量非常小。但是由于分析的指标是 count distinct，我们不能简单相加两个节点user_id 的 count distinct 值，我们只有得到一个 key 对应的所有 user_id 才能统计出正确的 count distinct值，而这些值原先可能分布在不同的节点上，所以我们只能通过 shuffle 把这些值收集到同一个节点上再做去重。而当 user_id 这一列的数据量非常大的时候，需要 shuffle 的数据量也会非常大。我们其实最后只需要一个 count 值，那么有办法可以不 shuffle 整个列的原始值吗？我下面要介绍的两种算法就提供了这样的一种思路，使用更少的信息位，同样能够求出该列不重复元素的个数（基数）。\u003c/p\u003e\\n\u003cp\u003e\u003cstrong\u003e精确算法: Bitmap\u003c/strong\u003e\u003c/p\u003e\\n\u003cp\u003e\u003cimg src=\\\"/images/blog/tech/bigdata/image_1_2.png\\\" alt=\\\"image_1_2.png\\\"\u003e\u003c/p\u003e\\n\u003cp\u003e第一种要介绍的算法是一种精确的去重算法，主要利用了 Bitmap 的原理。Bitmap 也称之为 Bitset，它本质上是定义了一个很大的 bit 数组，每个元素对应到 bit 数组的其中一位。例如有一个集合［2，3，5，8］对应的 Bitmap 数组是［001101001］，集合中的 2 对应到数组 index 为 2 的位置，3 对应到 index 为 3 的位置，下同，得到的这样一个数组，我们就称之为 Bitmap。很直观的，数组中 1 的数量就是集合的基数。追本溯源，我们的目的是用更小的存储去表示更多的信息，而在计算机最小的信息单位是 bit，如果能够用一个 bit 来表示集合中的一个元素，比起原始元素，可以节省非常多的存储。\u003c/p\u003e\\n\u003cp\u003e这就是最基础的 Bitmap，我们可以把 Bitmap 想象成一个容器，我们知道一个 Integer 是32位的，如果一个 Bitmap 可以存放最多 Integer.MAX_VALUE 个值，那么这个 Bitmap 最少需要 32 的长度。一个 32 位长度的 Bitmap 占用的空间是512 M （2^32/8/1024/1024），这种 Bitmap 存在着非常明显的问题：这种 Bitmap 中不论只有 1 个元素或者有 40 亿个元素，它都需要占据 512 M 的空间。回到刚才求 UV 的场景，不是每一个商品都会有那么多的访问，一些爆款可能会有上亿的访问，但是一些比较冷门的商品可能只有几个用户浏览，如果都用这种 Bitmap，它们占用的空间都是一样大的，这显然是不可接受的。\u003c/p\u003e\\n\u003cp\u003e\u003cstrong\u003e升级版 Bitmap: Roaring Bitmap\u003c/strong\u003e\u003c/p\u003e\\n\u003cp\u003e\u003cimg src=\\\"/images/blog/tech/bigdata/image_1_3.png\\\" alt=\\\"image_1_3.png\\\"\u003e\u003c/p\u003e\\n\u003cp\u003e对于上节说的问题，有一种设计的非常的精巧 Bitmap，叫做 Roaring Bitmap，能够很好地解决上面说的这个问题。我们还是以存放 Integer 值的 Bitmap 来举例，Roaring Bitmap 把一个 32 位的 Integer 划分为高 16 位和低 16 位，取高 16 位找到该条数据所对应的 key，每个 key 都有自己的一个 Container。我们把剩余的低 16 位放入该 Container 中。依据不同的场景，有 3 种不同的 Container，分别是 Array Container、Bitmap Container 和 Run Container，下文将一一介绍。\u003c/p\u003e\\n\u003cp\u003e\u003cimg src=\\\"/images/blog/tech/bigdata/image_1_4.png\\\" alt=\\\"image_1_4.png\\\"\u003e\u003c/p\u003e\\n\u003cp\u003e首先第一种，是 Roaring Bitmap 初始化时默认的 Container，叫做 Array Container。Array Container 适合存放稀疏的数据，Array Container 内部的数据结构是一个 short array，这个 array 是有序的，方便查找。数组初始容量为 4，数组最大容量为 4096。超过最大容量 4096 时，会转换为 Bitmap Container。这边举例来说明数据放入一个 Array Container 的过程：有 0xFFFF0000 和 0xFFFF0001 两个数需要放到 Bitmap 中, 它们的前 16 位都是 FFFF，所以他们是同一个 key，它们的后 16 位存放在同一个 Container 中; 它们的后 16 位分别是 0 和 1, 在 Array Container 的数组中分别保存 0 和 1 就可以了，相较于原始的 Bitmap 需要占用 512M 内存来存储这两个数，这种存放实际只占用了 2+4=6 个字节（key 占 2 Bytes，两个 value 占 4 Bytes，不考虑数组的初始容量）。\u003c/p\u003e\\n\u003cp\u003e\u003cimg src=\\\"/images/blog/tech/bigdata/image_1_5.png\\\" alt=\\\"image_1_5.png\\\"\u003e\u003c/p\u003e\\n\u003cp\u003e第二种 Container 是 Bitmap Container，其原理就是上文说的 Bitmap。它的数据结构是一个 long 的数组，数组容量固定为 1024，和上文的 Array Container 不同，Array Container 是一个动态扩容的数组。这边推导下 1024 这个值：由于每个 Container 还需处理剩余的后 16 位数据，使用 Bitmap 来存储需要 8192 Bytes（2^16/8）, 而一个 long 值占 8 个 Bytes，所以一共需要 1024（8192/8）个 long 值。所以一个 Bitmap container 固定占用内存 8 KB（1024 * 8 Byte）。当 Array Container 中元素到 4096 个时，也恰好占用 8 k（4096*2Bytes）的空间，正好等于 Bitmap 所占用的 8 KB。而当你存放的元素个数超过 4096 的时候，Array Container 的大小占用还是会线性的增长，但是 Bitmap Container 的内存空间并不会增长，始终还是占用 8 K，所以当 Array Container 超过最大容量（DEFAULT_MAX_SIZE）会转换为 Bitmap Container。\u003c/p\u003e\\n\u003cp\u003e我们自己在 Kylin 中实践使用 Roaring Bitmap 时，我们发现 Array Container 随着数据量的增加会不停地 resize 自己的数组，而 Java 数组的 resize 其实非常消耗性能，因为它会不停地申请新的内存，同时老的内存在复制完成前也不会释放，导致内存占用变高，所以我们建议把 DEFAULT_MAX_SIZE 调得低一点，调成 1024 或者 2048，减少 Array Container 后期 reszie 数组的次数和开销。\u003c/p\u003e\\n\u003cp\u003e\u003cimg src=\\\"/images/blog/tech/bigdata/image_1_6.png\\\" alt=\\\"image_1_6.png\\\"\u003e\u003c/p\u003e\\n\u003cp\u003e最后一种 Container 叫做Run Container，这种 Container 适用于存放连续的数据。比如说 1 到 100，一共 100 个数，这种类型的数据称为连续的数据。这边的Run指的是Run Length Encoding（RLE），它对连续数据有比较好的压缩效果。原理是对于连续出现的数字, 只记录初始数字和后续数量。例如: 对于 [11, 12, 13, 14, 15, 21, 22]，会被记录为 11, 4, 21, 1。很显然，该 Container 的存储占用与数据的分布紧密相关。最好情况是如果数据是连续分布的，就算是存放 65536 个元素，也只会占用 2 个 short。而最坏的情况就是当数据全部不连续的时候，会占用 128 KB 内存。\u003c/p\u003e\\n\u003cp\u003e\u003cimg src=\\\"/images/blog/tech/bigdata/image_1_7.png\\\" alt=\\\"image_1_7.png\\\"\u003e\u003c/p\u003e\\n\u003cp\u003e总结：用一张图来总结3种 Container 所占的存储空间，可以看到元素个数达到 4096 之前，选用 Array Container 的收益是最好的，当元素个数超过了 4096 时，Array Container 所占用的空间还是线性的增长，而 Bitmap Container 的存储占用则与数据量无关，这个时候 Bitmap Container 的收益就会更好。而 Run Container 占用的存储大小完全看数据的连续性, 因此只能画出一个上下限范围 [4 Bytes, 128 KB]。\u003c/p\u003e\\n\u003cp\u003e\u003cstrong\u003e在 Kylin 中的应用\u003c/strong\u003e\u003c/p\u003e\\n\u003cp\u003e\u003cimg src=\\\"/images/blog/tech/bigdata/image_1_8.png\\\" alt=\\\"image_1_8.png\\\"\u003e\u003c/p\u003e\\n\u003cp\u003e我们再来看一下Bitmap 在 Kylin 中的应用，Kylin 中编辑 measure 的时候，可以选择 Count Distinct，且Return Type 选为 Precisely，点保存就可以了。但是事情没有那么简单，刚才上文在讲 Bitmap 时，一直都有一个前提，放入的值都是数值类型，但是如果不是数值类型的值，它们不能够直接放入 Bitmap，这时需要构建一个全区字典，做一个值到数值的映射，然后再放入 Bitmap 中。\u003c/p\u003e\\n\u003cp\u003e\u003cimg src=\\\"/images/blog/tech/bigdata/image_1_9.png\\\" alt=\\\"image_1_9.png\\\"\u003e\u003c/p\u003e\\n\u003cp\u003e在 Kylin 中构建全局字典，当列的基数非常高的时候，全局字典会成为一个性能的瓶颈。针对这种情况，社区也一直在努力做优化，这边简单介绍几种优化的策略，更详细的优化策略可以见文末的参考链接。\u003c/p\u003e\\n\u003cp\u003e\u003cimg src=\\\"/images/blog/tech/bigdata/image_1_10.png\\\" alt=\\\"image_1_10.png\\\"\u003e\u003c/p\u003e\\n\u003cp\u003e1）当一个列的值完全被另外一个列包含，而另一个列有全局字典，可以复用另一个列的全局字典。\u003c/p\u003e\\n\u003cp\u003e\u003cimg src=\\\"/images/blog/tech/bigdata/image_1_11.png\\\" alt=\\\"image_1_11.png\\\"\u003e\u003c/p\u003e\\n\u003cp\u003e2）当精确去重指标不需要跨 Segment 聚合的时候，可以使用这个列的 Segment 字典代替（这个列需要字典编码）。在 Kylin 中，Segment 就相当于时间分片的概念。当不会发生跨 Segments 的分析时，这个列的 Segment 字典就可以代替这个全局字典。\u003c/p\u003e\\n\u003cp\u003e\u003cimg src=\\\"/images/blog/tech/bigdata/image_1_12.png\\\" alt=\\\"image_1_12.png\\\"\u003e\u003c/p\u003e\\n\u003cp\u003e3）如果你的 cube 包含很多的精确去重指标，可以考虑将这些指标放到不同的列族上。不止是精确去重，像一些复杂 measure，我们都建议使用多个列族去存储，可以提升查询的性能。\u003c/p\u003e\\n\"},{\"slug\":\"tech/bigdata/大数据分析常用去重算法分析之HyperLogLog篇\",\"title\":\"大数据分析常用去重算法分析之HyperLogLog篇\",\"description\":\"上篇介绍了利用 Roaring Bitmap 来进行精确去重。虽然这种算法能大大地减少存储开销，但是随着数据量的增大，它依然面临着存储上的压力。在本篇推送中将要介绍的 HyperLogLog（下称 HLL）是一种非精确的去重算法，它的特点是具有非常优异的空间复杂度（几乎可以达到常数级别）。 \",\"pubDate\":\"2027-03-25\",\"tags\":[\"大数据\",\"技术专题\",\"去重算法\",\"HyperLogLog\"],\"content\":\"\u003cp\u003e上篇介绍了利用 Roaring Bitmap 来进行精确去重。虽然这种算法能大大地减少存储开销，但是随着数据量的增大，它依然面临着存储上的压力。在本篇推送中将要介绍的 HyperLogLog（下称 HLL）是一种非精确的去重算法，它的特点是具有非常优异的空间复杂度（几乎可以达到常数级别）。\u003c/p\u003e\\n\u003cp\u003e\u003cimg src=\\\"/images/blog/tech/bigdata/image_2_1.png\\\" alt=\\\"image_2_1.png\\\"\u003e\u003c/p\u003e\\n\u003cp\u003eHLL 算法需要完整遍历所有元素一次，而非多次或采样；该算法只能计算集合中有多少个不重复的元素，不能给出每个元素的出现次数或是判断一个元素是否之前出现过；多个使用 HLL 统计出的基数值可以融合。\u003c/p\u003e\\n\u003cp\u003e\u003cimg src=\\\"/images/blog/tech/bigdata/image_2_2.png\\\" alt=\\\"image_2_2.png\\\"\u003e\u003c/p\u003e\\n\u003cp\u003e\u003cimg src=\\\"/images/blog/tech/bigdata/image_2_3.png\\\" alt=\\\"image_2_3.png\\\"\u003e\u003c/p\u003e\\n\u003cp\u003eHLL 算法有着非常优异的空间复杂度，可以看到它的空间占用随着基数值的增长并没有变化。HLL 后面不同的数字代表着不同的精度，数字越大，精度越高，占用的空间也越大，可以认为 HLL 的空间占用只和精度成正相关。\u003c/p\u003e\\n\u003cp\u003e\u003cstrong\u003eHLL算法原理感性认知\u003c/strong\u003e\u003c/p\u003e\\n\u003cp\u003e\u003cimg src=\\\"/images/blog/tech/bigdata/image_2_4.png\\\" alt=\\\"image_2_4.png\\\"\u003e\u003c/p\u003e\\n\u003cp\u003eHLL 算法的原理会涉及到比较多的数学知识，这边对这些数学原理和证明不会展开。举一个生活中的例子来帮助大家理解HLL算法的原理：比如你在进行一个实验，内容是不停地抛硬币，记录你连续抛到正面的次数（这是数学中的伯努利过程，感兴趣同学可以自行研究下）；如果你最多的连抛正面记录是3次，那可以想象你并没有做这个实验太多次，如果你最长的连抛正面记录是 20 次，那你可能进行了这个实验上千次。\u003c/p\u003e\\n\u003cp\u003e一种理论上存在的情况是，你非常幸运，第一次进行这个实验就连抛了 20 次正面，我们也会认为你进行了很多次这个实验才得到了这个记录，这就会导致错误的预估；改进的方式是请 10 位同学进行这项实验，这样就可以观察到更多的样本数据，降低出现上述情况的概率。这就是 HLL 算法的核心思想。\u003c/p\u003e\\n\u003cp\u003e\u003cstrong\u003eHLL算法具体实现\u003c/strong\u003e\u003c/p\u003e\\n\u003cp\u003e\u003cimg src=\\\"/images/blog/tech/bigdata/image_2_5.png\\\" alt=\\\"image_2_5.png\\\"\u003e\u003c/p\u003e\\n\u003cp\u003eHLL 会通过一个 hash 函数来求出集合中所有元素的 hash 值（二进制表示的 hash 值，就可以理解为一串抛硬币正反面结果的序列），得到一个 hash 值的集合，然后找出该 hash 值集合中，第一个 1 出现的最晚的位置。例如有集合为 [010, 100, 001], 集合中元素的第一个 1 出现的位置分别为 2, 1, 3，可以得到里面最大的值为 3，故该集合中第一个1出现的最晚的位置为 3。因为每个位置上出现1的概率都是 1/2，所以我们可以做一个简单的推断，该集合中有 8 个不重复的元素。\u003c/p\u003e\\n\u003cp\u003e可以看到这种简单的推断计算出来集合的基数值是有较大的偏差的，那如何来减少偏差呢？正如我上面的例子里说的一样，HLL 通过多次的进行试验来减少误差。那它是如何进行多次的实验的呢？这里 HLL 使用了分桶的思想，上文中我们一直有提到一个精度的概念，比如说 HLL(10)，这个 10 代表的就是取该元素对应 Hash 值二进制的后 10 位，计算出记录对应的桶，桶中会记录一个数字，代表对应到该桶的 hash 值的第一个 1 出现的最晚的位置。如上图，该 hash 值的后 10 位的 hash 值是 0000001001，转成 10 进制是 9，对应第 9 号桶，而该 hash 值第一个 1 出现的位置是第 6 位，比原先 9 号桶中的数字大，故把 9 号桶中的数字更新为 6。可以看到桶的个数越多，HLL 算法的精度就越高，HLL(10) 有 1024(210) 个桶，HLL(16)有 65536(216) 个桶。同样的，桶的个数越多，所占用的空间也会越大。\u003c/p\u003e\\n\u003cp\u003e\u003cimg src=\\\"/images/blog/tech/bigdata/image_2_6.png\\\" alt=\\\"image_2_6.png\\\"\u003e\u003c/p\u003e\\n\u003cp\u003e刚才的例子我们省略了一些细节，为了让大家不至于迷失在细节中而忽视了重点，真实的 HLL 算法的完整描述见上图，这边的重点是计算桶中平均数时使用调和平均数。调和平均数的优点是可以过滤掉不健康的统计值，使用算术平均值容易受到极值的影响（想想你和马云的平均工资），而调和平均数的结果会倾向于集合中比较小的元素。HLL 论文中还有更多的细节和参数，这边就不一一细举，感兴趣的同学可以自己阅读下论文。\u003c/p\u003e\\n\u003cp\u003e\u003cstrong\u003eHLL评估\u003c/strong\u003e\u003c/p\u003e\\n\u003cp\u003e\u003cimg src=\\\"/images/blog/tech/bigdata/image_2_7.png\\\" alt=\\\"image_2_7.png\\\"\u003e\u003c/p\u003e\\n\u003cp\u003eHLL 的误差分布服从正态分布，它的空间复杂度: O(m log2log2N), Ｎ 为基数, m 为桶个数。这边给大家推导一下它的空间复杂度，我有 264 个的不重复元素(Long. MAX_VALUE)，表达为二进制一个数是 64 位，这是第一重 log2, 那么第一个1最晚可能出现在第 64 位。64 需要 6 个 bit (26=64) 就可以存储，这是第二重 log2。如果精度为 10，则会有 1024 个桶，所以最外面还要乘以桶的个数。由于需要完整的遍历元素一遍，所以它的时间复杂度是一个线性的时间复杂度。\u003c/p\u003e\\n\u003cp\u003e\u003cstrong\u003e在Kylin中的应用\u003c/strong\u003e\u003c/p\u003e\\n\u003cp\u003e\u003cimg src=\\\"/images/blog/tech/bigdata/image_2_8.png\\\" alt=\\\"image_2_8.png\\\"\u003e\u003c/p\u003e\\n\u003cp\u003e在 Kylin 中使用 HLL 非常简单，在编辑度量的页面选择 COUNT DISTINCT，Return Type 选为非 Precisely 的其他选项，大家根据自己的需求选择不同的精度就可以愉快地使用了。\u003c/p\u003e\\n\u003cp\u003e\u003cstrong\u003e总结\u003c/strong\u003e\u003c/p\u003e\\n\u003cp\u003e\u003cimg src=\\\"/images/blog/tech/bigdata/image_2_9.png\\\" alt=\\\"image_2_9.png\\\"\u003e\u003c/p\u003e\\n\u003cp\u003e我们回到最开始的去重场景，看看使用了 Bitmap 和 HLL 会给我们带来什么增益：无优化 case 下，每个 item 对应的 user_id 就可以看成存储原始值的一个集合；在使用 Bitmap 优化的case 下，每个 item 对应的 user_id 就可以看成一个 Bitmap 实例，同理 HLL就是一个 HLL 的实例，Bitmap/HLL 实例占用的空间都会比直接存储原始值的集合要小，这就达到了我们开始提的减少 shuffle 数据量的需求。\u003c/p\u003e\\n\u003cp\u003e\u003cstrong\u003eQ\u0026amp;A\u003c/strong\u003e\u003c/p\u003e\\n\u003cp\u003eQ：您好，问一下关于精确去重的问题， 我选择了非精确去重，最后的误差率有时候会比界面上提示的值要高一些，这是为什么？\u003c/p\u003e\\n\u003cp\u003eA：首先 HLL 的误差分布服从正态分布，也就是说是在99%的情况下是这个误差，同时 HLL 对于基数比较低的情况，误差会偏高。如果你的基数比较低的话，我推荐使用精确去重。\u003c/p\u003e\\n\u003cp\u003eQ：我想要了解一下 Bitmap 在 Kylin 中，它最终落盘在 HBase 里面是什么样子的？\u003c/p\u003e\\n\u003cp\u003eA：在 HBase 中存储的当然都是 Bytes。这个问题其实就是 Bitmap 的序列化的形式，Roaring Bitmap提供了序列化和反序列化的实现，你也可以写自己的序列化/反序列化的实现。\u003c/p\u003e\\n\u003cp\u003eQ：Roaring Bitmap 里这些 container 要我们自己手动的指定吗。\u003c/p\u003e\\n\u003cp\u003eA：不需要，Roaring Bitmap 会自动选择使用哪个 Container。\u003c/p\u003e\\n\"},{\"slug\":\"tech/SUMMARY\",\"title\":\"技术专题\",\"description\":\"* [微服务系列].[系统架构].[业务架构].[技术实战]\",\"pubDate\":\"2024-04-10\",\"tags\":[\"技术专题\"],\"content\":\"\u003ch2\u003e微服务系列\u003c/h2\u003e\\n\u003cul\u003e\\n\u003cli\u003e\u003ca href=\\\"../microservice/%E5%BE%AE%E6%9C%8D%E5%8A%A1%E5%8F%8A%E5%85%B6%E6%BC%94%E8%BF%9B%E5%8F%B2/\\\"\u003e微服务及其演进史\u003c/a\u003e\u003c/li\u003e\\n\u003cli\u003e\u003ca href=\\\"../microservice/%E5%BE%AE%E6%9C%8D%E5%8A%A1%E5%85%A8%E6%99%AF%E6%9E%B6%E6%9E%84/\\\"\u003e微服务全景架构\u003c/a\u003e\u003c/li\u003e\\n\u003cli\u003e\u003ca href=\\\"../microservice/%E5%BE%AE%E6%9C%8D%E5%8A%A1%E6%8B%86%E5%88%86%E7%AD%96%E7%95%A5/\\\"\u003e微服务拆分策略\u003c/a\u003e\u003c/li\u003e\\n\u003cli\u003e\u003ca href=\\\"../microservice/%E5%BE%AE%E6%9C%8D%E5%8A%A1%E6%8B%86%E5%88%86%E7%AD%96%E7%95%A5%EF%BC%88%E9%99%84%E5%8A%A0%E7%AF%87%EF%BC%89/\\\"\u003e微服务拆分策略（附加篇）\u003c/a\u003e\u003c/li\u003e\\n\u003cli\u003e\u003ca href=\\\"../microservice/%E6%9C%8D%E5%8A%A1%E6%B3%A8%E5%86%8C%E4%B8%8E%E5%8F%91%E7%8E%B0/\\\"\u003e服务注册与发现\u003c/a\u003e\u003c/li\u003e\\n\u003cli\u003e\u003ca href=\\\"../microservice/%E6%9C%8D%E5%8A%A1%E6%B3%A8%E5%86%8C%E4%B8%8E%E5%8F%91%E7%8E%B0%EF%BC%88%E5%AE%9E%E8%B7%B5%E7%AF%87%EF%BC%89/\\\"\u003e服务注册与发现（实践篇）\u003c/a\u003e\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003ch2\u003e中间件\u003c/h2\u003e\\n\u003ch3\u003e消息队列\u003c/h3\u003e\\n\u003cul\u003e\\n\u003cli\u003e\u003ca href=\\\"../middleware/RabbitMQ%E3%80%81RocketMQ%E3%80%81Kafka%E5%8C%BA%E5%88%AB/\\\"\u003eRabbitMQ、RocketMQ、Kafka区别\u003c/a\u003e\u003c/li\u003e\\n\u003cli\u003e\u003ca href=\\\"../middleware/%E5%88%86%E5%B8%83%E5%BC%8F%E4%BA%8B%E5%8A%A1%E4%B9%8B%E4%B8%A4%E9%98%B6%E6%AE%B5%E6%8F%90%E4%BA%A4%E5%92%8C%E4%B8%89%E9%98%B6%E6%8F%90%E4%BA%A4/\\\"\u003e分布式事务之两阶段提交和三阶提交\u003c/a\u003e\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003ch3\u003e架构设计\u003c/h3\u003e\\n\u003cul\u003e\\n\u003cli\u003e\u003ca href=\\\"../system/%E6%9E%B6%E6%9E%84%E8%AE%BE%E8%AE%A1%E6%A8%A1%E6%9D%BF/\\\"\u003e架构设计模板\u003c/a\u003e\u003c/li\u003e\\n\u003cli\u003e\u003ca href=\\\"../system/%E4%BB%8E0%E5%BC%80%E5%A7%8B%E5%81%9A%E4%B8%80%E4%B8%AA%E5%90%8E%E5%8F%B0%E6%9E%B6%E6%9E%84/\\\"\u003e从0开始做一个后台架构\u003c/a\u003e\u003c/li\u003e\\n\u003cli\u003e\u003ca href=\\\"../system/%E4%B8%80%E4%B8%AA%E7%A7%92%E6%9D%80%E7%B3%BB%E7%BB%9F%E7%9A%84%E8%AE%BE%E8%AE%A1%E6%80%9D%E8%80%83/\\\"\u003e一个秒杀系统的设计思考\u003c/a\u003e\u003c/li\u003e\\n\u003cli\u003e\u003ca href=\\\"../system/%E9%AB%98%E5%B9%B6%E5%8F%91%E7%B3%BB%E7%BB%9F%E8%AE%BE%E8%AE%A1%E7%9A%8415%E4%B8%AA%E9%94%A6%E5%9B%8A/\\\"\u003e高并发系统设计的15个锦囊\u003c/a\u003e\u003c/li\u003e\\n\u003cli\u003e\u003ca href=\\\"../system/%E9%A2%86%E7%95%A5SET%E5%8C%96%E6%9E%B6%E6%9E%84%E8%A1%8D%E5%8C%96%E4%B8%8E%E8%AE%BE%E8%AE%A1/\\\"\u003e领略SET化架构衍化与设计\u003c/a\u003e\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003ch3\u003e大数据\u003c/h3\u003e\\n\u003cul\u003e\\n\u003cli\u003e\u003ca href=\\\"../bigdata/%E5%A4%A7%E6%95%B0%E6%8D%AE%E5%88%86%E6%9E%90%E5%B8%B8%E7%94%A8%E5%8E%BB%E9%87%8D%E7%AE%97%E6%B3%95%E5%88%86%E6%9E%90%E4%B9%8BBitmap%E7%AF%87/\\\"\u003e大数据分析常用去重算法分析之Bitmap篇\u003c/a\u003e\u003c/li\u003e\\n\u003cli\u003e\u003ca href=\\\"../bigdata/%E5%A4%A7%E6%95%B0%E6%8D%AE%E5%88%86%E6%9E%90%E5%B8%B8%E7%94%A8%E5%8E%BB%E9%87%8D%E7%AE%97%E6%B3%95%E5%88%86%E6%9E%90%E4%B9%8BHyperLogLog%E7%AF%87/\\\"\u003e大数据分析常用去重算法分析之HyperLogLog篇\u003c/a\u003e\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003ch2\u003e业务架构\u003c/h2\u003e\\n\u003cul\u003e\\n\u003cli\u003e\u003ca href=\\\"../business/%E5%85%B3%E4%BA%8E%E4%B8%9A%E5%8A%A1%E5%B9%B3%E5%8F%B0%E6%9E%B6%E6%9E%84%E7%9A%84%E6%80%9D%E8%80%83/\\\"\u003e关于业务平台架构的思考\u003c/a\u003e\u003c/li\u003e\\n\u003cli\u003e\u003ca href=\\\"../business/%E8%A7%A3%E6%9E%90%E3%80%8C%E4%B8%89%E6%88%B7%E6%A8%A1%E5%9E%8B%E3%80%8D%E5%8F%8A%E5%BB%BA%E7%AB%8B%E8%B4%A6%E6%88%B7%E6%A8%A1%E5%9E%8B/\\\"\u003e解析「三户模型」及建立账户模型\u003c/a\u003e\u003c/li\u003e\\n\u003cli\u003e\u003ca href=\\\"../business/%E5%88%B0%E5%BA%95%E5%95%A5%E5%8F%AB%E6%87%82%E4%B8%9A%E5%8A%A1%EF%BC%9F%E4%B8%9A%E5%8A%A1%E7%9A%84%E4%B8%89%E9%87%8D%E8%A7%86%E8%A7%92/\\\"\u003e到底啥叫懂业务？业务的三重视角\u003c/a\u003e\u003c/li\u003e\\n\u003cli\u003e\u003ca href=\\\"../business/%E4%B8%9A%E5%8A%A1%E4%B8%89%E9%87%8D%E8%A7%86%E8%A7%92%E2%80%94%E2%80%94%E4%B8%9A%E5%8A%A1%E6%A8%A1%E5%9E%8B/\\\"\u003e业务三重视角——业务模型\u003c/a\u003e\u003c/li\u003e\\n\u003cli\u003e\u003ca href=\\\"../business/%E4%B8%9A%E5%8A%A1%E4%B8%89%E9%87%8D%E8%A7%86%E8%A7%92%E2%80%94%E2%80%94%E5%95%86%E4%B8%9A%E6%A8%A1%E5%BC%8F/\\\"\u003e业务三重视角——商业模式\u003c/a\u003e\u003c/li\u003e\\n\u003cli\u003e\u003ca href=\\\"../business/%E7%94%A8%E6%88%B7%E7%B3%BB%E7%BB%9F%E8%AE%BE%E8%AE%A1%E2%80%94%E2%80%94%E4%B8%89%E6%88%B7%E6%A8%A1%E5%9E%8B\u0026%E4%B8%89%E5%B1%82%E8%BA%AB%E4%BB%BD%E6%A8%A1%E5%9E%8B/\\\"\u003e用户系统设计——三户模型\u0026amp;三层身份模型\u003c/a\u003e\u003c/li\u003e\\n\u003cli\u003e\u003ca href=\\\"../business/%E6%9D%83%E9%99%90%E7%B3%BB%E7%BB%9F%E6%96%B9%E6%A1%88%E8%AE%BE%E8%AE%A1/\\\"\u003e权限系统方案设计\u003c/a\u003e\u003c/li\u003e\\n\u003cli\u003e\u003ca href=\\\"../business/%E7%94%B5%E5%95%86%E5%88%86%E6%9E%90%E5%BF%85%E6%87%82%E7%9A%84%E6%8C%87%E6%A0%87%E4%BD%93%E7%B3%BB/\\\"\u003e电商分析必懂的指标体系\u003c/a\u003e\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003ch2\u003e技术实战\u003c/h2\u003e\\n\u003cul\u003e\\n\u003cli\u003e\u003ca href=\\\"../practice/%E9%9D%9E%E4%BE%B5%E5%85%A5%E5%BC%8FSQL%E7%9B%91%E6%8E%A7/\\\"\u003e非侵入式SQL监控\u003c/a\u003e\u003c/li\u003e\\n\u003cli\u003e\u003ca href=\\\"../practice/Java%E6%9E%84%E4%BB%B6%E5%8F%91%E5%B8%83%E5%88%B0%E4%B8%AD%E5%A4%AE%E4%BB%93%E5%BA%93/\\\"\u003eJava构件发布到中央仓库\u003c/a\u003e\u003c/li\u003e\\n\u003cli\u003e\u003ca href=\\\"../practice/Git%E5%B8%B8%E7%94%A8%E5%91%BD%E4%BB%A4/\\\"\u003eGit常用命令\u003c/a\u003e\u003c/li\u003e\\n\u003cli\u003e\u003ca href=\\\"../practice/Maven%E4%BD%BF%E7%94%A8%E6%8A%80%E5%B7%A7/\\\"\u003eMaven使用技巧\u003c/a\u003e\u003c/li\u003e\\n\u003c/ul\u003e\\n\"},{\"slug\":\"tech/practice/非侵入式SQL监控\",\"title\":\"非侵入式SQL监控\",\"description\":\"你有没有因为应用程序没有打印SQL而导致问题排查困难？有没有因为SQL没有显示参数而导致日志毫无意义？有没有因为SQL超长而导致查看痛苦？有没有因为缺少SQL性能监控而导致无法报警？...\",\"pubDate\":\"2024-04-07\",\"tags\":[\"技术实战\"],\"content\":\"\u003cp\u003e你有没有遇到过因为没有打印SQL导致问题排查困难？如果你使用了成熟ORM框架，那么很容易支撑SQL的拦截和监控，例如Mybatis的Interceptor或JOOQ的Listener都支持SQL执行过程的跟踪监控，但是，如果你的ORM框架不支持SQL监控，那么很不幸，你就只能在代码中手动打印日志了。然而，为了防SQL注入，应用中的SQL语句都是参数化的，直接打印的话，SQL语句未绑定参数，ORM框架一般都提供了SQL参数绑定的功能，原生的JDBC这样就失去了一定的监控价值。\u003c/p\u003e\\n\u003cp\u003e另外，在TOB的业务中，有些场景SQL参数超长，如大IN查询，SQL语句会长达到几万甚至十几万，此时，我们又需要对SQL语句进行缩略打印。注意，这里的SQL缩略打印不是简单的对SQL语句进行截断，而是对SQL语句中的参数列表进行截断，例如下面的SQL\u003c/p\u003e\\n\u003cpre\u003e\u003ccode class=\\\"language-sql\\\"\u003eselect * from user \\nwhere id in (1001,1001, 1002, 1003, 1004, 1005, 1006, 1007) \\nand name in(sql\\nselect name from whitelist \\nwhere name in(\u0026#39;a\u0026#39;,\u0026#39;b\u0026#39;,\u0026#39;c\u0026#39;,\u0026#39;d\u0026#39;,\u0026#39;e\u0026#39;,\u0026#39;f\u0026#39;,\u0026#39;g\u0026#39;,\u0026#39;h\u0026#39;,\u0026#39;i\u0026#39;,\u0026#39;j\u0026#39;,\u0026#39;k\u0026#39;,\u0026#39;l\u0026#39;,\u0026#39;m\u0026#39;)\\n)\\n\u003c/code\u003e\u003c/pre\u003e\\n\u003cp\u003e缩略下印如下：\u003c/p\u003e\\n\u003cpre\u003e\u003ccode class=\\\"language-sql\\\"\u003eselect * from user \\nwhere id in (1001,1001, 1002, 1003, 1004,...) \\nand name in(\\nselect name from whitelist \\nwhere name in(\u0026#39;a\u0026#39;,\u0026#39;b\u0026#39;,\u0026#39;c\u0026#39;,\u0026#39;d\u0026#39;,\u0026#39;e\u0026#39;,...)\\n)\\n\u003c/code\u003e\u003c/pre\u003e\\n\u003cp\u003e既然SQL 监控很重要，那么对于应用层的SQL监控都有哪些手段呢？一个SQL请求的执行链路，一般从DAO层开始：DAO -\u0026gt; ORM -\u0026gt; DataSource  -\u0026gt; Connection -\u0026gt; Driver -\u0026gt; DB，那么在这个链路上有哪些环节可以切入监控呢？ DAO层是数据访问层的入口，而我们的目标是应用层监控，因此，能够实现SQL监控的环节只有：ORM -\u0026gt; DataSource  -\u0026gt; Connection -\u0026gt; Driver，而要实现通用的非侵入式监控，则应该独立于ORM，因此我们可以从\u003cstrong\u003eDataSource  -\u0026gt; Connection -\u0026gt; Driver\u003c/strong\u003e三个环节进行入手：\u003c/p\u003e\\n\u003ch3\u003e\u003cstrong\u003e一、SQL Profile监控\u003c/strong\u003e\u003c/h3\u003e\\n\u003ch4\u003e\u003cstrong\u003e1、驱动层监控\u003c/strong\u003e\u003c/h4\u003e\\n\u003cp\u003e如果Driver层支持日志监控，则最方便，例如MySQL，可以在jdbc url中添加logger：\u003c/p\u003e\\n\u003cpre\u003e\u003ccode class=\\\"language-properties\\\"\u003ejdbc:mysql://localhost:3306/test?useUnicode=true\u0026amp;characterEncoding=utf8\u0026amp;useSSL=false\u0026amp;serverTimezone=UTC\u0026amp;logger=Slf4JLogger\u0026amp;profileSQL=true\\n\u003c/code\u003e\u003c/pre\u003e\\n\u003cp\u003e基于Driver监控的问题在于：一方面强依赖于DB，和ORM层面临一样的问题，不具有通用性上述的问题，且需要厂商的支持，例如Oracle Driver就不支持日志监控；另一方面SQL格式固定，无法进行定制化输出。\u003c/p\u003e\\n\u003ch4\u003e\u003cstrong\u003e2、连接层监控\u003c/strong\u003e\u003c/h4\u003e\\n\u003cp\u003e如果厂商驱动不支持SQL日志，可以Driver进行代理实现SQL监控功能，常用的开源组件如\u003ca href=\\\"https://p6spy.readthedocs.io/en/latest/\\\"\u003eP6Spy\u003c/a\u003e、\u003ca href=\\\"https://github.com/arthurblake/log4jdbc\\\"\u003elog4jdbc\u003c/a\u003e 等，其原理都是代理了厂商的驱动，因此只需要修改jdbc url：\u003c/p\u003e\\n\u003cul\u003e\\n\u003cli\u003epyspy\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003cpre\u003e\u003ccode class=\\\"language-properties\\\"\u003ejdbc:p6spy:mysql://localhost:3306/test?useUnicode=true\u0026amp;characterEncoding=utf8\u0026amp;useSSL=false\u0026amp;serverTimezone=UTC\\n\u003c/code\u003e\u003c/pre\u003e\\n\u003cul\u003e\\n\u003cli\u003elog4jdbc\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003cpre\u003e\u003ccode class=\\\"language-properties\\\"\u003ejdbc:log4jdbc:mysql://localhost:3306/test?useUnicode=true\u0026amp;characterEncoding=utf8\u0026amp;useSSL=false\u0026amp;serverTimezone=UTC\\n\u003c/code\u003e\u003c/pre\u003e\\n\u003ch4\u003e\u003cstrong\u003e3、数据源层监控\u003c/strong\u003e\u003c/h4\u003e\\n\u003cp\u003e可以通过对DataSource进行代理实现SQL监控\u003c/p\u003e\\n\u003cul\u003e\\n\u003cli\u003eP6Spy：\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003cpre\u003e\u003ccode class=\\\"language-java\\\"\u003e@Bean\\n@Primary\\npublic DataSource spyDataSource(@Autowired DataSource dataSource) {\\n  // wrap a datasource using P6SpyDataSource\\n  return new P6DataSource(dataSource);\\n}\\n\u003c/code\u003e\u003c/pre\u003e\\n\u003cul\u003e\\n\u003cli\u003elog4jdbc\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003cpre\u003e\u003ccode class=\\\"language-java\\\"\u003epublic DataSource spyDataSource(DataSource dataSource) {\\n    // wrap the provided dataSource\\n  return new DataSource() {\\n    @Override\\n    public Connection getConnection() throws SQLException {\\n      // wrap the connection with log4jdbc\\n      return new ConnectionSpy(dataSource.getConnection());\\n    }\\n      \\n    @Override\\n    public Connection getConnection(String username, String password) throws SQLException {\\n       // wrap the connection with log4jdbc\\n      return new ConnectionSpy(dataSource.getConnection(username, password));\\n     }\\n      //...\\n  };\\n}\\n\u003c/code\u003e\u003c/pre\u003e\\n\u003cp\u003e上述三种方案都可以实现SQL监控，那么在实际应用场景中选择哪种方式更好呢？这和实际的生产方式有关。在我手，数据库是基于KDB的，Java应用是基于KsBoot，其中，数据库连接是在KDB平台配置的，底层的数据源是使用ShardingSphere+HikariDataSource进行魔改的。\u003c/p\u003e\\n\u003cp\u003e第一种方案，由于数据库连接是由DBA维护的，升级需求修改数据库连接，因此不建议。\u003c/p\u003e\\n\u003cp\u003e第二种方案，同理需要修改数据库连接，且比第一种更容易配错，因此也不建议。\u003c/p\u003e\\n\u003cp\u003e排除上述两种方式，剩下的只有第三种方案了，但是第三种方案有很大的挑战，原因在于需要兼容快手kuaishou-framework奇葩的JdbcTemplate使用方式。确切地说，在于使用了DataSourceConfig。\u003c/p\u003e\\n\u003cpre\u003e\u003ccode class=\\\"language-java\\\"\u003epublic interface DataSourceConfig extends HasBizDef {\\n\\n    /**\\n     * 数据源名称，必须与KDB申请时填写的一致\\n     */String bizName();\\n\\n    /**\\n     * 获取当前可用区单库只读的JdbcTemplate\\n     */\\n    default NamedParameterJdbcTemplate read() {\\n        return InternalDatasourceConfig.readForceAz(this, currentAz(), currentPaz(), \u0026quot;read\u0026quot;);\\n    }   \\n\\n    /**\\n     * 获取当前可用区单库读写的JdbcTemplate\\n     */\\n    default NamedParameterJdbcTemplate write() {\\n        return InternalDatasourceConfig.writeForceAz(this, currentAz(), currentPaz(), \u0026quot;write\u0026quot;);\\n    }\\t\\n  //....\\n}\\n\u003c/code\u003e\u003c/pre\u003e\\n\u003cp\u003eDefaultDataSourceConfig是一个接口类，默认封装了NamedParameterJdbcTemplate的创建，业务方通过继承该接口来定义数据源:\u003c/p\u003e\\n\u003cpre\u003e\u003ccode class=\\\"language-kotlin\\\"\u003eenum class AdDataSources(\\n    private val bizDef: BizDef,\\n    private val forTest: AdDataSources? = null,\\n    private val usingNewZk: Boolean = false\\n) : DataSourceConfig{\\n    adFansTopProfileDashboardTest,\\n    adFansTopProfileDashboard,\\n    adChargeTest,\\n    adCharge,\\n    adChargeReadOnly,\\n    adDspReadOnlyTest,\\n    adDspReadOnly;\\n    public open fun bizName(): String {\\n        return bizDef.bizName\\n    }\\n}\\n\u003c/code\u003e\u003c/pre\u003e\\n\u003cp\u003e如果在业务中直接使用了DataSourceConfig创建的NamedParameterJdbcTemplate，那么我们就需要修改过程中创建的DataSource对象。那么，这里的DataSource究竟是怎么创建的呢？\u003c/p\u003e\\n\u003cp\u003e具体扒代码的过程就不赘述了，直接说结果吧，kuaishou-framework的数据源最终是通过DataSourceFactory进行创建的，具体代码如下：\u003c/p\u003e\\n\u003cpre\u003e\u003ccode class=\\\"language-java\\\"\u003epublic static ListenableDataSource\u0026lt;Failover\u0026lt;Instance\u0026gt;\u0026gt; create(Instance i) {\\n   //...\\n   try {\\n       return supplyWithRetry(\\n        DATA_SOURCE_BUILD_RETRY,\\n        DATA_SOURCE_BUILD_RETRY_DELAY,\\n        () -\u0026gt; new ListenableDataSource\u0026lt;\u0026gt;(\\n              bizName, \\n              new HikariDataSource(config), ds -\u0026gt; i.toString(), i),\\n              DataSourceFactory::needRetry);\\n                               \\n  } catch (Throwable e) {/**/}\\n}\\n\u003c/code\u003e\u003c/pre\u003e\\n\u003cp\u003e由代码可以看到，这里的数据源实际上是通过new HikariDataSource(config)手动创建的，而DataSourceConfig又没有对外暴露创建的数据源，所以，我们该如何对DataSource代理呢?\u003c/p\u003e\\n\u003ch3\u003e\u003cstrong\u003e二、动态修改加载类\u003c/strong\u003e\u003c/h3\u003e\\n\u003cp\u003e成本最低的方式就是直接修改这段代码，将其中\u0026#x7684;\u003cem\u003e\u0026#x6E;ew HikariDataSource(config)\u003c/em\u003e\u0026#x4FEE;改\u0026#x6210;\u003cem\u003e\u0026#x6E;ew P6DataSource(new HikariDataSource(config))，\u003c/em\u003e\u0026#x90A3;么问题来了，这段代码属于基础组件包中的代码，基础架构组没有动力去修改，而我们又没有修改的权限，要想动这块代码，只能使用黑科技了。黑科技的手段有很多，那么问题又来了，哪种手段更合适呢？\u003c/p\u003e\\n\u003cp\u003e首先我们来分析一下，有哪些手段可以修改Java字节码？\u003c/p\u003e\\n\u003cul\u003e\\n\u003cli\u003e方案一、编译时修改，需要开发maven插件\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003cp\u003e（不使用maven插件的同学咋办？）\u003c/p\u003e\\n\u003cul\u003e\\n\u003cli\u003e方案二、加载时修改，重写类加载器\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003cp\u003e需要在代码中指定特定的类加载器，用有一定的侵入式\u003c/p\u003e\\n\u003cul\u003e\\n\u003cli\u003e方案三、运行时修改，使用JavaAgent\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003cp\u003e需要修改应用启动参数，运维成本有点高\u003c/p\u003e\\n\u003cp\u003e首先要说明的是，这里不是对类方法进行增强，所以想使用cglib动态代理的想法是不可行的。前面三种方案都有一定的局限性：方案一比较麻烦，方案二侵入性强，方案三则需要使用JavaAgent技术，那有没有方案不使用Agent就可以动态修改已经加载的字节码呢？答案是没有，至少理论上没有。不过，好在天无绝人之路，JDK9之后，可以动态启动JavaAgent，这样就不用修改启动参数了。这里，我们选择使用byte-buddy进行字节码重写。\u003c/p\u003e\\n\u003cp\u003e\u003cem\u003e下面是对动态启动Java Agent技术的解释\u003c/em\u003e\u003c/p\u003e\\n\u003cblockquote\u003e\\n\u003cp\u003eNote that starting with Java 9, there is the Launcher-Agent-Class manifest attribute for jar files that can specify the class of a Java Agent to start before the class specified with the Main-Class is launched. That way, you can easily have your Agent collaborating with your application code in your JVM, without the need for any additional command line options. The Agent can be as simple as having an agentmain method in your main class storing the Instrumentation reference in a static variable.\u003c/p\u003e\\n\u003c/blockquote\u003e\\n\u003cblockquote\u003e\\n\u003cp\u003eSee \u003ca href=\\\"https://docs.oracle.com/en/java/javase/15/docs/api/java.instrument/java/lang/instrument/package-summary.html#package.description\\\"\u003ethe java.lang.instrument package documentation\u003c/a\u003e…\u003c/p\u003e\\n\u003c/blockquote\u003e\\n\u003cblockquote\u003e\\n\u003cp\u003eGetting hands on an Instrumentation instance when the JVM has not been started with Agents is trickier. It must support launching Agents after startup in general, e.g. via the Attach API. \u003ca href=\\\"https://stackoverflow.com/a/19912148/2711488\\\"\u003eThis answer\u003c/a\u003e demonstrates at its end such a self-attach to get hands on the Instrumentation. When you have the necessary manifest attribute in your application jar file, you could even use that as agent jar and omit the creation of a temporary stub file.\u003c/p\u003e\\n\u003c/blockquote\u003e\\n\u003cblockquote\u003e\\n\u003cp\u003eHowever, recent JVMs forbid self-attaching unless -Djdk.attach.allowAttachSelf=true has been specified at startup, but I suppose, taking additional steps at startup time, is precisely what you don’t want to do. One way to circumvent this, is to use another process. All this process has to to, is to attach to your original process and tell the JVM to start the Agent. Then, it may already terminate and everything else works the same way as before the introduction of this restriction.\u003c/p\u003e\\n\u003c/blockquote\u003e\\n\u003cblockquote\u003e\\n\u003cp\u003eAs mentioned in \u003ca href=\\\"https://stackoverflow.com/questions/56787777/?noredirect=1\u0026lq=1#comment100160373_56787777\\\"\u003ethis comment\u003c/a\u003e, Byte-Buddy has already implemented those necessary steps and the stripped-down Byte-Buddy-Agent contains that logic only, so you can use it to build your own logic atop it.\u003c/p\u003e\\n\u003c/blockquote\u003e\\n\u003cul\u003e\\n\u003cli\u003e字节码工具对比\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003cp\u003e\u003cimg src=\\\"https://static.yximgs.com/udata/pkg/EE-KSTACK/4223630ea14c6367968188fd52cafa26.png\\\" alt=\\\"图片\\\"\u003e\u003c/p\u003e\\n\u003cul\u003e\\n\u003cli\u003e使用bytebuddy修改字节码\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003cp\u003e在实现代码之前，我们回过头来再看一下快手的数据源生成：\u003c/p\u003e\\n\u003cpre\u003e\u003ccode class=\\\"language-java\\\"\u003enew ListenableDataSource\u0026lt;\u0026gt;(bizName, new HikariDataSource(config), ds -\u0026gt; i.toString());\\n\u003c/code\u003e\u003c/pre\u003e\\n\u003cp\u003e这里实际生成的数据源类型是ListenableDataSource，而ListenableDataSource刚好继承了DelegatingDataSource类，而DelegatingDataSource的构造方法如下：\u003c/p\u003e\\n\u003cpre\u003e\
