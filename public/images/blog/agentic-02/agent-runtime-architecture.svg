<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 420" font-family="-apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="10" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,3 L0,6 Z" fill="#666"/>
    </marker>
    <marker id="arrow-both" viewBox="0 0 10 6" refX="5" refY="3" markerWidth="8" markerHeight="6" orient="auto">
      <path d="M0,0 L10,3 L0,6 Z" fill="#888"/>
    </marker>
  </defs>

  <rect width="580" height="420" rx="12" fill="#fafafa" stroke="#e0e0e0" stroke-width="1.5"/>

  <!-- Agent Runtime outer box -->
  <rect x="40" y="20" width="500" height="310" rx="10" fill="#F5F5F5" stroke="#9E9E9E" stroke-width="2"/>
  <text x="290" y="48" text-anchor="middle" font-size="15" font-weight="bold" fill="#555">Agent Runtime</text>

  <!-- Memory -->
  <rect x="80" y="75" width="120" height="60" rx="8" fill="#E3F2FD" stroke="#1976D2" stroke-width="1.5"/>
  <text x="140" y="105" text-anchor="middle" font-size="14" font-weight="bold" fill="#1565C0">Memory</text>
  <text x="140" y="122" text-anchor="middle" font-size="10" fill="#1976D2">记忆存储</text>

  <!-- LLM -->
  <rect x="230" y="75" width="120" height="60" rx="8" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="1.5"/>
  <text x="290" y="105" text-anchor="middle" font-size="14" font-weight="bold" fill="#6A1B9A">LLM</text>
  <text x="290" y="122" text-anchor="middle" font-size="10" fill="#7B1FA2">推理核心</text>

  <!-- Planner -->
  <rect x="380" y="75" width="120" height="60" rx="8" fill="#FFF3E0" stroke="#F57C00" stroke-width="1.5"/>
  <text x="440" y="105" text-anchor="middle" font-size="14" font-weight="bold" fill="#E65100">Planner</text>
  <text x="440" y="122" text-anchor="middle" font-size="10" fill="#F57C00">规划决策</text>

  <!-- Bidirectional arrows between components -->
  <line x1="200" y1="100" x2="228" y2="100" stroke="#888" stroke-width="1.5" marker-end="url(#arrow-both)"/>
  <line x1="200" y1="110" x2="228" y2="110" stroke="#888" stroke-width="1.5" marker-start="url(#arrow-both)"/>
  <line x1="350" y1="100" x2="378" y2="100" stroke="#888" stroke-width="1.5" marker-end="url(#arrow-both)"/>
  <line x1="350" y1="110" x2="378" y2="110" stroke="#888" stroke-width="1.5" marker-start="url(#arrow-both)"/>

  <!-- Tools -->
  <rect x="215" y="190" width="150" height="60" rx="8" fill="#E8F5E9" stroke="#388E3C" stroke-width="1.5"/>
  <text x="290" y="220" text-anchor="middle" font-size="14" font-weight="bold" fill="#2E7D32">Tools</text>
  <text x="290" y="237" text-anchor="middle" font-size="10" fill="#388E3C">外部交互能力</text>

  <!-- Arrows to Tools -->
  <line x1="290" y1="135" x2="290" y2="188" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M 140 135 L 140 220 L 213 220" fill="none" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M 440 135 L 440 220 L 367 220" fill="none" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Arrow from Tools to External World -->
  <line x1="290" y1="250" x2="290" y2="305" stroke="#666" stroke-width="1.5"/>

  <!-- Arrow out of Runtime -->
  <line x1="290" y1="330" x2="290" y2="365" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- External World -->
  <rect x="175" y="370" width="230" height="36" rx="8" fill="#ECEFF1" stroke="#78909C" stroke-width="1.5"/>
  <text x="290" y="393" text-anchor="middle" font-size="13" fill="#455A64">External World</text>
  <text x="290" y="360" text-anchor="middle" font-size="10" fill="#999">APIs, DBs, Files, Users</text>
</svg>
