<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 280" font-family="-apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="10" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,3 L0,6 Z" fill="#666"/>
    </marker>
  </defs>

  <rect width="700" height="280" rx="12" fill="#fafafa" stroke="#e0e0e0" stroke-width="1.5"/>
  <text x="350" y="32" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">LLM 的五大局限</text>

  <!-- 5 boxes -->
  <g transform="translate(30, 50)">
    <rect x="0" y="0" width="120" height="110" rx="8" fill="#FFEBEE" stroke="#E53935" stroke-width="1.5"/>
    <text x="60" y="28" text-anchor="middle" font-size="13" font-weight="bold" fill="#C62828">无记忆</text>
    <text x="60" y="46" text-anchor="middle" font-size="10" fill="#E57373">Memoryless</text>
    <line x1="15" y1="56" x2="105" y2="56" stroke="#FFCDD2" stroke-width="1"/>
    <text x="60" y="76" text-anchor="middle" font-size="11" fill="#666">跨调用</text>
    <text x="60" y="94" text-anchor="middle" font-size="11" fill="#666">信息丢失</text>
  </g>
  <g transform="translate(162, 50)">
    <rect x="0" y="0" width="120" height="110" rx="8" fill="#FFF3E0" stroke="#FB8C00" stroke-width="1.5"/>
    <text x="60" y="28" text-anchor="middle" font-size="13" font-weight="bold" fill="#E65100">无工具</text>
    <text x="60" y="46" text-anchor="middle" font-size="10" fill="#FFB74D">Toolless</text>
    <line x1="15" y1="56" x2="105" y2="56" stroke="#FFE0B2" stroke-width="1"/>
    <text x="60" y="76" text-anchor="middle" font-size="11" fill="#666">只输出</text>
    <text x="60" y="94" text-anchor="middle" font-size="11" fill="#666">文本</text>
  </g>
  <g transform="translate(294, 50)">
    <rect x="0" y="0" width="120" height="110" rx="8" fill="#F3E5F5" stroke="#8E24AA" stroke-width="1.5"/>
    <text x="60" y="28" text-anchor="middle" font-size="13" font-weight="bold" fill="#6A1B9A">无规划</text>
    <text x="60" y="46" text-anchor="middle" font-size="10" fill="#CE93D8">Planless</text>
    <line x1="15" y1="56" x2="105" y2="56" stroke="#E1BEE7" stroke-width="1"/>
    <text x="60" y="76" text-anchor="middle" font-size="11" fill="#666">单向生成</text>
    <text x="60" y="94" text-anchor="middle" font-size="11" fill="#666">无回溯</text>
  </g>
  <g transform="translate(426, 50)">
    <rect x="0" y="0" width="120" height="110" rx="8" fill="#E3F2FD" stroke="#1E88E5" stroke-width="1.5"/>
    <text x="60" y="28" text-anchor="middle" font-size="13" font-weight="bold" fill="#1565C0">无状态</text>
    <text x="60" y="46" text-anchor="middle" font-size="10" fill="#64B5F6">Stateless</text>
    <line x1="15" y1="56" x2="105" y2="56" stroke="#BBDEFB" stroke-width="1"/>
    <text x="60" y="76" text-anchor="middle" font-size="11" fill="#666">无执行</text>
    <text x="60" y="94" text-anchor="middle" font-size="11" fill="#666">进度追踪</text>
  </g>
  <g transform="translate(558, 50)">
    <rect x="0" y="0" width="120" height="110" rx="8" fill="#E8F5E9" stroke="#43A047" stroke-width="1.5"/>
    <text x="60" y="28" text-anchor="middle" font-size="13" font-weight="bold" fill="#2E7D32">无反思</text>
    <text x="60" y="46" text-anchor="middle" font-size="10" fill="#81C784">Reflectless</text>
    <line x1="15" y1="56" x2="105" y2="56" stroke="#C8E6C9" stroke-width="1"/>
    <text x="60" y="76" text-anchor="middle" font-size="11" fill="#666">无法自我</text>
    <text x="60" y="94" text-anchor="middle" font-size="11" fill="#666">评估质量</text>
  </g>

  <!-- Arrow down -->
  <line x1="350" y1="168" x2="350" y2="210" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Footer -->
  <text x="350" y="235" text-anchor="middle" font-size="13" fill="#555">LLM 需要一个"外壳"来弥补这些局限</text>
  <text x="350" y="258" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">这个外壳，就是 Agent Runtime</text>
</svg>
