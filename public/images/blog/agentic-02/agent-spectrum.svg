<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 200" font-family="-apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <linearGradient id="spectrumGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E3F2FD"/>
      <stop offset="50%" style="stop-color:#F3E5F5"/>
      <stop offset="100%" style="stop-color:#FCE4EC"/>
    </linearGradient>
    <marker id="arrow-l" viewBox="0 0 10 6" refX="0" refY="3" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M10,0 L0,3 L10,6 Z" fill="#999"/>
    </marker>
    <marker id="arrow-r" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,3 L0,6 Z" fill="#999"/>
    </marker>
  </defs>

  <rect width="760" height="200" rx="12" fill="#fafafa" stroke="#e0e0e0" stroke-width="1.5"/>

  <!-- Spectrum bar -->
  <rect x="60" y="55" width="640" height="10" rx="5" fill="url(#spectrumGrad)" stroke="#ccc" stroke-width="1"/>

  <!-- Axis labels -->
  <text x="60" y="45" text-anchor="middle" font-size="12" font-weight="bold" fill="#1976D2">确定性</text>
  <line x1="80" y1="60" x2="60" y2="60" stroke="#999" stroke-width="1.5" marker-start="url(#arrow-l)"/>
  <text x="700" y="45" text-anchor="middle" font-size="12" font-weight="bold" fill="#C2185B">自主性</text>
  <line x1="680" y1="60" x2="700" y2="60" stroke="#999" stroke-width="1.5" marker-end="url(#arrow-r)"/>

  <!-- Dots and labels -->
  <!-- Pure LLM -->
  <circle cx="100" cy="60" r="8" fill="#1976D2" stroke="#fff" stroke-width="2"/>
  <text x="100" y="90" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">Pure LLM</text>
  <text x="100" y="106" text-anchor="middle" font-size="10" fill="#888">f(x)→y</text>

  <!-- System Prompt -->
  <circle cx="220" cy="60" r="8" fill="#3F51B5" stroke="#fff" stroke-width="2"/>
  <text x="220" y="90" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">System</text>
  <text x="220" y="104" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">Prompt</text>
  <text x="220" y="120" text-anchor="middle" font-size="10" fill="#888">定制化对话</text>

  <!-- RAG -->
  <circle cx="340" cy="60" r="8" fill="#7B1FA2" stroke="#fff" stroke-width="2"/>
  <text x="340" y="90" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">RAG</text>
  <text x="340" y="106" text-anchor="middle" font-size="10" fill="#888">知识增强</text>

  <!-- Tool Calling -->
  <circle cx="460" cy="60" r="8" fill="#9C27B0" stroke="#fff" stroke-width="2"/>
  <text x="460" y="90" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">Tool</text>
  <text x="460" y="104" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">Calling</text>
  <text x="460" y="120" text-anchor="middle" font-size="10" fill="#888">函数调用</text>

  <!-- ReAct Agent -->
  <circle cx="580" cy="60" r="8" fill="#C2185B" stroke="#fff" stroke-width="2"/>
  <text x="580" y="90" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">ReAct</text>
  <text x="580" y="104" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">Agent</text>
  <text x="580" y="120" text-anchor="middle" font-size="10" fill="#888">推理+执行循环</text>

  <!-- Full Agent -->
  <circle cx="660" cy="60" r="8" fill="#B71C1C" stroke="#fff" stroke-width="2"/>
  <text x="660" y="90" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">Full</text>
  <text x="660" y="104" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">Agent</text>
  <text x="660" y="120" text-anchor="middle" font-size="10" fill="#888">完整系统</text>

  <!-- Bottom note -->
  <text x="380" y="160" text-anchor="middle" font-size="11" fill="#999">每向右移动一步，都在引入新的复杂性来换取新的能力</text>
</svg>
