<svg viewBox="0 0 640 340" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif">
  <!-- Title -->
  <text x="290" y="22" font-size="14" font-weight="bold" text-anchor="middle" fill="#333">Supervisor-Worker 多 Agent 架构</text>

  <!-- Top Supervisor (centered at x=290) -->
  <rect x="200" y="40" width="180" height="45" rx="6" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
  <text x="290" y="68" font-size="13" font-weight="bold" text-anchor="middle" fill="#0d47a1">Supervisor</text>

  <!-- Vertical trunk from Supervisor bottom center -->
  <line x1="290" y1="85" x2="290" y2="105" stroke="#666" stroke-width="1.5"/>

  <!-- Horizontal bar for T-split -->
  <line x1="100" y1="105" x2="480" y2="105" stroke="#666" stroke-width="1.5"/>

  <!-- Drop lines to workers -->
  <line x1="100" y1="105" x2="100" y2="125" stroke="#666" stroke-width="1.5"/>
  <polygon points="96,125 100,135 104,125" fill="#666"/>
  <line x1="290" y1="105" x2="290" y2="125" stroke="#666" stroke-width="1.5"/>
  <polygon points="286,125 290,135 294,125" fill="#666"/>
  <line x1="480" y1="105" x2="480" y2="125" stroke="#666" stroke-width="1.5"/>
  <polygon points="476,125 480,135 484,125" fill="#666"/>

  <!-- Workers -->
  <rect x="30" y="140" width="140" height="42" rx="6" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="100" y="166" font-size="12" font-weight="bold" text-anchor="middle" fill="#1b5e20">Researcher</text>

  <rect x="220" y="140" width="140" height="42" rx="6" fill="#fff3e0" stroke="#e65100" stroke-width="1.5"/>
  <text x="290" y="166" font-size="12" font-weight="bold" text-anchor="middle" fill="#bf360c">Coder</text>

  <rect x="410" y="140" width="140" height="42" rx="6" fill="#f3e5f5" stroke="#7b1fa2" stroke-width="1.5"/>
  <text x="480" y="166" font-size="12" font-weight="bold" text-anchor="middle" fill="#4a148c">Reviewer</text>

  <!-- Converge back down -->
  <line x1="100" y1="182" x2="100" y2="205" stroke="#666" stroke-width="1.5"/>
  <line x1="290" y1="182" x2="290" y2="205" stroke="#666" stroke-width="1.5"/>
  <line x1="480" y1="182" x2="480" y2="205" stroke="#666" stroke-width="1.5"/>
  <line x1="100" y1="205" x2="480" y2="205" stroke="#666" stroke-width="1.5"/>
  <line x1="290" y1="205" x2="290" y2="225" stroke="#666" stroke-width="1.5"/>
  <polygon points="286,225 290,235 294,225" fill="#666"/>

  <!-- Bottom Supervisor (centered at x=290) -->
  <rect x="200" y="238" width="180" height="45" rx="6" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
  <text x="290" y="266" font-size="13" font-weight="bold" text-anchor="middle" fill="#0d47a1">Supervisor</text>

  <!-- Loop-back dashed: bottom Supervisor → top Supervisor -->
  <line x1="380" y1="260" x2="570" y2="260" stroke="#1565c0" stroke-width="1.5" stroke-dasharray="5,4"/>
  <line x1="570" y1="260" x2="570" y2="62" stroke="#1565c0" stroke-width="1.5" stroke-dasharray="5,4"/>
  <line x1="570" y1="62" x2="382" y2="62" stroke="#1565c0" stroke-width="1.5" stroke-dasharray="5,4"/>
  <polygon points="382,58 372,62 382,66" fill="#1565c0"/>

  <!-- Annotation text -->
  <text x="578" y="155" font-size="9" fill="#78909c">回到 Supervisor</text>
  <text x="578" y="168" font-size="9" fill="#78909c">决定是否继续</text>
</svg>