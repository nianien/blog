<svg viewBox="0 0 600 500" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif">
  <!-- Title -->
  <text x="300" y="22" font-size="14" font-weight="bold" text-anchor="middle" fill="#333">框架选型决策树</text>

  <!-- Vertical trunk line -->
  <line x1="40" y1="48" x2="40" y2="470" stroke="#b0bec5" stroke-width="1.5"/>

  <!-- Root node (vertically centered) -->
  <rect x="50" y="232" width="90" height="48" rx="6" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
  <text x="95" y="252" font-size="11" font-weight="bold" text-anchor="middle" fill="#0d47a1">你的核心</text>
  <text x="95" y="268" font-size="11" font-weight="bold" text-anchor="middle" fill="#0d47a1">需求是？</text>
  <line x1="40" y1="256" x2="50" y2="256" stroke="#1565c0" stroke-width="2"/>

  <!-- All branch horizontal lines go from trunk (x=40) to x=60 -->
  <!-- All arrow connectors aligned at x=310→350, pills at x=355 -->

  <!-- ===== Branch 1: 快速原型 y=58 ===== -->
  <circle cx="40" cy="58" r="3" fill="#1565c0"/>
  <line x1="40" y1="58" x2="60" y2="58" stroke="#546e7a" stroke-width="1.2"/>
  <text x="68" y="56" font-size="11" font-weight="bold" fill="#37474f">快速原型 / PoC</text>
  <text x="68" y="72" font-size="9" fill="#78909c">生态最大，上手最快</text>
  <line x1="310" y1="58" x2="348" y2="58" stroke="#546e7a" stroke-width="1"/>
  <polygon points="348,54 358,58 348,62" fill="#546e7a"/>
  <rect x="362" y="44" width="110" height="28" rx="5" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.2"/>
  <text x="417" y="63" font-size="11" text-anchor="middle" fill="#1b5e20">LangChain</text>

  <!-- ===== Branch 2: 复杂 Agent y=115 ===== -->
  <circle cx="40" cy="115" r="3" fill="#1565c0"/>
  <line x1="40" y1="115" x2="60" y2="115" stroke="#546e7a" stroke-width="1.2"/>
  <text x="68" y="113" font-size="11" font-weight="bold" fill="#37474f">复杂 Agent 逻辑</text>
  <text x="68" y="129" font-size="9" fill="#78909c">分支 / 循环 / 并行</text>
  <line x1="310" y1="115" x2="348" y2="115" stroke="#546e7a" stroke-width="1"/>
  <polygon points="348,111 358,115 348,119" fill="#546e7a"/>
  <rect x="362" y="101" width="110" height="28" rx="5" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.2"/>
  <text x="417" y="120" font-size="11" text-anchor="middle" fill="#0d47a1">LangGraph</text>

  <!-- ===== Branch 3: 多 Agent 协作 y=185 ===== -->
  <circle cx="40" cy="185" r="3" fill="#1565c0"/>
  <line x1="40" y1="185" x2="60" y2="185" stroke="#546e7a" stroke-width="1.2"/>
  <text x="68" y="183" font-size="11" font-weight="bold" fill="#37474f">多 Agent 协作</text>

  <text x="88" y="204" font-size="9" fill="#78909c">角色扮演式</text>
  <line x1="310" y1="200" x2="348" y2="200" stroke="#546e7a" stroke-width="1"/>
  <polygon points="348,196 358,200 348,204" fill="#546e7a"/>
  <rect x="362" y="188" width="85" height="24" rx="4" fill="#fff3e0" stroke="#e65100" stroke-width="1"/>
  <text x="404" y="205" font-size="10" text-anchor="middle" fill="#bf360c">CrewAI</text>

  <text x="88" y="228" font-size="9" fill="#78909c">对话式协作</text>
  <line x1="310" y1="224" x2="348" y2="224" stroke="#546e7a" stroke-width="1"/>
  <polygon points="348,220 358,224 348,228" fill="#546e7a"/>
  <rect x="362" y="212" width="85" height="24" rx="4" fill="#f3e5f5" stroke="#7b1fa2" stroke-width="1"/>
  <text x="404" y="229" font-size="10" text-anchor="middle" fill="#4a148c">AutoGen</text>

  <text x="88" y="252" font-size="9" fill="#78909c">图编排式</text>
  <line x1="310" y1="248" x2="348" y2="248" stroke="#546e7a" stroke-width="1"/>
  <polygon points="348,244 358,248 348,252" fill="#546e7a"/>
  <rect x="362" y="236" width="85" height="24" rx="4" fill="#e3f2fd" stroke="#1565c0" stroke-width="1"/>
  <text x="404" y="253" font-size="10" text-anchor="middle" fill="#0d47a1">LangGraph</text>

  <!-- ===== Branch 4: RAG y=290 ===== -->
  <circle cx="40" cy="290" r="3" fill="#1565c0"/>
  <line x1="40" y1="290" x2="60" y2="290" stroke="#546e7a" stroke-width="1.2"/>
  <text x="68" y="288" font-size="11" font-weight="bold" fill="#37474f">RAG / 知识问答</text>

  <text x="88" y="310" font-size="9" fill="#78909c">需要灵活性</text>
  <line x1="310" y1="306" x2="348" y2="306" stroke="#546e7a" stroke-width="1"/>
  <polygon points="348,302 358,306 348,310" fill="#546e7a"/>
  <rect x="362" y="293" width="145" height="24" rx="4" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1"/>
  <text x="434" y="310" font-size="10" text-anchor="middle" fill="#1b5e20">LangChain + Retriever</text>

  <text x="88" y="336" font-size="9" fill="#78909c">需要干净抽象</text>
  <line x1="310" y1="332" x2="348" y2="332" stroke="#546e7a" stroke-width="1"/>
  <polygon points="348,328 358,332 348,336" fill="#546e7a"/>
  <rect x="362" y="319" width="85" height="24" rx="4" fill="#e0f2f1" stroke="#00695c" stroke-width="1"/>
  <text x="404" y="336" font-size="10" text-anchor="middle" fill="#004d40">Haystack</text>

  <!-- ===== Branch 5: Enterprise y=370 ===== -->
  <circle cx="40" cy="370" r="3" fill="#1565c0"/>
  <line x1="40" y1="370" x2="60" y2="370" stroke="#546e7a" stroke-width="1.2"/>
  <text x="68" y="368" font-size="11" font-weight="bold" fill="#37474f">企业级集成</text>
  <text x="68" y="383" font-size="9" fill="#78909c">.NET / Azure 生态</text>
  <line x1="310" y1="370" x2="348" y2="370" stroke="#546e7a" stroke-width="1"/>
  <polygon points="348,366 358,370 348,374" fill="#546e7a"/>
  <rect x="362" y="356" width="130" height="28" rx="5" fill="#fce4ec" stroke="#ad1457" stroke-width="1.2"/>
  <text x="427" y="375" font-size="10" text-anchor="middle" fill="#880e4f">Semantic Kernel</text>

  <!-- ===== Branch 6: Prompt y=420 ===== -->
  <circle cx="40" cy="420" r="3" fill="#1565c0"/>
  <line x1="40" y1="420" x2="60" y2="420" stroke="#546e7a" stroke-width="1.2"/>
  <text x="68" y="418" font-size="11" font-weight="bold" fill="#37474f">Prompt 自动优化</text>
  <text x="68" y="433" font-size="9" fill="#78909c">编译式 Prompt 工程</text>
  <line x1="310" y1="420" x2="348" y2="420" stroke="#546e7a" stroke-width="1"/>
  <polygon points="348,416 358,420 348,424" fill="#546e7a"/>
  <rect x="362" y="406" width="85" height="28" rx="5" fill="#fffde7" stroke="#f9a825" stroke-width="1.2"/>
  <text x="404" y="425" font-size="11" text-anchor="middle" fill="#f57f17">DSPy</text>

  <!-- ===== Branch 7: 生产系统 y=465 ===== -->
  <circle cx="40" cy="465" r="3" fill="#1565c0"/>
  <line x1="40" y1="465" x2="60" y2="465" stroke="#546e7a" stroke-width="1.2"/>
  <text x="68" y="463" font-size="11" font-weight="bold" fill="#37474f">生产系统（精细控制）</text>
  <text x="68" y="478" font-size="9" fill="#78909c">需要完全掌控每个环节</text>
  <line x1="310" y1="465" x2="348" y2="465" stroke="#546e7a" stroke-width="1"/>
  <polygon points="348,461 358,465 348,469" fill="#546e7a"/>
  <rect x="362" y="451" width="145" height="28" rx="5" fill="#eceff1" stroke="#607d8b" stroke-width="1.2"/>
  <text x="434" y="470" font-size="10" text-anchor="middle" fill="#37474f">自研 / 框架底层模块</text>
</svg>