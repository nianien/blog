<svg viewBox="0 0 700 310" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif">
  <!-- Title -->
  <text x="350" y="22" font-size="14" font-weight="bold" text-anchor="middle" fill="#333">分层框架架构：务实的折中方案</text>

  <!-- Layer 1: Application -->
  <rect x="40" y="42" width="580" height="48" rx="6" fill="#e8eaf6" stroke="#3949ab" stroke-width="1.5"/>
  <text x="330" y="62" font-size="12" font-weight="bold" text-anchor="middle" fill="#1a237e">你的应用层代码</text>
  <text x="330" y="78" font-size="10" text-anchor="middle" fill="#5c6bc0">（业务逻辑、API 接口、用户交互）</text>
  <text x="640" y="68" font-size="9" fill="#90a4ae">定制</text>

  <!-- Layer 2: Agent Runtime -->
  <rect x="40" y="98" width="580" height="48" rx="6" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="330" y="118" font-size="12" font-weight="bold" text-anchor="middle" fill="#0d47a1">自研 Agent Runtime</text>
  <text x="330" y="134" font-size="10" text-anchor="middle" fill="#42a5f5">（控制循环、状态管理、错误处理、可观测性）</text>
  <text x="640" y="124" font-size="9" fill="#90a4ae">掌控</text>

  <!-- Layer 3 left: 自研核心模块 -->
  <rect x="40" y="154" width="280" height="80" rx="6" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="180" y="175" font-size="12" font-weight="bold" text-anchor="middle" fill="#1b5e20">自研核心模块</text>
  <text x="180" y="195" font-size="10" text-anchor="middle" fill="#4caf50">自研工具调度 / 消息管理 / 状态存储</text>

  <!-- Layer 3 right: 框架集成模块 -->
  <rect x="340" y="154" width="280" height="80" rx="6" fill="#fff3e0" stroke="#e65100" stroke-width="1.5"/>
  <text x="480" y="175" font-size="12" font-weight="bold" text-anchor="middle" fill="#bf360c">框架的集成模块（可选）</text>
  <text x="480" y="195" font-size="10" text-anchor="middle" fill="#f57c00">LangChain Tool / Retriever</text>
  <text x="480" y="212" font-size="10" text-anchor="middle" fill="#f57c00">Document Loader / Embedding</text>
  <text x="640" y="195" font-size="9" fill="#90a4ae">灵活选用</text>

  <!-- Layer 4: LLM Provider SDK -->
  <rect x="40" y="242" width="580" height="48" rx="6" fill="#f3e5f5" stroke="#7b1fa2" stroke-width="1.5"/>
  <text x="330" y="262" font-size="12" font-weight="bold" text-anchor="middle" fill="#4a148c">LLM Provider SDK</text>
  <text x="330" y="278" font-size="10" text-anchor="middle" fill="#ab47bc">（openai, anthropic, etc.）</text>
  <text x="640" y="268" font-size="9" fill="#90a4ae">标准</text>
</svg>
