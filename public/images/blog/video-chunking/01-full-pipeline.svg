<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif">
  <!-- Background -->
  <rect width="900" height="300" fill="#fafbfc" rx="8"/>

  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a1a2e">视频分片全链路 Pipeline</text>

  <!-- Stage 1: 用户上传 -->
  <rect x="20" y="70" width="100" height="54" rx="8" fill="#e8f4fd" stroke="#3498db" stroke-width="1.5"/>
  <text x="70" y="93" text-anchor="middle" font-size="12" font-weight="600" fill="#2471a3">用户上传</text>
  <text x="70" y="110" text-anchor="middle" font-size="10" fill="#5a9bd5">File Select</text>

  <!-- Arrow 1→2 -->
  <line x1="120" y1="97" x2="148" y2="97" stroke="#7f8c8d" stroke-width="1.5"/>
  <polygon points="148,93 158,97 148,101" fill="#7f8c8d"/>

  <!-- Stage 2: 分片上传 -->
  <rect x="160" y="70" width="100" height="54" rx="8" fill="#fef9e7" stroke="#f39c12" stroke-width="1.5"/>
  <text x="210" y="93" text-anchor="middle" font-size="12" font-weight="600" fill="#b7950b">分片上传</text>
  <text x="210" y="110" text-anchor="middle" font-size="10" fill="#d4a017">Chunk Upload</text>

  <!-- Arrow 2→3 -->
  <line x1="260" y1="97" x2="288" y2="97" stroke="#7f8c8d" stroke-width="1.5"/>
  <polygon points="288,93 298,97 288,101" fill="#7f8c8d"/>

  <!-- Stage 3: 对象存储 -->
  <rect x="300" y="70" width="100" height="54" rx="8" fill="#eafaf1" stroke="#27ae60" stroke-width="1.5"/>
  <text x="350" y="93" text-anchor="middle" font-size="12" font-weight="600" fill="#1e8449">对象存储</text>
  <text x="350" y="110" text-anchor="middle" font-size="10" fill="#2ecc71">S3 / OSS</text>

  <!-- Arrow 3→4 -->
  <line x1="400" y1="97" x2="428" y2="97" stroke="#7f8c8d" stroke-width="1.5"/>
  <polygon points="428,93 438,97 428,101" fill="#7f8c8d"/>

  <!-- Stage 4: 转码切片 -->
  <rect x="440" y="55" width="120" height="84" rx="8" fill="#f5eef8" stroke="#8e44ad" stroke-width="1.5"/>
  <text x="500" y="80" text-anchor="middle" font-size="12" font-weight="600" fill="#6c3483">转码切片</text>
  <text x="500" y="97" text-anchor="middle" font-size="10" fill="#9b59b6">Transcode</text>
  <text x="500" y="114" text-anchor="middle" font-size="9" fill="#a569bd">1080p / 720p / 480p</text>
  <text x="500" y="128" text-anchor="middle" font-size="9" fill="#a569bd">360p / 240p</text>

  <!-- Arrow 4→5 -->
  <line x1="560" y1="97" x2="588" y2="97" stroke="#7f8c8d" stroke-width="1.5"/>
  <polygon points="588,93 598,97 588,101" fill="#7f8c8d"/>

  <!-- Stage 5: HLS/DASH封装 -->
  <rect x="600" y="70" width="100" height="54" rx="8" fill="#fdedec" stroke="#e74c3c" stroke-width="1.5"/>
  <text x="650" y="89" text-anchor="middle" font-size="12" font-weight="600" fill="#b03a2e">HLS / DASH</text>
  <text x="650" y="106" text-anchor="middle" font-size="10" fill="#e74c3c">封装</text>
  <text x="650" y="119" text-anchor="middle" font-size="9" fill="#ec7063">.ts / .m4s + .m3u8</text>

  <!-- Arrow 5→6 -->
  <line x1="700" y1="97" x2="728" y2="97" stroke="#7f8c8d" stroke-width="1.5"/>
  <polygon points="728,93 738,97 728,101" fill="#7f8c8d"/>

  <!-- Stage 6: CDN分发 -->
  <rect x="740" y="70" width="100" height="54" rx="8" fill="#eaf2f8" stroke="#2980b9" stroke-width="1.5"/>
  <text x="790" y="93" text-anchor="middle" font-size="12" font-weight="600" fill="#1f618d">CDN 分发</text>
  <text x="790" y="110" text-anchor="middle" font-size="10" fill="#5499c7">Edge Cache</text>

  <!-- Arrow down from CDN -->
  <line x1="790" y1="124" x2="790" y2="158" stroke="#7f8c8d" stroke-width="1.5"/>
  <polygon points="786,158 790,168 794,158" fill="#7f8c8d"/>

  <!-- Stage 7: 播放器 ABR -->
  <rect x="720" y="170" width="140" height="54" rx="8" fill="#fef5e7" stroke="#e67e22" stroke-width="1.5"/>
  <text x="790" y="193" text-anchor="middle" font-size="12" font-weight="600" fill="#ca6f1e">播放器 (ABR)</text>
  <text x="790" y="210" text-anchor="middle" font-size="10" fill="#eb984e">自适应码率切换</text>

  <!-- Bottom annotations -->
  <rect x="30" y="170" width="14" height="14" rx="3" fill="#e8f4fd" stroke="#3498db" stroke-width="1"/>
  <text x="50" y="182" font-size="10" fill="#555">上传阶段</text>

  <rect x="120" y="170" width="14" height="14" rx="3" fill="#eafaf1" stroke="#27ae60" stroke-width="1"/>
  <text x="140" y="182" font-size="10" fill="#555">存储阶段</text>

  <rect x="210" y="170" width="14" height="14" rx="3" fill="#f5eef8" stroke="#8e44ad" stroke-width="1"/>
  <text x="230" y="182" font-size="10" fill="#555">转码阶段</text>

  <rect x="300" y="170" width="14" height="14" rx="3" fill="#fdedec" stroke="#e74c3c" stroke-width="1"/>
  <text x="320" y="182" font-size="10" fill="#555">封装阶段</text>

  <rect x="390" y="170" width="14" height="14" rx="3" fill="#eaf2f8" stroke="#2980b9" stroke-width="1"/>
  <text x="410" y="182" font-size="10" fill="#555">分发阶段</text>

  <rect x="480" y="170" width="14" height="14" rx="3" fill="#fef5e7" stroke="#e67e22" stroke-width="1"/>
  <text x="500" y="182" font-size="10" fill="#555">播放阶段</text>

  <!-- Bracket annotation bottom -->
  <text x="450" y="260" text-anchor="middle" font-size="11" fill="#7f8c8d">每一步都围绕「分片」展开 —— 上传分片、转码分片、封装分片、缓存分片、播放分片</text>

  <!-- Divider line -->
  <line x1="30" y1="240" x2="870" y2="240" stroke="#ddd" stroke-width="1" stroke-dasharray="4,3"/>
</svg>