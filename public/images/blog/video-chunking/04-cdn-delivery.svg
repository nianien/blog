<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif">
  <!-- Background -->
  <rect width="800" height="300" fill="#fafbfc" rx="8"/>

  <!-- Title -->
  <text x="400" y="25" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a1a2e">CDN 分发与自适应码率播放</text>

  <!-- Origin -->
  <rect x="20" y="80" width="120" height="80" rx="8" fill="#f5eef8" stroke="#8e44ad" stroke-width="1.5"/>
  <text x="80" y="105" text-anchor="middle" font-size="12" font-weight="600" fill="#6c3483">源站</text>
  <text x="80" y="122" text-anchor="middle" font-size="9" fill="#9b59b6">HLS 分片存储</text>
  <text x="80" y="138" text-anchor="middle" font-size="9" fill="#9b59b6">Master Playlist</text>
  <text x="80" y="150" text-anchor="middle" font-size="9" fill="#9b59b6">Multi-bitrate .ts</text>

  <!-- Arrow origin → mid -->
  <line x1="140" y1="120" x2="188" y2="120" stroke="#7f8c8d" stroke-width="1.5"/>
  <polygon points="188,116 198,120 188,124" fill="#7f8c8d"/>
  <text x="165" y="112" text-anchor="middle" font-size="8" fill="#95a5a6">回源</text>

  <!-- CDN Mid-tier -->
  <rect x="200" y="80" width="120" height="80" rx="8" fill="#eaf2f8" stroke="#2980b9" stroke-width="1.5"/>
  <text x="260" y="105" text-anchor="middle" font-size="12" font-weight="600" fill="#1f618d">CDN 中间层</text>
  <text x="260" y="122" text-anchor="middle" font-size="9" fill="#5499c7">L2 Cache</text>
  <text x="260" y="138" text-anchor="middle" font-size="9" fill="#5499c7">热点合并回源</text>
  <text x="260" y="150" text-anchor="middle" font-size="9" fill="#5499c7">分片级缓存</text>

  <!-- Arrows mid → edges (fan-out) -->
  <line x1="320" y1="100" x2="388" y2="65" stroke="#3498db" stroke-width="1.5"/>
  <polygon points="384,61 394,65 386,69" fill="#3498db"/>

  <line x1="320" y1="120" x2="388" y2="120" stroke="#3498db" stroke-width="1.5"/>
  <polygon points="388,116 398,120 388,124" fill="#3498db"/>

  <line x1="320" y1="140" x2="388" y2="175" stroke="#3498db" stroke-width="1.5"/>
  <polygon points="384,171 394,175 386,179" fill="#3498db"/>

  <!-- Edge node 1 -->
  <rect x="400" y="42" width="110" height="46" rx="6" fill="#d4e6f1" stroke="#2980b9" stroke-width="1.5"/>
  <text x="455" y="62" text-anchor="middle" font-size="10" font-weight="600" fill="#1f618d">边缘节点 A</text>
  <text x="455" y="78" text-anchor="middle" font-size="9" fill="#5499c7">北京 / L1 Cache</text>

  <!-- Edge node 2 -->
  <rect x="400" y="97" width="110" height="46" rx="6" fill="#d4e6f1" stroke="#2980b9" stroke-width="1.5"/>
  <text x="455" y="117" text-anchor="middle" font-size="10" font-weight="600" fill="#1f618d">边缘节点 B</text>
  <text x="455" y="133" text-anchor="middle" font-size="9" fill="#5499c7">上海 / L1 Cache</text>

  <!-- Edge node 3 -->
  <rect x="400" y="152" width="110" height="46" rx="6" fill="#d4e6f1" stroke="#2980b9" stroke-width="1.5"/>
  <text x="455" y="172" text-anchor="middle" font-size="10" font-weight="600" fill="#1f618d">边缘节点 C</text>
  <text x="455" y="188" text-anchor="middle" font-size="9" fill="#5499c7">广州 / L1 Cache</text>

  <!-- Arrow edge B → player -->
  <line x1="510" y1="120" x2="558" y2="120" stroke="#e67e22" stroke-width="1.5"/>
  <polygon points="558,116 568,120 558,124" fill="#e67e22"/>

  <!-- Player -->
  <rect x="570" y="55" width="210" height="140" rx="8" fill="#fef5e7" stroke="#e67e22" stroke-width="1.5"/>
  <text x="675" y="78" text-anchor="middle" font-size="12" font-weight="600" fill="#ca6f1e">播放器 (ABR Engine)</text>

  <!-- Bandwidth indicator -->
  <rect x="586" y="88" width="178" height="94" rx="6" fill="#fdebd0" stroke="#f5b041" stroke-width="1"/>
  <text x="675" y="106" text-anchor="middle" font-size="10" font-weight="600" fill="#b7950b">带宽估算 &amp; 码率选择</text>

  <!-- Bandwidth bar -->
  <rect x="600" y="115" width="150" height="12" rx="4" fill="#eee" stroke="#ccc" stroke-width="1"/>
  <rect x="600" y="115" width="105" height="12" rx="4" fill="#27ae60" stroke="#1e8449" stroke-width="1"/>
  <text x="660" y="124" text-anchor="middle" font-size="8" fill="#fff" font-weight="600">12 Mbps</text>

  <!-- Bitrate options -->
  <rect x="600" y="134" width="44" height="18" rx="4" fill="#27ae60" stroke="#1e8449" stroke-width="1"/>
  <text x="622" y="147" text-anchor="middle" font-size="8" fill="#fff" font-weight="600">1080p</text>

  <rect x="650" y="134" width="36" height="18" rx="4" fill="#f0f0f0" stroke="#bbb" stroke-width="1"/>
  <text x="668" y="147" text-anchor="middle" font-size="8" fill="#666">720p</text>

  <rect x="692" y="134" width="36" height="18" rx="4" fill="#f0f0f0" stroke="#bbb" stroke-width="1"/>
  <text x="710" y="147" text-anchor="middle" font-size="8" fill="#666">480p</text>

  <!-- Selected indicator -->
  <text x="622" y="170" text-anchor="middle" font-size="9" fill="#27ae60" font-weight="600">当前选择</text>

  <!-- Bottom: ABR explanation -->
  <rect x="30" y="225" width="740" height="44" rx="6" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1"/>
  <text x="400" y="243" text-anchor="middle" font-size="10" fill="#555">ABR 策略：播放器持续监测下载吞吐量和缓冲区水位，每个分片请求前决定下一个分片的码率</text>
  <text x="400" y="259" text-anchor="middle" font-size="10" fill="#555">带宽充足 → 升码率 (1080p)　｜　带宽下降 → 降码率 (480p)　｜　缓冲区低 → 紧急降级 (360p)</text>
</svg>