<svg viewBox="0 0 860 320" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif">

  <!-- Background -->
  <rect width="860" height="320" fill="#F8FAFC" rx="8"/>

  <!-- Title -->
  <text x="430" y="30" text-anchor="middle" font-size="14" font-weight="600" fill="#1E293B">计费模型演进路径</text>

  <!-- Timeline axis -->
  <line x1="60" y1="160" x2="800" y2="160" stroke="#CBD5E1" stroke-width="1.5"/>

  <!-- Arrow at end -->
  <polygon points="800,160 786,152 786,168" fill="#CBD5E1"/>

  <!-- Era labels on axis -->
  <text x="130" y="180" text-anchor="middle" font-size="11" fill="#94A3B8">2000s 前</text>
  <text x="270" y="180" text-anchor="middle" font-size="11" fill="#94A3B8">2005–2010</text>
  <text x="420" y="180" text-anchor="middle" font-size="11" fill="#94A3B8">2010–2015</text>
  <text x="570" y="180" text-anchor="middle" font-size="11" fill="#94A3B8">2015–2020</text>
  <text x="710" y="180" text-anchor="middle" font-size="11" fill="#94A3B8">2020 至今</text>

  <!-- Stage dividers -->
  <line x1="200" y1="145" x2="200" y2="175" stroke="#CBD5E1" stroke-width="1"/>
  <line x1="340" y1="145" x2="340" y2="175" stroke="#CBD5E1" stroke-width="1"/>
  <line x1="490" y1="145" x2="490" y2="175" stroke="#CBD5E1" stroke-width="1"/>
  <line x1="640" y1="145" x2="640" y2="175" stroke="#CBD5E1" stroke-width="1"/>

  <!-- CPT/CPD Node -->
  <rect x="60" y="60" width="120" height="70" rx="8" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="120" y="84" text-anchor="middle" font-size="13" font-weight="700" fill="#92400E">CPT / CPD</text>
  <text x="120" y="101" text-anchor="middle" font-size="10" fill="#78350F">按时间计费</text>
  <text x="120" y="116" text-anchor="middle" font-size="10" fill="#78350F">买"广告位时段"</text>
  <!-- connector -->
  <line x1="120" y1="130" x2="120" y2="160" stroke="#F59E0B" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- CPM Node -->
  <rect x="205" y="60" width="120" height="70" rx="8" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="265" y="84" text-anchor="middle" font-size="13" font-weight="700" fill="#1E40AF">CPM</text>
  <text x="265" y="101" text-anchor="middle" font-size="10" fill="#1E3A8A">按千次曝光计费</text>
  <text x="265" y="116" text-anchor="middle" font-size="10" fill="#1E3A8A">买"展示机会"</text>
  <line x1="265" y1="130" x2="265" y2="160" stroke="#3B82F6" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- CPC Node -->
  <rect x="345" y="60" width="120" height="70" rx="8" fill="#D1FAE5" stroke="#10B981" stroke-width="1.5"/>
  <text x="405" y="84" text-anchor="middle" font-size="13" font-weight="700" fill="#065F46">CPC</text>
  <text x="405" y="101" text-anchor="middle" font-size="10" fill="#064E3B">按点击计费</text>
  <text x="405" y="116" text-anchor="middle" font-size="10" fill="#064E3B">买"流量意图"</text>
  <line x1="405" y1="130" x2="405" y2="160" stroke="#10B981" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- CPA Node -->
  <rect x="495" y="60" width="120" height="70" rx="8" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="1.5"/>
  <text x="555" y="84" text-anchor="middle" font-size="13" font-weight="700" fill="#4C1D95">CPA / CPS</text>
  <text x="555" y="101" text-anchor="middle" font-size="10" fill="#3B0764">按转化计费</text>
  <text x="555" y="116" text-anchor="middle" font-size="10" fill="#3B0764">买"转化结果"</text>
  <line x1="555" y1="130" x2="555" y2="160" stroke="#8B5CF6" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- oCPX Node -->
  <rect x="645" y="45" width="140" height="85" rx="8" fill="#FEE2E2" stroke="#EF4444" stroke-width="2"/>
  <text x="715" y="72" text-anchor="middle" font-size="13" font-weight="700" fill="#7F1D1D">oCPX 智能计费</text>
  <text x="715" y="89" text-anchor="middle" font-size="10" fill="#7F1D1D">目标出价 + 系统优化</text>
  <text x="715" y="104" text-anchor="middle" font-size="10" fill="#7F1D1D">oCPM / oCPC / oCPA</text>
  <text x="715" y="119" text-anchor="middle" font-size="10" fill="#991B1B">真正"买效果"</text>
  <line x1="715" y1="130" x2="715" y2="160" stroke="#EF4444" stroke-width="2" stroke-dasharray="4,3"/>

  <!-- Risk arrow below timeline -->
  <line x1="70" y1="220" x2="790" y2="220" stroke="#E2E8F0" stroke-width="1"/>
  <polygon points="790,220 776,212 776,228" fill="#E2E8F0"/>
  <text x="60" y="240" text-anchor="start" font-size="11" fill="#64748B">广告主风险</text>
  <text x="430" y="240" text-anchor="middle" font-size="11" fill="#94A3B8">↓ 逐步降低</text>
  <text x="795" y="240" text-anchor="end" font-size="11" fill="#64748B">媒体风险</text>
  <text x="60" y="258" text-anchor="start" font-size="11" fill="#94A3B8">高</text>
  <text x="795" y="258" text-anchor="end" font-size="11" fill="#94A3B8">高</text>

  <!-- Complexity arrow -->
  <line x1="70" y1="275" x2="790" y2="275" stroke="#E2E8F0" stroke-width="1"/>
  <polygon points="790,275 776,267 776,283" fill="#E2E8F0"/>
  <text x="60" y="295" text-anchor="start" font-size="11" fill="#64748B">系统复杂度</text>
  <text x="430" y="295" text-anchor="middle" font-size="11" fill="#94A3B8">↑ 逐步升高</text>
  <text x="60" y="310" text-anchor="start" font-size="11" fill="#94A3B8">低</text>
  <text x="795" y="310" text-anchor="end" font-size="11" fill="#94A3B8">高</text>
</svg>
