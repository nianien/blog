<svg viewBox="0 0 800 520" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif">
  <!-- Title -->
  <text x="400" y="30" font-size="16" font-weight="bold" text-anchor="middle" fill="#0f172a">LLM 评估 vs Agent 评估</text>

  <!-- ===== Left side: LLM Evaluation ===== -->
  <text x="185" y="65" font-size="14" font-weight="bold" text-anchor="middle" fill="#1e40af">LLM 评估</text>

  <!-- Input -->
  <rect x="65" y="85" width="240" height="45" rx="6" fill="#fed7aa" stroke="#f97316" stroke-width="1.5"/>
  <text x="185" y="113" font-size="12" text-anchor="middle" fill="#7c2d12">Input</text>

  <!-- Arrow -->
  <line x1="185" y1="130" x2="185" y2="150" stroke="#f97316" stroke-width="1.5"/>
  <polygon points="181,150 185,160 189,150" fill="#f97316"/>

  <!-- LLM Processing -->
  <rect x="65" y="165" width="240" height="45" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="185" y="193" font-size="12" text-anchor="middle" fill="#1e40af">LLM Processing</text>

  <!-- Arrow -->
  <line x1="185" y1="210" x2="185" y2="230" stroke="#3b82f6" stroke-width="1.5"/>
  <polygon points="181,230 185,240 189,230" fill="#3b82f6"/>

  <!-- Output -->
  <rect x="65" y="245" width="240" height="45" rx="6" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="185" y="273" font-size="12" text-anchor="middle" fill="#166534">Output</text>

  <!-- Arrow -->
  <line x1="185" y1="290" x2="185" y2="310" stroke="#22c55e" stroke-width="1.5"/>
  <polygon points="181,310 185,320 189,310" fill="#22c55e"/>

  <!-- Quality Eval box -->
  <rect x="65" y="325" width="240" height="65" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="185" y="350" font-size="12" font-weight="bold" text-anchor="middle" fill="#92400e">质量评估</text>
  <text x="185" y="370" font-size="10" text-anchor="middle" fill="#78350f">(单一维度: 输出质量)</text>

  <!-- ===== Right side: Agent Evaluation ===== -->
  <text x="615" y="65" font-size="14" font-weight="bold" text-anchor="middle" fill="#166534">Agent 评估</text>

  <!-- Input -->
  <rect x="495" y="85" width="240" height="45" rx="6" fill="#fed7aa" stroke="#f97316" stroke-width="1.5"/>
  <text x="615" y="113" font-size="12" text-anchor="middle" fill="#7c2d12">Input</text>

  <!-- Arrow -->
  <line x1="615" y1="130" x2="615" y2="148" stroke="#f97316" stroke-width="1.5"/>
  <polygon points="611,148 615,158 619,148" fill="#f97316"/>

  <!-- D1 Decision -->
  <circle cx="615" cy="172" r="14" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="615" y="177" font-size="10" font-weight="bold" text-anchor="middle" fill="#1e40af">D1</text>

  <!-- Arrow -->
  <line x1="615" y1="186" x2="615" y2="200" stroke="#3b82f6" stroke-width="1.5"/>
  <polygon points="611,200 615,210 619,200" fill="#3b82f6"/>

  <!-- E1 Execution -->
  <circle cx="615" cy="225" r="14" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="615" y="230" font-size="10" font-weight="bold" text-anchor="middle" fill="#166534">E1</text>

  <!-- Arrow -->
  <line x1="615" y1="239" x2="615" y2="253" stroke="#22c55e" stroke-width="1.5"/>
  <polygon points="611,253 615,263 619,253" fill="#22c55e"/>

  <!-- D2 Decision -->
  <circle cx="615" cy="278" r="14" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="615" y="283" font-size="10" font-weight="bold" text-anchor="middle" fill="#1e40af">D2</text>

  <!-- Arrow -->
  <line x1="615" y1="292" x2="615" y2="306" stroke="#3b82f6" stroke-width="1.5"/>
  <polygon points="611,306 615,316 619,306" fill="#3b82f6"/>

  <!-- E2 Execution -->
  <circle cx="615" cy="331" r="14" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="615" y="336" font-size="10" font-weight="bold" text-anchor="middle" fill="#166534">E2</text>

  <!-- Arrow -->
  <line x1="615" y1="345" x2="615" y2="363" stroke="#22c55e" stroke-width="1.5"/>
  <polygon points="611,363 615,373 619,363" fill="#22c55e"/>

  <!-- Output -->
  <rect x="495" y="378" width="240" height="45" rx="6" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="615" y="406" font-size="12" text-anchor="middle" fill="#166534">Output</text>

  <!-- ===== Bottom comparison section ===== -->
  <rect x="40" y="440" width="720" height="65" rx="6" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>

  <!-- LLM side -->
  <text x="190" y="462" font-size="11" font-weight="bold" text-anchor="middle" fill="#1e40af">LLM 评估简单</text>
  <text x="190" y="480" font-size="10" text-anchor="middle" fill="#0f172a">单向流 · 一个维度 · BLEU / ROUGE</text>
  <text x="190" y="495" font-size="10" text-anchor="middle" fill="#0f172a">指标: 输出质量</text>

  <!-- Divider -->
  <line x1="400" y1="448" x2="400" y2="498" stroke="#cbd5e1" stroke-width="1"/>

  <!-- Agent side -->
  <text x="590" y="462" font-size="11" font-weight="bold" text-anchor="middle" fill="#166534">Agent 评估复杂</text>
  <text x="590" y="480" font-size="10" text-anchor="middle" fill="#0f172a">多轮决策 · 多个维度 · D1→E1→D2→E2</text>
  <text x="590" y="495" font-size="10" text-anchor="middle" fill="#0f172a">指标: 工具选择 + 步骤数 + 成本</text>
</svg>