<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 380" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif">
  <rect width="700" height="380" rx="12" fill="#fafafa" stroke="#e0e0e0" stroke-width="1.5"/>
  <text x="350" y="32" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">Tool Calling vs Computer Use</text>

  <!-- Left: Tool Calling -->
  <rect x="30" y="60" width="300" height="290" rx="8" fill="#E3F2FD" stroke="#1976D2" stroke-width="1.5"/>
  <text x="180" y="88" text-anchor="middle" font-size="14" font-weight="bold" fill="#1565C0">Tool Calling / MCP</text>
  <text x="180" y="108" text-anchor="middle" font-size="11" font-style="italic" fill="#1976D2">精准手术刀</text>
  <line x1="50" y1="120" x2="310" y2="120" stroke="#90CAF9" stroke-width="1"/>

  <text x="50" y="148" font-size="11" fill="#666">精度</text>
  <text x="310" y="148" text-anchor="end" font-size="11" font-weight="bold" fill="#1976D2">高</text>

  <text x="50" y="175" font-size="11" fill="#666">速度</text>
  <text x="310" y="175" text-anchor="end" font-size="11" font-weight="bold" fill="#1976D2">快</text>

  <text x="50" y="202" font-size="11" fill="#666">覆盖面</text>
  <text x="310" y="202" text-anchor="end" font-size="11" font-weight="bold" fill="#F57C00">中</text>

  <text x="50" y="229" font-size="11" fill="#666">可靠性</text>
  <text x="310" y="229" text-anchor="end" font-size="11" font-weight="bold" fill="#1976D2">高</text>

  <text x="50" y="256" font-size="11" fill="#666">单次成本</text>
  <text x="310" y="256" text-anchor="end" font-size="11" font-weight="bold" fill="#1976D2">低</text>

  <text x="50" y="283" font-size="11" fill="#666">前提</text>
  <text x="310" y="283" text-anchor="end" font-size="10" fill="#333">有 API / MCP Server</text>

  <line x1="50" y1="305" x2="310" y2="305" stroke="#90CAF9" stroke-width="1"/>
  <text x="180" y="330" text-anchor="middle" font-size="11" fill="#1565C0" font-weight="600">有结构化接口时首选</text>

  <!-- Right: Computer Use -->
  <rect x="370" y="60" width="300" height="290" rx="8" fill="#FFF3E0" stroke="#F57C00" stroke-width="1.5"/>
  <text x="520" y="88" text-anchor="middle" font-size="14" font-weight="bold" fill="#E65100">Computer Use</text>
  <text x="520" y="108" text-anchor="middle" font-size="11" font-style="italic" fill="#F57C00">万能螺丝刀</text>
  <line x1="390" y1="120" x2="650" y2="120" stroke="#FFB74D" stroke-width="1"/>

  <text x="390" y="148" font-size="11" fill="#666">精度</text>
  <text x="650" y="148" text-anchor="end" font-size="11" font-weight="bold" fill="#F57C00">中</text>

  <text x="390" y="175" font-size="11" fill="#666">速度</text>
  <text x="650" y="175" text-anchor="end" font-size="11" font-weight="bold" fill="#C62828">慢</text>

  <text x="390" y="202" font-size="11" fill="#666">覆盖面</text>
  <text x="650" y="202" text-anchor="end" font-size="11" font-weight="bold" fill="#2E7D32">最广</text>

  <text x="390" y="229" font-size="11" fill="#666">可靠性</text>
  <text x="650" y="229" text-anchor="end" font-size="11" font-weight="bold" fill="#F57C00">中低</text>

  <text x="390" y="256" font-size="11" fill="#666">单次成本</text>
  <text x="650" y="256" text-anchor="end" font-size="11" font-weight="bold" fill="#C62828">100-1000x</text>

  <text x="390" y="283" font-size="11" fill="#666">前提</text>
  <text x="650" y="283" text-anchor="end" font-size="10" fill="#333">只需 GUI</text>

  <line x1="390" y1="305" x2="650" y2="305" stroke="#FFB74D" stroke-width="1"/>
  <text x="520" y="330" text-anchor="middle" font-size="11" fill="#E65100" font-weight="600">无 API 时的兜底方案</text>
</svg>
