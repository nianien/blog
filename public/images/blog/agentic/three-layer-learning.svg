<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 340" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif">
  <rect width="700" height="340" rx="12" fill="#fafafa" stroke="#e0e0e0" stroke-width="1.5"/>
  <text x="350" y="32" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">三层学习：按时间尺度划分</text>
  <text x="350" y="52" text-anchor="middle" font-size="11" fill="#666">越上层持久性越强、风险越高</text>

  <!-- L1 -->
  <rect x="40" y="80" width="620" height="70" rx="8" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="60" y="108" font-size="14" font-weight="bold" fill="#1B5E20">L1 会话级适应</text>
  <text x="60" y="130" font-size="11" fill="#2E7D32">In-context Learning · 会话结束即消失 · 免费、无需基础设施</text>
  <text x="640" y="108" text-anchor="end" font-size="12" font-weight="bold" fill="#2E7D32">秒级</text>
  <text x="640" y="130" text-anchor="end" font-size="10" fill="#2E7D32">风险：低</text>

  <!-- L2 -->
  <rect x="40" y="160" width="620" height="70" rx="8" fill="#FFF3E0" stroke="#E65100" stroke-width="1.5"/>
  <text x="60" y="188" font-size="14" font-weight="bold" fill="#BF360C">L2 跨会话记忆沉淀</text>
  <text x="60" y="210" font-size="11" fill="#E65100">经验存储与检索 · 持久化存储 · 需要质量控制</text>
  <text x="640" y="188" text-anchor="end" font-size="12" font-weight="bold" fill="#E65100">天级</text>
  <text x="640" y="210" text-anchor="end" font-size="10" fill="#E65100">风险：中</text>

  <!-- L3 -->
  <rect x="40" y="240" width="620" height="70" rx="8" fill="#FFEBEE" stroke="#C62828" stroke-width="1.5"/>
  <text x="60" y="268" font-size="14" font-weight="bold" fill="#B71C1C">L3 行为策略进化</text>
  <text x="60" y="290" font-size="11" fill="#C62828">Prompt/策略自动优化 · 写入系统配置 · 必须有评估体系兜底</text>
  <text x="640" y="268" text-anchor="end" font-size="12" font-weight="bold" fill="#C62828">周/月级</text>
  <text x="640" y="290" text-anchor="end" font-size="10" fill="#C62828">风险：高</text>
</svg>
