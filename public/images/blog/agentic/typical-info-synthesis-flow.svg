<svg viewBox="0 0 920 720" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="13">
  <!-- 入口 -->
  <rect x="385" y="20" width="140" height="40" rx="8" fill="#E0E7FF" stroke="#4F46E5" stroke-width="1.5"/>
  <text x="455" y="44" text-anchor="middle" fill="#1E1B4B">入口</text>

  <!-- 箭头 入口→Router -->
  <line x1="455" y1="60" x2="455" y2="90" stroke="#4F46E5" stroke-width="1.5"/>
  <polygon points="448,88 462,88 455,98" fill="#4F46E5"/>

  <!-- Router -->
  <rect x="370" y="100" width="170" height="50" rx="8" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="455" y="120" text-anchor="middle" fill="#0C4A6E" font-weight="600">Router</text>
  <text x="455" y="138" text-anchor="middle" fill="#0C4A6E" font-size="11">分流：qa_simple / rag / agent_full</text>

  <!-- 分支：qa_simple → 直接小模型 -->
  <line x1="540" y1="125" x2="700" y2="125" stroke="#3B82F6" stroke-width="1.5"/>
  <polygon points="698,118 708,125 698,132" fill="#3B82F6"/>
  <text x="620" y="118" text-anchor="middle" fill="#0C4A6E" font-size="11">qa_simple</text>
  <rect x="710" y="105" width="170" height="40" rx="8" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="795" y="130" text-anchor="middle" fill="#78350F">小模型直答 → 结束</text>

  <!-- 主流 Router→拆解 -->
  <line x1="455" y1="150" x2="455" y2="180" stroke="#3B82F6" stroke-width="1.5"/>
  <polygon points="448,178 462,178 455,188" fill="#3B82F6"/>
  <text x="475" y="170" fill="#0C4A6E" font-size="11">rag / agent_full</text>

  <!-- 长查询拆解 -->
  <rect x="350" y="190" width="210" height="50" rx="8" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="455" y="210" text-anchor="middle" fill="#0C4A6E" font-weight="600">长查询拆解（LLM）</text>
  <text x="455" y="228" text-anchor="middle" fill="#0C4A6E" font-size="11">subqueries = [q1, q2, q3]</text>

  <line x1="455" y1="240" x2="455" y2="270" stroke="#3B82F6" stroke-width="1.5"/>
  <polygon points="448,268 462,268 455,278" fill="#3B82F6"/>

  <!-- Fan-out 容器 -->
  <rect x="80" y="280" width="750" height="120" rx="10" fill="#F0FDF4" stroke="#22C55E" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="455" y="298" text-anchor="middle" fill="#14532D" font-weight="600">Fan-out 并行（gather）</text>

  <!-- q1 → RAG -->
  <rect x="120" y="320" width="200" height="60" rx="8" fill="#DCFCE7" stroke="#22C55E" stroke-width="1.5"/>
  <text x="220" y="345" text-anchor="middle" fill="#14532D">q1 → RAG 检索</text>
  <text x="220" y="365" text-anchor="middle" fill="#14532D" font-size="11">向量库 + Reranker</text>

  <!-- q2 → 工具调用 -->
  <rect x="355" y="320" width="200" height="60" rx="8" fill="#DCFCE7" stroke="#22C55E" stroke-width="1.5"/>
  <text x="455" y="345" text-anchor="middle" fill="#14532D">q2 → 工具调用</text>
  <text x="455" y="365" text-anchor="middle" fill="#14532D" font-size="11">业务 API / 计算工具</text>

  <!-- q3 → 网页搜索 -->
  <rect x="590" y="320" width="200" height="60" rx="8" fill="#DCFCE7" stroke="#22C55E" stroke-width="1.5"/>
  <text x="690" y="345" text-anchor="middle" fill="#14532D">q3 → 网页搜索</text>
  <text x="690" y="365" text-anchor="middle" fill="#14532D" font-size="11">实时检索接口</text>

  <!-- 汇聚 -->
  <line x1="220" y1="400" x2="220" y2="420" stroke="#22C55E" stroke-width="1.5"/>
  <line x1="455" y1="400" x2="455" y2="420" stroke="#22C55E" stroke-width="1.5"/>
  <line x1="690" y1="400" x2="690" y2="420" stroke="#22C55E" stroke-width="1.5"/>
  <line x1="220" y1="420" x2="690" y2="420" stroke="#22C55E" stroke-width="1.5"/>
  <line x1="455" y1="420" x2="455" y2="440" stroke="#22C55E" stroke-width="1.5"/>
  <polygon points="448,438 462,438 455,448" fill="#22C55E"/>

  <!-- Map-Reduce -->
  <rect x="335" y="450" width="240" height="50" rx="8" fill="#FEE2E2" stroke="#EF4444" stroke-width="1.5"/>
  <text x="455" y="470" text-anchor="middle" fill="#7F1D1D" font-weight="600">Map-Reduce 提取</text>
  <text x="455" y="488" text-anchor="middle" fill="#7F1D1D" font-size="11">每个结果 LLM 提炼 → 合并</text>

  <line x1="455" y1="500" x2="455" y2="530" stroke="#EF4444" stroke-width="1.5"/>
  <polygon points="448,528 462,528 455,538" fill="#EF4444"/>

  <!-- Chain -->
  <rect x="335" y="540" width="240" height="50" rx="8" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="455" y="560" text-anchor="middle" fill="#78350F" font-weight="600">Chain 顺序加工</text>
  <text x="455" y="578" text-anchor="middle" fill="#78350F" font-size="11">综合 → 摘要 → 格式化</text>

  <line x1="455" y1="590" x2="455" y2="620" stroke="#F59E0B" stroke-width="1.5"/>
  <polygon points="448,618 462,618 455,628" fill="#F59E0B"/>

  <!-- Reflector -->
  <rect x="335" y="630" width="240" height="50" rx="8" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="1.5"/>
  <text x="455" y="650" text-anchor="middle" fill="#4C1D95" font-weight="600">Reflector 校验</text>
  <text x="455" y="668" text-anchor="middle" fill="#4C1D95" font-size="11">confidence 低 → Replan 回 Router</text>

  <!-- Replan 回路 -->
  <path d="M 335 655 Q 80 655 80 125 Q 80 80 370 125" fill="none" stroke="#8B5CF6" stroke-width="1.5" stroke-dasharray="6 4"/>
  <polygon points="365,118 375,125 365,132" fill="#8B5CF6"/>
  <text x="60" y="385" fill="#4C1D95" font-size="11" transform="rotate(-90 60 385)">Replan 回路</text>

  <!-- 出口 -->
  <line x1="575" y1="655" x2="700" y2="655" stroke="#8B5CF6" stroke-width="1.5"/>
  <polygon points="698,648 708,655 698,662" fill="#8B5CF6"/>
  <text x="638" y="648" text-anchor="middle" fill="#4C1D95" font-size="11">confidence 高</text>
  <rect x="710" y="635" width="170" height="40" rx="8" fill="#E0E7FF" stroke="#4F46E5" stroke-width="1.5"/>
  <text x="795" y="660" text-anchor="middle" fill="#1E1B4B">返回用户</text>
</svg>
