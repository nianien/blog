<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif">
  <rect width="900" height="420" fill="#FAFAFA" rx="8"/>
  <text x="450" y="32" text-anchor="middle" font-size="16" font-weight="bold" fill="#1E293B">三级审核与风控体系</text>

  <!-- 内容输入 -->
  <rect x="370" y="55" width="160" height="40" rx="6" fill="#F1F5F9" stroke="#94A3B8" stroke-width="1.5"/>
  <text x="450" y="79" text-anchor="middle" font-size="12" fill="#475569">用户提交内容</text>

  <line x1="450" y1="95" x2="450" y2="120" stroke="#94A3B8" stroke-width="1.5"/>
  <polygon points="450,128 445,120 455,120" fill="#94A3B8"/>

  <!-- 第一级：机器审核 -->
  <rect x="120" y="130" width="660" height="90" rx="8" fill="#FEE2E2" stroke="#EF4444" stroke-width="1.5" opacity="0.3"/>
  <text x="140" y="152" font-size="13" font-weight="bold" fill="#991B1B">一级：机器审核（实时，&lt; 5s）</text>

  <rect x="140" y="165" width="120" height="40" rx="6" fill="#FEF2F2" stroke="#EF4444" stroke-width="1.5"/>
  <text x="200" y="183" text-anchor="middle" font-size="11" fill="#991B1B">敏感词过滤</text>
  <text x="200" y="198" text-anchor="middle" font-size="10" fill="#DC2626">正则 + Trie 树</text>

  <rect x="275" y="165" width="120" height="40" rx="6" fill="#FEF2F2" stroke="#EF4444" stroke-width="1.5"/>
  <text x="335" y="183" text-anchor="middle" font-size="11" fill="#991B1B">NLP 语义审核</text>
  <text x="335" y="198" text-anchor="middle" font-size="10" fill="#DC2626">涉政/低俗/广告</text>

  <rect x="410" y="165" width="120" height="40" rx="6" fill="#FEF2F2" stroke="#EF4444" stroke-width="1.5"/>
  <text x="470" y="183" text-anchor="middle" font-size="11" fill="#991B1B">图片 CV</text>
  <text x="470" y="198" text-anchor="middle" font-size="10" fill="#DC2626">鉴黄/暴力/水印</text>

  <rect x="545" y="165" width="120" height="40" rx="6" fill="#FEF2F2" stroke="#EF4444" stroke-width="1.5"/>
  <text x="605" y="183" text-anchor="middle" font-size="11" fill="#991B1B">视频审核</text>
  <text x="605" y="198" text-anchor="middle" font-size="10" fill="#DC2626">关键帧 + ASR</text>

  <!-- 分流 -->
  <line x1="300" y1="220" x2="300" y2="248" stroke="#94A3B8" stroke-width="1.5"/>
  <polygon points="300,256 295,248 305,248" fill="#94A3B8"/>
  <line x1="600" y1="220" x2="600" y2="248" stroke="#94A3B8" stroke-width="1.5"/>
  <polygon points="600,256 595,248 605,248" fill="#94A3B8"/>

  <text x="200" y="248" font-size="11" fill="#10B981">通过 (85%)</text>
  <text x="520" y="248" font-size="11" fill="#F59E0B">疑似 (10%)</text>
  <text x="700" y="248" font-size="11" fill="#EF4444">拒绝 (5%)</text>

  <line x1="750" y1="220" x2="750" y2="248" stroke="#EF4444" stroke-width="1.5"/>
  <polygon points="750,256 745,248 755,248" fill="#EF4444"/>
  <rect x="700" y="258" width="100" height="34" rx="6" fill="#FEE2E2" stroke="#EF4444" stroke-width="1.5"/>
  <text x="750" y="279" text-anchor="middle" font-size="11" fill="#991B1B">直接拒绝</text>

  <!-- 第二级：人工复审 -->
  <rect x="120" y="260" width="360" height="70" rx="8" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5" opacity="0.3"/>
  <text x="140" y="282" font-size="13" font-weight="bold" fill="#92400E">二级：人工复审（&lt; 30min）</text>
  <rect x="140" y="295" width="150" height="26" rx="6" fill="#FFFBEB" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="215" y="312" text-anchor="middle" font-size="11" fill="#92400E">审核员标注队列</text>
  <rect x="310" y="295" width="150" height="26" rx="6" fill="#FFFBEB" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="385" y="312" text-anchor="middle" font-size="11" fill="#92400E">LLM Agent 辅助</text>

  <!-- 通过的内容 -->
  <rect x="140" y="258" width="100" height="34" rx="6" fill="#D1FAE5" stroke="#10B981" stroke-width="1.5"/>
  <text x="190" y="275" text-anchor="middle" font-size="11" fill="#065F46">内容上线</text>

  <!-- 第三级 -->
  <rect x="120" y="350" width="660" height="55" rx="8" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5" opacity="0.3"/>
  <text x="140" y="372" font-size="13" font-weight="bold" fill="#1E40AF">三级：事后巡查</text>
  <rect x="300" y="365" width="110" height="28" rx="6" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="355" y="383" text-anchor="middle" font-size="11" fill="#1E40AF">用户举报</text>
  <rect x="430" y="365" width="110" height="28" rx="6" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="485" y="383" text-anchor="middle" font-size="11" fill="#1E40AF">定期巡查</text>
  <rect x="560" y="365" width="140" height="28" rx="6" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="630" y="383" text-anchor="middle" font-size="11" fill="#1E40AF">水军/刷量检测</text>

  <!-- 连线到三级 -->
  <line x1="300" y1="330" x2="300" y2="350" stroke="#94A3B8" stroke-width="1.5"/>
  <polygon points="300,350 295,342 305,342" fill="#94A3B8"/>
</svg>
