<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 460" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif">
  <text x="500" y="36" text-anchor="middle" font-size="18" font-weight="600" fill="#1F2937">一站式服务阶梯：按站点状态进入，沿阶梯升单</text>

  <!-- 升单方向 arrow on top -->
  <line x1="200" y1="80" x2="850" y2="80" stroke="#6B7280" stroke-width="1.5"/>
  <polygon points="860,80 848,74 848,86" fill="#6B7280"/>
  <text x="525" y="72" text-anchor="middle" font-size="13" fill="#6B7280">升单方向（客单价 / NRR 抬升）</text>

  <!-- Step 1: 建站 -->
  <rect x="155" y="320" width="130" height="80" rx="8" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="220" y="350" text-anchor="middle" font-size="15" font-weight="600" fill="#1E3A8A">① 建站</text>
  <text x="220" y="374" text-anchor="middle" font-size="12" fill="#1E3A8A">站点载体</text>

  <!-- Step 2: 内容运营 -->
  <rect x="305" y="275" width="130" height="80" rx="8" fill="#DCFCE7" stroke="#22C55E" stroke-width="1.5"/>
  <text x="370" y="305" text-anchor="middle" font-size="15" font-weight="600" fill="#14532D">② 内容运营</text>
  <text x="370" y="329" text-anchor="middle" font-size="12" fill="#14532D">持续经营内容</text>

  <!-- Step 3: 营销传播 -->
  <rect x="455" y="230" width="130" height="80" rx="8" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="520" y="260" text-anchor="middle" font-size="15" font-weight="600" fill="#78350F">③ 营销传播</text>
  <text x="520" y="284" text-anchor="middle" font-size="12" fill="#78350F">多渠道引流</text>

  <!-- Step 4: 承接转化 -->
  <rect x="605" y="185" width="130" height="80" rx="8" fill="#FEE2E2" stroke="#EF4444" stroke-width="1.5"/>
  <text x="670" y="215" text-anchor="middle" font-size="15" font-weight="600" fill="#7F1D1D">④ 承接转化</text>
  <text x="670" y="239" text-anchor="middle" font-size="12" fill="#7F1D1D">落地与询盘</text>

  <!-- Step 5: CRM 经营 -->
  <rect x="755" y="140" width="130" height="80" rx="8" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="1.5"/>
  <text x="820" y="170" text-anchor="middle" font-size="15" font-weight="600" fill="#4C1D95">⑤ CRM 经营</text>
  <text x="820" y="194" text-anchor="middle" font-size="12" fill="#4C1D95">成交→复购</text>

  <!-- 无站点客户 entry -->
  <text x="40" y="365" font-size="13" fill="#1F2937" font-weight="500">无站点</text>
  <text x="40" y="382" font-size="13" fill="#1F2937" font-weight="500">客户</text>
  <line x1="100" y1="360" x2="150" y2="360" stroke="#3B82F6" stroke-width="1.5"/>
  <polygon points="156,360 144,354 144,366" fill="#3B82F6"/>

  <!-- 有站点客户 entry -->
  <text x="40" y="305" font-size="13" fill="#1F2937" font-weight="500">有站点</text>
  <text x="40" y="322" font-size="13" fill="#1F2937" font-weight="500">客户</text>
  <line x1="100" y1="315" x2="300" y2="315" stroke="#22C55E" stroke-width="1.5" stroke-dasharray="4 3"/>
  <polygon points="306,315 294,309 294,321" fill="#22C55E"/>

  <!-- 底部注释 -->
  <text x="500" y="438" text-anchor="middle" font-size="12" fill="#6B7280">注：阶梯不必走全程，按客群组合（小微/中腰部/KA）选择起点与终点</text>
</svg>
