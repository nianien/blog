<svg viewBox="0 0 780 380" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif">
  <rect width="780" height="380" fill="#F8FAFC" rx="8"/>
  <text x="390" y="28" text-anchor="middle" font-size="14" font-weight="600" fill="#1E293B">内容类型 × CDN 策略矩阵</text>

  <!-- Header row -->
  <rect x="20" y="45" width="180" height="38" rx="4" fill="#E2E8F0"/>
  <text x="110" y="69" text-anchor="middle" font-size="11" font-weight="600" fill="#475569">内容类型</text>

  <rect x="210" y="45" width="130" height="38" rx="4" fill="#DBEAFE"/>
  <text x="275" y="64" text-anchor="middle" font-size="11" font-weight="600" fill="#1E40AF">是否缓存</text>
  <text x="275" y="77" text-anchor="middle" font-size="10" fill="#1E40AF">（命中率目标）</text>

  <rect x="350" y="45" width="130" height="38" rx="4" fill="#D1FAE5"/>
  <text x="415" y="64" text-anchor="middle" font-size="11" font-weight="600" fill="#065F46">推荐 TTL</text>
  <text x="415" y="77" text-anchor="middle" font-size="10" fill="#065F46">（缓存时长）</text>

  <rect x="490" y="45" width="130" height="38" rx="4" fill="#FEF3C7"/>
  <text x="555" y="64" text-anchor="middle" font-size="11" font-weight="600" fill="#92400E">更新策略</text>
  <text x="555" y="77" text-anchor="middle" font-size="10" fill="#92400E">（内容更新方式）</text>

  <rect x="630" y="45" width="130" height="38" rx="4" fill="#EDE9FE"/>
  <text x="695" y="64" text-anchor="middle" font-size="11" font-weight="600" fill="#4C1D95">加速类型</text>
  <text x="695" y="77" text-anchor="middle" font-size="10" fill="#4C1D95">（静态/动态）</text>

  <!-- Row 1: JS/CSS/图片 -->
  <rect x="20" y="93" width="180" height="42" rx="4" fill="#F1F5F9" stroke="#E2E8F0" stroke-width="1"/>
  <text x="110" y="111" text-anchor="middle" font-size="11" font-weight="600" fill="#334155">JS / CSS / 图片</text>
  <text x="110" y="126" text-anchor="middle" font-size="10" fill="#64748B">前端静态资源</text>

  <rect x="210" y="93" width="130" height="42" rx="4" fill="#DCFCE7" stroke="#86EFAC" stroke-width="1"/>
  <text x="275" y="111" text-anchor="middle" font-size="11" font-weight="600" fill="#15803D">是 ✓</text>
  <text x="275" y="126" text-anchor="middle" font-size="10" fill="#15803D">目标 > 98%</text>

  <rect x="350" y="93" width="130" height="42" rx="4" fill="#F0FDF4" stroke="#86EFAC" stroke-width="1"/>
  <text x="415" y="111" text-anchor="middle" font-size="11" fill="#166534">1 年</text>
  <text x="415" y="126" text-anchor="middle" font-size="10" fill="#166534">immutable</text>

  <rect x="490" y="93" width="130" height="42" rx="4" fill="#FFF7ED" stroke="#FCD34D" stroke-width="1"/>
  <text x="555" y="111" text-anchor="middle" font-size="11" fill="#92400E">版本化 URL</text>
  <text x="555" y="126" text-anchor="middle" font-size="10" fill="#92400E">app.{hash}.js</text>

  <rect x="630" y="93" width="130" height="42" rx="4" fill="#F5F3FF" stroke="#C4B5FD" stroke-width="1"/>
  <text x="695" y="115" text-anchor="middle" font-size="11" fill="#5B21B6">静态加速</text>

  <!-- Row 2: HTML页面 -->
  <rect x="20" y="145" width="180" height="42" rx="4" fill="#F1F5F9" stroke="#E2E8F0" stroke-width="1"/>
  <text x="110" y="163" text-anchor="middle" font-size="11" font-weight="600" fill="#334155">HTML 页面</text>
  <text x="110" y="178" text-anchor="middle" font-size="10" fill="#64748B">非个性化落地页</text>

  <rect x="210" y="145" width="130" height="42" rx="4" fill="#DCFCE7" stroke="#86EFAC" stroke-width="1"/>
  <text x="275" y="163" text-anchor="middle" font-size="11" font-weight="600" fill="#15803D">是 ✓</text>
  <text x="275" y="178" text-anchor="middle" font-size="10" fill="#15803D">目标 > 90%</text>

  <rect x="350" y="145" width="130" height="42" rx="4" fill="#F0FDF4" stroke="#86EFAC" stroke-width="1"/>
  <text x="415" y="163" text-anchor="middle" font-size="11" fill="#166534">5 min ~ 1 h</text>
  <text x="415" y="178" text-anchor="middle" font-size="10" fill="#166534">按更新频率定</text>

  <rect x="490" y="145" width="130" height="42" rx="4" fill="#FFF7ED" stroke="#FCD34D" stroke-width="1"/>
  <text x="555" y="163" text-anchor="middle" font-size="11" fill="#92400E">主动 Purge</text>
  <text x="555" y="178" text-anchor="middle" font-size="10" fill="#92400E">发布时触发</text>

  <rect x="630" y="145" width="130" height="42" rx="4" fill="#F5F3FF" stroke="#C4B5FD" stroke-width="1"/>
  <text x="695" y="167" text-anchor="middle" font-size="11" fill="#5B21B6">静态加速</text>

  <!-- Row 3: 视频/大文件 -->
  <rect x="20" y="197" width="180" height="42" rx="4" fill="#F1F5F9" stroke="#E2E8F0" stroke-width="1"/>
  <text x="110" y="215" text-anchor="middle" font-size="11" font-weight="600" fill="#334155">视频 / 大文件</text>
  <text x="110" y="230" text-anchor="middle" font-size="10" fill="#64748B">点播、安装包</text>

  <rect x="210" y="197" width="130" height="42" rx="4" fill="#DCFCE7" stroke="#86EFAC" stroke-width="1"/>
  <text x="275" y="215" text-anchor="middle" font-size="11" font-weight="600" fill="#15803D">是 ✓</text>
  <text x="275" y="230" text-anchor="middle" font-size="10" fill="#15803D">目标 > 95%</text>

  <rect x="350" y="197" width="130" height="42" rx="4" fill="#F0FDF4" stroke="#86EFAC" stroke-width="1"/>
  <text x="415" y="215" text-anchor="middle" font-size="11" fill="#166534">7 天 ~ 永久</text>
  <text x="415" y="230" text-anchor="middle" font-size="10" fill="#166534">按版本管理</text>

  <rect x="490" y="197" width="130" height="42" rx="4" fill="#FFF7ED" stroke="#FCD34D" stroke-width="1"/>
  <text x="555" y="215" text-anchor="middle" font-size="11" fill="#92400E">版本化路径</text>
  <text x="555" y="230" text-anchor="middle" font-size="10" fill="#92400E">/v2/video.mp4</text>

  <rect x="630" y="197" width="130" height="42" rx="4" fill="#F5F3FF" stroke="#C4B5FD" stroke-width="1"/>
  <text x="695" y="209" text-anchor="middle" font-size="11" fill="#5B21B6">静态加速</text>
  <text x="695" y="224" text-anchor="middle" font-size="10" fill="#5B21B6">+ 视频专线</text>
  <text x="695" y="237" text-anchor="middle" font-size="10" fill="#5B21B6">可选 Range 加速</text>

  <!-- Row 4: API接口 -->
  <rect x="20" y="249" width="180" height="42" rx="4" fill="#F1F5F9" stroke="#E2E8F0" stroke-width="1"/>
  <text x="110" y="267" text-anchor="middle" font-size="11" font-weight="600" fill="#334155">API 接口</text>
  <text x="110" y="282" text-anchor="middle" font-size="10" fill="#64748B">非个性化查询</text>

  <rect x="210" y="249" width="130" height="42" rx="4" fill="#FEF9C3" stroke="#FCD34D" stroke-width="1"/>
  <text x="275" y="267" text-anchor="middle" font-size="11" font-weight="600" fill="#854D0E">谨慎 ⚠</text>
  <text x="275" y="282" text-anchor="middle" font-size="10" fill="#854D0E">按场景判断</text>

  <rect x="350" y="249" width="130" height="42" rx="4" fill="#FFFBEB" stroke="#FCD34D" stroke-width="1"/>
  <text x="415" y="267" text-anchor="middle" font-size="11" fill="#92400E">10s ~ 5 min</text>
  <text x="415" y="282" text-anchor="middle" font-size="10" fill="#92400E">短 TTL + swr</text>

  <rect x="490" y="249" width="130" height="42" rx="4" fill="#FFF7ED" stroke="#FCD34D" stroke-width="1"/>
  <text x="555" y="267" text-anchor="middle" font-size="11" fill="#92400E">按需 Purge</text>
  <text x="555" y="282" text-anchor="middle" font-size="10" fill="#92400E">或短 TTL 自然过期</text>

  <rect x="630" y="249" width="130" height="42" rx="4" fill="#FFF1F2" stroke="#FDA4AF" stroke-width="1"/>
  <text x="695" y="267" text-anchor="middle" font-size="11" fill="#9F1239">动态加速</text>
  <text x="695" y="282" text-anchor="middle" font-size="10" fill="#9F1239">（不缓存，优化路由）</text>

  <!-- Row 5: 个性化内容 -->
  <rect x="20" y="301" width="180" height="42" rx="4" fill="#F1F5F9" stroke="#E2E8F0" stroke-width="1"/>
  <text x="110" y="319" text-anchor="middle" font-size="11" font-weight="600" fill="#334155">个性化内容</text>
  <text x="110" y="334" text-anchor="middle" font-size="10" fill="#64748B">用户数据、推荐流</text>

  <rect x="210" y="301" width="130" height="42" rx="4" fill="#FEE2E2" stroke="#FCA5A5" stroke-width="1"/>
  <text x="275" y="319" text-anchor="middle" font-size="11" font-weight="600" fill="#991B1B">否 ✗</text>
  <text x="275" y="334" text-anchor="middle" font-size="10" fill="#991B1B">绕过 CDN</text>

  <rect x="350" y="301" width="130" height="42" rx="4" fill="#FEF2F2" stroke="#FCA5A5" stroke-width="1"/>
  <text x="415" y="319" text-anchor="middle" font-size="11" fill="#991B1B">no-store</text>
  <text x="415" y="334" text-anchor="middle" font-size="10" fill="#991B1B">禁止缓存</text>

  <rect x="490" y="301" width="130" height="42" rx="4" fill="#FEF2F2" stroke="#FCA5A5" stroke-width="1"/>
  <text x="555" y="319" text-anchor="middle" font-size="11" fill="#991B1B">—</text>

  <rect x="630" y="301" width="130" height="42" rx="4" fill="#FFF1F2" stroke="#FDA4AF" stroke-width="1"/>
  <text x="695" y="319" text-anchor="middle" font-size="11" fill="#9F1239">动态加速</text>
  <text x="695" y="334" text-anchor="middle" font-size="10" fill="#9F1239">（可选，看延迟需求）</text>
</svg>
