<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 370">
  <!-- Step 1: BRMS 保存规则 -->
  <rect x="140" y="5" width="200" height="30" fill="#8b5cf6" stroke="#6d28d9" stroke-width="1.5" rx="15"/>
  <text x="240" y="25" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">BRMS 保存规则</text>

  <line x1="240" y1="35" x2="240" y2="52" stroke="#6b7280" stroke-width="1.5"/>
  <polygon points="236,49 240,57 244,49" fill="#6b7280"/>

  <!-- Step 2: 发布消息 -->
  <rect x="60" y="57" width="360" height="38" fill="#fef3c7" stroke="#fbbf24" stroke-width="1.5" rx="6"/>
  <text x="240" y="73" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="10" font-weight="bold" fill="#92400e" text-anchor="middle">发布消息到 RocketMQ（广播模式）</text>
  <text x="240" y="88" font-family="'SF Mono', 'Menlo', monospace" font-size="8" fill="#b45309" text-anchor="middle">ad_infra_mousika_rule_info_notify_topic</text>

  <line x1="240" y1="95" x2="240" y2="112" stroke="#6b7280" stroke-width="1.5"/>
  <polygon points="236,109 240,117 244,109" fill="#6b7280"/>

  <!-- Step 3: Consumer -->
  <rect x="80" y="117" width="320" height="38" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5" rx="6"/>
  <text x="240" y="133" font-family="'SF Mono', 'Menlo', monospace" font-size="10" font-weight="bold" fill="#1e40af" text-anchor="middle">AbstractNotifyConsumer</text>
  <text x="240" y="148" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="9" fill="#3b82f6" text-anchor="middle">提取变更的 sceneKey，放入内部队列</text>

  <line x1="240" y1="155" x2="240" y2="172" stroke="#6b7280" stroke-width="1.5"/>
  <polygon points="236,169 240,177 244,169" fill="#6b7280"/>

  <!-- Step 4: 定时批量处理 -->
  <rect x="100" y="177" width="280" height="30" fill="#e0f2fe" stroke="#7dd3fc" stroke-width="1.5" rx="6"/>
  <text x="240" y="197" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="10" fill="#0369a1" text-anchor="middle">定时调度器批量处理队列中的变更</text>

  <line x1="240" y1="207" x2="240" y2="224" stroke="#6b7280" stroke-width="1.5"/>
  <polygon points="236,221 240,229 244,221" fill="#6b7280"/>

  <!-- Step 5: loadSuite -->
  <rect x="100" y="229" width="280" height="38" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5" rx="6"/>
  <text x="240" y="245" font-family="'SF Mono', 'Menlo', monospace" font-size="10" font-weight="bold" fill="#1e40af" text-anchor="middle">RuleLoader.loadSuite()</text>
  <text x="240" y="260" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="9" fill="#3b82f6" text-anchor="middle">从数据库 / 中心服务重新加载所有规则</text>

  <line x1="240" y1="267" x2="240" y2="284" stroke="#6b7280" stroke-width="1.5"/>
  <polygon points="236,281 240,289 244,281" fill="#6b7280"/>

  <!-- Step 6: 构造新实例 -->
  <rect x="80" y="289" width="320" height="30" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="1.5" rx="6"/>
  <text x="240" y="309" font-family="'SF Mono', 'Menlo', monospace" font-size="10" fill="#047857" text-anchor="middle">new RuleSuite(definitions, udfs, scenes)</text>

  <line x1="240" y1="319" x2="240" y2="336" stroke="#6b7280" stroke-width="1.5"/>
  <polygon points="236,333 240,341 244,333" fill="#6b7280"/>

  <!-- Step 7: volatile 替换 -->
  <rect x="90" y="341" width="300" height="26" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5" rx="13"/>
  <text x="240" y="359" font-family="'SF Mono', 'Menlo', monospace" font-size="11" font-weight="bold" fill="#166534" text-anchor="middle">RuleSuite.current = newSuite (volatile)</text>
</svg>