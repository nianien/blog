<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 300">
  <!-- Title -->
  <rect x="245" y="5" width="150" height="26" fill="#475569" rx="13"/>
  <text x="320" y="23" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">数据流闭环</text>

  <!-- Phase 1: 配置阶段 -->
  <rect x="15" y="42" width="610" height="52" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5" rx="8"/>
  <rect x="25" y="50" width="80" height="20" fill="#3b82f6" rx="10"/>
  <text x="65" y="64" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="10" font-weight="bold" fill="white" text-anchor="middle">配置阶段</text>

  <rect x="115" y="50" width="90" height="34" fill="#dbeafe" stroke="#3b82f6" stroke-width="1" rx="4"/>
  <text x="160" y="72" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="10" fill="#1e40af" text-anchor="middle">画布编排</text>

  <line x1="205" y1="67" x2="223" y2="67" stroke="#3b82f6" stroke-width="1.5"/>
  <polygon points="220,63 228,67 220,71" fill="#3b82f6"/>

  <rect x="228" y="50" width="120" height="34" fill="#dbeafe" stroke="#3b82f6" stroke-width="1" rx="4"/>
  <text x="288" y="65" font-family="'SF Mono', 'Menlo', monospace" font-size="9" fill="#1e40af" text-anchor="middle">GraphNodeV2</text>
  <text x="288" y="78" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="8" fill="#3b82f6" text-anchor="middle">JSON</text>

  <line x1="348" y1="67" x2="366" y2="67" stroke="#3b82f6" stroke-width="1.5"/>
  <polygon points="363,63 371,67 363,71" fill="#3b82f6"/>

  <rect x="371" y="50" width="90" height="34" fill="#dbeafe" stroke="#3b82f6" stroke-width="1" rx="4"/>
  <text x="416" y="72" font-family="'SF Mono', 'Menlo', monospace" font-size="10" fill="#1e40af" text-anchor="middle">toRule()</text>

  <line x1="461" y1="67" x2="479" y2="67" stroke="#3b82f6" stroke-width="1.5"/>
  <polygon points="476,63 484,67 476,71" fill="#3b82f6"/>

  <rect x="484" y="50" width="130" height="34" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5" rx="6"/>
  <text x="549" y="72" font-family="'SF Mono', 'Menlo', monospace" font-size="11" font-weight="bold" fill="#1e40af" text-anchor="middle">AST</text>

  <!-- Phase 2: 执行阶段 -->
  <rect x="15" y="104" width="610" height="72" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="1.5" rx="8"/>
  <rect x="25" y="112" width="80" height="20" fill="#10b981" rx="10"/>
  <text x="65" y="126" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="10" font-weight="bold" fill="white" text-anchor="middle">执行阶段</text>

  <rect x="115" y="112" width="110" height="34" fill="#d1fae5" stroke="#10b981" stroke-width="1" rx="4"/>
  <text x="170" y="127" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="10" fill="#047857" text-anchor="middle">Fact + AST</text>
  <text x="170" y="140" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="8" fill="#059669" text-anchor="middle">输入</text>

  <line x1="225" y1="129" x2="243" y2="129" stroke="#10b981" stroke-width="1.5"/>
  <polygon points="240,125 248,129 240,133" fill="#10b981"/>

  <rect x="248" y="112" width="150" height="34" fill="#d1fae5" stroke="#10b981" stroke-width="1" rx="4"/>
  <text x="323" y="127" font-family="'SF Mono', 'Menlo', monospace" font-size="9" fill="#047857" text-anchor="middle">DefaultNodeVisitor</text>
  <text x="323" y="140" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="8" fill="#059669" text-anchor="middle">遍历执行</text>

  <line x1="398" y1="129" x2="416" y2="129" stroke="#10b981" stroke-width="1.5"/>
  <polygon points="413,125 421,129 413,133" fill="#10b981"/>

  <rect x="421" y="112" width="100" height="34" fill="#d1fae5" stroke="#10b981" stroke-width="1.5" rx="6"/>
  <text x="471" y="127" font-family="'SF Mono', 'Menlo', monospace" font-size="9" font-weight="bold" fill="#047857" text-anchor="middle">EvalNode</text>
  <text x="471" y="140" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="9" fill="#059669" text-anchor="middle">执行树</text>

  <!-- evalCache label -->
  <rect x="200" y="152" width="140" height="18" fill="#bbf7d0" stroke="#6ee7b7" stroke-width="1" rx="4"/>
  <text x="270" y="165" font-family="'SF Mono', 'Menlo', monospace" font-size="8" fill="#047857" text-anchor="middle">evalCache（幂等缓存）</text>

  <!-- Arrow from EvalNode to RuleResult -->
  <line x1="471" y1="146" x2="471" y2="152" stroke="#10b981" stroke-width="1"/>
  <rect x="421" y="152" width="100" height="18" fill="#bbf7d0" stroke="#6ee7b7" stroke-width="1" rx="4"/>
  <text x="471" y="165" font-family="'SF Mono', 'Menlo', monospace" font-size="8" fill="#047857" text-anchor="middle">→ RuleResult 结果树</text>

  <!-- Phase 3: 展示阶段 -->
  <rect x="15" y="186" width="610" height="108" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1.5" rx="8"/>
  <rect x="25" y="194" width="80" height="20" fill="#8b5cf6" rx="10"/>
  <text x="65" y="208" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="10" font-weight="bold" fill="white" text-anchor="middle">展示阶段</text>

  <rect x="115" y="194" width="90" height="34" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1" rx="4"/>
  <text x="160" y="216" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="10" fill="#6d28d9" text-anchor="middle">结果树</text>

  <line x1="205" y1="211" x2="223" y2="211" stroke="#8b5cf6" stroke-width="1.5"/>
  <polygon points="220,207 228,211 220,215" fill="#8b5cf6"/>

  <rect x="228" y="194" width="135" height="34" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1" rx="4"/>
  <text x="295" y="209" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="10" fill="#6d28d9" text-anchor="middle">叠加到流程图</text>
  <text x="295" y="222" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="8" fill="#7c3aed" text-anchor="middle">路径高亮 + 节点描述</text>

  <!-- Three output modes -->
  <line x1="295" y1="228" x2="295" y2="240" stroke="#8b5cf6" stroke-width="1"/>

  <rect x="30" y="245" width="175" height="34" fill="#ede9fe" stroke="#c4b5fd" stroke-width="1" rx="4"/>
  <text x="117" y="260" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="9" font-weight="bold" fill="#6d28d9" text-anchor="middle">树形归因</text>
  <text x="117" y="273" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="8" fill="#7c3aed" text-anchor="middle">递归展开完整决策路径</text>

  <line x1="117" y1="240" x2="117" y2="245" stroke="#c4b5fd" stroke-width="1"/>
  <line x1="117" y1="240" x2="295" y2="240" stroke="#c4b5fd" stroke-width="1"/>
  <line x1="295" y1="240" x2="505" y2="240" stroke="#c4b5fd" stroke-width="1"/>

  <rect x="222" y="245" width="175" height="34" fill="#ede9fe" stroke="#c4b5fd" stroke-width="1" rx="4"/>
  <text x="309" y="260" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="9" font-weight="bold" fill="#6d28d9" text-anchor="middle">列表归因</text>
  <text x="309" y="273" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="8" fill="#7c3aed" text-anchor="middle">叶子节点扁平化</text>

  <line x1="505" y1="240" x2="505" y2="245" stroke="#c4b5fd" stroke-width="1"/>

  <rect x="414" y="245" width="200" height="34" fill="#ede9fe" stroke="#c4b5fd" stroke-width="1" rx="4"/>
  <text x="514" y="260" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="9" font-weight="bold" fill="#6d28d9" text-anchor="middle">横向对比</text>
  <text x="514" y="273" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="8" fill="#7c3aed" text-anchor="middle">多版本验证 + Excel 导出</text>
</svg>