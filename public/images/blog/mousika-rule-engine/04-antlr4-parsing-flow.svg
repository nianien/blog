<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 290">
  <!-- Title -->
  <text x="360" y="18" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="13" font-weight="bold" fill="#1e293b" text-anchor="middle">ANTLR4 解析流程</text>

  <!-- Phase 1: ANTLR4 parsing pipeline -->
  <rect x="15" y="30" width="690" height="80" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5" rx="8"/>

  <!-- Input -->
  <rect x="30" y="42" width="105" height="42" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5" rx="6"/>
  <text x="82" y="60" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="10" font-weight="bold" fill="#1e40af" text-anchor="middle">输入字符串</text>
  <text x="82" y="76" font-family="'SF Mono', 'Menlo', monospace" font-size="9" fill="#3b82f6" text-anchor="middle">"1&amp;&amp;2?3:4"</text>

  <line x1="135" y1="63" x2="160" y2="63" stroke="#3b82f6" stroke-width="1.5"/>
  <polygon points="157,59 165,63 157,67" fill="#3b82f6"/>

  <!-- RuleLexer -->
  <rect x="165" y="42" width="105" height="42" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5" rx="6"/>
  <text x="217" y="60" font-family="'SF Mono', 'Menlo', monospace" font-size="10" font-weight="bold" fill="#1e40af" text-anchor="middle">RuleLexer</text>
  <text x="217" y="76" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="9" fill="#3b82f6" text-anchor="middle">词法分析</text>

  <line x1="270" y1="63" x2="295" y2="63" stroke="#3b82f6" stroke-width="1.5"/>
  <polygon points="292,59 300,63 292,67" fill="#3b82f6"/>

  <!-- Token Stream -->
  <rect x="300" y="42" width="115" height="42" fill="#e0f2fe" stroke="#7dd3fc" stroke-width="1.5" rx="6"/>
  <text x="357" y="60" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="10" font-weight="bold" fill="#0369a1" text-anchor="middle">Token 流</text>
  <text x="357" y="76" font-family="'SF Mono', 'Menlo', monospace" font-size="8" fill="#0284c7" text-anchor="middle">[ID, &amp;&amp;, ID, ?, ...]</text>

  <line x1="415" y1="63" x2="440" y2="63" stroke="#3b82f6" stroke-width="1.5"/>
  <polygon points="437,59 445,63 437,67" fill="#3b82f6"/>

  <!-- RuleParser -->
  <rect x="445" y="42" width="105" height="42" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5" rx="6"/>
  <text x="497" y="60" font-family="'SF Mono', 'Menlo', monospace" font-size="10" font-weight="bold" fill="#1e40af" text-anchor="middle">RuleParser</text>
  <text x="497" y="76" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="9" fill="#3b82f6" text-anchor="middle">语法分析</text>

  <line x1="550" y1="63" x2="575" y2="63" stroke="#3b82f6" stroke-width="1.5"/>
  <polygon points="572,59 580,63 572,67" fill="#3b82f6"/>

  <!-- ParseTree -->
  <rect x="580" y="42" width="110" height="42" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5" rx="6"/>
  <text x="635" y="60" font-family="'SF Mono', 'Menlo', monospace" font-size="10" font-weight="bold" fill="#1e40af" text-anchor="middle">ParseTree</text>
  <text x="635" y="76" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="9" fill="#3b82f6" text-anchor="middle">语法树</text>

  <!-- Down arrow -->
  <line x1="360" y1="110" x2="360" y2="140" stroke="#6b7280" stroke-width="1.5"/>
  <polygon points="356,137 360,145 364,137" fill="#6b7280"/>

  <!-- Phase 2: Visitor -->
  <rect x="15" y="145" width="690" height="85" fill="#fef3c7" stroke="#fbbf24" stroke-width="1.5" rx="8"/>
  <rect x="27" y="153" width="280" height="22" fill="#f59e0b" rx="11"/>
  <text x="167" y="168" font-family="'SF Mono', 'Menlo', monospace" font-size="11" font-weight="bold" fill="white" text-anchor="middle">DefaultRuleVisitor (ANTLR4 Visitor)</text>

  <!-- Visitor mappings - left column -->
  <text x="40" y="195" font-family="'SF Mono', 'Menlo', monospace" font-size="9" fill="#92400e">visitOr()    → OrNode</text>
  <text x="40" y="211" font-family="'SF Mono', 'Menlo', monospace" font-size="9" fill="#92400e">visitAnd()   → AndNode</text>
  <text x="40" y="227" font-family="'SF Mono', 'Menlo', monospace" font-size="9" fill="#92400e">visitNot()   → NotNode</text>

  <!-- Visitor mappings - middle column -->
  <text x="270" y="195" font-family="'SF Mono', 'Menlo', monospace" font-size="9" fill="#92400e">visitIf()    → CaseNode</text>
  <text x="270" y="211" font-family="'SF Mono', 'Menlo', monospace" font-size="9" fill="#92400e">visitPar()   → ParNode</text>
  <text x="270" y="227" font-family="'SF Mono', 'Menlo', monospace" font-size="9" fill="#92400e">visitSer()   → SerNode</text>

  <!-- Visitor mappings - right column -->
  <text x="490" y="195" font-family="'SF Mono', 'Menlo', monospace" font-size="9" fill="#92400e">visitLimit() → LimitNode</text>
  <text x="490" y="211" font-family="'SF Mono', 'Menlo', monospace" font-size="9" fill="#92400e">visitId()    → ExprNode</text>

  <!-- Down arrow -->
  <line x1="360" y1="230" x2="360" y2="255" stroke="#6b7280" stroke-width="1.5"/>
  <polygon points="356,252 360,260 364,252" fill="#6b7280"/>

  <!-- Output -->
  <rect x="240" y="260" width="240" height="26" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5" rx="13"/>
  <text x="360" y="278" font-family="'SF Mono', 'Menlo', monospace" font-size="12" font-weight="bold" fill="#166534" text-anchor="middle">RuleNode AST（可执行）</text>
</svg>