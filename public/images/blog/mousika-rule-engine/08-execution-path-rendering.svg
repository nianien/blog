<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 220">
  <!-- Top pipeline -->
  <rect x="15" y="15" width="100" height="34" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5" rx="6"/>
  <text x="65" y="37" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="11" font-weight="bold" fill="#1e40af" text-anchor="middle">Fact 数据</text>

  <line x1="115" y1="32" x2="138" y2="32" stroke="#6b7280" stroke-width="1.5"/>
  <polygon points="135,28 143,32 135,36" fill="#6b7280"/>

  <rect x="143" y="15" width="100" height="34" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5" rx="6"/>
  <text x="193" y="37" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="11" font-weight="bold" fill="#1e40af" text-anchor="middle">引擎执行</text>

  <line x1="243" y1="32" x2="266" y2="32" stroke="#6b7280" stroke-width="1.5"/>
  <polygon points="263,28 271,32 263,36" fill="#6b7280"/>

  <rect x="271" y="15" width="130" height="34" fill="#fef3c7" stroke="#fbbf24" stroke-width="1.5" rx="6"/>
  <text x="336" y="30" font-family="'SF Mono', 'Menlo', monospace" font-size="10" font-weight="bold" fill="#92400e" text-anchor="middle">EvalNode</text>
  <text x="336" y="43" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="9" fill="#b45309" text-anchor="middle">执行树</text>

  <line x1="401" y1="32" x2="424" y2="32" stroke="#6b7280" stroke-width="1.5"/>
  <polygon points="421,28 429,32 421,36" fill="#6b7280"/>

  <rect x="429" y="15" width="170" height="34" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5" rx="6"/>
  <text x="514" y="30" font-family="'SF Mono', 'Menlo', monospace" font-size="10" font-weight="bold" fill="#166534" text-anchor="middle">NodeResult</text>
  <text x="514" y="43" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="9" fill="#15803d" text-anchor="middle">结果树</text>

  <!-- Down arrow from NodeResult -->
  <line x1="514" y1="49" x2="514" y2="70" stroke="#6b7280" stroke-width="1.5"/>
  <polygon points="510,67 514,75 518,67" fill="#6b7280"/>

  <!-- Rendering section -->
  <rect x="15" y="75" width="590" height="135" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5" rx="8"/>

  <!-- 前端流程图 -->
  <rect x="30" y="90" width="120" height="34" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1.5" rx="6"/>
  <text x="90" y="112" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="11" font-weight="bold" fill="#6d28d9" text-anchor="middle">前端流程图</text>

  <line x1="150" y1="107" x2="173" y2="107" stroke="#8b5cf6" stroke-width="1.5"/>
  <polygon points="170,103 178,107 170,111" fill="#8b5cf6"/>

  <!-- 遍历结果树 -->
  <rect x="178" y="85" width="140" height="44" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1.5" rx="6"/>
  <text x="248" y="104" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="10" font-weight="bold" fill="#6d28d9" text-anchor="middle">遍历结果树</text>
  <text x="248" y="120" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="9" fill="#7c3aed" text-anchor="middle">标记每个节点状态</text>

  <!-- Arrow to status list -->
  <line x1="318" y1="107" x2="348" y2="107" stroke="#8b5cf6" stroke-width="1.5"/>
  <polygon points="345,103 353,107 345,111" fill="#8b5cf6"/>

  <!-- Status indicators -->
  <rect x="353" y="82" width="240" height="120" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1" rx="6"/>

  <!-- Green: 通过 -->
  <rect x="365" y="92" width="12" height="12" fill="#22c55e" rx="2"/>
  <text x="385" y="103" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="10" fill="#166534">通过的节点：绿色高亮</text>

  <!-- Red: 未通过 -->
  <rect x="365" y="114" width="12" height="12" fill="#ef4444" rx="2"/>
  <text x="385" y="125" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="10" fill="#991b1b">未通过的节点：红色高亮</text>

  <!-- Gray: 未执行 -->
  <rect x="365" y="136" width="12" height="12" fill="#9ca3af" rx="2"/>
  <text x="385" y="147" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="10" fill="#4b5563">未执行分支（NaResult）：灰色</text>

  <!-- Click -->
  <rect x="365" y="158" width="12" height="12" fill="#3b82f6" rx="2"/>
  <text x="385" y="169" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="10" fill="#1e40af">点击节点 → 展开描述 + 返回值</text>
</svg>