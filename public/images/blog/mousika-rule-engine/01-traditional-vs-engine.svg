<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 200">
  <!-- Traditional approach -->
  <rect x="10" y="10" width="620" height="80" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5" rx="8"/>
  <rect x="20" y="18" width="80" height="22" fill="#ef4444" rx="11"/>
  <text x="60" y="33" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="11" font-weight="bold" fill="white" text-anchor="middle">传统方式</text>

  <rect x="30" y="50" width="100" height="30" fill="#fee2e2" stroke="#f87171" stroke-width="1.5" rx="6"/>
  <text x="80" y="70" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="11" fill="#991b1b" text-anchor="middle">业务规则</text>

  <line x1="130" y1="65" x2="155" y2="65" stroke="#ef4444" stroke-width="1.5"/>
  <polygon points="152,61 160,65 152,69" fill="#ef4444"/>
  <text x="145" y="57" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="8" fill="#b91c1c" text-anchor="middle">嵌入</text>

  <rect x="160" y="50" width="100" height="30" fill="#fee2e2" stroke="#f87171" stroke-width="1.5" rx="6"/>
  <text x="210" y="70" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="11" fill="#991b1b" text-anchor="middle">业务代码</text>

  <line x1="260" y1="65" x2="285" y2="65" stroke="#ef4444" stroke-width="1.5"/>
  <polygon points="282,61 290,65 282,69" fill="#ef4444"/>
  <text x="275" y="57" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="8" fill="#b91c1c" text-anchor="middle">编译</text>

  <rect x="290" y="50" width="70" height="30" fill="#fee2e2" stroke="#f87171" stroke-width="1.5" rx="6"/>
  <text x="325" y="70" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="11" fill="#991b1b" text-anchor="middle">发布</text>

  <line x1="360" y1="65" x2="385" y2="65" stroke="#ef4444" stroke-width="1.5"/>
  <polygon points="382,61 390,65 382,69" fill="#ef4444"/>
  <text x="375" y="57" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="8" fill="#b91c1c" text-anchor="middle">部署</text>

  <rect x="390" y="50" width="70" height="30" fill="#fee2e2" stroke="#f87171" stroke-width="1.5" rx="6"/>
  <text x="425" y="70" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="11" fill="#991b1b" text-anchor="middle">生效</text>

  <rect x="485" y="50" width="130" height="30" fill="#fecaca" stroke="#ef4444" stroke-width="1.5" rx="6" stroke-dasharray="4,3"/>
  <text x="550" y="70" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="11" font-weight="bold" fill="#991b1b" text-anchor="middle">变更 = 发版</text>

  <!-- Rule engine approach -->
  <rect x="10" y="110" width="620" height="80" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5" rx="8"/>
  <rect x="20" y="118" width="108" height="22" fill="#22c55e" rx="11"/>
  <text x="74" y="133" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="11" font-weight="bold" fill="white" text-anchor="middle">规则引擎方式</text>

  <!-- Row 1: rule config path -->
  <rect x="30" y="148" width="100" height="30" fill="#dcfce7" stroke="#4ade80" stroke-width="1.5" rx="6"/>
  <text x="80" y="168" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="11" fill="#166534" text-anchor="middle">业务规则</text>

  <line x1="130" y1="163" x2="155" y2="163" stroke="#22c55e" stroke-width="1.5"/>
  <polygon points="152,159 160,163 152,167" fill="#22c55e"/>
  <text x="145" y="155" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="8" fill="#15803d" text-anchor="middle">配置</text>

  <rect x="160" y="148" width="100" height="30" fill="#dcfce7" stroke="#4ade80" stroke-width="1.5" rx="6"/>
  <text x="210" y="168" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="11" fill="#166534" text-anchor="middle">规则平台</text>

  <line x1="260" y1="163" x2="285" y2="163" stroke="#22c55e" stroke-width="1.5"/>
  <polygon points="282,159 290,163 282,167" fill="#22c55e"/>
  <text x="275" y="155" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="8" fill="#15803d" text-anchor="middle">推送</text>

  <rect x="290" y="148" width="110" height="30" fill="#dcfce7" stroke="#4ade80" stroke-width="1.5" rx="6"/>
  <text x="345" y="168" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="11" fill="#166534" text-anchor="middle">引擎热加载</text>

  <line x1="400" y1="163" x2="425" y2="163" stroke="#22c55e" stroke-width="1.5"/>
  <polygon points="422,159 430,163 422,167" fill="#22c55e"/>

  <rect x="430" y="148" width="90" height="30" fill="#dcfce7" stroke="#4ade80" stroke-width="1.5" rx="6"/>
  <text x="475" y="168" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="11" fill="#166534" text-anchor="middle">秒级生效</text>

  <rect x="535" y="148" width="82" height="30" fill="#bbf7d0" stroke="#22c55e" stroke-width="1.5" rx="6" stroke-dasharray="4,3"/>
  <text x="576" y="167" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="10" font-weight="bold" fill="#166534" text-anchor="middle">变更 ≠ 发版</text>
</svg>