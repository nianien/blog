<svg viewBox="0 0 850 450" xmlns="http://www.w3.org/2000/svg">
  <!-- Title -->
  <text x="425" y="25" text-anchor="middle" font-size="20" font-weight="bold" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" fill="#1F2937">
    全局数据与库存分摊
  </text>

  <!-- LEFT SIDE: Problem -->
  <text x="200" y="60" text-anchor="middle" font-size="14" font-weight="600" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" fill="#7F1D1D">
    问题：全局库存集中
  </text>

  <!-- Global data box (problem) -->
  <rect x="75" y="85" width="250" height="50" rx="6" fill="#FEE2E2" stroke="#DC2626" stroke-width="1.5"/>
  <text x="200" y="115" text-anchor="middle" font-size="13" font-weight="600" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" fill="#7F1D1D">
    全局数据库（单点）
  </text>

  <!-- Arrow from Beijing to global -->
  <line x1="200" y1="160" x2="150" y2="85" stroke="#DC2626" stroke-width="1.5" stroke-dasharray="3,3"/>
  <polygon points="150,85 155,95 145,93" fill="#DC2626"/>

  <!-- Arrow from Shanghai to global -->
  <line x1="200" y1="160" x2="250" y2="85" stroke="#DC2626" stroke-width="1.5" stroke-dasharray="3,3"/>
  <polygon points="250,85 245,93 255,95" fill="#DC2626"/>

  <!-- 北京机房 (Left) -->
  <rect x="50" y="160" width="300" height="130" rx="6" fill="#F3E8FF" stroke="#A78BFA" stroke-width="1.5"/>
  <text x="200" y="185" text-anchor="middle" font-size="13" font-weight="600" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" fill="#6D28D9">
    北京机房
  </text>

  <!-- Beijing service -->
  <rect x="80" y="200" width="240" height="40" rx="6" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="200" y="228" text-anchor="middle" font-size="12" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" fill="#1E40AF">
    应用服务
  </text>

  <!-- 上海机房 (Right) -->
  <rect x="400" y="160" width="300" height="130" rx="6" fill="#F3E8FF" stroke="#A78BFA" stroke-width="1.5"/>
  <text x="550" y="185" text-anchor="middle" font-size="13" font-weight="600" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" fill="#6D28D9">
    上海机房
  </text>

  <!-- Shanghai service -->
  <rect x="430" y="200" width="240" height="40" rx="6" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="550" y="228" text-anchor="middle" font-size="12" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" fill="#1E40AF">
    应用服务
  </text>

  <!-- Problem label -->
  <text x="200" y="145" text-anchor="middle" font-size="11" font-weight="600" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" fill="#DC2626">
    写请求必须走中心
  </text>

  <!-- Solution divider -->
  <line x1="425" y1="50" x2="425" y2="320" stroke="#D1D5DB" stroke-width="1" stroke-dasharray="5,5"/>

  <!-- RIGHT SIDE: Solution -->
  <text x="650" y="60" text-anchor="middle" font-size="14" font-weight="600" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" fill="#065F46">
    方案：库存分摊
  </text>

  <!-- 北京库存 -->
  <rect x="520" y="95" width="220" height="50" rx="6" fill="#DCFCE7" stroke="#22C55E" stroke-width="1.5"/>
  <text x="630" y="120" text-anchor="middle" font-size="12" font-weight="600" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" fill="#15803D">
    北京机房库存
  </text>
  <text x="630" y="137" text-anchor="middle" font-size="11" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" fill="#166534">
    配额：A 份
  </text>

  <!-- 上海库存 -->
  <rect x="520" y="180" width="220" height="50" rx="6" fill="#DCFCE7" stroke="#22C55E" stroke-width="1.5"/>
  <text x="630" y="205" text-anchor="middle" font-size="12" font-weight="600" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" fill="#15803D">
    上海机房库存
  </text>
  <text x="630" y="222" text-anchor="middle" font-size="11" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" fill="#166534">
    配额：B 份
  </text>

  <!-- Bidirectional arrow between inventories -->
  <line x1="520" y1="162" x2="520" y2="180" stroke="#16A34A" stroke-width="1.5"/>
  <polygon points="520,162 515,172 525,172" fill="#16A34A"/>
  <polygon points="520,180 515,170 525,170" fill="#16A34A"/>

  <!-- Inventory transfer label -->
  <text x="475" y="175" text-anchor="end" font-size="11" font-weight="600" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" fill="#16A34A">
    库存调拨
  </text>

  <!-- Key points -->
  <rect x="50" y="330" width="750" height="100" rx="6" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="1.5"/>

  <text x="70" y="355" font-size="12" font-weight="600" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" fill="#1F2937">
    库存分摊策略：
  </text>

  <text x="70" y="375" font-size="11" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" fill="#4B5563">
    • 将总库存按比例分配给各机房（A份 + B份 = 总库存）
  </text>

  <text x="70" y="395" font-size="11" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" fill="#4B5563">
    • 各机房本地读写各自库存，无需访问中心
  </text>

  <text x="70" y="415" font-size="11" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" fill="#4B5563">
    • 库存不足时通过调拨程序从其他机房转移
  </text>
</svg>