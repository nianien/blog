<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="400" fill="#FAFAFA"/>

  <!-- Title -->
  <text x="400" y="25" font-size="18" font-weight="bold" text-anchor="middle" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" fill="#1F2937">
    单机架构 vs 主从副本
  </text>

  <!-- Vertical divider (dashed line) -->
  <line x1="400" y1="50" x2="400" y2="350" stroke="#D1D5DB" stroke-width="2" stroke-dasharray="5,5"/>

  <!-- LEFT SIDE: Single Machine Architecture -->
  <text x="200" y="70" font-size="14" font-weight="600" text-anchor="middle" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" fill="#374151">
    单机架构
  </text>

  <!-- Client -->
  <rect x="110" y="100" width="180" height="50" rx="6" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="200" y="130" font-size="13" text-anchor="middle" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" fill="#1E40AF">
    客户端
  </text>

  <!-- Arrow -->
  <line x1="200" y1="150" x2="200" y2="180" stroke="#6B7280" stroke-width="1.5"/>
  <polygon points="200,180 195,170 205,170" fill="#6B7280"/>

  <!-- App Server -->
  <rect x="110" y="180" width="180" height="50" rx="6" fill="#DCFCE7" stroke="#16A34A" stroke-width="1.5"/>
  <text x="200" y="210" font-size="13" text-anchor="middle" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" fill="#15803D">
    应用服务
  </text>

  <!-- Arrow -->
  <line x1="200" y1="230" x2="200" y2="260" stroke="#6B7280" stroke-width="1.5"/>
  <polygon points="200,260 195,250 205,250" fill="#6B7280"/>

  <!-- Database Cylinder (represented as rounded rect) -->
  <rect x="110" y="260" width="180" height="60" rx="8" fill="#FEE2E2" stroke="#DC2626" stroke-width="1.5"/>
  <text x="200" y="295" font-size="13" text-anchor="middle" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" fill="#991B1B">
    单库
  </text>

  <!-- RIGHT SIDE: Master-Slave Architecture -->
  <text x="600" y="70" font-size="14" font-weight="600" text-anchor="middle" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" fill="#374151">
    主从副本
  </text>

  <!-- Client -->
  <rect x="510" y="100" width="180" height="50" rx="6" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="600" y="130" font-size="13" text-anchor="middle" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" fill="#1E40AF">
    客户端
  </text>

  <!-- Arrow -->
  <line x1="600" y1="150" x2="600" y2="180" stroke="#6B7280" stroke-width="1.5"/>
  <polygon points="600,180 595,170 605,170" fill="#6B7280"/>

  <!-- App Server -->
  <rect x="510" y="180" width="180" height="50" rx="6" fill="#DCFCE7" stroke="#16A34A" stroke-width="1.5"/>
  <text x="600" y="210" font-size="13" text-anchor="middle" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" fill="#15803D">
    应用服务
  </text>

  <!-- Arrow -->
  <line x1="600" y1="230" x2="600" y2="260" stroke="#6B7280" stroke-width="1.5"/>
  <polygon points="600,260 595,250 605,250" fill="#6B7280"/>

  <!-- Master DB -->
  <rect x="510" y="260" width="180" height="60" rx="8" fill="#FEE2E2" stroke="#DC2626" stroke-width="1.5"/>
  <text x="600" y="295" font-size="13" text-anchor="middle" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" fill="#991B1B">
    主库 (Master)
  </text>

  <!-- Sync arrow from Master to Slave -->
  <line x1="600" y1="320" x2="600" y2="350" stroke="#8B5CF6" stroke-width="1.5"/>
  <polygon points="600,350 595,340 605,340" fill="#8B5CF6"/>

  <!-- Sync label -->
  <text x="630" y="338" font-size="11" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" fill="#7C3AED">
    实时同步
  </text>

  <!-- Slave DB (positioned below, appearing as continuation) -->
  <rect x="510" y="350" width="180" height="40" rx="6" fill="#F3E8FF" stroke="#9333EA" stroke-width="1.5"/>
  <text x="600" y="375" font-size="12" text-anchor="middle" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" fill="#6B21A8">
    从库 (Slave)
  </text>
</svg>