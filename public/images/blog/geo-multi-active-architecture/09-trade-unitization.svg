<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <!-- Title -->
  <text x="450" y="25" text-anchor="middle" font-size="20" font-weight="bold" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" fill="#1F2937">
    交易单元化部署（WRITE 模式）
  </text>

  <!-- Top routing layer -->
  <rect x="150" y="55" width="600" height="45" rx="6" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="450" y="85" text-anchor="middle" font-size="13" font-weight="600" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" fill="#92400E">
    路由层 (根据订单ID、商品ID 路由到对应单元)
  </text>

  <!-- CENTER UNIT: 中心单元 -->
  <text x="230" y="135" font-size="14" font-weight="700" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" fill="#1D4ED8">
    中心单元
  </text>

  <!-- Center unit stack -->
  <rect x="100" y="150" width="260" height="340" rx="6" fill="#EFF6FF" stroke="#1D4ED8" stroke-width="1.5"/>

  <!-- Center - 接入层 -->
  <rect x="120" y="165" width="220" height="40" rx="6" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="230" y="191" text-anchor="middle" font-size="11" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" fill="#1E40AF">
    接入层
  </text>

  <!-- Center - 商品&购物车 -->
  <rect x="120" y="220" width="220" height="40" rx="6" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="230" y="246" text-anchor="middle" font-size="11" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" fill="#1E40AF">
    商品详情/购物车
  </text>

  <!-- Center - 下单 -->
  <rect x="120" y="275" width="220" height="40" rx="6" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="230" y="301" text-anchor="middle" font-size="11" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" fill="#1E40AF">
    下单服务
  </text>

  <!-- Center - 支付 -->
  <rect x="120" y="330" width="220" height="40" rx="6" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="230" y="356" text-anchor="middle" font-size="11" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" fill="#1E40AF">
    支付服务
  </text>

  <!-- Center - DB -->
  <rect x="120" y="385" width="220" height="90" rx="6" fill="#FEE2E2" stroke="#DC2626" stroke-width="1.5"/>
  <text x="230" y="415" text-anchor="middle" font-size="12" font-weight="600" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" fill="#7F1D1D">
    数据库
  </text>
  <text x="230" y="435" text-anchor="middle" font-size="11" font-family="'SF Mono', 'Menlo', monospace" fill="#991B1B">
    WRITE 模式
  </text>
  <text x="230" y="455" text-anchor="middle" font-size="10" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" fill="#7F1D1D">
    Master-1
  </text>

  <!-- DOWN arrows in center -->
  <line x1="230" y1="205" x2="230" y2="220" stroke="#9CA3AF" stroke-width="1"/>
  <line x1="230" y1="260" x2="230" y2="275" stroke="#9CA3AF" stroke-width="1"/>
  <line x1="230" y1="315" x2="230" y2="330" stroke="#9CA3AF" stroke-width="1"/>
  <line x1="230" y1="370" x2="230" y2="385" stroke="#9CA3AF" stroke-width="1"/>

  <!-- NORMAL UNIT: 普通单元 -->
  <text x="670" y="135" font-size="14" font-weight="700" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" fill="#6D28D9">
    普通单元
  </text>

  <!-- Normal unit stack -->
  <rect x="540" y="150" width="260" height="340" rx="6" fill="#F3E8FF" stroke="#A78BFA" stroke-width="1.5"/>

  <!-- Normal - 接入层 -->
  <rect x="560" y="165" width="220" height="40" rx="6" fill="#E9D5FF" stroke="#C084FC" stroke-width="1.5"/>
  <text x="670" y="191" text-anchor="middle" font-size="11" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" fill="#6B21A8">
    接入层
  </text>

  <!-- Normal - 商品&购物车 -->
  <rect x="560" y="220" width="220" height="40" rx="6" fill="#E9D5FF" stroke="#C084FC" stroke-width="1.5"/>
  <text x="670" y="246" text-anchor="middle" font-size="11" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" fill="#6B21A8">
    商品详情/购物车
  </text>

  <!-- Normal - 下单 -->
  <rect x="560" y="275" width="220" height="40" rx="6" fill="#E9D5FF" stroke="#C084FC" stroke-width="1.5"/>
  <text x="670" y="301" text-anchor="middle" font-size="11" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" fill="#6B21A8">
    下单服务
  </text>

  <!-- Normal - 支付 -->
  <rect x="560" y="330" width="220" height="40" rx="6" fill="#E9D5FF" stroke="#C084FC" stroke-width="1.5"/>
  <text x="670" y="356" text-anchor="middle" font-size="11" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" fill="#6B21A8">
    支付服务
  </text>

  <!-- Normal - DB -->
  <rect x="560" y="385" width="220" height="90" rx="6" fill="#F3E8FF" stroke="#A78BFA" stroke-width="1.5"/>
  <text x="670" y="415" text-anchor="middle" font-size="12" font-weight="600" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" fill="#6D28D9">
    数据库
  </text>
  <text x="670" y="435" text-anchor="middle" font-size="11" font-family="'SF Mono', 'Menlo', monospace" fill="#7C3AED">
    WRITE 模式
  </text>
  <text x="670" y="455" text-anchor="middle" font-size="10" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" fill="#6D28D9">
    Master-2
  </text>

  <!-- DOWN arrows in normal -->
  <line x1="670" y1="205" x2="670" y2="220" stroke="#9CA3AF" stroke-width="1"/>
  <line x1="670" y1="260" x2="670" y2="275" stroke="#9CA3AF" stroke-width="1"/>
  <line x1="670" y1="315" x2="670" y2="330" stroke="#9CA3AF" stroke-width="1"/>
  <line x1="670" y1="370" x2="670" y2="385" stroke="#9CA3AF" stroke-width="1"/>

  <!-- Bidirectional sync arrow between DBs -->
  <line x1="340" y1="430" x2="560" y2="430" stroke="#059669" stroke-width="1.5"/>
  <polygon points="340,430 350,425 350,435" fill="#059669"/>
  <polygon points="560,430 550,425 550,435" fill="#059669"/>

  <!-- Sync label -->
  <text x="450" y="415" text-anchor="middle" font-size="11" font-weight="600" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" fill="#047857">
    双向同步
  </text>

  <!-- Key point annotation -->
  <rect x="150" y="505" width="600" height="35" rx="4" fill="#DCFCE7" stroke="#22C55E" stroke-width="1.5"/>
  <text x="450" y="523" text-anchor="middle" font-size="12" font-weight="600" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" fill="#15803D">
    ★ 全链路单元化 - 写操作在本地单元完成，无需跨单元调用
  </text>
</svg>