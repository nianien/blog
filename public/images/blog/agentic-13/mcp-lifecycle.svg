<svg viewBox="0 0 700 520" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif">
  <!-- Title -->
  <text x="350" y="22" font-size="14" font-weight="bold" text-anchor="middle" fill="#333">MCP 生命周期：初始化 → 能力协商 → 工具调用</text>

  <!-- Actors -->
  <rect x="80" y="40" width="150" height="32" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="155" y="61" font-size="11" font-weight="bold" text-anchor="middle" fill="#1e40af">MCP Client</text>

  <rect x="470" y="40" width="150" height="32" rx="6" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="545" y="61" font-size="11" font-weight="bold" text-anchor="middle" fill="#166534">MCP Server</text>

  <!-- Lifelines -->
  <line x1="155" y1="72" x2="155" y2="490" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="5,4"/>
  <line x1="545" y1="72" x2="545" y2="490" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="5,4"/>

  <!-- Phase 1: Initialize -->
  <text x="350" y="100" font-size="11" font-weight="bold" text-anchor="middle" fill="#1e40af">Phase 1: Initialize</text>

  <!-- Client → Server: initialize() -->
  <line x1="155" y1="118" x2="543" y2="118" stroke="#3b82f6" stroke-width="1.5"/>
  <polygon points="543,114 553,118 543,122" fill="#3b82f6"/>
  <text x="350" y="112" font-size="10" text-anchor="middle" fill="#1e40af">initialize()</text>
  <text x="350" y="132" font-size="9" text-anchor="middle" fill="#888">声明客户端协议版本</text>

  <!-- Server → Client: return capabilities -->
  <line x1="545" y1="152" x2="157" y2="152" stroke="#22c55e" stroke-width="1.5"/>
  <polygon points="157,148 147,152 157,156" fill="#22c55e"/>
  <text x="350" y="147" font-size="10" text-anchor="middle" fill="#166534">return capabilities()</text>
  <text x="350" y="167" font-size="9" text-anchor="middle" fill="#888">服务器支持的能力集合</text>

  <!-- Phase 2 -->
  <text x="350" y="200" font-size="11" font-weight="bold" text-anchor="middle" fill="#1e40af">Phase 2: 能力协商</text>

  <!-- list_tools -->
  <line x1="155" y1="218" x2="543" y2="218" stroke="#3b82f6" stroke-width="1.5"/>
  <polygon points="543,214 553,218 543,222" fill="#3b82f6"/>
  <text x="350" y="213" font-size="10" text-anchor="middle" fill="#1e40af">list_tools()</text>

  <line x1="545" y1="248" x2="157" y2="248" stroke="#22c55e" stroke-width="1.5"/>
  <polygon points="157,244 147,248 157,252" fill="#22c55e"/>
  <text x="350" y="243" font-size="10" text-anchor="middle" fill="#166534">return [Tool, ...]</text>

  <!-- list_resources -->
  <line x1="155" y1="278" x2="543" y2="278" stroke="#3b82f6" stroke-width="1.5"/>
  <polygon points="543,274 553,278 543,282" fill="#3b82f6"/>
  <text x="350" y="273" font-size="10" text-anchor="middle" fill="#1e40af">list_resources()</text>

  <line x1="545" y1="308" x2="157" y2="308" stroke="#22c55e" stroke-width="1.5"/>
  <polygon points="157,304 147,308 157,312" fill="#22c55e"/>
  <text x="350" y="303" font-size="10" text-anchor="middle" fill="#166534">return [Resource, ...]</text>

  <!-- Phase 3 -->
  <text x="350" y="348" font-size="11" font-weight="bold" text-anchor="middle" fill="#1e40af">Phase 3: 工具调用</text>

  <!-- call_tool -->
  <line x1="155" y1="368" x2="543" y2="368" stroke="#3b82f6" stroke-width="1.5"/>
  <polygon points="543,364 553,368 543,372" fill="#3b82f6"/>
  <text x="350" y="362" font-size="10" text-anchor="middle" fill="#1e40af">call_tool("search_web", args)</text>
  <text x="350" y="382" font-size="9" text-anchor="middle" fill="#888">LLM 决定调用某工具</text>

  <line x1="545" y1="408" x2="157" y2="408" stroke="#22c55e" stroke-width="1.5"/>
  <polygon points="157,404 147,408 157,412" fill="#22c55e"/>
  <text x="350" y="403" font-size="10" text-anchor="middle" fill="#166534">return TextContent(...)</text>
  <text x="350" y="422" font-size="9" text-anchor="middle" fill="#888">执行结果返回给 LLM</text>

  <!-- Key design box -->
  <rect x="50" y="450" width="600" height="55" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="350" y="472" font-size="10" font-weight="bold" text-anchor="middle" fill="#92400e">关键设计：旧 Client 与新 Server 兼容（只使用交集能力）</text>
  <text x="350" y="492" font-size="9" text-anchor="middle" fill="#78350f">通信协议：JSON-RPC 2.0 over stdio / HTTP+SSE / Streamable HTTP</text>
</svg>
