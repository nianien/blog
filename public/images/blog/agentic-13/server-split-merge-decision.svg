<svg viewBox="0 0 700 320" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif">
  <!-- Title -->
  <text x="350" y="22" font-size="14" font-weight="bold" text-anchor="middle" fill="#333">Server 拆分 vs 合并决策框架</text>

  <!-- ===== Left: 拆分 ===== -->
  <rect x="20" y="42" width="310" height="185" rx="6" fill="#FFEBEE" stroke="#C62828" stroke-width="1.5"/>
  <text x="175" y="64" font-size="12" font-weight="bold" text-anchor="middle" fill="#C62828">何时拆分 Server →</text>

  <!-- Split items -->
  <rect x="35" y="76" width="280" height="30" rx="4" fill="#fff" stroke="#E57373" stroke-width="1"/>
  <circle cx="52" cy="91" r="8" fill="#FFCDD2" stroke="#E57373" stroke-width="1"/>
  <text x="52" y="95" font-size="9" font-weight="bold" text-anchor="middle" fill="#C62828">1</text>
  <text x="68" y="95" font-size="10" fill="#333">工具属于不同领域（GitHub vs Slack）</text>

  <rect x="35" y="112" width="280" height="30" rx="4" fill="#fff" stroke="#E57373" stroke-width="1"/>
  <circle cx="52" cy="127" r="8" fill="#FFCDD2" stroke="#E57373" stroke-width="1"/>
  <text x="52" y="131" font-size="9" font-weight="bold" text-anchor="middle" fill="#C62828">2</text>
  <text x="68" y="131" font-size="10" fill="#333">工具需要不同权限凭证</text>

  <rect x="35" y="148" width="280" height="30" rx="4" fill="#fff" stroke="#E57373" stroke-width="1"/>
  <circle cx="52" cy="163" r="8" fill="#FFCDD2" stroke="#E57373" stroke-width="1"/>
  <text x="52" y="167" font-size="9" font-weight="bold" text-anchor="middle" fill="#C62828">3</text>
  <text x="68" y="167" font-size="10" fill="#333">不同故障域（互不影响）</text>

  <rect x="35" y="184" width="280" height="30" rx="4" fill="#fff" stroke="#E57373" stroke-width="1"/>
  <circle cx="52" cy="199" r="8" fill="#FFCDD2" stroke="#E57373" stroke-width="1"/>
  <text x="52" y="203" font-size="9" font-weight="bold" text-anchor="middle" fill="#C62828">4</text>
  <text x="68" y="203" font-size="10" fill="#333">需要独立的部署和升级周期</text>

  <!-- ===== Right: 合并 ===== -->
  <rect x="370" y="42" width="310" height="185" rx="6" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="525" y="64" font-size="12" font-weight="bold" text-anchor="middle" fill="#2E7D32">何时合并 Server →</text>

  <!-- Merge items -->
  <rect x="385" y="76" width="280" height="30" rx="4" fill="#fff" stroke="#81C784" stroke-width="1"/>
  <circle cx="402" cy="91" r="8" fill="#C8E6C9" stroke="#81C784" stroke-width="1"/>
  <text x="402" y="95" font-size="9" font-weight="bold" text-anchor="middle" fill="#2E7D32">1</text>
  <text x="418" y="95" font-size="10" fill="#333">工具间共享状态（同一 DB 连接）</text>

  <rect x="385" y="112" width="280" height="30" rx="4" fill="#fff" stroke="#81C784" stroke-width="1"/>
  <circle cx="402" cy="127" r="8" fill="#C8E6C9" stroke="#81C784" stroke-width="1"/>
  <text x="402" y="131" font-size="9" font-weight="bold" text-anchor="middle" fill="#2E7D32">2</text>
  <text x="418" y="131" font-size="10" fill="#333">工具总是一起使用</text>

  <rect x="385" y="148" width="280" height="30" rx="4" fill="#fff" stroke="#81C784" stroke-width="1"/>
  <circle cx="402" cy="163" r="8" fill="#C8E6C9" stroke="#81C784" stroke-width="1"/>
  <text x="402" y="167" font-size="9" font-weight="bold" text-anchor="middle" fill="#2E7D32">3</text>
  <text x="418" y="163" font-size="10" fill="#333">工具数量少（&lt; 3）且同一上下文</text>

  <!-- ===== Bottom: 案例 ===== -->
  <rect x="20" y="242" width="660" height="68" rx="6" fill="#fffef0" stroke="#ccaa00" stroke-width="1.5"/>
  <text x="350" y="260" font-size="11" font-weight="bold" text-anchor="middle" fill="#333">实际案例：数据分析场景</text>

  <!-- 过细 -->
  <text x="35" y="280" font-size="10" fill="#C62828" font-weight="bold">过细</text>
  <text x="75" y="280" font-size="10" fill="#666">query / chart / export-server — 3 个进程管理成本高且紧耦合</text>

  <!-- 过粗 -->
  <text x="35" y="296" font-size="10" fill="#C62828" font-weight="bold">过粗</text>
  <text x="75" y="296" font-size="10" fill="#666">analytics-server 含 20 个工具 — LLM 选择困难</text>

  <!-- 合适 -->
  <text x="370" y="280" font-size="10" fill="#2E7D32" font-weight="bold">合适</text>
  <text x="410" y="280" font-size="10" fill="#333">data-query-server（查询 + 聚合）</text>
  <text x="410" y="296" font-size="10" fill="#333">visualization-server（图表 + 导出）</text>
</svg>
