<svg viewBox="0 0 860 340" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif">
  <rect width="860" height="340" fill="#F8FAFC" rx="8"/>
  <text x="430" y="26" text-anchor="middle" font-size="14" font-weight="600" fill="#1E293B">CDN 在流量架构中的层次定位</text>

  <!-- Layer backgrounds -->
  <rect x="12" y="40" width="836" height="64" rx="6" fill="#FEF9C3" fill-opacity="0.6"/>
  <rect x="12" y="114" width="836" height="64" rx="6" fill="#DBEAFE" fill-opacity="0.6"/>
  <rect x="12" y="188" width="836" height="64" rx="6" fill="#D1FAE5" fill-opacity="0.6"/>
  <rect x="12" y="262" width="836" height="64" rx="6" fill="#EDE9FE" fill-opacity="0.6"/>

  <!-- Layer labels (left) -->
  <text x="28" y="66" font-size="10" font-weight="600" fill="#92400E">DNS 层</text>
  <text x="28" y="80" font-size="9" fill="#A16207">路由决策</text>
  <text x="28" y="140" font-size="10" font-weight="600" fill="#1E40AF">CDN 层</text>
  <text x="28" y="154" font-size="9" fill="#1D4ED8">缓存 · 加速 · 边缘</text>
  <text x="28" y="214" font-size="10" font-weight="600" fill="#065F46">安全 · 接入层</text>
  <text x="28" y="228" font-size="9" fill="#047857">WAF · LB</text>
  <text x="28" y="288" font-size="10" font-weight="600" fill="#4C1D95">源站层</text>
  <text x="28" y="302" font-size="9" fill="#5B21B6">应用 · 存储</text>

  <!-- DNS layer nodes -->
  <rect x="115" y="48" width="130" height="48" rx="6" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="180" y="69" text-anchor="middle" font-size="11" font-weight="600" fill="#92400E">GeoDNS / GSLB</text>
  <text x="180" y="85" text-anchor="middle" font-size="9" fill="#78350F">按地区路由到最优 CDN 节点</text>

  <rect x="285" y="48" width="130" height="48" rx="6" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="350" y="69" text-anchor="middle" font-size="11" font-weight="600" fill="#92400E">DDoS 清洗</text>
  <text x="350" y="85" text-anchor="middle" font-size="9" fill="#78350F">超大体积攻击流量过滤</text>

  <rect x="455" y="48" width="130" height="48" rx="6" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="520" y="69" text-anchor="middle" font-size="11" font-weight="600" fill="#92400E">健康检测</text>
  <text x="520" y="85" text-anchor="middle" font-size="9" fill="#78350F">节点存活探测 · 故障切换</text>

  <!-- CDN layer nodes -->
  <rect x="115" y="122" width="130" height="48" rx="6" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="180" y="143" text-anchor="middle" font-size="11" font-weight="600" fill="#1E40AF">边缘节点缓存</text>
  <text x="180" y="159" text-anchor="middle" font-size="9" fill="#1E3A8A">静态/半动态内容分发</text>

  <rect x="285" y="122" width="130" height="48" rx="6" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="350" y="143" text-anchor="middle" font-size="11" font-weight="600" fill="#1E40AF">动态加速</text>
  <text x="350" y="159" text-anchor="middle" font-size="9" fill="#1E3A8A">专线路由优化 · TCP 调优</text>

  <rect x="455" y="122" width="130" height="48" rx="6" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="520" y="143" text-anchor="middle" font-size="11" font-weight="600" fill="#1E40AF">边缘计算</text>
  <text x="520" y="159" text-anchor="middle" font-size="9" fill="#1E3A8A">Workers / Lambda@Edge</text>

  <rect x="625" y="122" width="130" height="48" rx="6" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="690" y="143" text-anchor="middle" font-size="11" font-weight="600" fill="#1E40AF">SSL 终止 · Bot 防护</text>
  <text x="690" y="159" text-anchor="middle" font-size="9" fill="#1E3A8A">基础 WAF · 防盗链</text>

