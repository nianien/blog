  <text x="180" y="217" text-anchor="middle" font-size="11" font-weight="600" fill="#065F46">WAF / API 网关</text>
  <text x="180" y="233" text-anchor="middle" font-size="9" fill="#064E3B">精细规则 · 业务防护</text>

  <rect x="285" y="196" width="130" height="48" rx="6" fill="#D1FAE5" stroke="#10B981" stroke-width="1.5"/>
  <text x="350" y="217" text-anchor="middle" font-size="11" font-weight="600" fill="#065F46">负载均衡</text>
  <text x="350" y="233" text-anchor="middle" font-size="9" fill="#064E3B">流量分发 · 健康检查</text>

  <rect x="455" y="196" width="130" height="48" rx="6" fill="#D1FAE5" stroke="#10B981" stroke-width="1.5"/>
  <text x="520" y="217" text-anchor="middle" font-size="11" font-weight="600" fill="#065F46">Origin Shield</text>
  <text x="520" y="233" text-anchor="middle" font-size="9" fill="#064E3B">回源聚合 · 源站保护</text>

  <!-- Origin layer -->
  <rect x="180" y="270" width="130" height="48" rx="6" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="1.5"/>
  <text x="245" y="291" text-anchor="middle" font-size="11" font-weight="600" fill="#4C1D95">应用服务器</text>
  <text x="245" y="307" text-anchor="middle" font-size="9" fill="#3B0764">动态内容生成</text>

  <rect x="360" y="270" width="130" height="48" rx="6" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="1.5"/>
  <text x="425" y="291" text-anchor="middle" font-size="11" font-weight="600" fill="#4C1D95">对象存储</text>
  <text x="425" y="307" text-anchor="middle" font-size="9" fill="#3B0764">静态资源权威源</text>

  <rect x="540" y="270" width="130" height="48" rx="6" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="1.5"/>
  <text x="605" y="291" text-anchor="middle" font-size="11" font-weight="600" fill="#4C1D95">数据库 / 服务</text>
  <text x="605" y="307" text-anchor="middle" font-size="9" fill="#3B0764">业务逻辑</text>

  <!-- Vertical flow arrows between layers -->
  <line x1="180" y1="96" x2="180" y2="122" stroke="#CBD5E1" stroke-width="1.5"/>
  <polygon points="180,122 174,112 186,112" fill="#CBD5E1"/>
  <line x1="350" y1="96" x2="350" y2="122" stroke="#CBD5E1" stroke-width="1.5"/>
  <polygon points="350,122 344,112 356,112" fill="#CBD5E1"/>
  <line x1="520" y1="96" x2="520" y2="122" stroke="#CBD5E1" stroke-width="1.5"/>
  <polygon points="520,122 514,112 526,112" fill="#CBD5E1"/>

  <line x1="250" y1="170" x2="250" y2="184" stroke="#CBD5E1" stroke-width="1.5"/>
  <line x1="250" y1="184" x2="180" y2="184" stroke="#CBD5E1" stroke-width="1.5"/>
  <line x1="180" y1="184" x2="180" y2="196" stroke="#CBD5E1" stroke-width="1.5"/>
  <polygon points="180,196 174,186 186,186" fill="#CBD5E1"/>

  <line x1="350" y1="170" x2="350" y2="196" stroke="#CBD5E1" stroke-width="1.5"/>
  <polygon points="350,196 344,186 356,186" fill="#CBD5E1"/>

  <line x1="350" y1="244" x2="350" y2="258" stroke="#CBD5E1" stroke-width="1.5"/>
  <line x1="245" y1="258" x2="605" y2="258" stroke="#CBD5E1" stroke-width="1.5"/>
  <line x1="245" y1="258" x2="245" y2="270" stroke="#CBD5E1" stroke-width="1.5"/>
  <polygon points="245,270 239,260 251,260" fill="#CBD5E1"/>
  <line x1="425" y1="258" x2="425" y2="270" stroke="#CBD5E1" stroke-width="1.5"/>
  <polygon points="425,270 419,260 431,260" fill="#CBD5E1"/>
  <line x1="605" y1="258" x2="605" y2="270" stroke="#CBD5E1" stroke-width="1.5"/>
  <polygon points="605,270 599,260 611,260" fill="#CBD5E1"/>

  <!-- Decision annotation (right side) -->
  <rect x="768" y="48" width="78" height="48" rx="4" fill="#FFFBEB" stroke="#FCD34D" stroke-width="1"/>
  <text x="807" y="67" text-anchor="middle" font-size="9" fill="#92400E">决策点</text>
  <text x="807" y="80" text-anchor="middle" font-size="8" fill="#78350F">GeoDNS 路由策略</text>
  <text x="807" y="91" text-anchor="middle" font-size="8" fill="#78350F">多 CDN 分流比例</text>

  <rect x="768" y="122" width="78" height="48" rx="4" fill="#FFFBEB" stroke="#FCD34D" stroke-width="1"/>
  <text x="807" y="141" text-anchor="middle" font-size="9" fill="#92400E">决策点</text>
  <text x="807" y="154" text-anchor="middle" font-size="8" fill="#78350F">缓存策略体系</text>
  <text x="807" y="165" text-anchor="middle" font-size="8" fill="#78350F">动态加速边界</text>

  <rect x="768" y="196" width="78" height="48" rx="4" fill="#FFFBEB" stroke="#FCD34D" stroke-width="1"/>
  <text x="807" y="215" text-anchor="middle" font-size="9" fill="#92400E">决策点</text>
  <text x="807" y="228" text-anchor="middle" font-size="8" fill="#78350F">Origin Shield</text>
  <text x="807" y="239" text-anchor="middle" font-size="8" fill="#78350F">是否需要</text>

  <rect x="768" y="270" width="78" height="48" rx="4" fill="#FFFBEB" stroke="#FCD34D" stroke-width="1"/>
  <text x="807" y="289" text-anchor="middle" font-size="9" fill="#92400E">决策点</text>
  <text x="807" y="302" text-anchor="middle" font-size="8" fill="#78350F">源站部署模式</text>
  <text x="807" y="313" text-anchor="middle" font-size="8" fill="#78350F">多地域 vs 单地域</text>
</svg>
