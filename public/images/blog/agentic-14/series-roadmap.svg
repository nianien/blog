<svg viewBox="0 0 700 370" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif">
  <!-- Title -->
  <text x="350" y="20" font-size="13" font-weight="bold" text-anchor="middle" fill="#333">Agentic 系列路线图</text>

  <!-- ===== Phase 1 ===== -->
  <rect x="20" y="38" width="320" height="118" rx="6" fill="#e8f4f8" stroke="#0066cc" stroke-width="1.5"/>
  <text x="35" y="58" font-size="11" font-weight="bold" fill="#0066cc">Phase 1: What Is an Agent?</text>
  <text x="290" y="58" font-size="9" fill="#666">理解问题</text>

  <rect x="35" y="66" width="290" height="24" rx="4" fill="#fff" stroke="#0066cc" stroke-width="0.5"/>
  <text x="45" y="82" font-size="9" fill="#333">01 - 全景地图：建立整体认知</text>

  <rect x="35" y="94" width="290" height="24" rx="4" fill="#fff" stroke="#0066cc" stroke-width="0.5"/>
  <text x="45" y="110" font-size="9" fill="#333">02 - LLM vs Agent：定义核心概念</text>

  <rect x="35" y="122" width="290" height="24" rx="4" fill="#fff" stroke="#0066cc" stroke-width="0.5"/>
  <text x="45" y="138" font-size="9" fill="#333">03 - Agent vs Workflow：选对抽象</text>

  <!-- Arrow Phase 1 → 2 -->
  <line x1="340" y1="97" x2="359" y2="97" stroke="#666" stroke-width="1.5"/>
  <polygon points="359,93 369,97 359,101" fill="#666"/>

  <!-- ===== Phase 2 ===== -->
  <rect x="365" y="38" width="320" height="118" rx="6" fill="#fff4e8" stroke="#ff9900" stroke-width="1.5"/>
  <text x="380" y="58" font-size="11" font-weight="bold" fill="#ff9900">Phase 2: How to Program?</text>
  <text x="635" y="58" font-size="9" fill="#666">掌握技术</text>

  <rect x="380" y="66" width="290" height="24" rx="4" fill="#fff" stroke="#ff9900" stroke-width="0.5"/>
  <text x="390" y="82" font-size="9" fill="#333">04 - Control Loop：Agent 的心跳</text>

  <rect x="380" y="94" width="290" height="24" rx="4" fill="#fff" stroke="#ff9900" stroke-width="0.5"/>
  <text x="390" y="110" font-size="9" fill="#333">05 - Tool Calling：Agent 的双手</text>

  <rect x="380" y="122" width="140" height="24" rx="4" fill="#fff" stroke="#ff9900" stroke-width="0.5"/>
  <text x="390" y="138" font-size="9" fill="#333">06 - Prompt Eng.</text>

  <rect x="530" y="122" width="140" height="24" rx="4" fill="#fff" stroke="#ff9900" stroke-width="0.5"/>
  <text x="540" y="138" font-size="9" fill="#333">07 - Runtime</text>

  <!-- Arrow Phase 2 → 3 (right-angle: down from Phase 2, left, down into Phase 3) -->
  <line x1="525" y1="156" x2="525" y2="169" stroke="#666" stroke-width="1.5"/>
  <line x1="525" y1="169" x2="180" y2="169" stroke="#666" stroke-width="1.5"/>
  <line x1="180" y1="169" x2="180" y2="176" stroke="#666" stroke-width="1.5"/>
  <polygon points="176,176 180,186 184,176" fill="#666"/>

  <!-- ===== Phase 3 ===== -->
  <rect x="20" y="182" width="320" height="118" rx="6" fill="#f0e8f8" stroke="#9933cc" stroke-width="1.5"/>
  <text x="35" y="202" font-size="11" font-weight="bold" fill="#9933cc">Phase 3: How to Scale?</text>
  <text x="290" y="202" font-size="9" fill="#666">提升能力</text>

  <rect x="35" y="210" width="290" height="24" rx="4" fill="#fff" stroke="#9933cc" stroke-width="0.5"/>
  <text x="45" y="226" font-size="9" fill="#333">08 - Memory Architecture：Agent 的记忆</text>

  <rect x="35" y="238" width="290" height="24" rx="4" fill="#fff" stroke="#9933cc" stroke-width="0.5"/>
  <text x="45" y="254" font-size="9" fill="#333">09 - RAG：Agent 的知识库</text>

  <rect x="35" y="266" width="140" height="24" rx="4" fill="#fff" stroke="#9933cc" stroke-width="0.5"/>
  <text x="45" y="282" font-size="9" fill="#333">10 - Planning</text>

  <rect x="185" y="266" width="140" height="24" rx="4" fill="#fff" stroke="#9933cc" stroke-width="0.5"/>
  <text x="195" y="282" font-size="9" fill="#333">11 - Multi-Agent</text>

  <!-- Arrow Phase 3 → 4 -->
  <line x1="340" y1="241" x2="359" y2="241" stroke="#666" stroke-width="1.5"/>
  <polygon points="359,237 369,241 359,245" fill="#666"/>

  <!-- ===== Phase 4 ===== -->
  <rect x="365" y="182" width="320" height="118" rx="6" fill="#e8f8e8" stroke="#00aa33" stroke-width="2"/>
  <text x="380" y="202" font-size="11" font-weight="bold" fill="#00aa33">Phase 4: How to Ship?</text>
  <text x="635" y="202" font-size="9" fill="#666">走向生产</text>

  <rect x="380" y="210" width="290" height="24" rx="4" fill="#fff" stroke="#00aa33" stroke-width="0.5"/>
  <text x="390" y="226" font-size="9" fill="#333">12 - Frameworks：框架的价值与边界</text>

  <rect x="380" y="238" width="290" height="24" rx="4" fill="#fff" stroke="#00aa33" stroke-width="0.5"/>
  <text x="390" y="254" font-size="9" fill="#333">13 - MCP &amp; Protocols：工具的标准化</text>

  <rect x="380" y="266" width="140" height="24" rx="4" fill="#fff8e8" stroke="#00aa33" stroke-width="1.5"/>
  <text x="390" y="282" font-size="9" font-weight="bold" fill="#00aa33">14 - Production ← 本文</text>

  <rect x="530" y="266" width="140" height="24" rx="4" fill="#fff" stroke="#00aa33" stroke-width="0.5"/>
  <text x="540" y="282" font-size="9" fill="#333">15 - Computer Use</text>

  <!-- Bottom labels -->
  <text x="180" y="325" font-size="9" text-anchor="middle" fill="#0066cc">是什么</text>
  <line x1="180" y1="330" x2="350" y2="330" stroke="#ccc" stroke-width="1"/>
  <polygon points="346,327 356,330 346,333" fill="#ccc"/>
  <text x="350" y="345" font-size="9" text-anchor="middle" fill="#ff9900">怎么做</text>
  <line x1="350" y1="350" x2="490" y2="350" stroke="#ccc" stroke-width="1"/>
  <polygon points="486,347 496,350 486,353" fill="#ccc"/>
  <text x="490" y="365" font-size="9" text-anchor="middle" fill="#9933cc">做得更好</text>
  <line x1="510" y1="350" x2="620" y2="350" stroke="#ccc" stroke-width="1"/>
  <polygon points="616,347 626,350 616,353" fill="#ccc"/>
  <text x="640" y="345" font-size="9" text-anchor="middle" fill="#00aa33">上生产</text>
</svg>
