<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif">
  <!-- Title -->
  <text x="400" y="28" font-size="16" font-weight="bold" text-anchor="middle" fill="#0f172a">Demo → Production 思维转变</text>

  <!-- Left column: Lab / Demo -->
  <rect x="40" y="50" width="340" height="350" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="210" y="78" font-size="14" font-weight="bold" text-anchor="middle" fill="#b91c1c">Lab / Demo 阶段</text>

  <!-- Right column: Production -->
  <rect x="420" y="50" width="340" height="350" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5"/>
  <text x="590" y="78" font-size="14" font-weight="bold" text-anchor="middle" fill="#166534">Production 阶段</text>

  <!-- Arrow between columns -->
  <line x1="380" y1="225" x2="408" y2="225" stroke="#6b7280" stroke-width="2"/>
  <polygon points="408,220 420,225 408,230" fill="#6b7280"/>

  <!-- Row 1: Happy Path vs Edge Cases -->
  <rect x="60" y="95" width="300" height="45" rx="6" fill="#fee2e2" stroke="#fca5a5" stroke-width="1"/>
  <text x="210" y="113" font-size="11" font-weight="bold" text-anchor="middle" fill="#991b1b">只测 Happy Path</text>
  <text x="210" y="130" font-size="10" text-anchor="middle" fill="#7f1d1d">几个 demo case 就够了</text>

  <rect x="440" y="95" width="300" height="45" rx="6" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
  <text x="590" y="113" font-size="11" font-weight="bold" text-anchor="middle" fill="#166534">覆盖 Edge Cases</text>
  <text x="590" y="130" font-size="10" text-anchor="middle" fill="#14532d">系统性评估 + 回归测试</text>

  <!-- Row 2: No Observability vs Full Tracing -->
  <rect x="60" y="155" width="300" height="45" rx="6" fill="#fee2e2" stroke="#fca5a5" stroke-width="1"/>
  <text x="210" y="173" font-size="11" font-weight="bold" text-anchor="middle" fill="#991b1b">print() 调试</text>
  <text x="210" y="190" font-size="10" text-anchor="middle" fill="#7f1d1d">出了问题看 stdout</text>

  <rect x="440" y="155" width="300" height="45" rx="6" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
  <text x="590" y="173" font-size="11" font-weight="bold" text-anchor="middle" fill="#166534">结构化可观测</text>
  <text x="590" y="190" font-size="10" text-anchor="middle" fill="#14532d">Trace / Metrics / Logging / Alerting</text>

  <!-- Row 3: Cost Ignored vs Cost Controlled -->
  <rect x="60" y="215" width="300" height="45" rx="6" fill="#fee2e2" stroke="#fca5a5" stroke-width="1"/>
  <text x="210" y="233" font-size="11" font-weight="bold" text-anchor="middle" fill="#991b1b">不关心成本</text>
  <text x="210" y="250" font-size="10" text-anchor="middle" fill="#7f1d1d">用最贵模型、不限 token</text>

  <rect x="440" y="215" width="300" height="45" rx="6" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
  <text x="590" y="233" font-size="11" font-weight="bold" text-anchor="middle" fill="#166534">成本可控</text>
  <text x="590" y="250" font-size="10" text-anchor="middle" fill="#14532d">Budget Guard / Model Tiering / Cache</text>

  <!-- Row 4: No Safety vs Defense in Depth -->
  <rect x="60" y="275" width="300" height="45" rx="6" fill="#fee2e2" stroke="#fca5a5" stroke-width="1"/>
  <text x="210" y="293" font-size="11" font-weight="bold" text-anchor="middle" fill="#991b1b">信任用户输入</text>
  <text x="210" y="310" font-size="10" text-anchor="middle" fill="#7f1d1d">没有 guardrail</text>

  <rect x="440" y="275" width="300" height="45" rx="6" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
  <text x="590" y="293" font-size="11" font-weight="bold" text-anchor="middle" fill="#166534">纵深防御</text>
  <text x="590" y="310" font-size="10" text-anchor="middle" fill="#14532d">Prompt Guard / Sandbox / RBAC / HITL</text>

  <!-- Row 5: Manual Deploy vs CI/CD -->
  <rect x="60" y="335" width="300" height="45" rx="6" fill="#fee2e2" stroke="#fca5a5" stroke-width="1"/>
  <text x="210" y="353" font-size="11" font-weight="bold" text-anchor="middle" fill="#991b1b">手动部署</text>
  <text x="210" y="370" font-size="10" text-anchor="middle" fill="#7f1d1d">改了 prompt 直接推上去</text>

  <rect x="440" y="335" width="300" height="45" rx="6" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
  <text x="590" y="353" font-size="11" font-weight="bold" text-anchor="middle" fill="#166534">渐进式发布</text>
  <text x="590" y="370" font-size="10" text-anchor="middle" fill="#14532d">Prompt Version / Gradual Rollout / Rollback</text>
</svg>