<svg viewBox="0 0 720 340" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif">
  <!-- Title -->
  <text x="360" y="24" font-size="14" font-weight="bold" text-anchor="middle" fill="#263238">模式三：Pipeline 成本分析</text>

  <!-- 5-stage pipeline -->
  <!-- Stage 1: Draft -->
  <rect x="15" y="48" width="120" height="65" rx="6" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="75" y="68" font-size="10" font-weight="bold" text-anchor="middle" fill="#1b5e20">Draft Agent</text>
  <text x="75" y="84" font-size="9" text-anchor="middle" fill="#37474f">生成初稿</text>
  <text x="75" y="100" font-size="8" text-anchor="middle" fill="#78909c">5K tok · 4o-mini · 4s</text>

  <line x1="135" y1="80" x2="148" y2="80" stroke="#666" stroke-width="1.5"/>
  <polygon points="148,76 158,80 148,84" fill="#666"/>

  <!-- Stage 2: Review -->
  <rect x="160" y="48" width="120" height="65" rx="6" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="220" y="68" font-size="10" font-weight="bold" text-anchor="middle" fill="#1b5e20">Review Agent</text>
  <text x="220" y="84" font-size="9" text-anchor="middle" fill="#37474f">审查准确性</text>
  <text x="220" y="100" font-size="8" text-anchor="middle" fill="#78909c">4K tok · 4o-mini · 3s</text>

  <line x1="280" y1="80" x2="293" y2="80" stroke="#666" stroke-width="1.5"/>
  <polygon points="293,76 303,80 293,84" fill="#666"/>

  <!-- Stage 3: Edit -->
  <rect x="305" y="48" width="120" height="65" rx="6" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="365" y="68" font-size="10" font-weight="bold" text-anchor="middle" fill="#1b5e20">Edit Agent</text>
  <text x="365" y="84" font-size="9" text-anchor="middle" fill="#37474f">改进措辞</text>
  <text x="365" y="100" font-size="8" text-anchor="middle" fill="#78909c">4K tok · 4o-mini · 3s</text>

  <line x1="425" y1="80" x2="438" y2="80" stroke="#666" stroke-width="1.5"/>
  <polygon points="438,76 448,80 438,84" fill="#666"/>

  <!-- Stage 4: FactCheck (GPT-4o, highlighted) -->
  <rect x="450" y="48" width="120" height="65" rx="6" fill="#fff3e0" stroke="#e65100" stroke-width="1.5"/>
  <text x="510" y="68" font-size="10" font-weight="bold" text-anchor="middle" fill="#bf360c">FactCheck</text>
  <text x="510" y="84" font-size="9" text-anchor="middle" fill="#37474f">验证数据</text>
  <text x="510" y="100" font-size="8" text-anchor="middle" fill="#78909c">3K tok · GPT-4o · 4s</text>

  <line x1="570" y1="80" x2="583" y2="80" stroke="#666" stroke-width="1.5"/>
  <polygon points="583,76 593,80 583,84" fill="#666"/>

  <!-- Stage 5: Format -->
  <rect x="595" y="48" width="110" height="65" rx="6" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="650" y="68" font-size="10" font-weight="bold" text-anchor="middle" fill="#1b5e20">Format</text>
  <text x="650" y="84" font-size="9" text-anchor="middle" fill="#37474f">排版调整</text>
  <text x="650" y="100" font-size="8" text-anchor="middle" fill="#78909c">2K tok · 4o-mini · 2s</text>

  <!-- Serial execution note -->
  <text x="360" y="135" font-size="10" text-anchor="middle" fill="#546e7a">全部串行执行：4s + 3s + 3s + 4s + 2s = 16s</text>

  <!-- Cost breakdown bar -->
  <rect x="30" y="152" width="660" height="38" rx="6" fill="#f5f5f5" stroke="#e0e0e0" stroke-width="1"/>
  <text x="50" y="172" font-size="10" fill="#37474f">成本组成：</text>
  <!-- Green segments (4o-mini) -->
  <rect x="140" y="158" width="340" height="26" rx="4" fill="#C8E6C9" stroke="#43A047" stroke-width="1"/>
  <text x="310" y="176" font-size="9" text-anchor="middle" fill="#1b5e20">GPT-4o-mini: $0.045 (4 个 Agent)</text>
  <!-- Orange segment (4o) -->
  <rect x="484" y="158" width="190" height="26" rx="4" fill="#FFCCBC" stroke="#E64A19" stroke-width="1"/>
  <text x="579" y="176" font-size="9" text-anchor="middle" fill="#BF360C">GPT-4o: $0.21 (FactCheck)</text>

  <!-- Summary box -->
  <rect x="30" y="210" width="660" height="90" rx="6" fill="#f5f5f5" stroke="#bdbdbd" stroke-width="1"/>

  <text x="50" y="234" font-size="11" font-weight="bold" fill="#263238">汇总</text>
  <text x="50" y="256" font-size="10" fill="#37474f">总 Token: 18,000（四种模式中第二低）</text>
  <text x="50" y="274" font-size="10" fill="#37474f">5 个阶段，5 次 LLM 调用</text>
  <text x="50" y="292" font-size="10" fill="#37474f">关键成本：FactCheck 占总成本的 82%</text>

  <line x1="370" y1="220" x2="370" y2="294" stroke="#e0e0e0" stroke-width="1"/>

  <text x="390" y="234" font-size="11" font-weight="bold" fill="#263238">成本与时间</text>

  <rect x="390" y="244" width="70" height="22" rx="4" fill="#FFF9C4" stroke="#F9A825" stroke-width="1"/>
  <text x="425" y="260" font-size="11" font-weight="bold" text-anchor="middle" fill="#F57F17">$0.26</text>
  <text x="472" y="260" font-size="10" fill="#37474f">总成本（中等）</text>

  <rect x="390" y="272" width="60" height="22" rx="4" fill="#C8E6C9" stroke="#43A047" stroke-width="1"/>
  <text x="420" y="288" font-size="11" font-weight="bold" text-anchor="middle" fill="#1B5E20">16s</text>
  <text x="462" y="288" font-size="10" fill="#37474f">执行时间（较快）</text>
</svg>