<svg viewBox="0 0 600 300" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif">
  <!-- Title -->
  <text x="300" y="22" font-size="14" font-weight="bold" text-anchor="middle" fill="#333">死锁场景示例</text>

  <!-- Agent A -->
  <rect x="60" y="50" width="180" height="50" rx="6" fill="#ffccbc" stroke="#d84315" stroke-width="1.5"/>
  <text x="150" y="72" font-size="12" font-weight="bold" text-anchor="middle" fill="#d84315">Agent A</text>
  <text x="150" y="89" font-size="9" text-anchor="middle" fill="#666">请 Agent B 先确认方案</text>

  <!-- Agent B -->
  <rect x="360" y="50" width="180" height="50" rx="6" fill="#ffccbc" stroke="#d84315" stroke-width="1.5"/>
  <text x="450" y="72" font-size="12" font-weight="bold" text-anchor="middle" fill="#d84315">Agent B</text>
  <text x="450" y="89" font-size="9" text-anchor="middle" fill="#666">请 Agent A 先提供数据</text>

  <!-- A waits for B: down arrow -->
  <line x1="150" y1="100" x2="150" y2="125" stroke="#333" stroke-width="1.5"/>
  <polygon points="146,125 150,135 154,125" fill="#333"/>

  <rect x="85" y="138" width="130" height="32" rx="4" fill="#fff9c4" stroke="#f57f17" stroke-width="1.5"/>
  <text x="150" y="159" font-size="10" text-anchor="middle" fill="#666">等待 B...</text>

  <!-- B waits for A: down arrow -->
  <line x1="450" y1="100" x2="450" y2="125" stroke="#333" stroke-width="1.5"/>
  <polygon points="446,125 450,135 454,125" fill="#333"/>

  <rect x="385" y="138" width="130" height="32" rx="4" fill="#fff9c4" stroke="#f57f17" stroke-width="1.5"/>
  <text x="450" y="159" font-size="10" text-anchor="middle" fill="#666">等待 A...</text>

  <!-- Circular dependency arrows (dashed) -->
  <line x1="215" y1="154" x2="383" y2="154" stroke="#d32f2f" stroke-width="2" stroke-dasharray="5,4"/>
  <polygon points="383,150 393,154 383,158" fill="#d32f2f"/>

  <!-- Deadlock warning box -->
  <rect x="120" y="200" width="360" height="38" rx="4" fill="none" stroke="#d32f2f" stroke-width="2" stroke-dasharray="5,4"/>
  <text x="300" y="224" font-size="12" font-weight="bold" text-anchor="middle" fill="#d32f2f">→ 无限等待：死锁形成</text>

  <!-- Solution hint -->
  <text x="300" y="270" font-size="10" text-anchor="middle" fill="#666">解决方案：超时、外部仲裁、环形等待检测</text>
</svg>
