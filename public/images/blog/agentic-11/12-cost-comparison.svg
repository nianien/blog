<svg viewBox="0 0 680 310" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif">

  <!-- Left column: Single-Agent -->
  <text x="160" y="22" font-size="13" font-weight="bold" text-anchor="middle" fill="#333">Single-Agent</text>

  <!-- Card -->
  <rect x="20" y="38" width="280" height="150" rx="10" fill="#fff" stroke="#E0E0E0" stroke-width="1.5"/>

  <!-- Formula -->
  <text x="40" y="64" font-size="10" fill="#888">计算公式</text>
  <text x="40" y="84" font-size="10" font-family="'SF Mono', Menlo, monospace" fill="#555">System Prompt × 1</text>
  <text x="40" y="100" font-size="10" font-family="'SF Mono', Menlo, monospace" fill="#555">+ (Context + Response) × N</text>

  <line x1="40" y1="112" x2="280" y2="112" stroke="#eee" stroke-width="1"/>

  <text x="40" y="132" font-size="10" fill="#888">估算（5 轮迭代）</text>
  <text x="40" y="152" font-size="10" font-family="'SF Mono', Menlo, monospace" fill="#555">~1,000 + ~3,000 × 5</text>

  <!-- Total badge -->
  <rect x="40" y="162" width="120" height="20" rx="10" fill="#E8F5E9" stroke="none"/>
  <text x="100" y="176" font-size="10" font-weight="bold" text-anchor="middle" fill="#2e7d32">= ~16,000 tokens</text>

  <!-- Divider -->
  <line x1="330" y1="30" x2="330" y2="200" stroke="#E0E0E0" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Right column: Multi-Agent -->
  <text x="500" y="22" font-size="13" font-weight="bold" text-anchor="middle" fill="#333">Multi-Agent (Sup + 3W)</text>

  <!-- Card -->
  <rect x="360" y="38" width="300" height="150" rx="10" fill="#fff" stroke="#E0E0E0" stroke-width="1.5"/>

  <!-- Breakdown rows -->
  <text x="380" y="62" font-size="10" fill="#555">Supervisor 分解</text>
  <text x="640" y="62" font-size="10" text-anchor="end" fill="#888">~4,000</text>

  <text x="380" y="82" font-size="10" fill="#555">Worker A 执行</text>
  <text x="640" y="82" font-size="10" text-anchor="end" fill="#888">~8,000</text>

  <text x="380" y="102" font-size="10" fill="#555">Worker B 执行</text>
  <text x="640" y="102" font-size="10" text-anchor="end" fill="#888">~8,000</text>

  <text x="380" y="122" font-size="10" fill="#555">Worker C 执行</text>
  <text x="640" y="122" font-size="10" text-anchor="end" fill="#888">~8,000</text>

  <text x="380" y="142" font-size="10" fill="#555">Supervisor 合成</text>
  <text x="640" y="142" font-size="10" text-anchor="end" fill="#888">~6,000</text>

  <line x1="380" y1="152" x2="640" y2="152" stroke="#eee" stroke-width="1"/>

  <!-- Total -->
  <text x="380" y="170" font-size="10" font-weight="bold" fill="#333">Total</text>
  <text x="640" y="170" font-size="10" font-weight="bold" text-anchor="end" fill="#333">~34,000 tokens</text>

  <!-- Comparison badge -->
  <rect x="230" y="205" width="220" height="32" rx="16" fill="#FFF3E0" stroke="#E65100" stroke-width="1.5"/>
  <text x="340" y="226" font-size="11" font-weight="bold" text-anchor="middle" fill="#E65100">Multi-Agent ≈ 2× 成本</text>

  <!-- Bottom note -->
  <text x="340" y="266" font-size="9" text-anchor="middle" fill="#999">如果 Worker 内部也有多轮迭代，消耗会更高</text>
  <text x="340" y="282" font-size="9" text-anchor="middle" fill="#999">选择 Multi-Agent 必须有明确的收益：更好的质量、更强的专业化、更高的可靠性</text>
</svg>
