<svg viewBox="0 0 820 480" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif">
  <defs>
    <linearGradient id="bg-err" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FEF2F2"/><stop offset="100%" stop-color="#FEE2E2"/>
    </linearGradient>
    <linearGradient id="bg-decide" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FEFCE8"/><stop offset="100%" stop-color="#FEF9C3"/>
    </linearGradient>
    <linearGradient id="bg-ok" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ECFDF5"/><stop offset="100%" stop-color="#D1FAE5"/>
    </linearGradient>
    <filter id="s"><feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/></filter>
  </defs>

  <!-- Title -->
  <text x="410" y="24" font-size="15" font-weight="700" text-anchor="middle" fill="#0F172A">Worker 失败处理决策树</text>

  <!-- Step 1: Worker 执行失败 -->
  <rect x="280" y="44" width="200" height="40" rx="8" fill="url(#bg-err)" stroke="#FCA5A5" stroke-width="1.5" filter="url(#s)"/>
  <text x="380" y="69" font-size="12" font-weight="700" text-anchor="middle" fill="#991B1B">Worker 执行失败</text>

  <!-- Arrow down -->
  <line x1="380" y1="84" x2="380" y2="104" stroke="#94A3B8" stroke-width="1.5"/>
  <polygon points="380,112 375,104 385,104" fill="#94A3B8"/>

  <!-- Decision 1: 是否可重试？ -->
  <rect x="280" y="114" width="200" height="40" rx="8" fill="url(#bg-decide)" stroke="#FDE68A" stroke-width="1.5" filter="url(#s)"/>
  <text x="380" y="139" font-size="12" font-weight="600" text-anchor="middle" fill="#92400E">是否可重试？</text>

  <!-- Yes → right to Retry -->
  <line x1="480" y1="134" x2="530" y2="134" stroke="#94A3B8" stroke-width="1.5"/>
  <polygon points="538,134 530,129 530,139" fill="#94A3B8"/>
  <text x="505" y="128" font-size="10" fill="#64748B">是</text>

  <rect x="540" y="114" width="170" height="40" rx="8" fill="url(#bg-ok)" stroke="#6EE7B7" stroke-width="1.5" filter="url(#s)"/>
  <text x="625" y="139" font-size="12" font-weight="600" text-anchor="middle" fill="#065F46">重试（最多 N 次）</text>

  <!-- Arrow down from Retry -->
  <line x1="625" y1="154" x2="625" y2="174" stroke="#94A3B8" stroke-width="1.5"/>
  <polygon points="625,182 620,174 630,174" fill="#94A3B8"/>

  <!-- Decision: 成功？ -->
  <rect x="540" y="184" width="170" height="40" rx="8" fill="url(#bg-decide)" stroke="#FDE68A" stroke-width="1.5" filter="url(#s)"/>
  <text x="625" y="209" font-size="12" font-weight="600" text-anchor="middle" fill="#92400E">成功？</text>

  <!-- Yes from 成功 → down to 继续 -->
  <line x1="625" y1="224" x2="625" y2="254" stroke="#94A3B8" stroke-width="1.5"/>
  <polygon points="625,262 620,254 630,254" fill="#94A3B8"/>
  <text x="636" y="244" font-size="10" fill="#64748B">是</text>

  <rect x="560" y="264" width="130" height="36" rx="8" fill="url(#bg-ok)" stroke="#6EE7B7" stroke-width="1.5" filter="url(#s)"/>
  <text x="625" y="287" font-size="12" font-weight="600" text-anchor="middle" fill="#065F46">继续</text>

  <!-- No from 成功 → right then down, loop back to 有替代 Worker -->
  <line x1="710" y1="204" x2="760" y2="204" stroke="#94A3B8" stroke-width="1.5"/>
  <text x="730" y="198" font-size="10" fill="#64748B">否</text>
  <line x1="760" y1="204" x2="760" y2="334" stroke="#94A3B8" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="760" y1="334" x2="498" y2="334" stroke="#94A3B8" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="490,334 498,329 498,339" fill="#94A3B8"/>

  <!-- No → down from Decision 1 -->
  <line x1="380" y1="154" x2="380" y2="194" stroke="#94A3B8" stroke-width="1.5"/>
  <polygon points="380,202 375,194 385,194" fill="#94A3B8"/>
  <text x="392" y="180" font-size="10" fill="#64748B">否</text>

  <!-- Decision 2: 有替代 Worker？ -->
  <rect x="280" y="204" width="200" height="40" rx="8" fill="url(#bg-decide)" stroke="#FDE68A" stroke-width="1.5" filter="url(#s)"/>
  <text x="380" y="229" font-size="12" font-weight="600" text-anchor="middle" fill="#92400E">有替代 Worker？</text>

  <!-- Yes → right to Fallback -->
  <line x1="480" y1="224" x2="530" y2="224" stroke="#94A3B8" stroke-width="1.5"/>
  <polygon points="538,224 530,219 530,229" fill="#94A3B8"/>
  <text x="505" y="218" font-size="10" fill="#64748B">是</text>

  <rect x="540" y="316" width="170" height="40" rx="8" fill="url(#bg-ok)" stroke="#6EE7B7" stroke-width="1.5" filter="url(#s)"/>
  <text x="625" y="341" font-size="12" font-weight="600" text-anchor="middle" fill="#065F46">分配给替代 Worker</text>

  <!-- Arrow down from 分配 → 继续 -->
  <line x1="625" y1="356" x2="625" y2="376" stroke="#94A3B8" stroke-width="1.5"/>
  <polygon points="625,384 620,376 630,376" fill="#94A3B8"/>

  <rect x="560" y="386" width="130" height="36" rx="8" fill="url(#bg-ok)" stroke="#6EE7B7" stroke-width="1.5" filter="url(#s)"/>
  <text x="625" y="409" font-size="12" font-weight="600" text-anchor="middle" fill="#065F46">继续</text>

  <!-- No → down from Decision 2 -->
  <line x1="380" y1="244" x2="380" y2="284" stroke="#94A3B8" stroke-width="1.5"/>
  <polygon points="380,292 375,284 385,284" fill="#94A3B8"/>
  <text x="392" y="270" font-size="10" fill="#64748B">否</text>

  <!-- Decision 3: 关键路径？ -->
  <rect x="280" y="294" width="200" height="40" rx="8" fill="url(#bg-decide)" stroke="#FDE68A" stroke-width="1.5" filter="url(#s)"/>
  <text x="380" y="319" font-size="12" font-weight="600" text-anchor="middle" fill="#92400E">关键路径？</text>

  <!-- Yes → left: 整体任务失败 -->
  <line x1="280" y1="314" x2="220" y2="314" stroke="#94A3B8" stroke-width="1.5"/>
  <polygon points="212,314 220,309 220,319" fill="#94A3B8"/>
  <text x="246" y="308" font-size="10" fill="#64748B">是</text>

  <rect x="60" y="294" width="150" height="40" rx="8" fill="url(#bg-err)" stroke="#FCA5A5" stroke-width="1.5" filter="url(#s)"/>
  <text x="135" y="319" font-size="12" font-weight="700" text-anchor="middle" fill="#991B1B">整体任务失败</text>

  <!-- No → down: 降级处理 -->
  <line x1="380" y1="334" x2="380" y2="374" stroke="#94A3B8" stroke-width="1.5"/>
  <polygon points="380,382 375,374 385,374" fill="#94A3B8"/>
  <text x="392" y="360" font-size="10" fill="#64748B">否</text>

  <rect x="300" y="384" width="160" height="52" rx="8" fill="url(#bg-ok)" stroke="#6EE7B7" stroke-width="1.5" filter="url(#s)"/>
  <text x="380" y="407" font-size="12" font-weight="600" text-anchor="middle" fill="#065F46">降级处理</text>
  <text x="380" y="424" font-size="10" text-anchor="middle" fill="#64748B">（跳过该子任务）</text>
</svg>
