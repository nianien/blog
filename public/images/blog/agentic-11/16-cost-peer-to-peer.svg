<svg viewBox="0 0 720 430" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif">
  <!-- Title -->
  <text x="360" y="24" font-size="14" font-weight="bold" text-anchor="middle" fill="#263238">模式二：Peer-to-Peer 成本分析</text>

  <!-- Round 1 -->
  <rect x="30" y="42" width="200" height="115" rx="6" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="130" y="62" font-size="11" font-weight="bold" text-anchor="middle" fill="#1b5e20">Round 1 (9s)</text>
  <text x="45" y="84" font-size="10" fill="#37474f">Agent A 撰写初稿</text>
  <text x="185" y="84" font-size="9" text-anchor="end" fill="#78909c">5K tok</text>
  <text x="45" y="102" font-size="10" fill="#37474f">Agent B 技术审稿</text>
  <text x="185" y="102" font-size="9" text-anchor="end" fill="#78909c">4K tok</text>
  <text x="45" y="120" font-size="10" fill="#37474f">Agent C 检查结构</text>
  <text x="185" y="120" font-size="9" text-anchor="end" fill="#78909c">3K tok</text>
  <text x="130" y="148" font-size="9" text-anchor="middle" fill="#78909c">小计: 12,000 tok</text>

  <!-- Arrow R1 → R2 -->
  <line x1="230" y1="99" x2="258" y2="99" stroke="#666" stroke-width="1.5"/>
  <polygon points="258,95 268,99 258,103" fill="#666"/>

  <!-- Round 2 -->
  <rect x="270" y="42" width="200" height="115" rx="6" fill="#fff3e0" stroke="#e65100" stroke-width="1.5"/>
  <text x="370" y="62" font-size="11" font-weight="bold" text-anchor="middle" fill="#bf360c">Round 2 (9s)</text>
  <text x="285" y="84" font-size="10" fill="#37474f">Agent A 修改稿件</text>
  <text x="425" y="84" font-size="9" text-anchor="end" fill="#78909c">5K tok</text>
  <text x="285" y="102" font-size="10" fill="#37474f">Agent B 技术复查</text>
  <text x="425" y="102" font-size="9" text-anchor="end" fill="#78909c">3K tok</text>
  <text x="285" y="120" font-size="10" fill="#37474f">Agent C 优化措辞</text>
  <text x="425" y="120" font-size="9" text-anchor="end" fill="#78909c">2K tok</text>
  <text x="370" y="148" font-size="9" text-anchor="middle" fill="#78909c">小计: 10,000 tok</text>

  <!-- Arrow R2 → R3 -->
  <line x1="470" y1="99" x2="498" y2="99" stroke="#666" stroke-width="1.5"/>
  <polygon points="498,95 508,99 498,103" fill="#666"/>

  <!-- Round 3 -->
  <rect x="510" y="42" width="185" height="115" rx="6" fill="#f3e5f5" stroke="#7b1fa2" stroke-width="1.5"/>
  <text x="602" y="62" font-size="11" font-weight="bold" text-anchor="middle" fill="#4a148c">Round 3 (4s)</text>
  <text x="525" y="84" font-size="10" fill="#37474f">Agent A 最终微调</text>
  <text x="650" y="84" font-size="9" text-anchor="end" fill="#78909c">3K tok</text>
  <text x="525" y="102" font-size="10" fill="#37474f">共识检测</text>
  <text x="650" y="102" font-size="9" text-anchor="end" fill="#78909c">2K tok</text>
  <text x="602" y="148" font-size="9" text-anchor="middle" fill="#78909c">小计: 5,000 tok</text>

  <!-- Key insight: all rounds are sequential -->
  <text x="360" y="185" font-size="10" text-anchor="middle" fill="#546e7a">所有轮次串行执行：9s + 9s + 4s = 22s</text>

  <!-- Model usage bar -->
  <rect x="30" y="200" width="660" height="28" rx="6" fill="#E1BEE7" stroke="#7B1FA2" stroke-width="1"/>
  <text x="360" y="219" font-size="10" font-weight="bold" text-anchor="middle" fill="#4A148C">全部使用 GPT-4o-mini（最便宜模型）</text>

  <!-- Summary box -->
  <rect x="30" y="248" width="660" height="90" rx="6" fill="#f5f5f5" stroke="#bdbdbd" stroke-width="1"/>

  <text x="50" y="272" font-size="11" font-weight="bold" fill="#263238">汇总</text>

  <text x="50" y="294" font-size="10" fill="#37474f">总 Token: 27,000</text>
  <text x="50" y="312" font-size="10" fill="#37474f">GPT-4o-mini: 所有调用</text>
  <text x="50" y="330" font-size="10" fill="#37474f">3 轮协商，8 次 LLM 调用</text>

  <line x1="340" y1="258" x2="340" y2="332" stroke="#e0e0e0" stroke-width="1"/>

  <text x="360" y="272" font-size="11" font-weight="bold" fill="#263238">成本与时间</text>

  <rect x="360" y="282" width="60" height="22" rx="4" fill="#C8E6C9" stroke="#43A047" stroke-width="1"/>
  <text x="390" y="298" font-size="11" font-weight="bold" text-anchor="middle" fill="#1B5E20">$0.08</text>
  <text x="432" y="298" font-size="10" fill="#37474f">总成本（最低!）</text>

  <rect x="360" y="310" width="60" height="22" rx="4" fill="#FFCDD2" stroke="#E53935" stroke-width="1"/>
  <text x="390" y="326" font-size="11" font-weight="bold" text-anchor="middle" fill="#B71C1C">22s</text>
  <text x="432" y="326" font-size="10" fill="#37474f">执行时间（最慢）</text>

  <!-- Trade-off annotation -->
  <rect x="130" y="360" width="460" height="50" rx="6" fill="#FFF9C4" stroke="#F9A825" stroke-width="1"/>
  <text x="360" y="382" font-size="10" font-weight="bold" text-anchor="middle" fill="#F57F17">权衡：成本最低，但执行最慢、质量依赖协商轮次</text>
  <text x="360" y="398" font-size="9" text-anchor="middle" fill="#78909c">质量/成本比: 12.5（四种模式最高）</text>
</svg>