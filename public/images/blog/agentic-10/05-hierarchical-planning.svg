<svg viewBox="0 0 960 430" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif">
  <!-- Title -->
  <text x="480" y="24" font-size="14" font-weight="bold" text-anchor="middle" fill="#333">分层规划树 - 递归分解</text>

  <!-- Level labels -->
  <text x="12" y="72" font-size="10" font-weight="bold" fill="#0066cc">Strategic</text>
  <text x="12" y="168" font-size="10" font-weight="bold" fill="#ff9900">Tactical</text>
  <text x="12" y="278" font-size="10" font-weight="bold" fill="#00aa33">Actions</text>

  <!-- ===== Strategic Level: Root Goal ===== -->
  <rect x="310" y="47" width="340" height="45" rx="6" fill="#e8f4f8" stroke="#0066cc" stroke-width="2"/>
  <text x="480" y="67" font-size="12" font-weight="bold" text-anchor="middle" fill="#0066cc">高层目标：设计用户权限系统</text>
  <text x="480" y="82" font-size="10" text-anchor="middle" fill="#666">高层规划器 (Strategic Planner)</text>

  <!-- T-split from root: stem down → horizontal bar → 3 drops -->
  <line x1="480" y1="92" x2="480" y2="114" stroke="#0066cc" stroke-width="2"/>
  <line x1="160" y1="114" x2="800" y2="114" stroke="#0066cc" stroke-width="2"/>
  <line x1="160" y1="114" x2="160" y2="137" stroke="#0066cc" stroke-width="2"/>
  <polygon points="156,137 160,147 164,137" fill="#0066cc"/>
  <line x1="480" y1="114" x2="480" y2="137" stroke="#0066cc" stroke-width="2"/>
  <polygon points="476,137 480,147 484,137" fill="#0066cc"/>
  <line x1="800" y1="114" x2="800" y2="137" stroke="#0066cc" stroke-width="2"/>
  <polygon points="796,137 800,147 804,137" fill="#0066cc"/>

  <!-- ===== Tactical Level ===== -->
  <!-- Subgoal 1 (center 160) -->
  <rect x="60" y="143" width="200" height="45" rx="6" fill="#fff4e8" stroke="#ff9900" stroke-width="2"/>
  <text x="160" y="163" font-size="11" font-weight="bold" text-anchor="middle" fill="#ff9900">子目标1：设计数据模型</text>
  <text x="160" y="178" font-size="9" text-anchor="middle" fill="#666">低层规划器 (Tactical)</text>

  <!-- Subgoal 2 (center 480) -->
  <rect x="380" y="143" width="200" height="45" rx="6" fill="#fff4e8" stroke="#ff9900" stroke-width="2"/>
  <text x="480" y="163" font-size="11" font-weight="bold" text-anchor="middle" fill="#ff9900">子目标2：实现认证模块</text>
  <text x="480" y="178" font-size="9" text-anchor="middle" fill="#666">低层规划器 (Tactical)</text>

  <!-- Subgoal 3 (center 800) -->
  <rect x="700" y="143" width="200" height="45" rx="6" fill="#fff4e8" stroke="#ff9900" stroke-width="2"/>
  <text x="800" y="163" font-size="11" font-weight="bold" text-anchor="middle" fill="#ff9900">子目标3：实现授权模块</text>
  <text x="800" y="178" font-size="9" text-anchor="middle" fill="#666">低层规划器 (Tactical)</text>

  <!-- ===== Actions Level ===== -->

  <!-- T-split from Subgoal 1 → 3 actions -->
  <line x1="160" y1="188" x2="160" y2="210" stroke="#ff9900" stroke-width="1.5"/>
  <line x1="65" y1="210" x2="255" y2="210" stroke="#ff9900" stroke-width="1.5"/>
  <line x1="65" y1="210" x2="65" y2="227" stroke="#ff9900" stroke-width="1.5"/>
  <polygon points="61,227 65,237 69,227" fill="#ff9900"/>
  <line x1="160" y1="210" x2="160" y2="227" stroke="#ff9900" stroke-width="1.5"/>
  <polygon points="156,227 160,237 164,227" fill="#ff9900"/>
  <line x1="255" y1="210" x2="255" y2="227" stroke="#ff9900" stroke-width="1.5"/>
  <polygon points="251,227 255,237 259,227" fill="#ff9900"/>

  <!-- Action boxes for Subgoal 1 -->
  <rect x="20" y="233" width="90" height="32" rx="4" fill="#e8f8e8" stroke="#00aa33" stroke-width="1.5"/>
  <text x="65" y="253" font-size="9" text-anchor="middle" fill="#333">分析需求</text>
  <rect x="115" y="233" width="90" height="32" rx="4" fill="#e8f8e8" stroke="#00aa33" stroke-width="1.5"/>
  <text x="160" y="253" font-size="9" text-anchor="middle" fill="#333">设计 ER 图</text>
  <rect x="210" y="233" width="90" height="32" rx="4" fill="#e8f8e8" stroke="#00aa33" stroke-width="1.5"/>
  <text x="255" y="253" font-size="9" text-anchor="middle" fill="#333">定义 API Schema</text>

  <!-- T-split from Subgoal 2 → 2 actions -->
  <line x1="480" y1="188" x2="480" y2="210" stroke="#ff9900" stroke-width="1.5"/>
  <line x1="425" y1="210" x2="535" y2="210" stroke="#ff9900" stroke-width="1.5"/>
  <line x1="425" y1="210" x2="425" y2="227" stroke="#ff9900" stroke-width="1.5"/>
  <polygon points="421,227 425,237 429,227" fill="#ff9900"/>
  <line x1="535" y1="210" x2="535" y2="227" stroke="#ff9900" stroke-width="1.5"/>
  <polygon points="531,227 535,237 539,227" fill="#ff9900"/>

  <!-- Action boxes for Subgoal 2 -->
  <rect x="375" y="233" width="100" height="32" rx="4" fill="#e8f8e8" stroke="#00aa33" stroke-width="1.5"/>
  <text x="425" y="253" font-size="9" text-anchor="middle" fill="#333">实现 JWT 签发</text>
  <rect x="485" y="233" width="100" height="32" rx="4" fill="#e8f8e8" stroke="#00aa33" stroke-width="1.5"/>
  <text x="535" y="253" font-size="9" text-anchor="middle" fill="#333">编写测试</text>

  <!-- T-split from Subgoal 3 → 2 actions -->
  <line x1="800" y1="188" x2="800" y2="210" stroke="#ff9900" stroke-width="1.5"/>
  <line x1="745" y1="210" x2="855" y2="210" stroke="#ff9900" stroke-width="1.5"/>
  <line x1="745" y1="210" x2="745" y2="227" stroke="#ff9900" stroke-width="1.5"/>
  <polygon points="741,227 745,237 749,227" fill="#ff9900"/>
  <line x1="855" y1="210" x2="855" y2="227" stroke="#ff9900" stroke-width="1.5"/>
  <polygon points="851,227 855,237 859,227" fill="#ff9900"/>

  <!-- Action boxes for Subgoal 3 -->
  <rect x="695" y="233" width="100" height="32" rx="4" fill="#e8f8e8" stroke="#00aa33" stroke-width="1.5"/>
  <text x="745" y="253" font-size="9" text-anchor="middle" fill="#333">实现 RBAC</text>
  <rect x="805" y="233" width="100" height="32" rx="4" fill="#e8f8e8" stroke="#00aa33" stroke-width="1.5"/>
  <text x="855" y="253" font-size="9" text-anchor="middle" fill="#333">集成测试</text>

  <!-- ===== Termination conditions box ===== -->
  <rect x="20" y="292" width="920" height="125" rx="6" fill="#fffef0" stroke="#ccaa00" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="45" y="318" font-size="11" font-weight="bold" fill="#333">终止条件：</text>
  <text x="45" y="340" font-size="10" fill="#333">1. 原子性：任务可用单次工具调用完成 → 停止分解</text>
  <text x="45" y="360" font-size="10" fill="#333">2. 深度限制：最大 2-3 层，防止过度分解</text>
  <text x="45" y="380" font-size="10" fill="#333">3. 预算约束：剩余 token 预算不足以继续分解 → 当前粒度直接执行</text>
  <text x="45" y="405" font-size="10" fill="#666">实践建议：2 层 (Strategic + Tactical) 通常够用，3 层以上调试成本快速失控</text>
</svg>
