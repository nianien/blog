<svg viewBox="0 0 740 480" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif">
  <!-- Title -->
  <text x="370" y="24" font-size="14" font-weight="bold" text-anchor="middle" fill="#333">Reflection 策略选择决策树</text>

  <!-- Q1: 错误成本高吗？ -->
  <rect x="220" y="45" width="260" height="36" rx="6" fill="#e3f2fd" stroke="#1565C0" stroke-width="1.5"/>
  <text x="350" y="68" font-size="12" font-weight="bold" text-anchor="middle" fill="#0D47A1">Q1: 任务的错误成本高吗？</text>

  <!-- Q1 T-split -->
  <line x1="350" y1="81" x2="350" y2="100" stroke="#546E7A" stroke-width="1.5"/>
  <line x1="180" y1="100" x2="530" y2="100" stroke="#546E7A" stroke-width="1.5"/>
  <!-- Left drop -->
  <line x1="180" y1="100" x2="180" y2="129" stroke="#546E7A" stroke-width="1.5"/>
  <polygon points="176,129 180,139 184,129" fill="#546E7A"/>
  <text x="168" y="120" font-size="10" font-weight="bold" fill="#2E7D32" text-anchor="end">高</text>
  <!-- Right drop -->
  <line x1="530" y1="100" x2="530" y2="129" stroke="#546E7A" stroke-width="1.5"/>
  <polygon points="526,129 530,139 534,129" fill="#546E7A"/>
  <text x="542" y="120" font-size="10" font-weight="bold" fill="#E53935">低</text>

  <!-- Left: 启用反思 -->
  <rect x="110" y="135" width="140" height="30" rx="5" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="180" y="155" font-size="11" text-anchor="middle" fill="#1B5E20">启用反思</text>

  <!-- Right: 跳过 -->
  <rect x="460" y="135" width="140" height="30" rx="5" fill="#FFEBEE" stroke="#C62828" stroke-width="1.5"/>
  <text x="530" y="155" font-size="11" text-anchor="middle" fill="#B71C1C">跳过反思</text>

  <!-- Q2 from "启用反思" -->
  <line x1="180" y1="165" x2="180" y2="194" stroke="#546E7A" stroke-width="1.5"/>
  <polygon points="176,194 180,204 184,194" fill="#546E7A"/>
  <rect x="50" y="200" width="260" height="36" rx="6" fill="#e3f2fd" stroke="#1565C0" stroke-width="1.5"/>
  <text x="180" y="223" font-size="12" font-weight="bold" text-anchor="middle" fill="#0D47A1">Q2: 错误可自动检测吗？</text>

  <!-- Q2 T-split -->
  <line x1="180" y1="236" x2="180" y2="255" stroke="#546E7A" stroke-width="1.5"/>
  <line x1="80" y1="255" x2="290" y2="255" stroke="#546E7A" stroke-width="1.5"/>
  <!-- Left drop -->
  <line x1="80" y1="255" x2="80" y2="284" stroke="#546E7A" stroke-width="1.5"/>
  <polygon points="76,284 80,294 84,284" fill="#546E7A"/>
  <text x="68" y="275" font-size="10" font-weight="bold" fill="#2E7D32" text-anchor="end">是</text>
  <!-- Right drop -->
  <line x1="290" y1="255" x2="290" y2="284" stroke="#546E7A" stroke-width="1.5"/>
  <polygon points="286,284 290,294 294,284" fill="#546E7A"/>
  <text x="302" y="275" font-size="10" font-weight="bold" fill="#E65100">否</text>

  <!-- Q2 Left: 外部验证 -->
  <rect x="10" y="290" width="140" height="42" rx="5" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="80" y="309" font-size="10" font-weight="bold" text-anchor="middle" fill="#1B5E20">外部验证</text>
  <text x="80" y="325" font-size="9" text-anchor="middle" fill="#4CAF50">(更可靠更便宜)</text>

  <!-- Q2 Right: LLM Self-Critique -->
  <rect x="220" y="290" width="140" height="42" rx="5" fill="#FFF3E0" stroke="#E65100" stroke-width="1.5"/>
  <text x="290" y="309" font-size="10" font-weight="bold" text-anchor="middle" fill="#BF360C">LLM Self-Critique</text>
  <text x="290" y="325" font-size="9" text-anchor="middle" fill="#F57C00">(如文案质量)</text>

  <!-- Q3 from "跳过反思" -->
  <line x1="530" y1="165" x2="530" y2="194" stroke="#546E7A" stroke-width="1.5"/>
  <polygon points="526,194 530,204 534,194" fill="#546E7A"/>
  <rect x="400" y="200" width="260" height="36" rx="6" fill="#e3f2fd" stroke="#1565C0" stroke-width="1.5"/>
  <text x="530" y="223" font-size="12" font-weight="bold" text-anchor="middle" fill="#0D47A1">Q3: 预算够吗？</text>

  <!-- Q3 T-split -->
  <line x1="530" y1="236" x2="530" y2="255" stroke="#546E7A" stroke-width="1.5"/>
  <line x1="450" y1="255" x2="630" y2="255" stroke="#546E7A" stroke-width="1.5"/>
  <!-- Left drop -->
  <line x1="450" y1="255" x2="450" y2="284" stroke="#546E7A" stroke-width="1.5"/>
  <polygon points="446,284 450,294 454,284" fill="#546E7A"/>
  <text x="438" y="275" font-size="10" font-weight="bold" fill="#2E7D32" text-anchor="end">够</text>
  <!-- Right drop -->
  <line x1="630" y1="255" x2="630" y2="284" stroke="#546E7A" stroke-width="1.5"/>
  <polygon points="626,284 630,294 634,284" fill="#546E7A"/>
  <text x="642" y="275" font-size="10" font-weight="bold" fill="#E53935">不够</text>

  <!-- Q3 Left: 结构化反思 + 多轮重试 -->
  <rect x="385" y="290" width="130" height="42" rx="5" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="450" y="309" font-size="10" font-weight="bold" text-anchor="middle" fill="#1B5E20">结构化反思</text>
  <text x="450" y="325" font-size="9" text-anchor="middle" fill="#4CAF50">+ 多轮重试</text>

  <!-- Q3 Right: 单轮 Self-Critique -->
  <rect x="565" y="290" width="130" height="42" rx="5" fill="#FFF3E0" stroke="#E65100" stroke-width="1.5"/>
  <text x="630" y="309" font-size="10" font-weight="bold" text-anchor="middle" fill="#BF360C">单轮</text>
  <text x="630" y="325" font-size="9" text-anchor="middle" fill="#F57C00">Self-Critique</text>

  <!-- Q4: 延迟敏感 -->
  <rect x="160" y="400" width="420" height="55" rx="6" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="1.5"/>
  <text x="370" y="423" font-size="12" font-weight="bold" text-anchor="middle" fill="#4A148C">Q4: 延迟敏感？</text>
  <text x="370" y="443" font-size="10" text-anchor="middle" fill="#7B1FA2">→ 最多一轮反思，超时直接返回</text>
</svg>
