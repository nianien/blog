<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 430" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif">
  <!-- Background -->
  <rect width="760" height="430" rx="8" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1.5"/>

  <!-- Title -->
  <text x="380" y="32" text-anchor="middle" font-size="15" font-weight="600" fill="#1E293B">Market Data Distribution</text>

  <!-- Matching Engine -->
  <rect x="40" y="150" width="140" height="60" rx="8" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="110" y="176" text-anchor="middle" font-size="13" font-weight="600" fill="#B45309">Matching</text>
  <text x="110" y="196" text-anchor="middle" font-size="13" font-weight="600" fill="#B45309">Engine</text>

  <!-- Critical Path: from top-center of Matching Engine up then right to Market Maker -->
  <line x1="110" y1="150" x2="110" y2="100" stroke="#EF4444" stroke-width="1.5"/>
  <line x1="110" y1="100" x2="430" y2="100" stroke="#EF4444" stroke-width="1.5"/>
  <polygon points="430,100 422,94 422,106" fill="#EF4444"/>

  <!-- Critical Path label -->
  <text x="270" y="90" text-anchor="middle" font-size="11" font-weight="600" fill="#DC2626">Critical Path (Direct Push)</text>

  <!-- Market Maker box -->
  <rect x="435" y="76" width="160" height="48" rx="6" fill="#FEE2E2" stroke="#EF4444" stroke-width="1.5"/>
  <text x="515" y="105" text-anchor="middle" font-size="12" font-weight="600" fill="#DC2626">Market Maker Feed</text>

  <!-- Arrow: Matching Engine right side to Kafka -->
  <line x1="180" y1="180" x2="270" y2="180" stroke="#3B82F6" stroke-width="1.5"/>
  <polygon points="270,180 262,174 262,186" fill="#3B82F6"/>

  <!-- Kafka -->
  <rect x="270" y="155" width="140" height="50" rx="8" fill="#E0E7FF" stroke="#6366F1" stroke-width="1.5"/>
  <text x="340" y="178" text-anchor="middle" font-size="12" font-weight="600" fill="#4338CA">Kafka /</text>
  <text x="340" y="195" text-anchor="middle" font-size="12" font-weight="600" fill="#4338CA">Disruptor</text>

  <!-- Arrow: Kafka to Market Data Engine -->
  <line x1="410" y1="180" x2="475" y2="180" stroke="#6366F1" stroke-width="1.5"/>
  <polygon points="475,180 467,174 467,186" fill="#6366F1"/>

  <!-- Market Data Engine -->
  <rect x="475" y="150" width="160" height="60" rx="8" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="555" y="177" text-anchor="middle" font-size="12" font-weight="600" fill="#1D4ED8">Market Data</text>
  <text x="555" y="195" text-anchor="middle" font-size="12" font-weight="600" fill="#1D4ED8">Engine</text>

  <!-- Fan-out from Market Data Engine -->
  <line x1="555" y1="210" x2="555" y2="245" stroke="#3B82F6" stroke-width="1.5"/>
  <line x1="140" y1="245" x2="620" y2="245" stroke="#3B82F6" stroke-width="1.5"/>

  <!-- Vertical arrows to consumers -->
  <line x1="140" y1="245" x2="140" y2="275" stroke="#3B82F6" stroke-width="1.5"/>
  <polygon points="140,275 134,267 146,267" fill="#3B82F6"/>

  <line x1="300" y1="245" x2="300" y2="275" stroke="#3B82F6" stroke-width="1.5"/>
  <polygon points="300,275 294,267 306,267" fill="#3B82F6"/>

  <line x1="460" y1="245" x2="460" y2="275" stroke="#3B82F6" stroke-width="1.5"/>
  <polygon points="460,275 454,267 466,267" fill="#3B82F6"/>

  <line x1="620" y1="245" x2="620" y2="275" stroke="#3B82F6" stroke-width="1.5"/>
  <polygon points="620,275 614,267 626,267" fill="#3B82F6"/>

  <!-- Consumer boxes -->
  <rect x="70" y="277" width="140" height="40" rx="6" fill="#DCFCE7" stroke="#22C55E" stroke-width="1.5"/>
  <text x="140" y="302" text-anchor="middle" font-size="11" font-weight="600" fill="#15803D">K-line Aggregator</text>

  <rect x="230" y="277" width="140" height="40" rx="6" fill="#DCFCE7" stroke="#22C55E" stroke-width="1.5"/>
  <text x="300" y="302" text-anchor="middle" font-size="11" font-weight="600" fill="#15803D">Depth Builder</text>

  <rect x="390" y="277" width="140" height="40" rx="6" fill="#DCFCE7" stroke="#22C55E" stroke-width="1.5"/>
  <text x="460" y="302" text-anchor="middle" font-size="11" font-weight="600" fill="#15803D">Ticker Calculator</text>

  <rect x="550" y="277" width="140" height="40" rx="6" fill="#DCFCE7" stroke="#22C55E" stroke-width="1.5"/>
  <text x="620" y="302" text-anchor="middle" font-size="11" font-weight="600" fill="#15803D">WebSocket Push</text>

  <!-- Arrow from WebSocket Push to connections -->
  <line x1="620" y1="317" x2="620" y2="350" stroke="#22C55E" stroke-width="1.5"/>
  <polygon points="620,350 614,342 626,342" fill="#22C55E"/>

  <!-- WebSocket Connections box -->
  <rect x="525" y="355" width="190" height="36" rx="6" fill="#F0FDF4" stroke="#86EFAC" stroke-width="1.5"/>
  <text x="620" y="378" text-anchor="middle" font-size="11" fill="#15803D">100K+ WebSocket Connections</text>
</svg>