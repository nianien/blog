<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif">
<!-- Background -->
<!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">RAG 评估体系：Faithfulness Triad</text>

  <!-- Query at top -->
  <g id="query">
    <rect x="350" y="60" width="200" height="50" fill="#e3f2fd" stroke="#3498db" stroke-width="1.5" rx="6"/>
    <text x="450" y="92" text-anchor="middle" font-weight="bold">Query</text>
  </g>

  <!-- Arrow down -->
  <line x1="450.0" y1="110.0" x2="450" y2="133" stroke="#333" stroke-width="1.5"/>
  <polygon points="450.0,140.0 445,132 455,132" fill="#333"/>

  <!-- Split arrows -->
  <line x1="450.0" y1="140.0" x2="257" y2="169" stroke="#666" stroke-width="1.5"/>
  <polygon points="250.0,170.0 257,164 259,174" fill="#666"/>
  <line x1="450.0" y1="140.0" x2="643" y2="169" stroke="#666" stroke-width="1.5"/>
  <polygon points="650.0,170.0 641,174 643,164" fill="#666"/>

  <!-- Context box (left) -->
  <g id="context">
    <rect x="120" y="170" width="260" height="80" fill="#fff3e0" stroke="#f39c12" stroke-width="1.5" rx="6"/>
    <text x="250" y="200" text-anchor="middle" font-weight="bold">Context</text>
    <text x="250" y="217" text-anchor="middle" font-size="11" fill="#666">(Retrieved)</text>
  </g>

  <!-- Answer box (right) -->
  <g id="answer">
    <rect x="520" y="170" width="260" height="80" fill="#e8f8f5" stroke="#27ae60" stroke-width="1.5" rx="6"/>
    <text x="650" y="200" text-anchor="middle" font-weight="bold">Answer</text>
    <text x="650" y="217" text-anchor="middle" font-size="11" fill="#666">(Generated)</text>
  </g>

  <!-- Arrows converging down -->
  <line x1="250.0" y1="250.0" x2="344" y2="297" stroke="#333" stroke-width="1.5"/>
  <polygon points="350.0,300.0 341,301 345,292" fill="#333"/>
  <line x1="650.0" y1="250.0" x2="556" y2="297" stroke="#333" stroke-width="1.5"/>
  <polygon points="550.0,300.0 555,292 559,301" fill="#333"/>

  <!-- Faithfulness box (center) -->
  <g id="faithfulness">
    <rect x="300" y="300" width="300" height="70" fill="#e8f4f8" stroke="#0d7377" stroke-width="1.5" rx="6"/>
    <text x="450" y="330" text-anchor="middle" font-weight="bold" font-size="14">Faithfulness</text>
    <text x="450" y="350" text-anchor="middle" font-size="11" fill="#666">回答是否忠于 context</text>
  </g>

  <!-- Metric definitions -->
  <g id="metrics">
    <text x="120" y="420" font-size="11" fill="#27ae60" font-weight="bold">Query ↔ Context = Context Relevancy</text>
    <text x="120" y="445" font-size="11" fill="#27ae60" font-weight="bold">Query ↔ Answer = Answer Relevancy</text>
    <text x="120" y="470" font-size="11" fill="#27ae60" font-weight="bold">Context ↔ Answer = Faithfulness</text>
  </g>

  <!-- Legend box -->
  <g id="legend">
    <rect x="600" y="410" width="260" height="70" fill="white" stroke="#ccc" stroke-width="1" rx="6"/>
    <text x="620" y="430" font-size="11" font-weight="bold">三项指标的关系：</text>
    <text x="620" y="450" font-size="10" fill="#666">• 共同构成 RAG 质量评估</text>
    <text x="620" y="467" font-size="10" fill="#666">• 缺一不可，需要平衡</text>
  </g>
</svg>