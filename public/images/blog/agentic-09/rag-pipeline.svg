<svg viewBox="0 0 900 740" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif">
<!-- ===== OFFLINE SECTION ===== -->
  <rect x="20" y="20" width="860" height="280" fill="#f0f7ff" stroke="#4a90e2" stroke-width="1.5" rx="6"/>
  <text x="30" y="42" fill="#4a90e2" font-size="13" font-weight="bold">OFFLINE (Indexing)</text>

  <!-- Document Sources -->
  <rect x="40" y="60" width="120" height="80" fill="#e8f4f8" stroke="#0d7377" stroke-width="1.5" rx="6"/>
  <text x="100" y="85" text-anchor="middle" font-weight="bold">Document</text>
  <text x="100" y="100" text-anchor="middle" font-weight="bold">Sources</text>
  <text x="100" y="125" text-anchor="middle" font-size="12" fill="#666">PDF/HTML/MD</text>
  <text x="100" y="138" text-anchor="middle" font-size="12" fill="#666">Code/DB</text>

  <!-- Arrow -->
  <line x1="160.0" y1="100.0" x2="191" y2="100" stroke="#333" stroke-width="1.5"/>
  <polygon points="198.0,100.0 190,105 190,95" fill="#333"/>

  <!-- Ingestion -->
  <rect x="200" y="60" width="120" height="80" fill="#e8f4f8" stroke="#0d7377" stroke-width="1.5" rx="6"/>
  <text x="260" y="85" text-anchor="middle" font-weight="bold">Ingestion</text>
  <text x="260" y="100" text-anchor="middle" font-weight="bold">&amp; Cleaning</text>
  <text x="260" y="125" text-anchor="middle" font-size="12" fill="#666">格式归一化</text>
  <text x="260" y="138" text-anchor="middle" font-size="12" fill="#666">元数据提取</text>

  <!-- Arrow -->
  <line x1="320.0" y1="100.0" x2="351" y2="100" stroke="#333" stroke-width="1.5"/>
  <polygon points="358.0,100.0 350,105 350,95" fill="#333"/>

  <!-- Chunking -->
  <rect x="360" y="60" width="120" height="80" fill="#e8f4f8" stroke="#0d7377" stroke-width="1.5" rx="6"/>
  <text x="420" y="85" text-anchor="middle" font-weight="bold">Chunking</text>
  <text x="420" y="100" text-anchor="middle" font-weight="bold">Strategy</text>
  <text x="420" y="125" text-anchor="middle" font-size="12" fill="#666">语义切分</text>
  <text x="420" y="138" text-anchor="middle" font-size="12" fill="#666">重叠策略</text>

  <!-- Arrow -->
  <line x1="480.0" y1="100.0" x2="511" y2="100" stroke="#333" stroke-width="1.5"/>
  <polygon points="518.0,100.0 510,105 510,95" fill="#333"/>

  <!-- Embedding -->
  <rect x="520" y="60" width="120" height="80" fill="#e8f4f8" stroke="#0d7377" stroke-width="1.5" rx="6"/>
  <text x="580" y="85" text-anchor="middle" font-weight="bold">Embedding</text>
  <text x="580" y="100" text-anchor="middle" font-weight="bold">(Text → Vec)</text>
  <text x="580" y="125" text-anchor="middle" font-size="12" fill="#666">向量化</text>

  <!-- Arrow down to Indexing -->
  <line x1="580.0" y1="140.0" x2="580" y2="171" stroke="#333" stroke-width="1.5"/>
  <polygon points="580.0,178.0 575,170 585,170" fill="#333"/>

  <!-- Indexing -->
  <rect x="510" y="180" width="140" height="70" fill="#fff4e6" stroke="#f39c12" stroke-width="1.5" rx="6"/>
  <text x="580" y="205" text-anchor="middle" font-weight="bold">Indexing</text>
  <text x="580" y="220" text-anchor="middle" font-weight="bold">(Vector + BM25 DB)</text>

  <!-- Dashed arrow to online -->
  <line x1="580" y1="250" x2="580" y2="330" stroke="#666" stroke-width="1.5" stroke-dasharray="5,5"/>

  <!-- ===== DIVIDER ===== -->
  <line x1="30" y1="315" x2="870" y2="315" stroke="#999" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- ===== ONLINE SECTION ===== -->
  <rect x="20" y="330" width="860" height="390" fill="#f0fff0" stroke="#27ae60" stroke-width="1.5" rx="6"/>
  <text x="30" y="352" fill="#27ae60" font-size="13" font-weight="bold">ONLINE (Retrieval)</text>

  <!-- User Query -->
  <rect x="40" y="370" width="100" height="60" fill="#d4edda" stroke="#27ae60" stroke-width="1.5" rx="6"/>
  <text x="90" y="395" text-anchor="middle" font-weight="bold">User</text>
  <text x="90" y="411" text-anchor="middle" font-weight="bold">Query</text>

  <!-- Arrow -->
  <line x1="140.0" y1="400.0" x2="171" y2="400" stroke="#333" stroke-width="1.5"/>
  <polygon points="178.0,400.0 170,405 170,395" fill="#333"/>

  <!-- Query Expansion -->
  <rect x="180" y="370" width="110" height="60" fill="#d4edda" stroke="#27ae60" stroke-width="1.5" rx="6"/>
  <text x="235" y="395" text-anchor="middle" font-weight="bold">Query</text>
  <text x="235" y="411" text-anchor="middle" font-weight="bold">Expansion</text>
  <text x="235" y="430" text-anchor="middle" font-size="12" fill="#666">HyDE/扩写</text>

  <!-- Arrow -->
  <line x1="290.0" y1="400.0" x2="321" y2="400" stroke="#333" stroke-width="1.5"/>
  <polygon points="328.0,400.0 320,405 320,395" fill="#333"/>

  <!-- Hybrid Search -->
  <rect x="330" y="370" width="110" height="60" fill="#d4edda" stroke="#27ae60" stroke-width="1.5" rx="6"/>
  <text x="385" y="395" text-anchor="middle" font-weight="bold">Hybrid</text>
  <text x="385" y="411" text-anchor="middle" font-weight="bold">Search</text>
  <text x="385" y="430" text-anchor="middle" font-size="12" fill="#666">BM25+Vec RRF</text>

  <!-- Arrow -->
  <line x1="440.0" y1="400.0" x2="471" y2="400" stroke="#333" stroke-width="1.5"/>
  <polygon points="478.0,400.0 470,405 470,395" fill="#333"/>

  <!-- Reranking -->
  <rect x="480" y="370" width="130" height="60" fill="#d4edda" stroke="#27ae60" stroke-width="1.5" rx="6"/>
  <text x="545" y="395" text-anchor="middle" font-weight="bold">Reranking</text>
  <text x="545" y="411" text-anchor="middle" font-weight="bold">(Cross-Encoder)</text>

  <!-- Arrow down -->
  <line x1="545.0" y1="430.0" x2="545" y2="461" stroke="#333" stroke-width="1.5"/>
  <polygon points="545.0,468.0 540,460 550,460" fill="#333"/>

  <!-- Context Packing -->
  <rect x="470" y="470" width="150" height="60" fill="#fff3cd" stroke="#f39c12" stroke-width="1.5" rx="6"/>
  <text x="545" y="495" text-anchor="middle" font-weight="bold">Context Packing</text>
  <text x="545" y="511" text-anchor="middle" font-weight="bold">(排序/截断/组织)</text>

  <!-- Arrow down -->
  <line x1="545.0" y1="530.0" x2="545" y2="561" stroke="#333" stroke-width="1.5"/>
  <polygon points="545.0,568.0 540,560 550,560" fill="#333"/>

  <!-- LLM Generate -->
  <rect x="480" y="570" width="130" height="60" fill="#cfe9f3" stroke="#3498db" stroke-width="1.5" rx="6"/>
  <text x="545" y="595" text-anchor="middle" font-weight="bold">LLM Generate</text>
  <text x="545" y="611" text-anchor="middle" font-weight="bold">(+ Citation)</text>

  <!-- Arrow down -->
  <line x1="545.0" y1="630.0" x2="545" y2="651" stroke="#333" stroke-width="1.5"/>
  <polygon points="545.0,658.0 540,650 550,650" fill="#333"/>

  <!-- Response -->
  <rect x="490" y="660" width="110" height="40" rx="6" fill="#d4edda" stroke="#27ae60" stroke-width="1.5"/>
  <text x="545" y="685" text-anchor="middle" font-weight="bold">Response</text>
</svg>
