<svg viewBox="0 0 900 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      text { font-family: system-ui, -apple-system, sans-serif; }
      .title { font-size: 16px; font-weight: bold; fill: #333; }
      .label { font-size: 12px; fill: #333; }
      .label-small { font-size: 11px; fill: #666; }
      .pro { font-size: 12px; fill: #27ae60; font-weight: bold; }
      .con { font-size: 12px; fill: #e74c3c; font-weight: bold; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="900" height="400" fill="#fafafa" />

  <!-- Title -->
  <text x="450" y="35" class="title" text-anchor="middle">Chunk 大小 Trade-off</text>

  <!-- Left box: Too Small -->
  <g id="too-small">
    <rect x="50" y="80" width="280" height="200" fill="#fef5f1" stroke="#e74c3c" stroke-width="2" rx="6"/>
    <text x="190" y="105" text-anchor="middle" font-weight="bold" font-size="13">太小 (&lt; 256 tokens)</text>

    <!-- Pros -->
    <text x="70" y="135" class="pro">+ 检索精确</text>
    <text x="70" y="155" class="pro">+ 噪声少</text>

    <!-- Cons -->
    <text x="70" y="185" class="con">- 上下文不足</text>
    <text x="70" y="205" class="con">- 需要检索更多 chunk</text>
    <text x="70" y="225" class="con">- 容易丢失关联信息</text>
    <text x="70" y="245" class="con">- 语义连贯性差</text>
  </g>

  <!-- Right box: Too Large -->
  <g id="too-large">
    <rect x="570" y="80" width="280" height="200" fill="#fef5f1" stroke="#e74c3c" stroke-width="2" rx="6"/>
    <text x="710" y="105" text-anchor="middle" font-weight="bold" font-size="13">太大 (&gt; 2048 tokens)</text>

    <!-- Pros -->
    <text x="590" y="135" class="pro">+ 上下文完整</text>
    <text x="590" y="155" class="pro">+ 语义连贯</text>

    <!-- Cons -->
    <text x="590" y="185" class="con">- 引入噪声</text>
    <text x="590" y="205" class="con">- 检索不精确</text>
    <text x="590" y="225" class="con">- token 预算浪费</text>
    <text x="590" y="245" class="con">- LLM 易被干扰</text>
  </g>

  <!-- Arrows pointing down -->
  <line x1="190" y1="280" x2="360" y2="330" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="710" y1="280" x2="540" y2="330" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Sweet Spot box -->
  <g id="sweet-spot">
    <rect x="320" y="300" width="260" height="80" fill="#e8f8f5" stroke="#27ae60" stroke-width="3" rx="6"/>
    <text x="450" y="325" text-anchor="middle" font-weight="bold" font-size="14" fill="#27ae60">Sweet Spot</text>
    <text x="450" y="345" text-anchor="middle" font-weight="bold" font-size="13">512 - 1024 tokens</text>
    <text x="450" y="365" text-anchor="middle" class="label-small">根据文档类型调整</text>
  </g>

  <!-- Arrow markers definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#666" />
    </marker>
  </defs>
</svg>