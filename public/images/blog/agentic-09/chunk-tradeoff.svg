<svg viewBox="0 0 900 400" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif">
<!-- Background -->
<!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">Chunk 大小 Trade-off</text>

  <!-- Left box: Too Small -->
  <g id="too-small">
    <rect x="50" y="80" width="280" height="200" fill="#fef5f1" stroke="#e74c3c" stroke-width="1.5" rx="6"/>
    <text x="190" y="105" text-anchor="middle" font-weight="bold" font-size="13">太小 (&lt; 256 tokens)</text>

    <!-- Pros -->
    <text x="70" y="135" font-size="12" fill="#27ae60" font-weight="bold">+ 检索精确</text>
    <text x="70" y="155" font-size="12" fill="#27ae60" font-weight="bold">+ 噪声少</text>

    <!-- Cons -->
    <text x="70" y="185" font-size="12" fill="#e74c3c" font-weight="bold">- 上下文不足</text>
    <text x="70" y="205" font-size="12" fill="#e74c3c" font-weight="bold">- 需要检索更多 chunk</text>
    <text x="70" y="225" font-size="12" fill="#e74c3c" font-weight="bold">- 容易丢失关联信息</text>
    <text x="70" y="245" font-size="12" fill="#e74c3c" font-weight="bold">- 语义连贯性差</text>
  </g>

  <!-- Right box: Too Large -->
  <g id="too-large">
    <rect x="570" y="80" width="280" height="200" fill="#fef5f1" stroke="#e74c3c" stroke-width="1.5" rx="6"/>
    <text x="710" y="105" text-anchor="middle" font-weight="bold" font-size="13">太大 (&gt; 2048 tokens)</text>

    <!-- Pros -->
    <text x="590" y="135" font-size="12" fill="#27ae60" font-weight="bold">+ 上下文完整</text>
    <text x="590" y="155" font-size="12" fill="#27ae60" font-weight="bold">+ 语义连贯</text>

    <!-- Cons -->
    <text x="590" y="185" font-size="12" fill="#e74c3c" font-weight="bold">- 引入噪声</text>
    <text x="590" y="205" font-size="12" fill="#e74c3c" font-weight="bold">- 检索不精确</text>
    <text x="590" y="225" font-size="12" fill="#e74c3c" font-weight="bold">- token 预算浪费</text>
    <text x="590" y="245" font-size="12" fill="#e74c3c" font-weight="bold">- LLM 易被干扰</text>
  </g>

  <!-- Arrows pointing down -->
  <line x1="190.0" y1="280.0" x2="353" y2="328" stroke="#666" stroke-width="1.5"/>
  <polygon points="360.0,330.0 351,333 354,323" fill="#666"/>
  <line x1="710.0" y1="280.0" x2="547" y2="328" stroke="#666" stroke-width="1.5"/>
  <polygon points="540.0,330.0 546,323 549,333" fill="#666"/>

  <!-- Sweet Spot box -->
  <g id="sweet-spot">
    <rect x="320" y="300" width="260" height="80" fill="#e8f8f5" stroke="#27ae60" stroke-width="1.5" rx="6"/>
    <text x="450" y="325" text-anchor="middle" font-weight="bold" font-size="14" fill="#27ae60">Sweet Spot</text>
    <text x="450" y="345" text-anchor="middle" font-weight="bold" font-size="13">512 - 1024 tokens</text>
    <text x="450" y="365" text-anchor="middle" font-size="11" fill="#666">根据文档类型调整</text>
  </g>

  <!-- Arrow markers definition -->
</svg>