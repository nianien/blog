<svg width="900" height="400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="400" fill="#fafafa" />

  <!-- Title -->
  <text x="450" y="30" font-size="16" font-weight="bold" text-anchor="middle" fill="#333">
    Conversation Buffer vs Working Memory
  </text>

  <!-- Left side: Conversation Buffer -->
  <g>
    <rect x="30" y="60" width="380" height="320" fill="#E3F2FD" stroke="#1565C0" stroke-width="2" rx="8" />
    <text x="220" y="85" font-size="14" font-weight="bold" text-anchor="middle" fill="#1565C0">
      Conversation Buffer
    </text>
    <text x="220" y="105" font-size="11" text-anchor="middle" fill="#666">说了什么</text>

    <!-- Messages -->
    <rect x="50" y="125" width="340" height="35" fill="white" stroke="#1565C0" stroke-width="1" rx="4" />
    <text x="60" y="148" font-size="11" fill="#333">user: 帮我分析这份数据</text>

    <rect x="50" y="170" width="340" height="35" fill="white" stroke="#1565C0" stroke-width="1" rx="4" />
    <text x="60" y="193" font-size="11" fill="#333">assistant: 好的...</text>

    <rect x="50" y="215" width="340" height="35" fill="white" stroke="#1565C0" stroke-width="1" rx="4" />
    <text x="60" y="238" font-size="11" fill="#333">user: 用柱状图展示</text>

    <rect x="50" y="260" width="340" height="35" fill="white" stroke="#1565C0" stroke-width="1" rx="4" />
    <text x="60" y="283" font-size="11" fill="#333">assistant: ...</text>

    <rect x="50" y="305" width="340" height="35" fill="white" stroke="#1565C0" stroke-width="1" rx="4" />
    <text x="60" y="328" font-size="11" fill="#333">tool: [read_csv...]</text>

    <text x="220" y="355" font-size="10" text-anchor="middle" fill="#666" font-style="italic">
      (线性的消息流)
    </text>
  </g>

  <!-- Right side: Working Memory -->
  <g>
    <rect x="490" y="60" width="380" height="320" fill="#E8F5E9" stroke="#2E7D32" stroke-width="2" rx="8" />
    <text x="680" y="85" font-size="14" font-weight="bold" text-anchor="middle" fill="#2E7D32">
      Working Memory
    </text>
    <text x="680" y="105" font-size="11" text-anchor="middle" fill="#666">正在做什么</text>

    <!-- Task State Items -->
    <rect x="510" y="125" width="340" height="30" fill="white" stroke="#2E7D32" stroke-width="1" rx="4" />
    <text x="520" y="145" font-size="11" fill="#333">current_goal: 分析销售数据</text>

    <rect x="510" y="162" width="340" height="30" fill="white" stroke="#2E7D32" stroke-width="1" rx="4" />
    <text x="520" y="182" font-size="11" fill="#333">completed_steps:</text>

    <rect x="520" y="197" width="320" height="25" fill="#F0F8FF" stroke="#2E7D32" stroke-width="1" rx="3" />
    <text x="530" y="216" font-size="10" fill="#333">- 读取 CSV ✓</text>

    <rect x="520" y="227" width="320" height="25" fill="#F0F8FF" stroke="#2E7D32" stroke-width="1" rx="3" />
    <text x="530" y="246" font-size="10" fill="#333">- 清洗缺失值 ✓</text>

    <rect x="510" y="257" width="340" height="30" fill="white" stroke="#2E7D32" stroke-width="1" rx="4" />
    <text x="520" y="277" font-size="11" fill="#333">next_step: 生成柱状图</text>

    <rect x="510" y="292" width="340" height="25" fill="white" stroke="#2E7D32" stroke-width="1" rx="4" />
    <text x="520" y="310" font-size="11" fill="#333">scratchpad:</text>
  </g>
</svg>