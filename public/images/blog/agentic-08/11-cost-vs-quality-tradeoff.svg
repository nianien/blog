<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" width="700" height="400">
  <style>
    text { font-family: system-ui, -apple-system, sans-serif; }
  </style>

  <!-- Title -->
  <text x="350" y="30" text-anchor="middle" font-size="15" font-weight="bold" fill="#263238">记忆注入量：Token 成本 vs 上下文质量</text>

  <!-- Axes -->
  <!-- Y axis -->
  <line x1="120" y1="60" x2="120" y2="340" stroke="#455A64" stroke-width="2"/>
  <!-- X axis -->
  <line x1="120" y1="340" x2="600" y2="340" stroke="#455A64" stroke-width="2"/>

  <!-- Y axis label -->
  <text x="60" y="200" text-anchor="middle" font-size="12" fill="#455A64" transform="rotate(-90, 60, 200)">记忆注入量</text>

  <!-- Cost line (linear, red) -->
  <line x1="140" y1="310" x2="560" y2="80" stroke="#E53935" stroke-width="2.5"/>
  <circle cx="560" cy="80" r="4" fill="#E53935"/>
  <text x="570" y="80" font-size="12" font-weight="bold" fill="#E53935">Token 成本</text>
  <text x="570" y="95" font-size="10" fill="#E53935">(线性增长)</text>

  <!-- Quality curve (logarithmic, blue) -->
  <path d="M140,310 Q250,120 360,100 Q450,90 560,85" stroke="#1565C0" stroke-width="2.5" fill="none"/>
  <circle cx="560" cy="85" r="4" fill="#1565C0"/>
  <text x="570" y="115" font-size="12" font-weight="bold" fill="#1565C0">上下文质量</text>
  <text x="570" y="130" font-size="10" fill="#1565C0">(边际递减)</text>

  <!-- Left Y labels (Cost) -->
  <text x="100" y="316" text-anchor="end" font-size="11" fill="#E53935">$0</text>
  <text x="100" y="240" text-anchor="end" font-size="11" fill="#E53935">$</text>
  <text x="100" y="175" text-anchor="end" font-size="11" fill="#E53935">$$</text>
  <text x="100" y="100" text-anchor="end" font-size="11" fill="#E53935">$$$</text>

  <!-- Right Y labels (Quality) -->
  <text x="115" y="316" font-size="11" fill="#1565C0"></text>

  <!-- Optimal zone -->
  <rect x="220" y="60" width="140" height="280" rx="6" fill="#E8F5E9" fill-opacity="0.3" stroke="#4CAF50" stroke-width="1" stroke-dasharray="5"/>
  <text x="290" y="365" text-anchor="middle" font-size="11" font-weight="bold" fill="#2E7D32">最佳区间</text>
  <text x="290" y="380" text-anchor="middle" font-size="10" fill="#4CAF50">(25-35% Context Window)</text>

  <!-- Annotations -->
  <line x1="140" y1="310" x2="140" y2="316" stroke="#455A64" stroke-width="1"/>
  <text x="140" y="356" text-anchor="middle" font-size="10" fill="#78909C">少</text>
  <line x1="560" y1="310" x2="560" y2="316" stroke="#455A64" stroke-width="1"/>
  <text x="560" y="356" text-anchor="middle" font-size="10" fill="#78909C">多</text>
  <text x="350" y="356" text-anchor="middle" font-size="11" fill="#455A64">记忆注入量 →</text>
</svg>