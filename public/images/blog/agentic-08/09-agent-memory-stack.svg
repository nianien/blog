<svg width="700" height="350" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="700" height="350" fill="#fafafa" />

  <!-- Title -->
  <text x="350" y="30" font-size="16" font-weight="bold" text-anchor="middle" fill="#333">
    Agent 记忆堆栈总览
  </text>

  <!-- Column Headers -->
  <rect x="50" y="70" width="150" height="40" fill="#1565C0" rx="6" />
  <rect x="200" y="70" width="200" height="40" fill="#1565C0" rx="6" />
  <rect x="400" y="70" width="250" height="40" fill="#1565C0" rx="6" />

  <text x="125" y="95" font-size="12" font-weight="bold" text-anchor="middle" fill="white">
    Layer
  </text>
  <text x="300" y="95" font-size="12" font-weight="bold" text-anchor="middle" fill="white">
    存储
  </text>
  <text x="525" y="95" font-size="12" font-weight="bold" text-anchor="middle" fill="white">
    生命周期
  </text>

  <!-- Row 1: L1 Conversation -->
  <rect x="50" y="110" width="150" height="60" fill="#E3F2FD" stroke="#1565C0" stroke-width="1" rx="4" />
  <rect x="200" y="110" width="200" height="60" fill="#E3F2FD" stroke="#1565C0" stroke-width="1" rx="4" />
  <rect x="400" y="110" width="250" height="60" fill="#E3F2FD" stroke="#1565C0" stroke-width="1" rx="4" />

  <text x="125" y="140" font-size="12" font-weight="bold" text-anchor="middle" fill="#1565C0">
    L1 Conv.
  </text>
  <text x="125" y="160" font-size="10" text-anchor="middle" fill="#666">
    Conversation
  </text>

  <text x="300" y="140" font-size="12" text-anchor="middle" fill="#333">
    内存 / Redis
  </text>

  <text x="525" y="140" font-size="12" text-anchor="middle" fill="#333">
    单次会话
  </text>

  <!-- Row 2: L2 Working -->
  <rect x="50" y="170" width="150" height="60" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1" rx="4" />
  <rect x="200" y="170" width="200" height="60" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1" rx="4" />
  <rect x="400" y="170" width="250" height="60" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1" rx="4" />

  <text x="125" y="200" font-size="12" font-weight="bold" text-anchor="middle" fill="#2E7D32">
    L2 Working
  </text>

  <text x="300" y="200" font-size="12" text-anchor="middle" fill="#333">
    内存 / Redis
  </text>

  <text x="525" y="200" font-size="12" text-anchor="middle" fill="#333">
    单次任务
  </text>

  <!-- Row 3: L3 Episodic -->
  <rect x="50" y="230" width="150" height="60" fill="#FFF3E0" stroke="#E65100" stroke-width="1" rx="4" />
  <rect x="200" y="230" width="200" height="60" fill="#FFF3E0" stroke="#E65100" stroke-width="1" rx="4" />
  <rect x="400" y="230" width="250" height="60" fill="#FFF3E0" stroke="#E65100" stroke-width="1" rx="4" />

  <text x="125" y="260" font-size="12" font-weight="bold" text-anchor="middle" fill="#E65100">
    L3 Episodic
  </text>

  <text x="300" y="260" font-size="12" text-anchor="middle" fill="#333">
    向量数据库
  </text>

  <text x="525" y="260" font-size="12" text-anchor="middle" fill="#333">
    跨会话（天~月）
  </text>

  <!-- Row 4: L4 Semantic -->
  <rect x="50" y="290" width="150" height="60" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="1" rx="4" />
  <rect x="200" y="290" width="200" height="60" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="1" rx="4" />
  <rect x="400" y="290" width="250" height="60" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="1" rx="4" />

  <text x="125" y="320" font-size="12" font-weight="bold" text-anchor="middle" fill="#7B1FA2">
    L4 Semantic
  </text>

  <text x="300" y="320" font-size="12" text-anchor="middle" fill="#333">
    RAG 系统
  </text>

  <text x="525" y="320" font-size="12" text-anchor="middle" fill="#333">
    持久化（月~年）
  </text>
</svg>