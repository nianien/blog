<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 540" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="10" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,3 L0,6 Z" fill="#666"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">四层记忆架构注入 LLM Context Window</text>

  <!-- ===== Left: User Input ===== -->
  <rect x="20" y="178" width="120" height="64" rx="6" fill="#E3F2FD" stroke="#1565C0" stroke-width="1.5"/>
  <text x="80" y="204" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">User Input</text>
  <text x="80" y="222" text-anchor="middle" font-size="10" fill="#666">Tool Output</text>

  <!-- Arrow: User Input → Context Window -->
  <line x1="140" y1="210" x2="178" y2="210" stroke="#666" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ===== Center: LLM Context Window ===== -->
  <rect x="180" y="50" width="340" height="370" rx="8" fill="white" stroke="#999" stroke-width="2"/>
  <text x="350" y="78" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">LLM Context Window</text>

  <!-- Section 1: System Prompt (no external inject) -->
  <rect x="200" y="92" width="300" height="50" rx="6" fill="#E3F2FD" stroke="#1565C0" stroke-width="1"/>
  <text x="350" y="114" text-anchor="middle" font-size="12" font-weight="bold" fill="#1565C0">System Prompt</text>
  <text x="350" y="130" text-anchor="middle" font-size="10" fill="#666">角色定义、指令集、输出格式</text>

  <!-- Section 2: Memory Injection ◄── Layer 3 -->
  <rect x="200" y="152" width="300" height="50" rx="6" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1"/>
  <text x="350" y="174" text-anchor="middle" font-size="12" font-weight="bold" fill="#2E7D32">Memory Injection</text>
  <text x="350" y="190" text-anchor="middle" font-size="10" fill="#666">Episodic + Semantic Recall</text>

  <!-- Section 3: Working Memory ◄── Layer 2 -->
  <rect x="200" y="212" width="300" height="50" rx="6" fill="#FFF3E0" stroke="#E65100" stroke-width="1"/>
  <text x="350" y="234" text-anchor="middle" font-size="12" font-weight="bold" fill="#E65100">Working Memory</text>
  <text x="350" y="250" text-anchor="middle" font-size="10" fill="#666">任务状态 / Scratchpad</text>

  <!-- Section 4: Conversation History ◄── Layer 1 -->
  <rect x="200" y="272" width="300" height="50" rx="6" fill="#FCE4EC" stroke="#C2185B" stroke-width="1"/>
  <text x="350" y="294" text-anchor="middle" font-size="12" font-weight="bold" fill="#C2185B">Conversation History</text>
  <text x="350" y="310" text-anchor="middle" font-size="10" fill="#666">消息历史 / 滑动窗口 + 摘要</text>

  <!-- Section 5: Tool Schemas (no external inject) -->
  <rect x="200" y="332" width="300" height="50" rx="6" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="1"/>
  <text x="350" y="354" text-anchor="middle" font-size="12" font-weight="bold" fill="#7B1FA2">Tool Schemas + Reserve</text>
  <text x="350" y="370" text-anchor="middle" font-size="10" fill="#666">工具定义 / Response 预留空间</text>

  <!-- ===== Right: Memory Layers ===== -->

  <!-- Layer 3: Episodic Memory → Memory Injection -->
  <rect x="600" y="132" width="250" height="50" rx="6" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="725" y="153" text-anchor="middle" font-size="11" font-weight="bold" fill="#2E7D32">Layer 3: Episodic Memory</text>
  <text x="725" y="170" text-anchor="middle" font-size="10" fill="#666">向量数据库 / 关系数据库</text>
  <!-- Arrow -->
  <line x1="600" y1="157" x2="502" y2="157" stroke="#2E7D32" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="548" y="150" text-anchor="middle" font-size="9" fill="#2E7D32">inject</text>

  <!-- Layer 2: Working Memory → Working Memory -->
  <rect x="600" y="202" width="250" height="50" rx="6" fill="#FFF3E0" stroke="#E65100" stroke-width="1.5"/>
  <text x="725" y="223" text-anchor="middle" font-size="11" font-weight="bold" fill="#E65100">Layer 2: Working Memory</text>
  <text x="725" y="240" text-anchor="middle" font-size="10" fill="#666">任务状态 / Scratchpad</text>
  <!-- Arrow -->
  <line x1="600" y1="227" x2="502" y2="227" stroke="#E65100" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="548" y="220" text-anchor="middle" font-size="9" fill="#E65100">inject</text>

  <!-- Layer 1: Conversation Buffer → Conversation History -->
  <rect x="600" y="272" width="250" height="50" rx="6" fill="#FCE4EC" stroke="#C2185B" stroke-width="1.5"/>
  <text x="725" y="293" text-anchor="middle" font-size="11" font-weight="bold" fill="#C2185B">Layer 1: Conversation Buffer</text>
  <text x="725" y="310" text-anchor="middle" font-size="10" fill="#666">消息历史 / 滑动窗口</text>
  <!-- Arrow -->
  <line x1="600" y1="297" x2="502" y2="297" stroke="#C2185B" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="548" y="290" text-anchor="middle" font-size="9" fill="#C2185B">inject</text>

  <!-- Layer 4: Semantic Memory → LLM Response (bottom) -->
  <rect x="600" y="370" width="250" height="50" rx="6" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="1.5"/>
  <text x="725" y="391" text-anchor="middle" font-size="11" font-weight="bold" fill="#7B1FA2">Layer 4: Semantic Memory</text>
  <text x="725" y="408" text-anchor="middle" font-size="10" fill="#666">知识库 / RAG</text>

  <!-- ===== Bottom: LLM Response ===== -->
  <!-- Arrow: Context Window → LLM Response -->
  <line x1="350" y1="420" x2="350" y2="458" stroke="#666" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="280" y="460" width="140" height="40" rx="6" fill="#C8E6C9" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="350" y="485" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">LLM Response</text>

  <!-- Arrow: Layer 4 Semantic Memory → LLM Response -->
  <line x1="725" y1="420" x2="725" y2="480" stroke="#7B1FA2" stroke-width="1.5"/>
  <line x1="725" y1="480" x2="422" y2="480" stroke="#7B1FA2" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="570" y="473" text-anchor="middle" font-size="9" fill="#7B1FA2">inject</text>

  <!-- Note -->
  <text x="440" y="530" text-anchor="middle" font-size="10" fill="#999">* 百分比为建议配置，需根据任务特性调整</text>
</svg>
