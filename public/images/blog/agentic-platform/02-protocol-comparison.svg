<svg viewBox="0 0 620 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Table header -->
  <rect x="20" y="20" width="580" height="35" rx="6" fill="#1F2937" stroke="#111827" stroke-width="1.5"/>

  <!-- Header cells -->
  <text x="120" y="45" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">协议</text>
  <text x="260" y="45" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">方向</text>
  <text x="390" y="45" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">连接模式</text>
  <text x="520" y="45" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">适用场景</text>

  <!-- Dividers for header -->
  <line x1="200" y1="20" x2="200" y2="55" stroke="#374151" stroke-width="1"/>
  <line x1="330" y1="20" x2="330" y2="55" stroke="#374151" stroke-width="1"/>
  <line x1="460" y1="20" x2="460" y2="55" stroke="#374151" stroke-width="1"/>

  <!-- Row 1 -->
  <rect x="20" y="55" width="580" height="35" rx="0" fill="#F3F4F6" stroke="#D1D5DB" stroke-width="1"/>
  <text x="120" y="80" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="13" fill="#1F2937" text-anchor="middle">HTTP + SSE</text>
  <text x="260" y="80" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="13" fill="#1F2937" text-anchor="middle">单向推送</text>
  <text x="390" y="80" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="13" fill="#1F2937" text-anchor="middle">长连接</text>
  <text x="520" y="80" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="13" fill="#1F2937" text-anchor="middle">大多数 Agent API</text>

  <!-- Dividers for row 1 -->
  <line x1="200" y1="55" x2="200" y2="90" stroke="#D1D5DB" stroke-width="0.5"/>
  <line x1="330" y1="55" x2="330" y2="90" stroke="#D1D5DB" stroke-width="0.5"/>
  <line x1="460" y1="55" x2="460" y2="90" stroke="#D1D5DB" stroke-width="0.5"/>

  <!-- Row 2 -->
  <rect x="20" y="90" width="580" height="35" rx="0" fill="white" stroke="#D1D5DB" stroke-width="1"/>
  <text x="120" y="115" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="13" fill="#1F2937" text-anchor="middle">WebSocket</text>
  <text x="260" y="115" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="13" fill="#1F2937" text-anchor="middle">双向通信</text>
  <text x="390" y="115" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="13" fill="#1F2937" text-anchor="middle">长连接</text>
  <text x="520" y="115" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="13" fill="#1F2937" text-anchor="middle">交互式会话</text>

  <!-- Dividers for row 2 -->
  <line x1="200" y1="90" x2="200" y2="125" stroke="#D1D5DB" stroke-width="0.5"/>
  <line x1="330" y1="90" x2="330" y2="125" stroke="#D1D5DB" stroke-width="0.5"/>
  <line x1="460" y1="90" x2="460" y2="125" stroke="#D1D5DB" stroke-width="0.5"/>

  <!-- Row 3 -->
  <rect x="20" y="125" width="580" height="35" rx="0" fill="#F3F4F6" stroke="#D1D5DB" stroke-width="1"/>
  <text x="120" y="150" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="13" fill="#1F2937" text-anchor="middle">gRPC Stream</text>
  <text x="260" y="150" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="13" fill="#1F2937" text-anchor="middle">双向流</text>
  <text x="390" y="150" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="13" fill="#1F2937" text-anchor="middle">长连接</text>
  <text x="520" y="150" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="13" fill="#1F2937" text-anchor="middle">内部服务间通信</text>

  <!-- Dividers for row 3 -->
  <line x1="200" y1="125" x2="200" y2="160" stroke="#D1D5DB" stroke-width="0.5"/>
  <line x1="330" y1="125" x2="330" y2="160" stroke="#D1D5DB" stroke-width="0.5"/>
  <line x1="460" y1="125" x2="460" y2="160" stroke="#D1D5DB" stroke-width="0.5"/>

  <!-- Outer border -->
  <rect x="20" y="20" width="580" height="140" rx="6" fill="none" stroke="#D1D5DB" stroke-width="1.5"/>
</svg>