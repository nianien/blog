<svg viewBox="0 0 500 230" xmlns="http://www.w3.org/2000/svg">
  <!-- Title -->
  <text x="250" y="25" font-size="16" font-weight="bold" text-anchor="middle" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif">Multi-Agent Delegation Router Pattern</text>

  <!-- Main Agent -->
  <rect x="150" y="50" width="200" height="44" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5" rx="8"/>
  <text x="250" y="78" font-size="13" font-weight="700" text-anchor="middle" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" fill="#1e40af">主 Agent（路由/分发）</text>

  <!-- Trunk line down from main agent -->
  <line x1="250" y1="94" x2="250" y2="120" stroke="#666" stroke-width="1.5"/>

  <!-- Horizontal spread line -->
  <line x1="85" y1="120" x2="415" y2="120" stroke="#666" stroke-width="1.5"/>

  <!-- Three vertical lines down to boxes with arrowheads -->
  <line x1="85" y1="120" x2="85" y2="150" stroke="#666" stroke-width="1.5"/>
  <polygon points="81,146 85,154 89,146" fill="#666"/>

  <line x1="250" y1="120" x2="250" y2="150" stroke="#666" stroke-width="1.5"/>
  <polygon points="246,146 250,154 254,146" fill="#666"/>

  <line x1="415" y1="120" x2="415" y2="150" stroke="#666" stroke-width="1.5"/>
  <polygon points="411,146 415,154 419,146" fill="#666"/>

  <!-- 退款 Agent -->
  <rect x="15" y="155" width="140" height="55" fill="#DCFCE7" stroke="#10B981" stroke-width="1.5" rx="8"/>
  <text x="85" y="178" font-size="13" font-weight="600" text-anchor="middle" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" fill="#065f46">退款 Agent</text>
  <text x="85" y="198" font-size="11" text-anchor="middle" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" fill="#334155">（处理退款相关问题）</text>

  <!-- 物流 Agent -->
  <rect x="180" y="155" width="140" height="55" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5" rx="8"/>
  <text x="250" y="178" font-size="13" font-weight="600" text-anchor="middle" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" fill="#92400e">物流 Agent</text>
  <text x="250" y="198" font-size="11" text-anchor="middle" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" fill="#334155">（处理物流相关问题）</text>

  <!-- 技术 Agent -->
  <rect x="345" y="155" width="140" height="55" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="1.5" rx="8"/>
  <text x="415" y="178" font-size="13" font-weight="600" text-anchor="middle" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" fill="#5b21b6">技术 Agent</text>
  <text x="415" y="198" font-size="11" text-anchor="middle" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" fill="#334155">（处理技术相关问题）</text>
</svg>
