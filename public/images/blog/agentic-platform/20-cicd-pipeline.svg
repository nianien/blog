<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 205">
  <!-- Git Push trigger -->
  <rect x="235" y="5" width="180" height="30" fill="#8b5cf6" stroke="#6d28d9" stroke-width="1.5" rx="15"/>
  <text x="325" y="25" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">Git Push</text>

  <!-- Arrow from trigger to CI -->
  <line x1="325" y1="35" x2="325" y2="52" stroke="#666" stroke-width="1.5"/>
  <polygon points="321,50 325,58 329,50" fill="#666"/>

  <!-- CI background band -->
  <rect x="48" y="58" width="548" height="52" fill="#eff6ff" rx="8" stroke="#bfdbfe" stroke-width="1"/>

  <!-- CI badge -->
  <circle cx="25" cy="84" r="16" fill="#3b82f6"/>
  <text x="25" y="89" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="11" font-weight="bold" fill="white" text-anchor="middle">CI</text>

  <!-- Stage 1: 格式检查 -->
  <rect x="58" y="63" width="150" height="42" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5" rx="6"/>
  <text x="133" y="79" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="11" font-weight="bold" fill="#1e293b" text-anchor="middle">格式检查</text>
  <text x="133" y="96" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="9" fill="#64748b" text-anchor="middle">Prompt 模板 · Schema 校验</text>

  <!-- Arrow 1→2 -->
  <line x1="208" y1="84" x2="222" y2="84" stroke="#3b82f6" stroke-width="1.5"/>
  <polygon points="219,80 227,84 219,88" fill="#3b82f6"/>

  <!-- Stage 2: 单元测试 -->
  <rect x="228" y="63" width="150" height="42" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5" rx="6"/>
  <text x="303" y="79" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="11" font-weight="bold" fill="#1e293b" text-anchor="middle">单元测试</text>
  <text x="303" y="96" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="9" fill="#64748b" text-anchor="middle">Mock 快速验证</text>

  <!-- Arrow 2→3 -->
  <line x1="378" y1="84" x2="392" y2="84" stroke="#3b82f6" stroke-width="1.5"/>
  <polygon points="389,80 397,84 389,88" fill="#3b82f6"/>

  <!-- Stage 3: 集成测试 -->
  <rect x="398" y="63" width="150" height="42" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5" rx="6"/>
  <text x="473" y="79" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="11" font-weight="bold" fill="#1e293b" text-anchor="middle">集成测试</text>
  <text x="473" y="96" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="9" fill="#64748b" text-anchor="middle">真实 LLM 评估集</text>

  <!-- Quality comparison branch -->
  <line x1="548" y1="84" x2="562" y2="84" stroke="#f59e0b" stroke-width="1.5"/>
  <polygon points="559,80 567,84 559,88" fill="#f59e0b"/>
  <rect x="568" y="72" width="70" height="24" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5" rx="4"/>
  <text x="603" y="88" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="9" font-weight="bold" fill="#92400e" text-anchor="middle">质量对比</text>

  <!-- Transition arrow CI → CD -->
  <line x1="303" y1="110" x2="303" y2="140" stroke="#666" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="299,138 303,146 307,138" fill="#666"/>

  <!-- CD background band -->
  <rect x="48" y="146" width="500" height="52" fill="#f0fdf4" rx="8" stroke="#bbf7d0" stroke-width="1"/>

  <!-- CD badge -->
  <circle cx="25" cy="172" r="16" fill="#22c55e"/>
  <text x="25" y="177" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="11" font-weight="bold" fill="white" text-anchor="middle">CD</text>

  <!-- Stage 4: 部署 Staging -->
  <rect x="58" y="151" width="150" height="42" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5" rx="6"/>
  <text x="133" y="167" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="11" font-weight="bold" fill="#1e293b" text-anchor="middle">部署 Staging</text>
  <text x="133" y="184" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="9" fill="#64748b" text-anchor="middle">全量部署测试环境</text>

  <!-- Arrow 4→5 -->
  <line x1="208" y1="172" x2="222" y2="172" stroke="#22c55e" stroke-width="1.5"/>
  <polygon points="219,168 227,172 219,176" fill="#22c55e"/>

  <!-- Stage 5: Staging 验证 -->
  <rect x="228" y="151" width="150" height="42" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5" rx="6"/>
  <text x="303" y="167" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="11" font-weight="bold" fill="#1e293b" text-anchor="middle">Staging 验证</text>
  <text x="303" y="184" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="9" fill="#64748b" text-anchor="middle">Smoke Test</text>

  <!-- Arrow 5→6 -->
  <line x1="378" y1="172" x2="392" y2="172" stroke="#22c55e" stroke-width="1.5"/>
  <polygon points="389,168 397,172 389,176" fill="#22c55e"/>

  <!-- Stage 6: 灰度发布 -->
  <rect x="398" y="151" width="150" height="42" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5" rx="6"/>
  <text x="473" y="167" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="11" font-weight="bold" fill="#1e293b" text-anchor="middle">灰度发布</text>
  <text x="473" y="184" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="9" fill="#64748b" text-anchor="middle">Production 灰度策略</text>
</svg>