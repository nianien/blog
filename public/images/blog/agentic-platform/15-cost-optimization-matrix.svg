<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 280">
  <defs/>

  <!-- Background -->
  <rect width="620" height="280" fill="#ffffff"/>

  <!-- Header row -->
  <rect x="10" y="10" width="150" height="40" fill="#1e293b" rx="6"/>
  <rect x="160" y="10" width="180" height="40" fill="#1e293b" rx="6"/>
  <rect x="340" y="10" width="130" height="40" fill="#1e293b" rx="6"/>
  <rect x="470" y="10" width="140" height="40" fill="#1e293b" rx="6"/>

  <!-- Header text -->
  <text x="85" y="35" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">策略</text>
  <text x="250" y="35" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">适用场景</text>
  <text x="405" y="35" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">节省幅度</text>
  <text x="540" y="35" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">风险</text>

  <!-- Body rows -->
  <!-- Row 1 -->
  <rect x="10" y="50" width="150" height="35" fill="#fafafa" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="160" y="50" width="180" height="35" fill="#fafafa" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="340" y="50" width="130" height="35" fill="#fafafa" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="470" y="50" width="140" height="35" fill="#fafafa" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="85" y="72" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="12" fill="#1e293b" text-anchor="middle">模型降级</text>
  <text x="250" y="72" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="12" fill="#1e293b" text-anchor="middle">简单任务/高负载</text>
  <text x="405" y="72" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="12" fill="#1e293b" text-anchor="middle">50-80%</text>
  <text x="540" y="72" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="12" fill="#1e293b" text-anchor="middle">质量下降</text>

  <!-- Row 2 -->
  <rect x="10" y="85" width="150" height="35" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="160" y="85" width="180" height="35" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="340" y="85" width="130" height="35" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="470" y="85" width="140" height="35" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="85" y="107" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="12" fill="#1e293b" text-anchor="middle">语义缓存</text>
  <text x="250" y="107" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="12" fill="#1e293b" text-anchor="middle">重复性高的查询</text>
  <text x="405" y="107" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="12" fill="#1e293b" text-anchor="middle">30-60%</text>
  <text x="540" y="107" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="12" fill="#1e293b" text-anchor="middle">缓存错误</text>

  <!-- Row 3 -->
  <rect x="10" y="120" width="150" height="35" fill="#fafafa" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="160" y="120" width="180" height="35" fill="#fafafa" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="340" y="120" width="130" height="35" fill="#fafafa" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="470" y="120" width="140" height="35" fill="#fafafa" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="85" y="142" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="12" fill="#1e293b" text-anchor="middle">Prompt 压缩</text>
  <text x="250" y="142" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="12" fill="#1e293b" text-anchor="middle">长对话</text>
  <text x="405" y="142" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="12" fill="#1e293b" text-anchor="middle">20-40%</text>
  <text x="540" y="142" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="12" fill="#1e293b" text-anchor="middle">信息丢失</text>

  <!-- Row 4 -->
  <rect x="10" y="155" width="150" height="35" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="160" y="155" width="180" height="35" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="340" y="155" width="130" height="35" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="470" y="155" width="140" height="35" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="85" y="177" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="12" fill="#1e293b" text-anchor="middle">批量推理</text>
  <text x="250" y="177" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="12" fill="#1e293b" text-anchor="middle">非实时任务</text>
  <text x="405" y="177" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="12" fill="#1e293b" text-anchor="middle">30-50%</text>
  <text x="540" y="177" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="12" fill="#1e293b" text-anchor="middle">延迟增加</text>

  <!-- Row 5 -->
  <rect x="10" y="190" width="150" height="35" fill="#fafafa" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="160" y="190" width="180" height="35" fill="#fafafa" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="340" y="190" width="130" height="35" fill="#fafafa" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="470" y="190" width="140" height="35" fill="#fafafa" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="85" y="212" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="12" fill="#1e293b" text-anchor="middle">Spot Instance</text>
  <text x="250" y="212" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="12" fill="#1e293b" text-anchor="middle">异步 Worker</text>
  <text x="405" y="212" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="12" fill="#1e293b" text-anchor="middle">60-80%</text>
  <text x="540" y="212" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="12" fill="#1e293b" text-anchor="middle">任务中断</text>

  <!-- Row 6 -->
  <rect x="10" y="225" width="150" height="35" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="160" y="225" width="180" height="35" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="340" y="225" width="130" height="35" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="470" y="225" width="140" height="35" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="85" y="247" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="12" fill="#1e293b" text-anchor="middle">模型本地化</text>
  <text x="250" y="247" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="12" fill="#1e293b" text-anchor="middle">高频简单任务</text>
  <text x="405" y="247" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="12" fill="#1e293b" text-anchor="middle">60-90%</text>
  <text x="540" y="247" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="12" fill="#1e293b" text-anchor="middle">前期投入</text>
</svg>