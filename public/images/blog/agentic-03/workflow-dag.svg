<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 280" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif">
  <text x="340" y="32" text-anchor="middle" font-size="16" font-weight="bold" fill="#1F2937">Workflow / DAG</text>

  <!-- Start -->
  <circle cx="50" cy="120" r="22" fill="#3B82F6" stroke="#1D4ED8" stroke-width="1.5"/>
  <text x="50" y="125" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">Start</text>

  <!-- Step A -->
  <rect x="110" y="100" width="90" height="40" rx="6" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="155" y="125" text-anchor="middle" font-size="13" fill="#1E40AF">Step A</text>
  <line x1="72" y1="120" x2="108" y2="120" stroke="#64748B" stroke-width="1.5"/>
  <polygon points="106,116 112,120 106,124" fill="#64748B"/>

  <!-- Step B -->
  <rect x="240" y="100" width="90" height="40" rx="6" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="285" y="125" text-anchor="middle" font-size="13" fill="#1E40AF">Step B</text>
  <line x1="200" y1="120" x2="238" y2="120" stroke="#64748B" stroke-width="1.5"/>
  <polygon points="236,116 242,120 236,124" fill="#64748B"/>

  <!-- Step C (upper branch) -->
  <rect x="380" y="65" width="90" height="40" rx="6" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="425" y="90" text-anchor="middle" font-size="13" fill="#1E40AF">Step C</text>
  <line x1="330" y1="110" x2="378" y2="87" stroke="#64748B" stroke-width="1.5"/>
  <polygon points="374,83 380,86 374,91" fill="#64748B"/>
  <text x="350" y="78" text-anchor="middle" font-size="10" fill="#94A3B8">条件 A</text>

  <!-- Step D (lower branch) -->
  <rect x="380" y="135" width="90" height="40" rx="6" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="425" y="160" text-anchor="middle" font-size="13" fill="#1E40AF">Step D</text>
  <line x1="330" y1="130" x2="378" y2="153" stroke="#64748B" stroke-width="1.5"/>
  <polygon points="374,149 380,153 374,157" fill="#64748B"/>
  <text x="350" y="165" text-anchor="middle" font-size="10" fill="#94A3B8">条件 B</text>

  <!-- Step E (merge) -->
  <rect x="520" y="100" width="90" height="40" rx="6" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="565" y="125" text-anchor="middle" font-size="13" fill="#1E40AF">Step E</text>
  <line x1="470" y1="88" x2="518" y2="113" stroke="#64748B" stroke-width="1.5"/>
  <polygon points="514,109 520,113 514,117" fill="#64748B"/>
  <line x1="470" y1="155" x2="518" y2="127" stroke="#64748B" stroke-width="1.5"/>
  <polygon points="514,123 520,127 514,131" fill="#64748B"/>

  <!-- End -->
  <circle cx="645" cy="120" r="22" fill="#1F2937" stroke="#111827" stroke-width="1.5"/>
  <text x="645" y="125" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">End</text>
  <line x1="610" y1="120" x2="621" y2="120" stroke="#64748B" stroke-width="1.5"/>
  <polygon points="619,116 625,120 619,124" fill="#64748B"/>

  <!-- Footer -->
  <text x="340" y="230" text-anchor="middle" font-size="12" fill="#94A3B8">特征：路径在设计时确定，运行时按条件选择分支</text>
  <text x="340" y="250" text-anchor="middle" font-size="12" fill="#B0B8C4">类比：地铁线路图，站点和换乘规则预先设定</text>
</svg>
