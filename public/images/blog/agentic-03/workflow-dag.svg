<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 320" font-family="-apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="10" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,3 L0,6 Z" fill="#666"/>
    </marker>
  </defs>

  <rect width="680" height="320" rx="12" fill="#fafafa" stroke="#e0e0e0" stroke-width="1.5"/>
  <text x="340" y="36" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">Workflow / DAG</text>

  <!-- Start -->
  <circle cx="50" cy="120" r="22" fill="#1976D2" stroke="#0D47A1" stroke-width="1.5"/>
  <text x="50" y="125" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">Start</text>

  <!-- Step A -->
  <rect x="110" y="100" width="90" height="40" rx="6" fill="#E8EAF6" stroke="#3F51B5" stroke-width="1.5"/>
  <text x="155" y="125" text-anchor="middle" font-size="13" fill="#283593">Step A</text>
  <line x1="72" y1="120" x2="108" y2="120" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step B -->
  <rect x="240" y="100" width="90" height="40" rx="6" fill="#E8EAF6" stroke="#3F51B5" stroke-width="1.5"/>
  <text x="285" y="125" text-anchor="middle" font-size="13" fill="#283593">Step B</text>
  <line x1="200" y1="120" x2="238" y2="120" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step C (upper branch) -->
  <rect x="380" y="65" width="90" height="40" rx="6" fill="#E8EAF6" stroke="#3F51B5" stroke-width="1.5"/>
  <text x="425" y="90" text-anchor="middle" font-size="13" fill="#283593">Step C</text>
  <line x1="330" y1="110" x2="378" y2="87" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step D (lower branch) -->
  <rect x="380" y="135" width="90" height="40" rx="6" fill="#E8EAF6" stroke="#3F51B5" stroke-width="1.5"/>
  <text x="425" y="160" text-anchor="middle" font-size="13" fill="#283593">Step D</text>
  <line x1="330" y1="130" x2="378" y2="153" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step E (merge) -->
  <rect x="520" y="100" width="90" height="40" rx="6" fill="#E8EAF6" stroke="#3F51B5" stroke-width="1.5"/>
  <text x="565" y="125" text-anchor="middle" font-size="13" fill="#283593">Step E</text>
  <line x1="470" y1="90" x2="518" y2="115" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="470" y1="155" x2="518" y2="125" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- End -->
  <circle cx="645" cy="120" r="22" fill="#333" stroke="#111" stroke-width="1.5"/>
  <text x="645" y="125" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">End</text>
  <line x1="610" y1="120" x2="621" y2="120" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Condition labels -->
  <text x="355" y="60" text-anchor="middle" font-size="10" fill="#888">条件 A</text>
  <text x="355" y="185" text-anchor="middle" font-size="10" fill="#888">条件 B</text>

  <!-- Footer -->
  <text x="340" y="255" text-anchor="middle" font-size="12" fill="#888">特征：路径在设计时确定，运行时按条件选择分支</text>
  <text x="340" y="277" text-anchor="middle" font-size="12" fill="#aaa">类比：地铁线路图，站点和换乘规则预先设定</text>
</svg>
