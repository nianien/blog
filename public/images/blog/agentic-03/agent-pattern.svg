<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 360" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif">
  <text x="310" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#1F2937">Agent</text>

  <!-- Input -->
  <rect x="20" y="90" width="80" height="36" rx="6" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="60" y="113" text-anchor="middle" font-size="13" fill="#1E40AF">Input</text>

  <!-- Arrow: Input → LLM 1 -->
  <line x1="100" y1="108" x2="138" y2="108" stroke="#64748B" stroke-width="1.5"/>
  <polygon points="136,104 142,108 136,112" fill="#64748B"/>

  <!-- LLM Think 1 -->
  <rect x="140" y="80" width="120" height="50" rx="8" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="1.5"/>
  <text x="200" y="102" text-anchor="middle" font-size="12" font-weight="bold" fill="#6D28D9">LLM</text>
  <text x="200" y="118" text-anchor="middle" font-size="11" fill="#7C3AED">观察 + 思考</text>

  <!-- Arrow: LLM 1 → Tool A -->
  <line x1="260" y1="95" x2="308" y2="78" stroke="#64748B" stroke-width="1.5"/>
  <polygon points="304,74 310,77 304,82" fill="#64748B"/>

  <!-- Tool A -->
  <rect x="310" y="55" width="90" height="36" rx="6" fill="#F0FDF4" stroke="#22C55E" stroke-width="1.5"/>
  <text x="355" y="78" text-anchor="middle" font-size="13" fill="#166534">Tool A</text>

  <!-- Arrow: LLM 1 → Tool B -->
  <line x1="260" y1="115" x2="308" y2="130" stroke="#64748B" stroke-width="1.5"/>
  <polygon points="304,126 310,129 304,134" fill="#64748B"/>

  <!-- Tool B -->
  <rect x="310" y="115" width="90" height="36" rx="6" fill="#F0FDF4" stroke="#22C55E" stroke-width="1.5"/>
  <text x="355" y="138" text-anchor="middle" font-size="13" fill="#166534">Tool B</text>

  <!-- Arrow: Tool A → LLM 2 -->
  <line x1="400" y1="73" x2="438" y2="93" stroke="#64748B" stroke-width="1.5"/>
  <polygon points="434,89 440,93 434,97" fill="#64748B"/>

  <!-- Arrow: Tool B → LLM 2 -->
  <line x1="400" y1="133" x2="438" y2="113" stroke="#64748B" stroke-width="1.5"/>
  <polygon points="434,109 440,113 434,117" fill="#64748B"/>

  <!-- LLM Think 2 -->
  <rect x="440" y="80" width="120" height="50" rx="8" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="1.5"/>
  <text x="500" y="102" text-anchor="middle" font-size="12" font-weight="bold" fill="#6D28D9">LLM</text>
  <text x="500" y="118" text-anchor="middle" font-size="11" fill="#7C3AED">观察 + 思考</text>

  <!-- Arrow: LLM 2 → Tool C (L-shape: down then left) -->
  <line x1="480" y1="130" x2="480" y2="186" stroke="#8B5CF6" stroke-width="1.5"/>
  <line x1="480" y1="186" x2="372" y2="186" stroke="#8B5CF6" stroke-width="1.5"/>
  <polygon points="375,182 369,186 375,190" fill="#8B5CF6"/>

  <!-- Tool C -->
  <rect x="270" y="168" width="100" height="36" rx="6" fill="#F0FDF4" stroke="#22C55E" stroke-width="1.5"/>
  <text x="320" y="191" text-anchor="middle" font-size="13" fill="#166534">Tool C</text>

  <!-- LLM Judge diamond -->
  <polygon points="320,240 400,270 320,300 240,270" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="320" y="267" text-anchor="middle" font-size="11" font-weight="bold" fill="#92400E">LLM</text>
  <text x="320" y="281" text-anchor="middle" font-size="11" font-weight="bold" fill="#92400E">够了吗?</text>

  <!-- Arrow: Tool C → Judge -->
  <line x1="320" y1="204" x2="320" y2="238" stroke="#64748B" stroke-width="1.5"/>
  <polygon points="316,236 320,242 324,236" fill="#64748B"/>

  <!-- Loop back: Judge → LLM 1 (继续) -->
  <line x1="240" y1="270" x2="180" y2="270" stroke="#8B5CF6" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="180" y1="270" x2="180" y2="132" stroke="#8B5CF6" stroke-width="1.5" stroke-dasharray="5,3"/>
  <polygon points="176,134 180,128 184,134" fill="#8B5CF6"/>
  <text x="165" y="250" font-size="10" fill="#7C3AED">继续</text>

  <!-- Arrow: Judge → Output -->
  <line x1="400" y1="270" x2="460" y2="270" stroke="#64748B" stroke-width="1.5"/>
  <polygon points="458,266 464,270 458,274" fill="#64748B"/>

  <!-- Output -->
  <rect x="465" y="252" width="90" height="36" rx="6" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="510" y="275" text-anchor="middle" font-size="13" fill="#1E40AF">Output</text>

  <!-- Footer -->
  <text x="310" y="330" text-anchor="middle" font-size="12" fill="#94A3B8">特征：路径在运行时动态生成，每一步由 LLM 决定</text>
  <text x="310" y="350" text-anchor="middle" font-size="12" fill="#B0B8C4">类比：出租车司机，根据实时路况随时调整路线</text>
</svg>
