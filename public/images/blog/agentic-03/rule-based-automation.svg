<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 280" font-family="-apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="10" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,3 L0,6 Z" fill="#666"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="600" height="280" rx="12" fill="#fafafa" stroke="#e0e0e0" stroke-width="1.5"/>

  <!-- Title -->
  <text x="300" y="36" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">Rule-based Automation</text>

  <!-- Input box -->
  <rect x="40" y="100" width="90" height="40" rx="6" fill="#E3F2FD" stroke="#1976D2" stroke-width="1.5"/>
  <text x="85" y="125" text-anchor="middle" font-size="14" fill="#1565C0">Input</text>

  <!-- Arrow Input → Rule Match -->
  <line x1="130" y1="120" x2="185" y2="120" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Rule Match diamond -->
  <polygon points="240,80 310,120 240,160 170,120" fill="#FFF3E0" stroke="#E65100" stroke-width="1.5"/>
  <text x="240" y="117" text-anchor="middle" font-size="12" font-weight="bold" fill="#BF360C">Rule</text>
  <text x="240" y="132" text-anchor="middle" font-size="12" font-weight="bold" fill="#BF360C">Match</text>

  <!-- Action A -->
  <rect x="380" y="55" width="120" height="36" rx="6" fill="#E8F5E9" stroke="#388E3C" stroke-width="1.5"/>
  <text x="440" y="78" text-anchor="middle" font-size="13" fill="#2E7D32">Action A</text>
  <line x1="310" y1="105" x2="378" y2="75" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Action B -->
  <rect x="380" y="102" width="120" height="36" rx="6" fill="#E8F5E9" stroke="#388E3C" stroke-width="1.5"/>
  <text x="440" y="125" text-anchor="middle" font-size="13" fill="#2E7D32">Action B</text>
  <line x1="310" y1="120" x2="378" y2="120" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Action C -->
  <rect x="380" y="149" width="120" height="36" rx="6" fill="#E8F5E9" stroke="#388E3C" stroke-width="1.5"/>
  <text x="440" y="172" text-anchor="middle" font-size="13" fill="#2E7D32">Action C</text>
  <line x1="310" y1="135" x2="378" y2="165" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Footer text -->
  <text x="300" y="230" text-anchor="middle" font-size="12" fill="#888">特征：路径在编写时完全确定，运行时无决策</text>
  <text x="300" y="252" text-anchor="middle" font-size="12" fill="#aaa">类比：铁轨上的火车，轨道已铺好</text>
</svg>
