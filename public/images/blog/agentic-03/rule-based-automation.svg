<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 260" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif">
  <text x="300" y="32" text-anchor="middle" font-size="16" font-weight="bold" fill="#1F2937">Rule-based Automation</text>

  <!-- Input box -->
  <rect x="40" y="95" width="90" height="40" rx="6" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="85" y="120" text-anchor="middle" font-size="14" fill="#1E40AF">Input</text>

  <!-- Arrow Input → Rule Match -->
  <line x1="130" y1="115" x2="165" y2="115" stroke="#64748B" stroke-width="1.5"/>
  <polygon points="163,111 169,115 163,119" fill="#64748B"/>

  <!-- Rule Match diamond -->
  <polygon points="240,75 315,115 240,155 165,115" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="240" y="112" text-anchor="middle" font-size="12" font-weight="bold" fill="#92400E">Rule</text>
  <text x="240" y="127" text-anchor="middle" font-size="12" font-weight="bold" fill="#92400E">Match</text>

  <!-- Arrow → Action A -->
  <line x1="315" y1="100" x2="378" y2="72" stroke="#64748B" stroke-width="1.5"/>
  <polygon points="374,68 380,71 374,76" fill="#64748B"/>

  <!-- Action A -->
  <rect x="380" y="50" width="120" height="36" rx="6" fill="#F0FDF4" stroke="#22C55E" stroke-width="1.5"/>
  <text x="440" y="73" text-anchor="middle" font-size="13" fill="#166534">Action A</text>

  <!-- Arrow → Action B -->
  <line x1="315" y1="115" x2="378" y2="115" stroke="#64748B" stroke-width="1.5"/>
  <polygon points="376,111 382,115 376,119" fill="#64748B"/>

  <!-- Action B -->
  <rect x="380" y="97" width="120" height="36" rx="6" fill="#F0FDF4" stroke="#22C55E" stroke-width="1.5"/>
  <text x="440" y="120" text-anchor="middle" font-size="13" fill="#166534">Action B</text>

  <!-- Arrow → Action C -->
  <line x1="315" y1="130" x2="378" y2="158" stroke="#64748B" stroke-width="1.5"/>
  <polygon points="374,154 380,158 374,162" fill="#64748B"/>

  <!-- Action C -->
  <rect x="380" y="144" width="120" height="36" rx="6" fill="#F0FDF4" stroke="#22C55E" stroke-width="1.5"/>
  <text x="440" y="167" text-anchor="middle" font-size="13" fill="#166534">Action C</text>

  <!-- Footer -->
  <text x="300" y="215" text-anchor="middle" font-size="12" fill="#94A3B8">特征：路径在编写时完全确定，运行时无决策</text>
  <text x="300" y="237" text-anchor="middle" font-size="12" fill="#B0B8C4">类比：铁轨上的火车，轨道已铺好</text>
</svg>
