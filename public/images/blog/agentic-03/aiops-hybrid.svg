<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 430" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif">
  <text x="320" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#1F2937">AIOps 混合架构</text>

  <!-- 告警输入 -->
  <rect x="220" y="48" width="200" height="40" rx="6" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="320" y="73" text-anchor="middle" font-size="13" fill="#1E40AF">告警输入</text>

  <!-- Arrow: 告警 → Automation -->
  <line x1="320" y1="88" x2="320" y2="118" stroke="#64748B" stroke-width="1.5"/>
  <polygon points="316,116 320,122 324,116" fill="#64748B"/>

  <!-- Automation 去重+分级 -->
  <rect x="200" y="124" width="240" height="48" rx="6" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="320" y="146" text-anchor="middle" font-size="13" font-weight="bold" fill="#92400E">Automation</text>
  <text x="320" y="163" text-anchor="middle" font-size="12" fill="#B45309">告警去重 + 分级</text>

  <!-- Left branch: P4/P3 已知模式 -->
  <line x1="260" y1="172" x2="260" y2="190" stroke="#64748B" stroke-width="1.5"/>
  <line x1="260" y1="190" x2="130" y2="190" stroke="#64748B" stroke-width="1.5"/>
  <line x1="130" y1="190" x2="130" y2="216" stroke="#64748B" stroke-width="1.5"/>
  <polygon points="126,214 130,220 134,214" fill="#64748B"/>
  <text x="195" y="184" text-anchor="middle" font-size="11" fill="#94A3B8">P4/P3 已知模式</text>

  <!-- Right branch: P2/P1 或未知模式 -->
  <line x1="380" y1="172" x2="380" y2="190" stroke="#64748B" stroke-width="1.5"/>
  <line x1="380" y1="190" x2="500" y2="190" stroke="#64748B" stroke-width="1.5"/>
  <line x1="500" y1="190" x2="500" y2="216" stroke="#64748B" stroke-width="1.5"/>
  <polygon points="496,214 500,220 504,214" fill="#64748B"/>
  <text x="445" y="184" text-anchor="middle" font-size="11" fill="#94A3B8">P2/P1 或未知模式</text>

  <!-- Left: Automation 自动修复 -->
  <rect x="40" y="222" width="180" height="48" rx="6" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="130" y="244" text-anchor="middle" font-size="13" font-weight="bold" fill="#92400E">Automation</text>
  <text x="130" y="261" text-anchor="middle" font-size="12" fill="#B45309">自动修复</text>

  <!-- Arrow: 自动修复 → 通知 Oncall -->
  <line x1="130" y1="270" x2="130" y2="316" stroke="#64748B" stroke-width="1.5"/>
  <polygon points="126,314 130,320 134,314" fill="#64748B"/>

  <!-- 通知 Oncall -->
  <rect x="40" y="322" width="180" height="48" rx="6" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="130" y="351" text-anchor="middle" font-size="13" font-weight="bold" fill="#1E40AF">通知 Oncall</text>

  <!-- Right: Agent 根因分析 -->
  <rect x="410" y="222" width="180" height="48" rx="6" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="1.5"/>
  <text x="500" y="244" text-anchor="middle" font-size="13" font-weight="bold" fill="#6D28D9">Agent</text>
  <text x="500" y="261" text-anchor="middle" font-size="12" fill="#7C3AED">根因分析</text>

  <!-- Agent left sub-branch: 找到根因 -->
  <line x1="460" y1="270" x2="460" y2="290" stroke="#64748B" stroke-width="1.5"/>
  <line x1="460" y1="290" x2="360" y2="290" stroke="#64748B" stroke-width="1.5"/>
  <line x1="360" y1="290" x2="360" y2="316" stroke="#64748B" stroke-width="1.5"/>
  <polygon points="356,314 360,320 364,314" fill="#64748B"/>
  <text x="410" y="284" text-anchor="middle" font-size="11" fill="#94A3B8">找到根因</text>

  <!-- Agent right sub-branch: 无法确定 -->
  <line x1="540" y1="270" x2="540" y2="290" stroke="#64748B" stroke-width="1.5"/>
  <line x1="540" y1="290" x2="555" y2="290" stroke="#64748B" stroke-width="1.5"/>
  <line x1="555" y1="290" x2="555" y2="316" stroke="#64748B" stroke-width="1.5"/>
  <polygon points="551,314 555,320 559,314" fill="#64748B"/>
  <text x="548" y="284" text-anchor="middle" font-size="11" fill="#94A3B8">无法确定</text>

  <!-- Automation 执行修复 -->
  <rect x="270" y="322" width="180" height="48" rx="6" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="360" y="344" text-anchor="middle" font-size="13" font-weight="bold" fill="#92400E">Automation</text>
  <text x="360" y="361" text-anchor="middle" font-size="12" fill="#B45309">执行修复</text>

  <!-- 升级到人工 -->
  <rect x="480" y="322" width="150" height="48" rx="6" fill="#FEE2E2" stroke="#EF4444" stroke-width="1.5"/>
  <text x="555" y="351" text-anchor="middle" font-size="13" font-weight="bold" fill="#991B1B">升级到人工</text>
</svg>