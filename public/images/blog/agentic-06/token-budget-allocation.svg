<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 600" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="10" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,3 L0,6 Z" fill="#2c3e50"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="410" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#2c3e50">Context Window Token Budget Allocation</text>

  <!-- Main header -->
  <rect x="210" y="46" width="400" height="48" rx="6" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
  <text x="410" y="66" text-anchor="middle" font-size="14" font-weight="bold" fill="#2c3e50">Total Context Window: 8,192 tokens</text>
  <text x="410" y="82" text-anchor="middle" font-size="10" fill="#34495e">完整的 Prompt 预算分配</text>

  <!-- Arrow down -->
  <line x1="410" y1="94" x2="410" y2="120" stroke="#2c3e50" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ===== Three main sections ===== -->
  <!-- System Prompt -->
  <rect x="50" y="122" width="180" height="88" rx="6" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
  <text x="140" y="144" text-anchor="middle" font-size="13" font-weight="bold" fill="#2c3e50">System Prompt</text>
  <text x="140" y="164" text-anchor="middle" font-size="13" font-weight="bold" fill="#e74c3c">~25%</text>
  <text x="140" y="182" text-anchor="middle" font-size="12" font-weight="bold" fill="#2c3e50">(2,048)</text>
  <text x="140" y="200" text-anchor="middle" font-size="10" fill="#34495e">固定预算</text>

  <!-- Working Area -->
  <rect x="320" y="122" width="180" height="88" rx="6" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
  <text x="410" y="144" text-anchor="middle" font-size="13" font-weight="bold" fill="#2c3e50">Working Area</text>
  <text x="410" y="164" text-anchor="middle" font-size="13" font-weight="bold" fill="#e74c3c">~60%</text>
  <text x="410" y="182" text-anchor="middle" font-size="12" font-weight="bold" fill="#2c3e50">(4,915)</text>
  <text x="410" y="200" text-anchor="middle" font-size="10" fill="#34495e">动态分配</text>

  <!-- Output Reserved -->
  <rect x="590" y="122" width="180" height="88" rx="6" fill="#fff3e0" stroke="#f57c00" stroke-width="1.5"/>
  <text x="680" y="140" text-anchor="middle" font-size="13" font-weight="bold" fill="#2c3e50">Reserved for</text>
  <text x="680" y="156" text-anchor="middle" font-size="13" font-weight="bold" fill="#2c3e50">Output</text>
  <text x="680" y="176" text-anchor="middle" font-size="13" font-weight="bold" fill="#e74c3c">~15%</text>
  <text x="680" y="194" text-anchor="middle" font-size="12" font-weight="bold" fill="#2c3e50">(1,229)</text>

  <!-- Arrows down from System Prompt and Working Area -->
  <line x1="140" y1="210" x2="140" y2="238" stroke="#2c3e50" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="410" y1="210" x2="410" y2="238" stroke="#2c3e50" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ===== System Prompt breakdown ===== -->
  <rect x="50" y="240" width="180" height="100" rx="6" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
  <text x="140" y="258" text-anchor="middle" font-size="11" font-weight="bold" fill="#2c3e50">System Prompt 明细</text>
  <text x="62" y="278" font-size="10" fill="#34495e">├─ Identity: 500</text>
  <text x="62" y="294" font-size="10" fill="#34495e">├─ Rules: 800</text>
  <text x="62" y="310" font-size="10" fill="#34495e">├─ Format: 500</text>
  <text x="62" y="326" font-size="10" fill="#34495e">└─ Constraints: 248</text>

  <!-- ===== Working Area breakdown ===== -->
  <text x="410" y="256" text-anchor="middle" font-size="11" font-weight="bold" fill="#2c3e50">Working Area Split</text>

  <!-- Arrow down from label to two sub-boxes -->
  <line x1="410" y1="262" x2="410" y2="278" stroke="#2c3e50" stroke-width="1.5"/>
  <!-- Horizontal split -->
  <line x1="330" y1="278" x2="490" y2="278" stroke="#2c3e50" stroke-width="1.5"/>
  <!-- Vertical drops -->
  <line x1="330" y1="278" x2="330" y2="298" stroke="#2c3e50" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="490" y1="278" x2="490" y2="298" stroke="#2c3e50" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Tool Descriptions -->
  <rect x="270" y="300" width="120" height="80" rx="6" fill="#f3e5f5" stroke="#7b1fa2" stroke-width="1.5"/>
  <text x="330" y="320" text-anchor="middle" font-size="12" font-weight="bold" fill="#2c3e50">Tool Descs</text>
  <text x="330" y="338" text-anchor="middle" font-size="12" font-weight="bold" fill="#e74c3c">~15%</text>
  <text x="330" y="354" text-anchor="middle" font-size="11" font-weight="bold" fill="#2c3e50">(1,229)</text>
  <text x="330" y="370" text-anchor="middle" font-size="9" fill="#34495e">max 1500</text>

  <!-- History + State -->
  <rect x="430" y="300" width="120" height="80" rx="6" fill="#fce4ec" stroke="#c2185b" stroke-width="1.5"/>
  <text x="490" y="316" text-anchor="middle" font-size="12" font-weight="bold" fill="#2c3e50">History +</text>
  <text x="490" y="332" text-anchor="middle" font-size="12" font-weight="bold" fill="#2c3e50">State</text>
  <text x="490" y="350" text-anchor="middle" font-size="12" font-weight="bold" fill="#e74c3c">~45%</text>
  <text x="490" y="366" text-anchor="middle" font-size="11" font-weight="bold" fill="#2c3e50">(3,686)</text>
  <text x="490" y="378" text-anchor="middle" font-size="9" fill="#34495e">max 3000</text>

  <!-- ===== Key principles ===== -->
  <rect x="50" y="420" width="720" height="70" rx="6" fill="#f5f5f5" stroke="#7f8c8d" stroke-width="1.5"/>
  <text x="68" y="442" font-size="12" font-weight="bold" fill="#2c3e50">关键原则：</text>
  <text x="68" y="462" font-size="11" fill="#34495e">• Output Reserved 不能省（防止输出截断）</text>
  <text x="400" y="462" font-size="11" fill="#34495e">• System Prompt 预算固定（行为约束不能删）</text>
  <text x="68" y="480" font-size="11" fill="#34495e">• History 是最大压缩空间（优先压缩此处）</text>
</svg>
