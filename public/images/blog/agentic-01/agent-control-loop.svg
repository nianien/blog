<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 520" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif">

  <!-- Title -->
  <rect x="200" y="15" width="300" height="40" rx="8" fill="#1e293b"/>
  <text x="350" y="41" text-anchor="middle" fill="white" font-size="16" font-weight="600">Agent Control Loop</text>

  <!-- === Nodes === -->
  <rect x="270" y="80" width="160" height="60" rx="12" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="350" y="105" text-anchor="middle" fill="#1e40af" font-size="15" font-weight="600">Observe</text>
  <text x="350" y="125" text-anchor="middle" fill="#1e40af" font-size="12">感知输入</text>

  <rect x="490" y="175" width="160" height="60" rx="12" fill="#e0e7ff" stroke="#6366f1" stroke-width="2"/>
  <text x="570" y="200" text-anchor="middle" fill="#3730a3" font-size="15" font-weight="600">Think</text>
  <text x="570" y="220" text-anchor="middle" fill="#3730a3" font-size="12">理解意图</text>

  <rect x="490" y="280" width="160" height="60" rx="12" fill="#fae8ff" stroke="#a855f7" stroke-width="2"/>
  <text x="570" y="305" text-anchor="middle" fill="#7e22ce" font-size="15" font-weight="600">Plan</text>
  <text x="570" y="325" text-anchor="middle" fill="#7e22ce" font-size="12">制定计划</text>

  <rect x="270" y="380" width="160" height="60" rx="12" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="350" y="405" text-anchor="middle" fill="#15803d" font-size="15" font-weight="600">Act</text>
  <text x="350" y="425" text-anchor="middle" fill="#15803d" font-size="12">执行动作</text>

  <rect x="50" y="280" width="160" height="60" rx="12" fill="#fef9c3" stroke="#eab308" stroke-width="2"/>
  <text x="130" y="305" text-anchor="middle" fill="#a16207" font-size="15" font-weight="600">Reflect</text>
  <text x="130" y="325" text-anchor="middle" fill="#a16207" font-size="12">评估结果</text>

  <rect x="50" y="175" width="160" height="60" rx="12" fill="#ffedd5" stroke="#f97316" stroke-width="2"/>
  <text x="130" y="200" text-anchor="middle" fill="#c2410c" font-size="15" font-weight="600">Update</text>
  <text x="130" y="220" text-anchor="middle" fill="#c2410c" font-size="12">更新状态</text>

  <!-- === Arrows (computed with Python for precise orientation) === -->

  <!-- 1: Observe → Think -->
  <line x1="430" y1="120" x2="486" y2="175" stroke="#475569" stroke-width="2.5"/>
  <polygon points="490,178 479,175 486,167" fill="#475569"/>

  <!-- 2: Think → Plan -->
  <line x1="570" y1="235" x2="570" y2="276" stroke="#475569" stroke-width="2.5"/>
  <polygon points="570,280 565,270 575,270" fill="#475569"/>

  <!-- 3: Plan → Act -->
  <line x1="490" y1="330" x2="434" y2="382" stroke="#475569" stroke-width="2.5"/>
  <polygon points="430,385 434,375 441,382" fill="#475569"/>

  <!-- 4: Act → Reflect -->
  <line x1="270" y1="400" x2="214" y2="339" stroke="#475569" stroke-width="2.5"/>
  <polygon points="210,335 220,339 213,346" fill="#475569"/>

  <!-- 5: Reflect → Update -->
  <line x1="130" y1="280" x2="130" y2="239" stroke="#475569" stroke-width="2.5"/>
  <polygon points="130,235 135,245 125,245" fill="#475569"/>

  <!-- 6: Update → Observe -->
  <line x1="210" y1="185" x2="266" y2="134" stroke="#475569" stroke-width="2.5"/>
  <polygon points="270,130 266,140 259,133" fill="#475569"/>

  <!-- === Center: clockwise circular arrow (arc ~340°, gap ~20°) === -->
  <path d="M 367.2,215.4 A 30,30 0 1,1 357.8,211.0" fill="none" stroke="#059669" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Arrowhead at arc end, tangent to clockwise direction -->
  <polygon points="358,211 347,213 350,203" fill="#059669"/>
  <text x="350" y="248" text-anchor="middle" fill="#059669" font-size="10" font-weight="600">LOOP</text>

  <!-- Step numbers -->
  <circle cx="465" cy="148" r="12" fill="#3b82f6"/>
  <text x="465" y="152" text-anchor="middle" fill="white" font-size="10" font-weight="700">1</text>

  <circle cx="590" cy="255" r="12" fill="#6366f1"/>
  <text x="590" y="259" text-anchor="middle" fill="white" font-size="10" font-weight="700">2</text>

  <circle cx="468" cy="358" r="12" fill="#a855f7"/>
  <text x="468" y="362" text-anchor="middle" fill="white" font-size="10" font-weight="700">3</text>

  <circle cx="238" cy="372" r="12" fill="#22c55e"/>
  <text x="238" y="376" text-anchor="middle" fill="white" font-size="10" font-weight="700">4</text>

  <circle cx="110" cy="265" r="12" fill="#eab308"/>
  <text x="110" y="269" text-anchor="middle" fill="white" font-size="10" font-weight="700">5</text>

  <circle cx="230" cy="155" r="12" fill="#f97316"/>
  <text x="230" y="159" text-anchor="middle" fill="white" font-size="10" font-weight="700">6</text>

  <!-- Footer -->
  <text x="350" y="475" text-anchor="middle" fill="#94a3b8" font-size="11">每次循环迭代推进任务，直到满足退出条件</text>
  <text x="350" y="495" text-anchor="middle" fill="#94a3b8" font-size="11">退出策略：Max Iterations / Goal Completion / Token Budget</text>
</svg>
