<svg viewBox="0 0 560 170" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif">

  <!-- Left: LLM -->
  <rect x="20" y="20" width="240" height="130" rx="10" fill="#F5F5F5" stroke="#BDBDBD" stroke-width="1.5"/>
  <text x="140" y="46" font-size="13" font-weight="bold" text-anchor="middle" fill="#333">LLM</text>

  <rect x="42" y="58" width="196" height="24" rx="6" fill="#E3F2FD" stroke="none"/>
  <text x="140" y="75" font-size="10" text-anchor="middle" fill="#1565C0">≈ CPU — 强大的计算单元</text>

  <rect x="42" y="92" width="196" height="24" rx="6" fill="#FFF3E0" stroke="none"/>
  <text x="140" y="109" font-size="10" text-anchor="middle" fill="#E65100">Pure Function — 无状态、无副作用</text>

  <text x="140" y="138" font-size="9" text-anchor="middle" fill="#999">单独无法工作</text>

  <!-- Arrow -->
  <line x1="270" y1="85" x2="296" y2="85" stroke="#999" stroke-width="1.5"/>
  <polygon points="293,81 302,85 293,89" fill="#999"/>

  <!-- Right: Agent -->
  <rect x="304" y="20" width="240" height="130" rx="10" fill="#E8F5E9" stroke="#66BB6A" stroke-width="1.5"/>
  <text x="424" y="46" font-size="13" font-weight="bold" text-anchor="middle" fill="#2E7D32">Agent</text>

  <rect x="326" y="58" width="196" height="24" rx="6" fill="#C8E6C9" stroke="none"/>
  <text x="424" y="75" font-size="10" text-anchor="middle" fill="#2E7D32">≈ OS — 围绕 CPU 的完整运行时</text>

  <rect x="326" y="92" width="196" height="24" rx="6" fill="#DCEDC8" stroke="none"/>
  <text x="424" y="109" font-size="10" text-anchor="middle" fill="#33691E">Stateful System — 有状态、有执行循环</text>

  <text x="424" y="138" font-size="9" text-anchor="middle" fill="#999">能独立完成复杂任务</text>
</svg>
