<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 220" font-family="-apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="10" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,3 L0,6 Z" fill="#666"/>
    </marker>
    <marker id="arrow-purple" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="10" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,3 L0,6 Z" fill="#7B1FA2"/>
    </marker>
  </defs>

  <rect width="580" height="220" rx="12" fill="#fafafa" stroke="#e0e0e0" stroke-width="1.5"/>
  <text x="290" y="32" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">ReAct Loop</text>

  <!-- Thought -->
  <rect x="60" y="65" width="130" height="55" rx="8" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="1.5"/>
  <text x="125" y="88" text-anchor="middle" font-size="14" font-weight="bold" fill="#6A1B9A">Thought</text>
  <text x="125" y="107" text-anchor="middle" font-size="11" fill="#9C27B0">LLM 推理</text>

  <!-- Action -->
  <rect x="230" y="65" width="130" height="55" rx="8" fill="#FFF3E0" stroke="#F57C00" stroke-width="1.5"/>
  <text x="295" y="88" text-anchor="middle" font-size="14" font-weight="bold" fill="#E65100">Action</text>
  <text x="295" y="107" text-anchor="middle" font-size="11" fill="#F57C00">工具调用</text>

  <!-- Observation -->
  <rect x="400" y="65" width="130" height="55" rx="8" fill="#E8F5E9" stroke="#388E3C" stroke-width="1.5"/>
  <text x="465" y="88" text-anchor="middle" font-size="14" font-weight="bold" fill="#2E7D32">Observation</text>
  <text x="465" y="107" text-anchor="middle" font-size="11" fill="#388E3C">工具返回值</text>

  <!-- Forward arrows -->
  <line x1="190" y1="92" x2="228" y2="92" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="360" y1="92" x2="398" y2="92" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Loop back arrow -->
  <path d="M 465 120 L 465 155 L 125 155 L 125 122" fill="none" stroke="#7B1FA2" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-purple)"/>

  <!-- Loop label -->
  <text x="290" y="175" text-anchor="middle" font-size="12" fill="#7B1FA2">循环直到完成</text>
</svg>
