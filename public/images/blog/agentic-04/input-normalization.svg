<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 300" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="10" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,3 L0,6 Z" fill="#666"/>
    </marker>
  </defs>

  <rect width="680" height="300" rx="12" fill="#fafafa" stroke="#e0e0e0" stroke-width="1.5"/>
  <text x="340" y="32" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">输入归一化（OBSERVE 阶段）</text>

  <!-- Left: Input sources -->
  <text x="120" y="60" text-anchor="middle" font-size="12" font-weight="bold" fill="#555">输入来源</text>
  <rect x="30" y="72" width="180" height="195" rx="8" fill="#E3F2FD" stroke="#1976D2" stroke-width="1.5"/>
  <text x="120" y="100" text-anchor="middle" font-size="12" fill="#1565C0">用户消息</text>
  <text x="120" y="124" text-anchor="middle" font-size="12" fill="#1565C0">工具返回值</text>
  <text x="120" y="148" text-anchor="middle" font-size="12" fill="#1565C0">系统事件</text>
  <text x="120" y="172" text-anchor="middle" font-size="12" fill="#1565C0">定时触发</text>
  <text x="120" y="196" text-anchor="middle" font-size="12" fill="#1565C0">外部 Webhook</text>
  <text x="120" y="220" text-anchor="middle" font-size="12" fill="#1565C0">上一轮反思结果</text>

  <!-- Arrows -->
  <line x1="210" y1="120" x2="340" y2="120" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="210" y1="170" x2="340" y2="170" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="210" y1="220" x2="340" y2="220" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Right: Normalized format -->
  <text x="500" y="60" text-anchor="middle" font-size="12" font-weight="bold" fill="#555">归一化后</text>
  <rect x="345" y="72" width="300" height="195" rx="8" fill="#E8F5E9" stroke="#388E3C" stroke-width="1.5"/>

  <text x="370" y="105" font-size="11" fill="#2E7D32" font-family="'SF Mono', 'Menlo', monospace">{"role": "user",</text>
  <text x="380" y="123" font-size="11" fill="#2E7D32" font-family="'SF Mono', 'Menlo', monospace"> "content": "..."}</text>
  <line x1="365" y1="138" x2="625" y2="138" stroke="#C8E6C9" stroke-width="1"/>

  <text x="370" y="163" font-size="11" fill="#2E7D32" font-family="'SF Mono', 'Menlo', monospace">{"role": "system",</text>
  <text x="380" y="181" font-size="11" fill="#2E7D32" font-family="'SF Mono', 'Menlo', monospace"> "content": "..."}</text>
  <line x1="365" y1="196" x2="625" y2="196" stroke="#C8E6C9" stroke-width="1"/>

  <text x="370" y="221" font-size="11" fill="#2E7D32" font-family="'SF Mono', 'Menlo', monospace">{"role": "tool",</text>
  <text x="380" y="239" font-size="11" fill="#2E7D32" font-family="'SF Mono', 'Menlo', monospace"> "content": "..."}</text>
</svg>