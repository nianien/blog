<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 340" width="600" height="340">
  <style>
    text { font-family: system-ui, -apple-system, sans-serif; }
  </style>

  <!-- Title -->
  <text x="300" y="28" text-anchor="middle" font-size="14" font-weight="bold" fill="#263238">工具描述详细度 vs Token 消耗</text>

  <!-- Outer box -->
  <rect x="60" y="45" width="480" height="260" rx="8" fill="#FAFAFA" stroke="#B0BEC5" stroke-width="1.5"/>

  <!-- X axis labels -->
  <text x="120" y="72" text-anchor="middle" font-size="12" font-weight="bold" fill="#78909C">低</text>
  <text x="300" y="60" text-anchor="middle" font-size="13" font-weight="bold" fill="#455A64">描述详细度</text>
  <text x="480" y="72" text-anchor="middle" font-size="12" font-weight="bold" fill="#78909C">高</text>
  <line x1="150" y1="68" x2="450" y2="68" stroke="#B0BEC5" stroke-width="1"/>
  <path d="M145,68 L155,63 L155,73Z" fill="#B0BEC5"/>
  <path d="M455,68 L445,63 L445,73Z" fill="#B0BEC5"/>

  <!-- Y axis label -->
  <text x="48" y="130" text-anchor="middle" font-size="11" fill="#78909C" transform="rotate(-90, 48, 175)">Token 消耗</text>
  <text x="72" y="105" font-size="11" fill="#78909C">低</text>
  <text x="72" y="275" font-size="11" fill="#78909C">高</text>

  <!-- Quadrant: top-left (low detail, low cost) -->
  <rect x="80" y="85" width="220" height="100" rx="6" fill="#FFF3E0" fill-opacity="0.5"/>
  <text x="190" y="125" text-anchor="middle" font-size="20">⚡</text>
  <text x="190" y="148" text-anchor="middle" font-size="12" font-weight="bold" fill="#E65100">省钱但模糊</text>
  <text x="190" y="168" text-anchor="middle" font-size="11" fill="#F57C00">LLM 可能误选工具</text>

  <!-- Quadrant: bottom-right (high detail, high cost) -->
  <rect x="300" y="185" width="220" height="100" rx="6" fill="#E3F2FD" fill-opacity="0.5"/>
  <text x="410" y="225" text-anchor="middle" font-size="20">📖</text>
  <text x="410" y="248" text-anchor="middle" font-size="12" font-weight="bold" fill="#1565C0">精确但昂贵</text>
  <text x="410" y="268" text-anchor="middle" font-size="11" fill="#42A5F5">LLM 选择更准确</text>

  <!-- Diagonal arrow showing trade-off -->
  <line x1="170" y1="165" x2="370" y2="215" stroke="#90A4AE" stroke-width="1.5" stroke-dasharray="4"/>
</svg>