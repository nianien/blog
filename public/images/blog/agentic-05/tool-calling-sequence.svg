<svg viewBox="0 0 900 700" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif">
<!-- Title -->
  <text x="450" y="30" text-anchor="middle"  font-size="18px" font-weight="bold" fill="#1e40af">Tool Calling 完整序列图</text>

  <!-- Actors -->
  <g id="user">
    <rect x="60" y="70" width="80" height="40" rx="6"  fill="#f3f4f6" stroke="#d1d5db" stroke-width="1"/>
    <text x="100" y="98" text-anchor="middle"  font-size="14px" font-weight="600" fill="#1e40af">User</text>
  </g>

  <g id="llm">
    <rect x="280" y="70" width="80" height="40" rx="6"  fill="#f3f4f6" stroke="#d1d5db" stroke-width="1"/>
    <text x="320" y="98" text-anchor="middle"  font-size="14px" font-weight="600" fill="#1e40af">LLM API</text>
  </g>

  <g id="runtime">
    <rect x="500" y="70" width="80" height="40" rx="6"  fill="#f3f4f6" stroke="#d1d5db" stroke-width="1"/>
    <text x="540" y="98" text-anchor="middle"  font-size="14px" font-weight="600" fill="#1e40af">Runtime</text>
  </g>

  <g id="tool">
    <rect x="720" y="70" width="100" height="40" rx="6"  fill="#f3f4f6" stroke="#d1d5db" stroke-width="1"/>
    <text x="770" y="98" text-anchor="middle"  font-size="14px" font-weight="600" fill="#1e40af">Tool (Function)</text>
  </g>

  <!-- Lifelines -->
  <line x1="100" y1="110" x2="100" y2="650" stroke="#9ca3af" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="320" y1="110" x2="320" y2="650" stroke="#9ca3af" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="540" y1="110" x2="540" y2="650" stroke="#9ca3af" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="770" y1="110" x2="770" y2="650" stroke="#9ca3af" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Step 1: User query -->
  <path  d="M 100 150 L 320 150" stroke="#374151" stroke-width="1.5" fill="none"/>
  <text x="210" y="140" text-anchor="middle"  font-size="13px" fill="#374151">1. "北京今天天气"</text>

  <!-- Step 2: LLM reasoning (thinking box) -->
  <rect x="250" y="170" width="140" height="70" rx="6"  fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="320" y="190" text-anchor="middle"  font-size="12px" fill="#4b5563">推理：</text>
  <text x="320" y="207" text-anchor="middle"  font-size="12px" fill="#4b5563">用户想查天气</text>
  <text x="320" y="224" text-anchor="middle"  font-size="12px" fill="#4b5563">需要调用</text>
  <text x="320" y="241" text-anchor="middle"  font-size="12px" fill="#4b5563">get_weather</text>

  <!-- Step 3: Tool Call JSON -->
  <path  d="M 320 260 L 540 260" stroke="#374151" stroke-width="1.5" fill="none"/>
  <text x="430" y="252" text-anchor="middle"  font-size="13px" fill="#374151">2. Tool Call JSON</text>

  <!-- Tool Call JSON box -->
  <rect x="360" y="290" width="160" height="90" rx="4" fill="#eff6ff" stroke="#3b82f6" stroke-width="1"/>
  <text x="440" y="310" text-anchor="middle"  font-size="12px" fill="#4b5563">{</text>
  <text x="440" y="330" text-anchor="middle"  font-size="12px" fill="#4b5563">"name": "get_weather",</text>
  <text x="440" y="350" text-anchor="middle"  font-size="12px" fill="#4b5563">"arguments": {</text>
  <text x="440" y="370" text-anchor="middle"  font-size="12px" fill="#4b5563">"city": "北京"</text>
  <text x="440" y="390" text-anchor="middle"  font-size="12px" fill="#4b5563">}}</text>

  <!-- Step 4: Execute function -->
  <path  d="M 540 400 L 770 400" stroke="#374151" stroke-width="1.5" fill="none"/>
  <text x="655" y="392" text-anchor="middle"  font-size="13px" fill="#374151">3. get_weather("北京")</text>

  <!-- Step 5: Tool result -->
  <path  d="M 770 440 L 540 440" stroke="#374151" stroke-width="1.5" fill="none"/>
  <text x="655" y="432" text-anchor="middle"  font-size="13px" fill="#374151">4. Tool Result</text>

  <!-- Result box -->
  <rect x="590" y="480" width="140" height="70" rx="4" fill="#f0fdf4" stroke="#22c55e" stroke-width="1"/>
  <text x="660" y="500" text-anchor="middle"  font-size="12px" fill="#4b5563">{</text>
  <text x="660" y="520" text-anchor="middle"  font-size="12px" fill="#4b5563">"temp": 28,</text>
  <text x="660" y="540" text-anchor="middle"  font-size="12px" fill="#4b5563">"condition": "晴"</text>
  <text x="660" y="560" text-anchor="middle"  font-size="12px" fill="#4b5563">}</text>

  <!-- Step 6: Pass result back to LLM -->
  <path  d="M 540 500 L 320 500" stroke="#374151" stroke-width="1.5" fill="none"/>
  <text x="430" y="492" text-anchor="middle"  font-size="13px" fill="#374151">5. Inject Result</text>

  <!-- Step 7: LLM reasoning again (thinking box) -->
  <rect x="250" y="530" width="140" height="70" rx="6"  fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="320" y="550" text-anchor="middle"  font-size="12px" fill="#4b5563">推理：</text>
  <text x="320" y="567" text-anchor="middle"  font-size="12px" fill="#4b5563">根据工具返回</text>
  <text x="320" y="584" text-anchor="middle"  font-size="12px" fill="#4b5563">组织回答</text>

  <!-- Step 8: Final response -->
  <path  d="M 320 620 L 100 620" stroke="#374151" stroke-width="1.5" fill="none"/>
  <text x="210" y="610" text-anchor="middle"  font-size="13px" fill="#374151">6. Final Answer</text>

  <!-- Response text -->
  <text x="100" y="645" text-anchor="middle"  font-size="13px" fill="#374151">北京今天28°C,晴</text>
  <polygon points="320,150 312,153 312,147" fill="#374151"/>
  <polygon points="540,260 532,263 532,257" fill="#374151"/>
  <polygon points="770,400 762,403 762,397" fill="#374151"/>
  <polygon points="540,440 548,437 548,443" fill="#374151"/>
  <polygon points="320,500 328,497 328,503" fill="#374151"/>
  <polygon points="100,620 108,617 108,623" fill="#374151"/>
</svg>