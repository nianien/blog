<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 360" width="700" height="360">
  <style>
    text { font-family: system-ui, -apple-system, sans-serif; }
  </style>

  <!-- Title -->
  <text x="350" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#263238">工具数量 vs 选择准确率</text>

  <!-- Axes -->
  <line x1="80" y1="50" x2="80" y2="280" stroke="#455A64" stroke-width="2"/>
  <line x1="80" y1="280" x2="640" y2="280" stroke="#455A64" stroke-width="2"/>

  <!-- Y axis labels -->
  <text x="70" y="62" text-anchor="end" font-size="11" fill="#546E7A">100%</text>
  <text x="70" y="108" text-anchor="end" font-size="11" fill="#546E7A">90%</text>
  <text x="70" y="154" text-anchor="end" font-size="11" fill="#546E7A">80%</text>
  <text x="70" y="200" text-anchor="end" font-size="11" fill="#546E7A">70%</text>
  <text x="70" y="246" text-anchor="end" font-size="11" fill="#546E7A">60%</text>

  <!-- Grid lines -->
  <line x1="80" y1="57" x2="640" y2="57" stroke="#ECEFF1" stroke-width="1"/>
  <line x1="80" y1="103" x2="640" y2="103" stroke="#ECEFF1" stroke-width="1"/>
  <line x1="80" y1="149" x2="640" y2="149" stroke="#ECEFF1" stroke-width="1"/>
  <line x1="80" y1="195" x2="640" y2="195" stroke="#ECEFF1" stroke-width="1"/>
  <line x1="80" y1="241" x2="640" y2="241" stroke="#ECEFF1" stroke-width="1"/>

  <!-- Curve -->
  <path d="M94,60 Q180,65 220,80 Q280,105 340,145 Q420,195 500,225 Q560,240 620,248" stroke="#1565C0" stroke-width="3" fill="none"/>

  <!-- X axis labels -->
  <text x="94" y="298" text-anchor="middle" font-size="10" fill="#546E7A">0</text>
  <text x="164" y="298" text-anchor="middle" font-size="10" fill="#546E7A">5</text>
  <text x="234" y="298" text-anchor="middle" font-size="10" fill="#546E7A">10</text>
  <text x="304" y="298" text-anchor="middle" font-size="10" fill="#546E7A">15</text>
  <text x="374" y="298" text-anchor="middle" font-size="10" fill="#546E7A">20</text>
  <text x="444" y="298" text-anchor="middle" font-size="10" fill="#546E7A">25</text>
  <text x="514" y="298" text-anchor="middle" font-size="10" fill="#546E7A">30</text>
  <text x="584" y="298" text-anchor="middle" font-size="10" fill="#546E7A">35</text>
  <text x="640" y="298" text-anchor="middle" font-size="10" fill="#546E7A">40</text>

  <!-- Axis titles -->
  <text x="20" y="170" text-anchor="middle" font-size="12" fill="#455A64" transform="rotate(-90, 20, 170)">选择准确率</text>
  <text x="360" y="318" text-anchor="middle" font-size="12" fill="#455A64">工具数量</text>

  <!-- Zone markers -->
  <rect x="94" y="282" width="200" height="8" rx="2" fill="#4CAF50" fill-opacity="0.6"/>
  <text x="194" y="335" text-anchor="middle" font-size="11" font-weight="bold" fill="#2E7D32">全量传递</text>

  <rect x="304" y="282" width="336" height="8" rx="2" fill="#FF9800" fill-opacity="0.6"/>
  <text x="472" y="335" text-anchor="middle" font-size="11" font-weight="bold" fill="#E65100">需要过滤策略</text>

  <!-- Threshold line -->
  <line x1="304" y1="50" x2="304" y2="280" stroke="#E53935" stroke-width="1" stroke-dasharray="5"/>
  <text x="304" y="45" text-anchor="middle" font-size="10" fill="#E53935">~15 个工具</text>
</svg>