<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 280" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif">
  <rect width="800" height="280" fill="#FAFAFA" rx="8"/>

  <!-- Offline phase -->
  <text x="200" y="24" text-anchor="middle" font-size="12" font-weight="bold" fill="#94A3B8">Offline Build</text>
  <rect x="30" y="40" width="110" height="44" rx="6" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="85" y="66" text-anchor="middle" font-size="12" font-weight="bold" fill="#92400E">.proto file</text>
  <line x1="140" y1="62" x2="170" y2="62" stroke="#94A3B8" stroke-width="1.5"/>
  <polygon points="178,62 170,57 170,67" fill="#94A3B8"/>
  <rect x="180" y="40" width="150" height="44" rx="6" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="255" y="58" text-anchor="middle" font-size="11" font-weight="bold" fill="#1E40AF">protoc</text>
  <text x="255" y="74" text-anchor="middle" font-size="11" font-weight="bold" fill="#1E40AF">+ custom plugin</text>
  <line x1="330" y1="62" x2="370" y2="62" stroke="#94A3B8" stroke-width="1.5"/>
  <polygon points="378,62 370,57 370,67" fill="#94A3B8"/>
  <rect x="380" y="40" width="160" height="44" rx="6" fill="#D1FAE5" stroke="#10B981" stroke-width="1.5"/>
  <text x="460" y="58" text-anchor="middle" font-size="11" font-weight="bold" fill="#065F46">JSON Schema</text>
  <text x="460" y="74" text-anchor="middle" font-size="10" fill="#10B981">(FileDescriptorProto)</text>

  <!-- Config center -->
  <line x1="540" y1="62" x2="580" y2="62" stroke="#94A3B8" stroke-width="1.5"/>
  <polygon points="588,62 580,57 580,67" fill="#94A3B8"/>
  <rect x="590" y="35" width="180" height="54" rx="8" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="1.5"/>
  <text x="680" y="58" text-anchor="middle" font-size="12" font-weight="bold" fill="#5B21B6">Config Center</text>
  <text x="680" y="76" text-anchor="middle" font-size="10" fill="#8B5CF6">Nacos / Apollo / Etcd</text>

  <!-- Divider -->
  <line x1="20" y1="110" x2="780" y2="110" stroke="#E5E7EB" stroke-width="1" stroke-dasharray="6,4"/>
  <text x="400" y="130" text-anchor="middle" font-size="12" font-weight="bold" fill="#94A3B8">Runtime (no redeploy)</text>

  <!-- Watch arrow -->
  <line x1="680" y1="89" x2="680" y2="150" stroke="#8B5CF6" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="680,158 675,150 685,150" fill="#8B5CF6"/>
  <text x="715" y="130" font-size="10" fill="#8B5CF6">watch / poll</text>

  <!-- Application -->
  <rect x="440" y="160" width="320" height="100" rx="8" fill="#F8FAFC" stroke="#94A3B8" stroke-width="1.5"/>
  <text x="600" y="182" text-anchor="middle" font-size="13" font-weight="bold" fill="#1E293B">Application</text>
  <rect x="460" y="195" width="130" height="26" rx="6" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1"/>
  <text x="525" y="212" text-anchor="middle" font-size="10" fill="#1E40AF">JSON → FDProto</text>
  <rect x="460" y="225" width="130" height="26" rx="6" fill="#D1FAE5" stroke="#10B981" stroke-width="1"/>
  <text x="525" y="242" text-anchor="middle" font-size="10" fill="#065F46">FDProto → FD</text>
  <rect x="610" y="195" width="130" height="26" rx="6" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="1"/>
  <text x="675" y="212" text-anchor="middle" font-size="10" fill="#5B21B6">FD → dynamicpb.Msg</text>
  <rect x="610" y="225" width="130" height="26" rx="6" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1"/>
  <text x="675" y="242" text-anchor="middle" font-size="10" fill="#92400E">Marshal / Unmarshal</text>

  <!-- Update flow note -->
  <rect x="30" y="160" width="380" height="100" rx="8" fill="#FFF7ED" stroke="#F97316" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="220" y="185" text-anchor="middle" font-size="12" font-weight="bold" fill="#9A3412">Schema Update Flow</text>
  <text x="220" y="208" text-anchor="middle" font-size="11" fill="#9A3412">1. Modify .proto &amp; re-run protoc plugin</text>
  <text x="220" y="226" text-anchor="middle" font-size="11" fill="#9A3412">2. Push new JSON to config center</text>
  <text x="220" y="244" text-anchor="middle" font-size="11" fill="#9A3412">3. App detects change &amp; reloads schema</text>
</svg>
