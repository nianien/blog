<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 225" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif">
  <rect width="420" height="225" fill="#FAFAFA" rx="8"/>
  <rect x="40" y="15" width="340" height="40" rx="6" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="210" y="32" text-anchor="middle" font-size="11" font-weight="bold" fill="#1E40AF">UI Layer</text>
  <text x="210" y="47" text-anchor="middle" font-size="9" fill="#6B7280">← 按钮、输入框、弹窗</text>
  <rect x="40" y="65" width="340" height="40" rx="6" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="1.5"/>
  <text x="210" y="82" text-anchor="middle" font-size="11" font-weight="bold" fill="#5B21B6">Interaction Layer</text>
  <text x="210" y="97" text-anchor="middle" font-size="9" fill="#6B7280">← 事件捕获、手势识别</text>
  <rect x="40" y="115" width="340" height="40" rx="6" fill="#D1FAE5" stroke="#10B981" stroke-width="1.5"/>
  <text x="210" y="132" text-anchor="middle" font-size="11" font-weight="bold" fill="#065F46">Story State Layer</text>
  <text x="210" y="147" text-anchor="middle" font-size="9" fill="#6B7280">← 状态管理、剧情追踪</text>
  <rect x="40" y="165" width="340" height="40" rx="6" fill="#F1F5F9" stroke="#475569" stroke-width="1.5"/>
  <text x="210" y="182" text-anchor="middle" font-size="11" font-weight="bold" fill="#475569">Video Layer</text>
  <text x="210" y="197" text-anchor="middle" font-size="9" fill="#6B7280">← 视频播放、帧渲染</text>
</svg>
