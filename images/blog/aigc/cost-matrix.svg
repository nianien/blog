<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif">
  <rect width="480" height="320" fill="#FAFAFA" rx="8"/>
  <line x1="40" y1="160" x2="440" y2="160" stroke="#94A3B8" stroke-width="1.5"/>
  <line x1="240" y1="30" x2="240" y2="290" stroke="#94A3B8" stroke-width="1.5"/>
  <text x="240" y="22" text-anchor="middle" fill="#3B82F6" font-weight="bold" font-size="12">高价值</text>
  <text x="240" y="308" text-anchor="middle" fill="#6B7280" font-size="11">低价值</text>
  <text x="25" y="164" text-anchor="middle" font-size="11" fill="#6B7280">高频</text>
  <text x="455" y="164" text-anchor="middle" font-size="11" fill="#6B7280">低频</text>
  <text x="120" y="95" text-anchor="middle" fill="#1E40AF" font-weight="bold" font-size="12">模拟面试</text>
  <text x="120" y="113" text-anchor="middle" fill="#1E40AF" font-weight="bold" font-size="12">医疗问诊</text>
  <text x="120" y="131" text-anchor="middle" font-size="9" fill="#6B7280">(可承受高成本)</text>
  <text x="360" y="95" text-anchor="middle" fill="#5B21B6" font-weight="bold" font-size="12">企业危机演练</text>
  <text x="360" y="113" text-anchor="middle" fill="#5B21B6" font-weight="bold" font-size="12">高端定制培训</text>
  <text x="360" y="131" text-anchor="middle" font-size="9" fill="#6B7280">(单次付费意愿强)</text>
  <text x="120" y="225" text-anchor="middle" fill="#DC2626" font-weight="bold" font-size="12">娱乐短剧</text>
  <text x="120" y="243" text-anchor="middle" fill="#DC2626" font-weight="bold" font-size="12">社交互动</text>
  <text x="120" y="261" text-anchor="middle" font-size="9" fill="#6B7280">(必须极低成本)</text>
  <text x="360" y="225" text-anchor="middle" fill="#065F46" font-weight="bold" font-size="12">标准营销导购</text>
  <text x="360" y="243" text-anchor="middle" fill="#065F46" font-weight="bold" font-size="12">教育课件</text>
  <text x="360" y="261" text-anchor="middle" font-size="9" fill="#6B7280">(中等成本可控)</text>
</svg>
