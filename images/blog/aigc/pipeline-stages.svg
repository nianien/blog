  <rect x="20" y="180" width="16" height="12" rx="3" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1"/>
  <text x="42" y="190" font-size="10" fill="#6B7280">识别阶段</text>
  <rect x="110" y="180" width="16" height="12" rx="3" fill="#D1FAE5" stroke="#10B981" stroke-width="1"/>
  <text x="132" y="190" font-size="10" fill="#6B7280">翻译阶段</text>
  <rect x="200" y="180" width="16" height="12" rx="3" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="1"/>
  <text x="222" y="190" font-size="10" fill="#6B7280">配音阶段</text>
  <rect x="290" y="180" width="16" height="12" rx="3" fill="#FEE2E2" stroke="#EF4444" stroke-width="1"/>
  <text x="312" y="190" font-size="10" fill="#6B7280">人工质量关卡</text>
