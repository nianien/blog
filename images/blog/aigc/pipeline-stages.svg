  <rect x="394" y="34" width="70" height="44" rx="6" fill="#FEE2E2" stroke="#EF4444" stroke-width="2"/>
  <text x="429" y="53" text-anchor="middle" font-size="9" font-weight="bold" fill="#991B1B">GATE</text>
  <text x="429" y="67" text-anchor="middle" font-size="8" fill="#DC2626">source_review</text>

  <line x1="464" y1="56" x2="478" y2="56" stroke="#94A3B8" stroke-width="1.5"/>
  <polygon points="484,56 478,52 478,60" fill="#94A3B8"/>

  <rect x="486" y="38" width="52" height="36" rx="6" fill="#D1FAE5" stroke="#10B981" stroke-width="1.5"/>
