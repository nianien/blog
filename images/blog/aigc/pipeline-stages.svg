<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 220" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif">
  <rect width="960" height="220" fill="#FAFAFA" rx="8"/>

  <!-- Stage labels -->
  <text x="480" y="22" text-anchor="middle" font-size="13" font-weight="bold" fill="#94A3B8">Pipeline Stages</text>

