  <line x1="718" y1="56" x2="732" y2="56" stroke="#94A3B8" stroke-width="1.5"/>
  <polygon points="738,56 732,52 732,60" fill="#94A3B8"/>

  <rect x="740" y="38" width="52" height="36" rx="6" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="1.5"/>
