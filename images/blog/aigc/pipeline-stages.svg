  <text x="914" y="60" text-anchor="middle" font-size="11" font-weight="bold" fill="#475569">Burn</text>

  <!-- Output labels -->
  <text x="60" y="98" text-anchor="middle" font-size="9" fill="#6B7280">音频 + 人声分离</text>
  <text x="160" y="98" text-anchor="middle" font-size="9" fill="#6B7280">ASR 原始响应</text>
  <text x="247" y="98" text-anchor="middle" font-size="9" fill="#6B7280">subtitle.model</text>
