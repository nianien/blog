  <text x="840" y="98" text-anchor="middle" font-size="9" fill="#6B7280">混音 WAV</text>
  <text x="914" y="98" text-anchor="middle" font-size="9" fill="#6B7280">成片 MP4</text>

  <!-- SSOT bar -->
