  <text x="200" y="155" text-anchor="middle" font-size="10" fill="#166534">asr-result.json</text>
  <text x="480" y="155" text-anchor="middle" font-size="10" fill="#166534">subtitle.model.json</text>
  <text x="760" y="155" text-anchor="middle" font-size="10" fill="#166534">dub.model.json</text>

