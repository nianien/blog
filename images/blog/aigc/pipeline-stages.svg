  <line x1="100" y1="56" x2="120" y2="56" stroke="#94A3B8" stroke-width="1.5"/>
  <polygon points="126,56 120,52 120,60" fill="#94A3B8"/>

  <rect x="128" y="38" width="64" height="36" rx="6" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="160" y="60" text-anchor="middle" font-size="11" font-weight="bold" fill="#1E40AF">ASR</text>

  <line x1="192" y1="56" x2="206" y2="56" stroke="#94A3B8" stroke-width="1.5"/>
  <polygon points="212,56 206,52 206,60" fill="#94A3B8"/>

