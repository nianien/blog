  <line x1="538" y1="56" x2="552" y2="56" stroke="#94A3B8" stroke-width="1.5"/>
  <polygon points="558,56 552,52 552,60" fill="#94A3B8"/>

  <rect x="560" y="38" width="60" height="36" rx="6" fill="#D1FAE5" stroke="#10B981" stroke-width="1.5"/>
  <text x="590" y="60" text-anchor="middle" font-size="11" font-weight="bold" fill="#065F46">Align</text>

  <line x1="620" y1="56" x2="634" y2="56" stroke="#94A3B8" stroke-width="1.5"/>
  <polygon points="640,56 634,52 634,60" fill="#94A3B8"/>

