<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif">
  <text x="450" y="36" text-anchor="middle" font-size="18" font-weight="600" fill="#1F2937">数据飞轮：六环闭环 + 数据主线</text>

  <!-- Center hub -->
  <rect x="340" y="260" width="220" height="100" rx="8" fill="#F3F4F6" stroke="#6B7280" stroke-width="1.5"/>
  <text x="450" y="290" text-anchor="middle" font-size="14" font-weight="600" fill="#1F2937">数据主线</text>
  <text x="450" y="315" text-anchor="middle" font-size="12" fill="#374151">内容 ID × UTM/渠道 × 客户 ID</text>
  <text x="450" y="340" text-anchor="middle" font-size="11" fill="#6B7280">三者贯穿，否则飞轮断裂</text>

  <!-- ① RAG 知识库 (top) -->
  <rect x="370" y="80" width="160" height="70" rx="8" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="1.5"/>
  <text x="450" y="108" text-anchor="middle" font-size="14" font-weight="600" fill="#4C1D95">① RAG 知识库</text>
  <text x="450" y="130" text-anchor="middle" font-size="11" fill="#4C1D95">企业层 + 行业层</text>

  <!-- ② AI 内容生成 (upper right) -->
  <rect x="610" y="190" width="160" height="70" rx="8" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="690" y="218" text-anchor="middle" font-size="14" font-weight="600" fill="#1E3A8A">② AI 内容生成</text>
  <text x="690" y="240" text-anchor="middle" font-size="11" fill="#1E3A8A">多语言 / 多模态</text>

  <!-- ③ 多渠道分发 (lower right) -->
  <rect x="610" y="365" width="160" height="70" rx="8" fill="#DCFCE7" stroke="#22C55E" stroke-width="1.5"/>
  <text x="690" y="393" text-anchor="middle" font-size="14" font-weight="600" fill="#14532D">③ 多渠道分发</text>
  <text x="690" y="415" text-anchor="middle" font-size="11" fill="#14532D">SEO / 社媒 / EDM</text>

  <!-- ④ 承接 / CRM (bottom) -->
  <rect x="370" y="475" width="160" height="70" rx="8" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="450" y="503" text-anchor="middle" font-size="14" font-weight="600" fill="#78350F">④ 承接 / CRM</text>
  <text x="450" y="525" text-anchor="middle" font-size="11" fill="#78350F">行为 / 线索 / 成交</text>

  <!-- ⑤ 数据回收 (lower left) -->
  <rect x="130" y="365" width="160" height="70" rx="8" fill="#FEE2E2" stroke="#EF4444" stroke-width="1.5"/>
  <text x="210" y="393" text-anchor="middle" font-size="14" font-weight="600" fill="#7F1D1D">⑤ 数据回收</text>
  <text x="210" y="415" text-anchor="middle" font-size="11" fill="#7F1D1D">采集 + 语义化</text>

  <!-- ⑥ 测评判优 (upper left) -->
  <rect x="130" y="190" width="160" height="70" rx="8" fill="#FCE7F3" stroke="#EC4899" stroke-width="1.5"/>
  <text x="210" y="218" text-anchor="middle" font-size="14" font-weight="600" fill="#831843">⑥ 测评判优</text>
  <text x="210" y="240" text-anchor="middle" font-size="11" fill="#831843">离线 + 在线 A/B</text>

  <!-- Arrows clockwise -->
  <!-- ① → ② -->
  <line x1="535" y1="140" x2="612" y2="195" stroke="#6B7280" stroke-width="1.5"/>
  <polygon points="618,199 604,196 610,186" fill="#6B7280"/>

  <!-- ② → ③ -->
  <line x1="690" y1="262" x2="690" y2="362" stroke="#6B7280" stroke-width="1.5"/>
  <polygon points="690,368 684,356 696,356" fill="#6B7280"/>

  <!-- ③ → ④ -->
  <line x1="608" y1="430" x2="532" y2="485" stroke="#6B7280" stroke-width="1.5"/>
  <polygon points="525,489 538,486 533,474" fill="#6B7280"/>

  <!-- ④ → ⑤ -->
  <line x1="368" y1="485" x2="292" y2="430" stroke="#6B7280" stroke-width="1.5"/>
  <polygon points="285,425 298,427 290,438" fill="#6B7280"/>

  <!-- ⑤ → ⑥ -->
  <line x1="210" y1="362" x2="210" y2="262" stroke="#6B7280" stroke-width="1.5"/>
  <polygon points="210,256 204,268 216,268" fill="#6B7280"/>

  <!-- ⑥ → ① -->
  <line x1="288" y1="195" x2="365" y2="140" stroke="#6B7280" stroke-width="1.5"/>
  <polygon points="372,136 358,138 367,150" fill="#6B7280"/>

  <!-- footer -->
  <text x="450" y="590" text-anchor="middle" font-size="12" fill="#6B7280">飞轮转动 = 上一轮的成交 / 复购数据真的改变了下一轮的内容与投放决策</text>
</svg>
