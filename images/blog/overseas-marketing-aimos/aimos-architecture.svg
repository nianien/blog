<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif">
  <text x="450" y="36" text-anchor="middle" font-size="18" font-weight="600" fill="#1F2937">全链路营销 AIOS 四层架构：能力为 Agent 服务</text>

  <!-- Layer 1: 交互层 -->
  <rect x="100" y="70" width="700" height="80" rx="8" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="160" y="105" font-size="14" font-weight="600" fill="#1E3A8A">交互层</text>
  <text x="160" y="125" font-size="12" fill="#1E3A8A">Agent</text>
  <rect x="280" y="85" width="150" height="50" rx="6" fill="#FFFFFF" stroke="#3B82F6" stroke-width="1.2"/>
  <text x="355" y="116" text-anchor="middle" font-size="12" fill="#1E3A8A">意图理解</text>
  <rect x="450" y="85" width="150" height="50" rx="6" fill="#FFFFFF" stroke="#3B82F6" stroke-width="1.2"/>
  <text x="525" y="116" text-anchor="middle" font-size="12" fill="#1E3A8A">对话编排</text>
  <rect x="620" y="85" width="150" height="50" rx="6" fill="#FFFFFF" stroke="#3B82F6" stroke-width="1.2"/>
  <text x="695" y="116" text-anchor="middle" font-size="12" fill="#1E3A8A">长期记忆</text>

  <!-- Layer 2: 工具层 -->
  <rect x="100" y="170" width="700" height="100" rx="8" fill="#DCFCE7" stroke="#22C55E" stroke-width="1.5"/>
  <text x="160" y="205" font-size="14" font-weight="600" fill="#14532D">工具层</text>
  <text x="160" y="225" font-size="12" fill="#14532D">能力即工具</text>

  <rect x="280" y="185" width="100" height="35" rx="6" fill="#FFFFFF" stroke="#22C55E" stroke-width="1.2"/>
  <text x="330" y="208" text-anchor="middle" font-size="11" fill="#14532D">建站引擎</text>
  <rect x="390" y="185" width="100" height="35" rx="6" fill="#FFFFFF" stroke="#22C55E" stroke-width="1.2"/>
  <text x="440" y="208" text-anchor="middle" font-size="11" fill="#14532D">内容引擎</text>
  <rect x="500" y="185" width="100" height="35" rx="6" fill="#FFFFFF" stroke="#22C55E" stroke-width="1.2"/>
  <text x="550" y="208" text-anchor="middle" font-size="11" fill="#14532D">SEO · GEO</text>
  <rect x="610" y="185" width="100" height="35" rx="6" fill="#FFFFFF" stroke="#22C55E" stroke-width="1.2"/>
  <text x="660" y="208" text-anchor="middle" font-size="11" fill="#14532D">发布适配</text>

  <rect x="280" y="230" width="100" height="35" rx="6" fill="#FFFFFF" stroke="#22C55E" stroke-width="1.2"/>
  <text x="330" y="253" text-anchor="middle" font-size="11" fill="#14532D">数据查询</text>
  <rect x="390" y="230" width="100" height="35" rx="6" fill="#FFFFFF" stroke="#22C55E" stroke-width="1.2"/>
  <text x="440" y="253" text-anchor="middle" font-size="11" fill="#14532D">AI 客服</text>
  <rect x="500" y="230" width="100" height="35" rx="6" fill="#FFFFFF" stroke="#22C55E" stroke-width="1.2"/>
  <text x="550" y="253" text-anchor="middle" font-size="11" fill="#14532D">AI SDR</text>
  <rect x="610" y="230" width="100" height="35" rx="6" fill="#FFFFFF" stroke="#22C55E" stroke-width="1.2"/>
  <text x="660" y="253" text-anchor="middle" font-size="11" fill="#14532D">CRM 操作</text>

  <!-- Layer 3: 知识与记忆 -->
  <rect x="100" y="290" width="700" height="80" rx="8" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="160" y="325" font-size="14" font-weight="600" fill="#78350F">知识与记忆</text>
  <text x="160" y="345" font-size="12" fill="#78350F">RAG</text>

  <rect x="280" y="305" width="150" height="50" rx="6" fill="#FFFFFF" stroke="#F59E0B" stroke-width="1.2"/>
  <text x="355" y="328" text-anchor="middle" font-size="12" fill="#78350F">企业层</text>
  <text x="355" y="346" text-anchor="middle" font-size="10" fill="#78350F">品牌 / 产品 / 合规</text>
  <rect x="450" y="305" width="150" height="50" rx="6" fill="#FFFFFF" stroke="#F59E0B" stroke-width="1.2"/>
  <text x="525" y="328" text-anchor="middle" font-size="12" fill="#78350F">行业品类层</text>
  <text x="525" y="346" text-anchor="middle" font-size="10" fill="#78350F">市场 / 平台 / 本地化</text>
  <rect x="620" y="305" width="150" height="50" rx="6" fill="#FFFFFF" stroke="#F59E0B" stroke-width="1.2"/>
  <text x="695" y="328" text-anchor="middle" font-size="12" fill="#78350F">效果知识库</text>
  <text x="695" y="346" text-anchor="middle" font-size="10" fill="#78350F">飞轮回写</text>

  <!-- Layer 4: 评测与护栏 -->
  <rect x="100" y="390" width="700" height="80" rx="8" fill="#FEE2E2" stroke="#EF4444" stroke-width="1.5"/>
  <text x="160" y="425" font-size="14" font-weight="600" fill="#7F1D1D">评测与护栏</text>
  <text x="160" y="445" font-size="12" fill="#7F1D1D">Eval + Guardrail</text>

  <rect x="280" y="405" width="150" height="50" rx="6" fill="#FFFFFF" stroke="#EF4444" stroke-width="1.2"/>
  <text x="355" y="428" text-anchor="middle" font-size="12" fill="#7F1D1D">离线评测</text>
  <text x="355" y="446" text-anchor="middle" font-size="10" fill="#7F1D1D">质量 / 合规</text>
  <rect x="450" y="405" width="150" height="50" rx="6" fill="#FFFFFF" stroke="#EF4444" stroke-width="1.2"/>
  <text x="525" y="428" text-anchor="middle" font-size="12" fill="#7F1D1D">在线 A/B</text>
  <text x="525" y="446" text-anchor="middle" font-size="10" fill="#7F1D1D">效果裁决</text>
  <rect x="620" y="405" width="150" height="50" rx="6" fill="#FFFFFF" stroke="#EF4444" stroke-width="1.2"/>
  <text x="695" y="428" text-anchor="middle" font-size="12" fill="#7F1D1D">权限护栏</text>
  <text x="695" y="446" text-anchor="middle" font-size="10" fill="#7F1D1D">审批 / 可回滚</text>

  <!-- Bottom note -->
  <text x="450" y="510" text-anchor="middle" font-size="13" fill="#1F2937" font-weight="500">自底向上构建：先有规范、可靠、可组合的能力，Agent 才有得调</text>
  <text x="450" y="535" text-anchor="middle" font-size="12" fill="#6B7280" font-style="italic">Agent-first 而无扎实工具 = 会崩的 demo</text>
</svg>
