<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 380" font-family="-apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="10" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,3 L0,6 Z" fill="#666"/>
    </marker>
  </defs>

  <rect width="560" height="380" rx="12" fill="#fafafa" stroke="#e0e0e0" stroke-width="1.5"/>
  <text x="280" y="32" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">Plan-then-Execute Loop</text>

  <!-- Planning Phase -->
  <rect x="50" y="55" width="460" height="80" rx="8" fill="#E3F2FD" stroke="#1976D2" stroke-width="1.5"/>
  <text x="280" y="78" text-anchor="middle" font-size="14" font-weight="bold" fill="#1565C0">Planning Phase</text>
  <text x="280" y="100" text-anchor="middle" font-size="12" fill="#1976D2">Input → LLM → [Step 1, Step 2, Step 3, ...]</text>
  <text x="280" y="120" text-anchor="middle" font-size="11" fill="#90CAF9">一次性生成完整计划</text>

  <!-- Arrow down -->
  <line x1="280" y1="135" x2="280" y2="158" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Execution Phase -->
  <rect x="50" y="160" width="460" height="100" rx="8" fill="#FFF3E0" stroke="#F57C00" stroke-width="1.5"/>
  <text x="280" y="183" text-anchor="middle" font-size="14" font-weight="bold" fill="#E65100">Execution Phase</text>

  <!-- Steps inside -->
  <rect x="80" y="195" width="110" height="30" rx="4" fill="#FFE0B2" stroke="#F57C00" stroke-width="1"/>
  <text x="135" y="215" text-anchor="middle" font-size="11" fill="#E65100">Step 1 → Result</text>

  <rect x="210" y="195" width="110" height="30" rx="4" fill="#FFE0B2" stroke="#F57C00" stroke-width="1"/>
  <text x="265" y="215" text-anchor="middle" font-size="11" fill="#E65100">Step 2 → Result</text>

  <rect x="340" y="195" width="110" height="30" rx="4" fill="#FFE0B2" stroke="#F57C00" stroke-width="1"/>
  <text x="395" y="215" text-anchor="middle" font-size="11" fill="#E65100">Step 3 → Result</text>

  <text x="280" y="248" text-anchor="middle" font-size="11" fill="#FF9800">按计划逐步执行</text>

  <!-- Arrow down -->
  <line x1="280" y1="260" x2="280" y2="283" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Replan Phase -->
  <rect x="50" y="285" width="460" height="70" rx="8" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="280" y="308" text-anchor="middle" font-size="14" font-weight="bold" fill="#6A1B9A">Replan（if needed）</text>
  <text x="280" y="330" text-anchor="middle" font-size="12" fill="#9C27B0">检查是否需要调整计划</text>
  <text x="280" y="347" text-anchor="middle" font-size="11" fill="#CE93D8">执行结果偏离预期时重新规划</text>

  <!-- Replan loop arrow back -->
  <path d="M 510 320 L 530 320 L 530 90 L 512 90" fill="none" stroke="#7B1FA2" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
</svg>
