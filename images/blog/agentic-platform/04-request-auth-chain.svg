<svg viewBox="0 0 420 310" xmlns="http://www.w3.org/2000/svg">
  <!-- Root: Request — vertically centered at y=155 -->
  <rect x="10" y="135" width="100" height="40" rx="8" fill="#3B82F6" stroke="#1E40AF" stroke-width="1.5"/>
  <text x="60" y="161" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">Request</text>

  <!-- Horizontal line from Request to trunk -->
  <line x1="110" y1="155" x2="135" y2="155" stroke="#CBD5E1" stroke-width="1.5"/>

  <!-- Vertical trunk line -->
  <line x1="135" y1="35" x2="135" y2="275" stroke="#CBD5E1" stroke-width="1.5"/>

  <!-- Branch 1: API Key / OAuth Token (y=35) -->
  <circle cx="135" cy="35" r="3" fill="#CBD5E1"/>
  <line x1="135" y1="35" x2="165" y2="35" stroke="#CBD5E1" stroke-width="1.5"/>
  <rect x="165" y="17" width="200" height="36" rx="6" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="265" y="40" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="12" font-weight="bold" fill="#1E40AF" text-anchor="middle">API Key / OAuth Token</text>
  <text x="185" y="67" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="11" fill="#64748B">└── 识别租户身份</text>

  <!-- Branch 2: Tenant ID (y=115) -->
  <circle cx="135" cy="115" r="3" fill="#CBD5E1"/>
  <line x1="135" y1="115" x2="165" y2="115" stroke="#CBD5E1" stroke-width="1.5"/>
  <rect x="165" y="97" width="200" height="36" rx="6" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="1.5"/>
  <text x="265" y="120" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="12" font-weight="bold" fill="#6D28D9" text-anchor="middle">Tenant ID</text>
  <text x="185" y="147" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="11" fill="#64748B">└── 确定资源配额</text>

  <!-- Branch 3: Agent ID (y=195) -->
  <circle cx="135" cy="195" r="3" fill="#CBD5E1"/>
  <line x1="135" y1="195" x2="165" y2="195" stroke="#CBD5E1" stroke-width="1.5"/>
  <rect x="165" y="177" width="200" height="36" rx="6" fill="#FCE7F3" stroke="#EC4899" stroke-width="1.5"/>
  <text x="265" y="200" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="12" font-weight="bold" fill="#BE185D" text-anchor="middle">Agent ID</text>
  <text x="185" y="227" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="11" fill="#64748B">└── 路由到目标 Agent</text>

  <!-- Branch 4: Session ID (y=275) -->
  <circle cx="135" cy="275" r="3" fill="#CBD5E1"/>
  <line x1="135" y1="275" x2="165" y2="275" stroke="#CBD5E1" stroke-width="1.5"/>
  <rect x="165" y="257" width="200" height="36" rx="6" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="265" y="280" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="12" font-weight="bold" fill="#D97706" text-anchor="middle">Session ID（可选）</text>
  <text x="185" y="307" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="11" fill="#64748B">└── 恢复会话上下文</text>
</svg>
