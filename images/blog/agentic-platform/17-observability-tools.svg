<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 310">
  <defs/>

  <!-- Background -->
  <rect width="620" height="310" fill="#ffffff"/>

  <!-- Header row -->
  <rect x="10" y="10" width="120" height="40" fill="#1e293b" rx="6"/>
  <rect x="130" y="10" width="480" height="40" fill="#1e293b" rx="6"/>

  <!-- Header text -->
  <text x="70" y="35" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">工具</text>
  <text x="370" y="35" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">核心能力</text>

  <!-- Row 1: LangFuse -->
  <rect x="10" y="50" width="120" height="60" fill="#fafafa" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="130" y="50" width="480" height="60" fill="#fafafa" stroke="#e2e8f0" stroke-width="1.5"/>

  <!-- Badge for LangFuse -->
  <rect x="20" y="58" width="100" height="24" fill="#3b82f6" rx="4"/>
  <text x="70" y="75" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="11" font-weight="bold" fill="white" text-anchor="middle">LangFuse</text>

  <!-- Content for LangFuse -->
  <text x="145" y="68" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="11" fill="#1e293b">开源，支持 Trace、Prompt 管理、评估、成本追踪</text>
  <text x="145" y="102" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="11" fill="#1e293b">可自部署，与 LangChain/LlamaIndex 深度集成</text>

  <!-- Row 2: LangSmith -->
  <rect x="10" y="110" width="120" height="60" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="130" y="110" width="480" height="60" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>

  <!-- Badge for LangSmith -->
  <rect x="20" y="118" width="100" height="24" fill="#10b981" rx="4"/>
  <text x="70" y="135" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="11" font-weight="bold" fill="white" text-anchor="middle">LangSmith</text>

  <!-- Content for LangSmith -->
  <text x="145" y="128" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="11" fill="#1e293b">LangChain 官方，Trace + Eval + Dataset 管理</text>
  <text x="145" y="162" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="11" fill="#1e293b">与 LangChain 生态绑定较深，SaaS 模式</text>

  <!-- Row 3: Helicone -->
  <rect x="10" y="170" width="120" height="60" fill="#fafafa" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="130" y="170" width="480" height="60" fill="#fafafa" stroke="#e2e8f0" stroke-width="1.5"/>

  <!-- Badge for Helicone -->
  <rect x="20" y="178" width="100" height="24" fill="#f59e0b" rx="4"/>
  <text x="70" y="195" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="11" font-weight="bold" fill="white" text-anchor="middle">Helicone</text>

  <!-- Content for Helicone -->
  <text x="145" y="188" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="11" fill="#1e293b">轻量级 LLM 代理层，请求日志、成本分析、缓存</text>
  <text x="145" y="222" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="11" fill="#1e293b">通过 API 代理方式接入，侵入性低</text>

  <!-- Row 4: Arize/Phoenix -->
  <rect x="10" y="230" width="120" height="60" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="130" y="230" width="480" height="60" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>

  <!-- Badge for Arize/Phoenix -->
  <rect x="20" y="238" width="100" height="24" fill="#ef4444" rx="4"/>
  <text x="70" y="255" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="11" font-weight="bold" fill="white" text-anchor="middle">Arize/Phoenix</text>

  <!-- Content for Arize/Phoenix -->
  <text x="145" y="248" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="11" fill="#1e293b">ML Observability 扩展到 LLM，偏重质量漂移检测</text>
  <text x="145" y="282" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="11" fill="#1e293b">支持 Embedding 可视化和异常检测</text>
</svg>