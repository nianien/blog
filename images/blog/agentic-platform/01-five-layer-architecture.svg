<svg viewBox="0 0 700 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E40AF;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6D28D9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#EC4899;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#BE185D;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F59E0B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D97706;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad5" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6B7280;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#374151;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Layer 1: Access Layer -->
  <rect x="30" y="20" width="640" height="80" rx="8" fill="url(#grad1)" stroke="#1E40AF" stroke-width="1.5"/>
  <text x="350" y="45" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="18" font-weight="bold" fill="white" text-anchor="middle">接入层 Access Layer</text>
  <text x="350" y="70" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="13" fill="white" text-anchor="middle">API Gateway / WebSocket / SSE</text>
  <text x="350" y="88" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="12" fill="#E0E7FF" text-anchor="middle">认证鉴权 / 协议适配 / 流量治理</text>

  <!-- Layer 2: Orchestration Layer -->
  <rect x="30" y="110" width="640" height="80" rx="8" fill="url(#grad2)" stroke="#6D28D9" stroke-width="1.5"/>
  <text x="350" y="135" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="18" font-weight="bold" fill="white" text-anchor="middle">调度层 Orchestration Layer</text>
  <text x="350" y="160" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="13" fill="white" text-anchor="middle">Agent Registry / Scheduler / Router</text>
  <text x="350" y="178" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="12" fill="#EDE9FE" text-anchor="middle">多租户 / 生命周期 / 灰度发布</text>

  <!-- Layer 3: Runtime Layer -->
  <rect x="30" y="200" width="640" height="80" rx="8" fill="url(#grad3)" stroke="#BE185D" stroke-width="1.5"/>
  <text x="350" y="225" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="18" font-weight="bold" fill="white" text-anchor="middle">运行时层 Runtime Layer</text>
  <text x="350" y="250" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="13" fill="white" text-anchor="middle">Agent Runtime / Sandbox / Session Manager</text>
  <text x="350" y="268" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="12" fill="#FCE7F3" text-anchor="middle">上下文管理 / 执行沙箱 / 超时熔断</text>

  <!-- Layer 4: Capability Layer -->
  <rect x="30" y="290" width="640" height="80" rx="8" fill="url(#grad4)" stroke="#D97706" stroke-width="1.5"/>
  <text x="350" y="315" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="18" font-weight="bold" fill="white" text-anchor="middle">能力层 Capability Layer</text>
  <text x="350" y="340" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="13" fill="white" text-anchor="middle">LLM Gateway / Tool Service / Memory Store</text>
  <text x="350" y="358" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="12" fill="#FEF3C7" text-anchor="middle">Prompt 管理 / Embedding / 知识检索</text>

  <!-- Layer 5: Infrastructure Layer -->
  <rect x="30" y="380" width="640" height="80" rx="8" fill="url(#grad5)" stroke="#1F2937" stroke-width="1.5"/>
  <text x="350" y="405" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="18" font-weight="bold" fill="white" text-anchor="middle">基础设施层 Infrastructure Layer</text>
  <text x="350" y="430" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="13" fill="white" text-anchor="middle">K8s / MQ / Redis / VectorDB / Object Storage</text>
  <text x="350" y="448" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="12" fill="#D1D5DB" text-anchor="middle">GPU 集群 / 网络 / 存储 / 安全</text>
</svg>