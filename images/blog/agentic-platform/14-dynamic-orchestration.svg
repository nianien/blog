<svg viewBox="0 0 520 520" xmlns="http://www.w3.org/2000/svg">
  <!-- Title -->
  <text x="220" y="25" font-size="16" font-weight="bold" text-anchor="middle" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif">Dynamic Orchestration Decision Loop</text>

  <!-- Step 1: 接收用户任务描述 -->
  <circle cx="50" cy="60" r="18" fill="#3B82F6" stroke="#1E40AF" stroke-width="1.5"/>
  <text x="50" y="65" font-size="13" font-weight="bold" text-anchor="middle" fill="white" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif">1</text>
  <rect x="85" y="45" width="200" height="30" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5" rx="6"/>
  <text x="185" y="65" font-size="12" font-weight="600" text-anchor="middle" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" fill="#1e40af">接收用户任务描述</text>

  <!-- Arrow 1→2 -->
  <line x1="50" y1="78" x2="50" y2="108" stroke="#666" stroke-width="1.5"/>
  <polygon points="46,104 50,112 54,104" fill="#666"/>

  <!-- Step 2: 查询 Agent Registry -->
  <circle cx="50" cy="130" r="18" fill="#10B981" stroke="#047857" stroke-width="1.5"/>
  <text x="50" y="135" font-size="13" font-weight="bold" text-anchor="middle" fill="white" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif">2</text>
  <rect x="85" y="112" width="260" height="36" fill="#DCFCE7" stroke="#10B981" stroke-width="1.5" rx="6"/>
  <text x="95" y="130" font-size="12" font-weight="600" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" fill="#065f46">查询 Agent Registry，</text>
  <text x="95" y="144" font-size="11" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" fill="#334155">获取可用 Agent 列表及能力</text>

  <!-- Arrow 2→3 -->
  <line x1="50" y1="148" x2="50" y2="185" stroke="#666" stroke-width="1.5"/>
  <polygon points="46,181 50,189 54,181" fill="#666"/>

  <!-- Step 3: 调用 LLM 制定执行计划 -->
  <circle cx="50" cy="210" r="18" fill="#F59E0B" stroke="#D97706" stroke-width="1.5"/>
  <text x="50" y="215" font-size="13" font-weight="bold" text-anchor="middle" fill="white" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif">3</text>
  <rect x="85" y="190" width="290" height="55" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5" rx="6"/>
  <text x="95" y="210" font-size="12" font-weight="600" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" fill="#92400e">调用 LLM 制定执行计划：</text>
  <text x="100" y="228" font-size="11" font-family="'SF Mono', 'Menlo', monospace" fill="#334155">"用 data-collector → data-analyzer</text>
  <text x="100" y="242" font-size="11" font-family="'SF Mono', 'Menlo', monospace" fill="#334155"> → report-writer"</text>

  <!-- Arrow 3→4 -->
  <line x1="50" y1="228" x2="50" y2="275" stroke="#666" stroke-width="1.5"/>
  <polygon points="46,271 50,279 54,271" fill="#666"/>

  <!-- Step 4: 按计划依次调用子 Agent -->
  <circle cx="50" cy="298" r="18" fill="#8B5CF6" stroke="#6D28D9" stroke-width="1.5"/>
  <text x="50" y="303" font-size="13" font-weight="bold" text-anchor="middle" fill="white" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif">4</text>
  <rect x="85" y="283" width="240" height="30" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="1.5" rx="6"/>
  <text x="95" y="303" font-size="12" font-weight="600" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" fill="#5b21b6">按计划依次调用子 Agent</text>

  <!-- Arrow 4→5 -->
  <line x1="50" y1="316" x2="50" y2="355" stroke="#666" stroke-width="1.5"/>
  <polygon points="46,351 50,359 54,351" fill="#666"/>

  <!-- Step 5: 每步完成后评估 -->
  <circle cx="50" cy="380" r="18" fill="#EC4899" stroke="#BE185D" stroke-width="1.5"/>
  <text x="50" y="385" font-size="13" font-weight="bold" text-anchor="middle" fill="white" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif">5</text>
  <rect x="85" y="355" width="280" height="55" fill="#FCE7F3" stroke="#EC4899" stroke-width="1.5" rx="6"/>
  <text x="95" y="374" font-size="12" font-weight="600" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" fill="#9d174d">每步完成后评估：</text>
  <text x="100" y="392" font-size="11" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" fill="#334155">• 结果符合预期 → 继续</text>
  <text x="100" y="406" font-size="11" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" fill="#334155">• 结果不完整 → 补充调用</text>

  <!-- Feedback arrow: Step 5 → Step 3 "修改计划" -->
  <path d="M 365 370 C 420 370 440 300 440 245 C 440 220 420 195 385 195" stroke="#EF4444" stroke-width="1.5" fill="none" stroke-dasharray="5,5"/>
  <polygon points="389,191 380,195 389,199" fill="#EF4444"/>
  <text x="450" y="290" font-size="11" fill="#DC2626" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif">修改计划</text>

  <!-- Arrow 5→6 -->
  <line x1="50" y1="398" x2="50" y2="440" stroke="#666" stroke-width="1.5"/>
  <polygon points="46,436 50,444 54,436" fill="#666"/>

  <!-- Step 6: 汇总结果返回用户 -->
  <circle cx="50" cy="465" r="18" fill="#0EA5E9" stroke="#0369A1" stroke-width="1.5"/>
  <text x="50" y="470" font-size="13" font-weight="bold" text-anchor="middle" fill="white" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif">6</text>
  <rect x="85" y="450" width="200" height="30" fill="#E0F2FE" stroke="#0EA5E9" stroke-width="1.5" rx="6"/>
  <text x="185" y="470" font-size="12" font-weight="600" text-anchor="middle" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" fill="#0369a1">汇总结果返回用户</text>
</svg>
