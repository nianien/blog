<svg viewBox="0 0 900 740" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      text { font-family: system-ui, -apple-system, 'PingFang SC', sans-serif; font-size: 13px; }
      .label { font-size: 12px; fill: #666; }
      .section-title { font-size: 13px; font-weight: bold; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#333" />
    </marker>
  </defs>

  <!-- ===== OFFLINE SECTION ===== -->
  <rect x="20" y="20" width="860" height="280" fill="#f0f7ff" stroke="#4a90e2" stroke-width="2" rx="6"/>
  <text x="30" y="42" class="section-title" fill="#4a90e2">OFFLINE (Indexing)</text>

  <!-- Document Sources -->
  <rect x="40" y="60" width="120" height="80" fill="#e8f4f8" stroke="#0d7377" stroke-width="2" rx="6"/>
  <text x="100" y="85" text-anchor="middle" font-weight="bold">Document</text>
  <text x="100" y="100" text-anchor="middle" font-weight="bold">Sources</text>
  <text x="100" y="125" text-anchor="middle" class="label">PDF/HTML/MD</text>
  <text x="100" y="138" text-anchor="middle" class="label">Code/DB</text>

  <!-- Arrow -->
  <line x1="160" y1="100" x2="198" y2="100" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Ingestion -->
  <rect x="200" y="60" width="120" height="80" fill="#e8f4f8" stroke="#0d7377" stroke-width="2" rx="6"/>
  <text x="260" y="85" text-anchor="middle" font-weight="bold">Ingestion</text>
  <text x="260" y="100" text-anchor="middle" font-weight="bold">&amp; Cleaning</text>
  <text x="260" y="125" text-anchor="middle" class="label">格式归一化</text>
  <text x="260" y="138" text-anchor="middle" class="label">元数据提取</text>

  <!-- Arrow -->
  <line x1="320" y1="100" x2="358" y2="100" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Chunking -->
  <rect x="360" y="60" width="120" height="80" fill="#e8f4f8" stroke="#0d7377" stroke-width="2" rx="6"/>
  <text x="420" y="85" text-anchor="middle" font-weight="bold">Chunking</text>
  <text x="420" y="100" text-anchor="middle" font-weight="bold">Strategy</text>
  <text x="420" y="125" text-anchor="middle" class="label">语义切分</text>
  <text x="420" y="138" text-anchor="middle" class="label">重叠策略</text>

  <!-- Arrow -->
  <line x1="480" y1="100" x2="518" y2="100" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Embedding -->
  <rect x="520" y="60" width="120" height="80" fill="#e8f4f8" stroke="#0d7377" stroke-width="2" rx="6"/>
  <text x="580" y="85" text-anchor="middle" font-weight="bold">Embedding</text>
  <text x="580" y="100" text-anchor="middle" font-weight="bold">(Text → Vec)</text>
  <text x="580" y="125" text-anchor="middle" class="label">向量化</text>

  <!-- Arrow down to Indexing -->
  <line x1="580" y1="140" x2="580" y2="178" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Indexing -->
  <rect x="510" y="180" width="140" height="70" fill="#fff4e6" stroke="#f39c12" stroke-width="2" rx="6"/>
  <text x="580" y="205" text-anchor="middle" font-weight="bold">Indexing</text>
  <text x="580" y="220" text-anchor="middle" font-weight="bold">(Vector + BM25 DB)</text>

  <!-- Dashed arrow to online -->
  <line x1="580" y1="250" x2="580" y2="330" stroke="#666" stroke-width="2" stroke-dasharray="5,5"/>

  <!-- ===== DIVIDER ===== -->
  <line x1="30" y1="315" x2="870" y2="315" stroke="#999" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- ===== ONLINE SECTION ===== -->
  <rect x="20" y="330" width="860" height="390" fill="#f0fff0" stroke="#27ae60" stroke-width="2" rx="6"/>
  <text x="30" y="352" class="section-title" fill="#27ae60">ONLINE (Retrieval)</text>

  <!-- User Query -->
  <rect x="40" y="370" width="100" height="60" fill="#d4edda" stroke="#27ae60" stroke-width="2" rx="6"/>
  <text x="90" y="395" text-anchor="middle" font-weight="bold">User</text>
  <text x="90" y="411" text-anchor="middle" font-weight="bold">Query</text>

  <!-- Arrow -->
  <line x1="140" y1="400" x2="178" y2="400" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Query Expansion -->
  <rect x="180" y="370" width="110" height="60" fill="#d4edda" stroke="#27ae60" stroke-width="2" rx="6"/>
  <text x="235" y="395" text-anchor="middle" font-weight="bold">Query</text>
  <text x="235" y="411" text-anchor="middle" font-weight="bold">Expansion</text>
  <text x="235" y="430" text-anchor="middle" class="label">HyDE/扩写</text>

  <!-- Arrow -->
  <line x1="290" y1="400" x2="328" y2="400" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Hybrid Search -->
  <rect x="330" y="370" width="110" height="60" fill="#d4edda" stroke="#27ae60" stroke-width="2" rx="6"/>
  <text x="385" y="395" text-anchor="middle" font-weight="bold">Hybrid</text>
  <text x="385" y="411" text-anchor="middle" font-weight="bold">Search</text>
  <text x="385" y="430" text-anchor="middle" class="label">BM25+Vec RRF</text>

  <!-- Arrow -->
  <line x1="440" y1="400" x2="478" y2="400" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Reranking -->
  <rect x="480" y="370" width="130" height="60" fill="#d4edda" stroke="#27ae60" stroke-width="2" rx="6"/>
  <text x="545" y="395" text-anchor="middle" font-weight="bold">Reranking</text>
  <text x="545" y="411" text-anchor="middle" font-weight="bold">(Cross-Encoder)</text>

  <!-- Arrow down -->
  <line x1="545" y1="430" x2="545" y2="468" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Context Packing -->
  <rect x="470" y="470" width="150" height="60" fill="#fff3cd" stroke="#f39c12" stroke-width="2" rx="6"/>
  <text x="545" y="495" text-anchor="middle" font-weight="bold">Context Packing</text>
  <text x="545" y="511" text-anchor="middle" font-weight="bold">(排序/截断/组织)</text>

  <!-- Arrow down -->
  <line x1="545" y1="530" x2="545" y2="568" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- LLM Generate -->
  <rect x="480" y="570" width="130" height="60" fill="#cfe9f3" stroke="#3498db" stroke-width="2" rx="6"/>
  <text x="545" y="595" text-anchor="middle" font-weight="bold">LLM Generate</text>
  <text x="545" y="611" text-anchor="middle" font-weight="bold">(+ Citation)</text>

  <!-- Arrow down -->
  <line x1="545" y1="630" x2="545" y2="658" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Response -->
  <rect x="490" y="660" width="110" height="40" rx="6" fill="#d4edda" stroke="#27ae60" stroke-width="1.5"/>
  <text x="545" y="685" text-anchor="middle" font-weight="bold">Response</text>
</svg>
