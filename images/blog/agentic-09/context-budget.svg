<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      text { font-family: system-ui, -apple-system, sans-serif; }
      .title { font-size: 14px; font-weight: bold; fill: #333; }
      .label { font-size: 12px; fill: #333; font-weight: bold; }
      .value { font-size: 11px; fill: #666; }
      .total { font-size: 13px; font-weight: bold; fill: #333; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="#fafafa" />

  <!-- Title -->
  <text x="400" y="35" class="title" text-anchor="middle">Context Window Token 预算</text>

  <!-- Main box -->
  <g id="budget-box">
    <!-- System Prompt -->
    <rect x="150" y="70" width="500" height="60" fill="#e8f4f8" stroke="#0d7377" stroke-width="2" rx="4"/>
    <text x="170" y="95" class="label">System Prompt</text>
    <text x="170" y="115" class="value">~500 tokens</text>

    <!-- Divider -->
    <line x1="150" y1="130" x2="650" y2="130" stroke="#ccc" stroke-width="1"/>

    <!-- Retrieved Context -->
    <rect x="150" y="130" width="500" height="100" fill="#fff3cd" stroke="#f39c12" stroke-width="2" rx="4"/>
    <text x="170" y="160" class="label">Retrieved Context</text>
    <text x="170" y="180" class="value">~3000 tokens</text>
    <text x="655" y="180" font-size="12" fill="#e74c3c" font-weight="bold">← Context Packing</text>
    <text x="655" y="195" font-size="11" fill="#e74c3c">的空间</text>

    <!-- Divider -->
    <line x1="150" y1="230" x2="650" y2="230" stroke="#ccc" stroke-width="1"/>

    <!-- Conversation History -->
    <rect x="150" y="230" width="500" height="60" fill="#e8f4f8" stroke="#0d7377" stroke-width="2" rx="4"/>
    <text x="170" y="255" class="label">Conversation History</text>
    <text x="170" y="275" class="value">~1000 tokens</text>

    <!-- Divider -->
    <line x1="150" y1="290" x2="650" y2="290" stroke="#ccc" stroke-width="1"/>

    <!-- User Query -->
    <rect x="150" y="290" width="500" height="60" fill="#e8f4f8" stroke="#0d7377" stroke-width="2" rx="4"/>
    <text x="170" y="315" class="label">User Query</text>
    <text x="170" y="335" class="value">~200 tokens</text>

    <!-- Divider -->
    <line x1="150" y1="350" x2="650" y2="350" stroke="#ccc" stroke-width="1"/>

    <!-- Output Reserve -->
    <rect x="150" y="350" width="500" height="80" fill="#d4edda" stroke="#27ae60" stroke-width="2" rx="4"/>
    <text x="170" y="380" class="label">Output Reserve</text>
    <text x="170" y="400" class="value">~2000 tokens</text>
    <text x="655" y="380" font-size="12" fill="#27ae60" font-weight="bold">← 留给模型生成</text>

    <!-- Divider -->
    <line x1="150" y1="430" x2="650" y2="430" stroke="#333" stroke-width="2"/>

    <!-- Total -->
    <rect x="150" y="430" width="500" height="40" fill="#f0f0f0" stroke="#333" stroke-width="2" rx="4"/>
    <text x="170" y="455" class="total">Total Budget:</text>
    <text x="400" y="455" class="total" text-anchor="start">~6700 tokens</text>
  </g>

  <!-- Key insight box -->
  <g id="insight">
    <rect x="120" y="480" width="560" height="0" fill="none"/>
    <text x="400" y="400" text-anchor="middle" font-size="11" fill="#666">
      Context 部分的 token 预算 = 总 window - system prompt - history - query - output reserve
    </text>
  </g>
</svg>