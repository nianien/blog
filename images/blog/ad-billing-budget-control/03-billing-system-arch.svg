<svg viewBox="0 0 820 440" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif">

  <rect width="820" height="440" fill="#F8FAFC" rx="8"/>
  <text x="410" y="28" text-anchor="middle" font-size="14" font-weight="600" fill="#1E293B">广告计费系统核心架构</text>

  <!-- ===== ROW 1: 请求链路 (y=50-100) ===== -->
  <!-- Ad Request -->
  <rect x="30" y="50" width="120" height="48" rx="6" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="90" y="70" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="600" fill="#92400E">广告请求</text>
  <text x="90" y="88" text-anchor="middle" dominant-baseline="central" font-size="9" fill="#78350F">App / 媒体</text>

  <line x1="150" y1="74" x2="175" y2="74" stroke="#94A3B8" stroke-width="1.5"/>
  <polygon points="175,74 161,66 161,82" fill="#94A3B8"/>

  <!-- Bidding Engine -->
  <rect x="175" y="50" width="120" height="48" rx="6" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="235" y="70" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="600" fill="#1E40AF">竞价引擎</text>
  <text x="235" y="88" text-anchor="middle" dominant-baseline="central" font-size="9" fill="#1E3A8A">排序 / 出价决策</text>

  <line x1="295" y1="74" x2="320" y2="74" stroke="#94A3B8" stroke-width="1.5"/>
  <polygon points="320,74 306,66 306,82" fill="#94A3B8"/>

  <!-- Budget Check -->
  <rect x="320" y="50" width="120" height="48" rx="6" fill="#D1FAE5" stroke="#10B981" stroke-width="1.5"/>
  <text x="380" y="70" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="600" fill="#065F46">预算检查</text>
  <text x="380" y="88" text-anchor="middle" dominant-baseline="central" font-size="9" fill="#064E3B">余额 / 日预算</text>

  <line x1="440" y1="74" x2="465" y2="74" stroke="#94A3B8" stroke-width="1.5"/>
  <polygon points="465,74 451,66 451,82" fill="#94A3B8"/>

  <!-- Win Notice -->
  <rect x="465" y="50" width="120" height="48" rx="6" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="1.5"/>
  <text x="525" y="70" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="600" fill="#4C1D95">胜出通知</text>
  <text x="525" y="88" text-anchor="middle" dominant-baseline="central" font-size="9" fill="#3B0764">Win Notice</text>

  <line x1="585" y1="74" x2="610" y2="74" stroke="#94A3B8" stroke-width="1.5"/>
  <polygon points="610,74 596,66 596,82" fill="#94A3B8"/>

  <!-- Billing Trigger -->
  <rect x="610" y="50" width="120" height="48" rx="6" fill="#FEE2E2" stroke="#EF4444" stroke-width="1.5"/>
  <text x="670" y="70" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="600" fill="#7F1D1D">计费触发</text>
  <text x="670" y="88" text-anchor="middle" dominant-baseline="central" font-size="9" fill="#991B1B">扣费时机判断</text>

  <!-- ===== Row1 → Row2 连接线 ===== -->
  <!-- 从计费触发下方出发，水平分支线，各自下降到对应服务 -->
  <line x1="670" y1="98" x2="670" y2="120" stroke="#CBD5E1" stroke-width="1.5"/>
  <line x1="130" y1="120" x2="670" y2="120" stroke="#CBD5E1" stroke-width="1.5"/>

  <line x1="130" y1="120" x2="130" y2="148" stroke="#CBD5E1" stroke-width="1.5"/>
  <polygon points="130,148 122,134 138,134" fill="#CBD5E1"/>

  <line x1="320" y1="120" x2="320" y2="148" stroke="#CBD5E1" stroke-width="1.5"/>
  <polygon points="320,148 312,134 328,134" fill="#CBD5E1"/>

  <line x1="510" y1="120" x2="510" y2="148" stroke="#CBD5E1" stroke-width="1.5"/>
  <polygon points="510,148 502,134 518,134" fill="#CBD5E1"/>

  <line x1="700" y1="120" x2="700" y2="148" stroke="#CBD5E1" stroke-width="1.5"/>
  <polygon points="700,148 692,134 708,134" fill="#CBD5E1"/>

  <!-- ===== ROW 2: 核心服务层 (y=148-215) ===== -->
  <!-- Budget Service -->
  <rect x="50" y="148" width="160" height="62" rx="6" fill="#FFF7ED" stroke="#FB923C" stroke-width="1.5"/>
  <text x="130" y="168" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="600" fill="#7C2D12">预算服务</text>
  <text x="130" y="186" text-anchor="middle" dominant-baseline="central" font-size="9" fill="#9A3412">日预算 / 总预算</text>
  <text x="130" y="200" text-anchor="middle" dominant-baseline="central" font-size="9" fill="#9A3412">令牌桶控速</text>

  <!-- Billing Service -->
  <rect x="240" y="148" width="160" height="62" rx="6" fill="#FEF9C3" stroke="#EAB308" stroke-width="1.5"/>
  <text x="320" y="168" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="600" fill="#713F12">计费服务</text>
  <text x="320" y="186" text-anchor="middle" dominant-baseline="central" font-size="9" fill="#78350F">扣费计算 / 次价扣费</text>
  <text x="320" y="200" text-anchor="middle" dominant-baseline="central" font-size="9" fill="#78350F">计费日志写入</text>

  <!-- Anti-Fraud Service -->
  <rect x="430" y="148" width="160" height="62" rx="6" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="510" y="168" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="600" fill="#064E3B">反欺诈服务</text>
  <text x="510" y="186" text-anchor="middle" dominant-baseline="central" font-size="9" fill="#065F46">无效点击过滤</text>
  <text x="510" y="200" text-anchor="middle" dominant-baseline="central" font-size="9" fill="#065F46">归因窗口校验</text>

  <!-- Settlement Service -->
  <rect x="620" y="148" width="160" height="62" rx="6" fill="#F0F9FF" stroke="#0284C7" stroke-width="1.5"/>
  <text x="700" y="168" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="600" fill="#0C4A6E">结算服务</text>
  <text x="700" y="186" text-anchor="middle" dominant-baseline="central" font-size="9" fill="#075985">广告主账单</text>
  <text x="700" y="200" text-anchor="middle" dominant-baseline="central" font-size="9" fill="#075985">媒体分成对账</text>

  <!-- ===== Row2 → Row3 连接线 ===== -->
  <line x1="130" y1="210" x2="130" y2="232" stroke="#CBD5E1" stroke-width="1.5"/>
  <line x1="130" y1="232" x2="700" y2="232" stroke="#CBD5E1" stroke-width="1.5"/>

  <line x1="130" y1="232" x2="130" y2="260" stroke="#CBD5E1" stroke-width="1.5"/>
  <polygon points="130,260 122,246 138,246" fill="#CBD5E1"/>

  <line x1="335" y1="232" x2="335" y2="260" stroke="#CBD5E1" stroke-width="1.5"/>
  <polygon points="335,260 327,246 343,246" fill="#CBD5E1"/>

  <line x1="540" y1="232" x2="540" y2="260" stroke="#CBD5E1" stroke-width="1.5"/>
  <polygon points="540,260 532,246 548,246" fill="#CBD5E1"/>

  <line x1="700" y1="232" x2="700" y2="260" stroke="#CBD5E1" stroke-width="1.5"/>
  <polygon points="700,260 692,246 708,246" fill="#CBD5E1"/>

  <!-- ===== ROW 3: 存储与数据层 (y=260-320) ===== -->
  <!-- Redis Cache -->
  <rect x="45" y="260" width="170" height="52" rx="6" fill="#FFF1F2" stroke="#F43F5E" stroke-width="1.5"/>
  <text x="130" y="280" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="600" fill="#881337">Redis 预算缓存</text>
  <text x="130" y="298" text-anchor="middle" dominant-baseline="central" font-size="9" fill="#9F1239">毫秒级余额查询 / 原子扣减</text>

  <!-- Billing DB -->
  <rect x="245" y="260" width="180" height="52" rx="6" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="335" y="280" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="600" fill="#4C1D95">计费流水 DB</text>
  <text x="335" y="298" text-anchor="middle" dominant-baseline="central" font-size="9" fill="#5B21B6">每次扣费事件持久化</text>

  <!-- Event Queue -->
  <rect x="455" y="260" width="170" height="52" rx="6" fill="#ECFEFF" stroke="#06B6D4" stroke-width="1.5"/>
  <text x="540" y="280" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="600" fill="#164E63">事件消息队列</text>
  <text x="540" y="298" text-anchor="middle" dominant-baseline="central" font-size="9" fill="#155E75">展示 / 点击 / 转化事件流</text>

  <!-- Analytics DW -->
  <rect x="640" y="260" width="130" height="52" rx="6" fill="#F0FDF4" stroke="#16A34A" stroke-width="1.5"/>
  <text x="705" y="280" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="600" fill="#14532D">数据仓库</text>
  <text x="705" y="298" text-anchor="middle" dominant-baseline="central" font-size="9" fill="#166534">报表 / 对账 / 稽核</text>

  <!-- ===== Row3 → Row4 连接线 ===== -->
  <line x1="410" y1="312" x2="410" y2="340" stroke="#CBD5E1" stroke-width="1.5"/>
  <line x1="170" y1="340" x2="645" y2="340" stroke="#CBD5E1" stroke-width="1.5"/>

  <line x1="170" y1="340" x2="170" y2="368" stroke="#CBD5E1" stroke-width="1.5"/>
  <polygon points="170,368 162,354 178,354" fill="#CBD5E1"/>

  <line x1="410" y1="340" x2="410" y2="368" stroke="#CBD5E1" stroke-width="1.5"/>
  <polygon points="410,368 402,354 418,354" fill="#CBD5E1"/>

  <line x1="645" y1="340" x2="645" y2="368" stroke="#CBD5E1" stroke-width="1.5"/>
  <polygon points="645,368 637,354 653,354" fill="#CBD5E1"/>

  <!-- ===== ROW 4: 下游输出 (y=368-410) ===== -->
  <rect x="90" y="368" width="160" height="42" rx="6" fill="#E0F2FE" stroke="#0284C7" stroke-width="1.5"/>
  <text x="170" y="384" text-anchor="middle" dominant-baseline="central" font-size="10" font-weight="600" fill="#0C4A6E">广告主账单 / 发票</text>
  <text x="170" y="400" text-anchor="middle" dominant-baseline="central" font-size="9" fill="#075985">预付扣减 / 后付应收</text>

  <rect x="330" y="368" width="160" height="42" rx="6" fill="#FDF4FF" stroke="#A855F7" stroke-width="1.5"/>
  <text x="410" y="384" text-anchor="middle" dominant-baseline="central" font-size="10" font-weight="600" fill="#581C87">媒体分成结算</text>
  <text x="410" y="400" text-anchor="middle" dominant-baseline="central" font-size="9" fill="#6B21A8">月结 / 周结 / T+N</text>

  <rect x="565" y="368" width="160" height="42" rx="6" fill="#FFF7ED" stroke="#EA580C" stroke-width="1.5"/>
  <text x="645" y="384" text-anchor="middle" dominant-baseline="central" font-size="10" font-weight="600" fill="#7C2D12">投放报表 / BI</text>
  <text x="645" y="400" text-anchor="middle" dominant-baseline="central" font-size="9" fill="#9A3412">消耗 / ROI / eCPM</text>

  <!-- ===== 层标签 ===== -->
  <text x="790" y="74" dominant-baseline="central" font-size="9" fill="#94A3B8">请求链路</text>
  <text x="790" y="179" dominant-baseline="central" font-size="9" fill="#94A3B8">核心服务</text>
  <text x="790" y="286" dominant-baseline="central" font-size="9" fill="#94A3B8">存储层</text>
  <text x="790" y="389" dominant-baseline="central" font-size="9" fill="#94A3B8">下游输出</text>

</svg>