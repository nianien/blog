<svg viewBox="0 0 800 260" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif">
  <!-- Title left: Shared State -->
  <text x="195" y="22" font-size="13" font-weight="bold" text-anchor="middle" fill="#333">方案 A：共享状态</text>

  <rect x="70" y="40" width="250" height="70" rx="6" fill="#f5f5f5" stroke="#333" stroke-width="1.5"/>
  <text x="195" y="62" font-size="12" font-weight="bold" text-anchor="middle" fill="#333">Global State</text>
  <text x="85" y="82" font-size="10" fill="#555">Agent A/B/C ── write</text>

  <text x="195" y="130" font-size="10" text-anchor="middle" fill="#666">即时同步，但有并发风险</text>

  <text x="195" y="165" font-size="10" text-anchor="middle" fill="#2e7d32">✓ 信息同步即时</text>
  <text x="195" y="183" font-size="10" text-anchor="middle" fill="#d32f2f">✗ 需要并发冲突处理</text>
  <text x="195" y="201" font-size="10" text-anchor="middle" fill="#666">适用：Supervisor-Worker</text>

  <!-- Divider -->
  <line x1="400" y1="15" x2="400" y2="240" stroke="#ddd" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Title right: Independent State -->
  <text x="600" y="22" font-size="13" font-weight="bold" text-anchor="middle" fill="#333">方案 B：独立状态</text>

  <!-- State boxes -->
  <rect x="440" y="40" width="90" height="42" rx="4" fill="#c8e6c9" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="485" y="58" font-size="11" font-weight="bold" text-anchor="middle" fill="#2e7d32">State A</text>
  <text x="485" y="72" font-size="8" text-anchor="middle" fill="#666">Agent A 独占</text>

  <rect x="555" y="40" width="90" height="42" rx="4" fill="#c8e6c9" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="600" y="58" font-size="11" font-weight="bold" text-anchor="middle" fill="#2e7d32">State B</text>
  <text x="600" y="72" font-size="8" text-anchor="middle" fill="#666">Agent B 独占</text>

  <rect x="670" y="40" width="90" height="42" rx="4" fill="#c8e6c9" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="715" y="58" font-size="11" font-weight="bold" text-anchor="middle" fill="#2e7d32">State C</text>
  <text x="715" y="72" font-size="8" text-anchor="middle" fill="#666">Agent C 独占</text>

  <!-- Converge down to merge layer -->
  <line x1="485" y1="82" x2="485" y2="100" stroke="#666" stroke-width="1.2"/>
  <line x1="600" y1="82" x2="600" y2="100" stroke="#666" stroke-width="1.2"/>
  <line x1="715" y1="82" x2="715" y2="100" stroke="#666" stroke-width="1.2"/>
  <line x1="485" y1="100" x2="715" y2="100" stroke="#666" stroke-width="1.2"/>
  <line x1="600" y1="100" x2="600" y2="112" stroke="#666" stroke-width="1.2"/>
  <polygon points="596,112 600,122 604,112" fill="#666"/>

  <!-- Merge layer -->
  <rect x="510" y="125" width="180" height="35" rx="4" fill="#bbdefb" stroke="#1976d2" stroke-width="1.5"/>
  <text x="600" y="147" font-size="11" font-weight="bold" text-anchor="middle" fill="#1976d2">合并 / 同步层</text>

  <text x="600" y="185" font-size="10" text-anchor="middle" fill="#2e7d32">✓ 无并发问题</text>
  <text x="600" y="203" font-size="10" text-anchor="middle" fill="#d32f2f">✗ 同步有延迟</text>
  <text x="600" y="221" font-size="10" text-anchor="middle" fill="#666">适用：Pipeline</text>
</svg>
