<svg viewBox="0 0 600 270" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif">
  <!-- Title -->
  <text x="300" y="20" font-size="14" font-weight="bold" text-anchor="middle" fill="#333">Event Bus 通信</text>

  <!-- Three Agent cards -->
  <rect x="50" y="42" width="110" height="46" rx="8" fill="#1976d2" stroke="none"/>
  <text x="105" y="63" font-size="11" font-weight="bold" text-anchor="middle" fill="#fff">Agent A</text>
  <text x="105" y="78" font-size="8" text-anchor="middle" fill="rgba(255,255,255,0.7)">pub: X</text>

  <rect x="245" y="42" width="110" height="46" rx="8" fill="#1976d2" stroke="none"/>
  <text x="300" y="63" font-size="11" font-weight="bold" text-anchor="middle" fill="#fff">Agent B</text>
  <text x="300" y="78" font-size="8" text-anchor="middle" fill="rgba(255,255,255,0.7)">sub: X</text>

  <rect x="440" y="42" width="110" height="46" rx="8" fill="#1976d2" stroke="none"/>
  <text x="495" y="63" font-size="11" font-weight="bold" text-anchor="middle" fill="#fff">Agent C</text>
  <text x="495" y="78" font-size="8" text-anchor="middle" fill="rgba(255,255,255,0.7)">sub: X, Y</text>

  <!-- Down arrows -->
  <line x1="105" y1="88" x2="105" y2="112" stroke="#90CAF9" stroke-width="1.5"/>
  <polygon points="101,109 105,118 109,109" fill="#90CAF9"/>
  <text x="120" y="104" font-size="7" fill="#999">publish</text>

  <line x1="300" y1="88" x2="300" y2="112" stroke="#90CAF9" stroke-width="1.5"/>
  <polygon points="296,109 300,118 304,109" fill="#90CAF9"/>
  <text x="316" y="104" font-size="7" fill="#999">subscribe</text>

  <line x1="495" y1="88" x2="495" y2="112" stroke="#90CAF9" stroke-width="1.5"/>
  <polygon points="491,109 495,118 499,109" fill="#90CAF9"/>
  <text x="512" y="104" font-size="7" fill="#999">subscribe</text>

  <!-- Event Bus card -->
  <rect x="30" y="120" width="540" height="96" rx="8" fill="#F5F5F5" stroke="#BDBDBD" stroke-width="1.5"/>
  <text x="300" y="142" font-size="11" font-weight="bold" text-anchor="middle" fill="#333">Event Bus</text>

  <!-- Topic routing table -->
  <text x="50" y="162" font-size="9" font-family="'SF Mono', Menlo, monospace" fill="#555">topic "search_done"    → [Agent B, C]</text>
  <text x="50" y="178" font-size="9" font-family="'SF Mono', Menlo, monospace" fill="#555">topic "analysis_done"  → [Agent C]</text>
  <text x="50" y="194" font-size="9" font-family="'SF Mono', Menlo, monospace" fill="#555">topic "error"          → [Supervisor]</text>

  <!-- Pros / Cons -->
  <text x="50" y="238" font-size="9" fill="#2e7d32">优点：完全解耦，支持多对多通信，易于扩展新 Agent</text>
  <text x="50" y="256" font-size="9" fill="#c62828">缺点：事件顺序不保证，调试困难，可能导致复杂的事件链</text>
</svg>
