<svg viewBox="0 0 720 400" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif">
  <!-- Title -->
  <text x="360" y="24" font-size="14" font-weight="bold" text-anchor="middle" fill="#263238">模式一：Supervisor-Worker 成本分析</text>

  <!-- Phase 1: Supervisor 分解 -->
  <rect x="240" y="42" width="240" height="38" rx="6" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="360" y="58" font-size="11" font-weight="bold" text-anchor="middle" fill="#0d47a1">Supervisor 分解任务</text>
  <text x="360" y="72" font-size="9" text-anchor="middle" fill="#546e7a">3,000 tok · GPT-4o · 4s</text>

  <!-- Arrow down + T-split -->
  <line x1="360" y1="80" x2="360" y2="100" stroke="#666" stroke-width="1.5"/>
  <line x1="120" y1="100" x2="600" y2="100" stroke="#666" stroke-width="1.5"/>

  <line x1="120" y1="100" x2="120" y2="115" stroke="#666" stroke-width="1.5"/>
  <polygon points="116,115 120,125 124,115" fill="#666"/>
  <line x1="360" y1="100" x2="360" y2="115" stroke="#666" stroke-width="1.5"/>
  <polygon points="356,115 360,125 364,115" fill="#666"/>
  <line x1="600" y1="100" x2="600" y2="115" stroke="#666" stroke-width="1.5"/>
  <polygon points="596,115 600,125 604,115" fill="#666"/>

  <!-- Parallel indicator -->
  <text x="360" y="97" font-size="8" text-anchor="middle" fill="#78909c">并行执行 (8s)</text>

  <!-- Worker A -->
  <rect x="30" y="128" width="180" height="60" rx="6" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="120" y="148" font-size="10" font-weight="bold" text-anchor="middle" fill="#1b5e20">Worker A (搜索)</text>
  <text x="120" y="164" font-size="9" text-anchor="middle" fill="#37474f">搜集 LLM 成本数据</text>
  <text x="120" y="180" font-size="9" text-anchor="middle" fill="#78909c">8,000 tok · GPT-4o-mini</text>

  <!-- Worker B -->
  <rect x="270" y="128" width="180" height="60" rx="6" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="360" y="148" font-size="10" font-weight="bold" text-anchor="middle" fill="#1b5e20">Worker B (分析)</text>
  <text x="360" y="164" font-size="9" text-anchor="middle" fill="#37474f">分析成本优化策略</text>
  <text x="360" y="180" font-size="9" text-anchor="middle" fill="#78909c">8,000 tok · GPT-4o-mini</text>

  <!-- Worker C -->
  <rect x="510" y="128" width="180" height="60" rx="6" fill="#fff3e0" stroke="#e65100" stroke-width="1.5"/>
  <text x="600" y="148" font-size="10" font-weight="bold" text-anchor="middle" fill="#bf360c">Worker C (写作)</text>
  <text x="600" y="164" font-size="9" text-anchor="middle" fill="#37474f">撰写初稿</text>
  <text x="600" y="180" font-size="9" text-anchor="middle" fill="#78909c">10,000 tok · GPT-4o</text>

  <!-- Converge -->
  <line x1="120" y1="188" x2="120" y2="210" stroke="#666" stroke-width="1.5"/>
  <line x1="360" y1="188" x2="360" y2="210" stroke="#666" stroke-width="1.5"/>
  <line x1="600" y1="188" x2="600" y2="210" stroke="#666" stroke-width="1.5"/>
  <line x1="120" y1="210" x2="600" y2="210" stroke="#666" stroke-width="1.5"/>
  <line x1="360" y1="210" x2="360" y2="225" stroke="#666" stroke-width="1.5"/>
  <polygon points="356,225 360,235 364,225" fill="#666"/>

  <!-- Supervisor 合成 -->
  <rect x="240" y="238" width="240" height="38" rx="6" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="360" y="254" font-size="11" font-weight="bold" text-anchor="middle" fill="#0d47a1">Supervisor 合成最终版本</text>
  <text x="360" y="268" font-size="9" text-anchor="middle" fill="#546e7a">6,000 tok · GPT-4o · 5s</text>

  <!-- Summary box -->
  <rect x="30" y="298" width="660" height="90" rx="6" fill="#f5f5f5" stroke="#bdbdbd" stroke-width="1"/>

  <text x="50" y="322" font-size="11" font-weight="bold" fill="#263238">汇总</text>

  <text x="50" y="344" font-size="10" fill="#37474f">总 Token: 35,000</text>
  <text x="50" y="362" font-size="10" fill="#37474f">GPT-4o: 4 次调用 (25K tok)</text>
  <text x="50" y="380" font-size="10" fill="#37474f">GPT-4o-mini: 2 次调用 (16K tok)</text>

  <line x1="340" y1="308" x2="340" y2="382" stroke="#e0e0e0" stroke-width="1"/>

  <text x="360" y="322" font-size="11" font-weight="bold" fill="#263238">成本与时间</text>

  <rect x="360" y="332" width="100" height="22" rx="4" fill="#FFCDD2" stroke="#E53935" stroke-width="1"/>
  <text x="410" y="348" font-size="11" font-weight="bold" text-anchor="middle" fill="#B71C1C">$0.80</text>
  <text x="475" y="348" font-size="10" fill="#37474f">总成本（最高）</text>

  <rect x="360" y="360" width="68" height="22" rx="4" fill="#C8E6C9" stroke="#43A047" stroke-width="1"/>
  <text x="394" y="376" font-size="11" font-weight="bold" text-anchor="middle" fill="#1B5E20">17s</text>
  <text x="440" y="376" font-size="10" fill="#37474f">执行时间（并行优势）</text>
</svg>