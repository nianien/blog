<svg viewBox="0 0 700 380" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif">
  <!-- Title -->
  <text x="350" y="22" font-size="14" font-weight="bold" text-anchor="middle" fill="#333">Supervisor-Worker 模式</text>

  <!-- Top Supervisor -->
  <rect x="230" y="40" width="240" height="55" rx="6" fill="#fff3e0" stroke="#f57c00" stroke-width="2"/>
  <text x="350" y="62" font-size="13" font-weight="bold" text-anchor="middle" fill="#f57c00">Supervisor</text>
  <text x="350" y="80" font-size="10" text-anchor="middle" fill="#666">任务分解 + 结果合成</text>

  <!-- T-split down from Supervisor -->
  <line x1="350" y1="95" x2="350" y2="115" stroke="#666" stroke-width="1.5"/>
  <line x1="120" y1="115" x2="580" y2="115" stroke="#666" stroke-width="1.5"/>

  <!-- Drop to Worker A -->
  <line x1="120" y1="115" x2="120" y2="135" stroke="#666" stroke-width="1.5"/>
  <polygon points="116,135 120,145 124,135" fill="#666"/>

  <!-- Drop to Worker B -->
  <line x1="350" y1="115" x2="350" y2="135" stroke="#666" stroke-width="1.5"/>
  <polygon points="346,135 350,145 354,135" fill="#666"/>

  <!-- Drop to Worker C -->
  <line x1="580" y1="115" x2="580" y2="135" stroke="#666" stroke-width="1.5"/>
  <polygon points="576,135 580,145 584,135" fill="#666"/>

  <!-- Worker A -->
  <rect x="40" y="150" width="160" height="65" rx="6" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
  <text x="120" y="173" font-size="12" font-weight="bold" text-anchor="middle" fill="#388e3c">Worker A</text>
  <text x="120" y="190" font-size="10" text-anchor="middle" fill="#666">（搜索）检索信息</text>

  <!-- Worker B -->
  <rect x="270" y="150" width="160" height="65" rx="6" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
  <text x="350" y="173" font-size="12" font-weight="bold" text-anchor="middle" fill="#388e3c">Worker B</text>
  <text x="350" y="190" font-size="10" text-anchor="middle" fill="#666">（分析）数据分析</text>

  <!-- Worker C -->
  <rect x="500" y="150" width="160" height="65" rx="6" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
  <text x="580" y="173" font-size="12" font-weight="bold" text-anchor="middle" fill="#388e3c">Worker C</text>
  <text x="580" y="190" font-size="10" text-anchor="middle" fill="#666">（写作）生成报告</text>

  <!-- Converge: T-split up from Workers to bottom Supervisor -->
  <line x1="120" y1="215" x2="120" y2="240" stroke="#666" stroke-width="1.5"/>
  <line x1="350" y1="215" x2="350" y2="240" stroke="#666" stroke-width="1.5"/>
  <line x1="580" y1="215" x2="580" y2="240" stroke="#666" stroke-width="1.5"/>
  <line x1="120" y1="240" x2="580" y2="240" stroke="#666" stroke-width="1.5"/>
  <line x1="350" y1="240" x2="350" y2="260" stroke="#666" stroke-width="1.5"/>
  <polygon points="346,260 350,270 354,260" fill="#666"/>

  <!-- Bottom Supervisor -->
  <rect x="230" y="275" width="240" height="55" rx="6" fill="#fff3e0" stroke="#f57c00" stroke-width="2"/>
  <text x="350" y="297" font-size="13" font-weight="bold" text-anchor="middle" fill="#f57c00">Supervisor</text>
  <text x="350" y="315" font-size="10" text-anchor="middle" fill="#666">收集 + 合成最终输出</text>

  <!-- Legend -->
  <rect x="80" y="352" width="14" height="14" rx="2" fill="#fff3e0" stroke="#f57c00" stroke-width="1.5"/>
  <text x="100" y="364" font-size="10" fill="#666">中央协调</text>
  <rect x="250" y="352" width="14" height="14" rx="2" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
  <text x="270" y="364" font-size="10" fill="#666">专业化执行</text>
</svg>
