<svg viewBox="0 0 720 350" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif">
  <!-- Title -->
  <text x="360" y="24" font-size="14" font-weight="bold" text-anchor="middle" fill="#263238">模式四：Dynamic Routing 成本分析</text>

  <!-- Stage 1: Router -->
  <rect x="30" y="50" width="160" height="55" rx="6" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="110" y="72" font-size="11" font-weight="bold" text-anchor="middle" fill="#1b5e20">Router</text>
  <text x="110" y="88" font-size="9" text-anchor="middle" fill="#37474f">意图识别 · 1,500 tok</text>
  <text x="110" y="100" font-size="8" text-anchor="middle" fill="#78909c">GPT-4o-mini · 1s</text>

  <!-- Arrow Router → Expert -->
  <line x1="190" y1="77" x2="218" y2="77" stroke="#666" stroke-width="1.5"/>
  <polygon points="218,73 228,77 218,81" fill="#666"/>
  <text x="208" y="70" font-size="8" fill="#78909c">路由</text>

  <!-- Stage 2: Expert Agent (large box) -->
  <rect x="230" y="42" width="260" height="130" rx="6" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="360" y="64" font-size="12" font-weight="bold" text-anchor="middle" fill="#0d47a1">Blog Writer Expert</text>
  <text x="360" y="80" font-size="9" text-anchor="middle" fill="#546e7a">GPT-4o · 1 次调用 · 8s</text>

  <!-- Sub-tasks inside expert -->
  <rect x="248" y="92" width="110" height="32" rx="4" fill="#BBDEFB" stroke="#64B5F6" stroke-width="1"/>
  <text x="303" y="108" font-size="9" text-anchor="middle" fill="#1565c0">搜索工具调用</text>
  <text x="303" y="120" font-size="8" text-anchor="middle" fill="#78909c">0 tok (外部)</text>

  <rect x="366" y="92" width="110" height="32" rx="4" fill="#BBDEFB" stroke="#64B5F6" stroke-width="1"/>
  <text x="421" y="108" font-size="9" text-anchor="middle" fill="#1565c0">数据整理</text>
  <text x="421" y="120" font-size="8" text-anchor="middle" fill="#78909c">3,000 tok</text>

  <rect x="290" y="132" width="140" height="32" rx="4" fill="#BBDEFB" stroke="#64B5F6" stroke-width="1"/>
  <text x="360" y="148" font-size="9" text-anchor="middle" fill="#1565c0">撰写完整博客</text>
  <text x="360" y="160" font-size="8" text-anchor="middle" fill="#78909c">10,000 tok</text>

  <!-- Arrow to Output -->
  <line x1="490" y1="107" x2="518" y2="107" stroke="#666" stroke-width="1.5"/>
  <polygon points="518,103 528,107 518,111" fill="#666"/>

  <!-- Output -->
  <rect x="530" y="72" width="160" height="70" rx="6" fill="#FFF9C4" stroke="#F9A825" stroke-width="1.5"/>
  <text x="610" y="97" font-size="11" font-weight="bold" text-anchor="middle" fill="#F57F17">完成输出</text>
  <text x="610" y="115" font-size="9" text-anchor="middle" fill="#78909c">总计仅 2 次 LLM 调用</text>
  <text x="610" y="131" font-size="9" text-anchor="middle" fill="#78909c">16,000 tok · 9s</text>

  <!-- Time breakdown -->
  <rect x="30" y="192" width="660" height="28" rx="6" fill="#f5f5f5" stroke="#e0e0e0" stroke-width="1"/>
  <text x="50" y="210" font-size="10" fill="#37474f">时间线：</text>
  <rect x="130" y="198" width="60" height="16" rx="3" fill="#C8E6C9" stroke="#43A047" stroke-width="0.5"/>
  <text x="160" y="210" font-size="8" text-anchor="middle" fill="#1b5e20">1s</text>
  <rect x="194" y="198" width="475" height="16" rx="3" fill="#BBDEFB" stroke="#64B5F6" stroke-width="0.5"/>
  <text x="431" y="210" font-size="8" text-anchor="middle" fill="#0d47a1">Expert: 8s</text>
  <text x="680" y="210" font-size="9" text-anchor="end" fill="#546e7a">= 9s</text>

  <!-- Summary box -->
  <rect x="30" y="238" width="660" height="90" rx="6" fill="#f5f5f5" stroke="#bdbdbd" stroke-width="1"/>

  <text x="50" y="262" font-size="11" font-weight="bold" fill="#263238">汇总</text>
  <text x="50" y="284" font-size="10" fill="#37474f">总 Token: 16,000（四种模式最低!）</text>
  <text x="50" y="302" font-size="10" fill="#37474f">仅 2 次 LLM 调用（开销最小）</text>
  <text x="50" y="320" font-size="10" fill="#37474f">路由器低成本 + 专家高质量</text>

  <line x1="370" y1="248" x2="370" y2="322" stroke="#e0e0e0" stroke-width="1"/>

  <text x="390" y="262" font-size="11" font-weight="bold" fill="#263238">成本与时间</text>

  <rect x="390" y="272" width="70" height="22" rx="4" fill="#C8E6C9" stroke="#43A047" stroke-width="1"/>
  <text x="425" y="288" font-size="11" font-weight="bold" text-anchor="middle" fill="#1B5E20">$0.21</text>
  <text x="472" y="288" font-size="10" fill="#37474f">总成本（中低）</text>

  <rect x="390" y="300" width="40" height="22" rx="4" fill="#C8E6C9" stroke="#43A047" stroke-width="1"/>
  <text x="410" y="316" font-size="11" font-weight="bold" text-anchor="middle" fill="#1B5E20">9s</text>
  <text x="442" y="316" font-size="10" fill="#37474f">执行时间（最快!）</text>
</svg>