<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 420">
  <!-- Left: Config tree -->
  <rect x="10" y="10" width="410" height="400" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5" rx="8"/>
  <rect x="22" y="18" width="140" height="24" fill="#3b82f6" rx="12"/>
  <text x="92" y="35" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">配置树（静态结构）</text>

  <!-- RuleSuite -->
  <rect x="130" y="55" width="170" height="26" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5" rx="6"/>
  <text x="215" y="73" font-family="'SF Mono', 'Menlo', monospace" font-size="11" fill="#1e40af" text-anchor="middle">RuleSuite (单例)</text>

  <!-- Fork from RuleSuite -->
  <line x1="165" y1="81" x2="165" y2="110" stroke="#93c5fd" stroke-width="1.5"/>
  <line x1="270" y1="81" x2="270" y2="110" stroke="#93c5fd" stroke-width="1.5"/>

  <!-- Left branch: RuleEvaluator -->
  <rect x="70" y="110" width="150" height="26" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.5" rx="6"/>
  <text x="145" y="128" font-family="'SF Mono', 'Menlo', monospace" font-size="11" fill="#1e40af" text-anchor="middle">RuleEvaluator</text>

  <line x1="125" y1="136" x2="125" y2="160" stroke="#93c5fd" stroke-width="1.5"/>

  <rect x="70" y="160" width="150" height="26" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.5" rx="6"/>
  <text x="145" y="178" font-family="'SF Mono', 'Menlo', monospace" font-size="11" fill="#1e40af" text-anchor="middle">RuleEngine</text>

  <!-- RuleEngine children -->
  <line x1="95" y1="186" x2="95" y2="204" stroke="#bfdbfe" stroke-width="1"/>
  <circle cx="95" cy="204" r="2.5" fill="#93c5fd"/>
  <text x="105" y="208" font-family="'SF Mono', 'Menlo', monospace" font-size="9" fill="#3b82f6">sourceScripts</text>
  <text x="105" y="222" font-family="'SF Mono', 'Menlo', monospace" font-size="8" fill="#93c5fd">{ruleId → JS expr}</text>

  <line x1="95" y1="228" x2="95" y2="244" stroke="#bfdbfe" stroke-width="1"/>
  <circle cx="95" cy="244" r="2.5" fill="#93c5fd"/>
  <text x="105" y="248" font-family="'SF Mono', 'Menlo', monospace" font-size="9" fill="#3b82f6">compiledScripts</text>
  <text x="105" y="262" font-family="'SF Mono', 'Menlo', monospace" font-size="8" fill="#93c5fd">{expr → CompiledScript}</text>

  <line x1="95" y1="268" x2="95" y2="284" stroke="#bfdbfe" stroke-width="1"/>
  <circle cx="95" cy="284" r="2.5" fill="#93c5fd"/>
  <text x="105" y="288" font-family="'SF Mono', 'Menlo', monospace" font-size="9" fill="#3b82f6">UdfContainer</text>
  <text x="105" y="302" font-family="'SF Mono', 'Menlo', monospace" font-size="8" fill="#93c5fd">{namespace → UDF tree}</text>

  <!-- Right branch: scenes -->
  <rect x="240" y="110" width="150" height="26" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.5" rx="6"/>
  <text x="315" y="128" font-family="'SF Mono', 'Menlo', monospace" font-size="11" fill="#1e40af" text-anchor="middle">scenes</text>

  <text x="250" y="151" font-family="'SF Mono', 'Menlo', monospace" font-size="8" fill="#93c5fd">{sceneKey → RuleScene}</text>

  <line x1="295" y1="155" x2="295" y2="170" stroke="#93c5fd" stroke-width="1.5"/>

  <rect x="240" y="170" width="150" height="26" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.5" rx="6"/>
  <text x="315" y="188" font-family="'SF Mono', 'Menlo', monospace" font-size="11" fill="#1e40af" text-anchor="middle">RuleScene</text>

  <!-- RuleScene children -->
  <line x1="265" y1="196" x2="265" y2="214" stroke="#bfdbfe" stroke-width="1"/>
  <circle cx="265" cy="214" r="2.5" fill="#93c5fd"/>
  <text x="275" y="218" font-family="'SF Mono', 'Menlo', monospace" font-size="9" fill="#3b82f6">activeRule: RuleConfig</text>

  <line x1="280" y1="224" x2="280" y2="242" stroke="#bfdbfe" stroke-width="1"/>
  <circle cx="280" cy="242" r="2.5" fill="#93c5fd"/>
  <text x="290" y="246" font-family="'SF Mono', 'Menlo', monospace" font-size="9" fill="#60a5fa">ruleNode: RuleNode</text>
  <text x="290" y="260" font-family="'SF Mono', 'Menlo', monospace" font-size="8" fill="#93c5fd">(AST)</text>

  <line x1="265" y1="266" x2="265" y2="284" stroke="#bfdbfe" stroke-width="1"/>
  <circle cx="265" cy="284" r="2.5" fill="#93c5fd"/>
  <text x="275" y="288" font-family="'SF Mono', 'Menlo', monospace" font-size="9" fill="#3b82f6">candidateRules</text>
  <text x="275" y="302" font-family="'SF Mono', 'Menlo', monospace" font-size="8" fill="#93c5fd">[RuleConfig]</text>

  <!-- Right: Execution tree -->
  <rect x="440" y="10" width="410" height="400" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="1.5" rx="8"/>
  <rect x="452" y="18" width="160" height="24" fill="#10b981" rx="12"/>
  <text x="532" y="35" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">执行树（运行时构建）</text>

  <!-- NodeResult -->
  <rect x="570" y="55" width="150" height="26" fill="#d1fae5" stroke="#10b981" stroke-width="1.5" rx="6"/>
  <text x="645" y="73" font-family="'SF Mono', 'Menlo', monospace" font-size="11" fill="#047857" text-anchor="middle">NodeResult</text>

  <!-- NodeResult fields -->
  <line x1="620" y1="81" x2="620" y2="100" stroke="#6ee7b7" stroke-width="1"/>
  <circle cx="620" cy="100" r="2.5" fill="#34d399"/>
  <text x="630" y="104" font-family="'SF Mono', 'Menlo', monospace" font-size="9" fill="#047857">expr:</text>
  <text x="630" y="118" font-family="'SF Mono', 'Menlo', monospace" font-size="8" fill="#6ee7b7">"1269-&gt;((1242||1243)?...)"</text>

  <line x1="620" y1="124" x2="620" y2="140" stroke="#6ee7b7" stroke-width="1"/>
  <circle cx="620" cy="140" r="2.5" fill="#34d399"/>
  <text x="630" y="144" font-family="'SF Mono', 'Menlo', monospace" font-size="9" fill="#047857">matched: true/false</text>

  <line x1="620" y1="152" x2="620" y2="172" stroke="#6ee7b7" stroke-width="1.5"/>
  <text x="620" y="170" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="10" font-weight="bold" fill="#047857">details: [RuleResult]</text>

  <!-- RuleResult 1269 -->
  <line x1="620" y1="178" x2="620" y2="198" stroke="#6ee7b7" stroke-width="1.5"/>
  <rect x="460" y="198" width="380" height="60" fill="#d1fae5" stroke="#6ee7b7" stroke-width="1" rx="6"/>
  <text x="472" y="218" font-family="'SF Mono', 'Menlo', monospace" font-size="11" font-weight="bold" fill="#047857">RuleResult (1269)</text>
  <line x1="472" y1="226" x2="828" y2="226" stroke="#a7f3d0" stroke-width="0.5"/>
  <circle cx="480" cy="244" r="2.5" fill="#34d399"/>
  <text x="490" y="248" font-family="'SF Mono', 'Menlo', monospace" font-size="9" fill="#047857">matched: true</text>
  <circle cx="620" cy="244" r="2.5" fill="#34d399"/>
  <text x="630" y="248" font-family="'SF Mono', 'Menlo', monospace" font-size="9" fill="#047857">desc: "获取购票人详情"</text>

  <!-- RuleResult 1242||1243 -->
  <line x1="620" y1="258" x2="620" y2="280" stroke="#6ee7b7" stroke-width="1.5"/>
  <rect x="460" y="280" width="380" height="75" fill="#d1fae5" stroke="#6ee7b7" stroke-width="1" rx="6"/>
  <text x="472" y="300" font-family="'SF Mono', 'Menlo', monospace" font-size="11" font-weight="bold" fill="#047857">RuleResult (1242||1243)</text>
  <line x1="472" y1="308" x2="828" y2="308" stroke="#a7f3d0" stroke-width="0.5"/>
  <circle cx="480" cy="326" r="2.5" fill="#34d399"/>
  <text x="490" y="330" font-family="'SF Mono', 'Menlo', monospace" font-size="9" fill="#047857">matched: true</text>
  <circle cx="480" cy="346" r="2.5" fill="#34d399"/>
  <text x="490" y="350" font-family="'SF Mono', 'Menlo', monospace" font-size="9" fill="#047857">subRules: [...]</text>
</svg>