<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 440">
  <!-- Layer 1: 接入层 -->
  <rect x="30" y="10" width="500" height="85" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5" rx="8"/>
  <rect x="42" y="20" width="130" height="24" fill="#3b82f6" rx="12"/>
  <text x="107" y="37" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">接入层（SDK / RPC）</text>

  <circle cx="52" cy="58" r="3" fill="#60a5fa"/>
  <text x="62" y="62" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="10" fill="#1e40af">业务方通过 SDK 提交 Fact 对象 + 场景 Key</text>
  <circle cx="52" cy="76" r="3" fill="#60a5fa"/>
  <text x="62" y="80" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="10" fill="#1e40af">RPC 模式: gRPC/Krpc 远程调用 ｜ SDK 模式: 进程内直接调用</text>

  <!-- Arrow 1→2 -->
  <line x1="280" y1="95" x2="280" y2="115" stroke="#6b7280" stroke-width="1.5"/>
  <polygon points="276,112 280,120 284,112" fill="#6b7280"/>

  <!-- Layer 2: 编排层 -->
  <rect x="30" y="120" width="500" height="95" fill="#fef3c7" stroke="#fbbf24" stroke-width="1.5" rx="8"/>
  <rect x="42" y="130" width="155" height="24" fill="#f59e0b" rx="12"/>
  <text x="119" y="147" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">编排层（Suite / Scene）</text>

  <circle cx="52" cy="170" r="3" fill="#f59e0b"/>
  <text x="62" y="174" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="10" fill="#92400e">RuleSuite: 全局单例，持有所有 Scene</text>
  <circle cx="52" cy="188" r="3" fill="#f59e0b"/>
  <text x="62" y="192" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="10" fill="#92400e">RuleScene: 业务场景 → 活跃规则集 + 候选规则集（灰度）</text>
  <circle cx="52" cy="206" r="3" fill="#f59e0b"/>
  <text x="62" y="210" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="10" fill="#92400e">职责: 场景路由、规则集版本管理、灰度验证</text>

  <!-- Arrow 2→3 -->
  <line x1="280" y1="215" x2="280" y2="235" stroke="#6b7280" stroke-width="1.5"/>
  <polygon points="276,232 280,240 284,232" fill="#6b7280"/>

  <!-- Layer 3: 执行层 -->
  <rect x="30" y="240" width="500" height="95" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="1.5" rx="8"/>
  <rect x="42" y="250" width="175" height="24" fill="#10b981" rx="12"/>
  <text x="129" y="267" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">执行层（Evaluator / AST）</text>

  <circle cx="52" cy="290" r="3" fill="#34d399"/>
  <text x="62" y="294" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="10" fill="#047857">NodeBuilder: ANTLR4 解析规则表达式 → AST 节点树</text>
  <circle cx="52" cy="308" r="3" fill="#34d399"/>
  <text x="62" y="312" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="10" fill="#047857">RuleEvaluator: Visitor 模式遍历 AST ｜ RuleContextImpl: 执行上下文 + 缓存</text>
  <circle cx="52" cy="326" r="3" fill="#34d399"/>
  <text x="62" y="330" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="10" fill="#047857">职责: 规则编排逻辑的解释执行</text>

  <!-- Arrow 3→4 -->
  <line x1="280" y1="335" x2="280" y2="355" stroke="#6b7280" stroke-width="1.5"/>
  <polygon points="276,352 280,360 284,352" fill="#6b7280"/>

  <!-- Layer 4: 引擎层 -->
  <rect x="30" y="360" width="500" height="75" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1.5" rx="8"/>
  <rect x="42" y="370" width="180" height="24" fill="#8b5cf6" rx="12"/>
  <text x="132" y="387" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">引擎层（RuleEngine / UDF）</text>

  <circle cx="52" cy="410" r="3" fill="#a78bfa"/>
  <text x="62" y="414" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="10" fill="#5b21b6">Nashorn ScriptEngine: 执行单条 JS 表达式 ｜ UdfContainer: UDF 注册 + ByteBuddy</text>
  <circle cx="52" cy="428" r="3" fill="#a78bfa"/>
  <text x="62" y="432" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="10" fill="#5b21b6">Bindings: $ = Fact, $$ = Context, UDF 函数 ｜ 职责: 单条规则的表达式求值</text>
</svg>