<svg viewBox="0 0 860 260" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif">
  <!-- Title -->
  <text x="430" y="24" font-size="14" font-weight="bold" text-anchor="middle" fill="#333">Plan-and-Execute 架构</text>

  <!-- Planner Box -->
  <rect x="70" y="55" width="150" height="65" rx="6" fill="#e8f4f8" stroke="#0066cc" stroke-width="2"/>
  <text x="145" y="82" font-size="13" font-weight="bold" text-anchor="middle" fill="#0066cc">Planner</text>
  <text x="145" y="102" font-size="11" text-anchor="middle" fill="#333">全局规划</text>

  <!-- Arrow: Planner → Executor -->
  <line x1="220" y1="87" x2="349" y2="87" stroke="#0066cc" stroke-width="2"/>
  <polygon points="349,83 359,87 349,91" fill="#0066cc"/>
  <text x="285" y="78" font-size="10" font-weight="bold" text-anchor="middle" fill="#0066cc">Plan: [S1, S2, S3]</text>

  <!-- Executor Box -->
  <rect x="355" y="55" width="150" height="65" rx="6" fill="#fff4e8" stroke="#ff9900" stroke-width="2"/>
  <text x="430" y="82" font-size="13" font-weight="bold" text-anchor="middle" fill="#ff9900">Executor</text>
  <text x="430" y="102" font-size="11" text-anchor="middle" fill="#333">逐步执行</text>

  <!-- Arrow: Executor → Result (success path) -->
  <line x1="505" y1="87" x2="634" y2="87" stroke="#00aa33" stroke-width="2"/>
  <polygon points="634,83 644,87 634,91" fill="#00aa33"/>
  <text x="570" y="78" font-size="10" font-weight="bold" text-anchor="middle" fill="#00aa33">执行成功</text>

  <!-- Result Box -->
  <rect x="640" y="55" width="150" height="65" rx="6" fill="#e8f8e8" stroke="#00aa33" stroke-width="2"/>
  <text x="715" y="92" font-size="13" font-weight="bold" text-anchor="middle" fill="#00aa33">最终结果</text>

  <!-- Failure path: Executor down -->
  <line x1="430" y1="120" x2="430" y2="159" stroke="#cc0000" stroke-width="2"/>
  <polygon points="426,159 430,169 434,159" fill="#cc0000"/>
  <text x="460" y="145" font-size="10" fill="#cc0000">执行失败</text>

  <!-- Replanner Box -->
  <rect x="213" y="165" width="150" height="55" rx="6" fill="#f0e8f8" stroke="#9933cc" stroke-width="2"/>
  <text x="288" y="190" font-size="13" font-weight="bold" text-anchor="middle" fill="#9933cc">Replanner</text>
  <text x="288" y="208" font-size="11" text-anchor="middle" fill="#333">动态修正</text>

  <!-- Executor down to Replanner: vertical then horizontal -->
  <line x1="430" y1="169" x2="430" y2="192" stroke="#cc0000" stroke-width="1.5"/>
  <line x1="430" y1="192" x2="363" y2="192" stroke="#cc0000" stroke-width="1.5"/>

  <!-- Replanner → Planner: left then up (L-shape) -->
  <line x1="213" y1="192" x2="145" y2="192" stroke="#9933cc" stroke-width="2"/>
  <line x1="145" y1="192" x2="145" y2="126" stroke="#9933cc" stroke-width="2"/>
  <polygon points="141,126 145,116 149,126" fill="#9933cc"/>

  <!-- Annotation -->
  <text x="430" y="250" font-size="11" text-anchor="middle" fill="#666">关键优势：全局规划 + 动态修正 + 可追踪执行过程</text>
</svg>
