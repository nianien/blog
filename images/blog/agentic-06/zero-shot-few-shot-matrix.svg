<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 570" width="700" height="570">
  <defs>
    <style>
      .title-text { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; font-weight: bold; fill: #2c3e50; }
      .axis-label { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; fill: #34495e; }
      .cell-label { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; font-weight: bold; fill: #fff; text-anchor: middle; }
      .cell-desc { font-family: system-ui, -apple-system, sans-serif; font-size: 10px; fill: #555; text-anchor: middle; }
      .q1 { fill: #3498db; }
      .q2 { fill: #e74c3c; }
      .q3 { fill: #f39c12; }
      .q4 { fill: #27ae60; }
      .axis { stroke: #2c3e50; stroke-width: 2; fill: none; }
      .grid { stroke: #bdc3c7; stroke-width: 1; }
    </style>
  </defs>

  <!-- Title -->
  <text x="350" y="30" text-anchor="middle" class="title-text" font-size="16">Prompt 策略选择矩阵</text>

  <!-- Y-axis label (vertical) -->
  <g transform="translate(30, 250) rotate(-90)">
    <text x="0" y="0" text-anchor="middle" class="axis-label" font-weight="bold">任务复杂度</text>
  </g>

  <!-- Y-axis -->
  <line class="axis" x1="60" y1="100" x2="60" y2="480"/>
  <text x="45" y="90" text-anchor="end" class="axis-label" font-weight="bold">高</text>
  <!-- X-axis -->
  <line class="axis" x1="60" y1="480" x2="650" y2="480"/>
  <text x="55" y="500" text-anchor="end" class="axis-label" font-weight="bold">低</text>
  <text x="650" y="500" text-anchor="start" class="axis-label" font-weight="bold">高</text>

  <!-- X-axis label (horizontal) -->
  <text x="355" y="518" text-anchor="middle" class="axis-label" font-weight="bold">输出结构化程度</text>

  <!-- Grid lines (quadrants) -->
  <line class="grid" x1="355" y1="100" x2="355" y2="480"/>
  <line class="grid" x1="60" y1="290" x2="650" y2="290"/>

  <!-- Q1: High complexity, Low structure (Top-left) - Few-shot -->
  <rect class="q1" x="60" y="100" width="295" height="190" opacity="0.7"/>
  <text x="207" y="185" class="cell-label" font-size="13">Few-shot</text>
  <text x="207" y="205" class="cell-desc">(复杂规划)</text>
  <text x="207" y="220" class="cell-desc">需要示例引导</text>
  <text x="207" y="235" class="cell-desc">复杂推理逻辑</text>

  <!-- Q2: High complexity, High structure (Top-right) - Zero-shot + Schema -->
  <rect class="q2" x="355" y="100" width="295" height="190" opacity="0.7"/>
  <text x="502" y="175" class="cell-label" font-size="13">Zero-shot +</text>
  <text x="502" y="195" class="cell-label" font-size="13">Schema</text>
  <text x="502" y="215" class="cell-desc">(结构化反思)</text>
  <text x="502" y="230" class="cell-desc">Schema 约束强</text>
  <text x="502" y="245" class="cell-desc">Few-shot 反而过拟合</text>

  <!-- Q3: Low complexity, Low structure (Bottom-left) - Zero-shot -->
  <rect class="q3" x="60" y="290" width="295" height="190" opacity="0.7"/>
  <text x="207" y="365" class="cell-label" font-size="13">Zero-shot</text>
  <text x="207" y="385" class="cell-desc">(简单对话)</text>
  <text x="207" y="400" class="cell-desc">无需示例</text>
  <text x="207" y="415" class="cell-desc">直接语言理解</text>

  <!-- Q4: Low complexity, High structure (Bottom-right) - Zero-shot + Schema -->
  <rect class="q4" x="355" y="290" width="295" height="190" opacity="0.7"/>
  <text x="502" y="365" class="cell-label" font-size="13">Zero-shot +</text>
  <text x="502" y="385" class="cell-label" font-size="13">Schema</text>
  <text x="502" y="405" class="cell-desc">(工具调用)</text>
  <text x="502" y="420" class="cell-desc">JSON Schema 自足</text>
  <text x="502" y="435" class="cell-desc">Few-shot 可能破坏</text>

  <!-- Legend note -->
  <text x="60" y="550" class="axis-label" font-size="10" fill="#7f8c8d">推荐：优先选择 Zero-shot + Schema，当 Schema 无法充分表达时才加 Few-shot</text>
</svg>