<svg xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" viewBox="0 0 700 570" width="700" height="570">
  <defs>
    
  </defs>

  <!-- Title -->
  <text x="350" y="30" text-anchor="middle"  font-size="16" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" fill="#2c3e50">Prompt 策略选择矩阵</text>

  <!-- Y-axis label (vertical) -->
  <g transform="translate(30, 250) rotate(-90)">
    <text x="0" y="0" text-anchor="middle"  font-weight="bold" font-family="system-ui, -apple-system, sans-serif" font-size="12px" fill="#34495e">任务复杂度</text>
  </g>

  <!-- Y-axis -->
  <line  x1="60" y1="100" x2="60" y2="480" stroke="#2c3e50" stroke-width="1.5" fill="none"/>
  <text x="45" y="90" text-anchor="end"  font-weight="bold" font-family="system-ui, -apple-system, sans-serif" font-size="12px" fill="#34495e">高</text>
  <!-- X-axis -->
  <line  x1="60" y1="480" x2="650" y2="480" stroke="#2c3e50" stroke-width="1.5" fill="none"/>
  <text x="55" y="500" text-anchor="end"  font-weight="bold" font-family="system-ui, -apple-system, sans-serif" font-size="12px" fill="#34495e">低</text>
  <text x="650" y="500" text-anchor="start"  font-weight="bold" font-family="system-ui, -apple-system, sans-serif" font-size="12px" fill="#34495e">高</text>

  <!-- X-axis label (horizontal) -->
  <text x="355" y="518" text-anchor="middle"  font-weight="bold" font-family="system-ui, -apple-system, sans-serif" font-size="12px" fill="#34495e">输出结构化程度</text>

  <!-- Grid lines (quadrants) -->
  <line  x1="355" y1="100" x2="355" y2="480" stroke="#bdc3c7" stroke-width="1"/>
  <line  x1="60" y1="290" x2="650" y2="290" stroke="#bdc3c7" stroke-width="1"/>

  <!-- Q1: High complexity, Low structure (Top-left) - Few-shot -->
  <rect  x="60" y="100" width="295" height="190" opacity="0.7" fill="#3498db"/>
  <text x="207" y="185"  font-size="13" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" fill="#fff" text-anchor="middle">Few-shot</text>
  <text x="207" y="205"  font-family="system-ui, -apple-system, sans-serif" font-size="10px" fill="#555" text-anchor="middle">(复杂规划)</text>
  <text x="207" y="220"  font-family="system-ui, -apple-system, sans-serif" font-size="10px" fill="#555" text-anchor="middle">需要示例引导</text>
  <text x="207" y="235"  font-family="system-ui, -apple-system, sans-serif" font-size="10px" fill="#555" text-anchor="middle">复杂推理逻辑</text>

  <!-- Q2: High complexity, High structure (Top-right) - Zero-shot + Schema -->
  <rect  x="355" y="100" width="295" height="190" opacity="0.7" fill="#e74c3c"/>
  <text x="502" y="175"  font-size="13" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" fill="#fff" text-anchor="middle">Zero-shot +</text>
  <text x="502" y="195"  font-size="13" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" fill="#fff" text-anchor="middle">Schema</text>
  <text x="502" y="215"  font-family="system-ui, -apple-system, sans-serif" font-size="10px" fill="#555" text-anchor="middle">(结构化反思)</text>
  <text x="502" y="230"  font-family="system-ui, -apple-system, sans-serif" font-size="10px" fill="#555" text-anchor="middle">Schema 约束强</text>
  <text x="502" y="245"  font-family="system-ui, -apple-system, sans-serif" font-size="10px" fill="#555" text-anchor="middle">Few-shot 反而过拟合</text>

  <!-- Q3: Low complexity, Low structure (Bottom-left) - Zero-shot -->
  <rect  x="60" y="290" width="295" height="190" opacity="0.7" fill="#f39c12"/>
  <text x="207" y="365"  font-size="13" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" fill="#fff" text-anchor="middle">Zero-shot</text>
  <text x="207" y="385"  font-family="system-ui, -apple-system, sans-serif" font-size="10px" fill="#555" text-anchor="middle">(简单对话)</text>
  <text x="207" y="400"  font-family="system-ui, -apple-system, sans-serif" font-size="10px" fill="#555" text-anchor="middle">无需示例</text>
  <text x="207" y="415"  font-family="system-ui, -apple-system, sans-serif" font-size="10px" fill="#555" text-anchor="middle">直接语言理解</text>

  <!-- Q4: Low complexity, High structure (Bottom-right) - Zero-shot + Schema -->
  <rect  x="355" y="290" width="295" height="190" opacity="0.7" fill="#27ae60"/>
  <text x="502" y="365"  font-size="13" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" fill="#fff" text-anchor="middle">Zero-shot +</text>
  <text x="502" y="385"  font-size="13" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" fill="#fff" text-anchor="middle">Schema</text>
  <text x="502" y="405"  font-family="system-ui, -apple-system, sans-serif" font-size="10px" fill="#555" text-anchor="middle">(工具调用)</text>
  <text x="502" y="420"  font-family="system-ui, -apple-system, sans-serif" font-size="10px" fill="#555" text-anchor="middle">JSON Schema 自足</text>
  <text x="502" y="435"  font-family="system-ui, -apple-system, sans-serif" font-size="10px" fill="#555" text-anchor="middle">Few-shot 可能破坏</text>

  <!-- Legend note -->
  <text x="60" y="550"  font-size="10" fill="#7f8c8d" font-family="system-ui, -apple-system, sans-serif">推荐：优先选择 Zero-shot + Schema，当 Schema 无法充分表达时才加 Few-shot</text>
</svg>