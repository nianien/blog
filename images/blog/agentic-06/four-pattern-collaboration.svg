<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 620" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="10" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,3 L0,6 Z" fill="#2c3e50"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="10" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,3 L0,6 Z" fill="#27ae60"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="430" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#2c3e50">Four-Pattern Agent Collaboration</text>

  <!-- ===== Row 1: User Request ===== -->
  <rect x="310" y="48" width="180" height="44" rx="6" fill="#e8f1f8" stroke="#3498db" stroke-width="1.5"/>
  <text x="400" y="76" text-anchor="middle" font-size="14" font-weight="bold" fill="#2c3e50">User Request</text>

  <!-- Arrow: User Request → Router -->
  <line x1="400" y1="92" x2="400" y2="134" stroke="#2c3e50" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ===== Row 2: Router + Executor (simple) ===== -->
  <!-- Router -->
  <rect x="310" y="136" width="180" height="56" rx="6" fill="#f0e6ff" stroke="#9b59b6" stroke-width="1.5"/>
  <text x="400" y="162" text-anchor="middle" font-size="14" font-weight="bold" fill="#2c3e50">Router</text>
  <text x="400" y="180" text-anchor="middle" font-size="11" fill="#34495e">(判断请求类型)</text>

  <!-- Executor (simple path, right side) -->
  <rect x="620" y="136" width="160" height="56" rx="6" fill="#e6fff0" stroke="#27ae60" stroke-width="1.5"/>
  <text x="700" y="162" text-anchor="middle" font-size="14" font-weight="bold" fill="#2c3e50">Executor</text>
  <text x="700" y="180" text-anchor="middle" font-size="11" fill="#34495e">(执行单个工具)</text>

  <!-- Arrow: Router → Executor (horizontal) -->
  <line x1="490" y1="164" x2="618" y2="164" stroke="#2c3e50" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="554" y="156" text-anchor="middle" font-size="11" fill="#34495e">简单请求</text>

  <!-- Arrow: Executor → Result -->
  <line x1="780" y1="164" x2="818" y2="164" stroke="#2c3e50" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="820" y="144" width="100" height="40" rx="6" fill="#e8f1f8" stroke="#3498db" stroke-width="1.5"/>
  <text x="870" y="169" text-anchor="middle" font-size="13" font-weight="bold" fill="#2c3e50">Result</text>

  <!-- Arrow: Router → Planner (vertical) -->
  <line x1="400" y1="192" x2="400" y2="254" stroke="#2c3e50" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="440" y="230" font-size="11" fill="#34495e">复杂请求</text>

  <!-- ===== Row 3: Planner ===== -->
  <rect x="310" y="256" width="180" height="56" rx="6" fill="#e6f3ff" stroke="#3498db" stroke-width="1.5"/>
  <text x="400" y="282" text-anchor="middle" font-size="14" font-weight="bold" fill="#2c3e50">Planner</text>
  <text x="400" y="300" text-anchor="middle" font-size="11" fill="#34495e">(分解任务)</text>

  <!-- Arrow: Planner → Executor(per step): right-angle, go right then down -->
  <line x1="490" y1="284" x2="560" y2="284" stroke="#2c3e50" stroke-width="1.5"/>
  <line x1="560" y1="284" x2="560" y2="354" stroke="#2c3e50" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="530" y="330" font-size="11" fill="#34495e">plan[step_1..N]</text>

  <!-- ===== Row 4: Executor (per step) ===== -->
  <rect x="480" y="356" width="160" height="56" rx="6" fill="#e6fff0" stroke="#27ae60" stroke-width="1.5"/>
  <text x="560" y="378" text-anchor="middle" font-size="14" font-weight="bold" fill="#2c3e50">Executor</text>
  <text x="560" y="396" text-anchor="middle" font-size="11" fill="#34495e">(per step)</text>

  <!-- Arrow: Executor → Reflector (vertical) -->
  <line x1="560" y1="412" x2="560" y2="454" stroke="#2c3e50" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="590" y="438" font-size="11" fill="#34495e">results</text>

  <!-- ===== Row 5: Reflector ===== -->
  <rect x="440" y="456" width="240" height="56" rx="6" fill="#ffe6e6" stroke="#e74c3c" stroke-width="1.5"/>
  <text x="560" y="482" text-anchor="middle" font-size="14" font-weight="bold" fill="#2c3e50">Reflector</text>
  <text x="560" y="500" text-anchor="middle" font-size="11" fill="#34495e">(评估结果，决策下一步)</text>

  <!-- ===== Row 6: Three output paths ===== -->

  <!-- Path 1: accept → Return to User (go left then down) -->
  <line x1="440" y1="484" x2="300" y2="484" stroke="#2c3e50" stroke-width="1.5"/>
  <line x1="300" y1="484" x2="300" y2="554" stroke="#2c3e50" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="360" y="476" font-size="11" fill="#34495e">accept</text>

  <rect x="220" y="556" width="160" height="44" rx="6" fill="#e8f1f8" stroke="#3498db" stroke-width="1.5"/>
  <text x="300" y="584" text-anchor="middle" font-size="13" fill="#2c3e50">Return to User</text>

  <!-- Path 2: retry_step → Executor (重试) (vertical down) -->
  <line x1="560" y1="512" x2="560" y2="554" stroke="#2c3e50" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="600" y="538" font-size="11" fill="#34495e">retry_step</text>

  <rect x="480" y="556" width="160" height="44" rx="6" fill="#e6fff0" stroke="#27ae60" stroke-width="1.5"/>
  <text x="560" y="584" text-anchor="middle" font-size="13" fill="#2c3e50">Executor (重试)</text>

  <!-- Path 3: replan → back to Planner (go right then up) -->
  <line x1="680" y1="484" x2="760" y2="484" stroke="#2c3e50" stroke-width="1.5"/>
  <line x1="760" y1="484" x2="760" y2="284" stroke="#2c3e50" stroke-width="1.5"/>
  <line x1="760" y1="284" x2="492" y2="284" stroke="#2c3e50" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="780" y="476" font-size="11" fill="#34495e">replan</text>
</svg>
