<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" font-family="-apple-system,BlinkMacSystemFont,PingFang SC,Microsoft YaHei,sans-serif">
  <defs>
    <filter id="s3"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.08"/></filter>
    <marker id="a3g" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="#34C759"/></marker>
    <marker id="a3r" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="#FF3B30"/></marker>
  </defs>
  <rect width="960" height="520" rx="16" fill="#FAFBFC"/>

  <!-- Left: Waterfall -->
  <rect x="30" y="30" width="430" height="440" rx="16" fill="white" stroke="#E5E7EB" stroke-width="2" filter="url(#s3)"/>
  <rect x="30" y="30" width="430" height="50" rx="16" fill="#F3F4F6"/>
  <rect x="30" y="64" width="430" height="16" fill="#F3F4F6"/>
  <text x="245" y="62" text-anchor="middle" font-size="16" font-weight="800" fill="#6B7280">Waterfall 瀑布流模型</text>

  <!-- Waterfall steps -->
  <text x="70" y="115" font-size="11" font-weight="700" fill="#6B7280">按历史 eCPM 预设优先级，顺序调用</text>

  <rect x="60" y="135" width="370" height="44" rx="8" fill="#FEE8E7"/>
  <circle cx="85" cy="157" r="12" fill="#FF6B00"/><text x="85" y="161" text-anchor="middle" font-size="10" font-weight="800" fill="white">1</text>
  <text x="110" y="153" font-size="12" font-weight="600" fill="#1F2937">广告源 A</text>
  <text x="110" y="169" font-size="11" fill="#6B7280">eCPM Floor ¥7</text>
  <rect x="290" y="145" width="60" height="22" rx="4" fill="#FF6B00"/><text x="320" y="160" text-anchor="middle" font-size="10" font-weight="700" fill="white">命中 ✓</text>
  <rect x="360" y="145" width="50" height="22" rx="4" fill="#34C759"/><text x="385" y="160" text-anchor="middle" font-size="10" font-weight="700" fill="white">¥7</text>

  <rect x="60" y="188" width="370" height="44" rx="8" fill="#F3F4F6"/>
  <circle cx="85" cy="210" r="12" fill="#D1D5DB"/><text x="85" y="214" text-anchor="middle" font-size="10" font-weight="800" fill="white">2</text>
  <text x="110" y="206" font-size="12" font-weight="600" fill="#1F2937">广告源 B</text>
  <text x="110" y="222" font-size="11" fill="#6B7280">eCPM Floor ¥7</text>
  <rect x="290" y="198" width="60" height="22" rx="4" fill="#D1D5DB"/><text x="320" y="213" text-anchor="middle" font-size="10" font-weight="700" fill="white">跳过</text>

  <rect x="60" y="241" width="370" height="44" rx="8" fill="#F3F4F6" opacity="0.6"/>
  <circle cx="85" cy="263" r="12" fill="#E5E7EB"/><text x="85" y="267" text-anchor="middle" font-size="10" font-weight="800" fill="#9CA3AF">3</text>
  <text x="110" y="259" font-size="12" font-weight="600" fill="#9CA3AF">广告源 C</text>
  <text x="110" y="275" font-size="11" fill="#9CA3AF">eCPM Floor ¥9</text>
  <rect x="290" y="251" width="60" height="22" rx="4" fill="#E5E7EB"/><text x="320" y="266" text-anchor="middle" font-size="10" font-weight="700" fill="#9CA3AF">未调用</text>

  <rect x="60" y="294" width="370" height="44" rx="8" fill="#F3F4F6" opacity="0.6"/>
  <circle cx="85" cy="316" r="12" fill="#E5E7EB"/><text x="85" y="320" text-anchor="middle" font-size="10" font-weight="800" fill="#9CA3AF">4</text>
  <text x="110" y="312" font-size="12" font-weight="600" fill="#9CA3AF">广告源 D</text>
  <text x="110" y="328" font-size="11" fill="#9CA3AF">eCPM Floor ¥12</text>
  <rect x="290" y="304" width="60" height="22" rx="4" fill="#E5E7EB"/><text x="320" y="319" text-anchor="middle" font-size="10" font-weight="700" fill="#9CA3AF">未调用</text>

  <!-- Warning -->
  <rect x="60" y="360" width="370" height="40" rx="8" fill="#FEE8E7"/>
  <text x="245" y="385" text-anchor="middle" font-size="12" font-weight="700" fill="#FF3B30">⚠️ ¥12 高价广告排在后面，完全没有机会被调用</text>

  <!-- Right: Header Bidding -->
  <rect x="500" y="30" width="430" height="440" rx="16" fill="white" stroke="#FF6B00" stroke-width="2" filter="url(#s3)"/>
  <rect x="500" y="30" width="430" height="50" rx="16" fill="#FFF3E8"/>
  <rect x="500" y="64" width="430" height="16" fill="#FFF3E8"/>
  <text x="715" y="62" text-anchor="middle" font-size="16" font-weight="800" fill="#FF6B00">Header Bidding 并发竞价</text>

  <text x="540" y="115" font-size="11" font-weight="700" fill="#6B7280">所有 SDK 同时出价，最高价者胜出</text>

  <!-- Bidding rows -->
  <rect x="530" y="135" width="370" height="44" rx="8" fill="#F3F4F6"/>
  <text x="550" y="155" font-size="14" fill="#FF6B00">→</text>
  <text x="580" y="153" font-size="12" font-weight="600" fill="#1F2937">广告源 A</text>
  <rect x="700" y="143" width="80" height="24" rx="4" fill="#93C5FD"/><text x="740" y="159" text-anchor="middle" font-size="11" font-weight="700" fill="white">¥4</text>
  <rect x="800" y="143" width="60" height="24" rx="4" fill="#FEE8E7"/><text x="830" y="159" text-anchor="middle" font-size="10" font-weight="700" fill="#FF3B30">落选</text>

  <rect x="530" y="188" width="370" height="44" rx="8" fill="#FFF3E8" stroke="#FF6B00" stroke-width="1.5"/>
  <text x="550" y="208" font-size="14" fill="#FF6B00">→</text>
  <text x="580" y="206" font-size="12" font-weight="600" fill="#1F2937">广告源 B</text>
  <rect x="700" y="196" width="80" height="24" rx="4" fill="#FF6B00"/><text x="740" y="212" text-anchor="middle" font-size="11" font-weight="700" fill="white">¥12 最高</text>
  <rect x="800" y="196" width="60" height="24" rx="4" fill="#34C759"/><text x="830" y="212" text-anchor="middle" font-size="10" font-weight="700" fill="white">胜出 🏆</text>

  <rect x="530" y="241" width="370" height="44" rx="8" fill="#F3F4F6"/>
  <text x="550" y="261" font-size="14" fill="#FF6B00">→</text>
  <text x="580" y="259" font-size="12" font-weight="600" fill="#1F2937">广告源 C</text>
  <rect x="700" y="249" width="80" height="24" rx="4" fill="#93C5FD"/><text x="740" y="265" text-anchor="middle" font-size="11" font-weight="700" fill="white">¥7</text>
  <rect x="800" y="249" width="60" height="24" rx="4" fill="#FEE8E7"/><text x="830" y="265" text-anchor="middle" font-size="10" font-weight="700" fill="#FF3B30">落选</text>

  <rect x="530" y="294" width="370" height="44" rx="8" fill="#F3F4F6"/>
  <text x="550" y="314" font-size="14" fill="#FF6B00">→</text>
  <text x="580" y="312" font-size="12" font-weight="600" fill="#1F2937">广告源 D</text>
  <rect x="700" y="302" width="80" height="24" rx="4" fill="#93C5FD"/><text x="740" y="318" text-anchor="middle" font-size="11" font-weight="700" fill="white">¥9</text>
  <rect x="800" y="302" width="60" height="24" rx="4" fill="#FEE8E7"/><text x="830" y="318" text-anchor="middle" font-size="10" font-weight="700" fill="#FF3B30">落选</text>

  <!-- Success -->
  <rect x="530" y="360" width="370" height="40" rx="8" fill="#E8F8EC"/>
  <text x="715" y="385" text-anchor="middle" font-size="12" font-weight="700" fill="#34C759">✅ 公平竞价，每次展示都获得最高出价 ¥12</text>

  <!-- Bottom: Hybrid -->
  <rect x="200" y="485" width="560" height="30" rx="15" fill="#8B5CF6"/>
  <text x="480" y="505" text-anchor="middle" font-size="12" font-weight="700" fill="white">混合智能排序 = Bidding 实时竞价 + Waterfall 分层保底 → 统一价格维度排序</text>
</svg>