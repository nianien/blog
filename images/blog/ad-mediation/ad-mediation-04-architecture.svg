  <rect x="414" y="450" width="60" height="24" rx="6" fill="white" stroke="#D1D5DB" stroke-width="1"/><text x="444" y="466" text-anchor="middle" font-size="10" font-weight="600" fill="#6B7280">Unity</text>
  <rect x="484" y="450" width="60" height="24" rx="6" fill="white" stroke="#D1D5DB" stroke-width="1"/><text x="514" y="466" text-anchor="middle" font-size="10" font-weight="600" fill="#6B7280">Flutter</text>
  <rect x="554" y="450" width="80" height="24" rx="6" fill="white" stroke="#D1D5DB" stroke-width="1"/><text x="594" y="466" text-anchor="middle" font-size="10" font-weight="600" fill="#6B7280">React Native</text>
  <rect x="644" y="450" width="60" height="24" rx="6" fill="white" stroke="#D1D5DB" stroke-width="1"/><text x="674" y="466" text-anchor="middle" font-size="10" font-weight="600" fill="#6B7280">Cocos</text>
