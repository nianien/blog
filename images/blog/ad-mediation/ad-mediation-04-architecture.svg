<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 480" font-family="-apple-system,BlinkMacSystemFont,PingFang SC,Microsoft YaHei,sans-serif">
  <defs><filter id="s4"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.08"/></filter></defs>
  <rect width="960" height="480" rx="16" fill="#FAFBFC"/>

  <!-- L5 -->
  <rect x="40" y="20" width="880" height="72" rx="12" fill="#E8F8EC" stroke="#34C759" stroke-width="1.5" filter="url(#s4)"/>
  <rect x="40" y="20" width="80" height="72" rx="12" fill="#34C759"/>
  <text x="80" y="52" text-anchor="middle" font-size="14" font-weight="800" fill="white">L5</text>
  <text x="80" y="72" text-anchor="middle" font-size="10" font-weight="600" fill="white">智能层</text>
  <text x="160" y="48" font-size="12" font-weight="700" fill="#34C759">智能管理层</text>
  <text x="160" y="68" font-size="11" fill="#6B7280">智能管家 (AI 自动调优)  ·  自动创建广告源  ·  A/B 自动测试  ·  ROAS 优化引擎</text>

  <!-- L4 -->
  <rect x="40" y="102" width="880" height="72" rx="12" fill="#E8F0FE" stroke="#4A90D9" stroke-width="1.5" filter="url(#s4)"/>
  <rect x="40" y="102" width="80" height="72" rx="12" fill="#4A90D9"/>
  <text x="80" y="134" text-anchor="middle" font-size="14" font-weight="800" fill="white">L4</text>
  <text x="80" y="154" text-anchor="middle" font-size="10" font-weight="600" fill="white">数据层</text>
  <text x="160" y="130" font-size="12" font-weight="700" fill="#4A90D9">数据与分析层</text>
  <text x="160" y="150" font-size="11" fill="#6B7280">时序数据库 (链路追踪)  ·  实时流计算 (Flink)  ·  OLAP (ClickHouse)  ·  用户级 UID 存储 (LTV/ROAS)</text>

  <!-- L3 -->
  <rect x="40" y="184" width="880" height="90" rx="12" fill="#FFF3E8" stroke="#FF6B00" stroke-width="2" filter="url(#s4)"/>
  <rect x="40" y="184" width="80" height="90" rx="12" fill="#FF6B00"/>
  <text x="80" y="222" text-anchor="middle" font-size="14" font-weight="800" fill="white">L3</text>
  <text x="80" y="242" text-anchor="middle" font-size="10" font-weight="600" fill="white">竞价层</text>
  <text x="80" y="258" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.7)">核心</text>
  <text x="160" y="212" font-size="12" font-weight="700" fill="#FF6B00">竞价排序引擎（技术含量最高）</text>
  <text x="160" y="235" font-size="11" fill="#6B7280">Bidding 引擎 (~150ms 超时窗口)  ·  Waterfall 调度器 (eCPM Floor 分层)</text>
  <text x="160" y="255" font-size="11" fill="#6B7280">混合排序引擎 (统一价格维度)  ·  ADX RTB (OpenRTB 毫秒级协议转换)</text>

  <!-- L2 -->
  <rect x="40" y="284" width="880" height="72" rx="12" fill="#F0EBFE" stroke="#8B5CF6" stroke-width="1.5" filter="url(#s4)"/>
  <rect x="40" y="284" width="80" height="72" rx="12" fill="#8B5CF6"/>
  <text x="80" y="316" text-anchor="middle" font-size="14" font-weight="800" fill="white">L2</text>
  <text x="80" y="336" text-anchor="middle" font-size="10" font-weight="600" fill="white">路由层</text>
  <text x="160" y="312" font-size="12" font-weight="700" fill="#8B5CF6">流量路由层（&lt;5ms 决策）</text>
  <text x="160" y="332" font-size="11" fill="#6B7280">流量分组 (Segment)  ·  A/B 实验分流  ·  频次控制  ·  Redis 内存缓存</text>

  <!-- L1 -->
  <rect x="40" y="366" width="880" height="72" rx="12" fill="#F3F4F6" stroke="#6B7280" stroke-width="1.5" filter="url(#s4)"/>
  <rect x="40" y="366" width="80" height="72" rx="12" fill="#374151"/>
  <text x="80" y="398" text-anchor="middle" font-size="14" font-weight="800" fill="white">L1</text>
