  <text x="160" y="394" font-size="12" font-weight="700" fill="#374151">客户端 SDK 层</text>
  <text x="160" y="414" font-size="11" fill="#6B7280">广告位注册 & 生命周期  ·  多格式渲染 (激励视频/插屏/开屏/原生/Banner)  ·  预加载 & 缓存  ·  曝光/点击回调</text>

  <!-- Platform tags -->
