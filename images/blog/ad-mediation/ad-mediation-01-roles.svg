<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" font-family="-apple-system,BlinkMacSystemFont,PingFang SC,Microsoft YaHei,sans-serif">
  <defs>
    <marker id="arr-o" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#FF6B00"/></marker>
    <marker id="arr-b" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#4A90D9"/></marker>
    <marker id="arr-g" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#34C759"/></marker>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.1"/></filter>
    <linearGradient id="gAgg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#F0EBFE"/><stop offset="100%" stop-color="#E8E0FD"/></linearGradient>
  </defs>
  <rect width="960" height="520" rx="16" fill="#FAFBFC"/>

  <!-- Supply side -->
  <rect x="40" y="160" width="180" height="200" rx="14" fill="#FFF3E8" stroke="#FF6B00" stroke-width="2" filter="url(#shadow)"/>
  <text x="130" y="195" text-anchor="middle" font-size="12" font-weight="700" fill="#FF6B00" letter-spacing="2">SUPPLY SIDE</text>
  <text x="130" y="225" text-anchor="middle" font-size="17" font-weight="800" fill="#1F2937">供给侧</text>
  <text x="130" y="250" text-anchor="middle" font-size="12" fill="#6B7280">App 开发者 / Publisher</text>
  <rect x="60" y="270" width="140" height="26" rx="13" fill="white" stroke="#FFB366" stroke-width="1"/>
  <text x="130" y="288" text-anchor="middle" font-size="11" fill="#FF6B00" font-weight="600">高填充率 · 高eCPM</text>
  <rect x="60" y="305" width="140" height="26" rx="13" fill="white" stroke="#FFB366" stroke-width="1"/>
  <text x="130" y="323" text-anchor="middle" font-size="11" fill="#FF6B00" font-weight="600">低接入成本</text>

  <!-- Demand side -->
  <rect x="740" y="160" width="180" height="200" rx="14" fill="#E8F0FE" stroke="#4A90D9" stroke-width="2" filter="url(#shadow)"/>
  <text x="830" y="195" text-anchor="middle" font-size="12" font-weight="700" fill="#4A90D9" letter-spacing="2">DEMAND SIDE</text>
  <text x="830" y="225" text-anchor="middle" font-size="17" font-weight="800" fill="#1F2937">需求侧</text>
  <text x="830" y="250" text-anchor="middle" font-size="12" fill="#6B7280">DSP / 广告主</text>
  <rect x="760" y="270" width="140" height="26" rx="13" fill="white" stroke="#93C5FD" stroke-width="1"/>
  <text x="830" y="288" text-anchor="middle" font-size="11" fill="#4A90D9" font-weight="600">精准触达用户</text>
  <rect x="760" y="305" width="140" height="26" rx="13" fill="white" stroke="#93C5FD" stroke-width="1"/>
  <text x="830" y="323" text-anchor="middle" font-size="11" fill="#4A90D9" font-weight="600">ROI 最大化</text>

  <!-- Aggregator center -->
  <rect x="290" y="80" width="380" height="360" rx="18" fill="url(#gAgg)" stroke="#8B5CF6" stroke-width="2" stroke-dasharray="8,4" filter="url(#shadow)"/>
  <text x="480" y="115" text-anchor="middle" font-size="14" font-weight="800" fill="#8B5CF6" letter-spacing="2">聚合层 / AGGREGATOR</text>

  <!-- Network SDKs block -->
  <rect x="315" y="140" width="155" height="120" rx="10" fill="#E8F8EC" stroke="#34C759" stroke-width="1.5"/>
  <text x="392" y="165" text-anchor="middle" font-size="12" font-weight="700" fill="#34C759">广告联盟 SDK</text>
  <text x="392" y="188" text-anchor="middle" font-size="11" fill="#6B7280">穿山甲 · 优量汇</text>
  <text x="392" y="206" text-anchor="middle" font-size="11" fill="#6B7280">快手 · Mintegral</text>
  <text x="392" y="224" text-anchor="middle" font-size="11" fill="#6B7280">百度 · Vivo · OPPO</text>
  <text x="392" y="248" text-anchor="middle" font-size="10" fill="#34C759" font-weight="600">SDK Bidding</text>

  <!-- ADX block -->
  <rect x="315" y="275" width="155" height="80" rx="10" fill="#E8F0FE" stroke="#4A90D9" stroke-width="1.5"/>
  <text x="392" y="305" text-anchor="middle" font-size="12" font-weight="700" fill="#4A90D9">ADX 广告交易所</text>
  <text x="392" y="325" text-anchor="middle" font-size="11" fill="#6B7280">OpenRTB 实时竞价</text>
  <text x="392" y="345" text-anchor="middle" font-size="10" fill="#4A90D9" font-weight="600">RTB Protocol</text>

  <!-- Bidding Engine block -->
  <rect x="490" y="140" width="155" height="215" rx="10" fill="white" stroke="#8B5CF6" stroke-width="1.5"/>
  <text x="567" y="170" text-anchor="middle" font-size="12" font-weight="700" fill="#8B5CF6">竞价排序引擎</text>
  <line x1="510" y1="182" x2="625" y2="182" stroke="#E5E7EB" stroke-width="1"/>
  <text x="567" y="205" text-anchor="middle" font-size="11" fill="#6B7280">Bidding 并发竞价</text>
  <text x="567" y="228" text-anchor="middle" font-size="11" fill="#6B7280">Waterfall 瀑布流</text>
  <text x="567" y="251" text-anchor="middle" font-size="11" fill="#6B7280">混合智能排序</text>
  <text x="567" y="274" text-anchor="middle" font-size="11" fill="#6B7280">频次控制</text>
  <text x="567" y="297" text-anchor="middle" font-size="11" fill="#6B7280">A/B 实验</text>
  <text x="567" y="325" text-anchor="middle" font-size="11" fill="#6B7280">流量分组</text>
  <text x="567" y="348" text-anchor="middle" font-size="10" fill="#8B5CF6" font-weight="600">~200ms 全链路</text>

  <!-- Arrows -->
  <line x1="220" y1="240" x2="288" y2="240" stroke="#FF6B00" stroke-width="2.5" marker-end="url(#arr-o)"/>
  <text x="254" y="232" text-anchor="middle" font-size="10" fill="#FF6B00" font-weight="600">广告请求</text>

  <line x1="288" y1="280" x2="220" y2="280" stroke="#FF6B00" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-o)"/>
  <text x="254" y="298" text-anchor="middle" font-size="10" fill="#FF6B00">返回广告</text>

  <line x1="672" y1="240" x2="738" y2="240" stroke="#4A90D9" stroke-width="2.5" marker-end="url(#arr-b)"/>
  <text x="705" y="232" text-anchor="middle" font-size="10" fill="#4A90D9" font-weight="600">Bid Request</text>

  <line x1="738" y1="280" x2="672" y2="280" stroke="#4A90D9" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-b)"/>
  <text x="705" y="298" text-anchor="middle" font-size="10" fill="#4A90D9">Bid Response</text>

  <!-- User at top -->
  <circle cx="130" cy="70" r="28" fill="#F3F4F6" stroke="#D1D5DB" stroke-width="1.5"/>
  <text x="130" y="65" text-anchor="middle" font-size="22">👤</text>
  <text x="130" y="86" text-anchor="middle" font-size="10" fill="#6B7280">用户</text>
  <line x1="130" y1="100" x2="130" y2="158" stroke="#D1D5DB" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr-o)"/>

  <!-- Advertiser brands at top right -->
  <text x="830" y="80" text-anchor="middle" font-size="11" fill="#6B7280">百度 · 拼多多 · 淘宝 · 京东</text>
  <text x="830" y="100" text-anchor="middle" font-size="11" fill="#6B7280">爱奇艺 · 科大讯飞 ...</text>
  <line x1="830" y1="110" x2="830" y2="158" stroke="#93C5FD" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Bottom label -->
  <rect x="320" y="470" width="320" height="32" rx="16" fill="#8B5CF6"/>
  <text x="480" y="492" text-anchor="middle" font-size="13" font-weight="700" fill="white">本质：流量供给侧与广告需求侧之间的撮合中间层</text>
</svg>