<svg xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" viewBox="0 0 850 600" width="850" height="600">
  <defs>
    
  </defs>

  <!-- Outer container -->
  <rect  x="50" y="20" width="750" height="560" rx="5" fill="#f0f4f8" stroke="#2c3e50" stroke-width="1.5"/>

  <!-- Title -->
  <text  x="425" y="50" text-anchor="middle" font-size="16" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" fill="#2c3e50">Final Prompt</text>

  <!-- Layer 1 -->
  <rect  x="70" y="70" width="710" height="100" rx="3" fill="#e8f1f8" stroke="#3498db" stroke-width="1.5"/>
  <text  x="80" y="90" font-family="system-ui, -apple-system, sans-serif" font-size="14px" font-weight="bold" fill="#2c3e50">Layer 1: System Prompt (静态)</text>
  <line  x1="70" y1="100" x2="780" y2="100" stroke="#bdc3c7" stroke-width="1"/>
  <text  x="85" y="115" font-family="system-ui, -apple-system, sans-serif" font-size="11px" fill="#555">- 身份定义（你是谁，你的职责是什么）</text>
  <text  x="85" y="135" font-family="system-ui, -apple-system, sans-serif" font-size="11px" fill="#555">- 行为约束（必须做什么，禁止做什么）</text>
  <text  x="85" y="155" font-family="system-ui, -apple-system, sans-serif" font-size="11px" fill="#555">- 输出格式规范（JSON Schema / XML 模板）</text>

  <!-- Layer 2 -->
  <rect  x="70" y="180" width="710" height="120" rx="3" fill="#e8f1f8" stroke="#3498db" stroke-width="1.5"/>
  <text  x="80" y="200" font-family="system-ui, -apple-system, sans-serif" font-size="14px" font-weight="bold" fill="#2c3e50">Layer 2: Context Injection (动态)</text>
  <line  x1="70" y1="210" x2="780" y2="210" stroke="#bdc3c7" stroke-width="1"/>
  <text  x="85" y="225" font-family="system-ui, -apple-system, sans-serif" font-size="11px" fill="#555">- 可用工具列表及其描述</text>
  <text  x="85" y="245" font-family="system-ui, -apple-system, sans-serif" font-size="11px" fill="#555">- 历史对话摘要 / 关键事实</text>
  <text  x="85" y="265" font-family="system-ui, -apple-system, sans-serif" font-size="11px" fill="#555">- 当前系统状态（已完成步骤、中间结果）</text>
  <text  x="85" y="285" font-family="system-ui, -apple-system, sans-serif" font-size="11px" fill="#555">- 检索到的外部知识（RAG 结果）</text>

  <!-- Layer 3 -->
  <rect  x="70" y="310" width="710" height="100" rx="3" fill="#e8f1f8" stroke="#3498db" stroke-width="1.5"/>
  <text  x="80" y="330" font-family="system-ui, -apple-system, sans-serif" font-size="14px" font-weight="bold" fill="#2c3e50">Layer 3: User Input (外部)</text>
  <line  x1="70" y1="340" x2="780" y2="340" stroke="#bdc3c7" stroke-width="1"/>
  <text  x="85" y="355" font-family="system-ui, -apple-system, sans-serif" font-size="11px" fill="#555">- 用户的原始请求</text>
  <text  x="85" y="375" font-family="system-ui, -apple-system, sans-serif" font-size="11px" fill="#555">- 或上一步 Agent 的输出（在 Multi-Agent 中）</text>

  <!-- Layer 4 -->
  <rect  x="70" y="420" width="710" height="130" rx="3" fill="#e8f1f8" stroke="#3498db" stroke-width="1.5"/>
  <text  x="80" y="440" font-family="system-ui, -apple-system, sans-serif" font-size="14px" font-weight="bold" fill="#2c3e50">Layer 4: Constraints  Guardrails (静态+动态)</text>
  <line  x1="70" y1="450" x2="780" y2="450" stroke="#bdc3c7" stroke-width="1"/>
  <text  x="85" y="465" font-family="system-ui, -apple-system, sans-serif" font-size="11px" fill="#555">- 安全边界（禁止调用的工具、禁止访问的数据）</text>
  <text  x="85" y="485" font-family="system-ui, -apple-system, sans-serif" font-size="11px" fill="#555">- 输出限制（最大步骤数、Token 预算）</text>
  <text  x="85" y="505" font-family="system-ui, -apple-system, sans-serif" font-size="11px" fill="#555">- 当前 Turn 的特殊指令</text>
</svg>