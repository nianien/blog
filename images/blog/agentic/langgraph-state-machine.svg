<svg viewBox="0 0 580 620" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif">
  <!-- Title -->
  <text x="270" y="24" font-size="14" font-weight="bold" text-anchor="middle" fill="#333">LangGraph State Machine Architecture</text>

  <!-- Shared State -->
  <rect x="120" y="42" width="300" height="50" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="270" y="63" font-size="12" font-weight="bold" text-anchor="middle" fill="#92400e">Shared State</text>
  <text x="270" y="80" font-size="9" text-anchor="middle" fill="#78350f">{messages: [...], tool_results: {...}, plan: [...]}</text>

  <!-- Arrow: State → START -->
  <line x1="270" y1="92" x2="270" y2="108" stroke="#666" stroke-width="1.5"/>
  <polygon points="266,108 270,118 274,108" fill="#666"/>

  <!-- START -->
  <rect x="195" y="120" width="150" height="36" rx="6" fill="#e5e7eb" stroke="#6b7280" stroke-width="1.5"/>
  <text x="270" y="143" font-size="12" font-weight="bold" text-anchor="middle" fill="#374151">START</text>

  <!-- Arrow: START → agent_node -->
  <line x1="270" y1="156" x2="270" y2="172" stroke="#666" stroke-width="1.5"/>
  <polygon points="266,172 270,182 274,172" fill="#666"/>

  <!-- agent_node -->
  <rect x="170" y="184" width="200" height="48" rx="6" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="270" y="205" font-size="12" font-weight="bold" text-anchor="middle" fill="#166534">agent_node</text>
  <text x="270" y="222" font-size="10" text-anchor="middle" fill="#555">(LLM Reasoning)</text>

  <!-- Arrow: agent_node → should_continue? -->
  <line x1="270" y1="232" x2="270" y2="258" stroke="#666" stroke-width="1.5"/>
  <polygon points="266,258 270,268 274,258" fill="#666"/>

  <!-- should_continue? diamond -->
  <polygon points="270,270 370,310 270,350 170,310" fill="#fce7f3" stroke="#ec4899" stroke-width="1.5"/>
  <text x="270" y="306" font-size="11" font-weight="bold" text-anchor="middle" fill="#831843">should_</text>
  <text x="270" y="320" font-size="11" font-weight="bold" text-anchor="middle" fill="#831843">continue?</text>

  <!-- Left branch label: tool_calls -->
  <text x="152" y="305" font-size="10" text-anchor="end" fill="#166534">tool_calls</text>

  <!-- Right branch label: no tool_calls -->
  <text x="388" y="305" font-size="10" text-anchor="start" fill="#6b7280">no tool_calls</text>

  <!-- Left branch: diamond → tool_node (right-angle: left then down) -->
  <line x1="170" y1="310" x2="100" y2="310" stroke="#22c55e" stroke-width="1.5"/>
  <line x1="100" y1="310" x2="100" y2="388" stroke="#22c55e" stroke-width="1.5"/>
  <polygon points="96,388 100,398 104,388" fill="#22c55e"/>

  <!-- tool_node -->
  <rect x="50" y="400" width="200" height="48" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="130" y="421" font-size="12" font-weight="bold" text-anchor="middle" fill="#1e40af">tool_node</text>
  <text x="130" y="438" font-size="10" text-anchor="middle" fill="#555">(Execute Tools)</text>

  <!-- Right branch: diamond → END (right-angle: right then down) -->
  <line x1="370" y1="310" x2="450" y2="310" stroke="#6b7280" stroke-width="1.5"/>
  <line x1="450" y1="310" x2="450" y2="388" stroke="#6b7280" stroke-width="1.5"/>
  <polygon points="446,388 450,398 454,388" fill="#6b7280"/>

  <!-- END -->
  <rect x="390" y="400" width="120" height="48" rx="6" fill="#e5e7eb" stroke="#6b7280" stroke-width="1.5"/>
  <text x="450" y="421" font-size="12" font-weight="bold" text-anchor="middle" fill="#374151">END</text>
  <text x="450" y="438" font-size="10" text-anchor="middle" fill="#555">(Return Result)</text>

  <!-- Loop-back: tool_node → agent_node (left side path) -->
  <line x1="50" y1="424" x2="15" y2="424" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="5,4"/>
  <line x1="15" y1="424" x2="15" y2="208" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="5,4"/>
  <line x1="15" y1="208" x2="168" y2="208" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="5,4"/>
  <polygon points="168,204 178,208 168,212" fill="#3b82f6"/>
  <text x="50" y="200" font-size="10" fill="#1e40af">回到推理节点</text>
  <text x="0" y="260" font-size="10" fill="#1e40af">feed tool results back</text>

  <!-- Code example at bottom -->
  <rect x="30" y="510" width="500" height="90" rx="6" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="45" y="532" font-size="11" font-weight="bold" fill="#333">Node 函数签名：</text>
  <text x="45" y="554" font-size="10" font-family="monospace" fill="#555">def agent_node(state: AgentState) -&gt; dict:</text>
  <text x="65" y="572" font-size="10" font-family="monospace" fill="#555">result = llm.invoke(state["messages"])</text>
  <text x="65" y="590" font-size="10" font-family="monospace" fill="#555">return {"messages": [result]}  # 更新 Shared State</text>
</svg>