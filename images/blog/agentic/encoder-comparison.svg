<svg viewBox="0 0 900 660" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif">
<!-- Background -->
<!-- ===== BI-ENCODER SECTION ===== -->
  <g id="bi-encoder">
    <!-- Title -->
    <text x="225" y="35" text-anchor="middle" fill="#3498db" font-size="15" font-weight="bold">Bi-encoder (初步检索阶段)</text>

    <!-- Query box -->
    <rect x="120" y="60" width="110" height="50" fill="#e3f2fd" stroke="#3498db" stroke-width="1.5" rx="6"/>
    <text x="175" y="85" text-anchor="middle" font-weight="bold">Query</text>

    <!-- Document box -->
    <rect x="260" y="60" width="110" height="50" fill="#e3f2fd" stroke="#3498db" stroke-width="1.5" rx="6"/>
    <text x="315" y="85" text-anchor="middle" font-weight="bold">Document</text>

    <!-- Arrows down -->
    <line x1="175.0" y1="110.0" x2="175" y2="133" stroke="#333" stroke-width="1.5"/>
  <polygon points="175.0,140.0 170,132 180,132" fill="#333"/>
    <line x1="315.0" y1="110.0" x2="315" y2="133" stroke="#333" stroke-width="1.5"/>
  <polygon points="315.0,140.0 310,132 320,132" fill="#333"/>

    <!-- Encoder boxes -->
    <rect x="130" y="140" width="90" height="50" fill="#fff3e0" stroke="#f39c12" stroke-width="1.5" rx="6"/>
    <text x="175" y="165" text-anchor="middle" font-weight="bold" font-size="12">Encoder</text>

    <rect x="270" y="140" width="90" height="50" fill="#fff3e0" stroke="#f39c12" stroke-width="1.5" rx="6"/>
    <text x="315" y="165" text-anchor="middle" font-weight="bold" font-size="12">Encoder</text>

    <!-- Right side annotations -->
    <text x="380" y="145" font-size="11" fill="#666">独立编码</text>
    <text x="380" y="160" font-size="11" fill="#27ae60">↓ 可以预计算</text>
    <text x="380" y="175" font-size="11" fill="#27ae60">↓ 速度快</text>
    <text x="380" y="190" font-size="11" fill="#27ae60">↓ 精度有限</text>

    <!-- Arrows down -->
    <line x1="175.0" y1="190.0" x2="175" y2="213" stroke="#333" stroke-width="1.5"/>
  <polygon points="175.0,220.0 170,212 180,212" fill="#333"/>
    <line x1="315.0" y1="190.0" x2="315" y2="213" stroke="#333" stroke-width="1.5"/>
  <polygon points="315.0,220.0 310,212 320,212" fill="#333"/>

    <!-- Vector outputs -->
    <text x="175" y="240" text-anchor="middle" font-weight="bold" font-size="12">vec_q</text>
    <text x="315" y="240" text-anchor="middle" font-weight="bold" font-size="12">vec_d</text>

    <!-- Arrows to comparison -->
    <line x1="175.0" y1="250.0" x2="239" y2="277" stroke="#333" stroke-width="1.5"/>
  <polygon points="245.0,280.0 236,281 240,272" fill="#333"/>
    <line x1="315.0" y1="250.0" x2="251" y2="277" stroke="#333" stroke-width="1.5"/>
  <polygon points="245.0,280.0 250,272 254,281" fill="#333"/>

    <!-- Comparison box -->
    <rect x="170" y="280" width="150" height="50" fill="#f0f0f0" stroke="#666" stroke-width="1.5" rx="6"/>
    <text x="245" y="300" text-anchor="middle" font-weight="bold" font-size="12">cosine(q, d)</text>
    <text x="245" y="318" text-anchor="middle" font-size="12" fill="#333">score</text>
  </g>

  <!-- ===== DIVIDER ===== -->
  <line x1="50" y1="380" x2="850" y2="380" stroke="#999" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- ===== CROSS-ENCODER SECTION ===== -->
  <g id="cross-encoder">
    <!-- Title -->
    <text x="225" y="430" text-anchor="middle" fill="#e74c3c" font-size="15" font-weight="bold">Cross-encoder (Reranking 阶段)</text>

    <!-- Combined input box -->
    <rect x="80" y="455" width="290" height="60" fill="#fce4ec" stroke="#e74c3c" stroke-width="1.5" rx="6"/>
    <text x="225" y="480" text-anchor="middle" font-weight="bold" font-size="12">[CLS] Query [SEP] Doc</text>
    <text x="225" y="500" text-anchor="middle" font-size="11" fill="#666">拼接在一起</text>

    <!-- Arrow down -->
    <line x1="225.0" y1="515.0" x2="225" y2="533" stroke="#333" stroke-width="1.5"/>
  <polygon points="225.0,540.0 220,532 230,532" fill="#333"/>

    <!-- Encoder box -->
    <rect x="100" y="540" width="250" height="60" fill="#fff3e0" stroke="#f39c12" stroke-width="1.5" rx="6"/>
    <text x="225" y="565" text-anchor="middle" font-weight="bold" font-size="12">Transformer Encoder</text>
    <text x="225" y="580" text-anchor="middle" font-size="11" fill="#333">(交叉注意力)</text>

    <!-- Right side annotations -->
    <text x="380" y="540" font-size="11" fill="#666">联合编码</text>
    <text x="380" y="555" font-size="11" fill="#27ae60">↓ 不可预计算</text>
    <text x="380" y="570" font-size="11" fill="#27ae60">↓ 速度慢</text>
    <text x="380" y="585" font-size="11" fill="#27ae60">↓ 精度高</text>

    <!-- Arrow down -->
    <line x1="225.0" y1="600.0" x2="225" y2="613" stroke="#333" stroke-width="1.5"/>
  <polygon points="225.0,620.0 220,612 230,612" fill="#333"/>

    <!-- Score output -->
    <text x="225" y="645" text-anchor="middle" font-weight="bold" font-size="12">score</text>
  </g>
</svg>