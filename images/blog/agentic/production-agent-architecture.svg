  <text x="430" y="44" text-anchor="middle" font-size="12" font-weight="bold" fill="#0D47A1">USER REQUEST</text>
  <!-- Arrow down -->
  <line x1="430" y1="56" x2="430" y2="72" stroke="#546E7A" stroke-width="1.5"/>
  <polygon points="426,72 430,82 434,72" fill="#546E7A"/>

