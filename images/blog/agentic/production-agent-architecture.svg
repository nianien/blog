  <text x="170" y="520" text-anchor="middle" font-size="9" fill="#78909C">GPT-4o / Claude / Open Source</text>

  <rect x="315" y="483" width="170" height="50" rx="5" fill="#ECEFF1" stroke="#607D8B" stroke-width="1"/>
  <text x="400" y="504" text-anchor="middle" font-size="10" font-weight="bold" fill="#37474F">External Services</text>
  <text x="400" y="520" text-anchor="middle" font-size="9" fill="#78909C">Databases / APIs</text>

