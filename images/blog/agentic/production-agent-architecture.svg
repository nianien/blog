  <text x="132" y="605" text-anchor="middle" font-size="10" font-weight="bold" fill="#0D47A1">Observability</text>
  <text x="132" y="622" text-anchor="middle" font-size="9" fill="#42A5F5">Tracer · Metrics</text>
  <text x="132" y="638" text-anchor="middle" font-size="9" fill="#42A5F5">Structured Logging</text>
  <text x="132" y="654" text-anchor="middle" font-size="9" fill="#42A5F5">Alerting</text>

  <rect x="240" y="585" width="185" height="95" rx="5" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1"/>
  <text x="332" y="605" text-anchor="middle" font-size="10" font-weight="bold" fill="#1B5E20">Evaluation</text>
  <text x="332" y="622" text-anchor="middle" font-size="9" fill="#4CAF50">Offline / Online Eval</text>
  <text x="332" y="638" text-anchor="middle" font-size="9" fill="#4CAF50">A/B Testing</text>
  <text x="332" y="654" text-anchor="middle" font-size="9" fill="#4CAF50">Benchmark / Regression</text>

  <rect x="440" y="585" width="185" height="95" rx="5" fill="#FFEBEE" stroke="#C62828" stroke-width="1"/>
  <text x="532" y="605" text-anchor="middle" font-size="10" font-weight="bold" fill="#B71C1C">Security</text>
