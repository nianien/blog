  <text x="340" y="258" text-anchor="middle" font-size="10" font-weight="bold" fill="#BF360C">Prompt Engine (06)</text>
  <text x="340" y="274" text-anchor="middle" font-size="9" fill="#F57C00">4-Layer Assembly / Token Budget</text>

  <rect x="435" y="240" width="150" height="48" rx="5" fill="#FCE4EC" stroke="#AD1457" stroke-width="1"/>
  <text x="510" y="258" text-anchor="middle" font-size="10" font-weight="bold" fill="#880E4F">Budget Guard</text>
