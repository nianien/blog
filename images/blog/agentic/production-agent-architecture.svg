  <text x="532" y="638" text-anchor="middle" font-size="9" fill="#E53935">Data Filter / RBAC</text>
  <text x="532" y="654" text-anchor="middle" font-size="9" fill="#E53935">Human-in-the-loop</text>

  <rect x="640" y="585" width="185" height="95" rx="5" fill="#FFF3E0" stroke="#E65100" stroke-width="1"/>
  <text x="732" y="605" text-anchor="middle" font-size="10" font-weight="bold" fill="#BF360C">Cost Control</text>
  <text x="732" y="622" text-anchor="middle" font-size="9" fill="#F57C00">Token Budget · Model Tiering</text>
  <text x="732" y="638" text-anchor="middle" font-size="9" fill="#F57C00">Caching</text>
  <text x="732" y="654" text-anchor="middle" font-size="9" fill="#F57C00">Monitoring / Alerting</text>

