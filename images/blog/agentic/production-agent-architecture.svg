<svg viewBox="0 0 860 760" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif">
  <!-- Outer border -->
  <rect x="15" y="8" width="830" height="745" rx="8" fill="#FAFAFA" stroke="#B0BEC5" stroke-width="1"/>

