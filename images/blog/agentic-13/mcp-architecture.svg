<svg viewBox="0 0 750 530" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif">
  <!-- Title -->
  <text x="375" y="22" font-size="14" font-weight="bold" text-anchor="middle" fill="#333">MCP Three-Tier Architecture</text>

  <!-- ===== Host Layer ===== -->
  <rect x="50" y="42" width="650" height="70" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="375" y="64" font-size="12" font-weight="bold" text-anchor="middle" fill="#92400e">Host（Claude Desktop / IDE / 自定义 Agent）</text>
  <text x="375" y="82" font-size="10" text-anchor="middle" fill="#78350f">MCP Client 创建与管理 | 能力协商 | 请求路由 | 结果汇聚</text>

  <!-- T-split down from Host to 3 Clients -->
  <line x1="375" y1="112" x2="375" y2="128" stroke="#666" stroke-width="1.5"/>
  <line x1="145" y1="128" x2="605" y2="128" stroke="#666" stroke-width="1.5"/>

  <line x1="145" y1="128" x2="145" y2="148" stroke="#666" stroke-width="1.5"/>
  <polygon points="141,148 145,158 149,148" fill="#666"/>
  <line x1="375" y1="128" x2="375" y2="148" stroke="#666" stroke-width="1.5"/>
  <polygon points="371,148 375,158 379,148" fill="#666"/>
  <line x1="605" y1="128" x2="605" y2="148" stroke="#666" stroke-width="1.5"/>
  <polygon points="601,148 605,158 609,148" fill="#666"/>

  <!-- ===== Client Layer ===== -->
  <rect x="50" y="162" width="190" height="90" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="145" y="182" font-size="11" font-weight="bold" text-anchor="middle" fill="#1e40af">MCP Client</text>
  <text x="145" y="198" font-size="10" text-anchor="middle" fill="#1e3a8a">目标: GitHub</text>
  <text x="65" y="218" font-size="9" fill="#555">协议: stdio</text>
  <text x="65" y="233" font-size="9" fill="#555">能力: list_tools, call_tool</text>

  <rect x="280" y="162" width="190" height="90" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="375" y="182" font-size="11" font-weight="bold" text-anchor="middle" fill="#1e40af">MCP Client</text>
  <text x="375" y="198" font-size="10" text-anchor="middle" fill="#1e3a8a">目标: Slack</text>
  <text x="295" y="218" font-size="9" fill="#555">协议: stdio</text>
  <text x="295" y="233" font-size="9" fill="#555">能力: list_resources, read</text>

  <rect x="510" y="162" width="190" height="90" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="605" y="182" font-size="11" font-weight="bold" text-anchor="middle" fill="#1e40af">MCP Client</text>
  <text x="605" y="198" font-size="10" text-anchor="middle" fill="#1e3a8a">目标: Database</text>
  <text x="525" y="218" font-size="9" fill="#555">协议: HTTP (SSE)</text>
  <text x="525" y="233" font-size="9" fill="#555">能力: list_tools, call_tool</text>

  <!-- Arrows down to Servers -->
  <line x1="145" y1="252" x2="145" y2="278" stroke="#666" stroke-width="1.5"/>
  <polygon points="141,278 145,288 149,278" fill="#666"/>
  <line x1="375" y1="252" x2="375" y2="278" stroke="#666" stroke-width="1.5"/>
  <polygon points="371,278 375,288 379,278" fill="#666"/>
  <line x1="605" y1="252" x2="605" y2="278" stroke="#666" stroke-width="1.5"/>
  <polygon points="601,278 605,288 609,278" fill="#666"/>

  <!-- ===== Server Layer ===== -->
  <rect x="50" y="292" width="190" height="105" rx="6" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="145" y="312" font-size="11" font-weight="bold" text-anchor="middle" fill="#166534">MCP Server (GitHub)</text>
  <text x="65" y="332" font-size="9" fill="#555">Tools:</text>
  <text x="80" y="347" font-size="9" fill="#555">search_repo, create_pr</text>
  <text x="80" y="362" font-size="9" fill="#555">comment_issue</text>
  <text x="65" y="382" font-size="9" fill="#888">独立进程或服务</text>

  <rect x="280" y="292" width="190" height="105" rx="6" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="375" y="312" font-size="11" font-weight="bold" text-anchor="middle" fill="#166534">MCP Server (Slack)</text>
  <text x="295" y="332" font-size="9" fill="#555">Resources: channels, members</text>
  <text x="295" y="347" font-size="9" fill="#555">Tools: send_message</text>
  <text x="295" y="382" font-size="9" fill="#888">独立进程或服务</text>

  <rect x="510" y="292" width="190" height="105" rx="6" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="605" y="312" font-size="11" font-weight="bold" text-anchor="middle" fill="#166534">MCP Server (PostgreSQL)</text>
  <text x="525" y="332" font-size="9" fill="#555">Tools: query, insert, update</text>
  <text x="525" y="382" font-size="9" fill="#888">独立进程或服务</text>

  <!-- Design principles box -->
  <rect x="50" y="420" width="650" height="90" rx="6" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="375" y="442" font-size="11" font-weight="bold" text-anchor="middle" fill="#333">设计原则</text>
  <text x="70" y="464" font-size="10" fill="#333">1:1 关系 — 一个 Client 连接一个 Server（不是 1 对多）</text>
  <text x="70" y="484" font-size="10" fill="#333">松耦合 — Server 不需知道 Client 的实现细节，反之亦然</text>
  <text x="70" y="504" font-size="10" fill="#333">安全边界 — Host 控制 Client 的权限范围，Server 验证请求合法性</text>
</svg>
