<svg viewBox="0 0 700 210" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif">

  <!-- ===== Row 1: Web 演进 ===== -->
  <text x="18" y="30" font-size="10" font-weight="bold" fill="#0066cc">Web 演进</text>

  <!-- CGI -->
  <rect x="18" y="40" width="130" height="36" rx="6" fill="#f5f5f5" stroke="#999" stroke-width="1.5"/>
  <text x="83" y="55" font-size="9" font-weight="bold" text-anchor="middle" fill="#666">CGI 脚本</text>
  <text x="83" y="68" font-size="8" text-anchor="middle" fill="#999">各自通信方式</text>

  <!-- Arrow -->
  <line x1="148" y1="58" x2="172" y2="58" stroke="#0066cc" stroke-width="1.5"/>
  <polygon points="172,54 182,58 172,62" fill="#0066cc"/>

  <!-- HTTP -->
  <rect x="180" y="40" width="130" height="36" rx="6" fill="#e8f4f8" stroke="#0066cc" stroke-width="1.5"/>
  <text x="245" y="55" font-size="9" font-weight="bold" text-anchor="middle" fill="#0066cc">HTTP</text>
  <text x="245" y="68" font-size="8" text-anchor="middle" fill="#666">统一通信</text>

  <!-- Arrow -->
  <line x1="310" y1="58" x2="334" y2="58" stroke="#0066cc" stroke-width="1.5"/>
  <polygon points="334,54 344,58 334,62" fill="#0066cc"/>

  <!-- REST -->
  <rect x="342" y="40" width="130" height="36" rx="6" fill="#e8f4f8" stroke="#0066cc" stroke-width="1.5"/>
  <text x="407" y="55" font-size="9" font-weight="bold" text-anchor="middle" fill="#0066cc">REST</text>
  <text x="407" y="68" font-size="8" text-anchor="middle" fill="#666">统一风格</text>

  <!-- Arrow -->
  <line x1="472" y1="58" x2="496" y2="58" stroke="#0066cc" stroke-width="1.5"/>
  <polygon points="496,54 506,58 496,62" fill="#0066cc"/>

  <!-- OpenAPI -->
  <rect x="504" y="40" width="130" height="36" rx="6" fill="#e8f4f8" stroke="#0066cc" stroke-width="2"/>
  <text x="569" y="55" font-size="9" font-weight="bold" text-anchor="middle" fill="#0066cc">OpenAPI</text>
  <text x="569" y="68" font-size="8" text-anchor="middle" fill="#666">统一描述</text>

  <!-- ===== Vertical dashed parallel lines ===== -->
  <line x1="83" y1="82" x2="83" y2="120" stroke="#ccc" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="245" y1="82" x2="245" y2="120" stroke="#ccc" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="407" y1="82" x2="407" y2="120" stroke="#ccc" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="569" y1="82" x2="569" y2="120" stroke="#ccc" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Parallel symbol -->
  <text x="350" y="105" font-size="10" text-anchor="middle" fill="#999">‖ 相同模式</text>

  <!-- ===== Row 2: Agent 工具演进 ===== -->
  <text x="18" y="132" font-size="10" font-weight="bold" fill="#ff9900">Agent 工具</text>

  <!-- 各框架各自定义 -->
  <rect x="18" y="142" width="130" height="36" rx="6" fill="#f5f5f5" stroke="#999" stroke-width="1.5"/>
  <text x="83" y="157" font-size="9" font-weight="bold" text-anchor="middle" fill="#666">各框架自定义</text>
  <text x="83" y="170" font-size="8" text-anchor="middle" fill="#999">工具定义格式</text>

  <!-- Arrow -->
  <line x1="148" y1="160" x2="172" y2="160" stroke="#ff9900" stroke-width="1.5"/>
  <polygon points="172,156 182,160 172,164" fill="#ff9900"/>

  <!-- MCP 通信 -->
  <rect x="180" y="142" width="130" height="36" rx="6" fill="#fff4e8" stroke="#ff9900" stroke-width="1.5"/>
  <text x="245" y="157" font-size="9" font-weight="bold" text-anchor="middle" fill="#ff9900">MCP ?</text>
  <text x="245" y="170" font-size="8" text-anchor="middle" fill="#666">统一工具通信</text>

  <!-- Arrow -->
  <line x1="310" y1="160" x2="334" y2="160" stroke="#ff9900" stroke-width="1.5"/>
  <polygon points="334,156 344,160 334,164" fill="#ff9900"/>

  <!-- ??? 描述 -->
  <rect x="342" y="142" width="130" height="36" rx="6" fill="#fff4e8" stroke="#ff9900" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="407" y="157" font-size="9" font-weight="bold" text-anchor="middle" fill="#ff9900">???</text>
  <text x="407" y="170" font-size="8" text-anchor="middle" fill="#666">统一工具描述</text>

  <!-- Arrow -->
  <line x1="472" y1="160" x2="496" y2="160" stroke="#ff9900" stroke-width="1.5"/>
  <polygon points="496,156 506,160 496,164" fill="#ff9900"/>

  <!-- ??? 发现 -->
  <rect x="504" y="142" width="130" height="36" rx="6" fill="#fff4e8" stroke="#ff9900" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="569" y="157" font-size="9" font-weight="bold" text-anchor="middle" fill="#ff9900">???</text>
  <text x="569" y="170" font-size="8" text-anchor="middle" fill="#666">统一工具发现</text>

  <!-- Bottom note -->
  <text x="350" y="202" font-size="10" text-anchor="middle" fill="#666">从 CGI 到 HTTP，Web 用了十年。Agent 工具生态能更快吗？</text>
</svg>
