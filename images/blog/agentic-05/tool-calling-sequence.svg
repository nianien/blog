<svg viewBox="0 0 900 700" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      text { font-family: system-ui, -apple-system, sans-serif; }
      .title { font-size: 18px; font-weight: bold; fill: #1e40af; }
      .actor { font-size: 14px; font-weight: 600; fill: #1e40af; }
      .label { font-size: 13px; fill: #374151; }
      .step { font-size: 12px; fill: #4b5563; }
      .box { fill: #f3f4f6; stroke: #d1d5db; stroke-width: 1; }
      .thinking { fill: #fef3c7; stroke: #f59e0b; stroke-width: 1; }
      .arrow { stroke: #374151; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .dashed { stroke-dasharray: 5,5; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#374151"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" class="title">Tool Calling 完整序列图</text>

  <!-- Actors -->
  <g id="user">
    <rect x="60" y="70" width="80" height="40" rx="6" class="box"/>
    <text x="100" y="98" text-anchor="middle" class="actor">User</text>
  </g>

  <g id="llm">
    <rect x="280" y="70" width="80" height="40" rx="6" class="box"/>
    <text x="320" y="98" text-anchor="middle" class="actor">LLM API</text>
  </g>

  <g id="runtime">
    <rect x="500" y="70" width="80" height="40" rx="6" class="box"/>
    <text x="540" y="98" text-anchor="middle" class="actor">Runtime</text>
  </g>

  <g id="tool">
    <rect x="720" y="70" width="100" height="40" rx="6" class="box"/>
    <text x="770" y="98" text-anchor="middle" class="actor">Tool (Function)</text>
  </g>

  <!-- Lifelines -->
  <line x1="100" y1="110" x2="100" y2="650" stroke="#9ca3af" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="320" y1="110" x2="320" y2="650" stroke="#9ca3af" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="540" y1="110" x2="540" y2="650" stroke="#9ca3af" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="770" y1="110" x2="770" y2="650" stroke="#9ca3af" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Step 1: User query -->
  <path class="arrow" d="M 100 150 L 320 150"/>
  <text x="210" y="140" text-anchor="middle" class="label">1. "北京今天天气"</text>

  <!-- Step 2: LLM reasoning (thinking box) -->
  <rect x="250" y="170" width="140" height="70" rx="6" class="thinking"/>
  <text x="320" y="190" text-anchor="middle" class="step">推理：</text>
  <text x="320" y="207" text-anchor="middle" class="step">用户想查天气</text>
  <text x="320" y="224" text-anchor="middle" class="step">需要调用</text>
  <text x="320" y="241" text-anchor="middle" class="step">get_weather</text>

  <!-- Step 3: Tool Call JSON -->
  <path class="arrow" d="M 320 260 L 540 260"/>
  <text x="430" y="252" text-anchor="middle" class="label">2. Tool Call JSON</text>

  <!-- Tool Call JSON box -->
  <rect x="360" y="290" width="160" height="90" rx="4" fill="#eff6ff" stroke="#3b82f6" stroke-width="1"/>
  <text x="440" y="310" text-anchor="middle" class="step">{</text>
  <text x="440" y="330" text-anchor="middle" class="step">"name": "get_weather",</text>
  <text x="440" y="350" text-anchor="middle" class="step">"arguments": {</text>
  <text x="440" y="370" text-anchor="middle" class="step">"city": "北京"</text>
  <text x="440" y="390" text-anchor="middle" class="step">}}</text>

  <!-- Step 4: Execute function -->
  <path class="arrow" d="M 540 400 L 770 400"/>
  <text x="655" y="392" text-anchor="middle" class="label">3. get_weather("北京")</text>

  <!-- Step 5: Tool result -->
  <path class="arrow" d="M 770 440 L 540 440"/>
  <text x="655" y="432" text-anchor="middle" class="label">4. Tool Result</text>

  <!-- Result box -->
  <rect x="590" y="480" width="140" height="70" rx="4" fill="#f0fdf4" stroke="#22c55e" stroke-width="1"/>
  <text x="660" y="500" text-anchor="middle" class="step">{</text>
  <text x="660" y="520" text-anchor="middle" class="step">"temp": 28,</text>
  <text x="660" y="540" text-anchor="middle" class="step">"condition": "晴"</text>
  <text x="660" y="560" text-anchor="middle" class="step">}</text>

  <!-- Step 6: Pass result back to LLM -->
  <path class="arrow" d="M 540 500 L 320 500"/>
  <text x="430" y="492" text-anchor="middle" class="label">5. Inject Result</text>

  <!-- Step 7: LLM reasoning again (thinking box) -->
  <rect x="250" y="530" width="140" height="70" rx="6" class="thinking"/>
  <text x="320" y="550" text-anchor="middle" class="step">推理：</text>
  <text x="320" y="567" text-anchor="middle" class="step">根据工具返回</text>
  <text x="320" y="584" text-anchor="middle" class="step">组织回答</text>

  <!-- Step 8: Final response -->
  <path class="arrow" d="M 320 620 L 100 620"/>
  <text x="210" y="610" text-anchor="middle" class="label">6. Final Answer</text>

  <!-- Response text -->
  <text x="100" y="645" text-anchor="middle" class="label">北京今天28°C,晴</text>
</svg>