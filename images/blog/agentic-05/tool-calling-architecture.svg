<svg viewBox="0 0 900 350" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif">
<!-- Main boxes -->
  <!-- LLM Box -->
  <g id="llm-section">
    <rect x="50" y="100" width="160" height="180" rx="8"  fill="#f0f4f8" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="130" y="130" text-anchor="middle"  font-size="14px" font-weight="600" fill="#1e40af">LLM</text>
    <text x="130" y="150" text-anchor="middle"  font-size="13px" fill="#374151">(决策层)</text>
    <text x="60" y="180"  font-size="13px" fill="#374151">• 理解意图</text>
    <text x="60" y="200"  font-size="13px" fill="#374151">• 选择工具</text>
    <text x="60" y="220"  font-size="13px" fill="#374151">• 生成参数</text>
    <text x="60" y="240"  font-size="13px" fill="#374151">• 组织回答</text>
  </g>

  <!-- Runtime Box -->
  <g id="runtime-section">
    <rect x="370" y="100" width="160" height="180" rx="8"  fill="#f0f4f8" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="450" y="130" text-anchor="middle"  font-size="14px" font-weight="600" fill="#1e40af">Runtime</text>
    <text x="450" y="150" text-anchor="middle"  font-size="13px" fill="#374151">(调度层)</text>
    <text x="380" y="180"  font-size="13px" fill="#374151">• 参数验证</text>
    <text x="380" y="200"  font-size="13px" fill="#374151">• 路由执行</text>
    <text x="380" y="220"  font-size="13px" fill="#374151">• 错误处理</text>
    <text x="380" y="240"  font-size="13px" fill="#374151">• 结果收集</text>
  </g>

  <!-- Tools Box -->
  <g id="tools-section">
    <rect x="690" y="100" width="160" height="180" rx="8"  fill="#f0f4f8" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="770" y="130" text-anchor="middle"  font-size="14px" font-weight="600" fill="#1e40af">Tools</text>
    <text x="770" y="150" text-anchor="middle"  font-size="13px" fill="#374151">(能力层)</text>
    <text x="700" y="180"  font-size="13px" fill="#374151">• 具体能力</text>
    <text x="700" y="200"  font-size="13px" fill="#374151">• 函数实现</text>
    <text x="700" y="220"  font-size="13px" fill="#374151">• 外部集成</text>
    <text x="700" y="240"  font-size="13px" fill="#374151">• 返回结果</text>
  </g>

  <!-- Bidirectional arrows with labels -->
  <!-- LLM <-> Runtime -->
  <path  d="M 210 160 L 370 160" stroke="#6366f1" stroke-width="1.5" fill="none" marker-start="url(#arrowhead-start)"/>
  <path  d="M 370 180 L 210 180" stroke="#6366f1" stroke-width="1.5" fill="none" marker-start="url(#arrowhead-start)"/>
  <text x="290" y="145" text-anchor="middle"  font-size="12px" fill="#6b7280" font-style="italic">JSON Schema (契约)</text>
  <text x="290" y="200" text-anchor="middle"  font-size="12px" fill="#6b7280" font-style="italic">Tool Call JSON</text>
  <text x="290" y="218" text-anchor="middle"  font-size="12px" fill="#6b7280" font-style="italic">Tool Result</text>

  <!-- Runtime <-> Tools -->
  <path  d="M 530 160 L 690 160" stroke="#6366f1" stroke-width="1.5" fill="none" marker-start="url(#arrowhead-start)"/>
  <path  d="M 690 180 L 530 180" stroke="#6366f1" stroke-width="1.5" fill="none" marker-start="url(#arrowhead-start)"/>
  <text x="610" y="145" text-anchor="middle"  font-size="12px" fill="#6b7280" font-style="italic">Function Call</text>
  <text x="610" y="200" text-anchor="middle"  font-size="12px" fill="#6b7280" font-style="italic">Function</text>
  <text x="610" y="218" text-anchor="middle"  font-size="12px" fill="#6b7280" font-style="italic">Return</text>

  <!-- Bottom note -->
  <g id="note">
    <rect x="50" y="310" width="800" height="25" rx="4" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
    <text x="450" y="330" text-anchor="middle"  font-style="italic" font-size="13px" fill="#374151">Tool Calling 的本质是一个精心设计的协议：LLM (决策) ◄─────► Runtime (调度) ◄─────► Tools (能力)</text>
  </g>
  <polygon points="370,160 362,163 362,157" fill="#6366f1"/>
  <polygon points="210,180 218,177 218,183" fill="#6366f1"/>
  <polygon points="690,160 682,163 682,157" fill="#6366f1"/>
  <polygon points="530,180 538,177 538,183" fill="#6366f1"/>
</svg>