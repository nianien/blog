<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" fill="none">
  <!-- Background -->
  <rect width="900" height="560" rx="8" fill="#FAFBFC"/>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="16" font-weight="600" fill="#1E293B">CDN 三层架构：边缘 → 中间层 → 源站</text>

  <!-- ==================== User Layer ==================== -->
  <rect x="50" y="55" width="800" height="80" rx="8" fill="#FFF7ED" stroke="#FB923C" stroke-width="1.5" stroke-dasharray="6 3"/>
  <text x="80" y="77" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="12" font-weight="600" fill="#EA580C">用户层</text>

  <rect x="100" y="85" width="90" height="36" rx="6" fill="#FFEDD5" stroke="#FB923C" stroke-width="1.5"/>
  <text x="145" y="108" text-anchor="middle" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="12" fill="#9A3412">用户 A</text>

  <rect x="230" y="85" width="90" height="36" rx="6" fill="#FFEDD5" stroke="#FB923C" stroke-width="1.5"/>
  <text x="275" y="108" text-anchor="middle" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="12" fill="#9A3412">用户 B</text>

  <rect x="360" y="85" width="90" height="36" rx="6" fill="#FFEDD5" stroke="#FB923C" stroke-width="1.5"/>
  <text x="405" y="108" text-anchor="middle" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="12" fill="#9A3412">用户 C</text>

  <rect x="490" y="85" width="90" height="36" rx="6" fill="#FFEDD5" stroke="#FB923C" stroke-width="1.5"/>
  <text x="535" y="108" text-anchor="middle" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="12" fill="#9A3412">用户 D</text>

  <rect x="620" y="85" width="90" height="36" rx="6" fill="#FFEDD5" stroke="#FB923C" stroke-width="1.5"/>
  <text x="665" y="108" text-anchor="middle" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="12" fill="#9A3412">用户 E</text>

  <!-- ==================== Users → GSLB (dashed, bus pattern) ==================== -->
  <!-- Each user drops a vertical dashed line to a shared horizontal bus at y=148 -->
  <line x1="145" y1="121" x2="145" y2="148" stroke="#9CA3AF" stroke-width="1" stroke-dasharray="4 2"/>
  <line x1="275" y1="121" x2="275" y2="148" stroke="#9CA3AF" stroke-width="1" stroke-dasharray="4 2"/>
  <line x1="405" y1="121" x2="405" y2="148" stroke="#9CA3AF" stroke-width="1" stroke-dasharray="4 2"/>
  <line x1="535" y1="121" x2="535" y2="148" stroke="#9CA3AF" stroke-width="1" stroke-dasharray="4 2"/>
  <line x1="665" y1="121" x2="665" y2="148" stroke="#9CA3AF" stroke-width="1" stroke-dasharray="4 2"/>
  <!-- Horizontal bus -->
  <line x1="145" y1="148" x2="665" y2="148" stroke="#9CA3AF" stroke-width="1" stroke-dasharray="4 2"/>
  <!-- Bus center drops to GSLB -->
  <line x1="450" y1="148" x2="450" y2="160" stroke="#9CA3AF" stroke-width="1" stroke-dasharray="4 2"/>

  <!-- ==================== GSLB ==================== -->
  <rect x="340" y="160" width="220" height="40" rx="6" fill="#F0FDF4" stroke="#22C55E" stroke-width="1.5"/>
  <text x="450" y="185" text-anchor="middle" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="13" font-weight="600" fill="#15803D">GSLB / 智能 DNS 调度</text>

  <!-- ==================== GSLB → Edge (vertical) ==================== -->
  <line x1="450" y1="200" x2="450" y2="225" stroke="#22C55E" stroke-width="1.5"/>
  <polygon points="445,223 455,223 450,230" fill="#22C55E"/>

  <!-- ==================== Edge Layer ==================== -->
  <rect x="50" y="230" width="800" height="90" rx="8" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.5" stroke-dasharray="6 3"/>
  <text x="80" y="252" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="12" font-weight="600" fill="#1D4ED8">L1 边缘层 (Edge PoP)</text>

  <!-- Edge nodes: centers at 170, 360, 550, 740 -->
  <rect x="100" y="265" width="140" height="40" rx="6" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="170" y="289" text-anchor="middle" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="12" fill="#1E40AF">北京边缘节点</text>

  <rect x="290" y="265" width="140" height="40" rx="6" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="360" y="289" text-anchor="middle" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="12" fill="#1E40AF">上海边缘节点</text>

  <rect x="480" y="265" width="140" height="40" rx="6" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="550" y="289" text-anchor="middle" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="12" fill="#1E40AF">广州边缘节点</text>

  <rect x="670" y="265" width="140" height="40" rx="6" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="740" y="289" text-anchor="middle" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="12" fill="#1E40AF">成都边缘节点</text>

  <!-- ==================== Edge → Mid (bus pattern, right-angle only) ==================== -->
  <!-- Group 1: 北京(170) + 上海(360) → 华北中间层(265) -->
  <!-- Vertical drops from edge box bottoms to bus at y=340 -->
  <line x1="170" y1="305" x2="170" y2="340" stroke="#6B7280" stroke-width="1.5"/>
  <line x1="360" y1="305" x2="360" y2="340" stroke="#6B7280" stroke-width="1.5"/>
  <!-- Horizontal bus connecting them -->
  <line x1="170" y1="340" x2="360" y2="340" stroke="#6B7280" stroke-width="1.5"/>
  <!-- Bus center (265) drops to 华北中间层 -->
  <line x1="265" y1="340" x2="265" y2="380" stroke="#6B7280" stroke-width="1.5"/>
  <polygon points="260,378 270,378 265,385" fill="#6B7280"/>

  <!-- MISS label for group 1 -->
  <text x="195" y="336" font-family="'SF Mono', 'Menlo', monospace" font-size="10" fill="#9CA3AF">MISS</text>

  <!-- Group 2: 广州(550) + 成都(740) → 华东中间层(645) -->
  <line x1="550" y1="305" x2="550" y2="340" stroke="#6B7280" stroke-width="1.5"/>
  <line x1="740" y1="305" x2="740" y2="340" stroke="#6B7280" stroke-width="1.5"/>
  <line x1="550" y1="340" x2="740" y2="340" stroke="#6B7280" stroke-width="1.5"/>
  <line x1="645" y1="340" x2="645" y2="380" stroke="#6B7280" stroke-width="1.5"/>
  <polygon points="640,378 650,378 645,385" fill="#6B7280"/>

  <!-- MISS label for group 2 -->
  <text x="575" y="336" font-family="'SF Mono', 'Menlo', monospace" font-size="10" fill="#9CA3AF">MISS</text>

  <!-- ==================== Mid Layer ==================== -->
  <rect x="130" y="385" width="650" height="80" rx="8" fill="#F5F3FF" stroke="#8B5CF6" stroke-width="1.5" stroke-dasharray="6 3"/>
  <text x="160" y="407" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="12" font-weight="600" fill="#6D28D9">L2 中间层 (Mid-Tier / Shield)</text>

  <!-- Mid nodes: centers at 265, 645 -->
  <rect x="185" y="418" width="160" height="36" rx="6" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="1.5"/>
  <text x="265" y="441" text-anchor="middle" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="12" fill="#5B21B6">华北中间层</text>

  <rect x="565" y="418" width="160" height="36" rx="6" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="1.5"/>
  <text x="645" y="441" text-anchor="middle" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="12" fill="#5B21B6">华东中间层</text>

  <rect x="385" y="418" width="60" height="36" rx="6" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="1.5"/>
  <text x="415" y="441" text-anchor="middle" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="12" fill="#5B21B6">...</text>

  <!-- ==================== Mid → Origin (bus pattern, right-angle only) ==================== -->
  <!-- Vertical drops from mid box bottoms to bus at y=478 -->
  <line x1="265" y1="454" x2="265" y2="478" stroke="#6B7280" stroke-width="1.5"/>
  <line x1="645" y1="454" x2="645" y2="478" stroke="#6B7280" stroke-width="1.5"/>
  <!-- Horizontal bus -->
  <line x1="265" y1="478" x2="645" y2="478" stroke="#6B7280" stroke-width="1.5"/>
  <!-- Bus center (450) drops to Origin -->
  <line x1="450" y1="478" x2="450" y2="498" stroke="#6B7280" stroke-width="1.5"/>
  <polygon points="445,496 455,496 450,503" fill="#6B7280"/>

  <!-- MISS label -->
  <text x="335" y="474" font-family="'SF Mono', 'Menlo', monospace" font-size="10" fill="#9CA3AF">MISS</text>

  <!-- ==================== Origin Layer ==================== -->
  <rect x="300" y="503" width="300" height="46" rx="8" fill="#FEF2F2" stroke="#EF4444" stroke-width="1.5" stroke-dasharray="6 3"/>
  <text x="320" y="522" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="12" font-weight="600" fill="#DC2626">源站 (Origin)</text>
  <text x="320" y="540" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="11" fill="#B91C1C">对象存储 / 应用服务器 / API</text>

  <!-- ==================== Legend ==================== -->
  <rect x="720" y="510" width="130" height="38" rx="4" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
  <text x="735" y="526" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="10" fill="#9CA3AF">MISS → 向上回源</text>
  <text x="735" y="541" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="10" fill="#9CA3AF">HIT → 直接返回</text>
</svg>