<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 200" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif">
  <defs>
    <linearGradient id="spectrumGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#90CAF9"/>
      <stop offset="50%" stop-color="#CE93D8"/>
      <stop offset="100%" stop-color="#EF9A9A"/>
    </linearGradient>
  </defs>

  <rect width="760" height="200" rx="12" fill="#fafafa" stroke="#e0e0e0" stroke-width="1.5"/>

  <!-- Spectrum bar as arrow shape (left arrow tip + bar + right arrow tip) -->
  <!-- Left arrowhead -->
  <polygon points="40,60 58,48 58,72" fill="#90CAF9"/>
  <!-- Main bar -->
  <rect x="58" y="50" width="644" height="20" rx="0" fill="url(#spectrumGrad)"/>
  <!-- Right arrowhead -->
  <polygon points="720,60 702,48 702,72" fill="#EF9A9A"/>

  <!-- Axis labels -->
  <text x="40" y="40" text-anchor="middle" font-size="12" font-weight="bold" fill="#1565C0">确定性</text>
  <text x="720" y="40" text-anchor="middle" font-size="12" font-weight="bold" fill="#C2185B">自主性</text>

  <!-- Dots and labels -->
  <!-- Pure LLM -->
  <circle cx="100" cy="60" r="9" fill="#1565C0" stroke="#fff" stroke-width="2.5"/>
  <text x="100" y="96" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">Pure LLM</text>
  <text x="100" y="112" text-anchor="middle" font-size="10" fill="#888">f(x)→y</text>

  <!-- System Prompt -->
  <circle cx="220" cy="60" r="9" fill="#3949AB" stroke="#fff" stroke-width="2.5"/>
  <text x="220" y="96" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">System</text>
  <text x="220" y="110" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">Prompt</text>
  <text x="220" y="126" text-anchor="middle" font-size="10" fill="#888">定制化对话</text>

  <!-- RAG -->
  <circle cx="340" cy="60" r="9" fill="#7B1FA2" stroke="#fff" stroke-width="2.5"/>
  <text x="340" y="96" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">RAG</text>
  <text x="340" y="112" text-anchor="middle" font-size="10" fill="#888">知识增强</text>

  <!-- Tool Calling -->
  <circle cx="460" cy="60" r="9" fill="#9C27B0" stroke="#fff" stroke-width="2.5"/>
  <text x="460" y="96" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">Tool</text>
  <text x="460" y="110" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">Calling</text>
  <text x="460" y="126" text-anchor="middle" font-size="10" fill="#888">函数调用</text>

  <!-- ReAct Agent -->
  <circle cx="580" cy="60" r="9" fill="#C2185B" stroke="#fff" stroke-width="2.5"/>
  <text x="580" y="96" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">ReAct</text>
  <text x="580" y="110" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">Agent</text>
  <text x="580" y="126" text-anchor="middle" font-size="10" fill="#888">推理+执行循环</text>

  <!-- Full Agent -->
  <circle cx="660" cy="60" r="9" fill="#B71C1C" stroke="#fff" stroke-width="2.5"/>
  <text x="660" y="96" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">Full</text>
  <text x="660" y="110" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">Agent</text>
  <text x="660" y="126" text-anchor="middle" font-size="10" fill="#888">完整系统</text>

  <!-- Bottom note -->
  <text x="380" y="164" text-anchor="middle" font-size="11" fill="#999">每向右移动一步，都在引入新的复杂性来换取新的能力</text>
</svg>
