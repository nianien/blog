<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 310" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif">

  <!-- Background -->
  <rect width="700" height="310" rx="12" fill="#fafafa" stroke="#e0e0e0" stroke-width="1.5"/>

  <!-- Title -->
  <text x="350" y="26" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">LLM + Tool Calling 执行过程：客服退货场景（2 轮交互）</text>

  <!-- ===== Round 1 ===== -->
  <rect x="30" y="42" width="310" height="120" rx="8" fill="#E3F2FD" stroke="#1976D2" stroke-width="1.5"/>
  <text x="185" y="60" text-anchor="middle" font-size="11" font-weight="bold" fill="#1565C0">第 1 轮：查询订单</text>
  <line x1="46" y1="68" x2="324" y2="68" stroke="#1976D2" stroke-width="0.5" opacity="0.4"/>

  <!-- User bubble -->
  <rect x="46" y="76" width="136" height="20" rx="10" fill="#fff" stroke="#90CAF9" stroke-width="1"/>
  <text x="114" y="90" text-anchor="middle" font-size="9" fill="#1565C0">用户：我要退货</text>

  <!-- Arrow user → LLM -->
  <line x1="182" y1="86" x2="198" y2="86" stroke="#999" stroke-width="1"/>
  <polygon points="195,82 204,86 195,90" fill="#999"/>

  <!-- LLM box -->
  <rect x="206" y="76" width="120" height="20" rx="10" fill="#FFF3E0" stroke="#F57C00" stroke-width="1"/>
  <text x="266" y="90" text-anchor="middle" font-size="9" fill="#E65100">LLM → query_order()</text>

  <!-- Tool return -->
  <text x="46" y="116" font-size="9" fill="#555">工具返回：iPhone 15 Pro, ¥8999, 已购 23 天</text>

  <!-- System reply -->
  <rect x="46" y="126" width="280" height="24" rx="6" fill="#E8F5E9" stroke="#388E3C" stroke-width="1"/>
  <text x="186" y="142" text-anchor="middle" font-size="9" fill="#2E7D32">回复：符合 30 天退货条件，请选择退款方式</text>

  <!-- Arrow Round1 → Round2 -->
  <line x1="340" y1="102" x2="358" y2="102" stroke="#999" stroke-width="1.2"/>
  <polygon points="355,98 364,102 355,106" fill="#999"/>

  <!-- ===== Round 2 ===== -->
  <rect x="366" y="42" width="310" height="120" rx="8" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="1.5"/>
  <text x="521" y="60" text-anchor="middle" font-size="11" font-weight="bold" fill="#6A1B9A">第 2 轮：处理退款</text>
  <line x1="382" y1="68" x2="660" y2="68" stroke="#7B1FA2" stroke-width="0.5" opacity="0.4"/>

  <!-- User bubble -->
  <rect x="382" y="76" width="130" height="20" rx="10" fill="#fff" stroke="#CE93D8" stroke-width="1"/>
  <text x="447" y="90" text-anchor="middle" font-size="9" fill="#6A1B9A">用户：原卡退款吧</text>

  <!-- Arrow user → LLM -->
  <line x1="512" y1="86" x2="528" y2="86" stroke="#999" stroke-width="1"/>
  <polygon points="525,82 534,86 525,90" fill="#999"/>

  <!-- LLM box -->
  <rect x="536" y="76" width="120" height="20" rx="10" fill="#FFF3E0" stroke="#F57C00" stroke-width="1"/>
  <text x="596" y="90" text-anchor="middle" font-size="9" fill="#E65100">LLM → process_refund()</text>

  <!-- Tool returns -->
  <text x="382" y="116" font-size="9" fill="#555">check_return_policy → 可退 → process_refund</text>

  <!-- System reply -->
  <rect x="382" y="126" width="280" height="24" rx="6" fill="#E8F5E9" stroke="#388E3C" stroke-width="1"/>
  <text x="522" y="142" text-anchor="middle" font-size="9" fill="#2E7D32">回复：退款单 REF-…001, ¥8999, 3-5 天到账</text>

  <!-- ===== Problems section ===== -->
  <line x1="50" y1="178" x2="650" y2="178" stroke="#eee" stroke-width="1"/>
  <text x="350" y="198" text-anchor="middle" font-size="11" font-weight="bold" fill="#C62828">问题</text>

  <!-- Problem cards -->
  <rect x="30" y="210" width="200" height="44" rx="6" fill="#FFF" stroke="#EF9A9A" stroke-width="1"/>
  <text x="130" y="228" text-anchor="middle" font-size="9" fill="#C62828" font-weight="bold">被动等待</text>
  <text x="130" y="244" text-anchor="middle" font-size="8.5" fill="#777">每步都需用户等待和输入</text>

  <rect x="250" y="210" width="200" height="44" rx="6" fill="#FFF" stroke="#EF9A9A" stroke-width="1"/>
  <text x="350" y="228" text-anchor="middle" font-size="9" fill="#C62828" font-weight="bold">无法自适应</text>
  <text x="350" y="244" text-anchor="middle" font-size="8.5" fill="#777">超期时无法自动调整策略</text>

  <rect x="470" y="210" width="200" height="44" rx="6" fill="#FFF" stroke="#EF9A9A" stroke-width="1"/>
  <text x="570" y="228" text-anchor="middle" font-size="9" fill="#C62828" font-weight="bold">多轮交互</text>
  <text x="570" y="244" text-anchor="middle" font-size="8.5" fill="#777">总共需要 2 轮用户消息</text>

  <!-- Bottom stats -->
  <rect x="130" y="274" width="100" height="22" rx="6" fill="#E3F2FD"/>
  <text x="180" y="289" text-anchor="middle" font-size="9" fill="#1565C0">2 次 LLM 调用</text>

  <rect x="250" y="274" width="100" height="22" rx="6" fill="#FFF3E0"/>
  <text x="300" y="289" text-anchor="middle" font-size="9" fill="#E65100">1-2 次工具调用</text>

  <rect x="370" y="274" width="100" height="22" rx="6" fill="#FCE4EC"/>
  <text x="420" y="289" text-anchor="middle" font-size="9" fill="#C2185B">2 轮用户交互</text>

  <rect x="490" y="274" width="100" height="22" rx="6" fill="#E8F5E9"/>
  <text x="540" y="289" text-anchor="middle" font-size="9" fill="#2E7D32">成功率 ~60%</text>
</svg>
