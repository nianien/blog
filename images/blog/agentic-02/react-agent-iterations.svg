<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 340" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif">

  <!-- Background -->
  <rect width="700" height="340" rx="12" fill="#fafafa" stroke="#e0e0e0" stroke-width="1.5"/>

  <!-- Title -->
  <text x="350" y="28" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">ReAct Agent 执行过程：客服退货场景（3 轮迭代）</text>

  <!-- User input -->
  <rect x="250" y="44" width="200" height="28" rx="14" fill="#E3F2FD" stroke="#1976D2" stroke-width="1.2"/>
  <text x="350" y="63" text-anchor="middle" font-size="10" font-weight="bold" fill="#1565C0">用户：我要退货 ORD-2025-0001</text>

  <!-- Arrow down from user to iteration 1 area -->
  <line x1="350" y1="72" x2="350" y2="90" stroke="#999" stroke-width="1.2"/>
  <polygon points="346,87 350,95 354,87" fill="#999"/>

  <!-- Iteration 1 -->
  <rect x="30" y="98" width="200" height="100" rx="8" fill="#FFF3E0" stroke="#F57C00" stroke-width="1.5"/>
  <text x="130" y="118" text-anchor="middle" font-size="11" font-weight="bold" fill="#E65100">迭代 1：查询订单</text>
  <line x1="50" y1="126" x2="210" y2="126" stroke="#F57C00" stroke-width="0.5" opacity="0.4"/>
  <text x="46" y="142" font-size="9" fill="#555">Observe  用户要退货</text>
  <text x="46" y="156" font-size="9" fill="#555">Think    需要先查订单详情</text>
  <text x="46" y="170" font-size="9" fill="#7B1FA2" font-weight="bold">Act      query_order()</text>
  <text x="46" y="184" font-size="9" fill="#2E7D32">Reflect  已过 52 天，可能超期</text>

  <!-- Arrow 1→2 -->
  <line x1="230" y1="148" x2="248" y2="148" stroke="#999" stroke-width="1.2"/>
  <polygon points="245,144 254,148 245,152" fill="#999"/>

  <!-- Iteration 2 -->
  <rect x="256" y="98" width="200" height="100" rx="8" fill="#E8F5E9" stroke="#388E3C" stroke-width="1.5"/>
  <text x="356" y="118" text-anchor="middle" font-size="11" font-weight="bold" fill="#2E7D32">迭代 2：检查退货政策</text>
  <line x1="276" y1="126" x2="436" y2="126" stroke="#388E3C" stroke-width="0.5" opacity="0.4"/>
  <text x="272" y="142" font-size="9" fill="#555">Observe  订单已查到</text>
  <text x="272" y="156" font-size="9" fill="#555">Think    需要核实退货政策</text>
  <text x="272" y="170" font-size="9" fill="#7B1FA2" font-weight="bold">Act      check_return_policy()</text>
  <text x="272" y="184" font-size="9" fill="#C62828">Reflect  已超 30 天，不可退</text>

  <!-- Arrow 2→3 -->
  <line x1="456" y1="148" x2="474" y2="148" stroke="#999" stroke-width="1.2"/>
  <polygon points="471,144 480,148 471,152" fill="#999"/>

  <!-- Iteration 3 -->
  <rect x="482" y="98" width="200" height="100" rx="8" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="1.5"/>
  <text x="582" y="118" text-anchor="middle" font-size="11" font-weight="bold" fill="#6A1B9A">迭代 3：生成替代方案</text>
  <line x1="502" y1="126" x2="662" y2="126" stroke="#7B1FA2" stroke-width="0.5" opacity="0.4"/>
  <text x="498" y="142" font-size="9" fill="#555">Observe  标准退货不可用</text>
  <text x="498" y="156" font-size="9" fill="#555">Think    应提供替代选项</text>
  <text x="498" y="170" font-size="9" fill="#7B1FA2" font-weight="bold">Act      生成友好回复</text>
  <text x="498" y="184" font-size="9" fill="#2E7D32">Reflect  给出选择权</text>

  <!-- Arrow down from iteration 3 to final output: vertical solid line -->
  <line x1="356" y1="198" x2="356" y2="232" stroke="#999" stroke-width="1.2"/>
  <polygon points="352,229 356,237 360,229" fill="#999"/>

  <!-- Final output box (full width, centered under all 3 iterations) -->
  <rect x="30" y="240" width="652" height="50" rx="8" fill="#E3F2FD" stroke="#1976D2" stroke-width="1.5"/>
  <text x="356" y="260" text-anchor="middle" font-size="11" font-weight="bold" fill="#1565C0">最终回复（一次返回给用户）</text>
  <text x="356" y="278" text-anchor="middle" font-size="9" fill="#555">超出退货期 → 提供 3 个替代方案（维修/换货、申诉、争议解决）</text>

  <!-- Bottom stats -->
  <rect x="80" y="304" width="120" height="22" rx="6" fill="#FFF3E0"/>
  <text x="140" y="319" text-anchor="middle" font-size="9" fill="#E65100">4-5 次 LLM 调用</text>

  <rect x="220" y="304" width="120" height="22" rx="6" fill="#E8F5E9"/>
  <text x="280" y="319" text-anchor="middle" font-size="9" fill="#2E7D32">仅 1 轮用户交互</text>

  <rect x="360" y="304" width="120" height="22" rx="6" fill="#F3E5F5"/>
  <text x="420" y="319" text-anchor="middle" font-size="9" fill="#7B1FA2">自主决策 + 反思</text>

  <rect x="500" y="304" width="120" height="22" rx="6" fill="#E3F2FD"/>
  <text x="560" y="319" text-anchor="middle" font-size="9" fill="#1565C0">成功率 95%+</text>
</svg>
