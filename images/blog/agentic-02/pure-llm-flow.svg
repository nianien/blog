<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 330" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif">

  <!-- Background -->
  <rect width="700" height="330" rx="12" fill="#fafafa" stroke="#e0e0e0" stroke-width="1.5"/>

  <!-- Title -->
  <text x="350" y="26" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">Pure LLM 执行过程：客服退货场景（1 次调用）</text>

  <!-- Main flow area -->
  <rect x="100" y="42" width="500" height="110" rx="8" fill="#E3F2FD" stroke="#1976D2" stroke-width="1.5"/>
  <text x="350" y="60" text-anchor="middle" font-size="11" font-weight="bold" fill="#1565C0">单次 LLM 调用（无工具、无记忆）</text>
  <line x1="116" y1="68" x2="584" y2="68" stroke="#1976D2" stroke-width="0.5" opacity="0.4"/>

  <!-- User bubble -->
  <rect x="116" y="76" width="200" height="24" rx="12" fill="#fff" stroke="#90CAF9" stroke-width="1"/>
  <text x="216" y="92" text-anchor="middle" font-size="9.5" fill="#1565C0">用户：我要退货，订单号 ORD-…0001</text>

  <!-- Arrow user → LLM -->
  <line x1="316" y1="88" x2="340" y2="88" stroke="#999" stroke-width="1.2"/>
  <polygon points="337,84 346,88 337,92" fill="#999"/>

  <!-- LLM box -->
  <rect x="348" y="76" width="120" height="24" rx="12" fill="#FFF3E0" stroke="#F57C00" stroke-width="1"/>
  <text x="408" y="92" text-anchor="middle" font-size="9.5" fill="#E65100">LLM 直接生成回复</text>

  <!-- Arrow down to output -->
  <line x1="350" y1="108" x2="350" y2="118" stroke="#999" stroke-width="1.2"/>
  <polygon points="346,116 350,124 354,116" fill="#999"/>

  <!-- System reply -->
  <rect x="116" y="126" width="468" height="18" rx="6" fill="#E8F5E9" stroke="#388E3C" stroke-width="1"/>
  <text x="350" y="139" text-anchor="middle" font-size="9" fill="#2E7D32">回复："订单应该符合退货条件，您可以在 7 天内申请退货…"</text>

  <!-- Problems section -->
  <line x1="50" y1="168" x2="650" y2="168" stroke="#eee" stroke-width="1"/>
  <text x="350" y="186" text-anchor="middle" font-size="11" font-weight="bold" fill="#C62828">问题</text>

  <!-- Problem cards — 2×2 grid -->
  <rect x="30" y="196" width="310" height="36" rx="6" fill="#FFF" stroke="#EF9A9A" stroke-width="1"/>
  <text x="185" y="211" text-anchor="middle" font-size="9" fill="#C62828" font-weight="bold">没有实际查询订单</text>
  <text x="185" y="225" text-anchor="middle" font-size="8.5" fill="#777">回复全是"应该"，没有调用任何数据源</text>

  <rect x="360" y="196" width="310" height="36" rx="6" fill="#FFF" stroke="#EF9A9A" stroke-width="1"/>
  <text x="515" y="211" text-anchor="middle" font-size="9" fill="#C62828" font-weight="bold">退货期限凭空编造</text>
  <text x="515" y="225" text-anchor="middle" font-size="8.5" fill="#777">说"7 天"，实际政策是 30 天 — 典型幻觉</text>

  <rect x="30" y="240" width="310" height="36" rx="6" fill="#FFF" stroke="#EF9A9A" stroke-width="1"/>
  <text x="185" y="255" text-anchor="middle" font-size="9" fill="#C62828" font-weight="bold">无法识别异常状态</text>
  <text x="185" y="269" text-anchor="middle" font-size="8.5" fill="#777">订单已退、权限不足等情况完全无感知</text>

  <rect x="360" y="240" width="310" height="36" rx="6" fill="#FFF" stroke="#EF9A9A" stroke-width="1"/>
  <text x="515" y="255" text-anchor="middle" font-size="9" fill="#C62828" font-weight="bold">用户体验差</text>
  <text x="515" y="269" text-anchor="middle" font-size="8.5" fill="#777">用户下一句可能是"我刚才不是问你这个吗？"</text>

  <!-- Bottom stats -->
  <rect x="120" y="294" width="100" height="22" rx="6" fill="#E3F2FD"/>
  <text x="170" y="309" text-anchor="middle" font-size="9" fill="#1565C0">1 次调用</text>

  <rect x="236" y="294" width="100" height="22" rx="6" fill="#FFF3E0"/>
  <text x="286" y="309" text-anchor="middle" font-size="9" fill="#E65100">0 次工具</text>

  <rect x="352" y="294" width="100" height="22" rx="6" fill="#FCE4EC"/>
  <text x="402" y="309" text-anchor="middle" font-size="9" fill="#C2185B">成功率 ~20%</text>

  <rect x="468" y="294" width="100" height="22" rx="6" fill="#FBE9E7"/>
  <text x="518" y="309" text-anchor="middle" font-size="9" fill="#BF360C">80% 需人工</text>
</svg>
