<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 580" font-family="-apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,3 L0,6 Z" fill="#999"/>
    </marker>
  </defs>

  <rect width="820" height="580" rx="12" fill="#fafafa" stroke="#e0e0e0" stroke-width="1.5"/>
  <text x="410" y="32" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">Workflow 框架选型决策树</text>

  <!-- ═══ Level 0: Root ═══ -->
  <rect x="295" y="50" width="230" height="36" rx="8" fill="#333"/>
  <text x="410" y="73" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">选择 Workflow 框架</text>

  <!-- ═══ Level 1: AWS Only? ═══ -->
  <line x1="410" y1="86" x2="410" y2="108" stroke="#999" stroke-width="1.5" marker-end="url(#arr)"/>
  <polygon points="410,115 500,145 410,175 320,145" fill="#E3F2FD" stroke="#1976D2" stroke-width="1.5"/>
  <text x="410" y="142" text-anchor="middle" font-size="11" font-weight="bold" fill="#1565C0">AWS Only</text>
  <text x="410" y="156" text-anchor="middle" font-size="11" font-weight="bold" fill="#1565C0">环境？</text>

  <!-- Yes → Step Functions (leaf) -->
  <line x1="500" y1="145" x2="680" y2="145" stroke="#4CAF50" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="545" y="138" font-size="10" font-weight="bold" fill="#4CAF50">Yes</text>
  <rect x="685" y="128" width="120" height="34" rx="6" fill="#E8F5E9" stroke="#4CAF50" stroke-width="1.5"/>
  <text x="745" y="148" text-anchor="middle" font-size="11" font-weight="bold" fill="#2E7D32">Step Functions</text>
  <text x="745" y="118" text-anchor="middle" font-size="9" fill="#888">简单，无运维</text>

  <!-- No ↓ -->
  <line x1="410" y1="175" x2="410" y2="198" stroke="#F44336" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="420" y="192" font-size="10" font-weight="bold" fill="#F44336">No</text>

  <!-- ═══ Level 2: 工作流长度? ═══ -->
  <polygon points="410,205 510,240 410,275 310,240" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="1.5"/>
  <text x="410" y="237" text-anchor="middle" font-size="11" font-weight="bold" fill="#6A1B9A">工作流</text>
  <text x="410" y="251" text-anchor="middle" font-size="11" font-weight="bold" fill="#6A1B9A">长度？</text>

  <!-- 秒级 → 不需要 Workflow -->
  <line x1="310" y1="240" x2="100" y2="240" stroke="#FF9800" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="250" y="233" font-size="10" font-weight="bold" fill="#FF9800">秒级</text>
  <rect x="5" y="224" width="90" height="34" rx="6" fill="#FFF3E0" stroke="#FF9800" stroke-width="1.5"/>
  <text x="50" y="238" text-anchor="middle" font-size="10" font-weight="bold" fill="#E65100">可能不需要</text>
  <text x="50" y="250" text-anchor="middle" font-size="10" font-weight="bold" fill="#E65100">Workflow</text>

  <!-- 天级 → Temporal -->
  <line x1="510" y1="240" x2="680" y2="240" stroke="#7B1FA2" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="555" y="233" font-size="10" font-weight="bold" fill="#7B1FA2">天级/跨周期</text>
  <rect x="685" y="224" width="110" height="34" rx="6" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="1.5"/>
  <text x="740" y="245" text-anchor="middle" font-size="12" font-weight="bold" fill="#6A1B9A">Temporal</text>

  <!-- 分钟/小时级 ↓ -->
  <line x1="410" y1="275" x2="410" y2="298" stroke="#666" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="430" y="292" font-size="10" fill="#666">分钟/小时级</text>

  <!-- ═══ Level 3: 团队技术栈? ═══ -->
  <polygon points="410,305 500,335 410,365 320,335" fill="#E0F2F1" stroke="#00796B" stroke-width="1.5"/>
  <text x="410" y="332" text-anchor="middle" font-size="11" font-weight="bold" fill="#00695C">团队</text>
  <text x="410" y="346" text-anchor="middle" font-size="11" font-weight="bold" fill="#00695C">技术栈？</text>

  <!-- 多语言 → Temporal or Airflow -->
  <line x1="500" y1="335" x2="620" y2="335" stroke="#00796B" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="545" y="328" font-size="10" font-weight="bold" fill="#00796B">多语言</text>
  <rect x="625" y="316" width="180" height="38" rx="6" fill="#E0F2F1" stroke="#00796B" stroke-width="1.5"/>
  <text x="715" y="332" text-anchor="middle" font-size="11" font-weight="bold" fill="#004D40">Temporal / Airflow</text>
  <text x="715" y="346" text-anchor="middle" font-size="9" fill="#00796B">Go, Java 等多语言支持</text>

  <!-- Python-first ↓ -->
  <line x1="410" y1="365" x2="410" y2="390" stroke="#666" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="430" y="383" font-size="10" fill="#666">Python-first</text>

  <!-- ═══ Level 4: 运维能力? ═══ -->
  <polygon points="410,398 500,428 410,458 320,428" fill="#FFEBEE" stroke="#C62828" stroke-width="1.5"/>
  <text x="410" y="425" text-anchor="middle" font-size="11" font-weight="bold" fill="#B71C1C">运维</text>
  <text x="410" y="439" text-anchor="middle" font-size="11" font-weight="bold" fill="#B71C1C">能力？</text>

  <!-- 低 → Step Functions -->
  <line x1="320" y1="428" x2="155" y2="428" stroke="#C62828" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="235" y="421" font-size="10" font-weight="bold" fill="#C62828">低</text>
  <rect x="30" y="411" width="120" height="34" rx="6" fill="#FFEBEE" stroke="#C62828" stroke-width="1.5"/>
  <text x="90" y="432" text-anchor="middle" font-size="11" font-weight="bold" fill="#B71C1C">Step Functions</text>
  <text x="90" y="403" text-anchor="middle" font-size="9" fill="#888">不想自建</text>

  <!-- 高 → Temporal -->
  <line x1="500" y1="428" x2="620" y2="428" stroke="#C62828" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="545" y="421" font-size="10" font-weight="bold" fill="#C62828">高</text>
  <rect x="625" y="412" width="120" height="34" rx="6" fill="#FFEBEE" stroke="#C62828" stroke-width="1.5"/>
  <text x="685" y="433" text-anchor="middle" font-size="11" font-weight="bold" fill="#B71C1C">Temporal</text>
  <text x="685" y="404" text-anchor="middle" font-size="9" fill="#888">可靠性要求极高</text>

  <!-- 中等 ↓ -->
  <line x1="410" y1="458" x2="410" y2="490" stroke="#666" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="430" y="480" font-size="10" fill="#666">中等</text>

  <!-- ═══ Final Leaves ═══ -->

  <!-- 中等运维 → Prefect vs Airflow -->
  <rect x="290" y="495" width="240" height="70" rx="8" fill="#fff" stroke="#FF9800" stroke-width="2"/>
  <text x="410" y="520" text-anchor="middle" font-size="13" font-weight="bold" fill="#E65100">Prefect 或 Airflow</text>
  <text x="410" y="540" text-anchor="middle" font-size="10" fill="#888">Prefect 更现代，Airflow 生态更成熟</text>
  <text x="410" y="554" text-anchor="middle" font-size="10" fill="#888">覆盖 80% 中小团队场景</text>
</svg>
