<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" font-family="-apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="10" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,3 L0,6 Z" fill="#666"/>
    </marker>
  </defs>

  <rect width="700" height="400" rx="12" fill="#fafafa" stroke="#e0e0e0" stroke-width="1.5"/>
  <text x="350" y="32" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">混合架构全景</text>

  <!-- Outer frame: Workflow / DAG -->
  <rect x="40" y="50" width="620" height="250" rx="10" fill="#F5F5F5" stroke="#9E9E9E" stroke-width="1.5"/>
  <text x="350" y="75" text-anchor="middle" font-size="14" font-weight="bold" fill="#555">Workflow / DAG（骨架层）</text>

  <!-- Step 1: Automation -->
  <rect x="80" y="100" width="160" height="70" rx="8" fill="#FFF3E0" stroke="#F57C00" stroke-width="1.5"/>
  <text x="160" y="120" text-anchor="middle" font-size="13" font-weight="bold" fill="#E65100">Automation</text>
  <text x="160" y="138" text-anchor="middle" font-size="11" fill="#E65100">数据预处理</text>
  <text x="80" y="96" font-size="10" fill="#999">Step 1</text>

  <!-- Step 2: Agent -->
  <rect x="270" y="100" width="160" height="70" rx="8" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="1.5"/>
  <text x="350" y="120" text-anchor="middle" font-size="13" font-weight="bold" fill="#6A1B9A">Agent</text>
  <text x="350" y="138" text-anchor="middle" font-size="11" fill="#6A1B9A">语义分析</text>
  <text x="270" y="96" font-size="10" fill="#999">Step 2</text>

  <!-- Step 3: Automation -->
  <rect x="460" y="100" width="160" height="70" rx="8" fill="#FFF3E0" stroke="#F57C00" stroke-width="1.5"/>
  <text x="540" y="120" text-anchor="middle" font-size="13" font-weight="bold" fill="#E65100">Automation</text>
  <text x="540" y="138" text-anchor="middle" font-size="11" fill="#E65100">结果写入</text>
  <text x="460" y="96" font-size="10" fill="#999">Step 3</text>

  <!-- Arrows between steps -->
  <line x1="240" y1="135" x2="268" y2="135" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="430" y1="135" x2="458" y2="135" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Metrics row -->
  <line x1="160" y1="170" x2="160" y2="195" stroke="#ccc" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="350" y1="170" x2="350" y2="195" stroke="#ccc" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="540" y1="170" x2="540" y2="195" stroke="#ccc" stroke-width="1" stroke-dasharray="3,3"/>

  <text x="160" y="210" text-anchor="middle" font-size="11" fill="#888">确定性操作</text>
  <text x="160" y="228" text-anchor="middle" font-size="11" fill="#4CAF50" font-weight="bold">延迟: 10ms</text>
  <text x="160" y="244" text-anchor="middle" font-size="11" fill="#4CAF50" font-weight="bold">成本: ~0</text>

  <text x="350" y="210" text-anchor="middle" font-size="11" fill="#888">LLM 推理</text>
  <text x="350" y="228" text-anchor="middle" font-size="11" fill="#FF9800" font-weight="bold">延迟: 2-5s</text>
  <text x="350" y="244" text-anchor="middle" font-size="11" fill="#FF9800" font-weight="bold">成本: $0.02</text>

  <text x="540" y="210" text-anchor="middle" font-size="11" fill="#888">确定性操作</text>
  <text x="540" y="228" text-anchor="middle" font-size="11" fill="#4CAF50" font-weight="bold">延迟: 50ms</text>
  <text x="540" y="244" text-anchor="middle" font-size="11" fill="#4CAF50" font-weight="bold">成本: ~0</text>

  <!-- Design principles -->
  <text x="60" y="330" font-size="11" fill="#666" font-weight="bold">设计原则：</text>
  <text x="60" y="348" font-size="11" fill="#888">1. Workflow 负责编排和容错（重试、超时、补偿）</text>
  <text x="60" y="364" font-size="11" fill="#888">2. Automation 处理所有确定性步骤</text>
  <text x="370" y="348" font-size="11" fill="#888">3. Agent 只出现在需要"理解"和"推理"的节点</text>
  <text x="370" y="364" font-size="11" fill="#888">4. Agent 的输出经过验证后才进入下一步</text>
</svg>
