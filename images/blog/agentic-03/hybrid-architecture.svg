<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 380" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif">
  <text x="350" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#1F2937">混合架构全景</text>

  <!-- Outer frame: Workflow -->
  <rect x="40" y="46" width="620" height="240" rx="8" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1.5"/>
  <text x="350" y="70" text-anchor="middle" font-size="14" font-weight="bold" fill="#64748B">Workflow / DAG（骨架层）</text>

  <!-- Step 1: Automation -->
  <rect x="70" y="90" width="160" height="65" rx="8" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="150" y="113" text-anchor="middle" font-size="13" font-weight="bold" fill="#92400E">Automation</text>
  <text x="150" y="131" text-anchor="middle" font-size="11" fill="#B45309">数据预处理</text>
  <text x="70" y="86" font-size="10" fill="#94A3B8">Step 1</text>

  <!-- Arrow 1→2 -->
  <line x1="230" y1="122" x2="268" y2="122" stroke="#64748B" stroke-width="1.5"/>
  <polygon points="266,118 272,122 266,126" fill="#64748B"/>

  <!-- Step 2: Agent -->
  <rect x="270" y="90" width="160" height="65" rx="8" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="1.5"/>
  <text x="350" y="113" text-anchor="middle" font-size="13" font-weight="bold" fill="#6D28D9">Agent</text>
  <text x="350" y="131" text-anchor="middle" font-size="11" fill="#7C3AED">语义分析</text>
  <text x="270" y="86" font-size="10" fill="#94A3B8">Step 2</text>

  <!-- Arrow 2→3 -->
  <line x1="430" y1="122" x2="468" y2="122" stroke="#64748B" stroke-width="1.5"/>
  <polygon points="466,118 472,122 466,126" fill="#64748B"/>

  <!-- Step 3: Automation -->
  <rect x="470" y="90" width="160" height="65" rx="8" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="550" y="113" text-anchor="middle" font-size="13" font-weight="bold" fill="#92400E">Automation</text>
  <text x="550" y="131" text-anchor="middle" font-size="11" fill="#B45309">结果写入</text>
  <text x="470" y="86" font-size="10" fill="#94A3B8">Step 3</text>

  <!-- Metrics -->
  <line x1="150" y1="155" x2="150" y2="180" stroke="#CBD5E1" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="350" y1="155" x2="350" y2="180" stroke="#CBD5E1" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="550" y1="155" x2="550" y2="180" stroke="#CBD5E1" stroke-width="1" stroke-dasharray="3,3"/>

  <text x="150" y="196" text-anchor="middle" font-size="11" fill="#94A3B8">确定性操作</text>
  <text x="150" y="214" text-anchor="middle" font-size="11" fill="#22C55E" font-weight="bold">延迟: 10ms</text>
  <text x="150" y="230" text-anchor="middle" font-size="11" fill="#22C55E" font-weight="bold">成本: ~0</text>

  <text x="350" y="196" text-anchor="middle" font-size="11" fill="#94A3B8">LLM 推理</text>
  <text x="350" y="214" text-anchor="middle" font-size="11" fill="#F59E0B" font-weight="bold">延迟: 2-5s</text>
  <text x="350" y="230" text-anchor="middle" font-size="11" fill="#F59E0B" font-weight="bold">成本: $0.02</text>

  <text x="550" y="196" text-anchor="middle" font-size="11" fill="#94A3B8">确定性操作</text>
  <text x="550" y="214" text-anchor="middle" font-size="11" fill="#22C55E" font-weight="bold">延迟: 50ms</text>
  <text x="550" y="230" text-anchor="middle" font-size="11" fill="#22C55E" font-weight="bold">成本: ~0</text>

  <!-- Design principles -->
  <text x="55" y="314" font-size="11" fill="#475569" font-weight="bold">设计原则：</text>
  <text x="55" y="332" font-size="11" fill="#64748B">1. Workflow 负责编排和容错（重试、超时、补偿）</text>
  <text x="55" y="350" font-size="11" fill="#64748B">2. Automation 处理所有确定性步骤</text>
  <text x="370" y="332" font-size="11" fill="#64748B">3. Agent 只出现在需要推理的节点</text>
  <text x="370" y="350" font-size="11" fill="#64748B">4. Agent 的输出经过验证后才进入下一步</text>
</svg>
