<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 580" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif">
  <text x="360" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#1F2937">模式选型决策树</text>

  <!-- ===== Q1: 需要推理? (center: 360) ===== -->
  <polygon points="360,50 480,95 360,140 240,95" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="360" y="90" text-anchor="middle" font-size="11" font-weight="bold" fill="#1E40AF">任务需要理解</text>
  <text x="360" y="103" text-anchor="middle" font-size="11" font-weight="bold" fill="#1E40AF">自然语言或动态推理?</text>

  <!-- Q1 → No (left, center: 150) -->
  <line x1="240" y1="95" x2="150" y2="95" stroke="#64748B" stroke-width="1.5"/>
  <line x1="150" y1="95" x2="150" y2="165" stroke="#64748B" stroke-width="1.5"/>
  <polygon points="146,163 150,169 154,163" fill="#64748B"/>
  <text x="210" y="88" font-size="12" font-weight="bold" fill="#EF4444">No</text>

  <!-- Q1 → Yes (right, center: 530) -->
  <line x1="480" y1="95" x2="530" y2="95" stroke="#64748B" stroke-width="1.5"/>
  <line x1="530" y1="95" x2="530" y2="165" stroke="#64748B" stroke-width="1.5"/>
  <polygon points="526,163 530,169 534,163" fill="#64748B"/>
  <text x="510" y="88" font-size="12" font-weight="bold" fill="#22C55E">Yes</text>

  <!-- ===== Left: Q2 步骤有复杂依赖? (center: 150) ===== -->
  <polygon points="150,173 220,205 150,237 80,205" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="1.5"/>
  <text x="150" y="201" text-anchor="middle" font-size="11" font-weight="bold" fill="#6D28D9">步骤有</text>
  <text x="150" y="214" text-anchor="middle" font-size="11" font-weight="bold" fill="#6D28D9">复杂依赖?</text>

  <!-- Q2 Yes → Workflow (center: 60) -->
  <line x1="80" y1="205" x2="60" y2="205" stroke="#64748B" stroke-width="1.5"/>
  <line x1="60" y1="205" x2="60" y2="265" stroke="#64748B" stroke-width="1.5"/>
  <polygon points="56,263 60,269 64,263" fill="#64748B"/>
  <text x="65" y="198" font-size="11" font-weight="bold" fill="#22C55E">Yes</text>

  <rect x="10" y="273" width="100" height="40" rx="6" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="60" y="298" text-anchor="middle" font-size="13" font-weight="bold" fill="#1E40AF">Workflow</text>

  <!-- Q2 No → Automation (center: 250) -->
  <line x1="220" y1="205" x2="250" y2="205" stroke="#64748B" stroke-width="1.5"/>
  <line x1="250" y1="205" x2="250" y2="265" stroke="#64748B" stroke-width="1.5"/>
  <polygon points="246,263 250,269 254,263" fill="#64748B"/>
  <text x="240" y="198" font-size="11" font-weight="bold" fill="#EF4444">No</text>

  <rect x="190" y="273" width="120" height="40" rx="6" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="250" y="298" text-anchor="middle" font-size="13" font-weight="bold" fill="#92400E">Automation</text>

  <!-- ===== Right: Q3 部分需要100%确定性? (center: 530) ===== -->
  <polygon points="530,173 610,205 530,237 450,205" fill="#F0FDF4" stroke="#22C55E" stroke-width="1.5"/>
  <text x="530" y="201" text-anchor="middle" font-size="11" font-weight="bold" fill="#166534">部分步骤需要</text>
  <text x="530" y="214" text-anchor="middle" font-size="11" font-weight="bold" fill="#166534">100%确定性?</text>

  <!-- Q3 Yes → 混合架构 (center: 660) -->
  <line x1="610" y1="205" x2="660" y2="205" stroke="#64748B" stroke-width="1.5"/>
  <line x1="660" y1="205" x2="660" y2="265" stroke="#64748B" stroke-width="1.5"/>
  <polygon points="656,263 660,269 664,263" fill="#64748B"/>
  <text x="640" y="198" font-size="11" font-weight="bold" fill="#22C55E">Yes</text>

  <rect x="605" y="273" width="110" height="40" rx="6" fill="#F0FDF4" stroke="#22C55E" stroke-width="1.5"/>
  <text x="660" y="298" text-anchor="middle" font-size="13" font-weight="bold" fill="#166534">混合架构</text>

  <!-- Q3 No → Q4 (center: 480) -->
  <line x1="530" y1="237" x2="530" y2="255" stroke="#64748B" stroke-width="1.5"/>
  <line x1="530" y1="255" x2="480" y2="255" stroke="#64748B" stroke-width="1.5"/>
  <line x1="480" y1="255" x2="480" y2="305" stroke="#64748B" stroke-width="1.5"/>
  <polygon points="476,303 480,309 484,303" fill="#64748B"/>
  <text x="510" y="250" font-size="11" font-weight="bold" fill="#EF4444">No</text>

  <!-- ===== Q4: 可以接受 $0.01-0.10/次? (center: 480) ===== -->
  <polygon points="480,313 565,350 480,387 395,350" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="480" y="346" text-anchor="middle" font-size="11" font-weight="bold" fill="#92400E">可以接受</text>
  <text x="480" y="359" text-anchor="middle" font-size="11" font-weight="bold" fill="#92400E">$0.01-0.10/次?</text>

  <!-- Q4 Yes → Agent (center: 380) -->
  <line x1="395" y1="350" x2="380" y2="350" stroke="#64748B" stroke-width="1.5"/>
  <line x1="380" y1="350" x2="380" y2="410" stroke="#64748B" stroke-width="1.5"/>
  <polygon points="376,408 380,414 384,408" fill="#64748B"/>
  <text x="383" y="343" font-size="11" font-weight="bold" fill="#22C55E">Yes</text>

  <rect x="325" y="418" width="110" height="40" rx="6" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="1.5"/>
  <text x="380" y="443" text-anchor="middle" font-size="13" font-weight="bold" fill="#6D28D9">Agent</text>

  <!-- Q4 No → 重新审视 (center: 600) -->
  <line x1="565" y1="350" x2="600" y2="350" stroke="#64748B" stroke-width="1.5"/>
  <line x1="600" y1="350" x2="600" y2="410" stroke="#64748B" stroke-width="1.5"/>
  <polygon points="596,408 600,414 604,408" fill="#64748B"/>
  <text x="588" y="343" font-size="11" font-weight="bold" fill="#EF4444">No</text>

  <rect x="535" y="418" width="130" height="48" rx="6" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1.5"/>
  <text x="600" y="440" text-anchor="middle" font-size="12" fill="#475569">重新审视需求</text>
  <text x="600" y="455" text-anchor="middle" font-size="10" fill="#64748B">拆分确定性+模糊性</text>

  <!-- ===== 速查 ===== -->
  <line x1="30" y1="490" x2="690" y2="490" stroke="#E2E8F0" stroke-width="1"/>
  <text x="360" y="512" text-anchor="middle" font-size="13" font-weight="bold" fill="#1F2937">速查</text>

  <rect x="20" y="524" width="150" height="26" rx="4" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1"/>
  <text x="95" y="542" text-anchor="middle" font-size="11" fill="#92400E">固定逻辑 → Automation</text>

  <rect x="185" y="524" width="150" height="26" rx="4" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1"/>
  <text x="260" y="542" text-anchor="middle" font-size="11" fill="#1E40AF">多步+依赖 → Workflow</text>

  <rect x="350" y="524" width="140" height="26" rx="4" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="1"/>
  <text x="420" y="542" text-anchor="middle" font-size="11" fill="#6D28D9">需要推理 → Agent</text>

  <rect x="505" y="524" width="195" height="26" rx="4" fill="#F0FDF4" stroke="#22C55E" stroke-width="1"/>
  <text x="602" y="542" text-anchor="middle" font-size="11" fill="#166534">大部分确定+少量模糊 → 混合架构</text>
</svg>