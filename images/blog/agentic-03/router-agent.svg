<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 300" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif">
  <text x="320" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#1F2937">Router Agent 架构</text>

  <!-- 用户输入 -->
  <rect x="230" y="48" width="180" height="40" rx="6" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="320" y="73" text-anchor="middle" font-size="13" fill="#1E40AF">用户输入（自然语言）</text>

  <!-- 箭头：输入 → Router -->
  <line x1="320" y1="88" x2="320" y2="118" stroke="#64748B" stroke-width="1.5"/>
  <polygon points="316,116 320,122 324,116" fill="#64748B"/>

  <!-- Router Agent (LLM) -->
  <rect x="230" y="124" width="180" height="48" rx="8" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="1.5"/>
  <text x="320" y="146" text-anchor="middle" font-size="13" font-weight="bold" fill="#6D28D9">Router Agent</text>
  <text x="320" y="163" text-anchor="middle" font-size="11" fill="#7C3AED">LLM 意图分类</text>

  <!-- 三条分支线 -->
  <!-- 左分支 -->
  <line x1="270" y1="172" x2="270" y2="195" stroke="#64748B" stroke-width="1.5"/>
  <line x1="270" y1="195" x2="110" y2="195" stroke="#64748B" stroke-width="1.5"/>
  <line x1="110" y1="195" x2="110" y2="228" stroke="#64748B" stroke-width="1.5"/>
  <polygon points="106,226 110,232 114,226" fill="#64748B"/>
  <text x="190" y="190" text-anchor="middle" font-size="10" fill="#94A3B8">订单查询</text>

  <!-- 中分支 -->
  <line x1="320" y1="172" x2="320" y2="228" stroke="#64748B" stroke-width="1.5"/>
  <polygon points="316,226 320,232 324,226" fill="#64748B"/>
  <text x="340" y="202" font-size="10" fill="#94A3B8">退款申请</text>

  <!-- 右分支 -->
  <line x1="370" y1="172" x2="370" y2="195" stroke="#64748B" stroke-width="1.5"/>
  <line x1="370" y1="195" x2="530" y2="195" stroke="#64748B" stroke-width="1.5"/>
  <line x1="530" y1="195" x2="530" y2="228" stroke="#64748B" stroke-width="1.5"/>
  <polygon points="526,226 530,232 534,226" fill="#64748B"/>
  <text x="450" y="190" text-anchor="middle" font-size="10" fill="#94A3B8">通用问题</text>

  <!-- 左 Handler -->
  <rect x="30" y="236" width="160" height="44" rx="6" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="110" y="256" text-anchor="middle" font-size="12" font-weight="bold" fill="#92400E">订单系统查询</text>
  <text x="110" y="272" text-anchor="middle" font-size="10" fill="#B45309">确定性逻辑</text>

  <!-- 中 Handler -->
  <rect x="240" y="236" width="160" height="44" rx="6" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="320" y="256" text-anchor="middle" font-size="12" font-weight="bold" fill="#92400E">退款流程处理</text>
  <text x="320" y="272" text-anchor="middle" font-size="10" fill="#B45309">确定性逻辑</text>

  <!-- 右 Handler -->
  <rect x="450" y="236" width="160" height="44" rx="6" fill="#F0FDF4" stroke="#22C55E" stroke-width="1.5"/>
  <text x="530" y="256" text-anchor="middle" font-size="12" font-weight="bold" fill="#166534">知识库 RAG</text>
  <text x="530" y="272" text-anchor="middle" font-size="10" fill="#16A34A">Tool Agent (L2)</text>
</svg>
