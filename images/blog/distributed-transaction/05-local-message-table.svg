<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 440" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif">

  <!-- ===== Title ===== -->
  <text x="410" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a1a2e">本地消息表 + 轮询架构</text>

  <!-- ============================================ -->
  <!-- Upstream Service Container                   -->
  <!-- ============================================ -->
  <rect x="20" y="50" width="295" height="310" rx="8" fill="#f8fbff" stroke="#4a90d9" stroke-width="1.5"/>
  <text x="167" y="72" text-anchor="middle" font-size="13" font-weight="bold" fill="#2c5282">Upstream Service</text>

  <!-- Business DB -->
  <rect x="35" y="88" width="125" height="34" rx="6" fill="#e8f4fd" stroke="#4a90d9" stroke-width="1.5"/>
  <text x="97" y="105" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#2c5282">Business DB</text>

  <!-- Message Table -->
  <rect x="175" y="88" width="130" height="34" rx="6" fill="#fef3e2" stroke="#d4a04a" stroke-width="1.5"/>
  <text x="240" y="105" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#7b5b2a">Message Table</text>

  <!-- Local TX bracket -->
  <rect x="30" y="130" width="278" height="26" rx="4" fill="#e8f8ef" stroke="#27ae60" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="169" y="143" text-anchor="middle" dominant-baseline="central" font-size="10" font-weight="bold" fill="#1e7e45">同一本地事务 (ACID)</text>

  <!-- Scheduler -->
  <rect x="35" y="215" width="270" height="38" rx="6" fill="#fff8e1" stroke="#f5a623" stroke-width="1.5"/>
  <text x="170" y="234" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#8b6914">Scheduler（轮询 PENDING 消息）</text>

  <!-- ============================================ -->
  <!-- Message Queue                                -->
  <!-- ============================================ -->
  <rect x="365" y="215" width="120" height="38" rx="8" fill="#4a90d9" stroke="#2c5282" stroke-width="1.5"/>
  <text x="425" y="234" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="bold" fill="#fff">MQ</text>

  <!-- ============================================ -->
  <!-- Downstream Service Container                 -->
  <!-- ============================================ -->
  <rect x="535" y="50" width="265" height="310" rx="8" fill="#fef8f0" stroke="#d4a04a" stroke-width="1.5"/>
  <text x="667" y="72" text-anchor="middle" font-size="13" font-weight="bold" fill="#7b5b2a">Downstream Service</text>

  <!-- Consume Message -->
  <rect x="555" y="88" width="230" height="34" rx="6" fill="#fef3e2" stroke="#d4a04a" stroke-width="1"/>
  <text x="670" y="105" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#7b5b2a">Consume Message</text>

  <!-- Execute Business Logic -->
  <rect x="555" y="138" width="230" height="40" rx="6" fill="#e8f8ef" stroke="#68c690" stroke-width="1"/>
  <text x="670" y="154" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#1e7e45">Execute Business Logic</text>
  <text x="670" y="170" text-anchor="middle" dominant-baseline="central" font-size="9" fill="#1e7e45">（幂等 + msgId 去重）</text>

  <!-- ============================================ -->
  <!-- STEP ① — 本地事务写入                         -->
  <!-- ============================================ -->
  <circle cx="40" cy="176" r="14" fill="#4a90d9" stroke="#fff" stroke-width="2"/>
  <text x="40" y="176" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="bold" fill="#fff">1</text>
  <text x="62" y="176" dominant-baseline="central" font-size="11" fill="#333" font-weight="bold">写入订单 + 写入消息（PENDING）</text>

  <!-- ============================================ -->
  <!-- STEP ② — Scheduler 轮询投递到 MQ              -->
  <!-- ============================================ -->
  <!-- Arrow: Scheduler right (305) → MQ left (365) -->
  <line x1="305" y1="234" x2="365" y2="234" stroke="#f5a623" stroke-width="2"/>
  <polygon points="365,234 351,226 351,242" fill="#f5a623"/>

  <!-- Step badge above arrow -->
  <circle cx="335" cy="206" r="14" fill="#f5a623" stroke="#fff" stroke-width="2"/>
  <text x="335" y="206" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="bold" fill="#fff">2</text>
  <text x="335" y="188" text-anchor="middle" dominant-baseline="central" font-size="9" fill="#8b6914">投递消息</text>

  <!-- ============================================ -->
  <!-- STEP ③ — MQ 投递到下游消费                     -->
  <!-- ============================================ -->
  <!-- Arrow: MQ right (485) → go right to x=510, up to y=105, right to Consume (555) -->
  <line x1="485" y1="234" x2="510" y2="234" stroke="#d4a04a" stroke-width="2"/>
  <line x1="510" y1="234" x2="510" y2="105" stroke="#d4a04a" stroke-width="2"/>
  <line x1="510" y1="105" x2="555" y2="105" stroke="#d4a04a" stroke-width="2"/>
  <polygon points="555,105 541,97 541,113" fill="#d4a04a"/>

  <!-- Step badge at the corner -->
  <circle cx="510" cy="175" r="14" fill="#d4a04a" stroke="#fff" stroke-width="2"/>
  <text x="510" y="175" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="bold" fill="#fff">3</text>
  <text x="490" y="157" dominant-baseline="central" font-size="9" fill="#7b5b2a">下游消费</text>

  <!-- ============================================ -->
  <!-- STEP ④ — 回调确认，更新消息状态                 -->
  <!-- ============================================ -->
  <!-- Arrow: Downstream (535, 310) → Upstream (315, 310) -->
  <line x1="535" y1="310" x2="315" y2="310" stroke="#e74c3c" stroke-width="2" stroke-dasharray="6,3"/>
  <polygon points="315,310 329,302 329,318" fill="#e74c3c"/>

  <!-- Step badge above arrow -->
  <circle cx="425" cy="290" r="14" fill="#e74c3c" stroke="#fff" stroke-width="2"/>
  <text x="425" y="290" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="bold" fill="#fff">4</text>
  <text x="425" y="272" text-anchor="middle" dominant-baseline="central" font-size="9" fill="#c0392b">回调确认</text>

  <!-- "Update DONE" label at the arrow endpoint -->
  <text x="260" y="328" text-anchor="middle" font-size="10" fill="#c0392b">更新消息状态 → DONE</text>

  <!-- ============================================ -->
  <!-- BOTTOM: Reliability notes                    -->
  <!-- ============================================ -->
  <rect x="100" y="380" width="620" height="50" rx="8" fill="#f8f9fa" stroke="#ddd" stroke-width="1"/>
  <text x="410" y="400" text-anchor="middle" font-size="11" font-weight="bold" fill="#555">可靠性保证</text>
  <text x="410" y="416" text-anchor="middle" font-size="10" fill="#666">① 本地事务保证原子性 ② Scheduler 重试保证投递 ③ 幂等 + msgId 去重防重复消费</text>

</svg>