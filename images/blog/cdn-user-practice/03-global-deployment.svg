<svg viewBox="0 0 760 300" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif">
  <rect width="760" height="300" fill="#F8FAFC" rx="8"/>
  <text x="380" y="28" text-anchor="middle" font-size="14" font-weight="600" fill="#1E293B">全球化部署：双 CDN 架构</text>

  <!-- User groups -->
  <!-- China users -->
  <rect x="30" y="60" width="120" height="50" rx="6" fill="#FEF9C3" stroke="#EAB308" stroke-width="1.5"/>
  <text x="90" y="82" text-anchor="middle" font-size="11" font-weight="600" fill="#713F12">中国大陆用户</text>
  <text x="90" y="98" text-anchor="middle" font-size="9" fill="#92400E">需 ICP 落地节点</text>

  <!-- Global users -->
  <rect x="30" y="130" width="120" height="50" rx="6" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="90" y="152" text-anchor="middle" font-size="11" font-weight="600" fill="#1E40AF">海外用户</text>
  <text x="90" y="168" text-anchor="middle" font-size="9" fill="#1E3A8A">北美 / 欧洲 / 东南亚</text>

  <!-- GeoDNS -->
  <rect x="200" y="90" width="120" height="50" rx="6" fill="#F0FDF4" stroke="#16A34A" stroke-width="2"/>
  <text x="260" y="112" text-anchor="middle" font-size="11" font-weight="600" fill="#14532D">GeoDNS</text>
  <text x="260" y="128" text-anchor="middle" font-size="9" fill="#166534">按用户 IP 分流</text>

  <!-- Arrows from users to GeoDNS -->
  <line x1="150" y1="85" x2="200" y2="105" stroke="#94A3B8" stroke-width="1.5"/>
  <polygon points="200,105 189,98 193,110" fill="#94A3B8"/>
  <line x1="150" y1="155" x2="200" y2="130" stroke="#94A3B8" stroke-width="1.5"/>
  <polygon points="200,130 191,139 196,127" fill="#94A3B8"/>

  <!-- CDN China -->
  <rect x="375" y="55" width="145" height="65" rx="6" fill="#FFF7ED" stroke="#FB923C" stroke-width="1.5"/>
  <text x="447" y="77" text-anchor="middle" font-size="11" font-weight="600" fill="#7C2D12">国内 CDN</text>
  <text x="447" y="93" text-anchor="middle" font-size="9" fill="#9A3412">阿里云 / 腾讯云</text>
  <text x="447" y="108" text-anchor="middle" font-size="9" fill="#9A3412">ICP 备案 · 国内节点覆盖</text>

  <!-- CDN Global -->
  <rect x="375" y="140" width="145" height="65" rx="6" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="1.5"/>
  <text x="447" y="162" text-anchor="middle" font-size="11" font-weight="600" fill="#4C1D95">海外 CDN</text>
  <text x="447" y="178" text-anchor="middle" font-size="9" fill="#3B0764">Cloudflare / CloudFront</text>
  <text x="447" y="193" text-anchor="middle" font-size="9" fill="#3B0764">全球 Anycast · 免 ICP</text>

  <!-- Arrows from GeoDNS to CDNs -->
  <line x1="320" y1="105" x2="375" y2="88" stroke="#F59E0B" stroke-width="1.5"/>
  <polygon points="375,88 364,90 368,78" fill="#F59E0B"/>
  <text x="348" y="87" text-anchor="middle" font-size="9" fill="#92400E">CN</text>

  <line x1="320" y1="115" x2="375" y2="173" stroke="#8B5CF6" stroke-width="1.5"/>
  <polygon points="375,173 366,162 377,163" fill="#8B5CF6"/>
  <text x="348" y="155" text-anchor="middle" font-size="9" fill="#4C1D95">非 CN</text>

  <!-- Origin -->
  <rect x="575" y="90" width="145" height="80" rx="6" fill="#F0F9FF" stroke="#0284C7" stroke-width="1.5"/>
  <text x="647" y="115" text-anchor="middle" font-size="11" font-weight="600" fill="#0C4A6E">源站</text>
  <text x="647" y="131" text-anchor="middle" font-size="9" fill="#075985">对象存储 / 应用服务器</text>
  <text x="647" y="147" text-anchor="middle" font-size="9" fill="#075985">多地域部署</text>
  <text x="647" y="162" text-anchor="middle" font-size="9" fill="#075985">（国内 + 海外各一套）</text>

  <!-- Arrows from CDNs to Origin -->
  <line x1="520" y1="87" x2="575" y2="120" stroke="#94A3B8" stroke-width="1" stroke-dasharray="5,4"/>
  <polygon points="575,120 566,111 574,108" fill="#94A3B8"/>
  <text x="548" y="95" text-anchor="middle" font-size="9" fill="#94A3B8">回源</text>
  <line x1="520" y1="175" x2="575" y2="148" stroke="#94A3B8" stroke-width="1" stroke-dasharray="5,4"/>
  <polygon points="575,148 567,157 576,145" fill="#94A3B8"/>

  <!-- Key considerations below -->
  <rect x="30" y="225" width="210" height="58" rx="6" fill="#FFF7ED" stroke="#FB923C" stroke-width="1"/>
  <text x="135" y="244" text-anchor="middle" font-size="10" font-weight="600" fill="#7C2D12">中国大陆特殊性</text>
  <text x="135" y="259" text-anchor="middle" font-size="9" fill="#9A3412">· 必须 ICP 备案才能落地节点</text>
  <text x="135" y="273" text-anchor="middle" font-size="9" fill="#9A3412">· 数据本地化监管（数据不出境）</text>

  <rect x="270" y="225" width="210" height="58" rx="6" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="1"/>
  <text x="375" y="244" text-anchor="middle" font-size="10" font-weight="600" fill="#4C1D95">海外合规要点</text>
  <text x="375" y="259" text-anchor="middle" font-size="9" fill="#3B0764">· GDPR：欧盟数据不可存美国节点</text>
  <text x="375" y="273" text-anchor="middle" font-size="9" fill="#3B0764">· 选 CDN 要确认节点所在司法管辖</text>

  <rect x="510" y="225" width="220" height="58" rx="6" fill="#F0F9FF" stroke="#0284C7" stroke-width="1"/>
  <text x="620" y="244" text-anchor="middle" font-size="10" font-weight="600" fill="#0C4A6E">监控统一性</text>
  <text x="620" y="259" text-anchor="middle" font-size="9" fill="#075985">· 两套 CDN 命中率 / 延迟统一收集</text>
  <text x="620" y="273" text-anchor="middle" font-size="9" fill="#075985">· 告警阈值、Purge 操作要同步触发</text>
</svg>
