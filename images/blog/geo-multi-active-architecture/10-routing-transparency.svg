<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Title -->
  <text x="400" y="25" text-anchor="middle" font-size="20" font-weight="bold" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" fill="#1F2937">
    单元化路由透传机制
  </text>

  <!-- Right side annotation bar -->
  <rect x="610" y="70" width="170" height="480" rx="4" fill="#F3E8FF" stroke="#A78BFA" stroke-width="1.5"/>
  <text x="695" y="310" text-anchor="middle" font-size="13" font-weight="700" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" fill="#6D28D9" writing-mode="tb" transform="rotate(180 695 310)">
    路由参数全链路透传
  </text>

  <!-- Layer 1: 接入层 -->
  <rect x="80" y="70" width="500" height="70" rx="6" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="330" y="95" text-anchor="middle" font-size="14" font-weight="600" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" fill="#1E40AF">
    接入层
  </text>
  <text x="330" y="120" text-anchor="middle" font-size="12" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" fill="#3B82F6">
    解析 HTTP 路由参数（unit_id/user_id），路由到正确 SLB
  </text>

  <!-- Arrow down -->
  <line x1="330" y1="140" x2="330" y2="160" stroke="#6B7280" stroke-width="1.5"/>
  <polygon points="330,160 325,150 335,150" fill="#6B7280"/>

  <!-- Layer 2: 应用层 -->
  <rect x="80" y="160" width="500" height="70" rx="6" fill="#E9D5FF" stroke="#C084FC" stroke-width="1.5"/>
  <text x="330" y="185" text-anchor="middle" font-size="14" font-weight="600" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" fill="#6B21A8">
    应用层
  </text>
  <text x="330" y="210" text-anchor="middle" font-size="12" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" fill="#7C3AED">
    提取路由参数，保存到上下文 Context（ThreadLocal）
  </text>

  <!-- Arrow down -->
  <line x1="330" y1="230" x2="330" y2="250" stroke="#6B7280" stroke-width="1.5"/>
  <polygon points="330,250 325,240 335,240" fill="#6B7280"/>

  <!-- Layer 3: RPC 层 -->
  <rect x="80" y="250" width="500" height="70" rx="6" fill="#FEE2E2" stroke="#DC2626" stroke-width="1.5"/>
  <text x="330" y="275" text-anchor="middle" font-size="14" font-weight="600" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" fill="#7F1D1D">
    RPC 调用层
  </text>
  <text x="330" y="300" text-anchor="middle" font-size="12" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" fill="#991B1B">
    从上下文提取路由参数，透传到 Provider 服务
  </text>

  <!-- Arrow down -->
  <line x1="330" y1="320" x2="330" y2="340" stroke="#6B7280" stroke-width="1.5"/>
  <polygon points="330,340 325,330 335,330" fill="#6B7280"/>

  <!-- Layer 4: 消息层 -->
  <rect x="80" y="340" width="500" height="70" rx="6" fill="#DCFCE7" stroke="#22C55E" stroke-width="1.5"/>
  <text x="330" y="365" text-anchor="middle" font-size="14" font-weight="600" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" fill="#15803D">
    异步消息层
  </text>
  <text x="330" y="390" text-anchor="middle" font-size="12" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" fill="#166534">
    路由参数写入消息属性或消息头，确保路由一致性
  </text>

  <!-- Arrow down -->
  <line x1="330" y1="410" x2="330" y2="430" stroke="#6B7280" stroke-width="1.5"/>
  <polygon points="330,430 325,420 335,420" fill="#6B7280"/>

  <!-- Layer 5: 数据层 -->
  <rect x="80" y="430" width="500" height="70" rx="6" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="330" y="455" text-anchor="middle" font-size="14" font-weight="600" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" fill="#92400E">
    数据存储层
  </text>
  <text x="330" y="480" text-anchor="middle" font-size="12" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" fill="#B45309">
    保证数据落库到正确单元（根据路由参数分片）
  </text>

  <!-- Key point box at bottom -->
  <rect x="50" y="530" width="700" height="50" rx="4" fill="#F9FAFB" stroke="#D1D5DB" stroke-width="1.5"/>
  <text x="70" y="550" font-size="11" font-weight="600" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" fill="#1F2937">
    核心原则：
  </text>
  <text x="70" y="570" font-size="11" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" fill="#4B5563">
    路由参数一旦确定，整个请求生命周期内不变，从接入层透传至数据层，确保跨层一致性和数据准确性
  </text>
</svg>