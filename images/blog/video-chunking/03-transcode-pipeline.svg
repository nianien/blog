<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 280" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif">
  <!-- Background -->
  <rect width="900" height="280" fill="#fafbfc" rx="8"/>

  <!-- Title -->
  <text x="450" y="25" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a1a2e">转码分片 Pipeline</text>

  <!-- Source file -->
  <rect x="20" y="100" width="90" height="50" rx="8" fill="#e8f4fd" stroke="#3498db" stroke-width="1.5"/>
  <text x="65" y="122" text-anchor="middle" font-size="11" font-weight="600" fill="#2471a3">源文件</text>
  <text x="65" y="138" text-anchor="middle" font-size="9" fill="#5dade2">H.264 / ProRes</text>

  <!-- Arrow -->
  <line x1="110" y1="125" x2="138" y2="125" stroke="#7f8c8d" stroke-width="1.5"/>
  <polygon points="138,121 148,125 138,129" fill="#7f8c8d"/>

  <!-- GOP analysis -->
  <rect x="150" y="90" width="100" height="70" rx="8" fill="#fef9e7" stroke="#f39c12" stroke-width="1.5"/>
  <text x="200" y="114" text-anchor="middle" font-size="11" font-weight="600" fill="#b7950b">GOP 边界</text>
  <text x="200" y="130" text-anchor="middle" font-size="11" font-weight="600" fill="#b7950b">分析</text>
  <text x="200" y="148" text-anchor="middle" font-size="9" fill="#d4a017">IDR Frame Detection</text>

  <!-- Arrow -->
  <line x1="250" y1="125" x2="278" y2="125" stroke="#7f8c8d" stroke-width="1.5"/>
  <polygon points="278,121 288,125 278,129" fill="#7f8c8d"/>

  <!-- Split -->
  <rect x="290" y="100" width="80" height="50" rx="8" fill="#eafaf1" stroke="#27ae60" stroke-width="1.5"/>
  <text x="330" y="122" text-anchor="middle" font-size="11" font-weight="600" fill="#1e8449">分片切割</text>
  <text x="330" y="138" text-anchor="middle" font-size="9" fill="#2ecc71">GOP-aligned</text>

  <!-- Fan-out arrows to transcode cluster -->
  <line x1="370" y1="115" x2="418" y2="60" stroke="#8e44ad" stroke-width="1.5"/>
  <polygon points="414,56 424,60 416,64" fill="#8e44ad"/>

  <line x1="370" y1="120" x2="418" y2="105" stroke="#8e44ad" stroke-width="1.5"/>
  <polygon points="414,101 424,105 416,109" fill="#8e44ad"/>

  <line x1="370" y1="130" x2="418" y2="150" stroke="#8e44ad" stroke-width="1.5"/>
  <polygon points="414,146 424,150 416,154" fill="#8e44ad"/>

  <line x1="370" y1="135" x2="418" y2="195" stroke="#8e44ad" stroke-width="1.5"/>
  <polygon points="414,191 424,195 416,199" fill="#8e44ad"/>

  <!-- Transcode cluster -->
  <rect x="415" y="35" width="220" height="210" rx="8" fill="#f5eef8" stroke="#8e44ad" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="525" y="53" text-anchor="middle" font-size="11" font-weight="600" fill="#6c3483">分布式转码集群（并行）</text>

  <!-- 1080p -->
  <rect x="430" y="60" width="90" height="32" rx="6" fill="#e8daef" stroke="#8e44ad" stroke-width="1"/>
  <text x="475" y="80" text-anchor="middle" font-size="10" font-weight="600" fill="#6c3483">1080p</text>

  <rect x="530" y="60" width="90" height="32" rx="6" fill="#e8daef" stroke="#8e44ad" stroke-width="1"/>
  <text x="575" y="80" text-anchor="middle" font-size="10" fill="#7d3c98">H.264 8Mbps</text>

  <!-- 720p -->
  <rect x="430" y="100" width="90" height="32" rx="6" fill="#e8daef" stroke="#8e44ad" stroke-width="1"/>
  <text x="475" y="120" text-anchor="middle" font-size="10" font-weight="600" fill="#6c3483">720p</text>

  <rect x="530" y="100" width="90" height="32" rx="6" fill="#e8daef" stroke="#8e44ad" stroke-width="1"/>
  <text x="575" y="120" text-anchor="middle" font-size="10" fill="#7d3c98">H.264 5Mbps</text>

  <!-- 480p -->
  <rect x="430" y="140" width="90" height="32" rx="6" fill="#e8daef" stroke="#8e44ad" stroke-width="1"/>
  <text x="475" y="160" text-anchor="middle" font-size="10" font-weight="600" fill="#6c3483">480p</text>

  <rect x="530" y="140" width="90" height="32" rx="6" fill="#e8daef" stroke="#8e44ad" stroke-width="1"/>
  <text x="575" y="160" text-anchor="middle" font-size="10" fill="#7d3c98">H.264 2.5Mbps</text>

  <!-- 360p -->
  <rect x="430" y="180" width="90" height="32" rx="6" fill="#e8daef" stroke="#8e44ad" stroke-width="1"/>
  <text x="475" y="200" text-anchor="middle" font-size="10" font-weight="600" fill="#6c3483">360p</text>

  <rect x="530" y="180" width="90" height="32" rx="6" fill="#e8daef" stroke="#8e44ad" stroke-width="1"/>
  <text x="575" y="200" text-anchor="middle" font-size="10" fill="#7d3c98">H.264 1Mbps</text>

  <!-- Fan-in arrows from cluster to merge -->
  <line x1="635" y1="76" x2="668" y2="110" stroke="#27ae60" stroke-width="1.5"/>
  <polygon points="664,110 674,114 668,106" fill="#27ae60"/>

  <line x1="635" y1="116" x2="668" y2="116" stroke="#27ae60" stroke-width="1.5"/>
  <polygon points="668,112 678,116 668,120" fill="#27ae60"/>

  <line x1="635" y1="156" x2="668" y2="122" stroke="#27ae60" stroke-width="1.5"/>
  <polygon points="664,118 674,118 668,126" fill="#27ae60"/>

  <line x1="635" y1="196" x2="668" y2="128" stroke="#27ae60" stroke-width="1.5"/>
  <polygon points="664,124 674,124 668,132" fill="#27ae60"/>

  <!-- Merge -->
  <rect x="680" y="90" width="80" height="50" rx="8" fill="#eafaf1" stroke="#27ae60" stroke-width="1.5"/>
  <text x="720" y="118" text-anchor="middle" font-size="11" font-weight="600" fill="#1e8449">合并</text>

  <!-- Arrow to HLS -->
  <line x1="760" y1="115" x2="780" y2="115" stroke="#7f8c8d" stroke-width="1.5"/>
  <polygon points="780,111 790,115 780,119" fill="#7f8c8d"/>

  <!-- HLS output -->
  <rect x="792" y="70" width="90" height="100" rx="8" fill="#fdedec" stroke="#e74c3c" stroke-width="1.5"/>
  <text x="837" y="95" text-anchor="middle" font-size="11" font-weight="600" fill="#b03a2e">HLS 切片</text>
  <text x="837" y="115" text-anchor="middle" font-size="9" fill="#e74c3c">.ts / .fmp4</text>
  <text x="837" y="132" text-anchor="middle" font-size="9" fill="#e74c3c">segments</text>
  <text x="837" y="155" text-anchor="middle" font-size="9" font-weight="600" fill="#b03a2e">m3u8 索引</text>

  <!-- Bottom note -->
  <text x="450" y="268" text-anchor="middle" font-size="10" fill="#7f8c8d">基于 GOP 边界切割，确保每个分片独立可解码，支持分布式并行转码</text>
</svg>