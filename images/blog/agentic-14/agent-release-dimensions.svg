<svg viewBox="0 0 620 300" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif">

  <!-- Root node -->
  <rect x="200" y="10" width="180" height="32" rx="6" fill="#e8f4f8" stroke="#0066cc" stroke-width="2"/>
  <text x="290" y="31" font-size="12" font-weight="bold" text-anchor="middle" fill="#0066cc">Agent 发布维度</text>

  <!-- T-split from root -->
  <line x1="290" y1="42" x2="290" y2="56" stroke="#0066cc" stroke-width="1.5"/>
  <line x1="40" y1="56" x2="540" y2="56" stroke="#0066cc" stroke-width="1.5"/>

  <!-- 5 vertical drops -->
  <line x1="40" y1="56" x2="40" y2="70" stroke="#0066cc" stroke-width="1.5"/>
  <polygon points="36,70 40,80 44,70" fill="#0066cc"/>
  <line x1="165" y1="56" x2="165" y2="70" stroke="#ff9900" stroke-width="1.5"/>
  <polygon points="161,70 165,80 169,70" fill="#ff9900"/>
  <line x1="290" y1="56" x2="290" y2="70" stroke="#9933cc" stroke-width="1.5"/>
  <polygon points="286,70 290,80 294,70" fill="#9933cc"/>
  <line x1="415" y1="56" x2="415" y2="70" stroke="#00aa33" stroke-width="1.5"/>
  <polygon points="411,70 415,80 419,70" fill="#00aa33"/>
  <line x1="540" y1="56" x2="540" y2="70" stroke="#E65100" stroke-width="1.5"/>
  <polygon points="536,70 540,80 544,70" fill="#E65100"/>

  <!-- Card 1: 代码变更 -->
  <rect x="2" y="78" width="96" height="100" rx="6" fill="#e8f4f8" stroke="#0066cc" stroke-width="1.5"/>
  <circle cx="50" cy="98" r="10" fill="#0066cc"/>
  <text x="50" y="102" font-size="9" font-weight="bold" text-anchor="middle" fill="#fff">1</text>
  <text x="50" y="122" font-size="10" font-weight="bold" text-anchor="middle" fill="#0066cc">代码变更</text>
  <line x1="12" y1="130" x2="88" y2="130" stroke="#0066cc" stroke-width="0.5" opacity="0.3"/>
  <text x="50" y="146" font-size="8" text-anchor="middle" fill="#666">Agent</text>
  <text x="50" y="158" font-size="8" text-anchor="middle" fill="#666">runtime</text>
  <text x="50" y="170" font-size="8" text-anchor="middle" fill="#666">工具实现</text>

  <!-- Card 2: Prompt 变更 -->
  <rect x="112" y="78" width="116" height="100" rx="6" fill="#fff4e8" stroke="#ff9900" stroke-width="1.5"/>
  <circle cx="170" cy="98" r="10" fill="#ff9900"/>
  <text x="170" y="102" font-size="9" font-weight="bold" text-anchor="middle" fill="#fff">2</text>
  <text x="170" y="122" font-size="10" font-weight="bold" text-anchor="middle" fill="#ff9900">Prompt 变更</text>
  <line x1="122" y1="130" x2="218" y2="130" stroke="#ff9900" stroke-width="0.5" opacity="0.3"/>
  <text x="170" y="146" font-size="8" text-anchor="middle" fill="#666">system prompt</text>
  <text x="170" y="158" font-size="8" text-anchor="middle" fill="#666">tool descriptions</text>
  <text x="170" y="170" font-size="8" text-anchor="middle" fill="#666">few-shot examples</text>

  <!-- Card 3: 模型变更 -->
  <rect x="242" y="78" width="96" height="100" rx="6" fill="#f0e8f8" stroke="#9933cc" stroke-width="1.5"/>
  <circle cx="290" cy="98" r="10" fill="#9933cc"/>
  <text x="290" y="102" font-size="9" font-weight="bold" text-anchor="middle" fill="#fff">3</text>
  <text x="290" y="122" font-size="10" font-weight="bold" text-anchor="middle" fill="#9933cc">模型变更</text>
  <line x1="252" y1="130" x2="328" y2="130" stroke="#9933cc" stroke-width="0.5" opacity="0.3"/>
  <text x="290" y="146" font-size="8" text-anchor="middle" fill="#666">GPT-4o →</text>
  <text x="290" y="158" font-size="8" text-anchor="middle" fill="#666">GPT-4o-</text>
  <text x="290" y="170" font-size="8" text-anchor="middle" fill="#666">2025-08-06</text>

  <!-- Card 4: 工具变更 -->
  <rect x="352" y="78" width="116" height="100" rx="6" fill="#e8f8e8" stroke="#00aa33" stroke-width="1.5"/>
  <circle cx="410" cy="98" r="10" fill="#00aa33"/>
  <text x="410" y="102" font-size="9" font-weight="bold" text-anchor="middle" fill="#fff">4</text>
  <text x="410" y="122" font-size="10" font-weight="bold" text-anchor="middle" fill="#00aa33">工具变更</text>
  <line x1="362" y1="130" x2="458" y2="130" stroke="#00aa33" stroke-width="0.5" opacity="0.3"/>
  <text x="410" y="146" font-size="8" text-anchor="middle" fill="#666">新增工具</text>
  <text x="410" y="158" font-size="8" text-anchor="middle" fill="#666">修改工具参数</text>
  <text x="410" y="170" font-size="8" text-anchor="middle" fill="#666">下线工具</text>

  <!-- Card 5: 配置变更 -->
  <rect x="482" y="78" width="116" height="100" rx="6" fill="#FFF3E0" stroke="#E65100" stroke-width="1.5"/>
  <circle cx="540" cy="98" r="10" fill="#E65100"/>
  <text x="540" y="102" font-size="9" font-weight="bold" text-anchor="middle" fill="#fff">5</text>
  <text x="540" y="122" font-size="10" font-weight="bold" text-anchor="middle" fill="#E65100">配置变更</text>
  <line x1="492" y1="130" x2="588" y2="130" stroke="#E65100" stroke-width="0.5" opacity="0.3"/>
  <text x="540" y="146" font-size="8" text-anchor="middle" fill="#666">max_iterations</text>
  <text x="540" y="158" font-size="8" text-anchor="middle" fill="#666">temperature</text>
  <text x="540" y="170" font-size="8" text-anchor="middle" fill="#666">retry_budget</text>

  <!-- Bottom note -->
  <text x="300" y="210" font-size="9" text-anchor="middle" fill="#999">每一种变更都可能影响 Agent 行为，且影响不可预测</text>
</svg>
