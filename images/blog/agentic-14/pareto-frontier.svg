<svg viewBox="0 0 500 360" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif">
  <!-- Title -->
  <text x="280" y="22" text-anchor="middle" font-size="14" font-weight="bold" fill="#263238">Pareto 前沿：质量 vs 成本</text>

  <!-- Y-axis (quality, pointing up) -->
  <line x1="80" y1="290" x2="80" y2="45" stroke="#455A64" stroke-width="1.5"/>
  <polygon points="76,48 80,36 84,48" fill="#455A64"/>

  <!-- X-axis (cost, pointing right) -->
  <line x1="80" y1="290" x2="440" y2="290" stroke="#455A64" stroke-width="1.5"/>
  <polygon points="437,286 449,290 437,294" fill="#455A64"/>

  <!-- Y-axis label -->
  <text x="38" y="170" text-anchor="middle" font-size="11" fill="#455A64" transform="rotate(-90, 38, 170)">质量 (越高越好)</text>

  <!-- X-axis label -->
  <text x="260" y="325" text-anchor="middle" font-size="11" fill="#455A64">成本 (越低越好) →</text>

  <!-- Pareto frontier curve -->
  <path d="M120,260 Q150,120 200,90 Q280,65 400,58" stroke="#1565C0" stroke-width="2" fill="none"/>
  <text x="365" y="48" font-size="11" font-weight="bold" fill="#1565C0">Pareto 前沿</text>

  <!-- Scatter points (below frontier = suboptimal) -->
  <circle cx="200" cy="180" r="5" fill="#E0E0E0" stroke="#9E9E9E" stroke-width="1"/>
  <circle cx="250" cy="200" r="5" fill="#E0E0E0" stroke="#9E9E9E" stroke-width="1"/>
  <circle cx="300" cy="160" r="5" fill="#E0E0E0" stroke="#9E9E9E" stroke-width="1"/>
  <circle cx="330" cy="220" r="5" fill="#E0E0E0" stroke="#9E9E9E" stroke-width="1"/>
  <circle cx="180" cy="230" r="5" fill="#E0E0E0" stroke="#9E9E9E" stroke-width="1"/>

  <!-- Points on frontier -->
  <circle cx="140" cy="180" r="6" fill="#4CAF50" stroke="#2E7D32" stroke-width="1.5"/>
  <circle cx="200" cy="90" r="8" fill="#FF9800" stroke="#E65100" stroke-width="2"/>
  <circle cx="300" cy="72" r="6" fill="#4CAF50" stroke="#2E7D32" stroke-width="1.5"/>

  <!-- Annotation for optimal point -->
  <line x1="210" y1="95" x2="275" y2="125" stroke="#E65100" stroke-width="1" stroke-dasharray="3"/>
  <rect x="240" y="125" width="170" height="28" rx="4" fill="#FFF3E0" stroke="#E65100" stroke-width="1"/>
  <text x="325" y="144" text-anchor="middle" font-size="10" fill="#BF360C">成本最低的高质量方案</text>

  <!-- Shaded suboptimal region label -->
  <text x="300" y="250" text-anchor="middle" font-size="10" fill="#9E9E9E">次优区域</text>
</svg>