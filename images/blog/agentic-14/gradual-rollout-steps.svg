<svg viewBox="0 0 680 300" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif">
  <!-- Title -->
  <text x="340" y="20" font-size="13" font-weight="bold" text-anchor="middle" fill="#333">灰度发布流程</text>

  <!-- Step 1 -->
  <rect x="20" y="38" width="280" height="48" rx="6" fill="#f5f5f5" stroke="#999" stroke-width="1.5"/>
  <circle cx="42" cy="62" r="12" fill="#999"/>
  <text x="42" y="66" font-size="10" font-weight="bold" text-anchor="middle" fill="#fff">1</text>
  <text x="62" y="56" font-size="10" font-weight="bold" fill="#333">内部测试（0% 外部流量）</text>
  <text x="62" y="72" font-size="9" fill="#666">跑 Benchmark，确认无回归</text>

  <!-- Traffic bar -->
  <rect x="320" y="52" width="150" height="12" rx="3" fill="#eee" stroke="#ccc" stroke-width="0.5"/>
  <text x="485" y="62" font-size="8" fill="#999">0%</text>

  <!-- Arrow down -->
  <line x1="160" y1="86" x2="160" y2="99" stroke="#666" stroke-width="1.5"/>
  <polygon points="156,99 160,109 164,99" fill="#666"/>

  <!-- Step 2 -->
  <rect x="20" y="105" width="280" height="48" rx="6" fill="#FFF3E0" stroke="#E65100" stroke-width="1.5"/>
  <circle cx="42" cy="129" r="12" fill="#E65100"/>
  <text x="42" y="133" font-size="10" font-weight="bold" text-anchor="middle" fill="#fff">2</text>
  <text x="62" y="123" font-size="10" font-weight="bold" fill="#E65100">小流量灰度（5%）</text>
  <text x="62" y="139" font-size="9" fill="#666">观察 1-2 天，检查 Metrics 和反馈</text>

  <!-- Traffic bar -->
  <rect x="320" y="119" width="150" height="12" rx="3" fill="#FFF3E0" stroke="#E65100" stroke-width="0.5"/>
  <rect x="320" y="119" width="8" height="12" rx="3" fill="#E65100"/>
  <text x="485" y="129" font-size="8" fill="#E65100">5%</text>

  <!-- Arrow down -->
  <line x1="160" y1="153" x2="160" y2="166" stroke="#666" stroke-width="1.5"/>
  <polygon points="156,166 160,176 164,166" fill="#666"/>

  <!-- Step 3 -->
  <rect x="20" y="172" width="280" height="48" rx="6" fill="#e8f4f8" stroke="#0066cc" stroke-width="1.5"/>
  <circle cx="42" cy="196" r="12" fill="#0066cc"/>
  <text x="42" y="200" font-size="10" font-weight="bold" text-anchor="middle" fill="#fff">3</text>
  <text x="62" y="190" font-size="10" font-weight="bold" fill="#0066cc">扩大灰度（20% → 50%）</text>
  <text x="62" y="206" font-size="9" fill="#666">确认指标稳定，无异常</text>

  <!-- Traffic bar -->
  <rect x="320" y="186" width="150" height="12" rx="3" fill="#e8f4f8" stroke="#0066cc" stroke-width="0.5"/>
  <rect x="320" y="186" width="75" height="12" rx="3" fill="#0066cc"/>
  <text x="485" y="196" font-size="8" fill="#0066cc">50%</text>

  <!-- Arrow down -->
  <line x1="160" y1="220" x2="160" y2="233" stroke="#666" stroke-width="1.5"/>
  <polygon points="156,233 160,243 164,233" fill="#666"/>

  <!-- Step 4 -->
  <rect x="20" y="239" width="280" height="48" rx="6" fill="#e8f8e8" stroke="#00aa33" stroke-width="2"/>
  <circle cx="42" cy="263" r="12" fill="#00aa33"/>
  <text x="42" y="267" font-size="10" font-weight="bold" text-anchor="middle" fill="#fff">4</text>
  <text x="62" y="257" font-size="10" font-weight="bold" fill="#00aa33">全量发布（100%）</text>
  <text x="62" y="273" font-size="9" fill="#666">保留回滚能力</text>

  <!-- Traffic bar -->
  <rect x="320" y="253" width="150" height="12" rx="3" fill="#e8f8e8" stroke="#00aa33" stroke-width="0.5"/>
  <rect x="320" y="253" width="150" height="12" rx="3" fill="#00aa33"/>
  <text x="485" y="263" font-size="8" fill="#00aa33">100%</text>

  <!-- Rollback arrow on right -->
  <rect x="530" y="105" width="130" height="80" rx="6" fill="#FFEBEE" stroke="#C62828" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="595" y="130" font-size="9" font-weight="bold" text-anchor="middle" fill="#C62828">任何阶段异常</text>
  <text x="595" y="148" font-size="9" text-anchor="middle" fill="#C62828">→ 立即回滚</text>
  <text x="595" y="166" font-size="9" text-anchor="middle" fill="#C62828">到上一版本</text>

  <!-- Dashed lines from steps to rollback box -->
  <line x1="300" y1="129" x2="530" y2="135" stroke="#C62828" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="300" y1="196" x2="530" y2="165" stroke="#C62828" stroke-width="1" stroke-dasharray="3,3"/>
</svg>
