<svg viewBox="0 0 700 440" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif">
  <!-- Title -->
  <text x="350" y="24" font-size="14" font-weight="bold" text-anchor="middle" fill="#333">LangChain Architecture</text>

  <!-- Top row: Chain / Agent / AgentExecutor -->
  <rect x="40" y="48" width="160" height="65" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="120" y="70" font-size="12" font-weight="bold" text-anchor="middle" fill="#1e40af">Chain</text>
  <text x="120" y="87" font-size="10" text-anchor="middle" fill="#555">step1 → step2 → step3</text>

  <rect x="240" y="48" width="160" height="65" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="320" y="70" font-size="12" font-weight="bold" text-anchor="middle" fill="#1e40af">Agent</text>
  <text x="320" y="87" font-size="10" text-anchor="middle" fill="#555">LLM + Tools + Prompt</text>

  <rect x="440" y="48" width="200" height="65" rx="6" fill="#c7d2fe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="540" y="70" font-size="12" font-weight="bold" text-anchor="middle" fill="#1e40af">AgentExecutor</text>
  <text x="540" y="87" font-size="10" text-anchor="middle" fill="#555">Control Loop</text>

  <!-- Arrows down -->
  <line x1="120" y1="113" x2="120" y2="138" stroke="#3b82f6" stroke-width="1.5"/>
  <polygon points="116,138 120,148 124,138" fill="#3b82f6"/>
  <line x1="320" y1="113" x2="320" y2="138" stroke="#3b82f6" stroke-width="1.5"/>
  <polygon points="316,138 320,148 324,138" fill="#3b82f6"/>
  <line x1="540" y1="113" x2="540" y2="138" stroke="#3b82f6" stroke-width="1.5"/>
  <polygon points="536,138 540,148 544,138" fill="#3b82f6"/>

  <!-- LLM Abstraction Layer -->
  <rect x="40" y="152" width="600" height="50" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="340" y="174" font-size="12" font-weight="bold" text-anchor="middle" fill="#92400e">LLM Abstraction Layer</text>
  <text x="340" y="192" font-size="10" text-anchor="middle" fill="#78350f">ChatOpenAI | ChatAnthropic | ChatOllama | ...</text>

  <line x1="340" y1="202" x2="340" y2="222" stroke="#f59e0b" stroke-width="1.5"/>
  <polygon points="336,222 340,232 344,222" fill="#f59e0b"/>

  <!-- Memory -->
  <rect x="40" y="236" width="600" height="50" rx="6" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="340" y="258" font-size="12" font-weight="bold" text-anchor="middle" fill="#166534">Memory</text>
  <text x="340" y="276" font-size="10" text-anchor="middle" fill="#14532d">ConversationBuffer | Summary | VectorStore | Entity</text>

  <line x1="340" y1="286" x2="340" y2="306" stroke="#22c55e" stroke-width="1.5"/>
  <polygon points="336,306 340,316 344,306" fill="#22c55e"/>

  <!-- Retriever -->
  <rect x="40" y="320" width="600" height="50" rx="6" fill="#e0e7ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="340" y="342" font-size="12" font-weight="bold" text-anchor="middle" fill="#312e81">Retriever</text>
  <text x="340" y="360" font-size="10" text-anchor="middle" fill="#1e1b4b">VectorStoreRetriever | BM25 | MultiQuery | ...</text>

  <line x1="340" y1="370" x2="340" y2="390" stroke="#6366f1" stroke-width="1.5"/>
  <polygon points="336,390 340,400 344,390" fill="#6366f1"/>

  <!-- Tools -->
  <rect x="40" y="404" width="600" height="30" rx="6" fill="#fecaca" stroke="#ef4444" stroke-width="1.5"/>
  <text x="340" y="424" font-size="12" font-weight="bold" text-anchor="middle" fill="#7f1d1d">Tools: Search | Calculator | SQL | FileSystem | ...</text>
</svg>
