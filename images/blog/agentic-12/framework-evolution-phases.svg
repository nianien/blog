<svg viewBox="0 0 900 480" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif">
  <!-- Title -->
  <text x="450" y="24" font-size="15" font-weight="bold" text-anchor="middle" fill="#263238">框架从"编排推理"到"编排行动"的演进</text>

  <!-- ===== Phase 1: LangChain Era ===== -->
  <rect x="15" y="42" width="280" height="420" rx="8" fill="#FFF8E1" stroke="#F9A825" stroke-width="1.5"/>
  <text x="155" y="68" font-size="13" font-weight="bold" text-anchor="middle" fill="#E65100">阶段 1：编排一切</text>
  <text x="155" y="86" font-size="10" text-anchor="middle" fill="#BF360C">LangChain Era</text>

  <!-- Framework responsibilities (heavy) -->
  <rect x="30" y="100" width="250" height="190" rx="6" fill="#FFECB3" stroke="#FFA000" stroke-width="1.2"/>
  <text x="155" y="120" font-size="11" font-weight="bold" text-anchor="middle" fill="#E65100">框架的职责（很重）</text>

  <text x="50" y="145" font-size="10" fill="#37474F">├─ 推理 Reasoning → LLM 调用</text>
  <text x="50" y="165" font-size="10" fill="#37474F">├─ 规划 Planning → 生成步骤</text>
  <text x="50" y="185" font-size="10" fill="#37474F">├─ 决策 Decision → 选择工具</text>
  <text x="50" y="205" font-size="10" fill="#37474F">├─ 行动 Action → 执行工具</text>
  <text x="50" y="225" font-size="10" fill="#37474F">└─ 观察 Observation → 处理结果</text>

  <!-- Progress bar: framework heavy -->
  <rect x="40" y="250" width="230" height="8" rx="4" fill="#E0E0E0"/>
  <rect x="40" y="250" width="200" height="8" rx="4" fill="#FFA000"/>
  <text x="155" y="275" font-size="9" text-anchor="middle" fill="#BF360C">框架承担 ~90% 逻辑</text>

  <!-- Model responsibilities (light) -->
  <rect x="30" y="295" width="250" height="70" rx="6" fill="#E3F2FD" stroke="#1565C0" stroke-width="1.2"/>
  <text x="155" y="315" font-size="11" font-weight="bold" text-anchor="middle" fill="#0D47A1">模型的职责（很轻）</text>
  <text x="50" y="340" font-size="10" fill="#37474F">└─ 被框架调用，生成文本</text>

  <!-- Summary -->
  <text x="155" y="395" font-size="10" font-weight="bold" text-anchor="middle" fill="#E65100">问题：</text>
  <text x="155" y="412" font-size="10" text-anchor="middle" fill="#546E7A">隐藏太多复杂性</text>
  <text x="155" y="428" font-size="10" text-anchor="middle" fill="#546E7A">调试困难，灵活性差</text>
  <text x="155" y="448" font-size="9" text-anchor="middle" fill="#78909C">~330 行框架代码</text>

  <!-- ===== Phase 2: LangGraph Era ===== -->
  <rect x="310" y="42" width="280" height="420" rx="8" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="450" y="68" font-size="13" font-weight="bold" text-anchor="middle" fill="#1B5E20">阶段 2：编排控制流</text>
  <text x="450" y="86" font-size="10" text-anchor="middle" fill="#2E7D32">LangGraph Era</text>

  <!-- Framework responsibilities (medium) -->
  <rect x="325" y="100" width="250" height="150" rx="6" fill="#C8E6C9" stroke="#43A047" stroke-width="1.2"/>
  <text x="450" y="120" font-size="11" font-weight="bold" text-anchor="middle" fill="#1B5E20">框架的职责（适中）</text>

  <text x="345" y="145" font-size="10" fill="#37474F">├─ 定义控制流 Graph Structure</text>
  <text x="345" y="165" font-size="10" fill="#37474F">├─ 路由决策 Conditional Edges</text>
  <text x="345" y="185" font-size="10" fill="#37474F">├─ 状态管理 State</text>
  <text x="345" y="205" font-size="10" fill="#37474F">└─ 工具执行 Tool Calling</text>

  <!-- Progress bar: balanced -->
  <rect x="335" y="220" width="230" height="8" rx="4" fill="#E0E0E0"/>
  <rect x="335" y="220" width="120" height="8" rx="4" fill="#43A047"/>
  <text x="450" y="245" font-size="9" text-anchor="middle" fill="#2E7D32">框架承担 ~50% 逻辑</text>

  <!-- Model responsibilities (growing) -->
  <rect x="325" y="260" width="250" height="110" rx="6" fill="#E3F2FD" stroke="#1565C0" stroke-width="1.2"/>
  <text x="450" y="280" font-size="11" font-weight="bold" text-anchor="middle" fill="#0D47A1">模型的职责（增长）</text>
  <text x="345" y="305" font-size="10" fill="#37474F">├─ 推理和决策</text>
  <text x="345" y="325" font-size="10" fill="#37474F">├─ 内容生成</text>
  <text x="345" y="345" font-size="10" fill="#37474F">└─ 工具选择建议</text>

  <!-- Summary -->
  <text x="450" y="395" font-size="10" font-weight="bold" text-anchor="middle" fill="#1B5E20">改进：</text>
  <text x="450" y="412" font-size="10" text-anchor="middle" fill="#546E7A">框架变轻，只管控制流</text>
  <text x="450" y="428" font-size="10" text-anchor="middle" fill="#546E7A">LLM 负责推理</text>
  <text x="450" y="448" font-size="9" text-anchor="middle" fill="#78909C">~200 行框架代码</text>

  <!-- ===== Phase 3: Reasoning Model Era ===== -->
  <rect x="605" y="42" width="280" height="420" rx="8" fill="#E3F2FD" stroke="#1565C0" stroke-width="1.5"/>
  <text x="745" y="68" font-size="13" font-weight="bold" text-anchor="middle" fill="#0D47A1">阶段 3：编排行动</text>
  <text x="745" y="86" font-size="10" text-anchor="middle" fill="#1565C0">推理模型时代</text>

  <!-- Model responsibilities (dominant) -->
  <rect x="620" y="100" width="250" height="165" rx="6" fill="#BBDEFB" stroke="#1976D2" stroke-width="1.2"/>
  <text x="745" y="120" font-size="11" font-weight="bold" text-anchor="middle" fill="#0D47A1">模型的职责（主导）</text>

  <text x="640" y="145" font-size="10" fill="#37474F">├─ 深度推理 Native Thinking</text>
  <text x="640" y="165" font-size="10" fill="#37474F">├─ 规划 Multi-step Planning</text>
  <text x="640" y="185" font-size="10" fill="#37474F">├─ 决策 Tool Selection</text>
  <text x="640" y="205" font-size="10" fill="#37474F">└─ 反思 Self-Correction</text>

  <!-- Progress bar: model dominant -->
  <rect x="630" y="235" width="230" height="8" rx="4" fill="#E0E0E0"/>
  <rect x="630" y="235" width="40" height="8" rx="4" fill="#1976D2"/>
  <text x="745" y="260" font-size="9" text-anchor="middle" fill="#1565C0">框架仅承担 ~15% 逻辑</text>

  <!-- Framework responsibilities (minimal) -->
  <rect x="620" y="275" width="250" height="95" rx="6" fill="#FFF8E1" stroke="#FFA000" stroke-width="1.2"/>
  <text x="745" y="295" font-size="11" font-weight="bold" text-anchor="middle" fill="#E65100">框架的职责（极轻）</text>
  <text x="640" y="320" font-size="10" fill="#37474F">├─ 工具执行 Execute Decisions</text>
  <text x="640" y="340" font-size="10" fill="#37474F">└─ 状态记录 Log Results</text>

  <!-- Summary -->
  <text x="745" y="395" font-size="10" font-weight="bold" text-anchor="middle" fill="#0D47A1">趋势：</text>
  <text x="745" y="412" font-size="10" text-anchor="middle" fill="#546E7A">框架成为"工具执行器"</text>
  <text x="745" y="428" font-size="10" text-anchor="middle" fill="#546E7A">模型承担所有推理</text>
  <text x="745" y="448" font-size="9" text-anchor="middle" fill="#78909C">~80 行框架代码 (↓75%)</text>

  <!-- Evolution arrows between phases -->
  <line x1="295" y1="255" x2="305" y2="255" stroke="#546E7A" stroke-width="2"/>
  <polygon points="305,250 315,255 305,260" fill="#546E7A"/>
  <line x1="590" y1="255" x2="600" y2="255" stroke="#546E7A" stroke-width="2"/>
  <polygon points="600,250 610,255 600,260" fill="#546E7A"/>
</svg>