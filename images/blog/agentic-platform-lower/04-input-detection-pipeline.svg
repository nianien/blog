<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 400">
  <!-- 用户输入 -->
  <rect x="120" y="10" width="160" height="35" fill="#3B82F6" stroke="#1E40AF" stroke-width="1.5" rx="6"/>
  <text x="200" y="33" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">用户输入</text>

  <!-- Arrow -->
  <line x1="200" y1="45" x2="200" y2="62" stroke="#666" stroke-width="1.5"/>
  <polygon points="196,58 200,66 204,58" fill="#666"/>

  <!-- Step 1 -->
  <circle cx="48" cy="84" r="15" fill="#F59E0B" stroke="#B45309" stroke-width="1.5"/>
  <text x="48" y="89" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">1</text>
  <rect x="75" y="69" width="250" height="30" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5" rx="6"/>
  <text x="200" y="89" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="12" fill="#1e293b" text-anchor="middle">正则规则检测</text>
  <!-- 右侧标注 -->
  <line x1="325" y1="84" x2="360" y2="84" stroke="#DC2626" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="368" y="88" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="10" fill="#DC2626">命中 → 拦截</text>

  <!-- Arrow -->
  <line x1="200" y1="99" x2="200" y2="116" stroke="#666" stroke-width="1.5"/>
  <polygon points="196,112 200,120 204,112" fill="#666"/>

  <!-- Step 2 -->
  <circle cx="48" cy="138" r="15" fill="#F59E0B" stroke="#B45309" stroke-width="1.5"/>
  <text x="48" y="143" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">2</text>
  <rect x="75" y="123" width="250" height="30" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5" rx="6"/>
  <text x="200" y="143" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="12" fill="#1e293b" text-anchor="middle">长度和格式检查</text>
  <line x1="325" y1="138" x2="360" y2="138" stroke="#EA580C" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="368" y="142" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="10" fill="#EA580C">异常 → 标记可疑</text>

  <!-- Arrow -->
  <line x1="200" y1="153" x2="200" y2="170" stroke="#666" stroke-width="1.5"/>
  <polygon points="196,166 200,174 204,166" fill="#666"/>

  <!-- Step 3 -->
  <circle cx="48" cy="192" r="15" fill="#F59E0B" stroke="#B45309" stroke-width="1.5"/>
  <text x="48" y="197" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">3</text>
  <rect x="75" y="177" width="250" height="30" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5" rx="6"/>
  <text x="200" y="197" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="12" fill="#1e293b" text-anchor="middle">LLM 分类器（轻量模型）</text>
  <line x1="325" y1="192" x2="360" y2="192" stroke="#EA580C" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="368" y="196" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="10" fill="#EA580C">判断注入指令</text>

  <!-- Arrow -->
  <line x1="200" y1="207" x2="200" y2="224" stroke="#666" stroke-width="1.5"/>
  <polygon points="196,220 200,228 204,220" fill="#666"/>

  <!-- Step 4 -->
  <circle cx="48" cy="246" r="15" fill="#F59E0B" stroke="#B45309" stroke-width="1.5"/>
  <text x="48" y="251" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">4</text>
  <rect x="75" y="231" width="250" height="30" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5" rx="6"/>
  <text x="200" y="251" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="12" fill="#1e293b" text-anchor="middle">综合评分</text>

  <!-- 三路输出：先竖线到水平线，再分三路（以 x=200 为中心对称） -->
  <line x1="200" y1="261" x2="200" y2="290" stroke="#666" stroke-width="1.5"/>
  <!-- 水平分叉线：75 到 325，中心 200 -->
  <line x1="75" y1="290" x2="325" y2="290" stroke="#666" stroke-width="1.5"/>

  <!-- 左：高风险 (center x=75) -->
  <line x1="75" y1="290" x2="75" y2="310" stroke="#666" stroke-width="1.5"/>
  <polygon points="71,306 75,314 79,306" fill="#666"/>
  <rect x="25" y="316" width="100" height="35" fill="#FEE2E2" stroke="#DC2626" stroke-width="1.5" rx="6"/>
  <text x="75" y="330" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="11" font-weight="bold" fill="#DC2626" text-anchor="middle">高风险</text>
  <text x="75" y="345" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="10" fill="#991b1b" text-anchor="middle">拒绝并记录</text>

  <!-- 中：中风险 (center x=200) -->
  <line x1="200" y1="290" x2="200" y2="310" stroke="#666" stroke-width="1.5"/>
  <polygon points="196,306 200,314 204,306" fill="#666"/>
  <rect x="150" y="316" width="100" height="35" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5" rx="6"/>
  <text x="200" y="330" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="11" font-weight="bold" fill="#EA580C" text-anchor="middle">中风险</text>
  <text x="200" y="345" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="10" fill="#92400e" text-anchor="middle">放行但监控</text>

  <!-- 右：低风险 (center x=325) -->
  <line x1="325" y1="290" x2="325" y2="310" stroke="#666" stroke-width="1.5"/>
  <polygon points="321,306 325,314 329,306" fill="#666"/>
  <rect x="275" y="316" width="100" height="35" fill="#DCFCE7" stroke="#22C55E" stroke-width="1.5" rx="6"/>
  <text x="325" y="330" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="11" font-weight="bold" fill="#166534" text-anchor="middle">低风险</text>
  <text x="325" y="345" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="10" fill="#166534" text-anchor="middle">正常处理</text>
</svg>
