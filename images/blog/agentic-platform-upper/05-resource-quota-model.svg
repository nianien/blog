<svg viewBox="0 0 620 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Title -->
  <text x="310" y="25" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="16" font-weight="bold" fill="#1F2937" text-anchor="middle">资源配额模型</text>

  <!-- Table header -->
  <rect x="20" y="45" width="580" height="40" rx="6" fill="#1F2937" stroke="#111827" stroke-width="1.5"/>

  <!-- Header cells -->
  <text x="120" y="72" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">维度</text>
  <text x="310" y="72" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">硬上限</text>
  <text x="500" y="72" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">软上限</text>

  <!-- Header dividers -->
  <line x1="200" y1="45" x2="200" y2="85" stroke="#374151" stroke-width="1"/>
  <line x1="390" y1="45" x2="390" y2="85" stroke="#374151" stroke-width="1"/>

  <!-- Row 1 -->
  <rect x="20" y="85" width="580" height="40" rx="0" fill="#F3F4F6" stroke="#D1D5DB" stroke-width="1"/>
  <text x="120" y="112" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="12" fill="#1F2937" text-anchor="middle">并发会话数</text>
  <text x="310" y="112" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="12" fill="#1F2937" text-anchor="middle">200</text>
  <text x="500" y="107" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="11" fill="#1F2937" text-anchor="middle">150 (触发告警)</text>

  <!-- Row dividers 1 -->
  <line x1="200" y1="85" x2="200" y2="125" stroke="#D1D5DB" stroke-width="0.5"/>
  <line x1="390" y1="85" x2="390" y2="125" stroke="#D1D5DB" stroke-width="0.5"/>

  <!-- Row 2 -->
  <rect x="20" y="125" width="580" height="40" rx="0" fill="white" stroke="#D1D5DB" stroke-width="1"/>
  <text x="120" y="152" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="12" fill="#1F2937" text-anchor="middle">TPM</text>
  <text x="310" y="152" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="12" fill="#1F2937" text-anchor="middle">500K tokens</text>
  <text x="500" y="147" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="11" fill="#1F2937" text-anchor="middle">400K (触发限速)</text>

  <!-- Row dividers 2 -->
  <line x1="200" y1="125" x2="200" y2="165" stroke="#D1D5DB" stroke-width="0.5"/>
  <line x1="390" y1="125" x2="390" y2="165" stroke="#D1D5DB" stroke-width="0.5"/>

  <!-- Row 3 -->
  <rect x="20" y="165" width="580" height="40" rx="0" fill="#F3F4F6" stroke="#D1D5DB" stroke-width="1"/>
  <text x="120" y="192" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="12" fill="#1F2937" text-anchor="middle">月度 Token</text>
  <text x="310" y="192" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="12" fill="#1F2937" text-anchor="middle">50M tokens</text>
  <text x="500" y="187" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="11" fill="#1F2937" text-anchor="middle">40M (通知管理员)</text>

  <!-- Row dividers 3 -->
  <line x1="200" y1="165" x2="200" y2="205" stroke="#D1D5DB" stroke-width="0.5"/>
  <line x1="390" y1="165" x2="390" y2="205" stroke="#D1D5DB" stroke-width="0.5"/>

  <!-- Row 4 -->
  <rect x="20" y="205" width="580" height="40" rx="0" fill="white" stroke="#D1D5DB" stroke-width="1"/>
  <text x="120" y="232" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="12" fill="#1F2937" text-anchor="middle">单次执行</text>
  <text x="310" y="232" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="12" fill="#1F2937" text-anchor="middle">100K tokens</text>
  <text x="500" y="227" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="11" fill="#1F2937" text-anchor="middle">50K (触发审查)</text>

  <!-- Row dividers 4 -->
  <line x1="200" y1="205" x2="200" y2="245" stroke="#D1D5DB" stroke-width="0.5"/>
  <line x1="390" y1="205" x2="390" y2="245" stroke="#D1D5DB" stroke-width="0.5"/>

  <!-- Row 5 -->
  <rect x="20" y="245" width="580" height="40" rx="0" fill="#F3F4F6" stroke="#D1D5DB" stroke-width="1"/>
  <text x="120" y="272" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="12" fill="#1F2937" text-anchor="middle">工具调用/分</text>
  <text x="310" y="272" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="12" fill="#1F2937" text-anchor="middle">100 次</text>
  <text x="500" y="272" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="12" fill="#1F2937" text-anchor="middle">80 次</text>

  <!-- Outer border -->
  <rect x="20" y="45" width="580" height="240" rx="6" fill="none" stroke="#D1D5DB" stroke-width="1.5"/>

  <!-- Legend at bottom -->
  <text x="20" y="295" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="11" fill="#666">硬上限：触发系统拒绝  |  软上限：触发告警/限速/审查</text>
</svg>