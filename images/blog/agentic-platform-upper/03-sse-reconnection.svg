<svg viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Title -->
  <text x="300" y="25" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="16" font-weight="bold" fill="#1F2937" text-anchor="middle">SSE 重连恢复</text>

  <!-- Client lifeline -->
  <line x1="100" y1="60" x2="100" y2="380" stroke="#3B82F6" stroke-width="2" stroke-dasharray="5,5"/>
  <rect x="60" y="50" width="80" height="35" rx="6" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="100" y="73" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="13" font-weight="bold" fill="#1E40AF" text-anchor="middle">Client</text>

  <!-- Server lifeline -->
  <line x1="500" y1="60" x2="500" y2="380" stroke="#8B5CF6" stroke-width="2" stroke-dasharray="5,5"/>
  <rect x="460" y="50" width="80" height="35" rx="6" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="1.5"/>
  <text x="500" y="73" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="13" font-weight="bold" fill="#6D28D9" text-anchor="middle">Server</text>

  <!-- Step 1: SSE Connect -->
  <line x1="100" y1="110" x2="500" y2="110" stroke="#3B82F6" stroke-width="1.5"/>
  <polygon points="496,106 500,110 496,114" fill="#3B82F6"/>
  <text x="300" y="100" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="12" fill="#1F2937" text-anchor="middle">SSE Connect</text>

  <!-- Response 1 -->
  <line x1="500" y1="135" x2="100" y2="135" stroke="#10B981" stroke-width="1.5"/>
  <polygon points="104,131 100,135 104,139" fill="#10B981"/>
  <text x="300" y="125" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="12" fill="#1F2937" text-anchor="middle">event_id: 1, token: "你"</text>

  <!-- Response 2 -->
  <line x1="500" y1="160" x2="100" y2="160" stroke="#10B981" stroke-width="1.5"/>
  <polygon points="104,156 100,160 104,164" fill="#10B981"/>
  <text x="300" y="150" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="12" fill="#1F2937" text-anchor="middle">event_id: 2, token: "好"</text>

  <!-- Server side note -->
  <text x="520" y="145" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="11" fill="#666" text-anchor="start">stream_id: s_001</text>
  <text x="520" y="160" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="11" fill="#666" text-anchor="start">缓存到 Redis</text>
  <text x="520" y="175" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="11" fill="#666" text-anchor="start">TTL = 5min</text>

  <!-- Disconnect marker -->
  <circle cx="100" cy="210" r="5" fill="#EF4444" stroke="#DC2626" stroke-width="1.5"/>
  <text x="75" y="215" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="12" fill="#DC2626" font-weight="bold" text-anchor="end">连接断开</text>

  <!-- Gap area -->
  <rect x="60" y="220" width="440" height="40" fill="#FEE2E2" opacity="0.5" rx="4"/>

  <!-- Reconnect request -->
  <line x1="100" y1="280" x2="500" y2="280" stroke="#3B82F6" stroke-width="1.5"/>
  <polygon points="496,276 500,280 496,284" fill="#3B82F6"/>
  <text x="300" y="270" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="12" fill="#1F2937" text-anchor="middle">Reconnect + Last-Event-ID: 2</text>

  <!-- Server recovery note -->
  <text x="520" y="295" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="11" fill="#666" text-anchor="start">从 event_id: 3 恢复</text>

  <!-- Response 3 -->
  <line x1="500" y1="320" x2="100" y2="320" stroke="#10B981" stroke-width="1.5"/>
  <polygon points="104,316 100,320 104,324" fill="#10B981"/>
  <text x="300" y="310" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="12" fill="#1F2937" text-anchor="middle">event_id: 3, token: "，"</text>

  <!-- Response 4 -->
  <line x1="500" y1="345" x2="100" y2="345" stroke="#10B981" stroke-width="1.5"/>
  <polygon points="104,341 100,345 104,349" fill="#10B981"/>
  <text x="300" y="335" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="12" fill="#1F2937" text-anchor="middle">event_id: 4, tool_call: ...</text>

  <!-- Legend -->
  <circle cx="50" cy="375" r="3" fill="#3B82F6"/>
  <text x="60" y="378" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="11" fill="#666">请求</text>

  <circle cx="140" cy="375" r="3" fill="#10B981"/>
  <text x="150" y="378" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="11" fill="#666">响应</text>

  <circle cx="220" cy="375" r="3" fill="#EF4444"/>
  <text x="230" y="378" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="11" fill="#666">断开</text>
</svg>