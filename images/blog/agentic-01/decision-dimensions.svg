<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 280" font-family="-apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <filter id="sh" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Root node -->
  <rect x="245" y="20" width="210" height="45" rx="10" fill="#1e293b" filter="url(#sh)"/>
  <text x="350" y="48" text-anchor="middle" fill="white" font-size="14" font-weight="600">任务特征评估</text>

  <!-- Lines from root to 3 dimensions -->
  <line x1="295" y1="65" x2="130" y2="110" stroke="#475569" stroke-width="2"/>
  <line x1="350" y1="65" x2="350" y2="110" stroke="#475569" stroke-width="2"/>
  <line x1="405" y1="65" x2="570" y2="110" stroke="#475569" stroke-width="2"/>

  <!-- Dimension 1: 确定性程度 -->
  <rect x="50" y="110" width="160" height="42" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5" filter="url(#sh)"/>
  <text x="130" y="136" text-anchor="middle" fill="#1e40af" font-size="13" font-weight="600">确定性程度</text>

  <!-- Dimension 2: 延迟要求 -->
  <rect x="270" y="110" width="160" height="42" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5" filter="url(#sh)"/>
  <text x="350" y="136" text-anchor="middle" fill="#15803d" font-size="13" font-weight="600">延迟要求</text>

  <!-- Dimension 3: 成本承受力 -->
  <rect x="490" y="110" width="160" height="42" rx="8" fill="#fae8ff" stroke="#a855f7" stroke-width="1.5" filter="url(#sh)"/>
  <text x="570" y="136" text-anchor="middle" fill="#7e22ce" font-size="13" font-weight="600">成本承受力</text>

  <!-- Sub-branches for 确定性 -->
  <line x1="95" y1="152" x2="65" y2="185" stroke="#3b82f6" stroke-width="1.5"/>
  <line x1="165" y1="152" x2="195" y2="185" stroke="#3b82f6" stroke-width="1.5"/>
  <rect x="20" y="185" width="90" height="35" rx="6" fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
  <text x="65" y="207" text-anchor="middle" fill="#1e40af" font-size="12" font-weight="600">高</text>
  <text x="65" y="222" text-anchor="middle" fill="#3b82f6" font-size="9">→ Workflow</text>
  <rect x="150" y="185" width="90" height="35" rx="6" fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
  <text x="195" y="207" text-anchor="middle" fill="#1e40af" font-size="12" font-weight="600">低</text>
  <text x="195" y="222" text-anchor="middle" fill="#3b82f6" font-size="9">→ Agent</text>

  <!-- Sub-branches for 延迟 -->
  <line x1="315" y1="152" x2="285" y2="185" stroke="#22c55e" stroke-width="1.5"/>
  <line x1="385" y1="152" x2="415" y2="185" stroke="#22c55e" stroke-width="1.5"/>
  <rect x="240" y="185" width="90" height="35" rx="6" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
  <text x="285" y="207" text-anchor="middle" fill="#15803d" font-size="12" font-weight="600">&lt;200ms</text>
  <text x="285" y="222" text-anchor="middle" fill="#22c55e" font-size="9">→ 不适合 Agent</text>
  <rect x="370" y="185" width="90" height="35" rx="6" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
  <text x="415" y="207" text-anchor="middle" fill="#15803d" font-size="12" font-weight="600">&gt;2s</text>
  <text x="415" y="222" text-anchor="middle" fill="#22c55e" font-size="9">→ 可用 Agent</text>

  <!-- Sub-branches for 成本 -->
  <line x1="535" y1="152" x2="505" y2="185" stroke="#a855f7" stroke-width="1.5"/>
  <line x1="605" y1="152" x2="635" y2="185" stroke="#a855f7" stroke-width="1.5"/>
  <rect x="460" y="185" width="90" height="35" rx="6" fill="#fdf4ff" stroke="#d8b4fe" stroke-width="1"/>
  <text x="505" y="207" text-anchor="middle" fill="#7e22ce" font-size="12" font-weight="600">紧</text>
  <text x="505" y="222" text-anchor="middle" fill="#a855f7" font-size="9">→ Workflow</text>
  <rect x="590" y="185" width="90" height="35" rx="6" fill="#fdf4ff" stroke="#d8b4fe" stroke-width="1"/>
  <text x="635" y="207" text-anchor="middle" fill="#7e22ce" font-size="12" font-weight="600">充足</text>
  <text x="635" y="222" text-anchor="middle" fill="#a855f7" font-size="9">→ Agent</text>

  <!-- Footer -->
  <text x="350" y="260" text-anchor="middle" fill="#94a3b8" font-size="11">三个维度综合判断，任一维度不满足都应降级方案</text>
</svg>