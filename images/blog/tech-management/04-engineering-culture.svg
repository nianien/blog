<svg viewBox="0 0 480 260" xmlns="http://www.w3.org/2000/svg">
  <!-- Title -->
  <text x="240" y="28" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="16" font-weight="bold" fill="#1F2937" text-anchor="middle">工程文化的四个支柱</text>

  <!-- Top row: 3 pillars -->
  <rect x="30" y="50" width="130" height="120" rx="8" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="95" y="78" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="14" font-weight="bold" fill="#1E40AF" text-anchor="middle">透明</text>
  <text x="95" y="102" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="11" fill="#3B82F6" text-anchor="middle">信息共享</text>
  <text x="95" y="122" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="11" fill="#3B82F6" text-anchor="middle">决策公开</text>
  <text x="95" y="142" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="11" fill="#3B82F6" text-anchor="middle">失败复盘</text>

  <rect x="175" y="50" width="130" height="120" rx="8" fill="#F0FDF4" stroke="#22C55E" stroke-width="1.5"/>
  <text x="240" y="78" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="14" font-weight="bold" fill="#166534" text-anchor="middle">Ownership</text>
  <text x="240" y="102" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="11" fill="#22C55E" text-anchor="middle">主人翁意识</text>
  <text x="240" y="122" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="11" fill="#22C55E" text-anchor="middle">端到端负责</text>
  <text x="240" y="142" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="11" fill="#22C55E" text-anchor="middle">主动补位</text>

  <rect x="320" y="50" width="130" height="120" rx="8" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="385" y="78" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="14" font-weight="bold" fill="#92400E" text-anchor="middle">质量</text>
  <text x="385" y="102" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="11" fill="#F59E0B" text-anchor="middle">技术标准</text>
  <text x="385" y="122" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="11" fill="#F59E0B" text-anchor="middle">Code Review</text>
  <text x="385" y="142" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="11" fill="#F59E0B" text-anchor="middle">测试文化</text>

  <!-- Bottom row: foundation -->
  <rect x="30" y="186" width="420" height="56" rx="8" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="1.5"/>
  <text x="240" y="214" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="14" font-weight="bold" fill="#5B21B6" text-anchor="middle">协作</text>
  <text x="240" y="234" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="11" fill="#8B5CF6" text-anchor="middle">跨团队配合 · 技术共建 · 知识共享</text>
</svg>
